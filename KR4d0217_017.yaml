body:
  text: 太倉稊米集卷十七宋周紫芝撰詩五十首睡起題西齋壁熟睡間欹一幅紗夢殘庭樹落疏花屋頭正喜鳩喚婦墻下忽聞蜂打衙題劉生畫王子猷嚴子陵二圖人生不相知相視粵與秦臭味倘復同萬里心相親何必兒女曹爾汝相怨恩浩歌反歸航詎識此意申二四皓挽復來子陵呼不起天下復歸心兩京同一軌義重勢乃輕理自固應爾賣菜苦求益可笑真俗子登杜牧之翠微亭故基秋草無情上舞臺清江猶抱故山回紫微郎為誰攜酒斜日西風菊自開中秋大晴採菊亭對月風與秋容一樣清雲隨風盡十分晴江從採菊亭前過月到雙梧頂上明塞草又黃人亦老霜鬚渾白酒還傾不應造物知愁極故著玉蟾娛老情秋蝗歎驅車入秋原懞懞盡禾黍田父刈且歌笑言雜兒女路傍騎馬翁下與田父語問言田家勞云何樂如許父老仰天歎懇欵話心膂今年遭嵗凶夏旱連秋暑誰知勤餉婦社甕芻緑醑君看西來蝗落地輒蓋土入境不入田食草不食秬老農亦何幸此樂詎天與為言相君賢為惠實在汝羣凶滿江淮殺氣自消阻微蟲初何知仁者亦復與知公意在民有榖寧忍咀勸爾但自歡蝗來不須禦謁昭明祠歷年有攸歸修短良亦異天乎不祚梁斯人乃即世於皇元良資盛德真豈弟髙文貫百家妙學窮六藝悠悠悲徂年凛凜尚生氣偉哉千載人享此百世祀金朱煥靈宮奔走恭祀事遐瞻儼森寒神雨倐復至傴僂奠椒漿悲風肅蘭佩想像折芳馨茲焉獨長喟次韻元傑聽溪亭見寄貧病相牽各異鄉心隨南鴈與翺翔感君三絶出妙手慰我九回縈别腸山色為人分淺黛泉聲何事碎鳴璫千岩萬壑山陰路誰與臨流共一觴清樾晚雨效韓渥三絶池上風荷香撲衣紅粧鏡裏雨如絲試呼小艇尋煙去便是苕溪五月時白鷺一雙飛暮靄亂鴉無數立官樓角聲吹盡欄猶倚雨落黃昏人白頭黃昏簾幕人誰卷暮雨闌干客自憑獨自不知多少恨一池荷葉碎秋聲齊山有岩穴宛轉山間秀色可喜號小九華衰容迫遲暮驅車厭行役路逢玉孱顔庶用慰愁寂誰知九鳯羣敻與秋水隔落日自凄迷轉盼失虗碧幸茲登臨間會遇晚乃獲玲瓏八九峰模寫在尋尺欎雲開層巔飛瀑挂蒼壁凜然削寒玉秀色粲可摘緬懷融結初岌嶪自開闢懸知孤客恨為了愛山癖聊將小岩巒入我尋山屐何時解塵鞿卜築在泉石遂當挹諸峯羅列歸几席齊山依小岩作觀音閣亂山空洞自成龕十里秋風響檜杉我亦來修香火供便疑身在普陀岩池口觀樓船湘水妖氛靜樓船盡日橫風濤心自恐舟楫眼初驚伏莽膏金鉞將軍駕木城太平無此物指日望銷兵飲酒三首髙皇掃強秦縱橫成妙略三傑豈不雄曾不出籠絡曹參晚為相痛飲事杯酌當知清淨化寓意在酬酢魏武獨何為屢下禁酒約兵戈纒九州猜忌恣暴虐堂堂孔北海醉語雜諧謔斯人猶殺之四海何由廓古來成敗事紛紛真一噱昔我在田畝薄言事耘薅種粳亦種秫可食兼可醪清香滿寒甕夜滴喧春槽洗我玉花瓷酌此鵝黃膏閲嵗更閹茂下田但藜蒿里胥厭追索縣籍書逋逃邇來兵火急斗粟千錢髙不飲動逾月憔悴成楚騷丈夫命運薄困厄例所遭究竟無如何隨緣且陶陶濁醪有何好所貴資清歡如何畢阮輩頭沒杯案間我飲但涓滴而作飲酒篇兒曹見之笑謂我狂且顛政應坐自失説夢癡人前一酌憂已亡再酌當陶然此意但自得此理詎可言萬古一淵明何由與之論秋晚念歸風寒黃葉未全落露重流螢巳不飛惆悵西風秋欲老旅巢無定客思歸親征詔下朝野歡呼六首茫茫禹迹混殊方誰遣中華作戰場今日澶淵尋舊役會看兵氣掃欃槍天戈未指敵先摧掩耳誰能及迅雷便遣風師清輦路奉迎北狩兩宫回誰信妖凶膽自驚君王親駕六騑行江邊紅日三更出怪得欃槍夜不明漢業當於馬上成謾勞諸將久經營廟堂早扈南陽駕已為蒼生洗甲兵雉扇遙聞擁翠鑾逺方耕鑿尚偷安誰知黃鉞臨戎地江上秋風玉帳寒請看介子請長纓白髮書生百不能誰掃浯溪題嵗月漫郎端欲頌中興青陽道中望九華諸峯作平生愛山意瞑目想竒崛東南號多山萬嶺空峍屼不知罏甀工鑄此一尤物峯巒與天近紫翠爭日出何年飛三山此事亦恍惚要欲移嵌岩下作仙聖窟我願從之遊飛升蛻塵骨山行尚悠悠客意殊忽忽弱水不可渡瘦馬聊自兀落日回寸眸飛鳥但滅沒次韻吕仁父教授題余秋浦詩卷時歸自池陽病客還隨倦鳥翰霜風猶帶客衣寒誰持馬上歸來句換得天孫雲錦端汗漫誰從食蛤遊嵗窮真似賈胡留恨無摩詰丹青手貌得瀟湘兩岸秋試從秋浦望長江猶有遺蹤在渺茫滿地黃花秋日晚傷心不見紫微郎燒芋幽人日晏方索米朱門醉頭扶未起人微何敢望一囷鮒死知誰濡斗水糞火撥灰聊效顰玉糝誇羮未須爾紫團包玉不洗泥火候初勻香透紙從來真味貴天全大羮不致名太始饞涎為止翁欲顛飢腸不鳴兒更喜口腹為災莫漫誇五畝應須急料理但托長鑱仍短鑱誰能畏首復畏尾未知春雨荷鋤歸空羡吾家燒芋美十二月二十九日雪中煮茗旋掃飛花煮玉塵一杯聊餉作詩人未知折腳鐺中雪何似浮蛆甕裏春雪後小霽擷菊苗薦茗短窗烘日見深明墻角泥乾路欲成槐葉索淘春漸近菊苗薦茗雪初晴寒藂且對天隨子大白誰浮阮步兵願借芳香明老眼要翻書葉送餘生小兒漬蜜雪見餉用前韻黃蜜香和糝徑塵紫蘭兒餉白頭人誰知茅屋三冬雪中有蜂房一掬春雪後北墻攜兒一作北墻行泥雪初乾杖履輕病後茶槍渾不要眼前蔬甲喜全生鳥聲漸軟春應近梅萼催香日自晴忽憶讀殘書未了却須歸趁小窗明冬至前七日極暖風日炎洲似暄妍趣嵗華三冬開蟄户十月見梅花翠管書雲近黃羊賽臘賖却愁遲暮雪隨意作橫斜冬至晚晴可喜雲物才書雪未稀樓臺忽復帶斜暉日從銀色界中出鳥向瑶池影外飛可忍便教煙欲瞑會須更待月同歸羣山即是三山頂八極聊將寸目圍送黃子才還姑蘇用陶淵明王撫軍座送客詩韻嵗事忽已晏行邁良亦腓誰知出岫雲意作無心歸嗟我寡徒旅隻影敻無依况乃逺離别與子千里違中原念亂久意緒轉愁悲迢迢兩溪水淡淡浮斜暉豈無雙頳尾尺素不可遲慎勿不相念棄置忽如遺奉寄黃端冕用送子才韻端冕其猶子也至言如秋霜既肅百草腓諂諛忘中正千古良同歸倘無鯁槩士舉世將疇依衮職或可補鼎鑊安得違所以長沙傅慟哭為時悲讜語數十上子今有餘暉我欲從之遊周道苦倭遲倭遲不足惜子言願無遺陳公園梅極盛頃嘗與客遊觀花下兵盜十年今復過之追念存殁愴然有感三絶忽憶梅花空斷腸十年依約夢中香如今濯錦江邊路不見栽花黃四娘玉雪驚看亂後枝梅花雖在鬢成絲當時一醉還如夢今日嫣然復為誰溪上長眠雙玉瓶只今誰在復誰傾花知何事遽如許人亦看花太瘦生紙閣初成小閣春溫借隙光風簾不挂最宜香窗前睡鴨吹雲縷聊與幽人度日長除夜雜興三首華髮日就稿萎萎如秋草秋草剪復生髮禿不再好雅意憐兒童軟語媚翁媪鑷白挽流光持杯錫難老我老不足惜汝生念不早兵戈常在眼流離猶滿道且當篘殘缸瓶空莫辭倒醒視夜何其東行日杲杲憶昔元會日漢家全盛時奉隨觀國賔得見漢官儀中郎授國璽屬國欽朝儀萬邦瞻咫尺龍姿喜元知皇天厭久治夜見蚩尤旗微生脫九死飲此除夜巵河陽狩未還螻蟻何足悲昔年避羣盜夜竄蒼山阿偷生嵗忽杪妻孥共婆娑村醪薄如水我顔安得酡夜半黑風起撾門驚荷戈今夕復何夕奈此歡樂何人生不自保聚散如羣儺更當增蘭膏照此杯中波立春日雨中三絶滿天雲物正埀埀何處青春欲到時花信未從風裏得豐年先自雨中知先自逢春老倍傷兩簷疏雨更淋浪眼前無復新幡勝只有寒葅照庾郎春光先已到誰家風裏叉頭小燕斜只有幽人了無事卧看疏雨濕梅花張載楊示元道州詩卷羅仲共有詩在卷尾次其韻吾道嗟牢落斯文得主盟馬從西極到鳯入九霄鳴翰墨推前輩篇章集大成向來侯叔喜何得有新聲正月二十七日種木瓜五株三峰真奧區陸海冨佳實此物冠九州未數梨與栗園丁力扶持璀璨成妙質鏤花淹宿露紅暈生晚日玉顔醉自頳豐肌滑仍密風味照盤飱名字愈痺疾衛矦報瓊瑶盛德豈埋沒野人獻根株春雨助芽蘖何當埀露顆照眼行突兀疇敢與荔子飛電爭置驛况復具苞苴緘封鑽巨室一酌呼吾人甘酸漬崖蜜人生鮮知味相餉不可失正月二十九日種柳三十五株故國兵火餘壤地日窘蹙千里無雞豚遺禍及草木火攻厄焚巢雲棲急新卜尺地無寸荄山腰見茅屋小徑卧修蛇縈迂繞山麓埀楊剪孫枝封殖勤養育正須清陰成門巷森結曲微風惱春絮細雨滋淺緑悲涼聽殘蟬徙倚捫飽腹種德須百年種木十年足十年吾巳老光景日夜速吾事倘復濟亦足快所欲何必羡張緒風流標簡牘太倉稊米集卷十七
