body:
  text: 太倉稊米集巻二宋周紫芝撰樂府二十首艨艟行漢作樓船三百尺江南父老何曽識船頭擊鼓轉紅旗船尾踏車人不知君王英畧似漢武要挽江心射蛟弩天戈指日殄匈奴先遣偏舟下江浦三年血滿秋江紅洞庭揺落悲秋風漫山柵水作城寨逆氣不腥河伯宫驚濤捲地噴飛雪艨艟一出千艘空將軍自駕木城去莫歎龍驤作阿童五谿道中見羣牛蔽野問之容州來感其道里之逺乃作短歌以補樂府之闕淮田一廢不復秋五夫扶犁當一牛畨兵大入郡不守青窠未熟官來收狐狸晝嘯荆棘裡此事最貽廊廟憂羽檄徵牛牛蔽野問言萬里來容州容州價賤苦易得四蹄纔堪一劍易來時草青今草黄道路既逺多死傷沙場草淺食不飽夕陽時見烏銜創江北江南幾阡陌幾牛能滿千家倉願言田父各努力㑹見西風禾黍長將軍官大馬亦壯肯使敵騎窺漢疆黥奴行范瓊山西驍將真黥奴兩斛笑彎金僕姑偶然浮雲變蒼狗身騎髙馬稱金吾敵兵倉黄忽南渡地黒天昏兩龍去賊臣僭偽誰適從將軍一呵百官懼仗劍前驅趣翠華路人辟易空囘顧至今願返河陽狩荆棘艱難窘天步未懸北闕新頭顱猶帶安西舊都䕶前年縱兵肥水頭横屍千里行人愁帳前騎士勇如虎帳下嬌娥雙臉羞藁街流血天忽怒小兒跳梁健兒舞寄語盧龍與范陽中書相公今尚父愼勿更如奴跋扈秣陵行宇文粹中秣陵城門夜不開城頭椎鼔鳴春雷緋衣擎火燎民屋萬井一炬飛紅埃道傍横屍人不識血流但見秦淮赤府中官吏一百人盡取姓名書罪籍元戎被執不得歸賊坐黄堂縱呵斥明朝傳檄下九州九州牧伯不敢収可笑官軍櫜羽箭環視走卒攖城樓將軍樓船下巫峽膽落雙旌俱巻甲日梟五十三頭顱一戰何曽短兵接今年新起故將軍灞陵醉尉勿浪嗔文致太平武定亂非渠誰復清風塵此詩末章歸美李綱射鹿行白羽紅旌繞山麓爭向山南射奔鹿獵夫舉網常苦辛誰寢其皮食其肉腹中着子初成斑梅花碎㸃真珠圓䨇桃壓髻玉簪短去作誰家頭上冠貴家金多逐時好尚蹙蛾眉嫌不早一皮可直三萬錢競作苞苴當珍寳大者有茸胎有紋舉無遺族如何寃玉纓瓊弁者誰子始作此俑知非賢督耨詞十里一候五里置渡海梯山來萬里賜入長安卿相家夜暖金猊香徹髓瓊香入骨作曉酲斗帳燒烟隔秋水青娥添火窓欲明紅錦薫衣人未起梅花不用波律來零藿何勞香傳記蘭閨半掩春晝長參差吹竹羅紅粧令君一去三日香更遣小兒縫紫囊夜來賓客滿髙堂誰家有女嫁韓郎漢宫詞漢宫五月多南風宫槐覆砌花陰濃彤庭破曉瑞霧薄寳檻茙葵迎日紅池面雞頭青蹙衂菖蒲有花池水緑殿閣風清白日長五絲結綵獻君王漢皇年來新受籙自篆天書辟邪毒六宫此日多歡娛就中何人恩寵殊黄金釵横絳囊小爭帶君王親冩符競渡曲江風獵獵吹紅旗舟人結束誇水嬉短衣青帽錦半臂横波鼔鬛飛鯨鯢江潮漫漫江水濶浪花擊碎千堆雪畫橈擘水挽不囘白羽離絃箭初脫巋來醉作踏浪歌應笑吳兒拜浪婆朱樓相映緑陰裡兩岸人家歡樂多飯筒角黍纒五綵楚俗至今猶未改日暮空歌何在斯不見三閭憔悴時牛女行天孫曉織雲錦章跂彼終日成七襄含情倚杼長脉脉靈河南北遥相望天風吹衣香冉冉烏鵲梁成月華淺青童侍女驂翔鸞玉闕瓊樓降華幰明朝脩渚曠清容歸期苦短歡期逺昔離今聚自有期天帝令嚴何敢違猶勝姮娥竊仙藥一入廣寒無嫁時雙鵠飛行憶昔江鄉遭亂離兩翁避地雙鵠飛一鵠南翔一鵠北北鵠墮地南鵠栖天長地逺去不返巢傾卵覆令人悲去年賊兵初聚黨今嵗王師方解圍舂陵萬户纔有幾駱谷一家空獨歸歸尋故里不知處白骨支撑滿塗路城西有屋無人居城東有地無屋廬仿彿相從舊遊處淚栖雙睫還欷歔鷰銜栢行雙鷰何時來瀚海寄巢脩椽巢不改春深巢稳初養雛雙雛引頸仰哺呼雄將雌出雙雛孤雛危墮地聲􅈱􅈱雌隨雄歸見雛泣主人將雛納其室雙雛脫死翅欲開𤣥衣素臆去復來明年主人開夀燕畫鼔停撾歌舞遍雙雛傍席爭囘旋共銜青栢置樽前口不能言對以臆再拜夀君如栢年石婦行二首俗呼望夫石在當塗貞婦生江南少小稱丰穠委身事良人相與歡笑同良人去不返兩鬂常鬔鬆謂言有膏沐未識誰為容日日上山望水逺山複重藁砧竟不來望望終無窮一朝化作石僵立由天公天公表堅貞令與山始終仙衣綉蘚暈寳髻搖花叢滔滔日月逝此石存髙峯清名閲千古勁節摩蒼穹恨無採詩官作詩頌遺蹤用之邦國間庶以消淫風生男有閨房莫娶青樓倡生女事姑嫜莫嫁遊冶郎倡家從人無定準遊子一去忘故鄉山頭義婦無人識踴身上山生死隔人將此婦作石看不信此心元是石相從豈復無它人髧彼兩髦真我特江流可盡山可平不盡悠悠千古情早知郎去無消息悔不將身事尾生擬客從逺方來客從逺方來遺我故人書故人久别離一别萬里餘相望不相見各在天一隅感君慇懃意字字如明珠上陳昔懽樂次問今何如昔别俱少年老大今蒼鬚良時不我與嵗月空躊躇餘生如夢寐尺素徒巻舒為我謝故人逺致雙鯉魚恨無木𤓰篇報君以瓊琚擬青青河畔草四序相推遷日月倐已逝春風入猗蘭光艶照羅綺一朝霜雪至容華苦憔悴佳人惜朱顔結褵奉君子安知逺征途中道成弃置昔持鴛鴦錦裁成合歡被今織迴文機中有相思字相思日夜切尺書無雁寄誰能知妾心脉脉含逺意擬燕趙多佳人沙丘有餘風趙女多跕纚音洗燕丹養勇士後宫出女子至今餘倡優吹彈滿都市佳人北方來傾城盡風靡妙舞縈纖腰清歌發皓齒一歌四座歡再歌賓客起囘眸與目成哀絃忍重理願為雙飛燕與君共棲止人生不行樂嵗月如流水擬梁父吟并引諸葛孔明耕南陽時雅好擁膝為梁父吟而三國志不載其詞唯秦佚文有之觀其詞㫖非亮所作特亮好歌此詩爾其後晉陸機宋沈約皆有之其詞與亮所歌不同余過淮隂經韓将軍墓追記田彊事乃擬古詞而為是詩駕言方北征遵彼淮陰路悠悠墟落間中有淮隂墓將軍藴竒畧功名照今古談笑下燕齊北面師降虜一朝遭讒誣銜寃復誰訴誰能為此謀宫中漢家婦擬司馬相如琴歌代文君荅二首并引卓文君欲奔司馬相如相如以琴心挑之今樂府有琴歌二首而無文君詞為代文君作荅歌以補其闕云鳳兮鳳兮胡不歸胡為四海求其雌其室良邇知者誰邂逅相遇君獨知彼美人兮偉容儀願與君兮相追隨歸丹山兮棲髙枝鳳兮鳳兮鳴噰噰雄將飛兮雌將從天寒慘慘多悲風雙翮欲舉心所同山石可鑿金可鎔妾心皎皎如日中莫愁歌蓮花深紅蓮葉緑平沙月上鴛鴦宿青腰三板蘭作橈月下莫愁歌一曲移船入花花轉深花深調苦難為音江邊夜半誰為語只有嬋娟知此心露華漸白月漸午刺舟自覔來時路明朝繫纜柳邊門却在夜來潮落處擬桃葉團扇歌三首并引王徽之愛姬作團扇歌三首詞固佳絶而意若有未盡者為再作三詩以足其意倚杼織氷紈殷勤作團扇為君惜朱顏相期日相見裁紈作團扇纖纖如白玉歳寒不改姿持用可郎目團扇復團扇團扇亦已好但恐秋風至棄捐在中道秋閨詞西風動簾幙蟋蟀鳴髙堂蔓草濕零露秋閨知夜長佳人掩朱户背燭解羅裳願言鴛鴦夢雙飛入方塘清影横疎櫺奈此明月光依依照長夜炯炯明愁腸不恨郎不歸恨月入我床披衣復起坐嚬翠挑殘缸開緘取素書解結羅帶傍一讀再三歎再讀淚數行終夜不成寢曙色忽滿窓雖云有膏沐誰能理晨粧倡樓詞桃李艷春風榮華照京洛九陌飛香塵朱樓響弦索美人倚脩欄青娥巻珠箔白面誰家郎巴商載金槖大艑何岢峩繫舟樓下泊哀彈雜清歌日日樓中樂謂言如江流偕老有盟約一朝買嬋娟蟬鬂輕梳掠情從新人歡恩與舊人薄去年與青棠今年贈芍藥人生有榮謝曾不待衰落倡女不嫁人深心失期約霽月謠和羅仲共效李長吉江鼉吹浪江水急雷師鞭鼓旌旗濕黒風駕雨霹靂鳴怒龍拏空半天立須㬰陰雲空四埀廣寒殿冷風披披玉觴燕罷王母歸紅鸞簇扇香霧飛挿秧歌和羅仲共效王建作田中水滿風淒淒青秧没隴村路迷家家趂水秧稻畦共唱俚歌聲調齊樹頭幽鳥聲剥啄半雨半晴雲漠漠五白草斑誰敢閒農夫餉田翁自作去年兩經羣盗來婦兒埀泣翁更哀蠶藂燒盡不成繭陵陂宿麥無根荄今年挿秧憂夏旱旱得雨時兵復亂官軍捕賊何時平處處村村聞鼔聲古離别二首絃斷何由續鏡分難再圓感君綢繆意贈我雙紋鴛百年㑹有盡此意終難捐行行重行行此别深可惜臨分意難傳欲語淚復滴我欲從君遊恨乏雙飛翮長短歌礲石磨磚作新壘角樓亭亭四邊起誰家一曲長短歌長安貴人葬蒿里東方作矣事若何口珠腰帶黄金多墓門重閉子孫泣樹上紙錢空滿柯君不見胡騎南來相州路倉皇尚覔韓王墓解鞍下馬拜墓前更遣羌兵作調護憑誰試問爾何為定恐當年識吾父太倉稊米集巻二
