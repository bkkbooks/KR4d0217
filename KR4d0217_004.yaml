body:
  text: 太倉稊米集卷四宋周紫芝撰詩四十四首次韻詹伯尹舒天用和答二首豫章有竒氣鏗然兩青萍埋光久未識神焰凌太清二子廊廟姿肯負丘壑情會當來冠裳未可終岩坰我生如眢井蕪穢久不鑿况此一日别輒作數日惡碧雲晚自合紅日麗林薄思君在何許行行繞飛閣白桃緗桃落盡又春回雪白桃花最後開怪我此生新入眼問君何處舊移栽枝頭已暖猶餘雪江上從今不數梅只有玉人宜玉樹翠鬟應近小粧臺次韻劉元素白頭煩惱不堪醒滿引休嫌酒趣行世事可驚嗟豆落人生安得俟河清舊交傾蓋由來久年少論心苦不情誰與寄聲劉校尉肯來同此看春耕次韻黃夢及見寄長卿未老久倦遊家無斗酒不得州平生拙甚屋背鳩羊頭可爛身不侯言輒觸諱恐轉喉怒逢醉尉常反眸廟堂戛擊方鳴球老人行歌聊飯牛我貧木奴欠千頭夜長晝短懷百憂巖栖谷汲誰與儔草木黃落空悲秋飢鷹小呼即下韝老頑不受良工鎪長年憔悴擬四愁浮生無根同舞漚更以外物為贅疣黃侯皎皎清且修憐我南冠如楚囚落筆衮衮不肯休人物眼前無此流合持五線裨冕旒姓名下覆黃金甌萬里一秣看驊騮去年操瑟不見收聞君欲買吳江舟明珠白璧惜暗投千金價重苦未酬感君尺鯉論綢繆逝將好我那肯魗微吟有句亦復搜敢撼大樹看蚍蜉元龍氣髙百尺樓此而未遇彼則不人雖曰畸天乃侔會當有馹旌林丘釣絲未可歸滄洲和鄭文昌雨中看花之作鄭侯好客如鄭莊客常滿座酒滿觴春來洛城被花惱千金一醉姚家黃殷勤置酒急招喚更來古寺窺紅粧春風微寒春雨細秉燭看花花已睡春光駘蕩與妖妍夜色侵凌增嫵媚卧枝不起終無言臉淚欲埀如有意樽中有酒客當歌我醉欲眠人未起君不見春來雨急風屢顛危芳墮地無餘妍掃花恐被落紅笑持杯欲倩何人傳愁多滿懷樂事少人自惜花天不憐烹羊炮羔且為樂酒酣耳熱亦不惡明朝有興却重來莫遣殘紅抱青萼題王摩詰畫袁邵公卧雪圖東京數人物矯矯稱袁公經綸有能事早嵗初未逢何許結蓬茅草樹風淅瀝幽夢寄一椽暮雪深幾尺平田已無路况復知公門人言公苦寒謂死寧當存鳴騶入空谷暖律破寒沍豈伊逢異人天實起僵仆漢明號賢主杖擊無名郎寃囚我自理微緒渠當昌摩詰亦可人六幅寫竒事浩蕩懷逺圖徘徊有佳思炎天挂空壁一洗毛骨寒意豈在氷雪髙風薄雲端浴罷書妙嚴壁雲散香槽客未回月團重瀹睡餘杯小窗斜日無人語只有松聲入夢來杖藜杖藜欵幽步苑囿粲景物汪灣小池間草樹極幽鬱潑剌跳魚鳴聿役科斗出髙荷為誰芳清芬苦飄忽鷺下復飛去偃蹇不易屈空餘扁舟間菱藻互蒙密餘生本江湖幸不困簪紱豹席與棕轎願此寄清逸一水便有餘焉用跨溟渤秋晚二絶涼月初欣薄露天井梧吹葉又淒然墻根可笑無名草依倚秋風翹碧鮮月向寒林欲上時露從秋後已沾衣微螢不自知時晚猶抱餘光照水飛次韻徐南美題彥符拳石翩翩佳公子逸氣凌青雲戲寫蒼石姿遂逼仇池真平生三昧手舉世誰與倫清詩為披拂警語良亦神一朝入雙眼二妙俱可人次韻南美再賦簡僕與王次卿賈善長交遊得二子淡如秋空雲長頭喜問事坦腹意自真但飽北山蔬固應嗤阿倫句法未得妙畫品如入神豈兹一漫士可並千載人讀髙帝紀始皇坑儒生秦室遂顛覆取冠溺其中何乃踵前躅亭長初秦民秦事鑒已熟事有異取舍安用自窘束方從豐沛豪起逐中原鹿君王自神武將士豈局促當時分漢茅素行甚汚辱屠沽與刀筆雜然非一族叔孫晚見推韓彭旋烹戮一弛復一張往往如轉軸髙皇躬獨斷此理深照燭英風渺何之遺事空簡牘讀淮隂傳淮陰一世豪勳業滿天地晚莭不自全遺恨在百世君臣如父子焉得置猜忌功髙良易疑地大苦難制折箠下燕齊羣豪自風靡豈有須假王而可鎮齊偽禍生固有胎失在此舉爾沛公窘滎陽齊卒盡精鋭頡頏楚漢間事若反掌易信豈不自王何乃遣漢使帝意自此疑齊楚終易位噲等何足羞鞅鞅遂失意晚路説陳豨咄嗟甚兒戲吕姥何能為公乃自失志二月二十八日雪晴步上西山亭示天用兄弟二首山崦猶殘雪人家欲禁煙客寧嫌鳥語晴亦借花妍愁色連千里春風又一年亭髙莫回首白髮滿江天晴色牽人出春風惱不歸鳥爭呼永日花各醉斜暉杖策從誰去持杯與願違兵戈愁外滿人物眼中稀時睦州亂和人摘茶陸鴻漸茶經云葉如梔子花如白薔薇皮日休茶塢詩云好是初夏時白花滿煙雨乃用茶經語也蓋茶至著花則晚矣結廬聞似輞川家更趂東風摘露芽短夢喚回春正好枯腸搜盡句方嘉酪奴語陋真堪笑瑞草名髙豈復加明嵗莫教煙雨裏白薔薇秀小巖花次韻姑溪興國寺晚眺姑溪李之儀字端叔東坡門人禪房花木有殘紅此地還因曲徑通竹影看搖金瑣碎風鈴解語玉丁東人來白鳥橫空處山在先生倚杖中絶唱未酬才已盡夜燈搔首鬢如蓬錢申仲大夫索四亭詩各賦一首白雲亭登臨思昔人有意在山麓舉首瞻孤雲悵懷思宰木雲亦初何心意乃自感觸人生風木念此念何由足忽忽不可留悠悠空滿目願言結斯廬聊用慰幽獨芳美亭春風始用事天意有反覆坐令氷雪姿吹作錦繡谷粲粲玄都花依依照人目花氣欲薰人醉眼眩紅緑想當甕頭春頗為客頻漉慎勿遣紅雨零亂飛滿屋遂初亭為貧作漫仕未必勝陸沈冠纓日羈縻鬢髮空侵尋昔為雲出岫今作鳥歸林暮年一丘壑往往諧初心窗明設淨几衣露張鳴琴緬懷靖節翁更賦歸來吟通惠亭昔人品淄澠惠山壓東南誰知十里隔通此一勺甘初不勞籜龍漫山走嵌巖方池汲清碧地脈通溶涵瓷甌落飛雪石鼎鳴風杉懸知與佳客午夢回春酣次卿與余終日坐竹間以何人有酒身無事誰家多竹門可欵為韻余得上七字養痾慕夷曠避俗蒙譏訶用兹結神交長年與婆娑修篁不見天萬玉方森羅隱几張淨琴共鼓南風歌人生要行樂取樂不必多儻無一笑適奈此風月何典午方中否舉世無賢人髙爵豈不佳竒禍終相因七子各見幾引身良及辰至今白眼徒往往多怒嗔愚智不同調孤髙固難羣自信茍不疑俗説空紛紛人言不如意十事常八九君看得意人奪去亦難守子雲草玄文覆瓿人不取更喜淵明門春風五楊柳當年富貴士泯默亦何有乃知百世下靜者差得久昔年嗜酒人常恐不到口臥甕寧免賊窺竇真若狗幸兹身無事家復有名酒竹亦不待尋清隂到窗牖長嘯風滿襟相勸杯在手不知平生歡重復有茲否人命甚脆弱百歲良逡巡日月不可恃齒髮寧長新但恐呿欠間二首仍六身塵冠急須彈荷佩便可紉願言同耦耕永繼沮溺塵會看此水頭有人行問津子猷愛竹者起臥與竹俱未知有何好不可一日無我亦淡少欲鴻毛視金珠眇觀霄壤間無一可與娛眷言此青士平生有葭莩可憐杜中舍羽林觀萬夫人生天宇間動作均有寄誰知林下人亦復有幽事短步舒微芳長吟抽逸思有夢煩青奴無絃須緑綺寒日忽滿窗香銷人未起慎勿喚客來昏昏敗人意次韻伯達大水見懷二絶雨漲平池緑似淮半扉春水眼慵開無錢得買扁舟去莫道舊來今不來相望千家信不通懸知春在雨聲中蹇驢欲去愁泥滑安得西飛六尺鴻次韻趙思誠沈彥述春日和答三千客裏賢公子八詠詩中瘦沈郎他日功名埀竹帛只今歌笑共杯觴鳥能娛客時相勸雨亦憐花不打香喚取春來同一醉天教間日為君長次韻次卿宴坐燒香二絶燕堂窗靜一簾埀鵲尾薰濃客未知稍憶風流王子晉月明間弄玉參差薄霧霏霏欲滿空爐煙不動寶薰濃莫將俗語譏時輩更學東京范蔚宗三月二十二日逰昭山前一日訥禪師死今日天色佳晴光與山秀道人邀我出共訪山中舊馬首轉巖阿佛屋露螭獸殘花趣春事白水決崖溜山行亂人影香火各奔輳禪師秋月空遺像孤鶴瘦平生三昧句髙壓島與晝風吹水成紋妙語本天就莫言鳩摩羅臨死出神呪與松林道人求竹栽人生殊臭味不異蕕與薰嵗晚期金蘭矯矯惟此君緬懷古招提修竹如雲屯道人淡無與所居竹為羣餘陰滿窗戶肯惜為我分他年蝸牛廬淨几橫清芬疏疏便可意靄靄亦足欣千畝不足侯萬夫寧是軍客問有何好仰屋不必言幽徑儻可開遲子日欵門次韻李姑溪過王次卿留終日昔日風流李泰和暮年流落竟如何追隨天驥元分路蹭蹬金鑾不上坡人物眼髙誰睥睨江山興在且婆娑幅巾倒載歸時莭想得扁舟漾月波次韻端叔題余所藏山谷茶詩尾翰林門生兩蒼璧似是天人人不識學得黃初五字詩不作人間萬錢食晚向江頭看藥欄花前一笑聊開顏自言千載司玉局尚記橋山分省宿今朝玉乳打團龍昨夜新詩刻紅燭我識風流李元禮人物流中有涇渭平生漫刺不浪持晚得龍門略相似詩成袖手初相羊便識從來錦作腸夢回却誦矞雲句倣佛官焙聞餘香從今下客牛馬走問字不妨時載酒次韻端叔疊前韻見貽因以為别夜光分得千金璧從來有限未省識一從韶濩到兩耳三月遂令忘肉食髙樓同倚百尺欄江山滿眼方怡顏先生官冷不坐局古寺分牀雨中宿清談亹亹不斷頭幾度寒窗拔殘燭晚嵗升堂來問禮誰遣黃流入清渭金華上天朝紫皇往事空勞公舉似明日山中歸牧羊九回日斷思公腸他年華屋儻遂約笑語尚聞蘭芷香青絲絡馬不須走一杯且飲姑溪酒次韻沈彥述官舍書事二絶幕中從事最能詩恐是當年杜牧之渠為秋娘方覔句莫將公事惱癡兒晚得休文一解顏識君曽是畫圖間陽春白雪何由和句有雌霓誦亦難擷野蔬示小兒荒村無雞豚何以供刀機山蔬雜百種此物含妙理幽居有勝事一笑隨稚子朝甑飯鳬茈暮鼎羮馬齒筍包出土肥蕨芽含露紫試採少陵苣更擷天隨杞舉杯香覆坐搖喉滑流匕悠然理塵策果腹萬事已君看金谷樓步障五十里韭虀及豆粥為具咄嗟耳回觀竒禍作一死政坐此寄聲肉食徒吾事勿輕鄙題趙侯畫滄江逺岫圖公子風流絶代無名髙當與大年俱自從剪得吳江水不愛滕王蛺蝶圖太倉稊米集卷四
