body:
  text: 太倉稊米集巻五十六宋周紫芝撰啟十六首謝王效正分臨偏郡何補事功寵貺華文遂光衰朽自笑陳人之陋遽䝉長者之稽稱實出于過情意甚慚于掠美敢遵仁誨勉効初心聊修骩骳之詞少答勤渠之賜答彭運幹望千里之門牆邈如世外拜五雲之書札恍若夢間偶霑試守之恩猶假過情之寵雖寮友之義甚篤顧小人之愧為多恭惟海内名家大流偉器少年得譽衆人號寧馨兒壯歲効官舉郡稱霹靂手恨兹淹泊未快騰驤視才器之不煩知富貴之未晩某介而寡與老且可憎遂專三日之城巳過一生之望形容盡變豈是昔人笑語相歡漫思前日厭塵埃之汩没想詞翰之風流跂望華軒來臨弊境雖無歌舞愧為郡最樂之言尚有湖山作故人相見之地抑又何哉回韓朝奉吳牛望月顧筋力以何堪越鳥歸巢唯鄉關之在念况恢台之善政方霑丐於吾邦未遑展桑梓之儀豈敢拜翰墨之賜事誠倒置心不自安恭惟才絶九流書窮七略藏庖丁之刃雖未究於設施出毛遂之錐固已知其超卓哦句兩松之下飛聲雙闕之間誦退之遣鱷之文精誠莫及聞安國議戎之䇿忠厚可觀當文黼黻之青黄尚屈簿書之朱墨借玉階方寸之地行望蓬山下金泥尺一之封即分郵傳某老之將至時不再來悼齒髮之巳衰顧筋骸之難强青鞋黄帽徒濫厠于冠裳白髮蒼顔豈足塵於表著望故山而何在問征夫而未能覿德尚遥望風增切答劉縣丞擕家去國懷綬得州老手蒼華笑江山之牢落高文絢爛寵車騎之雍容非所宜䝉豈不重愧恭惟天資沉厚妙學精深清德尤畏于人知亷操久為于民表朅從河朔轉寓江鄉聞遺愛之尚存近在屬邑恨相從之已晩猶際英標某吏道非長聲稱甚寂鈍拙頗慚于敏手循㳂難革于陋風尚貽慷慨之詞文此枯癯之質與聞聲欬已足慰于生平况遣兒曹獲稍親于函丈其為欣抃罔既敷宣賀秦太師脩景靈宫加封原廟繕新克廣奉先之孝嚴宸命誕聿彰輔世之勲渙汗既敷羣方交抃恭惟望隆三事位正六府挾風后力牧之才輔唐堯虞舜之化持危任重再造功髙决漢家之謀猷大者才過二三策永周家之厯數逺且至于千萬年宗廟既以益嚴祖考莫不來格遂昭輪奐用㓗齊明儼列聖之䆳容埀後昆之景福祀清廟而執籩豆爰修顯相之儀游渭北而出衣冠因講薦羞之制蓋天子以尊祖為孝而大臣以制禮為先韙兹社稷之功盡出廟堂之議宜大頒于綸綍用永賁于宗公逮魯國之宮尚陋奚斯之作開漢皇之次徒聞稷嗣之言允屬昌辰乃蕆熈事肇稱新邑之祀當在聖臣上憲太徵之宮亦稽故典某猥膺郡紱恪守邦圻奏告示䖍但馳神於􅀢錯落成交慶恨阻賛於陶鈞賀秦太師郊祀加封神丘肆祀格景貺於蒼穹宣室受釐被鴻休於上宰爰講明禋之報誕彰顯相之勲命冊攸頒多方胥慶竊以非聖人不議禮唯孝子能饗親顧兹展錯之儀屬在休明之旦周公得卜既脩元祀之文后稷配天用示尊先之義祖考為之来格福祿以致攸同藏熈事以告成霈湛恩而敷錫恭惟賛襄元后師保萬民自振古以來考百王之事惟兹一德悉盖前聞用能不挽天河盡洗甲兵之變未移桑䕃大興禮樂之文乃築圓壇以就陽位望拜竹宮而流光正集既通爟火而神馭宴娛宜錫羡封大光元輔某猥分郡紱阻拜鈞庭聆鬻鬻之清音甞仰瞻於霄漢望岩岩之維石徒激想於肺肝過此以還未知所措賀秦觀文郊祀加封服大裘而祀上帝推后稷以配天命作冊以告周公慶伯禽之拜後禮行以郊而百神受職賚封於廟而四海歸心凡有識知舉同抃蹈恭惟運逄千載道合一人以不世出之才遇大有為之主倐際風雲之㑹起於日月之光射䇿漢庭天子為之親擢讐書東觀太乙至於下觀薦被光靈進參法駕討論墳典掌宗伯之禮文潤色絲綸草北門之制詔久雍容於經幄旋秉握於樞衡雖勤謙德之光益示宸𠂻之眷保傅亞上公之重德爵兼達尊之隆况祗肅於蒼穹遂聿彰於景貺紫壇奉引既顯相於眀禋黄屋均釐宜祗承於休命某猥分江壘阻造鈞軒跂望車塵曽未遑於慶拜載瞻巖石竊有冀於鈞陶回南康徐中大介乎大國未脩交際之容蕞尔小邦唯資唇齒之助辱貽書之俯逮徒汚背以增羞恭惟人望崇髙天資静重一時麟鳯久為朝路之儀千里金湯猶藉藩方之寄恢餘波而霑丐粲尺牘之情文振起頽風光華暮境某儒酸未改吏術無聞雖假一麾徒有簡書之畏遙瞻五馬方従水石之㳺顧覿徳之未遙唯嚮風而尤切謝生日詩桑榆就景巳歎流光錦繡飛牋遽貽盛禮方劬勞之在念辱頌祝以祈年佩徳雖隆撫躬何禮平生朴拙常遭非意之嗔此日光華敢竊過情之寵徒增永愴莫喻感悰回莫解元乗銳而來將觀筆陣易地以戰遂擅文塲念老将嘗辱於敗軍而鏖戰與聞於奏凱華緘聿至慶忭增深恭惟天授偉才家傳妙學胷中書傳富有五車筆下波瀾倒流三峽爰被外臺之薦亟登天府之書解數千牛刃已㳺於餘地飛九萬里背將負於青天某仰徳方勤聞風竊喜江邊並席雖未奉於笑言玉陛臚傳行再馳於竿牘回光州曾郎中江國養疴夢懐鄉井髙軒假道遂見故人念竹坡當日之㳺慨霜鬢六年之别方闗山之在眼驚翰墨之来臨恭惟文采傳家風流絶俗詩騰淮楚舊歌沔鄂之章名在冕旒髙壓藉湜之軰宜就班於文石猶擁斾於邊方豈非歛三州豈弟之餘聊以慰一方撫摩之望想當飾吏必有異聞某一落江干兩更嵗事身隨乗鴈時照影於滄波心戀雲山巳卜居於廬阜不期楚尾復對荆州一札詔書行拜賜環之寵五日京兆尚堪陪燭之歡與盧漕命郡太守而共理本以為民遣部使者而觀風雅宜従俗聞擁光華之節來頒寛大之書馳傳所臨黎民胥慶恭惟躬豈弟慈祥之徳擅風流藴藉之稱究其平易以近民盖由儒雅而飾吏石渠流水雖久去於圖書西掖髙梧宜入陪於鵷鷺方示九重之寵眷尚勤千里之轉輸某猥屬列城與聞使㫖將歸故里迫京兆五日之期粗免常刑皆蘇章二天之庇行遂周旋之奉獲聞謦欬之音但遐想於車塵冀既瞻於馬首履兹寒沍願慎保綏賀秦太師日從青道當蒼精出應之初計上甘泉乃萬國朝元之旦羣公薦璧天子受圖凡在溥臨共躋亨運恭惟名髙有相位冠三公利厚澤于生民合忠言于眀主講成周之五禮著在典章諧虞氏之八音格於鳥獸定大䇿於廟堂之上斡化權於掌握之中道與時而偕行夀因仁而益永三元謹始百順是宜某假守江壖遽辭台鼎遂阻稱於夀爵徒引望於鈞庭進書賀秦太師詒孫謀以燕翼子既纂成書渙大號以揚眀庭爰頒寵綍布在文武之方冊叅諸堯舜之典謨夷夏交孚神人共喜恭惟周邦元老商後聖臣羽翼六經襲孔子刪詩定書之志陶成萬化當周公制禮作樂之朝偃兵革於邊方混車書於區夏寳隣脩好上帝降康適國家閒暇之時乃文物脩明之旦聖謨具在宜増唐帝之煥章武烈既昭當矢周宣之文德載之巨牘寔頼宗工聿追河洛之圖書偹述帝王之儀憲奎躔騰曜粲若雲漢之昭回金匱寳儲永作邦君之軌範繄此聖人之作允為論次之功宜極褒嘉以旌殊烈凡在陶鈞之内敢忘抃蹈之情某久沐恩波尚塵廪粟琅函蘂笈頼鍾山秘典之藏羽盖霓旌想漢殿皇儀之盛莫遑展慶徒切望風賀秦太師待制作首元武偃文脩功歸社稷隂施陽報慶在子孫决巍科者世宜有其人居元輔者兹因為之漸事光千載榮動一時常觀自昔富貴之家未有不閑典麗之習况肯心游於藝苑疇能身致於雲衢操管濡毫俯同寒士埀紳正笏驟即禁塗既魁四方俊傑之人遂拜六閣深嚴之選華胄增相門之重異恩加主眷之隆盛德所鍾榮光自逺冕旒三接方體貌於大臣衮繡一詩將流傳於奕葉㳟惟坐而論道忠以事君創從書契以來未見勲庸之比雖有傾河之辨博莫可形容譬若太虚之清明誰能繪畫要其用意唯在好生積二十年不殺之仁享三千歲無窮之夀餘波所溢後裔宜䝉發策决科如探囊而取舊物傳圭襲組必繼踵而位台衡功盖古今報同符契非私情之敢侫信輿議之咸歸某夐隔修途阻趍大府徒與江湖之士共作美談難陪冠劒之流躬陳賀禮賀秦樞密布綸綍以宣猷亟頒周誥總樞機而正位遂本漢兵凡庇宏庥舉同欣抃竊甞逺稽舊牒歴數前朝以宰輔而傳家固宜有此至父子而並用實所罕聞維師臣建不㧞之功故聖世舉非常之典門開二府位次三公雖隔坐以賜屏始拜一家之慶至處中而當軸行流八葉之芳廟社增榮衣冠歆艶恭惟恢宏聖道師表士林以鼓吹六經之文領條奏七畧之任文臻高妙極詞臣典誥之華識洞䆳深為聖主緝熈之助方其雍容帷幄之際已有賛襄廊廟之資豈獨結於主知盖實因於人望果由秘殿進長樞庭職善國人比周司徒為何足美世傳經術在漢丞相則不同朝方以昔賢兹為盛事觀懇辭之甚力審隆眷之難回所以保國歴年之期豈但慶公私門之福某濡恩甚久為喜實深聊陳賛説之詞以寄報酬之意太倉稊米集巻五十六
