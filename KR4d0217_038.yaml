body:
  text: 太倉稊米集巻三十八宋周紫芝撰詩三十八首寄章復州春來未得復州書流落他鄉我獨居今日離羣天際雁昔年同隊水中魚遙知賣劒方成俗想得追鋒便賜車擬約琵琶亭下月伴君一醉復何如南窓植竹數百竿後數日蔚然俱青客問種竹法作四言以告之平生寡友形影相弔與君結交相視一笑四方萬里動静險夷我惟子求子必我随聿來湓江屋廬既正相子攸居我室乃定得子之宫於窓之南風莖雨葉蔚其鬖鬖人言死貓可引活竹貓死地虛根行竹緑又言無法移必行迷仍標其根以識東西區區百設何乃多事事在眉睫初無妙理穴地成坎碎土加篩沃以斗水和之成泥置竹其中實之以土土燥潤乆可月不雨逮其雨來竹既巳成熱不受暑寒不變青嗟哉此君以節自負如遇君子理宜調䕶君欲何法無法可傳併以告子俾知竹賢九江初識水仙七十詩翁鬢巳華平生未識水仙花如今始信黄香錯剛道山礬是一家天香不染麝煤烟家近龍宫寳藏邉世上鉛華無一㸃分明真是水中仙新作布裘二絶青裘短袂瘦軀長拄杖横擔古錦嚢變盡形容人不識家僮應怪賀知章少日無心佩紫嚢一生裘葛是衣裳但知野服尋山便不學唐裝又晉裝近時士大夫衣冠制度徃徃有效二代者謂之唐裝晉裝吳傳朋郎中自出新意作㳺絲書妙絶一時士大夫皆賦詩為作數語書軸尾公孫舞渾脱長史妙心畫老兵塗箒堊中郎出飛帛得法自所見豈用規疇昔隨人作書奴終與古人隔游絲最無事何止但百尺游絲二字前人語中無及此者惟歐陽公有游絲最無事百尺拖清光之句飛來若有態吹去忽無跡使君㸔青天意外得新格映空疑有無著紙互絡繹神機殆天授至技非人積遂令一絲輕可掛千金石聊將畫沙錐幻出䖝網壁我雖不解書好書乃成癖公如儻有意能事不敢迫傳朋為作游絲小軸報以長句竟陵老守尚書郎平生墨妙窺鍾王㑹令夜鬼助奇崛更與游絲争短長游絲忽從天際落洗眼熟視無毫芒癡兒著意吹不起春風無力難飛揚草雖號聖亦可到此品入神誰復强使君憐我頗知好五十六珠投夜光溪藤搗紙滑勝玉古錦縫嚢牢祕藏要遣張顛與醉素不敢與公分雁行讀司馬長卿傳揚雄新著草元書却笑相如賦子虛借使曲終方奏雅比君符命復何如病起節物可驚效栁子厚病起忽數日杖䇿周吾廬桃花手新栽小紅今欲舒萱草未出土苗葉將扶疎物變乃如此光景難踟蹰退自觀我生今形復何如夢前黒埀髫夢後霜入鬚安得萬丈繩縳此窓間駒先生可笑人為生本田䱷晚汙琳館粟俾代南山鋤皇恩浩如海臣報終難虛老力雖不足閒日幸有餘願炷金鼎鑪日誦琅函書跪祝望天門聖夀如居諸紙帳二首雪帳垂空萬事休醉來髙枕竹猫頭不知金谷園中障輸與儂家幾百籌荆王翠羽衾中夢太尉銷金帳裏歌若以道人銀色界雖無歡笑亦無魔秦觀文生日詩三十韻寳祚開蒼籙炎精表赤符乾坤歸聖統廊廟得真儒事借帷籌定顛從漏刻扶兵銷九節度儀肅五單于意與神明㑹功知傳記無公師隆化道嗣相恊神謨世業垂餘慶天心究永圖貂冠親日月玉座接都俞自可均調鼎猶謙謝秉樞槐庭何日見繡衮幾時紆大府連甍棟翔鸞踵步趨侏􅍣將入賀象寄盡交孚光耀三台宿喧騰百雉都傳呼鳯尾諾導從火城驅隔坐恩由占同朝禮固殊位雖仍亞保望乆在中區藝籍明經殿文星照石渠諸生咨典故列辟奉規摹徃歲方平難斯民遍澤枯大臣俱宿德四海盡夷塗効巳知無敵天應信不誣他年各安堵此日記垂弧雲篆祈千載霞漿賜百壺中人傳詔旨東閣擁金朱舊物歸龍榜歡聲徹海隅一門天為喜萬里物皆蘇寒士勤推轂和春入朽株恩嘗䝉草木才不補唐虞只有祈年頌持為報德珠苐慚床下拜雲嶠隔江湖題陳大卿三徑堂一身和影共婆娑㸔盡人間兩鬢皤要好只銷長閉戸便開三徑巳為多曉晴曈曨曉色上簾旌吹盡江頭滴雨聲百歲一生常苦惱三春幾日好晴明從他落絮隨人去但趂青山放脚行尚有詩腸新鼓吹滿攜樽酒聽黄鶯楊得臣見和曉晴長句用韻奉酬西風獵獵轉紅旌吹盡春霖㸃滴聲曉送楚雲歸隴去夜㸔淮燒隔江明舞狂恨我無長袖句好從君得短行擬為新晴歌一曲誰將此調付鶯鶯再酬得臣詩翁老去得雙旌慣聽清漣夜雨聲清漣堂名水到潯陽心獨喜雲開廬阜眼先明落花已是春三月飛蓋猶堪酒數行寄語草元窓下客忍令辜負曉啼鶯再酬得臣歸心何事等搖旌叔起能詩近有聲豈料從遊如夢寐不知風雨過清明拍浮我自堪娯老矍鑠誰應更請行此去定交君見許為歌伐木賦鳴鶯再酬得臣上最初無善可旌歸來和雨聽江聲自憐老眼昏花甚乞得晴窓夕照明蓮葉繫舟驚水滿魚須拄頬㸔雲行君能著屐時相過猶有殘春一雨鶯再酬得臣何處籠街引斾旌老翁髙臥聽雞聲㸔花强起尋韋曲謁帝空思入大明有興時彈流水調無情懶賦麗人行青春别我誰為伴只有能歌緑樹鶯再酬得臣隨縁南北似風旌飽聽波濤處處聲今日園花風裏盡到時江月雪中明雖無格磔鈎輈語尚有媻姗勃窣行九江春晚尚有遊人誰餞東君沸歌管琵琶絃上囀春鶯奉酬晁强伯見和曉晴長句元祐文華掲綵旌金沙别乗有家聲天教雲彩歸何處詩共晴光欲鬬明巳閣山前山後雨尚堪水北水南行不應文石班中客肯伴韋郎賦曉鶯韋蘇州樂府有聽鶯曲奉酬晁元采三和前韻見賢殊未駐干旌叩戸先聞剥啄聲春去鳥啼千樹暗雨餘花落一窓明新詩巳得前人法病足惟追逸驥行何日長安君得意著鞭門聽上林鶯曺度堅待制罷帥成都歸江南以川中唐人六十家詩見遺作長句為謝三月瞿塘峻江水萬里歸來蜀都帥盡収五十四州書畫舸連檣當歌吹有唐文士幾千人文不逮漢詩則異開元天寶光熖長長慶元和殿唐季化入寳奩脂澤中亦有風滿有能事六十餘家三百年天遣遺風未全墜青衫昔日同舍郎老傍人間百無意將焚筆硯技輒癢未說風騷心復醉公堂許我能篇章遺以斯文慰憔悴徒令後學羞捧心誰與前賢共聨轡為公隠几抱殘編聊伴青奴問朝霽雨中讀韓致光詩偶池上鹿葱盛開因效其體曲欄干外水平階池上朱扉繞翠苔燕子飛來人不到鹿葱花在雨中開題小扇小扇題詩墨色新碧紗囊剪藕絲勻月團常在纎纎手不用流蘇拂暗塵池蓮初著數花數枝臨水見纎娥新採紅藍染襪羅傳語薫風莫吹去且容留眼㸔㣲波富水軍治有巨澤徃歲荷花滿湖郡守歲取荷葉可貿百千一日曝之湖濱大風吹巻飛數十里頃刻俱盡又採葉者頗以為苦瀝膏油以毒之逮僕至閱兩歲無一花今年結茅於此穴小池植數十根而花巳可觀因感前事遂書之湖邉老守湖是家湖光十里䝉寒沙我來不見花如錦但聞荷葉飛天涯小池今無十許步晚雨亦開三數花人生樂事無多少可意應湏隨分了題吕伸友寓安堂事非昨夢本來空正在黄粱一熟中到處隨縁是安樂人生何地有窮通飛衣不對東風舞霜葉空憐醉面紅只恐他年終未免傳家重說小申公剪松毛小栅以詩落成東堂坐甑遭炊蒸西簷烈日方騰騰炎官張傘火漸熾烏豕渡河雲不興五官大夫有遺種十八公自分雲仍羲和揮戈不可却郢匠剪毛歸作棚南風䬃瑟出餘韻怒龍奮迅蒼髯昇香來鼻觀過一雨便恐氷麝終難勝天公割此一席地付與老翁來曲肱何時快著短齒屐信手自把南山藤臥聽松風滿山雨去作水邉巖下僧五月二十四日晚雨忽晴浴罷獨臥池亭雲峯竒峭既夕方散長虹截天雨初斷孤日翻光上銀漢忽從海底出三山就中蓬萊正竒觀黄金塗闕射日光白玉飛欄入天半青童舞女各媻姗手執雲幢影淩亂想得神清洞府君應榜春皇侍香案群飛白鶴徒爾為化作蒼狗何勞㸔神仙出沒不久長碧落天宫豈容玩荆王曉夢只須臾神女乗鸞逐雲散人間幻化無不爾空復欷歔一長嘆老人假寐忽舉頭但見明星光有爛五月憫雨頗聞饑民弄兵於嚴衢兩州間三十韻長天望油雲槁黍待甘霔一雨有豐凶死生分旦暮頗聞兩州民巖谷多嘯聚有司幸眼前白對急追捕斯民如嬰兒慈母仰調䕶豈容使之饑而反貽以怒救饑當未然為食須早具不雨三月餘開口乆待哺岳牧事遨游傲聣曽莫顧遂令出偏師徃徃勤逺慮人亦甚畏死階亂豈無故漢有大司農為國最知務誰知部使者出納反堅固輸金買朝糧僅得鳥一嗉尚爾吝弗予民隠獨何愬幾何不為盜悔過苦無路富兒家多金封財亦良裕積金謀子錢切骨被疽蠧閉糶不肯售叩門如蟻附貧氣生一時萬死有不懼政坐守宰癡申令苦不素有時出萬斛官為復常賦大或旌義閭小或賜朝酺民情非木石豈不遵勸諭歲事小不登彛倫坐成斁無良二千石萬事成繆誤况乃六月師金甲困暴露天道有報施人情均好惡㑹當明誅賞典刑正王度庶幾令逺氓因此出沈痼祁居之見過僕出未歸明日作二詩為謝家近平湖草樹青幾年於此寄髙情有時亦為衰翁出誰道龎公不入城不見前賢畏後生一聞君語為心傾何時却約髙軒過重聽門人說老成祁寛字居之和靖門人雨後極涼簡竹坡四君子江城夏六月大旱草木黄稽首文殊師駕言天池陽為乞一斗水普救千里傷微雲生寶髻法雨遍大荒霈為一尺霖化作三日涼老人不耐暑内熱煎中腸吹以碧落風灌以丹露漿我有方丈室彩牓名妙香呼我四君子聊與之徜徉朝憑共烏几夜宿同方床永結無情歡此樂殊未央榮瘁不改觀死生知有常豈不賢俗子與世隨低昂翻手覆手間此道寜乆長願我四玉友永言不相忘七夕并序七月七日與客語七夕事因記葛稚川神仙傳載王方平㑹麻姑真仙於蔡經家事甚怪以謂自古詩人辭客必因風露凄清之夕而叙牛女相見之期凡援筆而賦七夕者皆托兒女之情以肆淫媟之言凟衊天星無補真教使人間異事冺黙無聞良可痛惜因律稚川之文而為之歌以廣其傳云七夕相逢說牛女晉魏以來傳樂府金冠玉帔照靈河不見此身聞此語何如當日兩神仙空中一别五千年五龍駕車各異色萬里乗雲來九天麻姑女子十八九青絲作髻爪為手擗麟薦酒進行厨撒米成沙只一時為言東海將揚塵蓬萊水淺闕蔡經得道心尚凡背痒自速方平鞭上界真仙足官府牛女之說真茫然綵樓對月誰家倩更就天孫乞針線何不苦學麻姑仙養取紅顔如玉爛僕所居蓋濓溪先生之故基也有井清甘而寒為之銘今未暇也山下清泉古甃寒百年誰為發幽潜可憐昔日供茶鼎曽與先生當谷簾夢行西湖梅花下乆把西湖作故鄉至今清夢到湖傍分明昨夜經行處一色梅花十里香春雲収盡忽斜陽夢裡梅花帶雨香却上小舟誰是伴囘頭只有櫂船郎太倉稊米集巻三十八
