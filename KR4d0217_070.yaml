body:
  text: 太倉稊米集卷七十宋周紫芝撰墓志六首錢隨州墓志銘代人作故吳越武肅王之五世孫錢公名燮字弼世為杭州錢塘人贈天下兵馬司大元帥吳越王倧是為公之曽大父翰林學士知制誥贈太尉易是為公之大父起居舍人直集賢院知諫院同判司農寺贈太尉彥逺是為公之皇考公生九嵗而孤薿薿自立羣兒數呼與嬉不往夜聞諸父讀書常立其旁竊聽巳而輒成誦吳國太夫人濟陽丁氏故相晉公之孫女賢而有文聞諸父之言心異之稍自授以書後從伯氏翰林公學日益刻苦性喜文弄筆即成易若翻水見者不以為兒曹語也既壯不肯自售其術皇祐二年用伯父修懿公恩授將仕郎守將作監主簿會明堂及治平登極恩兩遷大理評事初監杭州龍山酒稅時方二十餘嵗智略沉敏老於吏事部使者聞其能數以冗劇兼之至朱墨滿案而公處之甚暇錢塘官吏以百數無能出公右者雖一時健吏皆自以為不及翰林學士沈公文通於人物少所推下一見待以國士謂其兄翰林公曰君弟少年豪氣固未除他日要是偉器自是諸公皆爭薦之惟恐後久之遇熙寧登極恩遷光祿寺丞用舉者監咸平倉草場三司使薛向奏辟監在京布庫用開府尹孫采奏辟同管勾檢庫復辟開封户曹參軍復用權知開封府陳繹奏充軍巡院考績三遷至國子博士以論獄不合降監吉州萬安倉到官丁吳國憂服除會朝廷改官制換授承議郎監沂州鹽酒稅復知鄭州滎陽縣轉朝散郎通判鼎州旋改通判臨江軍遷朝奉大夫知隨州未之官寓家揚州感疾於陳留縣之僧舍而終公天資寬厚臨政不務苛刻每論獄決囚必詳審數四得情則終日慘然為之不樂故其所至未嘗不以長者稱任右軍巡日故相陳公之子世儒其妻李氏謀殺其姑而事頗曖昧繫獄者甚衆府尹知公之能乃下其事公推鞫得實獄成且上言者謂公於世儒失在故出凡兩移迄論初上以斷所使江夏英不實坐責人或寃之公曰吾不欲以酷取名也滎陽當孔道地瘠民貧多訟宰邑者率以罪去公至撫以恩信秋毫不擾久而民輒相戒有犯宰君教者衆必殛之不逾年民富訟息草生狴犴滎陽父老相與畫公像而祠之鼎州近臨蠻獠凡三易郡守皆武人公不以貴胄髙之事之益謹相得甚歡郡倚以安焉公當官清謹處事不茍雖號能吏至於出處大節則雍容可觀大抵不急於進每調官京師率以三月為期過是乃去僦舍委巷足迹不至吏省往往人不及知而公巳行矣公娶陳氏故相堯佐之孫兵部郎中道古之女先公十五年而亡於是合祔焉生二子將仕郎汝士隆德府黎城縣尉邠老儒林郎懷州武陟縣丞女六人長嫁進士馬與次早亡次歸瀛州防禦推官監開封府陳留縣酒稅朱從悌次歸假將仕郎姚衍次歸進士鄒希燮未嫁者二人公享年五十有四實以紹聖五年五月八日捐館陳留既以其年六月七日葬於開封府汴陽鄉之原矣至政和之壬辰秋八月公之猶子魯望始狀公之行求余為之銘初公倅鼎余時為桃源令是時州縣之政皆倚公以辦郡中號為無事公日率其僚相與燕飲已而賦詩殆無虛日余與公遊從之久且為姻家知公為最詳非余誰其銘之銘曰武肅之枝其葉有奕組襲圭傳世有令德矯矯翔鸞以奮以翼謂當大施以播竒績用不盡才口語籍籍隱以自晦勤以自飭寧屈不伸肯枉吾尺凜然髙風懦夫可激窮豈在人達豈計力繄此令名不繫通塞言無撓詞面有剛色誰其似之古之遺直不有君子其何能國如何昊天榮不配植不究公年俾屯其澤用作銘詩以相窀穸成忠郎馮君墓志銘為貴州太守計體之作成忠郎馮君長卿名元輔南唐時其七世祖自建康來涇遂為涇人家故饒財世世皆以髙資長雄里中曰某者君之曽大父也君父字擇之自號涇山逸老涇山有智善謀凡邑人有訟者或不決於官而決於君事有疑衆方含糊不斷君一言乃定人稱其長者涇山既生長卿期以似已果然方六七嵗時便讀書他兒未上口君已如流長又留意於隂陽地理卜筮醫方之術皆摩研其書甚精至有所會意其妙不傳也一與人接問其姓名爵里後數十年遇之卒然猶能省憶其強記多聞出於天資要非他人所及諫議大夫鍾公君實君同里人也少年自太學諸生上書干裕陵由布衣登侍從氣蓋一時嘗語人曰使長卿為舉子功名可唾手取也後公貴既在朝猶時時以言風之似若有意於推轂者而君不屑豫也人或以是勸之君笑曰仕本為貧吾豈急於此者斂板折腰固所不暇當丐餘年於水石間耳言者遂止君自涇山捐館舍日益勤儉久之植産數倍於祖父時絫資至巨萬已而告其子曰古人有言觀雷觀火為盈為滅天收其聲地藏其熱吾畜資甚厚不祥及生獨不可為吾法乎乃大輸粟塞下願助邊費朝廷嘉其意拜為郎授三班奉職官制行改承信郎淵聖皇帝受內禪以覃恩轉保義郎主上踐祚又以覃恩轉成忠郎宣和間盜起桐廬所向郡邑皆下既破黟歙宣甚危部使者知君素信將奏辟為巡尉倚以捍賊檄屢下君不就曰事有緩急當同其憂何必誘我以官賊犯旌德去君家相望數里火晝夜不絶飛煙蔽日有羣不逞鳩惡少數百著五彩衣以朱巾帕首將從賊君生擒其渠魁面縛送部使者斬之冦聞不入境涇賴以全賊平賞亦不及未嘗以語人先是江淮間民亦合黨夜聚為妖謂之四果其所事神曰張公君曰是所謂張角者旁近多往從之君援古以告時以禍福悟而止者不可勝計其後桐廬賊自號聖公民皆神之其所附皆異時事張公神者歎曰吾固知其不為賊也君好義尚氣節不妄然諾而性不忤物士大夫造門求君為卜地者不擇逺近皆往人有病而無以治者雖氓𨽻必手加砭劑無難色享年七十有三建炎三年三月二十有三日終君再娶陳氏皆先君而亡繼室張氏子三人長曰某從政郎婺州浦江縣尉次曰某鄉貢進士次曰師文上書補將仕郎未調女四人皆嫁士人君初得墓地於彭公山乃穴地為壙繚以周牆向背皆出君意戒其子我死則葬於斯焉乃以其年六月二十五日葬於彭公山之原而墓之木拱矣建炎初某自京師遊宣客有言君之善者惜其死不獲識其面後某將為貴州守會其子師丈遣人以狀來乞銘某曰諾狀如所聞是宜其銘銘曰士有不才不計其位才有不進不疚其異猗與馮侯可以仕矣而弗仕者意不在是人挽以出吾笑而止彼言如雲吾心如水維時披攘羣夫射利纍纍若若不及駔儈絶壑昂霄軒軒滿世辟書鼎來吾曰曷似豈不頳然有靦諸子視彼貪人何千萬里彭公之下其水瀰瀰名與澤偕亦何其已婆娑故邱君子樂只左朝散郎章公墓志銘朝散郎章公諱某字彥明宣州寧國人公天資靜重剛介有守束髮已如成人及長補太學生以文行稱諸生之老於文者皆憚之其後就舉開封有司第其文常在第一文出無不滿其意者明年春登進士第先是開封首薦者率六嵗一登科謂之雌雄榜其來甚久公始以雌榜得之識者咸謂公以文取勝耳寧有數哉授宿州士曹事當路者知公才爭薦之朝三嵗而章遂溢改京秩用辟書知宿州虹縣事宣和三年召至京師辟雍直學公才甚髙學且博自其少時名已在士大夫間至是皆以期月期公為貴人公恬於進取不善諂笑非其人不欵其門以故他客往往皆驟貴而公之官猶未徙也舍法罷差永靖軍司録後改青社未行丁父憂授滁州司録嵗餘焉罷於朝主管杭州洞霄宫建炎三年冬丁母憂服再除而公益無意於進矣鄉人勉其行差通判潭州踰年以疾終壽六十有一以紹興二年七月初四日葬於寧國柯氏之原公之學問行已大率皆務事實恥為空言於書無所不窺尤精於禮學喜古文尤慕西漢左氏二書常撰韓文音義引物連類多所是正有補於世人有短長未嘗挂口平居視之吃然若不能言者至於事有大疑衆方含糊公一言輒判若白黑之在前也潭州素號督府時湖外盜賊旁午郡益多事公條處甚裕民賴以安郡將席公知公之賢至以師友稱之性不喜表襮常畏人之知已其所歷往往皆有隂德在人而人不知是以其事不傳公事親甚孝居喪盡禮及至葬雖草木瓦石纎悉皆以身親之觀者以為難初其弟御史公為蘄春簿會賊大至郡不守御史迎母夫人竄山谷中公自鄉里來訪其家至龍舒聞蘄春失守方大憂怖莫知所從有異僧指而示其處曰訪於某地當得之已而果然母子相見遂復如初逮建炎三年母夫人捐館舍方敵騎大入江以南皆擾人情一切茍簡而公之後葬益盡禮與前葬不少異於是人益難之喜作詩不務譏刺清淡古雅有韋應物孟浩然之風而議者以公之安分寡欲不慕聲利蓋自其先世所傳公之曽大父曰某大父曰某凡二世皆髙蹈巖穴不願就祿至公之父曰某始舉進士一不中第即謝去杜門終身學治氣養心之術嘗手編千金外臺數百卷傳於時曰吾窮不能濟世以此書活人亦足矣公娶吳氏纍封安人先公卒生三子二女好仁好義好禮好仁以致仕恩補將仕郎為安豐軍司法三子皆善士有家法公於兄弟尤極友愛能以其學傳其家其弟某繼以登科今為監察御史狀公行事使為之銘僕於公為同郡而年又長嘗以詩受知於公不可以非所託而辭銘曰榮利卒卒衆所趣萬軌軋軋同一塗公行甚力志甚殊羞秣吾馬膏吾車有祿弗腆身實臞崢嶸不如公腹書爵未配德聲則餘世間萬法皆乘除久不可取誰敢都安公故邱其勿吁朝議大夫章公墓銘紹興十有九年夏四月庚午尚書刑部貟外郎章公過余家與之坐而言意甚忽忽若有不恱者已而泣謂余曰先夫人以宣和辛丑不幸捐館是嵗九月葬於鳯林鄉薑氏之山壽六十有二後九年而先大夫以疾終於寢嵗庚戌十有二月葬於茆市惠因院之東享年六十有七噫嘻悲夫古者孝子之葬其親必有文以志其墓粵自嵗辛丑迄於今已已蓋二十有九年矣而先考妣之碑猶未刻諸幽唯人子之戾是懼其將何辭以免焉子盍為我志之後數日乃以狀屬於余公諱元任字莘民其先占籍武寧五季之亂有徙於建安之浦城者事閩王髙州刺史檢校大傳用其夫人練氏之言釋將校王建封之死後將江南李氏兵屠建安以夫人言一城盡活語在章氏家傳中有自武寧而徙宣之符裏者公之七世祖也曽祖某祖某皆隱於家父某贈太中大夫母孟氏贈太碩人皆以公貴也公登紹聖元年進士第調蘄州黃梅縣主簿秩滿丁太中公憂服闋授江寧府户曹參軍改通仕郎移饒州鄱陽縣丞用舉者改宣德郎知洪州新建縣事未赴丁母憂服除知和州歷陽縣事政和八年夏六月江淮大水至於冬十月民無所得食越明年嵗已亥天且大旱民益飢流冗相繼殍而死者枕藉於塗公丐糴於官勸大姓盡出其所藏粟視官直以糶躬以粥糜食其老弱茇草舍於邑之四隅以就民便居焉而悉賴以活有司奏兩淮飢民二十五萬而歷陽所活居其多朝廷遣御史周武仲察訪淮南以公治狀聞差充淮南西路察訪司主管文字轉承議郎充江寧府司刑曹事轉朝奉郎淵聖即位以覃恩轉朝散郎今上即位以覃恩轉朝奉大夫是時公年已六十謂其家曰余從祿三十有七年事無不盡其心者今老矣復何為哉乃乞奉祠以歸從之主管江州太平觀建炎三年以疾告時西北始用兵士大夫之沒於兵者甚衆人人不自安以得請之嵗十月二日感疾與家人相訣而逝又克葬以禮焉可以無恨矣公性端亮倜儻而臨事不茍事無巨細靡不經意故所至皆以能稱居家孝友出於天性愛養其弟恩義甚篤太中公資産甚厚悉推以豫之圭撮不留公才雖過人而官止州縣未嘗有不足之嘆政少間輒飲酒賦詩以自娛裒其平生所作二十卷藏於家夫人楊氏世家宣城纍封宜人少歸章氏以柔順莊肅能循法度聞於一鄉嘗曰吾職在蘋藻何得與外事唯日誦金剛經未嘗一日捨去度其平生所誦殆不可以萬億計嗚呼其可謂賢也已生一子曰某今為尚書刑部貟外郎女二人長適江寧李晞次適鄱陽熊彥悰孫六人曰綺以公致仕恩補將仕郎曰綱曰純曰綰曰紘皆習世業而未冠餘一人生逾月而未名銘曰章氏之先世居武寧五季雲擾實徙浦城孰起其家大振厥聲太傅之德夫人之英偉哉建封荷戈與兵駢頸受戮疇不震驚老婦一言活萬黎煢天報之德世享其名埀三百年賢德並生誰派斯流聿來符裏公昌其名繼取名第大發廩倉亦蘇萬死七閩兩淮異世同軌施何恢恢澤必瀰瀰宜髙公門以受厥祉天屯其膏報嗇其侈唯變不常不變唯理勿逮其躬逮厥孫子桐汭太守方君墓志銘左朝請郎方君諱懋德字元相宣州南陵官田人宣之屬邑六南陵最大且多士以科第進立朝有名節者一時數公君視諸公為前輩方六七嵗知所慕恱既壯益自苦喜屬文使試於有司數以文藝先諸生於是聲聞一郡咸髙其能政和五年貢於禮部宣和三年賜上舍出身任迪功郎調鄂州刑曹掾兼工曹未行遭父喪已而又遭母喪服除再調湖州武康尉武康之乞人丐於沈氏遺之不滿其意堅臥不去後數日而死沈氏之仇告其殺人獄乃疑吏甚恐尉至即得其實一邑皆驚上官聞尉能交口爭薦任滿用吏部關升法遷左從政郎改授常州晉陵丞晉陵多大族率以勢力頥指州縣州縣吏皆唯阿受制不敢爭有官至正郎者號為多田嵗大熟一粟不輸後里胥以訟至邑庭事連其家乃嗾其冒占黥徒使為證君械諸黥移文詰之遂大慙服時諸大將持重兵以撫方部幕府吏多不逞有錢氏子兄弟持錢數百萬以糴軍儲為名甚至強斂農民不恤有無又使其家僮縱掠於市旁午道路人不自安君捕其尤悍者而鞭之援至閉關不納衆皆縮栗服公之強錢氏子亦自是稍稍引去任滿改左宣教郎知臨安府錢塘縣逾年知府事俞公俟薦職事修舉轉左奉議郎錢塘仁和皆臨安附邑朝廷嵗遣御史按閲箠杖有不如律者罪之會兩邑以杖製不度聞有旨邑吏率降官一等君力請於府以謂雖杖以燥濕而有輕重令實不職丞簿尉其何罪之有焉願以身當是責朝從其請獨與仁和令王鞏坐之而蔡純誠趙彥端陳從易范無闕謝沇劉贄皆賴君以免其後臨安以繕修皇城使出磚五十萬君持不可府尹大怒君立於庭三日不去請益力尹知其不可而罷仁和亦賴君以免嗚呼其可謂仁人之言也夫未幾用皇太后還宫赦復左奉議郎差監尚書六部門用知錢塘縣修埀拱殿及射殿賞轉朝奉郎以減年實歷轉左朝散郎會有言者罷去嵗餘主管台州崇道觀磨勘轉左朝請郎祠宫滿差守桐汭未赴以紹興十九年十月九日捐棄諸孤壽六十有五君家三世皆居官田有諱瑫者是為君之曽大父瑫生元緒是為大父元緒生炳是為父炳以君故一再封宣教郎母范氏贈至安人君性樂易辭色粹溫與之接怡恱可親客至必飲以酒酒杯流行輒緩歌數解間出語調坐客翩然起舞而君喜益見顔間人意君為可易及涖事中剛有守不可回奪尤敢與有力者抗無所畏忌人以此喜之亦以此怒之君娶王氏贈安人子四人長曰廷瑞次曰廷頴二人幼未名女四人長適丈經次適凌清臣次適王寵皆士人一幼未嫁王氏甚賢有婦德初君未第時家稍貧君舉於大學九寒暑衣裘之奉皆安人手紡績以給之無倦色先君十有二年而卒葬於涇縣仁義鄉雙泉之原以紹興二十有一年十月十有九日乙酉合葬於安人之墓君中嵗從祿為吏甚健而心在邱壑晚嵗得東溪一曲築屋其上賦詩往來其間自號雲溪野老議者以君進弗克究其所施退又弗克享是頗為君恨銘曰威而寒鋤暴姦直而端抗上官君樂易衆恱安外健武中粹溫仁有勇理必然激懦夫詔百年百拙翁墓志銘余友鄭君知柔字仁父百拙翁其自號也後余一年而生常呼余為兄余始生之年嵗在壬戌而仁父自言生於癸亥仁父家素貧遷徙無定居其後徙家委巷即數椽為廳設星祠壁間標其上曰某生行年嵗在庚申余見之驚曰君乃先我而生我當以君為兄而君顧兄我何為見紿仁父笑曰僕不肖幸辱與君遊平生自謂才出君下詎敢以一日之齒而先於子乎儻以告焉君必拒我故久不言爾余再拜謝曰固知公長者然亦何至以我為賢後十年仁父下世其子惟肖書來告我余先君窀穸亦既有日願為之銘僕曰士為知已者死况於銘乎其何以辭乃敘而銘之君世為宣城人曽大父曰某大父曰某父曰某僕為兒時猶及識君之父杜門不妄交遊往來里巷間步趨可數門舍欹傾掖以巨木雖風雨可虞未嘗以此屈於人應進士舉終不第議者以報在其子君不變父守益折節自若尤工於貧通毛氏詩善屬文亦終不第鄉人惜之如惜其父也君為人專尚信義少時與余詣大府期以黎明俱至方五鼓紞如余入賔廡聞有人聲曰此必吾仁父也視之果然問其謁則在介紹久矣後有期蓋未嘗不爾與人交久益可親人有過必正色責以大義使自愧赴人之難奮不顧身人有善稱之吃吃不離口往往終身不忘君有兄使酒無賴方居貧時賙之甚力少不當其意輒毁辱之甚者至唾罵之君笑而不較有田數十畝舉以與之卒嵗有飢色君盡割巳田與之人謂君曰無田將不飽奈何曰不爾何以見吾先人於地下兄亡兒女子纍然為撫育之嫁娶以時不先已子紹興二十年春三月九日既夕命家人秉燭易衣與妻孥語如平時付以家事大率皆仁人之言有負君千緡者詐稱子錢非貸也而昏之君命焚其劵弗取已乃危坐而逝鄉人欲用浮屠法士大夫為之賦詩作文以紀其異而其家卒用新儀以殯焉禮也君捐館而惟肖嗣孝謹可稱能世其業女二人其一先君而亡次事同郡士潘大有孫二人曰慎修曰性修皆君所自名某年某月某日葬于某鄉之原銘曰厚於為仁而身無寸名勇於為義而祿無斗粟豈非豫之齒者去其角傅之翼者兩其足此愚者弗知而智者必燭聞君之風可勵薄俗百歲之後有君子者過君之墓而式焉則造物之於君亦云篤矣太倉稊米集卷七十
