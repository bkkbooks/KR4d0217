body:
  text: 太倉稊米集巻七宋周紫芝撰詩四十一首姑谿書報録近作因寄宣毫越簡五雲書札何時得古錦詩囊久未傾急遣能言管城子仍煩解事禇先生飽霜穴兔秋方健照雪溪藤搗更精南鴈去時人尚逺雙魚欲到眼先明次韵王次卿喜劉元亢登第劉郎才思似春閒文在阿房季孟間盡把胷中着雲夢還從筆底看波瀾我無富貴詢唐舉人說科名汙次山馳馬行看歸舊物舞衣先喜慰親顔奉酧韋深道見寄詩葢世功名豈不佳韋郎心事本烟霞秋風自老千章木春雨誰分一部蛙夜鶴政愁雲出岫鱸魚㑹遣客思家從君細意論幽恨準擬應須到落花韋深道和詩且以書堅扁舟之約僕以禁烟歸掃邱墓未暇先寄此詩闕然不見十年餘借屋新來共一湖已向雙魚逢尺素更因五字得明珠子猷心欲隨烟棹摩詰居應似畫圖㑹待龎公歸上塚便求奴飯馬青芻次韵邦伯達春寒嶺外梅花使已來江南正月未春囘頑雲放日歸蓬牖殘雪將寒入酒杯便有社風催燕到何須羯鼔打花開老于春事渾無意睡起羣書正作堆髙公墓并引起居舍人髙公惠連余之妻曾大父也少年登進士第以才名推重一時見知於章聖皇帝公博學多聞晚喜陰陽地理書頗窺其妙嘗為廬陵守廬陵士子千數而嵗罕登第者咸歸咎于郡學公為卜地而徙之其後劉公沆與歐陽文忠公皆第甲科卒踐二府曩時公之諸孫嘗謂余言公之父少卿公與公之墓皆其手遷意必能昌其後而今乃無禄仕者公豈私于吉之士獨不欲其子孫之盛大哉無是理也宣和辛丑予避冦難屏跡山間每飯餘輒曳杖逍遙于墓木之下遂作此詩㓂謂方臘髙公古遺直三年立螭頭載筆有公言髙論肅冕旒少年取巍科妙學窮九流晚窺青囊書穴地生公侯當時千載人繼出歐與劉如何百年後零落歸山邱墓門梗荒棘長松泣髙秋佳城定天與政自非人謀我來倚墓木伴客聊遨遊斗酒與隻雞誰為橋公羞次韵章季常題石魚研屏蒼崖百丈懸江濱江潭下躍吞舟鱗戲將雙影倒掛崖石上妙絶始信陽侯神短屏誰為琢山骨與君一障西風塵世間百怪那可解清詩宛轉聊窮因問誰幻出水厎石掉尾鼔鬛波粼粼固應鳳咮與龍尾明窓淨几長相親君家機雲好兄弟玉山對峙髙嶙峋為貧聊試漆園吏手板拄頰心看雲要収江湖入几席釣竿拂水埀風綸誰當為我語石魚莫愛浪翻月白千頃江鎔銀但願玉堂常伴直對此風流千載人次韵何丈即席春風無力柳嫣然花欲爭春作意妍坐上詩成雲態度樽前人鬬玉嬋娟鳳簫初暖參差竹檀板還催大小絃惡客正應妨作樂主人渾似孟公賢次韵子容池亭晚思二首便到青雲尚黒頭有亭莫賦二宜休如君豈是池中物要趁官閑作浪遊漫叟江湖閒日月輞川圖畫小池亭謝郎春草有新句付與老人雙眼青次韵次卿林下行歌十首風吹蘇小門前柳雨暗羅敷陌上桑遥想錦江春色暖被花惱得少陵狂聞道全家隱鹿門竹籬茅屋寄江村龎公事業無多子只有平安遺子孫事向閒中種種休春來林下興還幽上山雙屐與誰着掛杖百錢時獨遊郡郭東邊是草堂岩花時雜澗花香愁從把酒杯中少日向讀書窓下長愁多應怪獨醒人心事全憑麴米春醉後逢花堪一笑狂來曳杖却成真身世無營策最良年來幽事不多忙飰牛欲起方朝露種豆纔歸又夕陽賣酒繒魚只數家卜鄰元在水之涯扁舟定自桃源去斜日紅飛兩岸花人情危甚劍頭炊未可雲鵬笑一枝冠冕窟中元不到雲山堆裏復誰知得酒固應聊復飲有田何苦不親耡客來深巷聞雞犬便是淵明歸後居勃窣蹣跚不上堤却來林下小徘徊已知脩竹有千畝更為桃花求百栽聞蛙草合平溝漲緑醅亂蛙聲在古城隈何時細雨春風夜還我西池鼔吹來次韵趙鈐飲次卿家時牡丹盛開而僕不及見揚子草𤣥仍有居河間好事復多書獨來林下相尋處醉倒花間得句初人去不知紅爛熳春殘忍看緑扶疎明年許作樽前客準擬籃輿喚阿舒林間燒笋戲作滿山稚子欲翻籬莫管春風上畨時來伴野僧參玉版不知今日已茶毗夜讀艾子書其尾萬里投荒海一隅八年蜑子與同居可憐金殿鑾坡日渾在蠻烟瘴雨餘竒怪誰書方朔傳滑稽空著子長書不知平日經綸意晚作兒曹一笑娛雨意甚濃方起而止欲成凍雨又吹殘香稻埀埀不救乾謾對醨雲訟風伯還將火傘付炎官未容漲緑浮烟艇且看晴雲轉玉盤誰與天工論赤地盡傾銀漢作波瀾次韵趙明叔喜雨不寐雲忽油然雨沛然黄童白叟盡成顛喚晴鳩婦鳴屋角飽水秧孫明稻田御史平寃魂亦喜𢎞羊言利死誰憐草𤣥窗下子揚子凉入孤燈夜不眠送强幼安慈固必能勇剛亦能近仁内荏色徒厲定知非仁人强公本仁者笑語生陽春散為三年澤不及千里民庬恩出豈弟雅量含清醇應容盗耴氊肯叱吏吐茵誰知乃中剛臨難氣益振前年攝虎符折衝如有神隣封墮賊手齒寒已亡唇孤城危纍卵夜臥寄積薪清詩見横槊髙㑹開重闉羣奔竄狐鼠萬刃抗一身豈但虎渡河遂使盗入秦至今忠義士不數逺與巡嗟我挾策子繆作升堂賓忠風激中腸别語聊重陳公議誰能掩偉績終難湮隂功及黎庶天語形絲綸富貴當自兹照眼功名新賊謂方臘東坡老人居儋耳嘗獨遊城北過谿觀閔客草舍偶得一蒻笠戴歸婦女小兒皆笑邑犬皆吠吠所怪也六月六日惡熱如墮甑中散髮南軒偶誦其語忽大風自北來驟雨彌刻持節休誇海上蘇前身便是牧羊奴應嫌朱紱當年夢故作黄冠一笑娛遺跡與公歸物外清風為我襲庭隅憑誰喚起王摩詰畫作東坡戴笠圖婁黥菴納凉婁黥無骨可封王生事全憑藥一囊閉户翻經頭已白開門延客酒初嘗竹從春後知無數花自山來别有香未有數椽容我老聊分一榻借君凉晚浴崇教寺閒居誰與遊幸此招提隣時乘下澤車訪我物外人往往聽魚鼔相隨作朝昬齋得飽佛飯暮浴霑僧巾情熟自不厭無求亦何嗔我生束世故欲解未有因願丏一滴甘為洗千刼塵無冠顧安整有衣聊自振道人小軒窗池凈花色新芭蕉過微雨蒼翠爭藂筠勁節秋益好柔葩委菅榛豈但娛老眼亦足觀是身欹眠寄靜榻小休只逡巡茶甘猶在口龕燈已前陳日暮行當歸擊柝催重闉次韵元傑暑中書事劉郎家世盡名卿晚嵗憐君尚帶經道在莫嫌榆歴歴詩髙何媿草青青杜門不出人應笑與世相違我獨醒誰與林塘共清夜緑荷時照兩三螢次韵李子澤中秋無月月在愁雲黯淡中緑樽誰與共秋風君家自有人如玉嫋嫋停停似楚宫次韵春卿遊黄蘖道場長安多貴人被服縈寳帶名字埀鼎彛功勲壓崧岱一懷上蔡悲樂事鍾我輩知君汗漫遊食蛤據龜背若若笑痴兒洋洋飛大葢梯空瞰千山閱此烟雨態小閣亦何有長松䬃微籟聊將身世夢淨洗佛祖戒行樂要及時幸此無籍在只今况豐年禾黍已斾斾狂風不鳴條積雨不破塊賞心失幽期噬臍有餘悔曉猿倘未驚斯遊君勿怪便當買薄田徃抱躬耕耒八月二十一日大熱夜半微凉八月大地千里赤蓐収權輕苦無力未許寒蟬飽風露聊為秋蚊增羽翼蒲葵呼扇腕欲揺絺綌捐衣汗猶滴誰遣秋風半夜來先向髙梧寄消息和李似表丞㕔梅發用胡士曹韵江頭雪屋知誰家雪中冷艶空争華不知何郎閉東閣坐看江梅初着花谷厎春囘猶未透天寒䄂薄姿微瘦黄昏有月誰復知舉世無花出君右人生一月幾胡盧枝猶在手霜滿鬚湖邊孤坐不飲酒西湖處士空清臞知君不學崔斯立幅巾漫對枯松株鉄心雖冷白自勝金縷醉歌歡豈無明朝花在有新句詩成阿買還當書次韵次卿約尋梅二絶擬摘寒梢一㸃春佩囊無句久生塵尋花㑹得王郎意應為江梅似玉人想得瑶林玉樹春髙標元自出風塵殷勤欲共梅花笑却恐梅花解笑人寄題折將軍家忠勇堂折有邊功上賜大旗御書忠勇二字以表其功將軍因以名堂折侯古將家雄筭讋邊土將軍最晚出驍勇不媚嫵十年守雁門飛矢射猛虎平生程不識不作一錢數誓言大宛馬唾手端可取夜半奏捷書歡聲曉飛舞雲旗塗黄金彩錯映寰宇談笑開華堂忠勇掲天語功成倘堅壁鎮靜古所與何當使敵人開户玩處女置酒日髙㑹緩帶擊歌鼔要令無智名折衝在樽俎東墻橘將熟催以長句木奴嫋嫋半埀墻故惱幽人苦未忙雨細不妨無賴緑簾疎時與可憐香誰將磊落黄金顆為賦甘酸白雪囊只有天公真解事便須先借滿林霜夜宿東寺雪中寒甚古寺初投箠荒陴已授更雪飛穿幕片風作撼窗聲今日招提境當年敵騎營可憐王處仲江上築孤城哭普兒胷中欠梨棗種此無明根造物初戲劇憂傷裂心肝奪我破殻雛長鳴猶未翰况乃渥洼種墮地已足觀此理竟莫曉老淚空闌干端如卜子夏淚盡雙眼眢母哭不忍聽聽之鼻辛酸人言有子爾欲遣吾心寛有生無短長視死同一歎曉人當如是自曉終為難究竟無奈何哀哉亦何言安得大靈龜騎雲欵天門太倉稊米集巻七
