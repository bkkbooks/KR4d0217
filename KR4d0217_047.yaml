body:
  text: 太倉稊米集卷四十七宋周紫芝撰䇿一首擬廷試䇿一道問朕德菲陋紹承大統遭家多難求濟未獲是以博延豪俊咸造在廷冀聞治道之要子大夫盡精極慮樂為朕言之蓋聞在昔聖人之治天下正心誠意躬行乎上者固自有道而措諸事業之間則或寬或猛或質或文變通隨時不膠於迹著在方册昭昭乎其可覩也朕甚慕之越自即位九年於兹思欲雪父兄之恥而復祖宗之烈夙夜祇懼罔敢荒寧然而施為繆戾治效闕然深惟其故不憚改作間者乃下銓量之令以擇吏而真才猶未顯也嚴科斂之禁以恤民而實惠猶未孚也謹㨂練之法以治兵而冗食猶未革也夫吏道未肅民物未蘇兵勢未强此治之所以未效也將何以輯事功弭禍亂哉而建議之臣并欲考課以核殿最省官以抑奉糈力役不足以供餽餉也為之屯戍營田以寬之賦入不足以供調度也為之平凖均輸以佐之爵賞未立也為之定武功之等紀律未明也為之參府衛之制凡是數者合於古便於今乎其或以為不然耶雖然此治之迹也上之欲三辰明四時序災沴不作而動植遂性下之欲風化行習俗厚奸宄不作而中外協心兹可以占天人之助矣夫何敵而不克何難而不濟興復大業其庶幾乎子大夫以謂何修何營而可以臻此其茂明之務適於用朕將有稽焉臣對臣聞人臣以直諫為忠人主以聽言為明此堯舜三代不易之道也臣獨以謂不然夫直言以立忠臣之節固人臣之願也然言不貴直而貴在可用言而不可用則言雖直適足以殺其軀而巳矣果何補於治哉善聽以納天下之言固人主之職也然言不貴聽而貴在必行所聽不能行則聽雖勤適足以眩惑其耳目而巳矣亦何補於治哉堯舜三代之時臣不自以為忠而有言則期於必用君不自以為明而聽言則期於必行是以君明臣良都俞賡歌於堂陛之間辭若緩而所以告戒之意甚切事若微而所以虞禍之意甚深諫行於帷幄之間而利及於四海之外天下之人皆由之而不知也今陛下策士於廷躬勞聖問以求天下之直言不知陛下求天下之言將擇其可用者而行之乎抑姑以示兼聽博詢以為天下之觀美而巳耶臣愚一介書生僻在田野郡太守部刺史不以臣不肖使得充賦隨計在廷顧臣之愚陋豈足以仰承大對然臣竊披聖問至其茂明之務適於用然後知陛下之意不徒求其言之有可採蓋將推而行之也臣固願效匹夫負薪之言少禆前旒黈纊之聽唯陛下擇焉臣伏讀聖策曰朕德菲薄紹承大統遭家多難求濟未獲是以博延豪俊咸造在廷冀聞治道之要子大夫其盡精極慮樂為朕言之臣於此有以見陛下之好言非特求之蓋將用之也恭惟聖朝臨軒䇿士訪以當世之務所以圖大計而定國是逹下情而求民隱也然而國初以來沿襲舊製猶且試以聲病之文兼以子史之論謂之三題當時固有豪傑之士懷經濟之策而不得少伸其喙自熙寧庚戌以來始變以䇿而直言敢諫之士相繼傑出可謂善矣然而議者猶以三年䇿士以求至言特有司奉行故事而巳未聞取其言而用之以布告中外使曉然知之曰朝廷之行某事用某臣之言也是下有敢言之士而上有用賢之實矣今陛下紹承大統遭家多難求濟未獲而博延豪俊冀聞治道之要且使盡精極慮樂為陛下言之則陛下之求言豈止奉行故事而巳臣聞天下多事則匹夫之言重於太山無事則公卿之言輕於鴻毛今天下可謂多事矣此匹夫之言得以自達之秋也臣竊見周之成王承文武治安之後遭國家多難之時商民未靖管蔡流言天下殆哉岌岌乎其危矣成王以幼沖之資嗣無疆之服而勤勤求言常若不及故訪落嗣王謀於廟之詩也小毖嗣王求助之詩也其詩曰閔豫小子遭家不造癏癏在疚又曰未堪家多難豫又集于蓼也閔豫者哀痛懇惻以求之之辭也曰豫小子者謙抑自損以冀聞其言之辭也曰在疚曰集于蓼者告以病而且苦之辭也蓋人主之求言懇切則言愈遜言愈遜則下之告上也情益至焉此禍難所以可平而太平所以可致也今陛下以遭家多難求濟未獲博延豪俊冀聞治道之要則可謂如成王之用心矣臣恐陛下求言未必如成王之切聽言未必如成王之誠而用言未必如成王之速也使陛下果能竭成王求言之心體成王聽言之道博問以增其所未聞廣聽以求其所不逮雖太平之治可圖何止是陛下求濟未獲之心而已矣臣伏讀聖策曰在昔聖人之治天下正心誠意躬行乎上者固自有道而措之事業之間則或寬或猛或質或文變通隨時不膠於迹故其成效著在方册昭昭乎其可觀也朕甚慕之此陛下志誠願治欲逺追唐虞三代以跨越漢唐之陋者也臣聞聖王之治有本有末及其成功也要在隨時而巳堯以是道而傳之舜舜以是道而傳之禹禹以是道而傳之湯湯以是道而傳之文武周公此治之本也夏尚忠商尚質周尚文三代之忠質文相救如循環此治之末也聖人端本於上埀拱無為而天下治至於應時之務則或寬或猛或質或文亦視其時之如何爾臣嘗誦堯舜二典以考二帝之治矣堯之治其載於書者甚簡至舜則申命九官以緝熙庶政流竄四凶以威服强梗巡狩諸侯以觀省風俗其為治甚詳焉非特二帝之治如此自唐虞而觀三代則唐虞建官不過於百夏商則倍之豈堯治簡而舜治詳唐虞官少而夏商官倍固相違異如此哉亦時焉爾陛下道德廣大智慮淵深其於治道之要固巳得之於心術之間矣宜其變通隨時不膠於迹而一時之治猶若未能與堯舜三代分路而揚鑣此陛下所以諄諄而慕之也昔人有言臨淵羡魚不如退而結網臨政願治不如退而更化陛下與其逺慕於前聖曷若近法諸心術凡吾心術之所得者亦前聖之所行也在陛下加以至誠不茍之心濟以力行不倦之志去其憸薄邪佞之人抑其歆羡不急之好度凡可以汩心術而害治道者屏而去之然後推吾所得於前聖之書者而力行之則是能傳堯舜禹湯文武周公之道於寥寥千載之後也顧不韙哉臣伏讀聖策曰越自即位九年於兹思欲雪父兄之恥而復祖宗之烈夙夜祇懼罔敢荒寧然而施為繆戾治效闕然深維其故不憚改作此又陛下內懷謙沖退託之意外嚴恐懼修省之行思欲廣大孝於天下嗣厯服於無疆者也竊惟陛下躬行堯舜孝悌之德蹈文武憂勤之勞日夜念治而又不憚改作宜其治道益隆海內益安可以柔逺而能邇可以治人而事天可以偃武而修文可以制禮而作樂方且自謂治效闕然深求其故而又不憚改作臣謂陛下既有求治之意則又當深明乎求治之術也陛下即位九年於兹左右輔弼之人進而用者不知其幾也法度號令之施變而更者又不知其幾也陛下豈樂為是紛紛者哉蓋將以求治安之效焉爾而治且如此則盍亦反其本矣堯之九官皆終其身而官不徙成湯之相得一伊尹而商治舉矣成王之相得一周公而周治舉矣陛下之用相逺不過三年近不踰再歲方進而用旋復罷遣故前相之所用後相之所去前相之所行後相之所易人才之賢否在所不問也政事之是非在所不問也而一切變易之則陛下之用人可謂不專矣吏部銓選之法百官由此以進退政治之廢興在此也今有補授官曺至於纍歲而為有力者奪而去之赦令寬恤之書與天下更始四方之所取信在此也今有天子詔㫖猶掛壁牆而催科之吏巳遍墟落則陛下之號令可謂不一矣陛下專心圖治不憚改作不恤群議如盤庚之遷都周公之征三監可也若止於如是而望治古之盛是猶却行而求前也不亦逺乎臣願陛下專輔相之任謹號令之出使用而必可信令而必可從然後慎守而力行之俟以歲月自然功成又何必以不憚改作為勤哉臣又伏讀聖策見陛下以下銓量之令而真才未顯嚴科斂之禁而實惠未孚謹揀練之法而冗食未革為憂臣然後知陛下之果有意於圖治功也人主之相士如九方臯之相馬九方之相馬驪而謂之以黃牝也而謂之牡彼其所得者在於精神心術之表而不在乎驪黃牝牡之間故寓目而顧則冀北之群為之一空漢髙一見韓信未有尺寸之功而付大將之任果立大功金日磾牽馬過殿下武帝呼而上與之言倚以腹心為漢忠臣乃知人主之知人在於心術之間殆不可以言喻而事舉陛下下銓量之令而求真才是猶按伯樂之圖而求良馬且天下之大人才之衆不可勝察久矣陛下何不論一相而用之使之旁招俊乂列於庶位則陛下之人才有不可勝用者矣何憂真才之不出歟昔齊威公出遊見父老命之食曰請遺天下食遺之衣曰請遺天下衣曰吾府庫有限安得而給曰春不奪時農即有食夏不奪蠶農則有衣今陛下嚴科斂之禁將以孚實惠於民而益貧此無他陛下有憂民之心而州縣無行法之吏也臣在田野與父老語咸謂陛下詔令溫厚每下寬大之事未嘗無恤民之意奈何州縣之吏恬不介意如急文移以斂既捐之租抑鄰里以償逋逃之賦民之輸粟一斛必取其倍謂之羡餘州縣差夫朝廷明禁而官吏公行謂之和雇若此之類未易毛舉監司不問朝廷不知甚負陛下恤民之意也臣以謂嚴科斂之禁未足以惠民不若察州縣之吏誅其暴虐使不奪其時是開天下衣食之源也何憂實惠之不孚歟先王立司馬之官設六軍之衆因井以制軍賦而稅以足食賦以足兵大抵地方一里為井井十為通通十為成成十為終終十為同同方百里同十為封封十為畿畿方千里而六軍之制備矣當是之時民隱於農食足於賦兵有定員賦有定數又安有冗食之弊哉而又連帥比年以簡車卒正三年以簡徒群牧五載以大簡車徒此兵所以皆精而食所以無冗也今天下之兵付以一二大將尺籍伍符漫不復省蓋未聞上功首虜差六級而下之吏削其爵者也遂使大將滋冗兵以市恩朝廷按空籍以給食臣願陛下稍加繩約歲遣大臣簡閲車徒倣佛先王之制而為之誅賞則又何憂冗食之弊歟臣又伏讀聖策以建議之臣欲考課以核殿最省官以抑俸糈屯戍營田以寬力役平準均輸以給調度以至定武功之等以立賞罰參府衛之制以明紀律求合於古而便於今者顧臣之愚何足以知之臣聞唐虞之際聖明在上內有百揆四嶽外有州牧侯伯九官並任濟濟相先而衆賢和於朝固無幸位之臣矣而九載之間猶不忘於黜陟成周之盛凡吾有官君子非學古入官之人則鄉舉賓興之士內之六卿分職率屬以倡九牧外則六服群辟罔不承德亦無幸位之臣矣而三年之間猶不廢於誅賞則考課之法非不善也京房以謂帝王以功舉賢則萬化成以毁譽取人故功業廢而欲創考功課吏法然其法煩碎令上下相司而卒不可用彼殊不知三代以直道而行則毁譽出於公後世專任私情則毁譽出於口此考課之法所以無益於實用也陛下果欲行之必得持公心申直道清介無私之人為陛下精核其人則可矣不然則法制雖密是未免於京房之弊也設官所以治民官得其人則民受其利官非其人固巳不可至於兵盜之餘下不勝困宜拊以清淨養以膏粱簡事以息其力薄斂以豐其財而乃官吏增多胥徒浸盛大抵不過吏部銓曺欲泄冗流而不知官多所以病民也漢光武以英敏之資躬百戰之勞而得天下即位之初未遑他事但聞首減內外四百餘縣而巳意者其為斯民息黥補劓莫此為急乎由是觀之陛下欲省官以息民正今日之急務臣竊以謂欲省猥多之員必先革冗官之弊欲革冗官之弊必先清入仕之流流清則官可省員可減矣不然則驟而去之官必失所怨必上聞非人之情也屯戍營田之法昔人固嘗用之矣能使斂不增於民而軍資以給得不謂之良法乎臣愚聞制而用之謂之法推而行之存乎人法雖良而推行者未得其人不見其利也昔趙充國與漢宣帝議屯田反覆二千言初上奏則曰臣所將吏士月費糧穀十九萬九千六百三十斛難久不解繇役不息誠非素定廟堂之策宣帝不從既而又上奏曰屯田內有亡費之利外有守禦之備敵見萬人留屯為必擒之計其歸德宜不久此不戰自破之策也宣帝乃用充國計卒成破羌之功夫以全盛之漢而備一方之冦其長慮却顧猶且如此况我國家連年用兵兵食一歲不知其幾而獨仰於常賦之出非計之得也曩者朝廷講明屯田利病申飭有司耕墾廢田法非不善令非不嚴而奉行者未必盡得其人一切茍簡務應文書而巳陛下誠欲得營戍屯田之法必得其人如充國者然後可也昔者公儀子之相魯也之其家見織帛怒而出其妻食於舍而茹葵愠而拔其葵曰吾巳食祿而又欲奪園夫工女利乎董仲舒以謂天子大夫者下民之所視效又豈可以居賢人之位而為庶人之行哉武帝用桑宏羊以取民利仲舒之言蓋激而有云平準均輸之法與坐市㕓者爭什一之利不得巳而用之雖足以紓一時之急而未免後世之訾也今天下之大四海之廣貢賦之入山澤之饒陸海縣郡不知其幾顧何求而不得臣願陛下歲下漢文之詔使勸課農桑出入阡陌者咸得其人則益敦本而國用自足何必區區取漢唐之弊法而行之乎凡臣所陳四策在陛下擇其可行者斷而行之爾至於武功之等府衛之制則臣嘗聞之矣初秦爵一級曰公必至二十曰徹侯髙祖既定天下分為十有七級班固皆謂制級以賞功勞此漢之定制也武帝元朔六年始詔置武功賞以寵戰士其詔曰今大軍將仍復克獲受爵賞而無所流貤其議為令而有司請豐武功賞夫征伐者將帥之功爵賞者人主之柄今也與以爵而使流貤則是無功者可以買爵而天子之柄下移於將帥矣臣不知其可也武帝寵用衛青失於太過而恩澤繆濫以至於此陛下定武功之等必先明將士之功然後豫以爵焉則足以厭天下之心矣漢武之法不足為陛下用也府衛之制起於西魏後周成於隋而備於唐唐之制六衛曰翊曰驍騎曰武曰屯曰禦曰候皆有左右是為十二衛凡天下一道置府六百三十四皆有名號關內三百六十有一皆以𨽻諸衛將帥有事則出征事已則復歸於京師是以兵重於內而輕於外權歸於天子而不在於諸侯陛下果欲參府衛之法必先收諸將之權宿兵於內然後其制可得而參矣臣伏讀聖策曰雖然此治之迹也上之欲三光明四時序災沴不作而動植遂性下之欲風化行習俗厚奸宄不作而內外協心兹可以占天人之助矣夫何敵不克何難不濟興復大業其庶幾乎臣聞天道至逺其視聽則甚近人心至衆其好惡則甚同聖人知天道之甚近也故欽承之而不敢忽面稽之而不敢背兢兢然業業然朝夕警懼惟恐貽譴於天而不可解也天知聖人畏之者如此則其愛人君之心亦如是其至也是以三光明四時序災沴不作而動植遂性焉聖人知人心之甚同也則必因民之性而不敢違順民之心而不敢逆一言一動一念一慮惟恐不合乎民之情而致其所惡也人知聖人順之者如此則其戴而仰之亦如是其至也是以風化行習俗厚奸宄不作而內外協心焉恭惟陛下以不世出之資而膺千載難逢之運上謹天戒下畏民言臣猶為陛下進之孔子曰唯天為大唯堯則之詩曰上天之載無聲無臭儀刑文王萬邦作孚陛下克謹天戒恐懼而不巳則又將上同乎唐堯周文與天同德而無間焉臣之惓惓猶以此而望陛下也董仲舒曰堯舜之民比屋可封詩曰既醉以酒既飽以德人有士君子之行焉陛下祇畏民言戒慎而不巳則又將躋民於堯舜成周之域臣之惓惓猶以此而望陛下也陛下神潜智獨優入聖域則其所聞所知固巳邁五帝而跨三王儻能尊所聞而行所知則堯舜周文之盛似不難到事在强勉而巳矣然則何敵不克何難不濟何足為陛下道哉臣愚山林藪澤之士固不足以講明當世之務獨其所聞於古者如此意可以少攄涓塵之慮上禆日月之明困於無階不得上達今幸與韋布得望穆穆之清光於宸廷之下願效一鳴以伸昔志陛下始詔臣使盡精極慮以陳治道之要中策臣以當世之務且終以天人和同之事臣固以條陳其萬一矣然是三者在陛下皆優為之而臣所願於陛下者益聖學以廣帝王之業而略近效以收聖神之功也陛下越自即位九年於兹思欲雪父兄之恥復祖宗之業似若亟於圖治上勤聖慮者臣請以唐事明之天寶十五載安祿山陷長安肅宗即位於靈武是年九月癸卯復京師壬子復都其於尅復之效可謂神速矣然而肅宗賴將帥之忠賢收成功於指顧而父子夫婦之間內無可稱君臣上下之際外無可述固不足多美孔子曰如有王者必世而後仁易曰聖人久於其道而天下化成臣願陛下體孔子必世之言遵羲易化成之道俟以歲月持以誠心將見陛下埀拱無為以底巍巍之治矣臣所謂略近效以收聖神之功者此也如此則何治之弗舉何患之弗除凡陛下博詢於多士者皆不足以勤聖心之慮矣臣願陛下體天地包容之量恢聖人臨照之明恕臣之愚察臣之意毋謂臣言迂濶而不適於用實萬世無疆之休唯陛下察焉幸甚臣謹對太倉稊米集卷四十七
