body:
  text: 太倉稊米集卷十四宋周紫芝撰詩四十九首乞蠟梅老翁真是可憐人却覔花醫病眼昏乞取疏枝更疏蘂莫論桃葉又桃根臘盡氷消未見時春風應入近南枝懸知老樹開花早苦恨幽人得句遲秀淮亭晚眺時往無為未得三吳去東來且過淮要須煩曉浪聊為洗風霾飄泊從人笑窮愁費力排平生臨水意老去若為懷次韻趙師是題烏江連雲觀二絶項王才器固無雙秦鼎雖輕可獨扛豐沛故人如不用濟師猶得問長江連雲臺上倚闌干著眼何妨盡日間公子胸中有雲夢更須為助借江山送潘擇之尉南巢潘若虎字擇之恩榜入仕潘郎胸中有文藝白髮青衫初試吏少年欲射漢庭䇿晚乃去作南巢尉寒廳結屋八九椽導騎挽弓三數輩但願君如梅子真人物風流亦何愧題善應師毋我菴醫僧日成今君無我亦無人誰識毗邪妙悟身宴坐只應山是伴夜禪唯與月相親支郎好馬元成癖懶瓚垂洟却是真更待衆生總無病萬金良藥不妨神元夕訪忍毋我已睡復起殘缸零落數枝紅春在空濛薄霧中月似氷輪人似玉車如流水馬如龍山僧睡起三更後遊客間來一笑同明暗短檠君莫厭此燈無盡法無窮次韻忍毋我春日三絶句瑗入平林囀鳥雛日烘花氣滿庭隅道人元不關春事肯把新晴餉客無雨餘繞屋一渠水日落滿簾何處山我亦時來開病眼怕將春色照愁顔春意全灰病後心粥魚齋鼓聽禪林鳥啼南嶺夢初斷花發故園人懶尋燈下讀韓致光外集吳宫花草弄纖柔西子粧成特地羞笑我老情難嫵媚愛渠好句儘風流香奩詩在人何處斷腕名髙事已休更欲與誰論此恨遺編讀罷一燈留春寒寒意苦未解春陰連晝霾文書堆午枕風雨閉寒齋花落空驚眼愁多欲滿懷客情須一醉安得酒如淮試湖陰徐道久筆山中三窟遭蕩焚十年遺種無礽雲管城已老既謝事柔毛遂出收微勳騷人手握奴𨽻管人間自此無蕕薰徐生晚出頗自喜妙伎天與人皆聞羝羊退舍栗尾避族非東郭不肯論往嵗江南説諸葛至今有口皆能言眼前厚利聊取足身後典刑寧復存騂牲自是犁牛出忠臣豈但孝子門古來取士貴閥閲未必元成俱有孫送孫秀才兼寄達道人當年御史凛霜風見説金狨玉面驄汗簡有名知不朽皂囊無稿豈非忠夢思故國兵猶滿身落它鄉路更窮只有老禪真具眼識君應在典型中鰔鮓放筯朝盤空食指昨夜動軟玉開香包桃花點春甕平生江瑤柱異名實同用何當登禹書永作淮海貢淮軍及境而退喜甚成詩近喜橫戈隊南來偃斾旌瀕江猶樹柵帶甲謾持兵夜柝初寒枕春田已趣耕使君今尚父應便是長城題米元章祠堂繡溪遺迹巳茫茫父老時能説漫郎蒼碣尚餘唐翰墨古祠猶是晉衣裳旌旗還向江湖老簷廡空悲草木長我亦敢持寒具手為公來炷影前香次韻魏定甫早春題咏臘雪初晴梅欲花有人聞説鬢如鴉清詩勾引江南夢應向今宵還到家三十六畨風未回微紅難倩剪刀裁魏矦句裏有春色不打涼州花自開雨後桃花可意紅一川楊柳醉春風舞衣歌扇重撩理百尺朱樓煙樹中白頭憔悴未歸身羞作須江入社人自是愁多無好句不關詩瘦與傷春柴扉春亦借融和客少髙軒誰肯過醉裏我應慙畢阮詩中君合是陰何正月十八日謁客意甚不樂已而過正師猶未起書小詩窗間而已玉壺花暖日烘窗奪我寒衾曉夢長慙愧髙人方擁鼻小爐沉水宿殘香張老借東軒晝睡誰言知處是間愁一入華胥萬事休借得東軒還宿願何須雲夢澤南州畦蔬一首并引余旅寓既久而食益不足乃畦舍西之地植野蔬而食之聊以當肉課藝有成情見乎詩猗嗟老人如水中槎攜壺挈榼泛宅浮家飄然北來寓此一蝸食無畎畝衣無桑麻藜莧滿腹雜以蜆蝦以鼓我腹妻孥笑譁旅人之食豈曰不腆不足則求我顔亦靦乃即舍隅蒿萊是剪藝此春蔬侵畦覆畹雨葉風枝忽其滿眼擷之掇之以芼以烹聊以當肉亦足彭亨搖喉澤吻茹葅啜羮如天酥􅋳飯在家僧彼哉膏粱孰為重輕安得長江載揚我舲買地五畝抱甕躬耕駕言聿歸以畢餘生解人敦武郎冨君為余言解池廣二百里其利不資又有六小池官雖置戍以為厲禁而民實擅其利或悉以屬縣官則鹽不復成其事頗怪作小詩以紀之天意懸知損有餘小池分水計非疏誰知當日蕭丞相亦解區區説海魚春日小詩三首亂離回首又春風江上人家一半空燕子多情依舊舞桃花無語可憐紅烏鳶銜紙欲成窠寒食羇愁不奈多夢到鹿門親上冡花前老淚欲懸河兵戈無地可窺臨風物依然惱客心未有鶯時春欲盡已無花處緑成陰抄宛邱先生集見和許貴州詩因以悼之臺閣諸公盡要途一麾新拜嶺南除當時為我歌新句别後何人哭訃書夢斷世間青瑣闥醉傾天上碧琳腴平生交舊壖張輩餘子紛紛可作奴米元章為須江太守聞有怪石在河壖莫知其所自來人以為異而不敢取公命移置州沼為燕遊之玩石至而驚遽命設席拜於庭下曰吾欲見石兄二十年矣聞者以為言坐是罷去余遊濡須而石猶在詢之邦人信然乃作此詩漫郎與世苦不偶俶儻如公世安有平生學書筆似錐晚嵗得州大如斗淮西道院長江邊天公付與公髙眠使君閉閣作竒字門前白浪春風顛人言異石天所出三十六峯如洞天亟呼我兄更再拜俗眼相看頗驚怪喚錢作兄真可憐喚石作兄無乃賢望塵羅拜良可笑米公拜石不同調愚智相懸乃如此何啻人間三十里是非從古無公論彼此相笑何時巳巉岩對客初不言堯桀紛紛渠自爾芍藥今嵗著三花春歸那肯為儂留尚有三花慰客愁十里紅樓卷珠箔不知誰在古揚州羣山臺暮雨傑觀凌寒江朱欄俯平野羣峯江上來屹立羅萬馬山容多態度顯晦入模寫朝雲結煙鬟翠色逺相射夜月橫修眉娟娟亦間雅天生此尤物政復為間者馮夷翻怒濤洶洶激風榭神女亦將雲時從楚臺下造物出竒傑娛客助揮灑時方苦積潦百里無十舍我雖非官曹對酒那忍把人生急行樂有味如啖蔗悲喜有乘除歸愁耿長夜須江暮春雜題三首三月陰晴江上天江花落盡水平川紅蠶老去桑埀椹黃鳥飛來柳撲綿千里心常懸夢裏十分春總在愁邊時時更謝蘇司業乞與杖頭沽酒錢須江舊事與誰論萬古悠悠入夕曛楚子名今推伍伯阿瞞功獨蓋三分空埋冶父山邉骨已散濡須塢口軍欲為英雄弔遺迹筆頭無古戰場文淮上風埃滿客衣二年樓閣送斜暉心如落絮隨風去春與殘花作伴歸塞外夕烽悲鼓角江邊飛雨濕旌旗只今便覔東皋路巳失南山種豆期寓舍雜題三首久作乘風去重尋聽雨眠更無輕絮落又見小荷圓芍藥何人種茂葵一笑妍亂離歸未得且復此經年老去書中得心因病後衰栖栖身是夢種種鬢成絲鳥自知時節人猶説亂離倚樓天萬里無地置吾錐客路猶飄泊江山未定居賣刀安得犢彈鋏竟無魚一飽非難事平生不願餘但能休旅枕便可稅征車客舍有井極深而寒今嵗大暑日汲以供盥濯喜甚賦此重廊陰陰與天隔下有井泉餘百尺乍埀修綆已復寒深注花瓷不勝白山城夏旱百井眢盥濯從誰問涓滴暮年來此看老黥日倚銀床卷深碧炎官火傘空自張玉川清風已生腋翰林醉熟呼不醒宫中誰賦花娉婷中人傳詔玉起立井花吹面詩還成詩成白雪真同調咫尺回姿妃子笑此郎自是醉謫仙肯作官家詩待詔北窗老子貪晝眠蓬頭突鬢良可憐但將飽睡答長健安得新詩追昔年我生無譽亦無毁老去功名薄如紙日向山堂洗睡容空費君家一壺水六月十二日過笑菴道人頗出近詩無人與作繡川遊共看荷花一雨秋乞得道人三昧句破除千斛庾郎愁來尋午枕林間夢分得羲皇窗底風且與笑庵同一笑不知家在大江東笑菴兩和前韻復作二絶莫把須江作浪遊笑菴如水氣如秋但知有道能忘我便恐無天可寄愁新詩時出笑談中清似松江夜雨風邂逅碧雲來入句老夫真欲愧遼東徐使君送氷江南地暖不藏雪六月無氷破煩熱俱在炎官火傘中暍死行人不堪説今年渡江當入淮淮人蔭子恰復開淮人謂藏氷處為蔭子眼明一見玉壺面仿佛肺腑無塵埃使君忽遣鈴下走金盆分似來鈴齋方圭圓璧不可數玉峯中立髙崔嵬蔗漿退舍不入口井花避席當停杯我生坐甑安得此借以清風亦聊爾明年公復侍甘泉御府分光照窗几却憶敲氷餉野人回望江城在千里寓秀師房寂寂疏窗秋更催班班菊蘂為誰開山曾有約終相負鳥解嘲人怪復來閲世了知心是夢倒床須放鼻如雷又從白足西庵老共試齋餘雙井杯雨過涼甚龍腳蜿蜒苦未收亂雲攜雨過西州倚欄斜日到煙樹回首數星橫夕樓樂嵗豈關羇客事好風聊為老人留今宵枕簟涼如水又向華胥作爛遊望黃山宿雲忽解駁曉色明朝暾髙秋寓逺目萬象秋毫分羣峯雜遝來突騎從橫奔驊騮獨驤首迥出凡馬羣嵩髙實維嶽羅列如兒孫玉京與金闕亭亭在雲巒羣仙驂蒼虬冠珮朝至尊往者風露夕妙奏聞清圓名理以絃歌異事父老傳丹成已仙去流脈在山根至今茲山下幽泉湛餘溫安得從浴沂聊以濯我冠一沐去塵土再沐生羽翰朝遊參安期暮躅追羡門振足八荒外垂手青雲端太倉稊米集卷十四
