body:
  text: 太倉稊米集卷五十五宋周紫芝撰啓二十五首為人謝韓侍郎舉自代啓總憲文昌承聞真拜飛章中禁遽及微蹤位卑既躐于等夷才薄頗乖于名實私恩下逮公議弗俞竊以自代之舉知本于前朝之故實示上臣事君之義當明庭渙號之初究是宏規厥有深意然惟善能舉其類務在得賢而擬人必於其倫豈容幸進如某者學不至博才無所長偶以庶僚猥參朝列一行作吏念久去于故鄉何自為郎徒退鄰于老境靜惟持祿深慮辜恩況越輩流驟加推挽鼠肝蟲臂方自聽于死生鳳翼龍鱗敢輒期于攀附羽儀冠冕黼黻條章久持三尺之平反深體一人之寬大謀謨獻納唯推轂于人才輔弼贊襄將入持于兵柄欲吹噓之增重故汲引以相先用敦廉遜之風益負叨渝之愧義高山嶽銘在肺肝誓堅報塞之心少答稱揚之賜為秦安豐上宰相啓假守邊隅無樽爼折衝之效宣風裔俗皆廟堂懷逺之謀既竊祿以逾年徒感恩于末路未知報稱祗益驚危伏念某才術空疏吏能淺短揣五技必窮之分本百里治賦之資付以偏州頗逾涯量責其善最蔑有稱聞懷負乘斯奪之憂有小器易盈之懼至若幽薊滅烽而民皆安寢四郊無壘而國乃休兵實逺人徠文德之修亦上天降和戎之福遂令䝉陋少借便安享清淮梨棗之秋獲豐歲農桑之利妻孥飽暖鼓角清閒此上相致治之功在守臣何力之有輯寧庶土藻繪王猷掃中原百戰之塵同歸至治考自昔扶顛之相誰可齊驅治國是之難回忽頌聲之交作顧維淮浦先被商霖投戈而務息肩當光武罷兵之日堅壁而不生事乏魏尚臨邊之能願寬鞭策之威少效桑榆之力庶謀禆補上報生成暑候寖隆鼎司燕肅冀綏戩榖均惠黎元謝王侍郎薦舉啓職在版曹猥司賤事名塵斧扆遽辱華章雖異數之難逢恐師言之未盡蔑無微效徒有厚顔伏念某蓬蓽地寒崦嵫齒暮滋蘭在畹豈無意以自修種豆為萁蓋有求而不偶作晚歲入官之計屬古人投紱之餘未聞蘧瑗之知非猶作司空之耐辱安天與諱窮之分心實可憐無家傳教佞之言人誰見喜宜遭躪藉何所怨尤驟驚意外之風波益念人間之邱壑致身不早敢辭下笑於陳人見事甚遲嘗恐難逃于敏手方且在聾丞可去之數何以䝉盛莊有味之言寵以褒詞彈隋珠於無用録其菲質嗜昌歜以謂何苐激微衷難量厚德兹蓋伏遇天資偉異雅量恢洪摛筆下之詞章時髙製作鑒胸中之人物自有妍媸亟進掌于邦圖乃從游于禁闥凡此猷謀獻納之意見于雍容言笑之間至若薦論尤光寒素俾兹孱吏亦偹歲員但憂埀盡之年未有報恩之所某敢不懷仕非為貧之念佩老當益壯之言據馬援之鞍固已慚于衰暮補仲山之衮猶幸覩于光華賀秦太師賀幸賜第啓渙宸綸而錫命瞻厦屋之帡幪偹法駕以來臨接天顔于咫尺思與忠臣而燕樂蓋知天道之光眀寵自雲霄風傳棨㦸竊以扶顛持危者宰相之職崇德報功者人主之心論勞逸雖異于成勳至燕安乃終于同樂晝烽夜燧既安遐邇之心燠館凉臺當處尊髙之府遂瞻營室而揆景乃法台階而建居惟其舉明主三代之隆是以得上公九命之制崇堂數仞安風雨之如山賀客一時喜簪纓之滿路遂肅鳴鸞之噦噦來臨大府之潭潭親屈六飛俯勤三接方雲天燕樂禮行于君臣父子之間而黎庶歡呼事繫于宗廟社稷之重恭惟格天道大調鼎功髙扶邦家纍卵之危繼明聖止戈之念銷兵不用致武偃而文修致治無為遂禮行而樂作帝安斯寢民奠厥居顧軫念於劬勞宜大新於輪奐賜鄼侯之第未比功名幸亞夫之營豈為榮曜某鈞陶小器螻蟻微情願維壯大之居永介期頥之壽隆恩厚禮曾未數于五侯盛德隆功將遂傳于八葉謝禮兵部架閣官啓分曹領事久罹管庫之勞拜命易官但謹簿書之分便從已請恩豈人為竊以書契肇于伏羲之初字畫變於蒼頡之後事為寖廣文字滋多吏疲刀筆之勞書極權衡之重文移載路案牘如山況六曹分𨽻于四司而庶務統臨于諸道考本朝之故事蓋各掌于有司見今日之官儀喜再逢于盛世不圖除吏首辱疏恩伏遇位及三公功加百代屈人以不戰俾同堯舜之兵致治于無為仰格成康之俗未嘗遺鏃而定禍亂曾不旋踵而告太平既綏靜于邊方大恢張于治具祀無文而不秩綏神祇祖考之休官有廢而必修見典章文物之偹詢咨耆艾搜訪闕遺乃足百官之員以成一代之制初不與人而求偹至容擇地以圖安遂遣非才首承兹乏某敢不恪守修持力扶疲軟飢鷹在臂猶有待于一時老馬識塗詎可堪于千里當安螻蟻易足之分少酬造化曲成之私謝敕局删定官啓一官從祿久蠧太倉三尺讐書復塵妙選再置清閒之地益銜陶冶之恩佩德難忘論報無所伏念某性資昏鈍門地衰寒顧隻影以自憐念平生之寡欲蚤時操管嘗趻踔於功名晚歲泣塗撫凋零于鬢髮宜長故里歸讀舊書然而次山猶漫于為官政以陶令尚須於乞食人憐鼠技無取寸長自料蠅營僅能一飽豈意無名之寵忽加埀盡之年不俟終更復叨器使援此沉淪之迹成于頃刻之間聞命周章撫心驚懼伏遇格天道大輔世功高征車朝返于四埀驪御暮回于萬里開元之息邊事宋廣平之計為多貞觀之致太平封德彛之心必愧人皆樂成康措刑之治孰知本唐虞不戰之兵方大聖人之有為宜衆君子之畢集豈容疵賤尚此叨榮某敢不上體深仁力圖報效知漢髙帝約法之意止在三章而蕭丞相定律之功埀于萬世願少勤于刀筆庶永託于爐錘謝敕局政官啓入奏成書誤當賞格俯頒明命例易官資曾無刀筆之勞亦拜絲綸之寵名雖不稱恩實有歸竊以法雖粗而烏可不陳令一出而弗惟其反必明損益因革之義以修律令格式之文繄昔聖君皆由是道周王埀革豈無燕翼之詒謀商后承家必鑒先王之成憲況廟廊治定之日適禮樂制作之秋既稽考于舊章猶緝熙于大典載加參訂益謹布宣宜得修飾潤色之才以著寬大和平之治退循幾極無取分毫習唐室之憲章苐慚賈傅通漢家之世務豈若倪寬何此濫恩亦霑寒士伏遇致君堯舜濟世成康兵既偃于修文治乃期于止辟謂明主𢎞九重之化雖獨運于聖神而有司遵三尺之文所宜頒于詔令偹條章之上疏頒賞典於維均固知無實而得名亦幸因人而成事叨䝉大施猥録微才俾稍拔于選曹將漸塵于朝列某敢不捫心自幸竭力扶衰拳曲小枝既誤䝉于斤斧虺隤老馬寧敢後于駑駘庶遂晚塗仰酬大造謝樞密院編修官啓史局揖官已久慚於尸素樞庭就列曽不俟于終更雖大造之曲成顧小才之安用但虞非分疇敢為榮伏念某蓬蓽餘生桑榆暮景頃由羇旅猥玷冠裳初無科第而入官不循州縣而改秩既嵗乏羣吏之最徒月費水衡之錢拂几讀書得文字優閒之樂掩門晝卧無官曹拜伏之勞如是者蓋七年于兹論功焉則寸長何取方虞簡黜遽辱甄庸未躬耒耨于田廬猶使編摩於政府豈繄寡薄亦預記憐仰慚滲漉之恩下被朽枯之質伏遇道侔伊吕功蓋管蕭韙兹不世之才大創無前之績長蛇豐豕寧勞叱咤之餘玉戚朱干遂底文明之治謂聖世典章既已偹具則太平事業何以復加唯需小大之協心相與維持而共守不期暮齒值此昌時某敢不進竭愚駑退安寒陋庶效勤于絲髮冀少雪于叨踰雖恩若邱山義有難酬之重而情均金石中含不變之堅謝權實録院檢討官啓制命由中攝官非次自揣見聞之陋莫裨搜講之勤讐正舊章既誦金科之目鋪張大烈復窺汗簡之文五換律於嵗華兩備員於宰府退量忝冒徒切驚危兹蓋伏遇上為聖朝廣開賢路乃大明于黜陟爰登用于賢能一德同心共底嵓廊之治竒言異行不逃斧鉞之誅豈曰妄庸之人可以僥幸而得而乃憫其窮悴被以光華淬磨一割之刀固難施于游刃黼黻百年之本猶不棄於朽株假以他官使有常祿況偹史館文字之職為儒生幸㑹之榮博極羣書無胸中七略之富鋪張偉績愧史氏三長之稱聞命為憂獲愆是懼某敢不乘千載方興之運樂平生難遇之時夙夜維勤死生一致雖暫承人乏實有愧于前賢而內畏師言冀少申于晚節賀强奉直知常州啓恭審奉制明庭擁麾大府官唯平進固嘗嘆十年之淹政必上聞當不過三月之久㑹聖書之一出喜公議之猶存人患無稱才難終蔽恭惟衆推宿望世號名家積盛德以至深藴高才而不露平時許可目短曹劉壯歲功名心卑管晏果臨戎而不懼知有勇之為仁念昔冦攘俯臨治境兵方持滿公獨解衣援孤壘之將沉脫羣生於埀盡人期結草誰復抗章雖盛烈之不讐顧忠風之未泯稍優倚重用激疲庸名當流於千百載之間事蓋白于二十年之後享人生五馬之貴固已恨遲饜筋下萬錢之餘猶為未晚某昔同氓庶獲免鯨鯢幸盛事之親逢悵餘生之已老勉從寸祿方為酒毋而助榷酤退省私心願隨厦燕而陪賀客賀秦太師改封益國公啓通爟火以親祠爰重配天之義載太常而紀績首疏胙土之恩既申錫于隆名乃對揚于休命衣冠歆艷宗社滋榮恭唯盛德體仁陰功及物休兵解甲知黷武之無威繼好息民故交鄰而有道邊烽盡滅使幣相望俾狂瀾既倒而復回本善師陳而能勝雖盡忠竭節在臯夔稷契而不過至扶顛持危豈房杜姚宋之可及禮樂因斯而大偹君臣俱欲于無為乃即南郊以秩元祀神倉積而粢盛必潔景鐘奏而律吕遂諧蒼璧蕆儀八陛合圓丘之制清臺占象五星呈同色之祥大禮既成淵衷載喜謂告太平乃文祖之德而祀明堂則周公其人揭一德之名本取精忠之意錫益都之號又歸輔弼之功皆出聖神之自知考諸書傳而未有某論才雖陋感德則深草木至微亦繫造化生成之數蟲魚遂性豈無游咏鼓舞之情乎回鄭教授啓昔年姑孰稔聞鄰境之聲投老江干忽有同寮之幸况曲貽于妙制尤深激于懦衷恭惟學貫羣書身兼數器漢庭射策已巍中于賢科泮水采芹想常資於善教觀文詞之秀發知師友之淵源戴侍中之談經行聞重席鄭廣文之好客寧恨無氊某竊專城年將謝事唯恐鈍遲而獲罪庶依强敏以扶衰千里聞風固難忘于傾倒一樽相屬幸將托于遊從即遂瞻承預增欣躍回永興令啓歸老故鄉未能投紱剖符中禁遽竊為邦賴遊刃之有餘庶因人而成事見賢良邇為幸實多伏惟儉以能勤寬而有制令行三月共歌仁政之成歲熟千家坐致齊民之富將見三春之馴雉何妨一笑以鳴琴藹著休聲合登善最某衰難堪事拙且自安驅馳行役之間想像風猷之勝即瞻標矩預切歡欣到任謝田太尉啓持版偏州始從羣事宣威幕府偶托巨庥未諧維石之瞻徒抱搖旌之念跂崇墉而尚逺馳謝牘以猶稽恭惟韜略名家公忠許國任已肩于三事勳久塞于兩儀早輸社稷之中自致風雲之㑹漢文景之諸將李將軍之技無雙唐肅代之名臣郭尚父之功第一行膺異數用答元勳某來自日邊已臨江表方布宣于詔㫖況交肅於軍容望灞上之營屯瞻風密邇拜禁中之召節聞命匪遙到任謝秦太史啓竊食行都久塵下執分疆列郡復玷明恩念寵賁以無名揣中虛而增惕已偕父老共慶隆平伏念少小授書蒼華為吏進瞻表著未親州縣之民亟佩印章莫任承宣之責用雖榮于躐次心實懼于罔功唯有奉聖朝寬大之書可以希昔人平易之政盡循三尺固當欽慎以無違恪守一心猶恐疲駑而敗事夫何差擇偶及竒窮兹蓋伏遇位極三公任專一相印銷六國陋子房輔漢之功干舞兩階啓大舜格苗之義回曩歲好爭之俗悉為平時無事之民致兹假守于桑榆亦使例安于符竹某誓堅末節上報殊私歲且豐穰敢自書于下考士雖寡少願敦勸於諸生尚可助太平粉飾之華庶幾效俗吏涓塵之報謝秦觀文啓觀上國之光屢更堯歷竊太倉之粟遂綰漢章爰奉詔音已親郡事恩非有自幸豈得斯竊惟當今號稱極治國是既定人敢異心民風大同下無殊俗躐羣賢而並進底庶政以為隆氣叶于朝薰作太平之氣象和于野肇為豐歲之祥况永興邈在大江之南於列郡最為無事之地山川襟帶魚稻阜蕃訟簡民恬本廟堂調一之效力疏政拙享庶邦燕息之娛致是疲癃坐安歲月伏遇望高巖石位列台纒斧扆臨朝㑹風雲于千載衮衣調鼎知中外之一辭雖雍容侍讀之間有密勿進思之助人情所繫主意謂何將踵前修即膺後拜某久瞻釣席猥庇餘庥朽櫟不才託社垣而增重華顛為用畀羣壘以非宜力圖報塞之方誓有糜捐之日與江州守李郎中啓守附庸之國敢忘事大之心依唇齒之邦竊有善鄰之願况兹假道獲遂瞻風跂森㦸以非遙喜登門之有日尚羇行役如奉笑言恭惟才智兼高聲名四出雍容華省號表著之羽儀綏阜逺民作東南之藩屏逮入境而問俗知為政之有方豈弟慈祥醖為豐歲敦龎純固藹著餘風既善最之攸聞顧召節之甚邇某猥分郡寄行見吏師仰君子學道之成久欽仁術慕善人為邦之效願授至言期進覿于威儀可盡陳于悃素謝總領汪大卿啓四方隨牒久去高門千里拜恩獲依天府未作終焉之計偶臨蕞爾之邦弱植有依私心倍喜伏念某年齡寢暮筋力俱衰求遂兔裘之營蓋將安往誰作綈袍之念殊復可憐豈謂廟堂尚分符竹况斡旋軍賦方持諸道之權而霑丐恩波尚倚門生之舊庶容疲軟假悉須㬰恭惟位在九卿望傾百職自出持於使節忽屢易於嵗華足食足兵自得理財之術載櫜載戢助成偃武之功明效益隆公議甚久當乘鋒傳亟上鑾坡某懷紱去家脂車就道已差朔旦躬布治條效小邦厞屨之供疇敢忘於公上待明主嵓廊之峻恐遂失于依歸回張侍制啓拜寵明庭升華內閣猥參朝議敢先慶牘之馳辱貺箋藤獲玩摛章之麗禮逾其分愧切于中恭惟氣直以剛文多而富才猷宏逺而甚偉識度高明而不凡頃去中華寖更年歲來從絶域驚仗節之猶歸獻存異書笑象龍之何用忠信既行于蠻貊聲名旋達于至神果聫禁闥之榮猶奉真祠之請眷懷優重節義光明某久慕風規素懷傾屬兹曲䝉於寵記徒倍切于瞻風秋暑向闌德履增粹念江山之攸阻欲拜舞以何由謝喜雪詩啓上帝埀休偶同雲之應禱騷人流詠繼白雪以成歌不敢貪天之功自顧何力之有過䝉褒拂殊佩寵光隴上麥生幸已占於豐歲樽中酒滿將遂切于餘閒謝沈祕校啓舊社未歸念餘生之老矣故人相見追往事以凄然更沐新詩少光衰緒人間聚散真乘鴈之去來句裏風流慰飛蓬之飄泊過情埀譽佩德興懷未遑持刺以踵門聊復引詞而叙意謝王祕校啓竊祿何功固深慚於善政逃名甚久猶及見於斯文諒非儕俗之言頗有凌雲之氣一枝笑折知難弟之先登萬選何疑料巍科之必中黃鵠即看于高舉老馬無意于長鳴徒辱下臨夫復何補未遑投謁尤極感懷謝吳祕校少年習氣固知嗜好之殊晚歲高文頓復神明之觀逃空虛而甚久聞韶濩以殊驚顧此蒼顔華髮之餘敢佩明珠白璧之賜永言為好何日可忘謝何秀才惠書都騎見臨高文為贄窺華詞于製作知妙學之淵源嚴什襲之常書疇敢忘于雅好修片言之報札姑自志於中心謝沈解元驅車入境已盡覽于湖山斂袵登堂又辱貽于珠玉顧英詞之秀發增朽質之光華佩厚意以難忘揣過情而甚恐誓收微效少禆疲瘵之餘庶接髙談獲奉從游之末太倉稊米集卷五十五
