body:
  text: 太倉稊米集巻十宋周紫芝撰詩四十四首題聖龍泉時方避賊山中泉聲來自古龍湫山底驚雷萬壑秋濺雹打窻空破夢飛流無盡不湔愁次韻伯尹食糟民示趙鵬翔十年用兵九不熟人家有田不種穀盡枯膏血作軍儲却買官糟貯飢腹冨者鬻田貧鬻妻夜困桁楊曉敲朴長腰一粒不下咽輸入官倉常滿屋昔年貫朽内府錢諸公何苦開漢邊自從代馬飲江水便恐黔首流飢涎黄塵白骨尚滿眼錦裘繡㡌誰當前烹羊炰羔固不惡飢民食糟真可憐元矦幕下短主簿肯與斯民作調䕶不愁吏考拙催科寧脫青衫賦歸去詹侯老文稱大手樂府詩髙古無有安得狂歌徹聖明便叱風雷清九有却驅羣賊作良農還我昭陵舊丁口山中避盗後十首喪亂今猶爾安危了未分叛𦍑初射月羣盗忽如雲妙畧歸諸將深憂軫聖君灞陵逢醉尉應有故將軍二避地今猶雪移家春復深豈無花到眼可奈鳥驚心茶動容時摘蘭香得細尋山中有幽事青犢未成禽三浩蕩奔流急倉黄突騎來擁旌方滿目縱炬巳成灰去踏青山道歸看白骨堆須煩郭中令一為洗氛埃四横道俱虵豕親交信絶疎别來應隔嵗亂定始收書轉徙移家後存亡雪涕餘微生一螻蟻播越念皇輿五夜燧餘三月新愁有百端驚魂頻雨泣枵腹任風餐射雉山居險薫狐穴處難敵來猶可爾冦至不勝殘六黯幓春歸日荒凉賊後村皷猶聞去寨火未息平原不恨室廬盡重欣老稚存此方惟是姥亦復飯王孫七今日報賊去下山猶復遲羣兒收淚笑老眼顧人疑夢入鄉闗屢魂應軀幹離一春三避賊十事九成悲八翠巘幾曲折徃來三數家搗皮催作紙擁焙看烘茶山盡始見日溪晴時露沙武陵知便是隔岸有桃花九賊去方燒縣兵來復打城艱難唯有骨生死兩無情欲住家何有謀歸計未成人言李御史滿腹是精神十可怪子劉子全家肯見存長分夜雨榻復共草堂樽磊落吾何取笑言君益温它時此心在結草報深恩侯元進賦待鳯堂佳句見邀同作見說封君竹風枝飽嵗寒㑹看雙鸑鷟飛下碧琅玕惡鳥良復厭閒花吹自殘絶知門可欵夢對小檀欒題趙鈐家墨牛圖昔我築室花姑川短蓑青㡌耕春田一犁落盡菖葉雨雙犢自分春草眠向晚歸來臥牛背小巷疎林日猶在繫牛柳下門未闗隣翁攜酒牛邊醉囘頭往事無十年田入冨家牛賣錢草荒春隴賊燒屋十口有家無一椽眼昏頭禿不如意此畫一見心惘然河間豈是田家子書多自可天禄比平生眼厭玉驊騮水牯作圖聊復爾北陌東阡喚未歸空遣農人告春事田間望月看吳牛老子從來乃如此便當火急解龍泉換取四蹄耕雨水賊後收拾殘書作此生空作短檠痴老去猶慙閱市資豈有鄴書猶挿架更無班史可充飢今朝過眼亡三篋它日還君欠一瓻亂葉紛披在懸磬春風可是故相欺燕欲來巢亂後烏衣巷欲空擬尋茅舍伴蓑翁戲將鶵去春風裡銜得泥歸暮雨中炙手不嫌門户冷傍人如獻語言工明年記取來時節應是桃花滿院紅三月三夜得梅花數枝燈下作故人逺客天一涯寄我萬里風前枝方壺含澌不受汙可着玉樹瑤林姿孤芳妙質不可說天香肯復須人知老人不作世間夢但見玉友如兒時急張青燈當明月要看疎影横屏幃花寒不睡斗欲落笑語似與人追隨持杯未怪此宵樂論情忍負平生期囘頭却憶青山道處處相逢花不老短籬飛雪山更寒古木啼烏月催曉清魂屢往途路遙故人久别相知少只今如此邂逅何莫厭詩成苦相惱桓公祠蘓峻兵方急桓公氣未平一身唯死節四海但孤城嵗月人間夢功勲紙上名可憐山下老澆酒問陰晴次韵元進寒食感事寒食江天雨弄晴夕陽花草一川明持盃欲下它鄉淚上冡寧無故國情漸喜三春逢禁火㑹須五斗解朝酲知君屢作東萊夢我亦飄零歎此生次韻元進再示屋角鳴鳩喚晚晴眼驚新火一畨明兵戈處處傷時事花柳村村惱客情無復御廊分冷食只將蹋鞠醒春酲德公上塜知何日滿眼春愁太瘦生雨後過琴南岩夜雨喧旅枕曉徑深春泥奔流自山來轉眼忽渺瀰微生抱羇蹇老病凌欹危青山岌當前客意恍若遺空崖倚天立怪石從雲埀雲間笙簫聲隱約天風吹斯人已仙去孤蹤邈何之釣石屹中流誰來把綸絲一水繞山麓淺碧涵漣漪長年抗塵容照水羞華髭羡門不可遇惜哉吾巳衰人生不學仙萬冡空纍纍于今豈未可撫事聊歔欷讀樞密張公梅雪二詩公諱叔夜禁中頗牧誰最良上前論事張子房張公九尺鬚眉蒼談兵說劍眼為方金城有䇿若未試便恐談笑無戎羌時平不用臨邊手乞得南州作醉郷黄堂酒盡客未起清畎風多禾自長只今白雪醉中句猶帶東閣官梅香單于敢挽射日弩當年誰上東封章王城三月斷信息賊軍螘附方跳梁白頭侍郎最先至擁兵直入趨咸陽中人傳詔天為喜戎師夜遁軍威張太宰官髙亦動色毬路帶禠腰金黄功名無成落邊土此老此功誰更數想得韋韝毳幕寒夜聽邊聲淚如雨次韻元進以長句見勉一雨俱囘草木春槁枝着葉定何因煩君筆厎三昧句洗我胸中千斛塵憂患此生真已了風烟萬里正愁人白頭攘臂干戈裡欲遣何人喚孔賔次韻元進病中書懷一竿烟雨釣羊裘稍負初心只自羞擬學倦飛雙去鳥可憐無定一虚舟未成大隱定小隱為用人謀更鬼謀君有胸中經濟䇿不須猶說二冝休次韻元進書事七尺看君玉作山倦遊莫賦鳥知還大椿本自八千嵗天馬終縻十二閑笑我生涯真草草如公人物未班班他時一枕江南夢猶記相從水石間次韻元素見寄吾曹心事寄微言此意難從世俗論妙句已先醒醉夢尺書何止到寒温因縁只睡心情懶習氣唯書眼力昬知有草廬能避地滿村烟雨一柴門次韻奉荅馮逺猷翩翩綺紈子粲粲潔衣服朱門酒肉臭不飽膏䍘腹凄迷百草中得比蘭與玉手持白瑤琴欲皷朱絃曲閟兹清廟音未易可流俗名家千里駒歴塊步巳獨妙年振華鑣肯折鹽車軸中原暗風塵國步日窘促勒銘樹髙勲要是一䕫足期君乃如此使我安小築劉將軍寳刀歌將軍寳刀玉三尺夜半有光如日赤蒼水使者誰敢捫蓬頭劍士眼不識鸊鵜膏瑩秋水光切玉如泥不動芒秋風夜作蛟龍吼人言乃是真干將知君老將家有種談兵論事書撑腸不願君持此刀日解三千牛願刳月支作飲器却纒錦絛朝未央妖腰亂領不自保豐狐老猘誰跳梁酒酣起舞為君語時危此劍知難藏雨過池面過小雨樹腰生夕陽雲分一山翠風與數荷香素月自有約緑𤓰初可嘗鸕鷀莫飛去留此伴新凉五月十八日魏宗明官舍作黄塵白骨已無人青谷朱樓尚有村今夜三更山吐月共傾雙淚看金盆蔡長源以老馬見借駑甚戲作羸驂已老莫嗔渠涉世迂疎我自愚馬不能言當臆對未知吾孰與君駑吳思道示藏海小集文物風流數建安此生猶及見波瀾清詩更遣何人到餘子懸知一笑看猶恐向來無鮑謝謾勞當日話吳韓事見李姑溪跋尾知君有意分膏馥老眼空驚白雪寒讀鄭公奉使録勁敵難交玉帛歡只因獻納是爭端鄭公不請長纓去有口真堪伐可汗諸公有意勒燕然不道昭陵閉玉闗却遣氊裘窺漢鼎拜公遺像獨何顔小蔡許借徐詩未至馬中未必無驊騮人中豈可無曺劉龍媒西來幾萬里異士一出三千秋李白坐詩竄夜郎退之論佛流潮州天公可笑無老眼兩翁憔悴令人愁平生四海黄太史長庚配月何曽死西江自是南國紀公有髙名政如此人言此老酷似舅坐上拈花獨公喜分得西江一𣲖流萬古正須公一洗我老耽詩空瘠臞起死鍼盲正要渠子豈有意能起予書來并寄囊中珠次韻費茂和風月亭新成十室熈熈俗自恬令君豈弟不多嚴簿書遣吏且堆案風月撩人時到簷賸種幽花無限好滿傾春酒十分甜何勞結屋深防客清節如君有厎嫌孫耘老酒間出麻姑像要余作詩青絲一尺髙鬔鬆玉顔微駐丹砂紅雲軿飛來自何許滿山落葉元無蹤長天如烟月如霧便恐乘鸞月邊去煩君急與問中郎從此更誰知癢處夏熱歎祝融當權不可奪海水欲沸山欲裂黄頭父老見事多謂有此身無此熱老人何得怨天公山堂日日多南風烏紗欹㡌剪雲葉白髸吹雪飛鬔鬆已挹蔗漿澆熱惱更注井花囘睡容人生如此亦不惡飽食安坐初何功蒙塵况駐奉天輦避暑望幸驪山宫敵兵入漢作巢窟戰騎横戈嵗馳突旌旗耀日紅蔽天鐵甲烘雲氣銷骨安得壯士如惡來上訴帝閽闗鑰開盡㵼天河作飛雨四海八方無一埃秋禾不槁敵不來我亦髙枕喧春雷送許體之守貴州人物久衰謝斯文寄渺茫先生推老成詞采今擅場交遊數輩行猶及晁與張大坡渺雲漢小坡與相羊豈兹絲綸手不入鵷鷺行爾來南中守雨露新漢章南中俱樂土佩帶安農桑銅花秀鎧甲芝菌生桁楊霜林茘子熟釀瓮千家香使君嘯鈴閣賓客醉髙堂古來多循吏治行何曾彰願公飲無何坐使斯民康許貴州出蘇叔黨老坡騎鯨上天去小坡落筆如風雨能添老樹着岩間為石傳神自翁語兩坡俱死真可惜君有一拳何處得誰向九原呼此翁為我五日畫一石立秋前三日夜雨殘漏催燈暗風梧帶雨鳴細聽驚夢㸃渾作斷腸聲乍冷秋應近無眠句又成愁多推不去頭白更憂兵亂後併得陶杜二集少陵有句皆憂國陶令無詩不說歸常恨兩翁埋槁壤頓驚雙璧墮窮扉風催錦里花枝少草長江南豆葉稀自古髙才多寂寞遺編讀盡淚頻揮讀徐伯逺書外家遺事作二絶句以紀之并序繁昌焦洧之妻洪鴻父女也一日遇巨盗于江中不受賊汙投江而死兩侍兒大曰冝思小曰勻奴善琵琶有姿色皆吳氏女本姊妹也亦相隨赴水焉洧葢伯逺之舅故著其事甚詳就死由來不自疑玉顔那為賊鋒低了知今日投淵婦猶勝當年斷臂妻殺氣駸駸戰艦驕春江漫漫濕金翹但將紅袖供歌舞却為周郎笑二喬太倉稊米集巻十
