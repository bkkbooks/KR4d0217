body:
  text: 太倉稊米集卷四十四宋周紫芝撰論五首鯀論聖人有利天下之心而不以利天下為名故興天下之大利利既立而人不知世之人雖欲以利天下之名而歸之不可得也後世之君以利天下為名而不以利天下為心其興天下之大利也汲汲然惟恐天下之人不歸其功彼雖名於利民其實急於為巳而巳聖人不以利天下為名則其為利也要在責其實效而未嘗急於成功故欲舉其人而用之不敢自謂巳知其人必先謀之於衆衆皆以謂可矣猶以為未也於是必試而用之以謂試而其事有不可以歲月期者吾亦安敢亟其成哉姑亦俟之云爾此豈非聖人不急於利天下之名每欲收其利天下之心而然歟後之人君則不然天下之利茍可以興則無不為不恤其為民之害也夫興其利而不恤其害用其人而不問其可否則是以其不可興之利而責其不可用之人也於是又嚴其督責而誘以厚利天下之人被實害此豈非以利天下為名不以利天下為心而然歟堯為天下君斯民不幸溺於昏墊之苦天下之人嗷嗷然有冀於仁人君子之拯其溺可謂急於救患之時也鯀之治水至於九載績用弗成而後巳何也蓋堯知洪水之患懷山襄陵非積以歲月之久則不足以除天下之大害而興天下之大利是以試之必待於九年凡以堯之心在於利天下而不茍於成功故也觀書稱禹之治水弼成五服至於五千州十有二師先儒以謂二千五百人為師十二國蓋三萬人合九州之數則二十七萬人謂禹治水用二十七萬人為庸其説雖無所經見未必不出於此使其或然也則其起徒役可謂衆矣非特其起徒役之衆如此至於乘四載具畚鍤舉九州而供之猶恐其不足非假以歲月而責其成無乃幾於病天下歟夫欲興天下之利而不恤天下之病此豈聖人之用心哉然則堯不責鯀以成功之速而必待於九年非為鯀計為天下計也天下之人知堯所以望鯀者其利不在於目前而在於後世假以歲月其心非私於鯀而在於天下則鯀之不能成功何損於堯之仁且聖乎高宗之伐鬼方周公之誅三監皆以三年而後克夫以仁義之兵而討有罪舉六卿之全軍而平一方之難疑若易於摧枯湯雪而彼猶待於三年之久者亦以其志在於愛民而不敢亟於成功故也况洪水之害在於天下鯀治之九載而不成禹繼之又十有三載乃同父子相繼二十有二年而後告厥成功其成也夫豈易哉漢武帝鋭然有好治之意公孫宏迎合帝旨以謂周公期年而變臣尚竊遲之公孫宏何人哉乃敢自比於周公而猶以謂其才過之急於成功如此使武帝在位五十餘年天下未嘗一日安枕而卧宏之罪亦大矣嗚呼安得以帝堯試鯀之事而告之耶伯夷論自古聖賢立言以埀世其意之所主蓋不一而足後之誦其言者當略其辭而取其意則庶幾其有得矣孔子孟子列禦冦莊周此四人者皆所謂立言以埀世者也然而孔子孟子其立言也正此道之所以明也至於列禦冦莊周之徒則其立言也怪其衛道也緩乃旁引而曲説陽攻而隂援之使人因怪以歸於正其為言雖不切於事亦不可謂無力於天下後世者矣孔子之論武王也曰武盡美矣未盡善也孟子之論武王也曰湯武反之是二聖人之言固巳微寓其意以曉天下後世使天下後世知武王之用心為不得巳也至於莊周之言則曰堯不慈舜不孝禹偏枯湯放桀武王伐紂其為言得無少貶乎若周之意則將以使後之取天下者不得以湯武而為之辭則武王之道尊矣其於武王陽雖攻之隂實有助焉西伯即位五十年而武王立九年而上祭於畢畢蓋文王之墓也是歲東觀兵至於孟津而載木主以伐紂伯夷叩馬而諫曰父死不葬可謂孝乎天下苦於紂久矣武王仗大義順人心以救民塗炭之中其為仁也亦大矣今伯夷叩馬而諫曰以臣弒君可謂仁乎余嘗疑其言之不出於孔子孟子司馬子而出於莊周之徒為寓言以隂援武王者也學者不復求遷之意遂以遷為多舛以謂遷自立此論亦巳誤矣史記一書皆遷博採先秦古書而備載之則亦安知其説之不出於莊周之徒歟或曰伯夷之不食周粟何也曰伯夷以周之粟為不義之粟而不食也曰周之粟義乎其不義乎曰伯夷之心天下之心也天下之心聖人之心也天下以為義聖人亦以為義而伯夷獨以為不義則伯夷無乃幾於愚乎此無他蓋武王得聖人之義而伯夷得聖人之清也若孟子則可謂善言伯夷者矣不然則伯夷之餓而死也與陳仲子之餓而死也是或一道爾此豈所以論伯夷者哉介之推論名者天下之公器雖聖人不可得而私然名之在天下有豫之而弗受者有受之而弗却者有欲得之而必爭者固不可以一概量天下之心也豫之而勿受則有道之士離世遁迹以自晦於無用之地者之所為也其為人世固不常有有之則可以激貪而勵俗矣受之而勿却則修巳篤行之士無意於名而名歸之者也其為人亦行其所當行得其所當得而巳其於名猶未竊竊然也乃若欲得之而必爭者則異於是矣志在於功名心淫於富貴得之則踴躍而自喜奪之則憔悴而無聊彼恐其名之不髙而有以軋之也此其於名雖與夫盜而有之者不可同日而語其視畏名而逃之與夫無意於名而名歸之者固有間矣夫修五伯之業以服諸侯者晉文也輔文公之行以反晉國者五人也初文公之出五人者從而輔之所以轉徙於道塗流離於羇旅至於險阻艱難之備嘗而不憚者無他知重耳之賢必反國而有之也及重耳之將入也四人者皆留獨之推逃而去之此豈人之情也哉殆有奪其名而軋之者矣舅犯是也且五人者負羇絏以從奔走之役其勞則均也周流天下十有九年其久則均也所謂五蛇為輔挾之以飛皆當時之賢士其人則均也及文公之反國乃與舅犯為投璧之盟曰若反國而不與子犯共者河伯視之之推聞而大笑曰天實開之而子犯以為已功吾不忍與同位矣乃棄之而去隱於綿上然則之推之去也蓋有以哉而左邱明司馬遷之徒似若以文公為不能用之推者豈亦未之思耶方文公反國而賞從亡之臣不及壺叔文公曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力助我無補吾闕者三賞之後固且及此晉國聞之大悅夫以文公之賢其明於賞罰之序如此投璧之盟豈固私於舅犯哉於五人之中其必有當先於此者矣之推不能究文公之意一聞其言則窮日之力而去何其遽也然則貪天之功以為已力之推非有怨於舅犯也蓋託舅犯以發其憤悱之辭而為之説耳議者又謂人亦孰不欲富貴當文公處困窮之時則﨑嶇而從之及反國而有千乘反疾走而逃之此罪不在於之推而失在於文公也使文公不私於舅犯豈有是哉曰審如是是亦之推之罪也何以言之夫為人臣者有賢則相薦有功則相遜功髙而賞及之猶當曰是功也我何力之有焉况功與人等或出其下者哉之推不明乎此見投璧之盟則不勝其忿而亟去之此非有意於濟世以輔其君者區區之意特在於名髙而惡人之軋其己焉耳吁可怪哉漢髙帝論帝王御世之術有二誠與不誠而巳矣御之以誠則人將以誠應之此治之所由生也御之以不誠則人將以不誠應之此亂之所由起也聖人知天下之心可以誠格而不可以狙詐劫也於是推吾誠心以感之天下知聖人之心可以誠應而不可以姦罔欺也於是亦推吾誠心以事之是以誠意相感於無形之中不言而喻不約而侔歡欣交通而天下之情得矣然則聖人之所謂誠者果何物也哉曰心而巳矣蓋公其心以冒天下而容之者所謂誠也私其心以籠天下而疑之者所謂不誠也二者相去其間不能以寸而人不知此天下所以常亂而不治也髙祖由布衣而登帝位自豐沛而兼四海其神武不世之略秦漢以來一人而巳馬遷班固之徒相與論述其事咸謂其寬仁而能愛人豁達而有大度余獨以謂不然髙祖之初天下既定一時功臣大者南面而王小者猶不失為列侯論功行賞以次受封非不足以滿其志願宜若可以無事矣乃復叛亂相繼兵無休日考之於書漢之異姓而王者八人其後舉兵而叛者六國獨張耳吳苪僅以智免此其咎安在哉髙祖無豁達之度以容之故也夫髙祖以大度取天下而余獨以謂不然此聞者所以未免於笑也以余觀之韓信未嘗反髙祖疑之而反也其他雖不可以悉舉大抵皆髙祖疑之而反耳觀信以淮隂一介崛起從漢曽不旋踵虜魏王禽夏説下井陘誅成安脅燕定齊摧楚兵數十萬衆卒斬龍且西鄉以報當是之時可以唾手而反矣蒯通説之以叛至於再而不從信之言曰漢遇我厚吾豈可以見利而背恩信乎由是觀之信豈有意於反哉雲夢之遊執信而虜之髙祖始有疑信之心信亦自是怏怏失意反狀遂萌故曰韓信未嘗反髙祖疑之而反也陳狶之亂髙祖平之徵兵於梁而越稱病髙祖怒而責越矣夫越兵之不至安知其必叛哉髙祖不能使人物色之而遽數其罪者以其有疑越之心故也當是之時越來則被執不來則加兵與其如此孰若舉國以叛猶得免焉此越所以不得巳而反也故曰彭越未嘗反亦髙祖疑之而反也英布因隨何之言背楚而歸漢所以脫危亡之地以就萬全之計也及漢醢越以賜諸侯布見而怒於是聚兵旁郡以備非常此所謂惡傷其類見幾而作者也滕公曰前年殺彭越往年殺韓信三人皆同功一體之人也自疑于禍及身乃反耳故曰英布未嘗反亦髙祖疑之而反也賈誼之説文帝以謂強者先反淮隂王楚最強最先反盧綰最弱最後反此誼欲除尾大之禍故其言如此而不知諸將之叛初不在是特以髙祖不能推大度以容之耳是數人者勇力冠三軍功業軒天地皆當時之豪傑也獨不能容之度外一涉於疑似之迹則必致其竊斧之疑使其心不自安勢窮而亂惴惴然疑之惟恐其叛也而卒皆叛焉安在其為大度哉或曰市未嘗有虎也曽參未嘗殺人也使三人言之則智者必惑而慈母必信何則言之者衆而事未可知也人有告諸將以叛者奈何獨不信之乎曰人主之所為下之所視而鄉也人主而好諫也則忠臣出人主而好勇也則猛士至人主而好疑則必有挾可疑之事以投其隙者矣劉向曰執狐疑之心者來讒賊之口髙祖以疑心而遇人此告者之所以至也或又曰韓彭之叛固有之子何自而知髙祖之所以疑曰吾以蕭何而知之也何之守關中可以為腹心之寄矣猶且數加勞問且賜以衛卒五百微鮑生東陵之計殆於不免則髙祖於群臣未有不疑者况於武夫勇將英氣蓋世而功名震主者哉嗚呼髙祖與光武俱以雄略定亂而後世之論紛然雖范曄史家猶以冦鄧景賈所封不過大縣四曽不知光武推赤心以置人腹中而髙祖乃懷疑心以激諸將之亂也曄其可謂智乎朝錯論世之議者皆以朝錯不當削七國以發其怒及七國反以誅錯為名則景帝不得不殺錯以謝七國余以謂此特書生之談兒童之見耳蓋世之善論人者不以迹而以心其迹是也其心非也則世俗皆以為忠而君子以謂未見其所以為忠焉若王莽之安劉是也其心是也其迹非也世俗未必以為忠而君子以謂是乃所以為忠矣若朝錯之削七國是也七國之地髙祖之所封削之則為賊恩吳楚之君懷姦而未發激之則必至速禍故削書一出而七國果反連衡以叛天子憂勞王師四出而僅以仆滅錯亦可謂無䇿矣當是之時非特七國欲誅錯雖左右無不欲誅之者非特當時左右之不知錯後世雖賢如揚雄者亦以錯為愚景帝固知其為智囊而先入之言巳不可變雖欲活之計將安出此無他是皆觀其迹而終其心有不察焉者也為景帝者胡不察其心以謂錯所以削其國者為其一身計耶為天下計耶二者有所不能明則徐而思之以謂吳楚之君地大勢強日以滋橫鑄山煮海招亡集叛反狀巳萌特未有以發耳雖三尺之童知其必至於此也錯雖至愚豈不知削其地則必叛叛則禍必及巳錯所以不畏其禍而肯為其君言之者其心果安在哉蓋特以安國家而定社稷也察其心茍知其如此則左右大臣雖勸帝以殺錯勿殺可也惜乎孝景惑於一時之言倉皇無術而於錯之心有不察也初髙帝既定天下昆弟少諸子弱遂大封同姓以益維城之固悼惠王孽子也而王齊七十二城楚元王庶弟也而王楚四十城吳王兄子也而王吳五十餘城封三庶孽分天下半至其弊也則劉章以軍法行酒而追斬亡酒者吳太子奕棊爭道為皇太子提殺之皆以戲笑發怒於酒樽棊局之間而無所畏忌豈非脛大於腰指大於股其勢漸不可制歟賈生所以痛哭以謂失今不治必為痼疾後雖有扁鵲不能為也錯不自量盧扁有不能為者奮然欲以身任其責宜其速誅而不可救歟然而察錯之心則要在安劉氏而巳景帝不察其心此盎之説所以得行於疑似之間也或有以謂漢不誅朝錯無以折七國之兵猶唐不殺國忠無以弭祿山之禍孝景之殺錯豈得巳哉曰錯之忠豈可與國忠比孝景之治豈可與明皇論時國忠雖誅而祿山之難未必戢朝錯不誅七國將何為哉此其理較然易知者而景帝竟納盎言此殆不察其心而然歟或者又謂七國之難作錯不能捐身以當其危反使天子將兵而巳居守安在其為忠乎曰是乃所以為忠也錯知大臣之欲殺己而自將其兵則足未及旋而首巳墮於姦臣之手矣孰若使天子自將巳居其中扼姦臣之吭而控之則天子收戰勝之功而已不失忠臣之名豈非兩全之道歟帝不此之思而納盎之説此亦不察其心而然也然則為人君而不察其臣下之心則其殺忠臣而不悔者鮮矣太倉稊米集卷四十四
