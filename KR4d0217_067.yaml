body:
  text: 太倉稊米集巻六十七宋周紫芝撰書後二十四首書寒山詩後昔里人有豢二豕者呼屠者於門將以售之其一既就執其一輒逸去使人物色之不得後五日得之溝中以木葉覆其身氣息喘喘然若有所畏者建炎三四年間避盗山中賊持戈在後僅得以免夜宿山穴挽木葉以自蔽旦為積雪所埋幾不得出顧無異溝中之豕乃知衆生受命其畏死未甞不同此學佛者所以深戒乎殺也因書是詩於壁使兒曹誦之知至人之言皆真實語不可不信云書唐史遺事後自古帝王其始非無聰明勤儉之資卒至昏惑不悟馴致敗亡而不可救者固非一端然其大畧不過數事而已不牽於女子之愛則奪於宦䜿便嬖之人不溺於浮屠之言則惑於神仙不死之說此必然之勢也杜陽編載唐宣宗方即位之初衣必澣濯食無兼味時人至以比漢文焉後宫有疾命醫疾愈帝袖金十兩隂賜之醫者將拜遽命止之曰勿復使人知言出於外又令諫官上疏其儉靜畏言如此故太和之政庶幾貞觀之風而專務罷斥佛氏以革太宗之弊可謂善矣羅浮先生軒轅集者一方士耳乃召置内廷而尊事之問以長生之術其視太宗所為特好惡有所異耳觀軒轅談道有趣若可取者至益之以變怪則又似王喬左慈之徒果何補於治哉夫以中才易惑之君所好既已偏溺又從而惑以怪譎可喜事宜其迷而不之悟也書呂舎人帖後建炎間西洛呂公以尚書右丞作鎮宛陵門下客數輩皆一時名流又訪鄉里之士得四人而僕預焉今亡其二人矣公飲食教誨之無倦色間數日一見未甞不以人物為念問之諄諄不離口自是而公且閒矣某亦陸沈於世無所可用其後二十餘年公之子舍人遺余書且云先君子平生無所嗜好獨於當世賢士大夫見之唯恐不及雖在嶺表倉皇避冦亦未甞不以宣城諸賢為言也吁亦異矣哉以公之盛徳至善雖䝉陋如鄙人猶不忍棄况於士君子之賢者乎使公一日立朝其進退天下士當必有可觀者矣書曽處州雅詞後宣和間四海清平朝廷無事上皇一日置金椀於便殿命羣臣皆射中者得之矢數十發不能中固陵一矢輒貫其足羣臣歡呼咸謂天縱之聖又多能已而又命賦詞詞先成者賜之曹組先進乃得椀當時盛傳此曲今二十年復見於是集感嘆乆之其詞云秋勁風髙暗知手力添弓面靶分筠幹月到天心滿白羽流星飛上黄金椀胡沙鴈雲邊驚散壓盡天山箭二諸晁自無咎以文名世往往相繼間出次膺諸人小詞俱可喜大率是無咎一種風流如王謝子弟雖人物小大長短時有不同要皆是芝蘭玉樹耳書後湖帖後余平生慕蘇後湖之為人恨不一拜牀下晩與陳彦育游見其道後湖酒間風味筆底波瀾尤使人想見風采彦育與之周旋莫逆得此數牛腰非但惟徳其物其字畫咄咄遂逼老坡自當寳也書石鼎聮句後余觀韓退之敘軒轅彌明事似若有取焉至謂天且明道士起出門童子覔之無有也疑若飄然有仙去之狀余謂必不然夫所謂仙人者為其能物我兩忘去其爭氣與其怒心鋤其驕色而望之似木雞使異雞無敢應者然後仙可致焉彌明初邂逅叔起於劉師服家至則慢罵悻悻之氣悉寓句間凡聮句至老人者十而譏罵居其六龍頭縮菌蠢豕腹脹彭亨此一罵也繆當鼎鼐間妄使水火爭此二罵也秋𤓰未落蔕凍芋强抽萌此三罵也方當洪爐燃亦見小器盈此四罵也形模婦女笑度量兒童輕此五罵也時於蚯蚓竅微作蒼蠅鳴此六罵也不知彌明果有怒於二子而然耶其亦仙人游戲於言語文字間耶二子色沮氣䘮不能勝以一言甘心執筆低首哀鳴以求幸免大似可笑退之力詆異端而不主吾道雖不敢笑亦可疑為癡人說夢書二唐風憲記事後古人不避權貴以諌爭取禍蓋亦多矣未有父子一家相望兩朝赫然如唐氏之門者也賈太傅之孫有捐之魏鄭公之孫有謩僅能一言當時固巳號為能立門户况質肅之論燈毬錦林夫之詆王氏新法皆以論列大臣觸人主之怒豈不難哉書自作小詞後李公擇暮年學草書東坡見之言李十八草書似鸚鵡能言不過數句耳後數年趙徳麟復見之問吾書何如徳麟笑曰可作秦吉了矣僕頃嵗甞作中秋詞後三十年夜飲花下作木芙蕖詞二詞之作日月幾一世而語之工拙相去幾何豈非前一詞似鸚鵡後一詞可作秦吉了耶河朔郭元壽以此詞復求僕書其後偶記坡語聊作一笑書滄海遺珠後滄海遺珠者余手所錄近世諸家之作也其他絶妙好詞不可槩舉如張右史逸詩二絶得於口傳其一云寂寞江城數㸃燈恰如漁火照寒矰去年曽侍端門燕白玉欄干第一層又詩云臨分只待酒初酣畫舸亭亭繫碧潭不管波濤與風雨載將離恨過江南二詩絶妙如此而集中不載若此類者豈非所謂滄海之遺珠者乎集今二十巻他日繼有得焉蓋不止於此也書洪駒父香譜後歴陽沈諫議家昔號藏書最多者今世所傳香譜蓋諫議公所自集也以謂盡得諸家所載香事矣以今洪駒父所集觀之十分未得其一二也余在富川作妙香寮永興郭元壽賦長篇其後貴池丞劉君穎與余凡五賡其韻往返十篇所用香事頗多猶有一二事駒父譜中不錄者乃知世間書豈一耳目所能盡知自昔作類書者不知其幾家何甞有窮頃年在武林見丹陽陳彦育作類書自言今三十年矣如茘枝一門猶有一百二十餘事嗚呼博聞洽識之士固足以取重一時然迷入黒海蕩而不反者亦可為書淫傳癖之戒云書韓承㫖别集後讀玉山樵人詩脂澤之氣焄然滿懷使人想見風采至香奩則又殆有甚焉者也然渥當唐末宗社顛隮之際竄身於戈㦸森羅之中雖扈從重圍猶復有作當是之時獨能崢嶸於姦雄羣小之間自立議論不至詭隨唐史臣稱之以謂有一韓渥尚不能容况於賢者乎則知渥非荏苒於閨房袵席之上者特游戲於此耳頃時王荆公敘四家詩不取太白為其十詩九說婦人與酒然則渥之不見取於公又可知矣書初寮集後徽宗皇帝在位嵗乆文士詩人一時輩出不減元和長慶間人物如參政翟公待制韓公翰林汪公初寮先生王公皆以文辭自顯號為傑出不可跂及者餘未易殫數也初寮蓋文健而深詩麗而雅至於制誥渾厚足以風動四方則李公漢老以謂公當承平之世多褒揚粉澤之詞如傷居爾體痛在朕躬不得施於戰士弗為子孫之謀更存輔車之勢不得加於叛國嗚呼其盡之矣自往至今幾三十年諸公之墓木何止拱把讀之使人想見當時文采風流之勝劉夢得云休唱内前供奉曲正元朝士已無多是亦足以為初寮之嘆也書陵陽集後國家承平日乆朝廷無事人主以翰墨文字為樂當時文士操筆和墨摹寫太平紛然如韓子蒼題何太宰御賜畫喜雀詩有想得雪殘鳷鵲觀一雙飛上萬年枝之句不動斤斧有太平無事之象以此知粉飾治具者固不可以無其人也王摩詰說開元時事如池北池南草綠殿前殿後花紅亦是好句但如畫師著色畫屏風妙則妙矣奈未能免俗何大抵子蒼之詩極似張文潛淡泊而有思致竒麗而不雕刻未可以一言盡也書婆娑集後自古文詞之士班班相望不可勝數然其傾心翰墨沒溺於詞采章句之間能令人柔媚軟熟不自扶持槩以風節鮮有稱者亦其勢然也右正言崔公文詞髙秀句法清雄二者皆足以名世而危言讜論殊得諌臣體至於詆訾時宰譏評權要畧不少讋讀其奏疏使人聳然異之如著冠秉笏而見汲黯朱雲輩不待聞言使人加敬殆非前世留意於文翰者之所能仿彿也宋廣平之為人疑有鐵心石腸及作梅花賦則清豔便發有江南徐庾體讀婆娑之詩者其異於梅花之賦亦幾希矣書浮休生畫墁集後政和七八年間余在京師是時聞鬻書者忽印張芸叟集售者至於填塞衢巷事喧復禁如初蓋其遺風餘韻在人耳目不可掩蓋如此也前此當靖康間天下閧然皆歌東坡南遷詞所謂回首夕陽紅盡處應是長安者是也今臨川彫浮休全集有此詞乃元豐間芸叟謫郴州時舟過岳陽樓望君山所作也今日讀公南遷錄見之前二事皆恍然在數十年之外矣紹興辛未余來江西至九江太守李中行置酒庾樓樓上獨有芸叟一詩其後云萬里秋風吹鬢髮百年人事倚欄干知他落日能多少偏照淮南幾處山然後知東坡集中所載二詩為不止於此也書郭令公家傳後郭令公家傳十巻載公平生行事甚詳余後得師友談記言子儀鎮河中日河甚為患甞禱河伯曰水患止當以女奉妻巳而河復故道其女一日無疾而卒子儀以其骨塑之於廟至今祀之此一事唐新舊史皆不載家傳亦不載議者以謂吾聞大禹有治水之功而巳未聞以女餌河神也余曰人固不可以一概論天下事子儀割女子之愛以援千里之溺上忠其主下愛其民此亦人所難者人能捨其所易以觀其所難則子儀之事不可沒矣書梅聖俞碧雲駮後直講梅公聖俞以詩名家技絶古今聲滿天地文忠公在政府書問中猶稱聖俞二十五兄其為言豈不足以取信於當時碧雲駮者其所著小說也而文正范公先正潞公首所深詆讀者多不滿其意焉雖罵譏笑謔自是詩家者流然吾身不在朝廷職不當諫諍而訐其所短攻其所長專務以過掩公不免有惡居下流而訕上之失梅公於鄉里為丈人行固不當小有貶剝恐好事者託公之重以顯其書固不可知謂公為此書則決非也書夢溪丈人忘懷錄後沈翰林休居夢溪之上自號夢溪丈人作忘懷錄所記皆林下幽事筆談之所不載者其中乃有梅月調䕶赬帶一法議者譏其未能忘懷向使微風徐來飄飄然吹淵明之衣於斜川東臯之上則將安用彼帶為哉由是觀之淵明之去為真歸也與書譙郡先生文集後余頃得柯山集十巻於大梁羅仲共家巳而又得張龍閣集三十巻於内相汪彦章家已而又得張右史集七十巻於浙西漕臺先生之製作於是備矣今又得譙郡先生集一百巻於四川轉運副使南陽井公之子晦之然後知先生之詩文為最多當猶有網羅之所未盡者余將盡取數集削其重複一其有無以歸於所謂一百巻者以為先生之全書焉晦之泣為余言百巻之言皆先君無恙時貽書交舊而得之手自校讎為之是正凡一千八百三首歴數年而後成君能裒其所未得者以補其遺是亦先君子之志而某也與有榮耀焉因謂晦之他日有續得者不可以贅君家之集當為别集十巻以載其逸遺而巳書史記索隱後前人所為纘述後人從而貶剝之將以正前人之失也獨不知又從而貶之者出其後至於更相矛盾互為得失殆無時而巳焉史記一書成於司馬氏父子之手本出一家而其首尾舛錯嵗月顛倒不免時有繆誤此後人所以得而議之也晉有徐廣宋有裴駰南齊有鄒誕生大唐有劉伯莊各有音義見於注解不可謂無得然亦未免於失也今司馬貞又作索隱三十巻且自為之序以謂遷史比於班書微為古質故漢晉名賢未之見重豈其然乎班書所記獨一代之事猶二十年而後成史記上下數千載而其論述如出一時遷史簡嚴而叙事詳班史辭費而褒貶少遷之為文如行雲流水出於自然班固鏤金刻玉力盡愈竒要其大率皆依倣遷而為之者也謂其以古質不為人所推重何其繆哉貞所議論不可勝究姑以首篇較其乖誤餘固可知貞謂史有十二紀以象嵗星十二年而一周天也史有十表以法天之剛柔十日以記時也史有八書以法時有八節以成嵗也世家三十以法三十日而成月也列傳七十法人臣七十而致仕也百有三十篇以象閏餘而成嵗也遷作史記上自五帝下逮漢武世代之數豈出人為然則春秋十有二公自隱至哀豈亦法天之數而為之乎歴年二百四十有二孔子將何所取法哉所謂八節三十日與夫閏餘成嵗之說皆不可合也七十而致仕何闗列傳如滑稽龜䇿日者之類何預致仕是數者使兒童見之皆知其非固不待攻而明其失矣余所以言之非固欲為是紛紛也蓋傷貞之繆用心以貽笑後人而已矣書封演古今年號錄後堯舜三代雖帝王殊號前後異時要皆以徳而興故其受命甚永其歴數甚長當是時唯以人君即位之年為元年而已未聞其以號紀年也漢之文景雖有中元後元之稱然猶未有號也武帝喜功好武矜勇尚夸其心侈大欲以跨越古今其為號雖不同大率皆取瑞應如元鼎元狩之類是已後世因之於是神爵五鳯甘露黄龍河瑞河平之稱寖亦昌矣不然則取其乆安永固傳祚無窮之意如永建永壽永康永寧之稱猶十二三也人主之享國傳世豈不欲其乆逺而自古及今考之書傳唯有徳者為可乆茍為無徳雖强如秦富如隋皆不過一再傳而亡况區區紀年之號安能為有國乆長之計哉使人君而知此雖以元而紀年可也彼僭竊位號不傳正統一時亂臣賊子猶以改號為失國之䜟如齊髙之天保後周之宣正説者以其兆于天數而不知脩短之實繫於其人也吁可悲哉書岑參詩集後杜少陵用胸中萬巻之書作妙絶古今之句甞自言詩有神助而語不驚人雖死不休宜其傲睨凌蔑髙目一世以謂前無古人後無作者至於詩人文士間有可稱者未甞不力加推許至於再三或見於言語文字諄諄不已如髙詹事元道州與岑參輩皆其人也蓋物以類而相從人由意而相合臭味之同乃詩人之草木出於自然有不約而契者况其於一時人物汲汲然唯恐失之如近世歐文忠蘇内相之收拾文士要使盡出門下而後已參詩清麗有思殊復可喜觀少陵所謂岑參兄弟皆好竒攜我逺來游渼陂之句則亦可以得其為人之大畧矣書髙道傳後神仙之說出於荒忽有無之間怪譎而不足信誕謾而無所稽考以謂有耶其實未甞有以謂無耶則其事可傳其書具在君子亦有時取而言之余讀髙道傳觀其所載神仙百餘輩自初入道至於登仙嵓居而穴處草衣而木食近者不過一世逺者不過數十年一日異香滿室鶴御旋空雲幡絳節自天而下頃之則冉冉然已入於杳冥之間矣何其易且怪也有操是說以折之者其徒必曰是人素有仙骨且道行已成時至乃即行耳何難之有哉余獨不知上帝何為專意訪求黄冠羽衣使為輔翼仙官河岳主宰而陶洪景著論如西伯之聖漢文之賢僅得與之同列而已乃不得與此流顯陟霄漢以警動世俗何邪余甞反覆考究而不得其說又其事怪妄不經大率多類世間幻術蠻法如吐火割舌飛劍遁形絶食服氣之類是也是以學者於神仙之說每有疑焉揚子雲韓退之之徒所以力詆而痛排之固有謂也蓋二子以羽翼聖道自任不得不爾要之後人立論似不必專務依倣韓揚使神仙之說存於若有若無之間確然以吾道自任而已則是非判然而天下之理得矣太倉稊米集巻六十七
