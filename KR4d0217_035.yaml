body:
  text: 太倉稊米集卷三十五宋周紫芝撰詩四十六首夜宿堯城寒甚明日山中有薄雪馬上賦二詩剪水飛花點翠巒未教全放玉孱顔分明六曲屏風樣和雪新描著色山雲意悠悠晚尚堅玉塵猶未破清寒不知誰把千巖雪付與詩翁馬上看梅山宗老惠近詩明日自山中來訪余堯城驛二首梅山寄我近來詩便恐諸郎氣盡低雙井派中真法嗣莫將輕比順闍黎參得詩中句外禪頗知經歲杜禪關要須覿面親分付不免煩君一下山過狄梁公墓髙后王諸吕漢鼎幾半傾絳侯入北軍有意誅鯢鯨兵纒未央殿血濺長安城祿輩僅誅滅四海殊雷驚唐家女主禍未可方西京艾猳剪宗枝賊計殊未成三思本么麼白面不足黥舉朝無直節但畏羅織刑梁公挾大計赤手無寸兵為言不祔姑禍止談笑平功比漢諸人優劣不用評事茍以理勝口舌亦可爭師曲舉必敗勢力未易憑老婦雖至愚理在見自明不然此危邦詎可一言興琵琶亭二絶舊事無人作短行湓江空自繞湓城黃蘆苦竹依然在猶替琵琶作怨聲捍撥難傳不盡情琵聲裁盡繼琶聲風流掃地無人説只有空江舊月明陪李使君登庾樓是日雲霧不見淮山跨江雲夢不勝寬樓在江聲洶湧間試看坐中尋得句説君眼力盡時山樓前江水看鎔銀江外淮山色未分安得長驅鱷魚手為開南嶽嶺頭雲九江趙倅新作環季亭小擕樽酒作清遊尋得方壺最上頭山在斷霞明處碧江從白鳥去邉流苦無健句爭天巧賴有新亭慰客愁他日東南論勝地未應只數庾公樓題東林香山像大唐受歷三百年文士輩出俱可傳情雖嫵媚中骨鯁當時只有香山賢香山年少謫湓浦卧聽琵琶心獨苦想得回舟夜半時半濕青衫淚如雨别來江月幾畨圓黃蘆苦竹空淒然風流掃地那復有但見東風吹白髯可憐畫手無前輩欲倩虎頭呼不起瓊枝玉樹了無蹤鐵撥鵾絃何用爾明朝一舸下潯陽月明依舊空江水借書到興國牢落偏州少士夫一鴟求借是書無道山堂外長廊下黃卷如雲記石渠課吏抄書戲作雪花飛上白髭鬚繭紙猶抄細字書莫笑老翁兒戲子政緣長日要銷除湖亭懷舊三絶鈴索無聲訟牒空妙香寮外水冥濛長安故舊如相問今在江西道院中校書天祿想諸郎應在蓬山語晝長記得去年秋七月日斜香轉曝書廊白頭武部最風流便是汝南陳太邱折角烏巾人似畫與誰同伴兩山遊沈季卿出元具茨王相山詩卷相示兩翁雖存沒異途而均為不偶讀之良增慨歎為題軸尾沈郎帶減不勝衣瘦甚由來政坐詩試數交遊盡前輩便知文采照當時子猷何處尋修竹漫叟今誰弔舊祠人似浮雲忽吹散老夫雖健鬢成絲寄題陳醫安樂堂昔山谷聞四休居士之言曰此安樂法也陳君蓋取是語以名其堂六塵欲要淨三摩辛苦修行奈老何只得四休安樂法一身受用已為多自笑區區老倦遊廬山今是我莵裘暮年欲覔安心法他日敲門問四休送陳鄂州舊識君家小仲容步兵今復此相同誰教楚楚青雲器來照鬖鬖白雪翁廬阜故山休入望武昌官栁正搖風只應黃霸歸朝日巳在天邉尺一中窗明窗明有斜日几靜無一塵向後有餘恨亂鴉來聒人病起步至湖亭雨從今日十分晴病後春應一倍增著地巳無殘歲雪挂簷猶有上元燈薄羅初欲換單衣社肉裁分燕又歸喚得春來却催去滿庭紅雨杏花飛病餘猶著杖藜扶臨水依然一老夫不用苦燒紅蠟燭桃花解笑白髭鬚弔梅飛盡江南泣雨枝韻髙猶共雨相宜洗粧只有唇紅在也勝桃花好面皮傷心不見玉扶疏丹杏縹桃亦甚都只恐此君零落後餘芳要自不如渠春日連雨湖水大至二首楚地春三月他鄉客二毛愁懷須著酒寒力尚欺袍細雨淹花濕顛風拍浪髙昨朝紅藥柱今日整漁舠二白雨鳴珠琲春江灌玉壺漫郎回小艇摩詰畫新圖山近醒愁眼州間養病軀如何樽酒地更與看南湖秦少保生日詩三首歲當作噩律始催杓檇龍角星紀回祥雲下覆窮九垓帝車御極雲旗排夜色清潤明三台昴精叱馭天上來上帝欲遣清風埃漢家雙闕髙崔嵬日趨龍尾朝蓬萊父師有鼎調鹽梅公贊廟畫衆允諧龍顔一笑天歡咍虎皮蒙甲卷不開白玉雕爼尊有靁五風十雨無煙霾爟火夜上通天臺禮成一代誰可偕功髙欲報帝所懷大用永配德與才夀廟祝之言可該拍肩俱願齊洪崖跨鼇昔上環州山恍如夢見非人間黃金作屋碧玉椽靈芝仙草香流泉琅函玉軸架插天神龍守鑰祕不傳天書錯落御墨鮮泥金描鳯寶帶纒中有紫府遐齡仙主張東壁宗衆賢天風獵獵吹廣寒霞漿酌客春晝暄蘂珠琴心久精妍靈根堅固玉鍊顔三官四輔誰可遷看公衮繡當帝前拾塵算劫不計年右文天子朝明光漢陛曉列千官行罷朝不歸按霓裳黃門羣襲御殿香翠蓋趣駕黃微張日髙宫樹遮回廊侍臣進册儼在旁香羅覆帕牙籖長前規堯舜後三王六維龜鑑策最良聖心自約昔未堂日有所就月有將公書萬卷胸中藏海涵地負誰可當官粗住下百報忙獨留真儒傳紫皇茶甌拜賜近御床天顔咫尺瞻龍章金葉舊事不足方人如禇馬才亦常説定惟服寧可忘設施行當見廟堂可使風俗還軒黃有時問道崆洞鄉廣成之師夀百昌千有三百歲未央二月二十三日遵奉聖詔出郊勸農謹賦詩一首示諸同寮星言出郊坰緩轡遵微塗陂池湛新緑阡陌開上腴春色嚮晼晚農事日巳趨有司奉漢詔訓辭宣帝謨父老數十輩龍鍾白髯鬚扶杖前致詞謂當極勤劬曩也事格鬬今當反田廬農桑遂溫飽里胥絶征誅兹焉不少力是自貽瘠臞椒漿酌大斗起坐時歡呼有如一日蠟相期恱須臾殷勤頗自愧小信殊未孚儻非獲三登何以謝汝徒同寮數君子妙略懷永圖願言規遲暮共此豐歲娛次韻漷宰題妙香寮香嚴參鼻觀可受郢人斤誰能論許事且炷松爐薰借此沈水力侑我棐几文小閣亦窈窕青煙散敷紛與人共婆娑此意良殷勤恨無博山賦可寫蜀錦紋老人住江東來作江西雲江湖渺歸思先弟無餘芬焚香此幽事此外何所欣如人嗜昌歜豈復思羶葷令君出新語種學窺多聞但恐燕寢句頗慚韋使君更當宿殘火薄霧看氤氳劉德秀縣丞凡五和前篇僕亦五次其韻劉侯一諾重勝獲金百斤秀句忽復出華名愧微薰但憐溝中斷枉錯黃金文君欲強推轂誰當為解紛顧我絶世好百念獨此勤鵲尾得古製鷓鴣玩斑紋時從孤巒頂看上秋空雲遂作小方寮調護留清芬忘言聊復爾念意亦可欣了知法界中清靜無五葷倘非此地勝是妙數得聞誰知几席間中有造化恩遂此草木性一氣蒙氤氲楚澤是魚稻不論斗與斤老守睡足處飽飫聞餘薰時歌郢人曲細和湘纍文天風一披拂花砌飛繽紛樂此盡日靜頗無終歲勤劉侯過我數坐久衣成紋時驚燕梁句有似春空雲千年論往事一炷同清芬有客乃如此我意豈不欣人生如草木鼻味殊薌葷海天得彼趣妙香吾所聞庶希清淨化上答明聖恩從今世外樂可比洪崖氲蔚宗草香傳水沈貴盈斤標置何必髙有德當自薰士成稍藴藉往往嗔斯文人生顧安用浪為此紛紛我靜偶獲趣君意良復勤摩娑辨欵識共玩古曺紋青煙既司寒小孤方插雲詩應神所授句與爐爭芬懸知我輩事俗子未必欣不容芝蘭室雜以蒿艾葷政恐千年後餘鼻尚有聞惟愛青雲士亟拜黃屋恩未知誰氏子肯對香氤氲念昔居上國春薺賣作斤那得千金囊可買百濯薰一為道院主坐空朱墨文清笳咽悲壯濃篆橫披紛幽意可略喜老倦復小勤詩如水得風自然偶成紋香亦旋變滅頗類無心雲丞哉兩松篇時出水麝芬鏤氷納蔬腸爭洗三韭葷敏手不可敵勝妙昔未聞豈不勝兒女呢呢相怨恩人生如此少爐煙且氤氲隱之刺五年歸囊香一斤恕投湖亭水內子無飯薰欲草廉吏傳恨無班馬文此風一凋落披扉如絲紛前身是香嚴宿習今尚勤爐煙凝室炷印篆緘雕紋嗜香猶有癖於世巳如雲况今花木妍香風度微芬節物豈不佳老洗難強傾太常齋日多十飯九不葷唯有鼻孔香時於靜中聞未知劉季和何如荀令君且當置是事一笑同氤氲蘇內相在黃岡嘗從桃花寺僧覔茶栽移種雪堂下余始至此會歲且暮明年春得新芽試之色香味俱絶不減湖越二疊宜其見賞於此老人也人言雪堂今巳鞠為館驛茶蓋可知矣梅雪既掃地桃花露微紅風從北苑來吹入茶塢中真香不可説玉色誰與同不知耐幾湯成此三味功顧渚與日注名髙各雌雄四海一大地所至皆春風物固有不幸乃爾殊窮通此品不見稱白雲空蒙茸移栽雪堂下賴有黃岡翁來禽青李帖絶世無此工遂使桃花名遍滿江西東此老久下世真賞殊未逢只今調粥手乳花為誰濃堂今在館驛樹亦知何蹤樹固不足惜館驛行當空筠陽竹根枕髙安老竹三尺圍斷為釡甑中可炊蘄州開笛不足數嶰谷截筒空自竒何如貓頭未成竹化為霜根白如玉峥嶸徑節不得施歷碌黑斑空滿目白頭老吏飽官倉雲夢南州睡初足筠陽别乘一幅書寄我中刳兩枵腹飄飄逸韻青衣郎夢中相見筠山陽一笑摩挲撫君背定教從此毋相忘我欲問舍無何鄉為我往使華胥王人生草草兩鬢霜要知日月壺中長四月五日早晴二首老病猶朝朔華顛尚著冠馬頭收雨去湖面拍堤寒鳥作鄉關語花如夢寐看晚來還倚杖看日下欄干二憶作西來夢猶堪細數程隨雲千里到看月五畨生上箔蠶宜暖瀕湖麥要晴天應憐病守有意在秋成四月八日燕客湖亭風雨忽來頗有波瀾意欣然恱之水平真欲見秋毫碧海無人掣巨鼇多謝西風卷煙雨肯來湖面作波濤孤山十載飲湖光更入江西鷗鷺行官舍一生常近水前身應是水仙王白雨跳珠水上鳴雪花吹浪酒邉行不嗔燕子飛將去最愛鸕鷀睡不驚千葉石榴盛開為賦一詩江東五月榴花紅江西三月滿花叢東花窘束少態度西花重疊紅蒙茸誰翦燕支山下草乞與殷紅照林杪移栽我欲過江東銜子鴻鵠今成空紅巾羊蹙為誰苦芳心何止千重重試遺紅粧歌一曲此花此曲何由逢春光都無十日事不成夜雨還朝風紅芳莫遣忽飛去斷腸煙雨空溟濛十六日對雨是日聞得濓溪地大麥結穗牛尾長小麥滿地秋雲黃清漣堂前今日雨中有廬山湯餅香故人喚我廬山住欲買茅椽近廬阜得田於我復何求只就天公覔甘澍天隨農父與隂晴雲共東風作朝暮山南山北水長流下田髙壠禾無數秋堪釀酒醉不醒飯可充飢飽摩肚先生不管醉尉呵柱杖尋遊繞山去太倉稊米集卷三十五
