body:
  text: 太倉稊米集巻二十九宋周紫芝撰詩七十三首次韻吕仁父十九日朝謁初自宫南門未央宫闕轉光風誰識蕭何第一功禁殿潮連銀海濶御樓霞似赤城紅舊來雙舄飛翻處今在春秋贊祝中自此翔麟駕君輦試從紫陌看方瞳月中與兒曹露坐二首葛巾藤杖竹方牀旋掃花隂坐晚凉兒小但隨翁看月夜長誰念客思鄉客去無人與對牀風微聊借月為凉杯中小友多情甚勾引衰翁入醉鄉罌粟將成庾郎十飯九不肉家無斗儲飯不足窮兒朝來忽乍富墻下千罌俱有粟只今錦爛花争妍想見雲翻釡初熟一飲醍醐生玉池再飲沆瀣充朝飢味雖似淡中實美暖能扶老甘歸脾黄粱歲割一萬斛謾飼榖伯如猪肥君不見蛾眉仙人家海涯自種紫芋羮蹲鴟尚説人間無此味天酥酡固不可知願借東坡玉糁句題作此忩罌粟詩小兒燈下讀細書戱作一生青白强錙銖老眼昏昏亦廢書長劍竟辜真事業短檠空照舊蟲魚臨風忘酒殊妨事隔霧看花不管渠猶與蠅頭較多寡小兒曹合戒前車次韻鮑仲山官居臨大池傍鮑題以協趣取謝宣城所謂後協滄洲趣之句也參軍詩古清而臞清瑶繞屋分西湖長安城中開八陌心知此地人皆無草閣波平少傍舍卧看晴沙鳥飛下眼無公事兒自癡句有澄江官頗暇吾生巳老心懐羞為飢索米亦有求聞君稍動謝守趣令我轉憶江南洲詩成况復終少味五字故堅不知畏可憐未識故將軍應似當年㶚陵尉次韻仲山再示協趣韻青衫老吏骨亦臞身游魏闕心江湖眼看白髪不勝數夢繞故鄉何日無况我携家得官舍背水開門故墻下不見湖光意闕然欲喚歸舟心未暇一聞羞處令人羞人生如此當何求春動飛來屬玉起無人貌得河中洲闕二字嚼蠟元無味鮑謝詩髙心獨畏西風長怨草蟲秋自笑酸寒溧陽尉次韻仲平喜雨二首旱欲流金水欲裂百千火聚作此熱秋風忽送雨一犁應念田夫汗流血廟堂調燭隨弛張五色線補虞帝裳書生擬作豐年頌臨忩弄筆鬢如霜田作何郎炊餅裂飲氷不救中腸熱千山雲路鳥欲飛六月行人駒汗血風師偃斾那復張雷師鞭雨沾帷裳雨中仿彿雲子香行看玉粒秋飽霜題蔡仲平博士行田記唱詩軸當年車騎兩聨翩來按鍾陵水復田可但癡兒了公事尚餘詩思入風煙令君頗似太邱賢水旱憂君記昔年父老猶能談舊事想隨佳句共流傳次韻孫子紹判院喜雨之作豐隆欲鞭車風伯不借便我欲訟風伯雲意亦復變帝命誰敢遲民事那可緩油雲始膚寸崇朝忽瀰漫深憂軫淵衷凍雨洗霜霰知誰挽銀河傾瀉落天半喜氣同雨來孫郎語良健應憐占籍者就食免流轉天子坐法宫斯民樂芳甸雲山倘可尋野水不辭亂幽人得新凉妙作寄三嘆君鋒不可當我復那能殿錢塘初見黄爵儂家大江東黄爵家江西江東黄爵不忍喫江西黄爵賤如泥赤罌封口上有印白綿卧酒中含脂君不見浯口漫郎真漫仕萬事平生不如意一囊紅粟不一咽千里苞苴誰復寄有時鮭菜念故鄉并刀落膾思飽霜青龜未堪聊入俗黄爵那知亦渡江時平漫説爾可咀擊鮮誰遣今得嘗殘杯欲盡客欲去臛雁烹魚豈論此酒聞風味不可名惟有此郎難著句九原誰喚儋耳翁添入當年老饕賦花次元嘯齋手種琅玕歲巳成要聽風雨近忩鳴戱將落月千尋影幻作長離半嶺聲蕙帳夢殘秋雨急錦囊詩了夜燈清便須寫入朱弦曲安用能回越石兵七月二十日秘閣曝書二首芸香時近曝書筵縹帙緗囊得縱觀不是聖時修故事豈知藏室有清官香羅剪帕金描鳯紅字排方玉作籖身到蓬山瞻御墨眼驚奎宿射珠簾題徐季功畫墨梅木犀二首六言夜色無人能畫徐郎挽上寒枝仿彿孤山盡處黄昏月到花時細雨欲催秋晚幽花巳著寒枝似我江南九月西風馬上歸時題徐季功畫二古木二首六言千尺龍蛇夭矯半山風雨憑陵誰為梅花賦手能回古木寒藤何處千年雙榦未嫌雪虐風饕楚士兩龔介㓗孤竹二子清髙剪蘆藩出木犀二絶小忩幽絶為誰通分得清隂落坐中可笑森嚴木居士肯来相伴竹坡翁特地移藩喚木犀眼明初見歲寒枝臨風想像香來處不到黄昏滿樹時題王季共蓬齋小結茅廬寄一椽夜燈聊與客周旋聞知急雨來何處題作蓬齋亦偶然政欲搔君江上寄莫嫌驚我醉中眠老翁辜負漁竿乆何日煙蓑上釣船次韻子紹游夀星寺寒碧軒好竹連山萬壑青落星天近接飛甍流盃共把人須勝風玉相看眼倍明故老舊遊雲巳散孫郎長嘯鳯重鳴閒來却倚朱欄看蒼雪依然入句清東坡題寒碧詩有紛紛蒼雪落夏簟之句别方桐川一麾投老始專城共理聊煩助聖明欲識斯民之不病要知循吏本無聲官閒莫道州如斗客滿何妨飲似鯨它日桐川樓下酒㑹須分與故人傾秋懐二首示陳李二省曹客枕難禁夜醨樽不觧愁秋聲歸草樹霜力到衣裘依約江南夢留連海畔州君休問新句只有大刀頭二細數平生舊誰人到白頭飄零無藉在生死任羇愁太白今詩伯元龍昔勝流吾衰巳如許何得奉君遊次韻李郎中休日不出二首文昌不作吏曺忙賜沐歸來日更長青士寒生庭下雨木奴香借樹頭霜喚回短夢知何事尋得新詩又夕陽遥想南忩巻踈箔起㸔雙鷺入鵷行簿鴿癡兒作底忙閒中得味獨君長登臨莫負山如玉歲月還成鬢作霜誰把酒澆陶靖節天將詩付沈東陽明朝湖上看雙璧兄弟聨鑣作雁行次韻楊吉老秋懐古風相思復相思一别遽如許相望隔參商相期邈秦楚遡洄願從之道路長且阻道阻不足憂歲暮心獨苦踏車縱絲娘頭緒幾千縷寒螿聲酸嘶入我肺與腑自我之來思悠悠六寒暑賴此同社郎清風生玉麈送馮清叟使北三首上盡西湖幾翠峯偶依征驛度邊風遥知載酒尋山句盡入彎弓落雁中君王慈儉不臨戎國好長因漢使通遥想南歸寒巳盡榆關草色正春風黄雲朔雪馬凌兢去踏河邊六尺冰博望封侯君亦喜歸來洗眼看飛騰實録院與道山隔墻堂後修竹僕飲餘必曳杖婆娑其下時聞奉常閲樂之聲故詩中有雲韶之語風條無葉自蕭騷玉立修篁不受凋咫尺蓬瀛横雪觀依稀絲竹度雲韶天憐人老悲雙鬢官似僧閒占一寮日日杖藜摩飽腹未知何以答清朝次韻王參猷用前韻見寄文字何當僕命騷餘年雖在鬢全凋元無舊曲能三歎為借新章作九韶千里奉祠猶去國一官何地可同僚吹噓直上青天去誰挽斯人入聖朝謝曾使君惠丹邱集舊説江西一𣲖禪公家得法自當年回風流雪何人似寳鉢天衣幾世傳後學安能窺制作老夫猶喜奉周旋寒忩讀罷無人語只有燈花欲鬬妍題吸川亭三峰擁中州二水俱北匯狀如吸川鯨有屋負鯨背主人頌酒徳量與劉阮對㑹令百川流入我三尺喙回視瓮間人無乃真䑕軰天風駕鯨波風静水可愛想當持翠螺時依太白酹尔曹固何知此意有君在題控鼇亭神仙邈何許仿彿在中天弱水不可渡况乃風引船六鼇戴三山來此知何年上有百尺樓縹緲翔飛煙平生持巨釣一舉遂可連以手控六鼇于此相周旋可恨世俗眼未識方壺仙絶境不可到望望空惘然次韻劉尉雪後東岡尋梅雪壓東岡千樹梅忍寒誰肯為渠來却愁花底人如去羞得南枝不敢開贈趙徳莊赫奕宗枝秀棱層玉樹新相逢又殘歲話酒幾青春病不妨詩否家應入望頻少寛歸去日去别易愁人時宰生日詩三十絶某嘗謂人臣而位極宰輔固亦足矣然而茍無功徳足以惠利而流傳後世則雖尊位重禄足以超冠百僚使人歆艷以為一時之榮可也至其道徳之不聞功烈之不著徃徃為人輕鄙姍笑無所不至蓋公議之所在有不可掩者當如是也夫庸庸者固不足論間有盛徳大業足以自表見於一時者則當時之人紀而書之後有作為詩章以歌咏之騰之衆人如出一口蓋公議之所在其不掩者亦當如是也五帝逺矣三代於周為近三百六篇可考而知在文武成王時則有若太公望周公旦召公奭在宣王時則有若樊侯仲山甫是數公者皆有歌以美其功徳太公之詩不多見微繫其㫖於大明其辭曰維師尚父時維鷹揚周公之詩七月二篇公所自作及遺成王東山而下則專美周公之詩也召公之詩有十四篇皆美召南之治而巳而鵲巢甘棠行露則為美召公之詩也其後周平王之元年衛武公兵佐周有平戎之功烈乃命為三公且使入相於周詩人作淇澳之詩以美之又其後則有若鄭之武公與其父桓公皆有賢徳而並為周六卿司徒之官詩人作緇衣之詩以美之又其後有若魯之僖公亦有賢徳詩人四篇以美之此二三公者未嘗為周轉相不過為司徒之官與一國之君耳然而猶皆有詩焉周公大聖固所不論若太公之為師武公之為相皆於兵有功於王室餘不過聽訟斷獄好賢樂善寛儉愛民是皆一功一行形於歌謡者然耳未見其卓然大功非前世之所常聞非後世之所可及如吾太師相公者也今公以道徳為天子之宰以儒術為一世之宗以堯舜不戰之兵而定亂以成康禮樂之治而化民神功妙用超冠今昔書契以來所未前聞也觀其真誠一徳上契天心忠言嘉謨下符主意隂功仁澤旁及羣生能使兩宫相見宗廟再安回累卵之危成泰山之固疑若出於神授天與非人所可得而窺測者矣夫傳紀武公年踰九十詩祈魯侯萬有千歲夫以區區魯衛之君猶得國人頌願之詞若此其至是宜風誦章句之流皆願作為歌詩以祈吾太師相公無窮之夀以為社稷生靈酬報功徳之萬一也然則圖章叠句溢篋盈囊汗牛喘馭萬益而來殆不足以怪其多且至也今百執事之列如某之職疎而伎小文鄙而辭陋固不當自效一鳴以干僭越犯分之誅竊嘗怵惕而恐俯伏以思粤自歲在壬戌則嘗作歌詩與太師父老鼔舞堂下謳吟於九逹之逵而公亦俯而能聽矜而能容未嘗有一言以督過之則某今日之詩亦若可以復進於鈞庭之下矣况今黎庻乂安朝廷無事年榖豐衍星宿清潤而月在嘉平將興嗣歲日景晏温頌聲洋溢此皇天眷佑有宋是生賢佐之辰聖天子嘉景運熈洽之隆圖師臣眷遇之寵錫之燕喜恩渥有加玉醴天庖來從帝所鈞天廣樂下奏私庭宜有詞臣博士太史獻詩作阿衡佐商之頌草山甫崧髙之雅而區區之言尚敢以為獻實以至和之澤均被含生雖龜黽之蟲亦將鼔翼鳴脰而不能自巳也小詩之三十章姑以伸頌願之情而巳倘欲叙述功徳之美載之簡冊之間雖累千萬言而不盡也况於八百有四十言乎謹序從來建鄴是王都天産臯䕫為帝謨可笑晉人無眼目渡江惟笑見夷吾繡衮貂冠舉世榮隂功難報本難名令公清徳流無盡依舊秦淮繞故城秦漢功由百戰成廟堂何代不談兵凌烟閣上從頭數誰觧垂衣致太平向來諸將各雲屯一折渠魁世自分但見鷹揚稱尚父不聞䟦扈有將軍梯山蕃使入疆頻歲捧瑶觴奉至尊申觀萬年方祝聖王春正月更朝元萬騎邊聲乆不聞蓬萊宫殿日長春君王勤儉無行樂閒作宸奎賜近臣黄帕䝉韉御坐來臨戎乆不按龍媒内前沙路平如掌玉輅觀成試輦回紹興天子聖神孫明道宣和典故存曾與諸生迎御輦又瞻青耜載耕根當年輪奐落成均法駕天臨近至尊萬國儒生瞻聖化一聲清蹕在橋門天禄初成幸翠華隆儒恩意日尤加只應東壁圗書府便是瀛洲學士家仲春之日祀髙禖天仗親臨曉霧開壇下百官稱賀了鈞天聲裡帯花回雙闕傍邊是玉津禁園花栁一時新東游原上無行幸分作慈寧殿裡春誰移蓬島在人寰詔賜新居五百間紫塞無兵清似洗丹樓不動屹如山御墨親書六字牌閣名新賜屬元台内前夾道爐煙裡争看翔鸞舞鳯來御府分香夀老人紫皇親賜玉壺新聖恩無極年無盡恰似長生殿裡春大事因縁意未深知公濟物自初心聊將石室巖前雨來作商家旱歲霖一語能平百戰塵兩朝赤子盡歸仁十年困卧邊亭鼔同祝公年是幾人南北交歡萬國寧不將黔首比金繒時人未㑹新盟意要與思陵作中興時相論功固自賢真儒一出定千年能回鑾御歸長樂何止龜隂得舊田北海來歸幾過年朱顔依舊照貂冠不將一節更夷險誰觧如公耐歲寒知公清徳自天然猶復遊心到簡編應笑向來張相國後堂賔客少彭宣黄金新鑄景鐘鳴公作銘詩紀告成從此聖朝郊祀典文章無復數西京衮衣調鼎春光軒經術傳家侍禁筵試問一門三畵㦸何如隔座兩貂蟬四海文衡孰主張半隨西路擅詞章三君八俊今何處知有宗師在廟堂太平和筆一番新瑞表丹邱亦異聞不遣楓榆作連理誰知六合巳同文葆旅占星固異常閩山竹秀米千囊天公巳遺鸞鳯食便恐雙飛入建章胸中治國計誰良只有休兵是秘方肯為八荒開夀城能仁須號大醫王住世神仙五百年長生東出笑談間不從方士論爐鼎自有隂功觧駐顔帝城春近俗熈熈師宰功髙不事知天上中人傳詔日御前蕃使賀年時歲杪四絶湖上青山一水邊暮雲樓閣九重天春旛影裡迎新歲爆竹聲中送舊年天寒細雨還成雪日暖晴雲却䕶霜可惜梅花殘臘月十分天色似江鄉此生無事不隨縁世路何心更著鞭年盡未歸春偶爾春來若健亦欣然端門行欲賀新元竊食無功只厚顔可笑腐儒黄巻客亦隨朝士紫宸班太倉稊米集巻二十九
