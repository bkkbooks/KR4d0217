body:
  text: 太倉稊米集卷三十七宋周紫芝撰詩三十五首送富川秋舉王君子雲衢欲上馬蹄輕莫問長安路幾程雙劍竟須騰巨澤夜光元自當連城偶因勸駕江邉日猶記臚傳玉陛聲某前舉攝行承旨司公事傳主殿陛職在臚傳淡墨榜知何日出擬開春甕為君傾寄小兒刊書二詩因趣其歸黃梅雨熟汝辭家數得秋風到藕花書裏懸知有歸日醉中不復問年華廬峯今巳卜菟裘心共長江日月流莫待西風雕緑草速來隨我上歸舟次韻強幼安中大以僕築室濂溪見寄歸去來兮復幾時臨流屢欲喚篙師種粳有地供飢腹佩犢無人作去思偶著衣冠真是夢倦尋邱壑巳嫌遲如今真在廬山裏二妙堂成更乞詩僕所居山頂作堂下見長江廬阜故號二妙強幼安中大示樂聞過齋記以詩為謝白璧摩挲未有疵榜齋銘座尚防微欲從今日求聞過故説當年是昨非言行固知無裏襮吏民何處不恩威欲參函丈師全德此去應須便拂衣題趙倅家獐猿圖易生畫手妙幻出猿與獐雙猿挂樹枝二獐回目光烏衣白面兩臂長雌雄相逐爭跳梁秋山果熟腹自飽雲蹬路絶人誰傷下臨長嘯頗自得那愁解舞緋衣郎二獐驚怪久眥睨深羡兩猿髙據煙林藏猿狙喜怒不足説獐鹿町畦寧無場枝髙地卑能有幾蚿蛇自可俱相忘富貴貧賤各有適也恐萬事誰能量雪中同上醉山駕言陟前岡勝賞追良辰蒼黃慘暮色浩蕩飛瑶塵氷花似有意娛我坐上賓但恐白糢糊偶失青嶙峋造物有竒事變滅無逡巡斜陽忽到眼萬疊羅蒼岷戲從壺中天漏此色界痕况乃文字飲盡屬我輩人老守頗自愧繆許參冠巾念我千里行維舟在江濱雪既不可留迹亦恐遂陳置之勿復道且飲樽中醇送章使君守竟陵章濤彥博長江盡此是吾州君去長江更盡頭短棹只添行客恨清樽肯為故人留飽聽夢澤洲前雨却望蒼龍闕角樓試問尺書何日到會須紅蓼白蘋洲金山貫道人跨水作亭余為名以枕流亭成而僕欲去作二詩因以留别聞説朱欄照眼新一溪清淺共誰分可憐橋下無情水不遣龜魚識使君與師同是一山雲吹落江西却再分聚散人生俱似夢虎溪重過不煩君食橄欖記客語朔風吹元雲欲雪愁江天煙帆駕海舶橄欖來閩川客言似有理得失亦小偏紅鹽落青子嚼玉宜芳鮮色香苦未發遂雜春客煎清香雖覆碗翠潤殊嫣然香味元自若人生浪求全方言田家翁好惡能兩捐一食輒苦口棄擲古道邉回甘入齒頰拾遺止流涎朴質固可笑任真亦良賢向來紛紛者妄論誠可憐次韻桂嘉任郎中贈别二十四韻是身本蘧廬誤得兩朱轓朅來臥江樓白鷗看飛翻驚鴻卷西風吹落雲水間江山相表裏宇宙殊恢寬但苦千種愁不供萬疊山幸兹洪崖君仙馭超人寰一身聊復爾萬事不可干富貴倘無求藜藿亦自安不須金鼎爐養此玉棟顔紛紛一回睇往往俱冥頑有如盜跖手可鱠朝飯肝居之彼不疑念念我心寒公今梨棗成心地無險艱橫湖僅一葦經月無寒暄昔為吏曺郎今帶儒生酸繆從周旋間獲奉淡泊歡公已聞大道我猶縳枯禪誰知數日惡忽有千里歎古道催行輈滿山霜葉丹仙凡自此隔無復相追攀餘生幾何時白日飛驚湍願公追松喬駕鶴驂翔鸞我亦上五老舉首雲間看題卷雪樓甘寧廟樓三國英雄氣似雲江南只數故將軍借令馬上身猶健應笑中原鼎尚分諡册屢沾新雨露斷碑空説舊功勳斜陽萬里明如雪獨倚欄干酒半醺大冶山中有東方寺世傳東方曼倩嘗讀書於此寺後有聖泉凡邑人之乞子於此者隨願輒得僧慧滿住持十載無日不醉癸酉冬十二月之吉趺坐示寂九日而色不變人皆攜酒來酌師至暮必頳頰泚顙狀如醉人然其事甚怪金山貫道人將赴東方之請於其行也戲作三詩送之因紀其事使刻之山中以傳好事者先生自以滑稽雄何事偷身入漢宫跨鶴乘鸞本無定安知不到此山中平生著酒滿葫蘆醉上禪床不用扶更把酡顔驚世俗方知肉眼是凡夫誰謂靈泉易感通解令少婦却愁容道人應為衆生説此事如何著得儂遊香巖一小室甚溫潔坐客皆言雅宜聽雪各賦一首鵲尾煙橫不卷簾莫嫌好客坐無氊道人此室知何用留與衰翁聽雪眠曉發永城時任滿得祠跨鞍不作永城留馬上煙銷霽色浮便恐匡廬來入望此行今日是江洲瑞昌道中梅我昔西來野梅發今歲梅花似前臘流年别我誰肯留衰鬢羞花不成折昔非今是未必然尺短寸長何足説到家淨洗客衣塵猶有匡廬半山雪時宰生日樂章七首并序某嘗觀漢武帝在位既久心喜太平凡一草木一飛走之瑞間見迭出旋命詞臣作為樂章載在史牒人到於今猶稱誦之太初四年獲宛馬作天馬之歌元封二年芝生甘泉作齋房之歌元狩元年獲白麟既作朝隴首太始三年獲赤雁則又作載象瑜然是數物者特以鳥獸草木之珍羽毛品類之異遂見紀録不知其何補於治何益於人何功於宗廟社稷而稱述歌詠之如是其至耶為人臣而有大功德於天下人主倚以為安危四海視以為治亂隂陽調和四夷馴服教化修明天地昭格曠古以來耳目之所未嘗見聞者乃反不得紀之樂章被之金石曽千里之馬九莖之芝與夫一麟一雁之不若豈不毁譽失實冠屣顛倒大為可笑哉仰惟上穹埀祜聖相聿生八表蒙休羣蒼贊夀聖天子自我作古加以寵恩心錫之燕喜蓋無所不用其至焉天下賢士大夫能援毫者誰不作為歌詩踴躍自獻則頒明詔命詞臣寓勳德於樂章紀成功於大筆為有日矣某猥以一介辱在坯陶白首詞官十年之間內職編摩外專城壘栽培枯枿造化餘生蓋將援甲子於泥塗以補山林之歲月則某佩太師公相之恩華嶽不足方重滄海難以擬深周視此身念無以報唯歲以骫骳之詞而祈喬松之夀區區自謂其殆庶幾焉重惟大德日新陳言屢出不變故常始終一律重章復句人所厭觀輒敢易為樂章七疊雖不動望班孟堅司馬相如輩於萬一他日朝廷採詩之官以托歌謡稗官以求里巷之言或將有取焉爾至若宣王中興之臣如仲山甫方叔召虎之徒功德光華見於蒸民嵩髙諸篇則必有其人矣詩曰吉甫作誦穆如清風固所願見而十九章之詩則義有闕未之與也樂賢臣章第一亳后出莘野興一德懋三台明歲在午月嘉平闐鼓吹玉簫鳴醉厭厭椒醑馨閲萬古所未聞肖説像傳堯文􅌉誥出德爵尊依日月慶風雲等箕翼奉羲軒願公夀兮錫公齡忠貫日章第二六親和孝慈不出國道昌忠臣不立韙公節秋霜栗繄公忠貫白日河洛腥黃霧塞梟獍鳴羣姦集靡它而從中不沐忠臣飲氣義士戢主左與左公不屈茫茫沙漠萬里天渺渺歸船海中楫公之歸天為恱願夀公兮報公節回瀾章第三歲在昔時否屯河陽狩滄海渾將惰驕霸棘分盜連行兵蜂屯公決䇿托霧氛豐豕封群羊奔佩槖鞬朝帝閽姦氣讋聖道尊三階明萬室歡帝籍功永不刋願夀公兮公永安單于朝章第四單于朝流沙暨天降康神樂只坐法宫聖天子稽唐虞制六藝屬大儒明古義金支張玉帛制告太平備昭事天馬徠渥窪至朱鳥徠翔九陛願夀公兮報公治歌泰和章第五馬牛歸文軌同洛邑宅神邱蒙神光流爟火通君車駕款郊宫君車回霈澤豐神既娛景沖融俗阜康君樂雍願夀公兮報公功泰一徠章第六排天門羅萬戟升三陔祠泰一旗幡幡鼓吸吸降赤霄下瑤席泰一徠景貺集歲三登連八極五臣相宇宙一神降臨罔不吉神言歸恍兮惚願夀公兮報公德榆中章第七榆關以北一騎不馳孰窺漢月燧息烽夷塞草春榮夷氓負犂九州萬井風恬俗怡血屬相保母父子妻既續厥嗣亦活黃􅀢幾億萬年維德所施礽雲來睇天之報之夀之福之劫塵可數此報何期登元次山新祠人物推前輩風流自一時空憐瀼溪水還繞漫郎祠君巳新華屋吾猶續斷碑誰當知此意只有少陵詩過劉道士巷壁間見梁祛父蘇季文詩因用其韻髙臥何由雨墊巾關門聊此寄間身長生自是君家事白髮應憐我輩人多釀醉鄉千日酒豈知浮世十朱輪重來却踐山中約猶有桃花一半春遷居二首時巳卜築九江久作懷鄉夢今年拚不歸奉親猶得粟見客巳忘衣慿几看帆過開門任燕飛皇天憐老病留此著柴扉二扶病翻書卷移家枕斷城雲空千嶂曉門靜一江橫葉密催春事花飛惱客情暮霞將霽色招我作山行傷春二首擬近體越羅初欲替茸裘二月輕寒比麥秋潘老凋疏空惜鬢庾郎憔悴不禁愁催歸燕子春何限落盡桃花雨未休誰遣少年隨夢去不教人似栁風流一幅輕紗老秃翁半簾疏雨著東風長條栁伴短條舞深色桃欺淺色紅愁思但知嫌酒薄客情終不似春濃盡將黑海無名障付與邯鄲一夢中再賦傷春二首豈料餘生兩鬢皤廬峯猶得共婆娑昔年自作南柯夢此去心如古井波官冷故人書不到日長齋閣睡還多文園曽病猶堪酒傳語風光奈我何潯陽江上聽琵琶買得江天且寄家帶雨衝泥看燕子隨風著地數飛花人來裹飯何妨病客去張羅亦自嘉還了世間無限債却修香火足生涯客自富川來言湖水巳到萬波昔年喚客飲湖邉猶記湖天五月寒白鷺翻空歸杳靄驚濤卷雪到杯盤鯤鵬水擊三千里雲夢胸吞八九寬想得拍堤春漲滿又吹飛雨濕闌干太倉稊米集卷三十七
