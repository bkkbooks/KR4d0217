body:
  text: 太倉稊米集巻二十六宋周紫芝撰詩四十三首胡夫人出塵菴詩并引毘陵胡夫人儀真鍾離君之妻也君倅髙郵而卒後數年夫人夜夢道人氣貌豪偉長袖舞劍授以七棗使食之詰朝欣然若有得自是不食無漏身輕如雲夜亦不復寢矣道人與夫人約住菴兩歲當來度汝夫人舊不識字忽能書亦時作頌其餘與平日不少異惟朝暮奉香火以供上真甚謹間夢童子青衣玉盤啖以仙果狀似含桃赤如明霞意其為丹砂也又數月夢道人授以符篆自是亦能寫符人有病祟者求之無弗與食之亦輒效焉余有孫女四歲兩眼赤爛雨淚栖睫治之乆不差食夫人數符瞳子遂瞭然其清如水紹興丙寅結菴毘陵名以出塵余聞而喜之乃作數小詩以遺夫人云漫説丹砂乞轉精安期𤓰大幾時生㑹令方寸無荆棘火棗交梨亦易成看著桃花兩度春尚須香火奉髙真世間安得無塵鏡人似靈犀觧辟塵當日飛昇雲路賒夫人原屬舊仙家莫將林下能詩女輕比神仙萼緑華瑶池人摘幾番桃月下猶吹弄玉簫為病書符何日了雲軿看即下丹霄次韻君叙湖上偶作政恐情須我軰鍾畵船同載舞衣紅可憐燕子無人管不忍桃花過眼空客睡喜聽門剥啄君詩來送玉丁東何時却覔孤山路共弔梅花樹下翁次韻君叙雨中偶作春風作意惱春懐更落殘紅上紫苔無限好詩飛得去幾人今雨肯重來夢回故國空千里酒憶徴君共一杯看取西湖天下勝客愁應為此時開冷泉亭放閘呼猿洞口水潺潺忽巻奔流下九天乞得少陵三峽句為君題作倒流泉萬里西興浦口潮浪花真似海門髙誰將一夜山中雨喚作滄江八月濤西忩見榴花分韻得花字青春苦難挽白日良易斜花飛尚滿砌栁宻驚藏鴉寒忩忽當日山崦知誰家紅榴笑疎林始著三兩花繁隂䕶朱閣芳姿奪明霞頗憶少年日千金醉繁華當時石榴裙六幅圍絳紗美人隔秋水相望天一涯想像繫楚腰依稀似丹葩對花誰與論搔首空歎嗟次韻同舍四月十日迎駕二首日來金闕麗蒼龍風入宫墻展鹿葱夾道焚香迎歩輦兩班鳴玉從羣公時平廊廟半夔龍趙將何人説李葱一見黄麾識全仗始知赤舄有三公次韻艾主管四月十日迎駕十年不見羽書馳萬里風塵静九圍又薦櫻桃入原廟春來無事幾家肥次韻庭藻天申節錫燕書事千秋舞馬初登床新歌樂府傳霓裳當時提封三萬里人間何處無農桑邇來重見太平日侍臣復上開元觴雲門一闋天樂奏瑞獸三尺南金黄師臣擁珮燕㫖酒虎臣杖節嚴秋霜成功乃自師尚父異姓不數汾陽王紫皇萬歲夀明主斗魁六宿來文昌三呼徃徃出靈嶽由漢以來無此祥諸公自是列宿數玉階合望重瞳光聖朝御極日杲杲風雨順序天蒼蒼虞階巳復罷干羽漢郡㑹看開樂浪小臣拜手亦稽首願祝地乆仍天長次韻庭藻再賦天申節錫燕書事蓬萊殿角薰風凉法宫無事垂衣裳人間樂奏萬斯曲枝上日轉咸池桑天皇初開紫府燕御前催賜黄金觴誰乘風雲依日月臣有力牧君軒黄望雲仰見天不逺簪花莫厭鬢如霜五風十雨自中國語從重譯傳名王年年五月熟荔子又見北使朝連昌聖君當宁占寳厯太史執筆書殊祥雲間雙闕日五色下被四表同堯光風姿矯矯華省郎珩璜結佩鳴水蒼但將兩耳聽韶濩付與孺子歌滄浪傳杯遥想水殿冷畵鼔咽咽清晝長諸公約遊諸山而雨分韻得蓮字華省繆通籍羣公接蟬聨坐曹苦無事笑語相周旋蛛塵生印窠雌黄入遺編賜沐不反舍環湖走層巔况乃三神祠仿彿在雲烟蓐食戒明發著鞭飛曉韉白石望磊磊跳珠忽濺濺咫尺不得徃使我意惘然誰當却豐隆曠蕩開青天同昇太華頂共摘玉井蓮斯盟可重尋慎勿輕棄捐次韻王興周齋宿省舍念昔始觧事結交少年場一生徒苦辛兩鬢今成霜頗亦恨晚歲始得同舍郎邂逅笑語間仿彿芝蘭香朝吟共棐几暮歸霑餘觴忽奉太室祠共薦房俎羊曉陪奉常班瓊珮參翺翔只今坐齋宫夜雨誰對床王事間何濶咫尺遥相望聊持鷓鴣椀為澆冰雪腸五字忽鼎來古錦翻詩囊無力攻長城有眼驚夜光跂彼笑織女不復成報章何當畢祠事共上南山岡更約顔李蕭一笑同徜徉次韻蘇君叙暑雨大有秋意五月癡雲爛不収麥風先借一天秋聊煩細雨催幽句更把新涼洗客愁人物似君真楚楚功名憐我亦悠悠謾將無限思歸意欲向回中著釣舟次韻艾主管觀僕楚詞贅説見貽傳記區區考異同文章空愧楚人功窮年弄筆知何事芸葉香中作蠧蟲次韻袁時良司理二絶白頭身落亂書藂粗遣殘年不記功乞得門官歌楚些始知君徳被昆蟲人説篇章晚更雄建安諸子未為功今朝春草傳新句昨夜燈花綴玉蟲再酬艾主管袁司理二首鼯䑕終成五技窮老於文字苦無功謾將平日雕龍口細為離騷説豸蟲兩公才力可争雄翰墨頻収戰勝功笑我窮年辨烏舄却將人事校鷄蟲孫耘老惠龍尾硯漆煙墨報以二詩自喜新交得管城政愁無地喚陶泓孫郎不惜分龍尾付與詩人了一生詩翁無復思如泉墨客能回漆作煙何意峥嶸四君子肯來相伴一燈前今歲中秋無月閏八月十五日夜月色明甚二首月欲離滄海雲猶暗夕樓天教雙病眼重看後中秋玉色依然在霜華只自羞一杯遥酹汝容易莫西沈秋意關心切蟾光見面難欲成邀月飲頗恨與誰看天近瞻銀闕雲空見玉盤老夫渾不寐歡喜一憑欄次韻庭藻秋懐三絶因以見招擬趁牛山九日杯煩公催取菊花開青天有月無人喚却喚樽前惡客來山横鳥外白雲邊酒滿秋風落㡌前老子要詩那得句湖天欲買不須錢不見元龍少日豪還將萬事等秋毫只今風味猶如許醉看霜前斫兩螯奉酬陳彦育用庭藻韻示三詩欲遣新愁入酒杯好懐知復為誰開此生憐我星星乆何事令君得得來廣文貧甚坐無氊白璧朝來忽滿前但喜囊餘長吉句絶勝家有窟郎錢南徐隠士詩兄弟君更眉間有白毫一染函牛鼎中指暮年方悔嚼空螯次韻庭藻觀潮八月既望秋風髙羣飛海水催江濤海水羣飛揚子雲語水來中州八萬里至吳乃折微傷豪語在盧肇海潮賦當日潮來如箭激萬弩迎潮射鳴鏑風吹海立猶至今雪巻千堆濺青壁人間有海詩有翁健如駕浪長江風詩成便可作圖畵歲好莫漫占凶豐坐中客怕噤不語憑髙下看馮夷舞殘音到石未肯回澎湃猶能作宫羽人生快意難預謀眼辜盛事心懐羞老病無人喚我出閉門枉度三中秋次韻庭藻再賦觀潮海門白浪如山髙還從巨海驅洪濤何人戱出此偉觀撩公傑句争雄豪詩成飛電欲争激戰勝何甞費鋒鏑更復盡出武庫兵不念長卿家四壁當時年少今老翁愁將白髪吹秋風來趂千人萬人出尚記時節如元豐袖手人知公作語歌兒停歌復停舞越山迎浪看潮頭白玉傳觴急飛雨胸中如公多廟謀八珍未獻伊鼎羞笑人欲買江邊宅看潮飽度殘年秋次韻彭叔容彭郎作詩調最髙語中起伏多波濤維其有之是以似千佛名經中一豪潮從海來與山激彭郎詩成疾飛鏑詞鋒何止却千軍脆敵何堪守堅壁去年載酒呼衰翁蕭蕭兩鬢吹江風手持氂尾白玉柄坐中風味王安豐今年不出無一語想像紅旌浪中舞卧聽東來響怒濤安得西飛有雙羽晚歲莵裘誰與謀有如此江真可羞㑹待潮來復潮落短蓑獨速吳江秋次韻李宗丞秋懷二首河朔三株樹霜髙不受侵日邊初識面詩裡復論心愁莫令知處杯須畧放深弟兄俱絶唱一世少知音身作三吴去霜從兩鬢侵羇棲臨老日牢落少年心好句何曽得清秋幾度深越江憐久客時送海潮音曉色曉色明龍闕金爐近御床黄簾猶巻月清蹕已鳴霜海宇無兵革公師在廟堂但聞宫樹鳥日日囀朝陽紹興丙寅嵗當郊祀積雨彌月已而大雪前事之夕雪霽月出越翌日天宇開霽日色晏温天子乃躬祀於郊丘賦詩二十韻寳厯三千嵗龍飛二十春胡弓不窺月塞馬自無塵禮樂湮淪久君臣制作新誠心躬廟饗大祀肅郊禋宻雪埋羣嶂凝隂翳上旻九枝騰曉日萬騎出嚴宸輦路晴沙輭宫城宿霧勻崇壇方肇造蒼璧遂前陳秀色霜明俎華滋露濕裀馨香登秬黍繭栗薦黄犉月引笙簫度風傳賛祝頻依稀望璇極髣髴降天神皎皎星埀象沉沉夜嚮晨一人宣玉册百執奉朝紳欲識蒼穹意當知肸蠁臻歴年綿聖祚敷錫恵斯民回駕蒼龍闕旋軍羽衛屯拜恩元老重沛澤萬方均盛世無遺典中華有聖人書生亦何幸奔走綴祠臣次韻艾主管約同居酬唱老年無句上詩壇晚向荆州始識韓馬歴險艱知足健樹從黄落見根蟠不妨論好同膠漆巳復書盟在肺肝許我三冬共燈火不須衝雨過蘇端再次韻艾主管艾侯人物似芝蘭不數淮隂袴下韓筆底波瀾驚浩渺胸中書傳想縈蟠厲施固自無妍醜楚越何曽異膽肝一笑相從亦何事共看明月上雲端次韻蔡平仲梅花用玉局海南韻老翁腸斷江南村誰將楚些招歸魂月明常憶看花處斷橋流水天黄昏一行作吏此事廢日渉漫記柴桑園天憐羇客老且病玉琢妙語清而温當時飽喫惠州飯十年來負蠻鄉暾花飛白雪颶欲起瘴濕黄茅人閉門為公復誦海南句寒牕掩巻凄無言傷心起酹玉局老夜半獨瀝鴟夷樽次韻仲平雪中之作少年何嘗屈此膝自料一生能幾屐誰知臘月雪蔽空三日衡門斷人迹心知無事止坐詩天觧窮人無乃力故山欲放雪中梅空恨此中無鐵石中郎官熱亦怕寒著意説窮聊作劇北風吹酒天始愁玉雪滿空心自懌想君鹽絮方入詩憐我鬢鬚同一色山行安得趂驊騮快踏瓊田四蹄疾太倉稊米集巻二十六
