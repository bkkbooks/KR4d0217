body:
  text: 太倉稊米集卷五十三宋周紫芝撰表十首為守臣賀平睦賊表亂倡一夫寖成羣盜兵連八郡至造天誅雖癢疥不足爬搔然蛇豕喜于殄滅黔黎安堵疆土攸寧中賀竊以世當偃武之年治格承平之久郡無城郭守臣皆玩於燕安兵乏糗糧武將不間於偹守遂令攻剽僅屬樵漁人持斬木之兵共作探丸之盜憑天示異阻嶮為巢不逾兩月之間遂有萬衆之黨屠城破邑喋血東南殺將覆軍飛書廊廟未聞吉語稍貽玉食之憂亟出偏師爰遣繡衣之將果殱賊首遂汙藁街勢若摧枯易如反掌伏遇聿昭聖武大闡王猷烈日方中攙槍自落迅雷一震螻蟻俱驚臣竊守遐邦同霑惠澤威靈所暨慶抃維深謹當招集流亡將復共安田里為守臣明堂大禮起居表五精祀帝載肅明禋七獻享親用昭至意禮行太室誠格圎穹蠲祀事以薦文格新民而知孝恭惟武思維則舜慕無窮問膳寢於龍樓感霜露之既降陳衣冠於原廟執籩豆以恭祠饗帝唯聖人而後能嚴父於禮文為莫大豈特講帝籍親耕之義抑亦明堂祀報本之情大禮告成皇天助順臣職雖微末心實望雲宅百揆以處中昔嘗叨於奉引陪諸侯而助祭今猶想於受釐為守臣謝明堂赦書表蕆事合宫禮既隆於配帝肆恩區夏德遂洽於好生仁同雨露之濡歡動車書之境竊以聖人重報本之義禮經存嚴父之文故祀宗於明堂欲斯民之知孝而大賚于四海俾率土以歸仁恭惟孝悌通於神明德業配於天地咸秩無文之典知饗親饗帝之恩對越在天之神獲來燕來冝之福臣濫從鼎輔來守藩維瞻望泰壇思祼將而顯相布宣明綍用赦過以宥民為守臣賀淵聖皇帝登極表唐堯禪舜冠百王髙世之風周武受文接三代無疆之統擴大明而繼照俾率土之皆臣喜溢邦家福埀宗社恭惟神功不宰聖哲生知寬仁克邁于成湯勤儉乃同於神禹夙襲承家之慶寧煩在傅之勤仰戴重暉久受春官之賜入膺大寶果迎代邸而來知皇天歷數之歸符四海謳歌之望屬方艱于國步肆克紹于丕圖允惟不世出之資宜當大有為之任躬聞納戒當嗣王即政之初將見誓師乃夏啓戰甘之日歷年有永萬國咸寧臣猥奉邦符徒瞻天闕奉觴上壽想同漢殿之歡執玉來朝莫預塗山之㑹聞命但同于獸舞望雲更切于葵傾為人皇帝親征起居表仗鉞以麾恭行天罰狥師而誓爰整六師議已决於中宸威忽覃于絶塞事關宗社望協天人瞻堯日之載臨罄禹疆而咸喜恭惟皇帝陛下仁雖無敵德本好生謂獲利在于和戎乃去岐而避狄知屈人貴于不戰欲因壘以降崇屬兵燹之䖍劉致妖凶之僣竊是用親嚴法駕周視庶邦既涓日以禡師將獻俘而告廟遐陬望幸猶勤帳殿之勞諸將受成遂鼓轅門之勇平敵僅同于折箠覘師何取于遺鞭視偉績之無前知神武之不測臣親逢盛旦躬受訓辭方繆竊于虎符帳難陪於豹尾側聞漢帝誕臨灞上之營行慶商宗遂正鬼方之伐為守臣賀皇太后還宫表夷酋納貢遂交兩國之歡母后回鑾爰示一人之慶天由誠格治以孝昭竊以天子雖貴必有親明王以孝然後治唯昏定晨省不忘朝夕之勤則地察天明期格髙深之報仰惟聖孝實自生知頃緣無妄之災寖值非常之變隔沙漠蓋數萬里去寢門者十六年繫聖主事親之心懷昊天罔極之念圓穹悔禍榆塞歸師四海傾心金根旋御實聖德之所致考亘古而未聞伏遇舜慕無窮孝思維則以禹湯上聖之質躬曾閔匹夫之勞遂奉慈顔再供子職求而不得在唐德宗為非真遂復如初於鄭莊公為未善粵維前代靡有斯稱歡動六宫福流萬世臣親逢盛事屬守遐邦長樂聞鐘遙想蜵蜎之樂彤庭稽首阻趨舞蹈之班為建康府到任謝表分符宛水既竊名藩易地秣陵再塵督府佩殊恩之寖厚揣薄分以彌憂伏念臣受性顓䝉謀身寡拙平生蹇嵼嗟志意之先衰末路飄零笑功名之晚繆惟倚朴忠而自信不虞竒禍之當前一去明廷兩更外寄㑹憸人之誤國召外侮以侵疆師旅驚奔冦攘橫潰誓攖孤壘抗蟻附之羣凶偶與斯民脫鯨吞之微命在愚臣何力之有實聖主一怒而安退念罔功當貽重慮荷寬容之宏大録末效之纎微徙自庶邦俾臨都㑹伏遇容恢大施普被羣工憐臣雖直而未聞汲黯在朝之稱謂臣既老而姑試魏尚臨邊之略付之重任宥乃往愆眷渥益隆懦衷增激承流宣化總列郡之十州卧鼓滅烽愧長城之萬里敢不殫捐軀命報塞乾坤謹斥堠于遐方止䖍劉于黎庶當年假守雖無已試之功今日分憂猶有扶危之願為人勸上皇帝尊號表臣某等言恭審皇帝陛下臨御二十有二年海內乂安頌聲交作冝有尊稱顯號揚勳德以埀萬世者謳歌而歸禹子既受命以維休歷數之在舜躬斯降年而有永歲不踰於二紀治已格於三登誕集皇猷冝都顯號恭惟堯仁天覆湯聖日躋維帝德本於好生故神武終于不殺修文懷逺歡載結於兩朝誠意格天孝遂刑于四海一陶聖化坐底丕平矢庶政之維和致黎民之於變唯聖人能饗帝舉祀事于郊邱非天子不考文恢化原于雍泮以粒食為民命則躬耕帝籍謂祚嗣乃國本則親祀禖壇治固本于體兵功乃專於論相顧君臣之一德與天地而同流用協休祥有如符契是以黃雲承日瑞應明時甘露降松先凝清旦景星為之曜彩異禾以至成文天方申命以用休臣冝歸美而報上臣某等生當盛世身見太平雖乃聖乃神豈人心之可測而得名得壽在天道為固然願詢聽於輿言俾騰光于茂實功侔上古豈特考前代之彛儀德並仁皇抑亦行本朝之故事進常平免役法表漢頒溫詔類多寬大之書周率舊章偹載緝熙之典儻欲變通而盡利要在因革以隨時寅奉訓辭具為成憲用廣宣於聖意以下揭於多方洪維熙朝繼有令德自聖祖之受命始總攬於權綱逮神考之有為乃勵精於政治爰新渙號加惠黎元是以平糴之法行而國常有餘力役之政寬而民不告病寖更事變屢易歲年雖曰禁於未然有若挈裘之易奈何用其已往不無膠柱之嫌遂申飭於有司俾宏敷於大典况神聖天臨之日方法度綱舉之時制作修明文監周而獨盛章程偹具法至堯而乃成利在一時功埀萬世恭惟仁能濟衆德本好生約漢法之三章疏於禁網體唐刑之五覆恤及無辜若稽前代之規悉踵元豐之舊民蒙惠利世格隆平冝集貽謀著為定令某等誓殫愚慮無補聖聰民不犯於衣冠方仰措刑之治令已堅于金石敢希定律之功勤勞何取於涓埃鍳照難逃於日月興國軍到任謝表奉符試守聞命自天竊食叨恩措躬無地况分臨於奧壤尤重愧於非才已即封圻寅宣詔㫖伏念臣人微焉用技薄無聞素業傳家一命偶塵於祿籍蒼顔冒寵十年不出於國門顧踰分之可羞欲捐軀而無所遽頒中綍俾綰郡章自視空疏莫知報塞伏遇天臨萬宇子惠羣蒼臣黎獻於海隅曽五兵之不試埀衣裳於廊廟致九叙之惟歌政須豈弟慈祥之人共撫敦龎純厚之俗如臣寡拙為吏濶疏冝在屛除疇堪任使臣敢不仰體聖君之寬大少希宿吏之循良雖為政號曰神明固難跂及而竭力勤於考課猶可庶幾願殫螻蟻之誠上答乾坤之造謝賜歷日表裁成天地之道妙用雖本於聖功歷象日月之行善政當先於民事命太史履端而立正飭諸侯務財而訓農既察舜衡爰頒夏正伏以王者法四時而建化推五行以在民羲主陽而和主隂掌出日納日之政重司天而黎司地分南正北正之官欲于耜舉趾不失其時則迎日推䇿當審其度恭惟仁均萬宇德配兩儀賴九叙之惟歌致五星之循軌懲司歷失閏之過嚴正典先時之誅更候天時使謹侯度臣恩叨受命職在承流占大火以授衣期於覆物候蒼龍而畢務疇敢廢耕啓六首賀李姑溪復官啓竊聞新命進復舊官朝廷每重於老成海宇同增於歆艷固嘗獲在杖屨之下安得不傾燕雀之心情甚激昂喜難名狀竊以賢者進退出處之際蓋係天下治亂安危之由謂喬木而輕世臣非明治本以占夢而召故老是謂亂階倘非明聖之朝莫慎欽崇之意名由實而乃著齒與爵而皆尊宜莫如公可以當此恭惟號稱前輩雅在先朝顧盛德髙名之著聞豈後生新進之能識作長公之客久冠文評刻奸臣之碑坐沉黨籍旋膺睿渥復正官資議有至公人誰不喜幸元祐風流之未墜嗟貞元朝士之無多被服纓冠拜恩綸於里巷炮羔釃酒燕賀客於江濵人傳太白之篇章喜見泰和之眉目某猥偕奴𨽻獲望門墻屬阻負薪之憂莫展望塵之拜願埀眷矚俯貸疲庸賀元具茨知道州啓伏審臨軒拜守奉天語之粹溫乘傳牧民布詔書之寬大老成進用宗社䝉休恭惟學配古人名髙作者考師友淵源之所自知文采風流之尚存雅詠新篇突過黃初之作清談妙論復聞正始之音是能鼓吹于六經何止羽儀於後學屈輸墨絲綸之手從州縣簿書之勞屬聖主之恢崇俾斯文之振耀昔年閭里飽聞于蒍之歌今日湖湘行繼舂陵之詠粵維名郡兩付詩人偶此姓名之同靄然今昔之譽一時流輩遂分雙井之波瀾千里江山重識漫郎之面目某窮愁自信孤露寡徒泛宅浮家誰惜江湖之日殘膏賸馥頗含霑丐之恩詔命始傳交游相賀念滯留於淮楚阻拜謁于門闌雖雅意清朝將見入親於黼座而逃人空谷猶堪拭目于田廬與吕舍人通問啓從游江國昔參杖屨之餘卧病田廬日有門墻之望方仰瞻於台席疇敢奉於記函自意陸沉誰當指數不謂嗣宗諸姪晚識仲容乃知須賈故人猶憐范叔偶然埀記何以䝉知但殊枘鑿之方圓安有草木之臭味恭惟奧學參聖髙才絶人久傾曹植之波瀾更妙君房之言語馬來西極驚冀北之遂空鶚在秋天笑鷙鳥之纍百驟登文石之陛進升西掖之嚴遂潤色於訓詞乃參稽於政理故家猶在何止四世而五公召節俯臨將見一日而三接某半生流落晚歲孤窮衣冠已絶於攀援賢哲尚懷於傾慕源明不恥猶從衰俗而識魯山韓愈何心嘗願低頭而拜東野悵江湖之萬里望几席於重霄尚阻承顔徒增係念賀徐無為啓伏審恭承溫詔出剌名城撫田廬殄瘁之民壯淮服控臨之勢自聞除用靡不贊稱况雖月城昔號道院蒲蓮滿眼粳稻如雲兼水陸之珍羞號舟車之要㑹江阻濡須之險吕䝉於此而拒曹公地帶荆蠻之餘楚子恃之而雄五伯作江鄉之唇齒是中土之藩籬欲拒逺人必資良牧恭惟家傳素業世出名流曄然芳華光於閥閲恢豈弟慈祥之德敦老成持重之風究心事為屬意民隱少寬三尺網羅之禁用資百戰創病之餘塞草秋風昔號無人之境淮田晚月今聞佩犢而耕假以期年遂為樂國幸報政之有日知進用之可期某跡久去於門墻心實形於夢寐猥霑餘潤倍激歡悰跂崇仞以興懷阻修塗而甚邈莫遑馳賀徒切望風賀徽州汪內翰啓伏審奉詔宸廷擁麾鄉國彈冠入侍本禁闥腹心之臣衣繡來歸得天子股肱之郡事踰常制眷厚羣公恭惟奧學通微妙文驚世參纍朝圖書文字之選慰一時衣冠歆艷之情曩者進直玉堂退兼史館地雖清切知視草之獨榮職在譏評豈汗青之無日冝優異數以寵斯文偶從載筆之餘亟領維藩之命頗若相如之乘傳馳巴蜀而諭訓詞僅同萬石之下車入里門而見父老爰瞻梧檟遂勸農桑焚香晏坐而詩成慿几一笑而事判旌旄所至想閭巷之聚觀樽爼既陳喜親交之在眼仕不勞於去國榮豈止於一家某江海寒人門闌故客訪其存沒嘗辱記於姓名聞此詔除實倍增於欣躍稍資共理即倚調元竹馬來迎喜見去家之城郭鋒車迅召行瞻就日之雲天賀許貴州啓恭審直館丐閒久從杖屨聖朝優老遽領麾符維南方無事之邦乃賢守雅歌之地惠懷逺俗表用耆年恭惟標韻清髙文詞古雅衣陶令吹風之服固自飄然看林宗墊雨之巾誰不慕者道前日交游之勝慰晚生歆艷之情人推鮑謝之篇章久作朝張之輩行短轅匹馬方從林下三徑之遊畫角雙旌遂享人生五馬之貴初在急流而勇退何妨出岫之無心况乃君子素號仁人宜為朝廷布宣惠澤行見兵厨之酒熟更當荔子之霜丹日飲無何絶少公事凝香晏坐不廢高吟某傾慕髙風實由疇昔識德秀而不恨見溫伯而意消一聞除書實歡中悃望高閎而甚邇愧馳賀之未遑太倉稊米集卷五十三
