body:
  text: 太倉稊米集卷二十二宋周紫芝撰詩四十一首樓居雜句五首吳江橫絶斷雲間白鳥歸飛去不還煙樹青連越王國暮潮聲過海門山湖光山影入樓明曉色催人夢自驚畫棟去天無一握青山銜月恰三更上方重閣亂山前噴雪跳珠日夜泉暫借小樓聽雨睡更攜官焙與僧煎五月江南煙雨時吳儂初喜餉楊梅緑枝紅雨連山暗應似瀘戎摘荔枝人間第一東南郡天上飛來碧峭峰更乞老僧雙不借為君穿盡玉玲瓏雨中湖上晚歸書所見三絶句菰蒲風裏棹歌遲屬玉雙飛欲暮時荷葉吹香送歸客片雲催雨濕燕姬誰家歌管載涼州何處跳珠入柂樓山雨忽隨雲渡嶺明眸還與水爭愁風荷憶伴醉顔紅湖水重來照雪翁此世相看最長久只應南北兩髙峰孤山新作三賢祠白樂天蘇東坡林和靖兩公才力盡驊騮俱得東南第一州易濕青衫江上淚難禁白髮海邊秋此生名字依然在晚嵗功名亦未酬處士若無當日節更將何物配風流晚至靈峯緑樹千枝與萬枝靈峯寺裡看楊梅青山行盡且歸去紅子熟時應再來山前山後僧來浴兩兩三三松下行自是眼邊無俗物老夫不浴更身輕五月六日湖上晚歸初見荷衣二絶藕湖煙水欲沉沙已著芙渠一兩花擬借短蓑隨雨去共誰同把釣魚車毶毶煙柳誰家樹拍拍西湖盡日風和靖宅邊山雨急蘇公隄下藕花紅曉起趨郡湖上作湖色初分宿霧餘緑蒲深處聽跳魚一枝聊作烏棲樹五曉尚隨人趁虛老矣坐曹真戲事歸歟懷舊却情疏未開禁鑰聽傳漏殘夢猶堪付竹輿五月二十二日再葺靜寄晚將華髮試青衫靜寄從來是舊銜俗子未須憐怨鶴老夫元不負耕巖晴山有約長相見惡木妨人要盡芟自笑飄零苦無定今年來此誦琅函初涼白露初垂葉輕陰漸著衣幽蟲近床語黃葉到階飛暮雨村常暗秋風客未歸短檠還有意涼滿讀書幃武林逢邵文伯昔遊俱少年滿鏡青絲長别來二十載四海一戰場物色到朋舊十客八九亡今年好時莭匹馬不犯疆將軍鎖金甲萬玉朝明堂長安人海中衮衮逢此郎驚視久乃識兩帽俱垂霜撫事念晼晚含凄谷酸傷便當呼醽醁暖熱澆中腸我笑謂君言語離且勿忙人生如生鳬相值不可常况此秋物佳草木交青黃與君著雙屐尚可相扶將願言遲明發歷井升南岡次韻文伯與余逰孤山客塵費爬搔佳士要推挽誰與同薄逰君來慰愁眼並湖得名山水色淡平逺清泉手可掬汲綆不畏短何人談醉翁但取瀹茗䘼古幹不受寒霜露閲嵗晚向來後庭花想像空婉孌堂堂兩使君摹晝暗丹粉名莭冠今古風流未渠泯處士一癯儒萬像共偃蹇珠玉儼在前未肯作寒窘勝逰那可既客意殊未滿更當窮兩髙豈復悔重研果腹尚可期嘗鼎安一臠秋夜聞雨堂空自生秋涼簟已無暑齒蟲含微酸唧唧相對語天公知客意夜寂誰與處慎勿遣西風吹斷芭蕉雨酌龍井泉書聰師房二首十里泉聲咽斷巖繡衣玄衮閉朱龕老翁不要千山雨只乞龍君一酌甘八十霜髭不出門老師猶是辨才孫髙人已復如雲散舊事那堪與客論太學落成二首偃革逢華旦三雍識漢儀明倫先太學首善自京師聖主修文日諸生望幸時宸奎在輪奐萬目仰宏規當寧敷文德賢關喜氣多橫經將正坐講藝忽投戈雲擁橋門路風搖辟水波小臣歌聖化無地獻菁莪秋日臥病效唐人作語畫閣蘭膏欲盡初小窗留住玉蟾蜍欲知此地愁多少一夜秋聲入井梧此夜秋懷誰得知幽蟲相語替人悲自從啼破黃昏後直到寒窗無月時西溪道人全一堂道人不愛葛藤禪參得維摩妙法門頗怪後三猶有説要從全一便歸根昭文琴在何須鼓惠子書多亦費言聞道山中少來客爐香清坐與誰論次韻季長感事久將華髮寄林泉尺一呼來近日邊身退巳甘無事老眼明重見太平年鼎湖龍去心雖在長樂鍾鳴喜欲顛解道貞元朝士少劉郎定自有新篇種罌粟墻根有地一弓許人言可種數十竹翁來只作三年留僅比浮屠桑下宿竹成須待五六年我巳歸鄉卜新築園夫笑謂主人言不如鋤苗種罌粟二月春風上翠莖三月輕紅照深緑嫣花落盡罌不空碎粒圓時粟初熟乳膏自入崖蜜甜滿貯醍醐飲僧粥與其種竹供後人孰若栽花資老腹人間作計真眼前萬事皆爾真可憐十年種木尚不肯百年種德知何緣倚鋤自顧頗羞澀病眼對花空惘然周秀實陳庭藻攜酒見過徜徉湖山間甚欵明日秀實有詩乃次韻少年懷二妙一日如三秋豈料京洛間嵗暮方從遊空疏坐晚繆清楚知前修周郎古名士功以一戰收太邱亦賢者盛德令人羞周旋奉談笑領略開羈囚有如我輩人夫豈公等儔窈窕尋逺壑共賦臨清流青山儻在眼白髮從滿頭西湖如西子好句豈易酬不敢妄作語恐有不下鷗微君妙篇章何以寫我憂人生每如此萬户不足矦斯盟儻未寒小艇尚可浮送喬民瞻赴官閩中我昔遊梁走千里回望江南隔江水是時公作桐汭官不復東來問行李人言左史有重客玉面青衫氣豪偉酒催紅蠟詩欲成月墮秋江客方起我從京洛塵中來哦君新篇眼如洗濺血驚魂二十年長夢清樽奉簪履相逢吳會不相識昔年強健今如此如公自是臺閣人老困一官何乃爾只今尚作入幕賔無事不令公怒喜丈夫要當列鼎食何止忍飢分斗米且須拄頰望閩山飽看麥秋丹荔子送關康子將還青陽治舊田關郎人物妙人間莫作雲長一樣看不到青雲知有命頻遭白眼坐無官紉蘭秋浦應須爾索米長安政恐難我欲買田猶未可但令歸夢逐征鞍書杭僧法惠事後見邊郎中觀音感應記眼中鐵彈不辭枯眢井重波事亦殊不用三三前説法要須六六後還珠次韻葉兵部九日不出十日登北髙峯登臨一笑與誰同此事人間未易逢莫恨清樽負重九且看黃菊笑西風江連碧海潮初上山近丹霄路欲通向晚歸來得新句便知雲夢落胸中頃嵗盜起徽嚴間兵既臨城部使者而下皆棄官以走别乘強幼安攝郡事解衣髙臥而賊不至城遂以全僕嘗作送行詩以書其事後二十一年嵗癸亥幼安始得州相遇于錢塘幼安猶能誦鄙詩而余漫不復省矣手録見遺讀之惘然為題三絶其後當年玉食軫深憂兩月東南棄八州只有孤城強别駕醉中看雪倚江樓使君功大苦難酬埋沒孤忠二十秋便擁一麾知未稱伯郎猶解得涼州江上孤城欲破時閉門髙臥復誰知我無文字銘金石安用煩君寫惡詩張鼇詩并引青城山道士張鼇者清獻趙公客也鼇從公遊甚久嘗于夜半酒間得雙鱖于盆盎如左慈為曹公得鱸魚故事人頗異之後數日别公而去出懷中祕書一篇以授公曰讀此書則黃金可成願勿泄也公笑而不答命取火焚之鼇喜笑曰公自是可延壽一紀巳而果然錢塘強行父幼安清獻出也嘗作詩紀其事出以示僕且使同賦以附卷尾曹瞞舉漢鼎一目窺九州凌轢欺孤兒大蒙口舌羞左慈有道者何為與之遊堂堂清獻公盛德豈操儔鼇乃元放徒為公亦少留了知髙世士至意俱難求先生兩琴鶴清節貫白頭雅宜鴻寶書取火遽自投公今騎箕尾笑談閲千秋椿年亦細事蟻夢輕封矦強矦公自出矯矯亦此流作詩紀異事誓將踵前修愧乏大手筆為公著嘉猷去年聞載揚在武林及余至而載揚病已久逮其歸則逝矣乃追用往時九日詩韻以悼其亡與君一别幾經秋忽作修文地下遊詩憶向來雲態度人今何在柳風流西湖煙月生前恨客路風霜晚嵗愁勝日交流半零落數行老泪倩誰收次韻德莊惠南城紙衾且示妙句范公古遺直富貴不自娛平生一布衾嵗晚眠粗疏至今鑱新銘尚得司馬書此老抱剛節豈與公孫俱乃知枯稿士白單良復須南城謂紙衾為白單衰年忍風露蹭蹬來東吳感君借餘溫此意知何如青氊寄幽夢蕙帳羞吾廬得此林下具爛錦不願餘况乃粲佳句薄袖翻明珠恨我無蒼珉為君載龜趺願與氷雪姿卧起同卷舒荆土作翠被此俑無乃愚問言擁六尺豈不賢一襦十月二十日晨起見枇杷枝頭紅日退霜華矮樹低墻密護遮黃菊巳殘秋後朵枇杷又放隔年花夜宿淨慈明日當宿齋宫上方枝䇿記當年仿佛天宫五日間老去新添唯白髮重來好在只青山已憐雪意催寒急更遣泉聲喚夢還明日郊宫禋社稷此生猶得綴朝班太倉稊米集卷二十二
