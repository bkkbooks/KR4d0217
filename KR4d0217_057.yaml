body:
  text: 太倉稊米集卷五十七宋周紫芝撰書一首上皇帝臣一介微賤身在田野未嘗素官於朝不習祖宗典故不知朝廷治亂安危輒敢遊談妄議以干斧鉞之誅誠不自揣其愚徒以平日父兄之所訓誨朋友之所傳習有得於方册間者皆可以為今日鑒至於學士大夫之所談說閭巷匹夫之所議論與夫黃童白叟相與埀涕感泣而言亦可以察民情之利病䆒當世之得失臣於二者豈不聞其一二夫既有所聞於古又有所聞於家身為陛下涵養之民心非木石粗知臣子忠義之方其忍不為陛下言之臣聞漢遣蘇武持莭胸奴遭緱王之變為單于所繫其後昭帝即位請於胸奴而得之甘露單于入朝帝思股肱之美乃圖形凌烟以著中興輔佐之助興平之際天下大亂蔡琰為胡騎所獲入於南丐奴魏武帝素與琰父雍善痛其無嗣乃遣使者以金璧贖之卒為烈女以光漢室蘇武一使者蔡琰一女子於當時安危治亂無所繫而昭帝之與魏武於二子非有父母兄弟之親痛不切於肌膚猶不忍中華士族流落異域以為天下後世恨且區區救恤之不暇况有天下大父母宗族俱墮異域可以恝然不為之慮乎今太上皇帝於陛下為父淵聖皇帝於陛下為兄其尊與漢之視蘇武為孰重皇太后於陛下為母其愛與魏武之視蔡琰為孰親况金人甚强憑侮中國無所不至敵騎再入遂陷京師二宮之尊宗族之親相屬於道者三千餘人皆冒炎熱涉沙漠屈身䝉恥未有反國之期則其羞辱痛恨之心與漢魏之視蘇武蔡琰為孰甚三者利害較然眀白固不待臣言矣在陛下豈不懷問寢之思興在原之念欲迎兩宮以雪宗廟之恥而快四方之恨乎陛下果有意於此臣不知其何道而可以致然臣以今日之勢為陛下籌之雖驅天下之兵以脅之不足以當其強竭天下之財以餌之不足以厭其欲盡天下甘言以悅之不足以回其意使子房為謀臣侯公為說士猶未足以决勝負而定安危也况臣之愚乎臣不敢誣陛下以髙論撼陛下以危言竊為陛下深思之不過一言曰上䇿莫如自治而已自治之䇿無它在力救前日之弊耳陛下亦嘗思所以致今日之禍者乎用人不專黜涉不眀剛斷不足此三者所以召禍亂之本也仰惟太上皇帝恭已南面垂三十年思厭萬幾以禪聖子睿謀神算斷自淵衷當時百僚誰敢言者大臣李綱自九卿中首建此議危言讜論天下聳聞淵聖皇帝博採師言擢置左右曾不旋踵復以言罷太學之士與父老百姓俯伏闕下叩頭流血以請復用者不可以巨萬計敵人聞綱復用一夕為之退舍數日為之歸師則綱之用不用豈不繫一時之重哉奈何未幾惑於群言委以兵柄遂致覆師以貽竄逐朝廷知其為賢既委以輔相豈當復責以將帥之任既責以此豈容小衄便加大譴自古人君倚信大臣自當斷以獨見不可搖於異議前日朝廷之於綱其用也以百姓譽之其去也以羣臣退之是大臣之進退不由人主之公心實出衆人之私意使綱雖欲奮忠慮為國家排難解紛其可得乎臣於綱非門生故吏平生未嘗識其面目聞其謦咳而其言及此徒以天下之所係望萬口一音有不可掩者今朝廷既巳用綱在臣亦何必更言臣猶慮綱專以忠義自許未免孤立於朝功日益髙望日益隆則讒毁日益至使萬有一復蹈前日之轍則綱之跡不得一日安於朝廷之上矣此臣所以區區為陛下言之也昔郭子儀輔肅宗再造王室中間雖惑於魚朝恩之譛以奪其兵柄而議者謂子儀有社稷功乃置散地非所宜帝亦即悟眷禮益隆故能卒收成功以興唐祚憲宗討蔡師數不利羣臣爭請罷兵帝獨斷以不疑故能卒用裴度以平僣亂唐之威令幾於復振仰惟淵聖皇帝爰自即位以來僅踰朞歲更易執政大臣無慮數人如白時中李邦彥吳敏耿南仲徐處仁唐恪之徒相繼進用不過數月輒復罷去其餘近侍之臣更出迭入不可勝數初無損益徒有變更用人不專類皆如此有一李綱乃不能用以臣觀之所謂近捨馮唐而遠思頗牧也臣願陛下之於綱盡以國計傾心付之勿惑於詆訾不根之言毋責以勝負不常之勢則經綸天下之大綱當自有遠畫朝廷既治國勢日强則敵人自然畏服二聖當有還宮之期四方漸獲消兵之福其所倚賴不亦重哉臣所以望於陛下專於用人以救前日之弊者此也朝廷玩於燕安不思慮患之日久矣自蔡京王黼相繼用事交結朋比倚為腹心遂使奄腐擅政憸人竊權人主孑然以至孤立言之及此可為寒心前年敵既寇城元老大臣下逮百官有司爭挈妻孥順流東下為自安計方其平時皆坐竊榮寵及緩急之際藐如路人此豈人臣之節乎有如此曺皆在可誅之域而朝廷不加深治後雖欲責以效死而弗去烏可得耶六賊之惡逆暴著遠夷義當戮於兩觀梟其頭顱狀其惡而聲之以播告萬方使天下知中國有威斷之君四海畏聖主擅生殺之柄然後國威自立敵氣日銷而當時猶且遷延歲月處以善地元惡有如蔡京猶得保其腰領而死賴臺諫之臣與大學之士懇惻屢言然後僅得略正典刑亦未足以快天下跂足之望也其同惡之臣有出於蔡京王黼童貫梁師成援引而進者非特不能盡逐而去之猶且倚以為用或付以兵柄或委以重鎮其它固未易悉數如宇文粹中之守建康臣生東南親見其事方王室遭圍困之患實臣子自奮之秋而勤王之師沮抑不遣傲睨慘毒無所不至黥徒數百以誅元帥為名至於害及平民流血滿野執縶囹圄如鞠囚徒粹中身為人臣屈首下賊處之恬然不能抗罵以死偷活須臾下汙士類上辱朝廷皆蔡京用事之人不即罷去遺患遂及於此乃知賞罰黜陟人主之大權不可不明亦不可不敏武王伐紂下車而釋箕子之囚知舉善之不可不先也孔子相魯七日而誅少正卯知去惡不可不急也昔者齊公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡乃知舉善黜惡最人主之先務可不慎哉况蔡京用事以紹述責臣下非是則謂之沮毁以純正繩學者非是則謂之邪說士不讀史書者幾三十年不知前代興亡不知古人忠義唯以偷安茍且持祿飬交為心今日奔軍之將亡國之大夫皆前日奸佞闒茸假寵盜名可誅而不誅當去而不去者如此人尚在要路則幾何而不致於喪師割地誤國欺君者哉是以猖狂之敵得以自肆入關而來渡河而去兩年之間盤旋往返如在無人之境寶玉貨貝嬪御女子盜攘驅逐如探物而取諸懷諸將堅壁而不進守臣開門以納寇築壘京師數月之間殘虐萬狀卒至二宫北狩王城之人號呼震地臣思其由皆生於黜陟不眀蓋黜陟不眀則正人不復盡用奸人不得盡去使前日盡行竄殛不留為今日之用則臣知其不復有今日之禍也昔祿山之反真卿守平原杲卿守常山皆能攖孤城以抗劇賊李愷正色就死而兩河聞風再固危壁張巡許逺城守不下而能蔽遮江淮天下賴以不亡盧奕為御史中丞被服坐臺罵賊不空口郭子儀李光弼皆轉戰逐北誼不反顧遂能復振唐室不知今日忠臣義士能如當時之衆乎何前日之忠臣義士多而今日無之蓋正士不用而奸人猶在也始朝廷起四總管兵首及城下者唯張叔夜臣是以知人才之盛頗有愧於唐也比者敵騎長驅直搗王室兩河淮甸以至京師堅壁捍禦者不知有幾轉戰逐北者不知有幾罵賊死難者不知有幾延敵內應者不知有幾逗留不進者不知有幾用命者賞之不用命者戮之則賞罰明而國威立庶幾可以示激勸之方陛下即位以來不聞有顯然賞於朝戮於市者則是國威有未立也向以不能盡去朋黨遂致其禍如此今復不戒後車設有卒故臣不知陛下何以使人威信不素立賞罰不素眀雖有激勸之方臣知其不可復用也臣願陛下大眀黜陟以正忠邪屏逐畏懦軟弱之徒旌擢骨鯁犯難之士凡前日假繼述談純正以自媒其身者一洗而新之使天下曉然皆知忠義者必賞奸邪者必誅則忠臣爭效死莭壯士勇於敢為庶幾可以雪恥萬世以不墜祖宗無疆之基臣所以望於陛下大眀黜陟以救前日之弊者此也自崇觀以來奸臣用事日久鉗錮忠黨置而不用士有慷慨敢言衆皆指為狂夫小則屏斥夷裔大則蒙被斧鉞皂囊不奏於九重臺諫遂幾於虛位此言路所以壅塞而不通奸邪所以橫猾而日肆朝無端人禍及四海至使潢池興敢拒之師人君下哀痛之詔䆒其禍根實出於此淵聖皇帝深鑒前弊即位以來虛己受諫常若不及擢置一時諫諍之官招集敢言之士忠讜之風煥然一新雖禹湯之聖無以復加惜其羣言交至一切聽受之泛然無所甄别而人主之權遂歸臺諫詩不云乎謀夫孔多是用不集發言盈庭誰敢執其咎蓋謂聽言之不可不擇也人主聽言不先謀及乃心而紛然惑於衆論則將何所適從而可否賢者之出入實繫一時之治亂故魏有干木則諸侯息兵虞有宮之竒則晉獻不侵汲黯在朝而淮南為之寢謀裴度之用不用每為天下之重輕可不謹哉頃者諫官上疏論列李綱十有餘事其言未必切中意在巧詆以快私心朝廷自當追念殊勳置而不問章雖屢上斷以不疑則後有賢者誰復敢以私怒隂相擠陷耶一失斯人亂不旋踵至使金人鳩諸國之衆提百萬之師叩關而來如陷空谷兵動九天聲如四海而吾中國初無一夫敢當其敵者幸而啖以金繒割以壤地敵亦從而退師奈何敵圍朝解守禦暮怠幸其既去以為茍安而不虞後日之禍此豈䇿也哉當時議者猶欲縱其北渡躡其後塵以追而搏之既巳惑於羣言不能斷以必往而又以河朔之民恥於左袵而割地之盟棄不復用大信既虧則敵情益憤矣夫進不能追其師退不能結於信揣其私情豈不再至明年金人果入固巳洞知朝廷虛實強弱之勢與夫兵伍之多寡人材之勇怯山川之險易矣又當時在廷之官不免皆去年用事之人而一時名臣宿將將悉已罷遣以此自料果有必勝之勢乎何不斷以大義與羣臣南下名為播遷猶得上䇿而又惑於衆議城守不遷使前日能以剛斷自許於數計之中必行其一臣知其不復有今日之禍也臣願陛下體乾之剛行㢲之權有漢光﨣﨣之稱無元帝優柔之失則兩宮之恥可雪七廟之祀不乏而陛下之聖孝神武光於四方昭示萬世有不可掩矣臣所以望於陛下勇於剛斷以救前日之弊者此也恭惟皇帝陛下以聰眀勤儉之資膺皇天付託之任躬履艱難嗣承丕緒天心人望莫不歸悅而適遭兵革搶攘之餘四海凋弊之日扶衰撥亂去危即安事有不可勝舉者臣之狂瞽所陳不過三䇿誦臣之言初若迂濶無補察臣之意似能切中時病臣之私意以為不能力救三弊則將何以遂致中興臣度今日之最急者不過欲報敵國之大讐雪兩宮之幽憤復境土安天下以成中興之功而巳且敵人叛服不常久矣本其侵侮之由實皆中國自召又况資其兵力以為援助其功既大責報必深一有不至必有禍害昔人以為湯武之興未嘗與夷共功蓋疏而不切也唐之肅宗嘗用回紇矣卒致掠華人辱太子笞殺近人以為唐患德宗嘗用吐蕃矣卒致劫平凉敗上將空破西陲唯太宗之用突厥也倚以討賊賜豫不資而卒與賊連和奉國入寇於是太宗不勝其怒曾不三年電掃風除遂虛其國豈不快哉國家倚金國以取燕雲其禍根連結固有所自來度今日之勢能如太宗之報突厥其神且速如此乎唐興之初際天所覆悉皆臣服三王以來未之有也惟吐蕃回鶻最號雄强為中國患獨甚久當時謀臣猛將圜視共計卒不得其腰領晚莭雖自亡而唐亦衰焉今金人日以盛强中國漸致衰弱臣願陛下體太宗之英武以蹶其牙而犂其廷不願若唐之末世與二邊相為盛衰而巳也議者以為方今將帥乖離戰士疲軟甲兵鈍弊財用殫耗連年動衆不勝其勞將何䇿以制之臣不敢上援遠古願鑒前日之三弊以專於任用明於黜陟勇於剛斷為陛下言之蓋人主能論一相則賢者必以類至百度自然振舉四海自然悅服奈何正直則必為邪侫所惡功髙則必為孱弱所忌此譛訴所以必行譴逐所以隨至是任用之專最為人主難事今既得賢而用之不能盡去奸邪則其勢不兩立前日小人之徒至今猶在顯位則是慶父不去魯難猶未已也倘不決於去除臣恐終至誤國是明於黜陟尤為人主之先務二者非勇於剛斷自信不疑則亦不足以振主威於既弱理頽緒之將紛此三者在陛下力行之而巳天下寇雖巳解去而國勢漸消四方嘯聚旁午天潢九族逺託穹廬而敵情猶未定安危未可知臣意陛下食不得甘味卧不得安寢朝廷大臣當主憂臣辱主辱臣死之時豈得恝然不以安危介意自陛下踐祚以來其所施設有未足慰天下之望此臣所以敢陳三事以冀陛下奮然有為以革前日之弊也去年金人既去而君臣相顧以為無事故謀臣不講禦戎之䇿絶塞不設防秋之戍朝廷不選將帥郡邑不練甲兵乃復罷舒王配享之祀復春秋取士之科至於士論紛然幾成聚訟可謂不急之務也今日不鑒去年之弊而禦戎防秋選將練兵之計一切置而不問去年復春秋今年行詩賦去年削舒王配享之文今年復元豐釋奠之制觀其事體與前日略同安知金人不復窺中國以肆其虎狼之喙耶此臣所以妄意恐陛下復踵前日之三弊音人論王伯之理謂涓埃有以上禆獻納之餘是以敢效其愚衷庶幾以一士止百萬之師以一賢制千里之難今求驍鋭勇敢之將可使絶域之人有能係單于而斬樓蘭橫行胸奴而勒功燕然者乎既不可得即有賢相為天下之所係望名震四夷能使酋長望風而畏則何止却百萬之師制千里之難而巳哉臣見數年之後要路無小人而朝廷有公議得不恝然以安危介意自驍鋭之氣才力富强國勢十倍人人思奮以雪君臣之恥陛下濟以剛眀果斷建立大功以成大舜之孝固有日矣乃若興師動衆勤民異域以與勍敵角一戰之勝則臣不願陛下為之文德修而四夷賓中夏安而逺人服惠此中國以綏四方昔人以為周得上䇿故曰治人惟聖仁能之音者越王勾踐困於㑹稽能苦身焦思嘗膽朝夕不忘其辱其後卒能大破吳國使甲兵橫行於江淮東諸侯畢賀號稱伯王徒以得大夫種范蠡而用之耳故種能鎮撫國家親附百姓而甲兵之事則蠡實專之越王為之食不加肉衣不重采折莭下士厚賢禮賔振貧弔死與百姓同其勞是以二十三年之間一舉而滅吳雪㑹稽之恥此伯王之業不足為陛下道臣請以漢髙之事明之髙祖二年東伐楚大敗於睢之上太公呂后質於羽軍其後侯公往說而復歸於漢及天下大安偃兵息民而髙祖五日一朝號太上皇復為父子如初果何術以得之哉項羽棄范增而不用髙祖三傑以共成帝業故能力戰以有天下智勇過於湯武而孝行不減於曽參今陛下得將相而用之有大夫種若范蠡蕭何陳平張良之徒而復讐雪恥之心不忘於朝夕之間則亦何患乎不能成二王之功耶臣生長盛世蒙被纍聖之休光恨無以自效其愚朝廷遭值百六之災北方之民橫被屠戮者十有八九臣生於東南僻逺之地目不見戰伐之事坐視兩宫逺征異域中夜卧起悲憤交攻自揣懦庸不能挽强執鋭以效死惟有孤忠可以自獻是以敢陳蕪猥之辭不避猖狂之罪頃者郡國不以臣不肖兩得充賦于澤宮道由淮汴以至京師是時四方奉花石之貢吳檣蜀艑岢峩而來銜尾而進不絶於道臣在舟中望見幾至泣下是時欲陳狂瞽之言者屢矣重念言之必至殺身其實無補於國今陛下踐祚之初痛革諂諛之弊樂聞骨鯁之言臣於此時不思一奮則是終身無可言之時也惟陛下察其狂狷赦而不罪非獨臣之私幸實天下之幸也干冒天威無任昧死俯伏待罪之至太倉稊米集卷五十七
