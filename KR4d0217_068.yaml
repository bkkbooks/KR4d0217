body:
  text: 太倉稊米集卷六十八宋周紫芝撰祝文十八首祭飌師維神祀配上帝位列六神槱燎之祀以享以禋粵自中古以迄於今四時之運孰號令之萬物之生孰鼓舞之搴我雲旗曀則擴之駕我雲車暵則滋之飌師之神是實司之今兹孟春載舉祀事神之報之有隆勿替尚饗祭雷師物方歸根草萎木黃雷雨作解萬寶其昌涸隂沍寒昆蟲蟄藏雷乃發聲蟄户其張常陽亢炎赤地茫茫震驚百里電激龍驤報神之功嵗事有常神之聽之食此豆觴尚享釋奠告宣聖嵗以春秋之上丁釋菜用幣於先聖自成均以達於郡縣罔敢弗虔其為禮舊矣時方用兵四郊多壘則有司一切臨時茍簡視棄禮物如委辨髦獨不知古者出師受成於學而魯修泮宫淮夷攸服豈非有文事者必有武備故我戰則克其夫子之道歟今兹蕞爾小邦當剪蕩顛覆之餘民殘物弊禮意衰落而不敢以微薄廢禮蓋視豐凶而為之隆殺亦以遵吾夫子之遺訓也釋奠告兖國公維公居處窮陋啜菽飲水以安貧約是特一介隱夫所能而夫子賢之如此何也以公有王佐之才可以致君可以澤民而不得行其道乃能安時而處順不露惡言不形愠色是其所以為賢也宜其配夫子以享百世之祀而無愧歟今茲仲春有事於先聖之宫禮也公其從與享之釋奠告鄒國公惟公心不動於死生志不淫於富貴凜然直氣塞乎天地故身不利於當時而道可傳於後世至於懷利以事君好戰以殺人長君之惡而不諫罔民以利而不仁皆得罪於公之門者也非公之教舉世汩昏扶持厥世不泯以棼公之為力堯禹同倫今秩常祀牲幣式陳敢用昭薦以告於神諸廟祈晴文四首此邦之民耕於大江之濱下田居多而地甚卑一有淫雨之患則江流彌漫至於蕩齧其隄防而莫之救故常以雨為病焉今茲粳稻滿野耘夫在田而苗之秀者亦將實矣乃積雨不止水潦橫流則其為民之憂未有甚於此時也維神痛斯民之無告而有以相之吏亦有不腆之羞以備春秋之享將以答靈貺維神其圖之民窮於兵革不得竭力以事田畝久矣今仲夏之初積雨彌日以害田稚則是民之重困無甚於斯也維民之命實神是司寧忍熟視而不救歟神其相之俾克有秋民亦將報焉維宣之民皆築隄捍水以耕其中號為膏腴其實窪下故水潦一興則隨以蕩神所知也今天作霪雨黃流瀰漫以為民憂民力何施維神是求而巳神其相之弭茲巨漫俾克有秋吏亦不敢忘神之賜也此邦之人困於荼毒久矣千里蕭然野無青草民之從事於南畝者有幾幸而陰陽調和嵗事登衍充公給私猶或不足吏方以為憂今兹仲秋天作淫雨害於埀成則斯民之病殆有甚於兵戎之禍焉吏之弗德神降之咎可也民之無辜神忍熟視而弗之救與維神隂功收伏曀霾擴開霽色使黍稷登場父子相慶則吏民戴德其誰敢忘諸廟謝晴勾芒司旦土膏既興陵陂之麥鬱乎青青積隂未解霖雨其零浸畦溢壠溝澮皆盈民以病告有禱於神曽未徹奠雲開晦明曈曈曉日曄然東升匪神之休孰赫厥靈巫祝矯舉吏實何稱神降之福以答民誠諸廟祈雨凡民無知所恃以生者唯忠信慈惠之長與夫聰明正直之神而已今兹守土之吏既已弗德無以惠此一方天降之咎罰在雨暘而神猶藐焉曽不加恤則是斯民其終無告而已邪此邦之人罹其天災可謂酷矣夏六月積雨不止下田既已悉為汙沱種之入土不知其餘幾今秋七月而不雨則是苖之稿者又復病矣雖甚無知者視之猶將惻然况神之功德在民廟食兹土其忍坐視而弗之救歟及今而雨尚猶可及過是神雖欲豫之其何補於民哉維神其亟圖之奉安天齊仁聖帝神像往嵗冦攘充斥須江舊壘鞠為盜區凶焰所至萬室一空惟是祠宇巋然獨存雖長蛇豐豕猶胥顧忌罔敢肆其毒焉則神威靈所暨逺矣嵗月滋久風雨鳥鼠弊於路寢上漏下濕頽壞弗支非所以嚴廟貌而庀祀事是用補而新之以肅在庭矧兹下民奉事有年鳩工飭材誰敢弗力神歆其誠疇或吐之峩峩新宫是享是宜維神奠厥攸居往安斯寢以福吾民祭江神文二首某以拙於生事食口滋衆乃渡江而淮就食繡川往來於江至於數四皆偃然髙臥無復風濤之恐今又將㩗持老稚以為終年之計而時方仲夏水潦並興暴風涷雨變在頃刻一有不至則覆溺隨之雖在善工操舟若神未免於患也是用致告于神伏願賜以安流俾獲終濟幸莫大焉神既相之於其始必能成之於其終此某之迹所以得至祠下也不然其敢瀆於神乎維神其鑒之尚享又某以去年夏六月丙寅有禱於神願賜以安流俾獲終濟而渡江之日風恬雨霽水波不興怪妖伏藏江流如鏡神之厚賜非特及於妻孥雖篙師長年蓋亦蒙神之休自惟涼薄何以得此今兹秋髙邊境未靖將歸安故里以避風塵維神稍赫威靈以終始之借以頃刻之便使免風波之虞於神之力實在談笑於某之賜何啻邱山惟神其卒相之尚享告巨木江鄉之俗嵗多淫祀家有巨木則牲以祀之其禮甚謹謂之木官其來尚矣愚民無知習以為常固其所也至於學士大夫之家猶或狃以為俗則陋矣况兹大木植吾敝廬百有餘年賴以不死而其害滋多不可不去盤根錯節橫敷於地使土膏墳起以傾吾屋不可不去也大枝臃腫小枝卷曲既不足以中吾用而敗腐之葉填塞瓦渠使上漏下濕以汙吾席不可不去也春夏之交柯葉如雲鳴梟哺雛以巢其顛庇遮惡鳥朝呶暮喧以聒吾耳不可不去也長蛇蜿蜒來伺鳥雛鳥噪蛇盤惡類相攻以怖吾兒不可不去也顛風驟雨夜黑朝昏憑藉勢力掀舞頽簷使我常虞覆壓之患以憂吾心不可不去也夫木為吾害如此則其戕而去之可以無憾矣神雖欲託此以為妖祥不可得也今者刀鋸既具匠石在旁酒漿前陳巫祝在後神逝而往木仆而僵我不神咎神無我殃尚享諸廟謝雨某去嵗禱雪祠下神嘗賜之一尺之瑞今夏六月以旱告神又賜以三日之霖夫求則必得其欲不啻如慈父之愛其子也顧吏不肖何以得此豈非此邦之人奔走奉事不忘朝夕所以事神者甚謹故神之相斯民也亦未嘗忘於一日之間乎然民既被神之貺吏亦將免於危亡其敢弗以告諸廟謝晴雨五六日不止湖水且大至瀕湖之民水半其扉可謂危且急矣雖具舟楫發倉廩號呼牽挽援之中流而區區人力安能與陽侯爭一日之功哉非藉神威靈有請於帝何以收積雨於九天拓洪濤於萬里使鳬居鴈聚之民復得平土而居之吏雖罔功敢不下拜以納神貺卷雪樓上榜告神王昔在吳忠勇蓋世西吞巴蜀北舉曹魏玩視老瞞等兒子戲削平中原空落䀝睨廟食八朝以享厥祀暨我皇家四錫封位大江東傾王宫屹峙蛟龍蜿蜒􅧣縮來會江神海靈冠劍奉祀宜有斯樓以助燕喜雪浪翻空長江萬里神告斯名我是用紀辭陋德隆弗配厥美於以告神實震而悸太倉稊米集卷六十八
