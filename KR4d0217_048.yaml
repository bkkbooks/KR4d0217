body:
  text: 太倉稊米集卷四十八宋周紫芝撰策問十四首第一問古之言治道者推三代自三代而下所可稱者莫盛於漢漢之興也創業則有髙帝守成則有文景奮然有以大興漢治者則莫若武宣至于元成雖無大功於漢亦無大惡於天下此六七君者皆不害其為賢明之君也然而髙祖以征伐定四方文帝以仁愛康庶俗宣帝以賞罰勵羣下是三主者其所尊用未嘗先于儒術在髙帝時則有若蕭何在文帝時則有若周勃在宣帝時則有若霍光是三人者其為相未嘗資以學術也夫以未嘗用儒之主而輔以未嘗學問之臣宜天下之治委靡而不振也而言漢治者莫大于髙帝莫盛于孝文莫明于孝宣者此何理邪武帝大興風化專意經術元帝知勸孝宣以用儒而成帝壯好經書是三主者可謂知以儒士為貴者也考其當時輔相之人在武帝時則有若公孫𢎞在元帝時則有若匡衡張禹之徒是三人者可謂一時之儒宗也夫以尊尚經術之主而用當世之大儒冝天下之治光明盛大而不可掩也而言漢治衰於孝武弊於元成此又何理也且人主之治亂輔相之賢否最為國體之重不可不講諸君子於此究之深矣試論其所以然者願與聞之第二問有國則有兵有兵則有書兵之有書所以載其戰陳之法攻守之計山川地形嚮背之宜陰陽吉凶逆順之理故智者用之可以料敵勇者用之可以決勝良將用之可以取萬全理之必然者也初穀城黃石出異書一編以授留侯曰讀是則為帝王師巳而用之果能輔髙帝并強秦滅大楚魏武帝自作新書以授諸將當時征討者莫不以新書從事而用其書輒勝不用則必致敗嗚呼兵書之不可不用乃如是乎趙王使趙括伐秦兵敗身死四十萬卒一日盡坑藺相如曰括徒能讀其父書不知合變也霍去病之討胸奴也武帝欲教以孫吳兵法去病曰顧方略如何爾不至專學古兵法由是觀之專用兵法者果可以取勝乎謂兵法不可不用耶則宋襄泓水之師衆敗而身喪房琯陳濤之戰一日而軍盡覆乃用之而敗何也謂兵法不可專用耶則李廣將軍簡易而軍幾沒於胸奴苻堅不善用師而兵大衄於淝水而不用乃敗何也然則果可用乎果不可用乎韓信背水設陳而信曰是在兵法荀吳設車為行而李靖曰法在其中二子之用法如此乃在乎用與不用之間此又何也幸諸君詳言之第三問唐之賢相前稱房杜後稱姚宋議者以謂崇不勸天子求邊功而璟不賞邊臣其為相大略如此夫以天子而求邊功是秦始皇漢武帝之事固不當以此啓人主之欲至於將帥有功於邊乃抑而不賞則將何以為激勸之術乎大抵二相之論皆祖述漢儒而為之説者也何以知其然哉昔陳湯矯制以伐郅支而匡衡以為乘危徼幸生事於蠻夷為國招難漸不可開馮奉世矯制以伐莎車而蕭望之以為要功萬里之外為國生事漸不可長由是知崇璟之言固有自矣彼獨不知衡雖以大儒居相位其實依違阿意以保爵祿當是時石顯用事與湯有隙衡非能為此論乃內畏石顯而陰陷之也宣帝時胸奴呼韓邪單于來朝義當臣之而望之使其位在諸侯王上失中國夷狄尊卑之義虧損漢德而又抑奉世之功未得為無過崇璟不深求其故而專師其言蓋巳失矣考二虜殺辱漢使以抗衡中國二子咸能矯發諸國之兵不仰斗粟不須寸刃而傳首闕廷不可謂無功於漢而衡與望之力加排沮使將士失望忠臣解體何足為後世法春秋之義大夫出疆有可以安國家利社稷者專之可也而終軍之論則又以謂不然則其為説果何從乎幸偹論之第四問天下之才不生於山林藪澤之中則出於公卿貴戚之胄至於屠酤販鬻之賤降虜氓𨽻之人其間豈無賢才立大功名于天下者孰謂帝王之裔宗室之賢而無可委以大任者乎漢之興也劉章誅祿産以定國劉向詆王鳳以諫君此皆傑然以有功社稷者至于楚元之好學東平之為善辟疆以議論著名於漢室劉輔以真言發迹于衰世若此類者甚衆皆不得大用於當時何也惟唐則不然髙祖太宗之初如河間之功江夏之略其功名事業至與李靖相為低昂議者以謂景元子孫當草昧之初皆宣力四方顯顯為英豪當時固未有所大用者至明皇初相適之林甫自是登相位者至九人焉林甫姦邪幾喪唐室李程和柔在位録録無所建明固不足道其餘皆以才稱職號為賢相庶幾乎周之卿士周召毛原皆同姓國也由漢至是數百年間豈無一宗室可以為相者哉然則漢之不用其説不過以謂不欲寵宗族以妨賢路而已至於田蚡竇嬰王鳳梁冀之徒皆以庸人而處相位又豈無嫌於親戚貴賤之間哉如道宗孝恭之徒其征伐之功忠孝之烈炳然可觀委以大寄誰曰不可彼九人者汗馬無英衛之勞輔翼鮮伊霍之望而用之不疑其故何耶主上推仁愛以厚同姓確乎堯舜之用心矣諸君試托漢唐之得失而論之庶以仰禆聖慮之萬一第五問天下之利不歸於民則歸於國不歸於國則歸於民二者未嘗不相為盛衰自古人君其始非不欲上不匱於國用下不蠧於民財而求必有其術勢不得已則必引用掊克之臣肆為聚斂之政雖僅足以紓一時之費而民貧盜起根本一搖其甚必至大亂而後巳唐有天下埀三百年太宗之政固無愧於古矣明皇縱侈無度國計艱短始用宇文融楊國忠輩利説一開其流莫禁至德宗時既相楊炎立兩稅法而陳京趙贊用事民不勝寃家若被盜憲宗之初切齒京贊指為賊臣未幾而皇甫鏄以句剝為宰相唐祚自是始衰焉至於劉晏第五琦王圭亦一時財利之臣也觀其斡旋之方經理之術使用足於上而君無掊尅之名利出於下而民無愁嘆之苦當時之財亦不過取之於民耳非天降而地出也唐自兩稅之餘如鹽鐵茗酒括田借商羡餘獻助之類歷世所取不過於此顧所以用之有不同耳主上仁聖愛惜元元若保赤子而內焉故地之賦未復外焉討叛之兵未息今大舉以平強敵則有司豈無調發之勞斯民豈無供億之費今欲使緡錢有羡溢之饒户口絶流冗之患必有晏琦之策可施於今者二子之傳具在可考而知區區已陳之迹有口者類能言之幸參酌古今之宜究民情之利病而為之策毋以紙上語為説也第六問昔趙奢之與田單論兵也單謂奢曰帝王之兵不過三萬而天下服從將軍必資十萬二十萬何也奢曰古者四海萬國城雖大不過三百丈人雖多不過三千家則以三萬距之足矣今取古方國分而為七兵能具數十萬食能支數嵗千丈之城萬家之邑相望也奈何以三萬衆攻之然則後世之用兵不可專於古之制也明矣秦始皇之伐荆也問其將曰吾欲取荆度用幾何人而足李信曰不過二十萬王翦曰非六十萬不可始皇壯信而以翦為怯信之出也荆人入兩壁殺七都尉敗秦軍而去其後卒用翦䇿果虜荆王馮奉世之伐隴西羌也反虜三萬法當倍用六萬人乃與萬三千人大為虜所破後如其請而羌人敗走二將軍之料敵如此何也樊噲欲以二十萬衆橫行胸奴英布以謂可斬故李陵提步卒不滿五千當單于數萬之衆至於矢盡道窮以取陷敗蘇建亦以數千當單于數萬之衆至於盡亡其軍幾不免死則兵固有以少而取敗者矣謂以少擊衆非兵之利則幼安以八千之衆而敗秦師百萬於淮淝李藥師以步卒五千而俘頡利十萬之衆以歸此又何也今朝廷方欲大舉以平強敵其於用兵之大略在所當論試按古而言以應有司之問第七問求賢所以建官設官所以治事然而官之所設有定員吏之多寡無常數員多而吏不足則未免冗官之弊今朝廷之患正在官吏猥多而吏員有限是以闕一官則爭之者至數十人注一闕則待之者至六七歲從仕者居間之日多而任事之日少仰祿者資費之用繁而奉廪之入薄借令二十而入官逮七十而致仕四十年之間不過四五更代而老矣其流安得無奔競之風選曹安得無賣官之吏貪墨之風日益滋長滯淹之才無以自拔其弊有不可勝言者焉議者欲救其弊不過曰清入仕之流以革其繁冗可也增州縣之吏以廣其任使可也而二者之患抑又甚焉何以言之昔劉祥道言唐之取士多濫入流者嵗千四百又雜色入流未嘗沙汰會杜正倫亦以為言而執政者憚改作且以勳戚仕無它門議遂格焉今欲稍加裁抑則必怨讟交興首議者將誰肯任其咎乎此其不可決矣建中初天下兵興民多貧困賦無所出杜佑建言其略以謂救弊莫若省用省用莫若省官自漢至唐未有不因征戰而省吏員者所以救弊也今欲稍加增賦則利亦多而民重困此其不可又決矣二者皆以為不可則是救之終無術也而可乎諸君於此必有其説請試陳之第八問古語有之畫地為獄議不入刻木為吏期不對路溫舒以謂此皆疾吏之風悲痛之辭也溫舒雖託秦吏尚存以諷宣帝之深文而吏亦真可畏哉韓安國梁之賢士也而辱於田申周勃漢之大臣也而侵於獄吏况其餘乎由是觀之謂吏之不足畏者非也穆宗時柳公綽為山南東道節度使過鄧縣有二吏一犯贓一亂法咸謂公綽必誅犯贓者公綽曰贓吏犯法法在姦吏亂法法亡竟誅亂法者蓋法者治亂之所係而吏亂之則民將無所措其手足此亂之所由起也誅之可不力哉今律之禁吏法非不嚴而其姦滋甚何也夫舍刀筆之吏以趨功名之會有如漢之蕭何曹參唐之孫伏伽張元素之徒此希世有之不可多得姑欲少革前日之風使此曹惟三尺之是畏將何術而可乎願偹陳之焉第九問有創業之主有守成之主有中興之主創業守成之主其成功之難易昔人論固已詳矣至於中興之主雖撥亂反正持顛扶危號為一致而所遭之時不同則所成之功亦異不容於無辨也三代逺矣由漢而來在西京則有孝宣在東京則有光武在晉則有元帝在唐則有憲宗皆一時英敏有為主也然而漢之孝宣唐之憲宗則振墜緒於將亂之際其為力也易漢之光武晉之元帝則紹大統於既絶之後其為力也難非特難易之辨如此托其迹而論之則又有不同者矣孝宣之勵精憲宗之剛果皆能操握主權歸於獨斷其於治道固略相似也神爵五鳳之間未嘗遣一將出一兵能使單于內附稽首闕廷而元和之盛連年動衆僅能拓中國之故疆折悍將而臣之其功效之優劣固不待較而明也光武以漢宗發迹于南陽元帝以諸王龍翔於江左皆能使旒綴絶而復續大厦仆而復支可謂二代之賢主也光武殄攘群盜戡定禍亂曾不數年遂光漢業而元帝外不能剪劉漢之逆虜內不能平王敦之跋扈使西晉之業如是而止則其功效之優劣又不待較而明也四者之效其異如此何哉豈時有不同而然歟勢有所迫而至於是歟抑亦所操之術有或異歟所以輔治者有善不善歟是必有其説矣主上聖文神武度越前代逺甚而區區之問猶及於此者蓋考古驗今以鑒既往之失正今日朝廷汲汲於求言之意也其可忽諸第十問近世論禦戎者其説紛紛大抵不過三䇿分遣將帥諸道並入破其國都擒其名王將以為吾中國萬世之利此上䇿也屯兵重鎮守其要害來則禦之去則勿擊此中䇿也重幣厚禮悅以甘言使命相銜歲無虛日姑以幸其不至此下䇿也曩者歲在丙午金人南下逮今有十餘年中間屢盟而輒渝倏往而復來朝廷知其不可結以成信乃下親征之詔決意征討期在殄滅嚮所謂下䇿者固巳置而不論巳於二者之計當審處其一而行之而議者猶有説焉以上䇿為是者皆曰提兵四出傅敵城下斬其名王傳首藁街然後河陽北狩之憤可雪龜陰未復之田可歸矣議者乃曰不然王者之師貴萬全善用兵者知彼已今兼百萬之師入不測之地豈無千里餽糧士有飢色之憂乎此殆書生好髙之論耳不可用也以中䇿為是者皆曰逺戍以宿兵屯田而積穀務慎擇良將堅壁而守之是不勞師旅而坐獲禦戎之利也議者則又曰兵久而不戰武黷而不偃中原何日而可定故都何日而可居豈不勞師費財困弊中國乎此殆鄙夫之常談不可用也世之所貴於儒者豈徒取其誦數而已謂其能通達國家之大體也願陳二者之䇿將孰從而可且以求至中之論至於不折一戟不亡一鏃而收百戰之功于萬里之外又豈無胸中之竒乎毋謂伐國不問仁人而不以告第十一問先世以農事為生民之本後世以農事為不急之務先世重農而敦本則國富兵強而太平之治為可圖後世不以農為務則民窮盜起其弊至于大亂而不可救農之所繫故不重哉為人君者非不以勸農為先務而徒有其名而無實曾不知古者勸農之術其責之甚專其督之甚重其告戒之甚熟其勉勵之甚至何以知其如此舜命九官而稷居其一未聞其兼以他職也則其責之可謂專矣成王親率元后世子以次于郊未聞其不屈于至尊也則其督之可謂重矣漢文由代邸而即帝位二十三年之間勸農之詔無嵗不下甚者嵗至于再焉辭意誠到人為動心則其告戒之可謂熟矣三老賢能之求也孝悌德行之舉也而與力田同科則其勉勵之可謂至矣然則後之勸農者有一于是乎主上隆寬博愛屬意元元深知其弊蓋將有意于古焉而任是責者莫先于守宰奈何今世之吏狃于宿習安于茍簡不復從事于兹久矣故勸農之號雖已入御而行春之車未嘗出境髙談者指為俗吏之事好大者鄙為猥細之務膏粱之子菽麥未分一日出為民吏至于問穢襫為何物以穮蓘為戲事者彼又何足以上承明詔下為農師哉今欲州縣之吏皆究古事以不負朝廷委任之意如之何而可耶第十二問國之所以興者必有其道及其亡也則亦必有以取之矣然而禍固有出於人之所可憂亦有起於人之所不憂者往往寖以至於大禍雖有智者不能救其危為人君者烏可不察哉西漢始興鑒亡秦孤立之弊於是大封同姓疆域之廣至于周匝三埀天子自有才十五郡尾大之勢賈誼言之為之痛哭此其甚可憂者也而西漢之亡不在于封建乃在于外戚東京自顯肅之後政在房闈孝和之政歸于竇氏孝安之政歸于鄧氏孝質之政歸于梁氏當是之時主幼而臣強國危如纍卵此其甚可憂者矣而東漢之亡不在外戚而在于權臣西晉之時宗族舉兵內相誅滅八王之亂自古未有此亦可謂甚可憂者矣及其亡也不在于諸王乃在于夷狄自晉氏滅于劉漢之後夷狄之勢日以盛強秦堅燕埀更立為帝區區江左一隅左枝右梧日不暇給此亦可謂甚可憂者矣及其亡也不在于夷狄亦在于權臣唐之宦官建立八帝天子之尊至號門生此乃天下必亡之勢也及其亡也不在于奄寺乃在于藩鎮五者之勢如此殆未易詰其所以然也將人君養天下之禍以至于敗亡而遂不可救歟抑亦衰微有漸雖有強明之君而其大勢已去遂不可救歟抑亦君臣上下偷安歲月以至于斯歟抑亦救敗整危無其術而然歟願聞其起五者之禍者為誰為之臣而不能援其傾危之世者又誰耶諸公皆博古之士議之熟矣幸條其所以然者而言之第十三問盜賊為良民之蠧雖甚治世所不能免自古帝王不恃吾能禦盜恃吾能禁盜而巳禦盜者治之既興之後治之既興之後盜去而人已不勝其弊禁盜者銷于未然之前卒至于無盜之可禦則是豈足為治世之患哉漢之始興治尚清淨禁網最為踈闊天下亦以無事乃武帝之治專任慘酷而吏民益輕犯法盜賊滋起至使天子命九卿衣繡衣持虎節發兵以興繫甚至于作沈命之法所在聚徒黨阻山川往往而羣無可奈何由是知禦盜者昔人之所不取而禁盜之為先也國家遭外侮侵陵之患承兵革搶攘之餘四方羣盜乘間竊發破壞郡邑侵掠土疆動以萬計王師一出饋餉有千里之勞將士疲戰鬭之力而凶焰旁午不可勝誅將招以厚賞誘以髙爵則又適足以生天下為盜之心今欲不煩干戈不勞廟算嘯聚之盜雲散鳥駭復齒良民必有其術矣幸援古而詳言之以救今日之弊毋諱第十四問西漢以來取士之法雖或不同大抵皆以言詞取人不若周公専意行實也至隋唐但用詞賦而聲律之學自是益嚴且賦之作以擅名一時然其拘于聲病對偶猶未甚也沈約始作四聲譜嘗曰在昔詞人纍千載而不悟余獨得于胸襟窮其妙旨自謂入神之作宋武嘗問周捨何謂四聲而捨對以天子聖哲則四聲亦略見于此也當時又有平頭上尾蜂腰鶴膝之語世號永明體大抵欲宫羽相諧低昂適節若前有浮聲則後須切響故一簡之內音韻盡殊兩句之中輕重悉異其學雖不純于古然亦自有妙處方今世革經義浮虛之弊稍復詩賦以取士則學者於聲律尤當用心敢問四聲譜可得聞其詳乎願并與其言而論之太倉稊米集卷四十八
