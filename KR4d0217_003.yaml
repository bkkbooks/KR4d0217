body:
  text: 太倉稊米集卷三宋周紫芝撰詩四十首壬午秋日觀橋刈穫五首時年二十一清晨起盥櫛卷箔坐南軒紅日忽滿樹飛鳥相喧翻農夫告銍艾導我之前村露晞芒屨滑地僻秋蕪繁行行不逾里委蛇到其門父老喜客至為黍烹雞豚勸我當力穡醉中多好言低頭謝父老我志久已存歸來三歎息默誦歸田園交親不相知笑我營小築人生如風燈一滅不容續勝負棋一枰信手安用覆與君共此世百嵗但信宿進退均有求要各隨所欲君軌趨朝市我履在林麓胡為浪相笑吾計念已熟客來不與辨聊用銘我屋代馬嘶北風遊子思故鄉冨貴人所羡危機亦難防幕上巢豈安劍頭炊易傷乃知三畝耕此策為最良寒士但藜藿肉食餘膏粱脫粟衆所食萬錢誰得嘗終然均一飽果腹俱徜徉飯蔬豈不樂厚味生禍殃以此較得失豈復無短長人言秋日短無事日更長籬落既補治稼穡已滌場薄暮有微興悠然步東岡東岡棗與梨纍纍半青黃幽菊雖未吐已含風露香風物良可喜客來有杯觴但使常如此貧賤亦何傷祠宫昔所築古屋棲真靈誰知員嶠徙亦歎曲池平我即廢址北結茅寄幽情髙秋肅萬籟仿佛聞簫笙夜夢著瓊冠結佩朝玉京談笑悟至理俯仰了八紘安能事香火餐霞學長生明朝日復出抱耒還躬耕題龍眠畫四馬圖裕陵神謨與天通崑崙以西俱鑿空渥窪初來九夷服盡得大宛三象龍于闐鳳腦世未識但見蹴踏長秋風鬼章錦膊驚絶代更看吐蕃獅子驄奚奴骯髒雙眼碧錦韀錯落青絲籠最後一匹號雄健見自往來天伏中羽林騎士鐵撾肅鳴珂蹀躞纓埀紅諸畨入貢御間溢君王晝坐蓬萊宫為臨玉陛閲神駿詔寫真形誰最工龍眠妙伎非俗畫不數當年老曹霸三驄豈是拳毛騧俶儻權竒頗間暇籋雲之姿迣萬里太一來貺天馬下內人傳看十二蹄一笑微生咫尺威自從鼎湖弓劍墜龍媒上天久不歸只今空對畫圖泣忍聽鳥呼金粟堆遊麻姑觀宣城有麻姑山山中有觀清秋禾黍罷南畝幽事少凌晨有佳興振䇿事輕矯微蹤躡飛猱雄眺髙木杪上有仙子祠棟宇頗傾撓騰虛想雲軿遺像空鳥爪黃冠三四輩生意良草草更欲問丹爐雲山遂窮討道人笑不言此意未遽曉但云須趣轅山靜虎出早勝踐良獨難仙事亦杳渺了知世俗人塵凡隔蓬島小壺貯江蠟二梅幽絶俱可喜作三絶遮眼梅花不要多著人無復奈香何月明羞看銅壺影矮樹斜枝憶短坡吳娘解滴酥成蘂天女能融蠟作花付與詩人説妍醜風流二士夲同家天上姮娥白玉肌蘂珠宫女鬱金衣相逄月下渾無語笑指蓬壺作伴歸病中戲作本草詩長空青雲晝風卷雨餘涼生開病眼垣衣洗雨緑生光芍藥翻階紅照晚幽人却掃驚半夏獨杜衡門心頗逺提壺勸酒意甚勞花間伏翼終日號大棗如瓜安可得竹葉豈宜空蟹螯何當如淮注石斛天南星移碎紅燭錦纒更命劉寄奴回雪香柔體如玉人生富貴不早休烏頭成白空自愁浩歌自駕木蘭去范蠡實能知逺遊君不見赤車使者將君命五加皮幣不少留一朝逐客便當去王不留行空淚流又不見浪蕩子長負羇槖石下長卿無住著賈論空髙逺志孤屈草初成竒禍作何如獨活考澗槃不遇自然同此樂嗟余知此解馬銜蝸廬僻在陵陽角誰能更朝紫真壇丹砂豈解駐衰顔五色神符亦安用菖蒲謾説能引年玉泉泠泠潄虛壑獨尋鶴虱負朝暄故人逺引羇旅夕寒水石畔思清言何時從容乃如此煙蓑去作牽牛子平生甘遂丘壑貧常有憂懷思洗耳道由於潛將遊西菩問之路人則云過之已逺人生如落花隨寓皆可喜但恐兜羅綿牽連入荆杞我馬今未羈猶堪作幽事道逄西菩山欲問參寥子舉鞭信蹇驢褰裳渡流水隱約望三山展轉才十里吳兒指似儂但隔一山耳塗窮殊可笑興盡亦復止吾曹坐天厄萬事無不爾小者今復然大者斯已矣越臺夜雨夜暗秦淮雨燈昏越女祠寒窗歸夢短秋枕客情知鳬雁初何定雞蟲事亦卑明朝江上去重理釣魚絲晚遊戒珠寺寺王逸少舊宅寺僧秉燭觀王右軍畫像出訪鵝墨二池歸已三更悠悠倦徂征忽忽厭羇旅出門復風埃况乃迫繁暑兹遊愜初心突兀見精宇髙人昔所廬樹木亦竒古微風入冠裳林影散廊廡僧窗靜無塵燈火照眉宇閲此坦腹姿鬚髮稀可數樂死固不虛顔色如處女平池渺清深淅瀝過新雨誰言臨池工至技本天與鵝羣久已空團扇復何許興盡且當歸夜半月方吐歸雲洞南華老明師遺像頗清古昔為挂空月今作歸雲土雲來初無心雲去定何處空餘暗竇泉翠盎含白乳華堂誰復枝缺甃久未補林深自成風山潤疑欲雨窮幽眼未饜曳杖足已苦入山無與迎出山信誰阻有客自去來山僧無一語次韻次卿見寄此生懷抱向誰開唯有華顛苦見催萬事只今渾是夢寸心堪笑已成灰路長安得詩飛去交淺唯愁雨不來此意喜君無冷暖尺書頻寄塞鴻回食瓜二首鄼矦昔微時刀筆一小吏起依日月光勛業髙百世道大原不容功髙亦為纍所以韓彭徒纍纍就庖胾蕭何于是時身任天下寄坐安劉帝心賴有東陵計東陵固明哲避地有深意此物原不凡世俗豈知味此味當自知未可語兒輩元和數才子例指到元白香山詆中奄進寸輒退尺元侯躐要塗崔子實卵翼兩公賢與愚何啻白與黑二武有直氣詆評恣呵斥蒼蠅從何來汙我盤中食想像懷昔人撫几三歎息遊衡廊山山中有梁武帝杯渡禪師像瀛渤從來是一漚何妨飛錫到中州解將瓶鉢橫雲海懶向秦淮障逆流次韻韋深道見寄不見蘇州五字詩韋郎有句解人頤長才白柄林間事折角烏巾世外姿失馬未應無後福亡羊政恐坐多岐人生一笑真難事白髮逢君苦恨遲宿琴髙岩二首琴髙古仙人控鯉飛上天丹爐訪遺迹邂逅餘山巔石壁削寒玉萬仭凌雲煙隱雨有石屋埀釣臨平川舊聞釣處石可坐八九筵邑宰頗呼客醉歌日留連里胥厭追索挽石沈深淵髙秋見涯涘巨石呈方圓斯民不可擾此理甚坦然豈非仙聖居未易汙葷羶餘生欣晚遇想像追真仙淨緑不敢唾薄暮聊周旋長川抱空岩春水三月深有魚嵗一來瑣細如寸釙網魚聚乾臘白艇爭分陰與人作苞苴囊紗走權門人言投鱠殘成魚只侵尋豈有仙家庖烹鮮赤刀砧又言棄藥滓入水成纖鱗仙事亦渺茫詎可窮本因不知誰作古遺禍今猶存殺魚嵗億萬可易千黃金僅令貴公子醉嚼聊一欣世俗自乃爾仙人亦何心宿隱靜作短策羸驂山路長松陰十里午風涼飛來一水自碧落屹立五峯藂寶坊青鳥也隨人聽法老禪聊為客燒香泉聲繞枕渾如雨月色滿岩疑是霜次韻石端若惠長句仲容無雙天下士草木自應殊臭味嵇康似鶴在雞羣子陽如蛙真井底小巫神氣驚大巫一見斂顔羞欲死眼無皂白敢妍媸口有雌黃誰言翕訾借令卷舌終自羞吾顙嶢然寧不泚伯仁大腹號空洞步兵醉語無臧否君方二子不啻過視我當如發蒙耳浪將五字比長城要為庖丁作餘地人言政似韓潮州欲借新聲與侯喜蒼顔稿項日摧頽回雪流風更雄偉乃知愚知本相懸何啻人間三十里我詩頗似西臺書時雖可喜終可鄙人言嫫毋不自憐捧心成顰亦成恥少年有意慕黃初豈料永嘉聞正始詩壇新拜少陵侯頗笑棘門兒子戲勸君此語勿浪傳俗物還來敗人意次韻端若再惠長句功名本是兒時事過是懸知終少味向來欲度驊騮前無命能居百僚砥未容晚輩識風流頓遣前賢隔生死黨獄十年猶未開讒口囂囂苦相訾且將皮裡著陽秋敢復眼前分濁泚顔之厚矣終自羞論少卑之人亦否路逢俗士呼與言公獨未知其趣耳無人為弔楚客魂誰肯更作將軍地此心此語只自知聞君足音驚且喜詞傾三峽頗壯觀氣吞雲夢真竒偉時從霧豹得一斑行看飛黃日千里如君人物尚淹留此事寧非肉食鄙枘方雖自與鑿乖瓶竭那知是罍恥一生恨未識荆州萬事政須咨伯始忘形已自到爾汝論事何妨雜嘲戲人生一笑不易得莫遣征航有歸意次韻伯尹贈竒童二絶句它人有子但豚犬是家此郎真芝蘭異時筆砥問珠玉已在只今眉宇間昔聞徐卿有二子今喜衛家稱一兒只有九方真具眼固應知是渥窪姿次韻伯尹晚遊松林寺詹矦學古淡胸次無炎冷髙情屏嗜好邃宇極深靜清心樂幽禪世外得佳境靜悟已聞法踴躍更深省應復嗤衛侯耄期猶自警能事兩禪師句法頗清穎無誰可悟言舉世我獨醒故來追若人兩耳靜蛙黽我生塵埃中況迫桑榆景安得薝蔔林婆娑共清影君今富春秋器業窺魏丙兹遊慎無厭流光不俄頃恐未免簪纓問道勤造請次韻韋深道獨樂堂十絶廊廟登元勳四海歌畫一羣公各交章君乃卜少室人生幾蠟屐千古一草堂得失了自判較然不須量棐几坐永日巖花動微風未知堂中人此樂誰與同達人信死生過眼閲暖冷了知夢境中此味獨差永曩喜韋蘇州有句盡平淡只今把君詩去眼不可暫鬻錢走京師我笑員半千王階求自試北牖輸髙眠聞君開華堂圖書富千古應笑碧衣郎試吏坐藍縷愛酒惜杯乾懶衣愁客至世無錦江翁誰識幽人意草木各有態臭味久已分願言蘭芷藂東風佩微薰跂首望蘅皋逺目聊增明相逢定何夕劇談到參橫病後二首山有生前約花留病後開得間如我少扶步與誰來閉戶深防客哦詩穩送杯夕陽如有意催月與徘徊病起身還健憑髙喜欲顛亂山推不去一水忽當前逺碧飛雙鷺平湍落釣船自今如不死餘日盡詩年太倉稊米集卷三
