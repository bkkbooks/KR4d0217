body:
  text: 太倉稊米集卷六十二宋周紫芝撰上梁文五首草廬平生隨分本無鐘鼎之心晚嵗安居粗有林泉之趣寖經羣盜流寓數年嗟老稚之飄零悼衡茆之煨燼浮家泛宅送日月於江湖賣劍買牛追雞豚於里社重營環堵漸復故巢靜寄老子與世寡緣謀生甚拙偶因同氣為憫餘年結茅屋之數椽著褐裘之一老下臨無地髙占層邱草樹冥濛烟雲變滅買田三頃常思水耨而火耕有宅一區且作山棲而谷汲薄種籬邊之菊更求江上之榿入則鼓琴以自娛出則抱甕而立灌稍資糊口便欲杜門聊從父老之游誓畢桑榆之暖爰諏剛日為舉修梁拋梁東家在陵陽最上峯夢到華胥春睡足起看紅日曉曈曨拋梁南笑倚閒窗寄薄酣謝朓樓空人似夢瞿硎山在翠如藍拋梁西漲玉雙明落雨溪飽食髙眠無一事離騷讀罷日還低拋梁北北望神丹少顔色書生空復涕橫流欲正乾坤老無力拋梁上合璧連珠閲天象白頭重見太平年常與羣生拱南嚮拋梁下雞犬相聞幾茅舍今年米賤似開元多釀春酟醉同社伏願上梁之後樽有濁醪瓶多儲粟眼前稚子常聞絃誦之聲門外交朋頗篤金蘭之好飽維仁義醉在簡編雖未能反照以回光亦足以隱居而求志兵戈偃息復見漢官之威儀閭里歌呼同聽葛天之音樂萬波亭亭在福聖寺孤壘瀕江水環雉堞寶坊擇勝亭占鼇頭山翠潤以撲衣水光瑩而入坐號為貝闕不減瀛洲宜華屋之交輝截長空而永秀天邊雲黑喜白雨之跳珠湖上風來看驚濤之卷雪勢如立海聲若懸河雖萬波之隨一波逺連天漢向小水之入大水終返歸墟知本性之元虛顧人心之自動澄瀾一現萬象俱空鷗鷺不驚鬚眉可燭桃花水暖何煩紅袖之泣魚蓮葉舟輕不礙緑蓑之埀釣天水為之同色風月斬然一新偶作數椽遂成偉觀方袍禪客時來洗鉢赴堂白髮使君不免借場作劇共拄西山之笏仍攜北海之樽齊罷門關誰管波生四面醉中船重從教雨濕紅裙道俗俱是隨緣彼此自有樂地爰因暇日為舉修梁拋梁東身在諸天寶梵宫遙想扶桑催曉色日輪飛上九枝紅拋梁南水倒山光碧在潭卷地薰風忽吹起白波翻動一池藍拋梁西栁外春風水拍隄斜日掛帆來送客緑波青草兩凄迷拋梁北無極之中有太極寄言河伯不須誇海若令君有慙色拋梁上坐看秋蟾繞青嶂我欲邀梁不肯來夜半孤光水中漾拋梁下風黑波翻天欲夜須臾人靜水無魚却閉孤蓬作茅舍右伏願上梁之後叢林有供衲子如雲道院長閒嘉賔滿坐共看銀河千尺之浪同是曹溪一滴之甘船子和尚載月便歸流水長者於魚得計隨波逐浪各求離於愛河反照回光當內觀於止水九江新居蓬壺三島無路能通湓浦一江攜家可老望廬山之面目接富水之郊圻謾蓋三重之茅聊作一區之宅陵陽老子泛然無定老矣何為似屋角之拙鳩無枝棲宿隨沙頭之乘雁任意去留念人生初無幾何况吾年今已如此煩君龜策占我兔裘得濓溪先生之故基訪香山居士之遺跡黥布之英雄何在梁公之忠義猶傳澆酒酹江哦詩弔古雖乘興有時而出亦倦游無事而歸玉軸臨窗鄴侯之書可校窪樽近席漫郎之客宜招已結雲菴猶懷舊國昔困焚巢之旅今作在家之僧未盡百年尚可遍遊於岩壑順流五日何妨歸拜於松楸不謂天心偶如人意當生生世世永無萍梗流轉之憂令子子孫孫常享國家平治之福乃因令日爰舉修梁拋梁東山氣初分曉色中我亦春來常早起看花迎日弄新紅拋梁南門外疏簾捲翠嵐莫遣兒童來報客老夫一枕睡方酣拋梁西落日銜山穩杖藜試問草堂尋去路夕陽斜處是濓溪拋梁北萬里長江紀南國使君肯借庾公樓飽看兩淮山一色拋梁上廬阜山頭聊北望醉來幾度落烏紗目送飛鴻閲千嶂拋梁下樂嵗中田有廬舍裹鹽聊伴趁虛人相逐官倉納禾稼右伏願上梁之後粟如水火奴亦詩書鄰甕酒香知君家之可去短檠燈暗喜吾句之又成孔方兄不至絶交管城子時求入室洛鳬飛鷺同為笠澤之游稚子老妻共作鹿門之隱二妙堂西來千里本是隨緣南畔一峯偶然入意爰因絶頂旋結新亭收翠阜於几席之間挹銀濤於烟雲之外陵陽老子靜無他好老見真情自從童稚以來便有山林之趣臨江卜宅以遂安居背郭成堂更求勝地大禹道九江而東下匡君依五老以飛升白練橫江青巒削玉夢回枕上臥聽波聲醉後杯中時浮山影地兼二妙世有幾人豈力所能實天是與既占星而作室乃蠲日以架梁拋梁東東望麻姑香靄中遼海千年却歸去誰知去鶴是衰翁拋梁南南斗傍邊是翠嵐可怪暮鴉飛不到直穿雲漢上相參拋梁西不見清漣落日低却憶風流泉似玉使君幾度醉如泥拋梁北雨暗波翻暮江黑須臾風定月如錢月共江光去無極拋梁上目送飛鴻依藤杖望雲歸去宿空岩看雪飛來沒青嶂拋梁下草色青青春可藉趁花未落酒須攜莫待濃隂滿桑柏伏願上梁之後國永休兵家常有酒騎欵段馬渡水穿雲著接籬巾栽花種竹年年强健事事清幽但能粗了平生不可更求分外耄而學佛僅同臨老出家窮且哦詩豈忍因咽廢食負暄亭身遊月窟夜色偏寒背負茅簷朝陽甚暖竹坡老子抱山一曲借日三竿踞坐蒲團缺伸自在醉憑棐几魂夢悠揚念湯婆子終是少情况麴先生有時不至須回暖律盡入寒鄉青春誰道難留冬日方知可愛解衣捫虱暖趁風來剔甲搔頭句從天落姑尋暘谷且寄慘椽拋梁東碧瓦霜花曉未融喚起先生來打坐笑看紅日上簾櫳拋梁南卯酒初醒只卜酣漏下不知天正午尚留紅日在茆庵拋梁西暮靄還催落日低招得斷霞明老眼讀書窗在夕陽溪拋梁北暮色蒼蒼留不得道人閉户暖丹田咽日餐霞養殘雪拋梁上暖日烘烘薰蕙帳手彈流水送飛鴻目斷關山更東望拋梁下分得山坳一田舍狐裘溫暖不知寒化日舒長元不夜伏願上梁之後泉日騰光妖氛掃跡山無凍雪和氣自生桃有冬花春風常在詠栁子厚青松之膏沐照崔侍讀苜蓿之闌干獸炭不然鶉衣自暖平生誰解炙乎晚嵗粗免焦頭林下身閒敢以附炎而取誚天邊地濶唯知望日之難忘青詞六首為太守􅓙火設醮民罹凶死至於疾痛以呼天吏莫撫循唯在祈禳而集福敢傾微懇上格髙真伏念臣某祇服國恩偶當郡寄速兹大罰皆自巳愆始由一爝之遺馴致燎原之禍烟埃變滅千里為之皆空積纍而成百年有所不足驚魂未集烈煏猶溫登埤無及於救災奠玉尚期於請命式陳淨醮䖍按真科冀下憫於冥頑用潛消於災沴循五星之軌度伏見以時清四海之風塵憂虞永殄為人母病祈禱設醮孝子之事親莫不欲壽皇天之鑒物所饗惟誠不資覆燾之恩孰報劬勞之德伏念臣某頃緣偏侍兩困沉疴實罪戾之所貽輒䖍恭而有請願損微躬之數以祈壽母之年仰荷真慈俯從卑懇使螻蟻之誠得以自效在犬馬之齒亦何足云知鴻造之無私雖庶言而亦聽嵗華荏苒尚躬藥石之勞憂悸危惶敢避禱祠之瀆儻終調護賜以清安庶永侍於萱堂誓投誠於瓊館私心甚切天聽必從為人保安設醮奸雄跋扈方正常刑神聖照臨力垂隂相不假寸兵之利坐收堅壁之師凱奏既敷民居攸奠伏念臣某猥分微祿久殿危邦當風聲鶴唳之餘處蟻聚蜂屯之地懷奸莫測虞禍益深匪託庇於神靈孰保安於黎庶不勞折箠安用交綏凶焰光沉攙搶夜落渠魁膽喪蛇豕成擒市不改肆而人安兵無遺鏃而戰勝豈獨人情捨逆而取順益知天道福善而禍淫用罄丹誠敢陳淨供强藩悍將願無葅醢之凶異域遐方庶遂農桑之業興國祈雨設醮旱暵為災天無定數吁嗟求雨古有常儀勢甚兢危辭當迫切敢陳懇悃仰冒誅夷伏念臣某寅奉制言畀司郡寄惟兹小國僻在大江千里之田民尚耕於荆棘一年之賦吏已督於課租少值凶荒必皆流冗顧人情之可憫在吏責以何辭况榖粟之將成僅資一雨則風雲之易感豈待崇朝人欲可從天心必格如臣冗散亦冀矜憐上帝降康力救藴隆之苦斯民安堵敢忘覆護之恩禳火設醮曲突徙薪後於防患崑岡焚玉幾至為災荷上穹埀祐之恩脫萬室俱焚之禍載憑羽衆仰叩璇霄伏念臣某素稟下愚久逃餘釁偶紆郡紱職本在於撫綏馴致庖烟遂稍成於驚悸顧居家之不理使斯民其謂何展轉回思周章失措唯有投誠而請罪庶能反戾以成休願恢廓洪私消攘宿譴畢方收焰豈但一家竊飽食之歡黔首安居庶幾千里無燎原之恐九江新居設醮定方中而營室畚築有時鵲避嵗以成巢隂陽多忌比緣興於土木恐有犯於方隅退省愆尤用伸懇禱伏念臣某負乘而致冦基薄而厚墉悼艱蹇之百為幾飄零於半世老稚八九口未有寸田風雨三十年徒思片瓦念無家而寄老雖竊食以何為有宅一區偶如人意去鄉千里皆藉神休豈可復玷於冠裳但冀少安於蓬蓽敢睎洪造盡滌微疵子子孫孫願不失於常産夫夫婦婦更永享於遐年姑欲延雞肋之軀不敢效豚蹄之祝致語六首天申聖節樂語四海望雲仰鬱䓤之佳氣萬邦執玉賀震夙之嚴辰普均湛露之恩大賜需雲之燕凡曰有生之類咸傾向日之心溢霈澤以旁流格歡聲而四起恭惟皇帝陛下乾剛行健離照繼明車書度文軌之同禮樂盡制作之意九莖芝秀齊房奏玉磬之歌十載桃生瑤海降寶幡之仗始即未央而置酒復從長樂以聞鐘皆聖孝之感通想宸心之歡洽殊庭奏樂獸遂舞於九韶靈嶽效祥山亦呼於萬嵗但某等叨居樂部上感聖恩遙望闕庭敢獻口號曰建章宫殿擁祥烟遙望需雲錫御筵上帝自應知舜孝萬方宜共祝堯年蒼龍闕轉曈曨日瑞獸香聞咫尺天湛露恩深何以報願將虎拜答周宣周朝議燕新第二㦸排門昔榮崔氏一區有宅今笑揚雄煥丹雘之髙明揖江山之平逺雅有方池孤嶼何慙燠館凉臺自喜漫郎得浯水蒼茫之樂人言摩詰游輞川圖畫之中家有清樽門多賀客登三堂而共賦慶駟馬之容陳恭惟某官德比圭璋文摛錦繡少年射策遍歷清華晚嵗懸車亟從閒適遂倒冠而落佩乃尋壑以經邱久樂燕居重新甲第既連甍而接棟亦跨谷以凌霄宜同珠履之嘉賔共醉羽觴之清夜春風庭下秀幾葉之芝蘭明月杯中介千齡之壽考但某等儉司末技胡部賤工上越尊顔敢陳口號曰風光渾占一溪中青谷新開甲第雄凉榭切雲先得月朱樓凌水欲橫空連甍萬瓦琉璃碧照坐千鍾琥珀紅要看仍雲乘駟馬使君眉壽似喬松上元燕賔客嶰竹初回既迎青帝仙燈焰暖爰燕黃堂眷惟賢牧之出游要慰斯民之願治乃陳觴豆爰奏笙簧繡户千家喜春風之吹酒銀釭萬㸃隔秋水以明波煩渠萼緑之纎娥扶起謫仙之醉玉歡聲四振叶氣橫流樽酒滿而賔客多雅稱使君之行樂鐵劒利而倡優拙自然豐嵗之成歡不醉無歸與民同樂恭惟來從紫府暫擁朱輪為言樂事之難并復恐彩雲之易散且同燕笑豈無後乘之鄒枚苐恐召還難借禁中之頗牧行秉金蓮而賜燭好飛玉斚以流杯不孤樂國之良辰永作江南之盛事詞曰使君才氣本無雙暫擁州麾殿大邦千騎出城聞畫角萬燈銜壁看銀釭夜天星滿光浮漢秋水花紅錦照江莫向華堂辭一醉君正懷舊憶竒龎燕太守汪內相聖主憂民暫分頗牧逺方願治思見龔黃乃親擇於侍臣俾分臨於近甸兒童舊識不妨騎竹以來迎父老何知便欲遮道而願借將出游於阡陌聊求助於江山已知雨意隨車行看花邊立馬恭惟名標紫府身侍金鑾亟成載筆之書久步花磚之日自違清禁屢刺名城更為斯民輟五州紈袴之手要看來嵗玩一方牛犢之春固嘗衣繡以還鄉即見追鋒而給傳願布寬和之政咸均雨露之恩詞曰誰持尺一下明光新易泉南舊印章禁殿何時出頗牧人間又喜見龔黃攀轅父老今猶在騎竹兒童喜欲狂只恐政成歸更速便紆華衮望清光燕吳奉使畫紱臨軒初銜使㫖班輪入國將觀朝廷載馳咫尺之書歸望穆清之表宜百壺之開燕均六轡以休勞恭惟閥閲名流縉紳雅望贊謀二府名振一時問俗三川風行萬里既繡衣而持節遂縞帶以交歡今者判府內翰始乘漢傳之追鋒來擁東方之千騎誓安逺俗喜見王人叢玉歌喧幸驪駒之未唱碧腴香滿嘉仙醴之方濃願少緩於登車庶盡歡於投轄詞曰清詔名髙下紫宸異方初喜見王人二年輦轂辭家逺萬里岷峨入眼新使者登車爭攬轡君王問俗頗憂民翰林勸酒非無意知向明光作侍臣二妙堂落成家集華胥開國時節太平居士搆堂山川明煥老人既欲投鞅稚子從而擊鮮㑹鄰里以俱歡集笙簧而並奏恭惟居士解符江壘拜祿琳宫二妙堂成兼收勝景六如意悟了見自心孺人法喜夫妻永同香火諸郎淵明子弟可共籃輿楊夫人壽母均慈慶門積善庭列芝蘭之秀家羞蘋藻之儀乃共集於華筵遂同增於抃舞詞曰居士歸來已白頭數椽聊喜枕江流百年夢幻何時了二妙江山一日收鼓吹自從詩裏得光隂都在醉中休蟹螯霜後偏宜酒蘇幕歌成可共謳時自製蘇幕遮詞太倉稊米集卷六十二
