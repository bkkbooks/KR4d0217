body:
  text: 太倉稊米集巻五十九宋周紫芝撰書六首為人上管使君某為兒童時粗知人事當紹聖元符間學法未行於天下州縣之士無守令請謁之禁每郡太守縣大夫受命於朝來牧斯民稅驂之日既見吏民為朝廷宣示徳意訪民疾苦猶未遑暇而韋布之士諷說之徒飾小說懷漫刺率造門者户外之屨已滿典謁者執謁白於刺史縣令刺史縣令命儐介以使之進客入與之坐而問焉子為誰氏曰某氏曰子居何里曰某里刺史縣令方簿書叢委吏雁行立於俟署客勢不得乆居退則主人為降賔階辭曰吏束於文且廹於期㑹恐不得繼此以見客唯唯而退謁者由然而來受者泛然而與其交也不能僅志其面目若與路人偶語而退此何禮也哉某甞持是說以問鄉先生鄉先生曰童子何知而妄論長者乎人固不可以無上下之交使公卿大夫不當求延見多士為禮則干旌緇衣之詩不作於鄭衛可也使韋布之士不當求賢達之士而事之則孔子何以言居是邦事其大夫之賢者某應之曰干旄緇衣好賢樂善之詩也賢者之所在則就而與之見或出而在郊或適子之館其為禮甚重為其賢也為其有善道也故屈已而不以為辱盡禮而不以為勞今士不待聘而往見未甞有善道而自售其身賢者之來則可也而醫者卜者往焉屠者沽者往焉假儒之名粉墨揉雜而不辨駑驥同廄而不分其異於干旄緇衣之詩逺矣孔子所謂事其大夫之賢者亦為其賢也為其徳也故往拜其門而贄以盡其禮交以示其情今士不問其人之賢不肖而概見之狀如有司舉行事例安而行之以為分所當然故位髙則禮愈嚴貌尊則辭愈屈逡巡而進囁嚅而言不知其紆紱綬而行等市人或以小人而乗君子之器也又安在其為大夫之賢乎鄉先生怒而不敢言某又甞以是語語客客曰人固不可以一概量天下士大夫固不當以士無賢者而不為加禮士亦不當以有位之不賢而絶之也今太守管公聰明而有謀復敏而能斷仁以愛人而不擾恭以接下而不忽事無小大裁決如流暇則率其賔僚飛觴飲醇賦詩投壺燕豆差差笑言衎衎與斯民同其樂而未甞獨樂其樂也鳥旟既張浮驂在流㑹天大雨公遣祝者造神之祠而告之曰太守將以詰朝㑹僚屬於某地而天且大雨是用有禱於神明日雨乃止天開日出皎無微雲邦人瞻之咸曰神與公期果然且為之語曰雨不愁公出游如是者數四而神不以為凟也今大丞相白公學者之宗師而朝廷之賢相也白公於人物極慎許可而公於丞相為子壻則其為賢又可知矣子其往拜之乎曰諾某去年在都下時閣下方得州未有東下之期鄉里故人皆舉酒相賀以吾州得賢牧而未敢有請放謁者今幸得齒於比屋之民以受約束而被厚賜此不可以不見今既後時矣伏惟閣下亮而進之幸甚不宣為人上滁州王使君某聞楚大夫之言三折臂而成良醫心甞疑之蓋疾既乆則其求方必審求方審則其用劑必當此所以謂良醫也又世言卜貴少醫貴老亦以其老則精於術而不暴焉爾奈何世之人貴妙醫而不貴良醫以良醫之取效也緩妙醫之取效也速良醫之得名也平妙醫之得名也異人固厭尋常而樂異聞殊不知人之死於妙醫之手者矣妙醫之治疾攻以毒藥砭以金石堇以脫其齒刀以潰其疣箆以刮其膜穴以出其腸欵欠未終而疾良已然而使醫盧華它而為之固能探丸而起九死回膏肓既絶之後也不幸使庸人為之則必死矣至於良醫則不然調其隂陽養其五臟補其不足損其有餘而病亦良已至於不可為而死則無如之何矣嗟乎治民者亦何異於治疾者哉故能吏者妙醫也循吏者良醫也能吏之政威以嚴刑繩於峻法重其任而不勝者必責逺其塗而不至者必誅極民之力而不恤其窮咄嗟之間何事不辦然商鞅之法行而秦弊矣至於循吏則不然以愛民為心以利民為事如慈母之於赤子視之惟恐其或傷及其乆也則民富而國亦治矣昔者曹參之在齊也聞膠西有蓋公者甚賢於是避正寢迎而師之蓋公之術大抵不過清靜無為而民自治其後用以相齊而齊大治用以相漢而漢遂平髙帝孝惠之間海内乂安朝廷無事未甞有一施一設而天下晏然司馬遷班固作循吏傳由戰國秦漢以來所載不過六七人何其鮮哉此數人者疑其有卓然不可跂及之功而讀其傳不過躬農桑之勸親鹽米之務而已此亦用良醫之常藥以治其疾者也孝宣之盛西漢循吏皆出其朝當時政平訟理民安於田畝無嘆息愁恨之聲雖所居民化所去見思而傳無可紀之功若趙廣漢尹翁歸韓延壽王子貢之徒皆號聰明勇決為長於聽斷者然剛而未免於暴明而未免於自用雖各因其才以成治化之功至其弊也則名立而怨歸之功成而身隨之以滅此能吏之所以不逮於循吏之效也某家世為滁人自解事以來所閱郡守數人矣往往皆有意於治民而無意於愛民閣下之來惠此邦也一切鎮以靜重未甞紛號令而民富十倍於疇昔去年秋七月天且大旱閣下齋三日而禱於天期以三日而雨否則自劾於朝而去納朝服於廟廷授誥書於有司以示必去不越夕而雨乃告足此豈無意於民者之所能為哉某與邦民均受厚賜將於閣下之政狀之朝請頒之官書以示勸於後世而先為之說以獻閣下幸賜觀焉亦足知閣下之愛民者甚深將終之以不倦矣此滁人之望也不宣與張尚書論移麴院某謂天下之事其得失利害未甞不相為乘除有得則必有失有利則必有害猶日之有晝夜氣之有隂陽人之有生死所不可無也言事者欲其說之必售於人則必指其所得以誣其所失陳其所利以掩其所害言之自有理持之亦甚堅聽者以惑其說必行於是貪惏者足以徼利妄作者足以沽名已受其利而人當其弊自古庸人之生事以速敗亡未有不由乎此也魯人為長府閔子曰仍舊貫何必改作蓋事有可因者不可不因有可革者不得不革不幸而至於蠱壞頽靡不可枝梧茍坐視而不顧則必有受其弊矣此不可不革者也至於可以無革而必為之則孔子之所不取焉户部之有麴院其在西湖六七年為麴六百餘萬觔官獲其利三十餘萬緡不為不多矣其為可數而陳也議者乃欲徙而遷之不見其利而害則有之不知其何苦而為是哉酒之有麴須水而成水善則美水惡則敗不可不擇也西湖之水清甘如飴嵗取而用未甞或失今之所遷地瀕濁港用竹為筒以引河流不下百丈灌於江潮其味甚鹹人或以此難之則又欲鑿井取泉而不知泉脈之來是亦河潮而已前日議者謂某若謂水鹹不知龍山南外江漲北外當用何水某告以龍山用鴻雁池水南外用巡檢司大井水江漲用下河水北外亦用下湖水下湖者西湖之分流也議者無以為對往嵗京師麴院止用一井其味極苦人不能甞然麴非此水不成其後徙至下土橋而麴屢壞乃復故處以此知水之不可不擇也班固謂酒為天之美祿而古人以麴糵為酒母二物相須而成其為靈乆矣酒誥曰惟天降命肇我民惟元祀而周官設酒正酒人之官其法甚嚴以其為靈物也今所徙之地乃昔漏澤園下有伏屍莫知其數隂陽家之所不用徙置其土不唯專犯隂陽之忌兼亦有損朝廷之善政某甞以此告之而聞者笑以謂愚儒不通世務某又告以隂陽之說用於世不知其幾千百年成王之遷洛蓋屢卜而後動近世士大夫不信其說者司馬温公一人其說在論𦵏篇不知笑隂陽之說者能如温公之賢有徳者乎使其人果如司馬公則某實不敢以此知也今俗人之家造斗石之酒者有必卜良日蠲淨室而後為之使婦人畜産不得而見以防其壞况有大於此者乎前日笑是說者家造斗酒猶且慮之何獨以百萬數之多而反不用其說哉議徙者謂嵗可省費數千餘緡而害如此乃蔽而不言此所謂指其所得以誣其失陳其所利以掩其害者也可不詧哉某官居九品職在筦庫而又才不過中人名不在衆口乃欲與有力者爭其不自量誠為可笑而不得不爭者以其職在是也伏自去嵗涖官於兹辱在麾下猥於徒隷躬受約束於今八月有餘矣念進見無媒介之助游揚無談説之言而閣下不以某為不肖不斥而去之庶幾得以自效其言乃敢進說於左右惟髙明亮之見王提刑某甞觀漢李少卿一變風雅五字更魏以來詩人班班不絶然去當代益逺惟唐為最近唐之詩人自宋之問沈佺期杜甫李白唱之於前至元和長慶間諸子並作韓栁元白劉夢得之輩其風流騷雅清艷俊發自有體制讀之可喜味之無窮往時歐陽文忠公一出扶五季之頽風接唐人之遺緒炳然如日星之在天誰不仰睇而拭目至元祐間内相蘇公之兄弟與其門人四君子者更相酬唱自為表裏於是詩人躡踵相望大抵不減唐之晩世議者猶或以為過焉後生晩輩聞其風而恱之在方冊問願見古人而不得者某受性愚陋才不逮人固甞妄意於此以為生乎同世則見而師之生乎異世則聞而師之要在自鞭其後而巳與之既乆不能望其涯涘則又自悔以為前人不可得而見當有傳道受業得法於諸公者求之甚力晩得姑谿李先生先生内相蘇公客也甞逡巡避席而請願受一言之教姑谿笑謂僕甞聞蘇先生之言矣先生謂吾詩學李太白某應之曰以今日觀之自是兩家姑谿曰此謂善學古人者蓋東坡之疾快似太白之豪放要之才侔氣類同一來處故易到耳又十五年而得具茨元不伐具茨太史黄公客也具茨一日問作詩法度向上一路如何山谷曰如獅子吼百獸吞聲它日又問則曰識取闗捩具謂魯直接引後進門庭頗峻當令參者自相領解某聞二公之言茫然不知其所向然用心益苦下筆愈難徐而思之雖信手輒成而天資固陋終不能曉至於白首亦不自悔是可笑已恭惟閣下道徳光明才猷敏妙文章學問家世相承士之願拜閣下之門者咸以爭先覩之為快往時故人語聞閣下之長篇麗句竦然心動以為風檣陣馬未比清雄回雪流風自成平淡至其妙處殆非愚陋所能形容徒以學淺才薄名晦位卑陸沈於世不得登士大夫之門無從一望下風方抱恨伊鬱不能有以骫骳之詞誤閣下之聽者又甞辱賜品題以為可教聞之踴躍喜而不食者三日鄙詩一軸敢繼以請非敢自以為詩以為求教之資也昔鄭世翼謂崔信明曰聞公有楓落呉江冷願見其餘信明欣然出其餘槀世翼投諸江曰所見不如所聞某前日固未甞有信明之句亦安知今日之書不為它日投江之具耶唯閣下亮之為人上米侍郎書某甞觀自古公卿大夫之家居髙位享厚祿以世胄寵榮者至於父子相繼或同朝而共貴或襲爵以承家圭組相傳衮繡相望使一世歆艶以為不可跂及而事業不足以昭於當時名聲不足以流於後世方且惽惽憒憒以醉富貴雖生居華屋死結髙冢民無得而稱焉獨父子兄弟以功名學問翰墨文章著在簡冊而昭映今古者雖死向千載猶凜凜尚有生氣如石奮疏廣韋賢馬遷薛收之徒百世之下使人慕尚風流想像顔采恨不與之同時而生並席而處也某少時聞先生侍講之名其髙名不可仰望如太山北斗雖當世大賢君子一言而可以取信於萬世者方且稱其邁往不羣之氣清雄絶俗之文髙妙入神之字以為平生之所願見者今直見之矣則其為人果如何哉某生最晩又且賤不得拜公於堂下常悒悒不自滿獨時時相過於故舊交游之家飽飯煮茗淨几明窓錦囊三軸猶得竊誦公之篇章玩公之翰墨時以自慰是時已聞閣下之名相繼而出才行之懿美聲聞之流傳皆足以世其家以其餘波溢流戯於丹青猶不減摩詰鄭䖍之流而畫沙印泥之法銀鈎蠆尾之妙則飄然有王右軍父子之風俾蘭亭之記瘞鶴之銘不得擅美於晉主上聖學髙明宸翰超絶如唐之太宗觀其圭璧之文雲漢之章煥如日月爛然昭著非臣下所能及曩公之以先書鑱之御府將以傳萬世而又起閣下於江湖登閣下於禁從以風動四方此寒生勝士有意於人物者平日於古人中目想心維恨不同時而生並席而處今乃得奉周旋於咫尺之間豈得不一造閣下之席以求望見君子之容耶某羇孤逺客飄泊東南方求一官於選部㑹閣下入侍清禁而某之去國亦在朝夕不得不亟走於門下以幸閣下之進焉骫骳之詞不足以塵髙明姑以為贄焉爾答通州呉司户某再拜奉書司户奉議閣下僕老且衰無所用於世乆矣前日閣下不以僕為不肖惠然見臨寵以書辭推許過實非僕所敢當僕竊意其出於偶然是必有以僕之姓名而欺於閣下者巳而又辱書於千里之外長篇巨軸鼎然而來則向之意其出於偶然者殆非矣曽不數月而閣下之書又復來於千里之外詞益切意益厚所以相求之意益篤則僕之信於閣下為不疑矣然有所謂大疑者存焉固不敢不自白於閣下也方今海内乂安文物修明四方賢士大夫咸在有位雍雍穆穆布滿中朝閣下不於此擇其尤者而與之乃拳然惟僕之求此乃僕之所為大疑者非特僕疑人亦莫不以為疑也况閣下之詔僕以詩又非僕所長數十年來學士大夫無意於此一時作者又皆下世誰有主盟斯道者僕才陋識闇懵然不知古人門户所向不能以此取重當世唯知長言獨嘯自歌自已如候蟲時鳥相呼於邃林寒牖之下聊以自適而巳不識閣下其何取於此哉閣下年少而學髙才豪而氣秀駸駸然其當有聞者方且嗜衆人之所不樂蹈衆人之所不由欲以自名其家不求之於今人則當求之於古人爾世言蘇内相詩學李太白黄太史學杜少陵今二公之詩卓然自立如泰山北斗景星瑞雲誰不仰之者勿謂今之人不可到而古之人不可師也區區所聞如此惟閣下亮之太倉稊米集巻五十九
