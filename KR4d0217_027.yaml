body:
  text: 太倉稊米集卷二十七宋周紫芝撰詩四十六首時宰相生日樂府三首并序某嘗歷考自昔大臣身輔帝王名埀書傳而得光明盛烈足以夸耀後世者不可殫紀如商阿衡周尚父之徒雖號為傑然不可跂及然皆未免於兵於是後世喜言兵者皆曰是數人者以此而定亂以此而成功往往亦以是説而説其君蓋將以邀利於一時而其黷武之弊有不可勝言者矣夫善師者不陳班固所以言堯舜之兵也不戰而屈人揚雄所以言堯舜之兵也由唐虞以來不知其幾千百年世間有好戰以危國者未聞其以不戰而定亂也今太師大丞相魏國公以堯舜無為之道而事君以堯舜好生之德而用武用能不戰以成功自修盟以來至於今日不交一戟不遺一鏃而天下大定其不世之功無窮之利使有班馬之文蘇張之辨安能一書再書而足况若某之拙於文辭宜不能措一字於其間而向之巳陳者又不復以黷聰明之聽日者郊祀之夕瑞雪收霽大禮告成太史占星殊祥並出某猥以賤吏駿奔祠事禮成而歸道聞父老之言歡呼載路嘗欲述以為獻無因而前會太師之夀日乃敢採為歌詩作樂府三章相與行道之人夀而祝之以示區區報德述生之意詞雖鄙俚意實鄭重蓋嘗以謂方今揄揚盛德稱頌大美者日至於前不啻若弦匏金石之並奏未嘗一日而不入於耳也然則安知厭聞雅頌之音者聽蕢桴土鼓之樂負薪扣角之歌而無取焉此某之折揚皇荂所以得至於鈞庭之下也謹序帝居七星中紫宸黃金掣銷天開門中人傳詔不動塵御府拜賜天爐芬鬱金蘇合百和勻雙虬鏤合盤雕紋雲錦織帕勞天孫金狻猊擁春空雲流霞一酌千日醺壽公遐齡天語溫朱絃白雪聲調新洞庭之樂人皆聞官家異禮尊帝臣八師七友無此勳聖賢一出五百嵗開闢以來能幾人東方曼倩何足數三食仙桃識王母何當移植上林中嵗嵗年年見花吐溪上人家自一川武陵邂逅非神仙但令父老不識戰人間何處無桃源自從罷武得生活埀髫小女皆能言肯為八方開夀域廟堂政要公調元甘泉羽書久不至六樂初成禮初備萬兩黃金鑄景鍾八級層壇築圓陛侍臣曉入明光宫彤庭暖日升曈曨弦匏鼎俎耀前列大聖制作埀無窮太常為旗玉為輅路穩沙平試天步日邊風雨曉前收夜半笙簫月中度君臣有道道格天五星同色三台圓千官拜舞皇輿旋青城路逺聞鳴鞭黃麾羽葆識全仗繡衣靁鼓鳴鈞天羽林騎士如流水未央宫闕明山川千門萬戶不知數盡捲簾幕瞻龍顏道傍父老百嵗許醉倚春風自相語昔年舊事一日新廊廟功成不因武羣生欲報知何緣再拜願夀公千年海上神仙不知數無人解説三山路舟中倣佛見霞裾弱水波深不堪度青天那得白日升仁能愛物功乃成秦漢之君俱好武枉從方士求長生從來定亂必以戰公以不戰為中興兩朝歲活數百萬報公福祿知難名只今潭潭開二府富貴如山澤如雨經殿時聞御幄香日對清光接天語歸來下馬復過庭一德樓邊栁隂舞天上頻移玳瑁筵瓊漿賜酒如流泉盛事傳觀作圗畫蕊珠何處求羣仙皇天報德何時足政恐天心似人欲會從四世數五公何止長年是公福次韻蘇元藻對雪長句晚來風定雪初平到手杯行不暫停夜色逺欺江月白天花寧羡野梅馨遙瞻玉闕心先喜一見瑶林眼自青回首西湖在何許借君詩作逺山屏次韻艾主管歲除有感藍尾先迎替臘春流光依約似行雲功名如夢日月晚兒女滿前恩意勤此夜自傾桑落酒誰家政舞石榴裙窮諳歲歲年年事老坐竒竒怪怪文雨中梅花猶有存者江雨無情不管人殘梅有韻故相親閉門無事仍無客花作羞娥酒當春正月二十八日雪晴睡起沉水空濛睡欲醒寒窗窈窕日初晴誰將昨夜堆簷雪為作空階滴雨聲梅樹花邊日腳紅鳥偷微暖囀東風寒忩喚起無人見獨倚欄杆看雪融次韻余宅仲答陳先生何曾留得守囊錢長坐羇愁只斷編我巳自成窮活計君猶為看小行年莫驚久客推難去况有吟詩盡可傳更看同升門下士中興自昔要真賢送錢端修侍郎二首人間編削要研摩富貴聲名不奈多似我豈容窺玉海如公真合上鑾坡依光日月心應在回首湖山意若何白鷺洲前留不得却歸京洛擁鳴珂晚竊官囊五斗陳笑談猶喜奉冠巾望塵羅拜何曾解拄笏看山了不嗔自古知心能有幾如公厚德更何人錦帆畫舸江邊路愁看飛花落絮春次韻陳先生羞對湖山照病容浮家全似陸龜蒙掃除故里三年夢邂逅幽人一笑同酒會驅愁常恐薄詩能窮我不須工兩家好客今安有為作緇衣補國風三月二日同遊西湖諸公有詩次韻水繞青山寺人携白玉觴晴春方爛漫醉眼自微茫舟穩欺風軟杯深送日長誰家載歌管紅袖立斜陽上巳日雨中熟睡二首吳波越嶠翠爭流過盡殘春懶出遊花下看誰飛白馬雨中憐我擁黃紬細數蘭亭歲月長當年舊事久凄涼但欣越女山前雨暗入羅敷陌上桑江南以上已雨宜桑次韻孫子紹山礬造化出尤物餘芳若為容遙知補陀山天香落巖風題評付大手妙質煩天公捧心陋嫫母彼美唯孟庸但恐兩無情一笑花遂空賴此絶世姿墮君幽句中相識苦恨晚著語今復同願偕九畹蘭結根永相從可憐金錢花亦薦白玉鍾勿遣倡條滋亂我風露藂趙觀察作齋名煙艇孫耘老作唐律相邀同賦乃次其韻知君心本在滄洲故揭寒齋作釣舟巳遣江湖頻入夢便呼鷗鳥與同遊浮驂未可追前事畫舫猶堪擬勝流笠澤有家歸未得斷腸蘆葉荻花秋次韻方元相見寄數椽元著亂山藂強入天街踏軟紅老去只思青眼舊詩來猶數白頭翁身遊吳越千山外春落邯鄲一枕中賴有可人俱在眼舉杯惟欠與君同睡餘飛絮滿庭有感而作是詩春水緑波南浦路兩岸誰栽楊栁樹含桃熟盡未聞鶯荷葉生時巳飛絮絮將春去不可回人伴雲間更須住我亦隨君似落花欲趂春風到何處酴醿小壺色香俱絶燈下戲題二首芳條秀色淨如霜折得殘枝近筆床月冷燈青花欲睡可憐虛度此時香春事何時屬老人好花知復為誰分何當碧玉壺中雪飛作香羅髻上雲次韻庭藻酴醿憶昔在江國屢醉酴醿春平生看花眼老暗京洛塵王城一見之玉顔猶可珍但恐花見憐憔悴非昔人是事姑且置飲我樽中醇幽姿不可名清芬難具陳誰登玉宸殿與梅差等倫山礬豈其弟月姊當與親頗笑凡質陋始喜國色新此論那可廢此寃聊可伸魯直水仙詩云何時持上玉宸殿乞與江梅定等差效王建體二首金獸分香賜老臣全家望闕拜君恩教坊催樂排春燕中使傳宣勸御樽日轉彤庭栁影移微涼殿閣麥秋時侍臣朝罷歸來晚又見金盤賜荔枝送馮逺猷使君雨露朝來下九天左魚還得舊青氊莫辭去國逾千里猶勝為郎動十年客至何妨常有酒民殘政自不須鞭欲安逺俗惟無事聖主休兵本息邊江上當年憶語離相逢雖健鬢如絲心知涉世著幾屐眼見承流換兩麾臺閣異時須獻納廟堂今日要招携九江太守多仁政此去知公得吏師涷雨行五月江天未徂暑日日江雲釀江雨眼驚雪浪打秋濤卷地風來雨如許窮人賦屋才一椽茅茨零落仰見天風棲不定夜未曉旅食過午庖無煙家無鞠窮病在腹兩股重膇成蹣跚麥雖黃落雨未止雲欲漫亂風還顛詩成有淚收不得人生如此亦可憐君不見章臺走馬張京兆彈壓功成在談笑不將鉤距作神明自此長安無惡少邇來持莭鎮七州令行幕府如清秋尚書地已八座貴况復功方三輔優應笑南來雙病鳥千里依人作昏曉鄧林有木暗如山誰與安巢著林杪閬州太守以桃竹卭杖二物遺余宅仲而宅仲出以示僕喜而作詩萬里何嘗入巴蜀少陵詩中識桃竹更言九節奉真仙無乃卭山有遺族平生二物幾到眼誰與周旋慰幽獨忽然渡海飛蒼龍夭矯當前峙雙玉江心石竹誇堅剛摩挲紫焰生寒光孤笻莭髙不可及外雖似曲中直方閬州得此不敢藏亟遣二士相扶將余侯新佩太府章六尺骯髒身健強未須御府賜靈夀行勒金狨朝未央老人勃窣不足數惟有泉石成膏肓東吳自是山水窟心雖欲往身未償會須呼客共蠟屐借君拄杖聊徜徉送袁司理歸天台長安少年郎意傾裘馬中水鳬偶相值蘭臭豈復同誰令千金璧照此白髮翁得之非人力捨去真天窮五月畏塗暑千里苦炎熇天台大士廬妙境在寥廊解鞍修淨供茗碗應自瀹安得從君遊享此方外樂妙哉揭陽君文起八代衰平生誦公文手自不停披只今老眼暗刮膜無金篦天台有巨刻君其為致之次韻文若與余相遇武林之作南來衝雨著征衣山下黃梅正熟時老大相逢真是夢寒溫以外只談詩樂丞遊宦聊因酒陶令絃歌政坐飢人物似君那易得一蓑歸釣未應遲送曽宏父守南徐異時連佩漢魚符兩奏殊庭報政書黃屋要聞當日句朱幡又擁使君車風流舉世推前輩文采須公侍禁廬想得西樓未回首巳催尺一到南徐雨中對竹清甚效江西作六言一首雨色挼藍潑黛風莖戞玉鳴珂不復作可人語奈此數君子何次韻伯逺食楊梅十五韻徐侯嗜吳梅健啖殊未闌喜氣入新詩脫手如彈丸遙想蒼玉枝尚帶白露漙日食三百顆語客疑誕謾何妨携束書常作東南官掇彼南山粲奉君一酌歡南山有佳樹采采何時殫恨我無報章上可追建安誰知丹砂粒亦滿黃金盤回甘似蔗境嚼齒餘詩酸安得移此種飛舟下驚湍紅園奪朝霞翠密回翔鸞大勝萬里來日曬中枯乾歸期渺何許且復同甘餐調冰漬崖蜜却暑資微寒與叔容上天真臺題石壁用坐中語也我生猶得問天真淨洗頻年馬上塵此地何妨來著我老僧原自不嗔人天真寺白拒霜天上登雲寺人間白拒霜山僧方宴坐魔女不施粧玉色寧非韻氷姿不受香須當和月看夜宿贊公房次韻仲平十八日觀潮吳兒輕生命如線赤腳翻身踏江練南人慣看心不驚北客平生眼希見海上潮來雪不如中郎詩成錦初爛句法豈但窺澄江壯士何從挽天漢飛流濺沫不足論萬壑千巖此為冠解言越嶠翠摩空歲與浪花爭隱見我亦蒼顔閲九州始問江神得竒玩六年東望西興雲歲月崩奔一飛箭擬將匹練作江圖歸與故人誇偉觀倘從江海識波濤分逐秋篷共流轉試令海若語馮夷慙色自應須滿面誰當更草海潮篇詞采風流付王翰次韻相之木犀三首木犀韻勝無人畫合在詩翁阿堵中巳寫幽姿入新句莫將遺恨怨秋風異時茅屋東邊樹黃粟吹香趂水流旋買殘枝供燕几為誰辜負故山秋蘭芳九畹是同流薜荔江蘺格未優不為巖花作佳傳靈均空説楚江秋雨後頓有秋意得小詩四絶九衢殘暑厭風埃兩日隂雲遂不開造物固應知客意急催新雨送秋來只今風露欲凋荷前月牽牛巳渡河絡緯獨知秋色晚芭蕉添得雨聲多近曉殘更挽不留窺簷起看月西流空庭草樹俱無語只有寒螿解説愁秋深時節在家鄉憶得黃花未著霜故國不堪回首望緑樽辜負五重陽次韻子紹雨中遊北山禮白衣大士官冷長如賜沐間門雖漫設晝常關勞君馬上風前句畫我湖邊雨外山落木半巖秋色裡曲欄千尺暮雲間白衣大士應憐我忍對髙人不厚顔太倉稊米集卷二十七
