body:
  text: 太倉稊米集卷五十八宋周紫芝撰書五首見李端叔某嘗謂天之生賢似亦有數生之實難遇之亦難唐之文章三變而後得韓愈愈之門生如張藉李翺皇甫湜孟東野之徒皆曄然有聞於世後學者聞其風而悅之韓愈死又二百餘年而生歐陽公收拾賢者汲汲如飢渴當時門人皆一時勝流如尹師魯石曼卿蘇子美梅聖俞輩實與異世而相望焉自嘉祐治平之間不三十年而翰林蘇公主盟斯文蘇公之門如黃魯直秦太虛張文潛朝無咎與閣下諸門人皆以道德文章冠冕後進視韓歐門下士未肯斂袵也自元和以來至於五代閲二十三帝二百餘年而三人者始於先生弟子傳道授業羽翼前賢賴以不泯嗚呼可謂難遇也已某不幸生世不早不得望見諸君子未嘗不自歎恨元祐之末張右史守宛陵於某為鄉郡是時年方十餘歲騃不解事不得以童子見然巳知誦其詩而樂聞其言矣又十五年而黃太史守當塗與吾邦壤地相接某家甚貧方竭力以奉親欲裹糧以趨之而公輒罷去不得一拜於其庭又數年則閣下相繼而來實家於此雖未得奉几杖於周旋之間而翰墨歌詞流風遺韻固巳得於交遊中為不少矣如是者又二三年而始得望見閣下之門猶未敢自以得聞教於席下於是敢卜一見於今日也重念某受質不悟涉道甚淺平生自誓欲以作詩綴文自娛想像古人語言妙天下則心欣然慕之獨恨其力不能到耳不識閣下其有意於三沐而三薰之以抉其盲而起其病乎蘇源明嘗言吾生衰俗而恨不識元魯山也閣下能賜以一言俾知所向背則某非特識魯山於衰俗之中其視源明之無恨則又萬萬矣閣下之道德文采傾動古今非某區區疵纇之言所能贊説獨聞閣下推其餘以應不足道足以髙天下而常自後其身才足以絶一世而未嘗以此病人也是以人得遊閣下之門焉則某之謁得入於函丈為不疑矣閣下其亮之幸甚不宣見翟公巽某嘗謂人之有氣猶天地之有隂陽也人以一氣而用其身猶天地以隂陽而成歲功也人之氣養之不充則不足以周一身之用天地之氣節之不和則不足以成一歲之功人之一身其用非一為忠孝為事業為正直為文采為知數為勇敢為富貴為貧賤雖其所寓不同要之皆出於氣耳故伊尹以是而興商周勃以是而定漢謝安以是而抗秦兵孟軻以是而輕齊相司馬相如以是而賦雲夢此其理之必然者而人不知之其猶日月星辰之晦明四時寒暑之運轉動植飛走之變化其類非一而皆運於一氣之中一有繆戾而不知則乖矣其能用而不窮乎大哉氣之為用雖上下與天地同流可也况出而遊於世乎其於事變有不足為者矣某之於閣下固嘗以區區之見欲窺萬一然而茫茫莫知其所以竊謂人之才器各有所用時有所長未有得其全者獨閣下之才無施而不可其必有得於不可知者而某不足以識之也始閣下以學問文章二十而決巍科三十而登侍從四十而挂冠於神武其取之也易若拾芥其棄之也輕若鴻毛皆前人之所艱難而僅能者閣下逡巡而為之此其氣必有以髙天下而絶古今者而人豈足以知之哉閣下以其所學而踐其所行其忠孝之莭卓越之行皆非人所能及至其發而為文也則清而麗婉而深髙明而不為異殆非近世骫骳之所能仿佛也方其翺翔瑣闥進掌絲綸而議者以閣下之辭粹然有典誥之遺風常楊張陸之徒為不足比數此其胸中之氣浩然於外有不可掩者而其身不得一日安於朝廷之上者何哉以閣下重風莭而輕勢利髙目雲漢傲睨儔列昻昻然如野鶴之在雞羣也姦佞之士闒茸之流惡得不忌而媒蘖之哉頃閣下剖符清禁坐嘯南邦風聲氣焰聳動千里雍容機格而民自治其流風鎮靜如杜元凱羊叔子孔文舉謝元暉之流使吏曺縮手相視而部使者之車不敢入窺其境此豈徒然者哉是必有其氣以蓋之也政和之末郡歲薦士而某之名實在其中閣下以郡太守勸駕固嘗辱與之見其後取道當塗以趍大梁謁姑溪先生於其家且道閣下嘗齒其名稱其文為可數逮閣下解印髙密始來南徐而某之同郡舒侯賓王實官於此遇休沐必走閣下之門閣下亦必問其姓名訪其存沒焉則某區區之迹固巳獲塵於下執事矣是用敢持咫尺之書以仰浼髙眀之德也閣下其與之進而終始之乎抑亦怒而絶之也某亦進退唯命之是聽而巳不宣見張侍郎某竊謂三代既逺更嬴秦歷兩漢隋唐而下數千百年之間一時願治之主遭時承平以右文更化為治能庶幾於古者蓋亦未易多得曠日歷時之久幸而一遇有為之君能使朝廷清明海內無事而天下大治則儒生文士欣然相與作為歌詩播為樂章願騁其靡麗歆艷之文以揚厲而黼黻之彼將自慶其遭逢之難而不能自巳也上之人亦將有託於是以稱述其美思有以感格乎郊廟而動化於黎元此自古秉史筆以著一時君臣治亂之迹者必採托其文而著之篇於此將有取焉神爵五鳳之間天下富庶數有嘉應上頗作歌詩欲興協律之事蜀人王褒賦中和樂職之詩草聖主賢臣之頌以獻至使宣帝辭以盛德之事吾何足以當之褒以一書生生長於巴蜀僻逺之地不借大臣遊揚之力使其名一日聞於朝廷之上望重當時而聲流萬世者徒以區區文詞言語之功而巳豈有道德功業足以垂光竹帛哉國家自藝祖開基聖子神孫咸以盛德休功相繼而治今天子聖學髙明訓辭溫厚煌煌乎書詩典誥之文如景星瑞雲昭回在上而又適當天下晏然無事之時囹圄空虛夕烽不舉廟堂之上君臣之間相與歌詠太平而已是宜得文詞博雅之辭從而稱揚之以傳之不朽也竊聞閣下崇寧中進聖德詩天子見而悅之海內流傳一日萬口天下之士無賢不肖聳然異之思欲一見風采繼而天子數賜宸章閣下勒之金石天下爭傳誦之咸謂閣下之文無愧於褒雖若某之至愚不肖亦將以為然也獨不知閣下之學深探而博采逺取而進用自書契以來靡不商略而臆斷之然後發為文章奮為事業則赫然有不可掩者特其一槩耳至於閣下道德之風忠讜之莭秀偉英傑之氣磊落詼諧之辭其素行在鄉黨忠烈在朝廷名聲在士大夫之口功利在社稷人民談説之士類能言之某亦何足窺其涯涘哉况閣下不以道德文章名髙天下而降禮於至愚極陋之士不以禁從之尊方靣之重而屈莭於環堵圭蓽之人則某亦安敢不飾其固陋之辭以幸其一見哉閣下或與之見則請繼此以進焉不敢後也不宣見呂右丞某聞天下之生久矣一治一亂何世無之要當觀其所遇為何等時爾方天下之亂也主勢未立夷狄內侵大臣不法小人不亷廟社之危甚於纍卵當是之時蓋勇士縮手而無所措忠臣卷舌而不敢言然而愚者憂之而智者樂焉何則愚者知憂其亂而知者知有其人也髙帝崩惠帝幼女后僣權諸呂用事天下大柄移於異姓漢之社稷亦非其有矣綘侯一入北軍三軍莫不左袒曾不旋踵呂氏之肉盡膏漢鉞七廟之主復享諸侯之酎而漢之天子遂有泰山之安昌邑之亂甚於桀紂汙辱人倫誅囚諫士使神人共怒四海離心漢祚之不絶僅若一線耳賴博陸之忠力專廢立之義舉而行之斷以不疑故宣帝立而漢治復振焉二人者皆能不動聲色以立太平之大事扶衰救亂之功稱於萬世顧不偉歟向使二人者不生於漢則漢之天下蓋未可知雖使知者猶不能不為之慮况於愚者乎是未足多怪也朝廷自黨籍開於正人端士禁錮不用埀三十年士無忠義之莭臺無諫諍之人使人主喜親便佞惡聽直言而阿諛之風日以增甚士大夫畏死避難持祿守位而不言天下實始受其弊今閣下奮忠立莭挺然特出於衰俗之中當廟堂危疑憂懼之日社稷變遷顚仆之秋能以一言決大計定大䇿使姦臣避位真主龍翔可謂難矣觀其立隆祐以存社稷之基奉國璽以歸天子之政不勞一臂之力以支大厦之傾此其勳力豈復出於周霍之下哉竊惟閣下奕世輔相皆以勳望著稱申公元祐之烈炳然猶在而閣下能世其家六藝百家之書莫不博究淵深渟滀如海涵地負而閣下咀其英華以吐為竒麗之文發為瓌瑋之行皆擅一世之美至於忠義大莭照映今古使人動心駭目而不敢仰望由漢以來可與比者無幾矣今天下土壤侵削盜賊旁午羣口嗷嗷日夜以冀閣下之進用於朝而微賤之士不得一拜於旌麾之下是徒抱終身之恨耳某是以敢忘其孱陋嵬瑣之資而求侍於履舄也所為詩賦雜文一軸併以為獻幸閣下教之誨之不宣為蘇尉上朱僕射某聞士方厄於困窮其勢不足以自逹則必願託於王公之門以幸其進自古公卿大夫之賢者無志於功名則巳茍有志焉亦豈不賔禮賢士博采而兼收之以資重於當時而其勢終不足以相為用者豈其地使之然哉是於士有罪焉今夫富商大賈操百物以趨日中之市所以期於售者均也而不售者居其半何則物有美惡之異人有好惡之殊也使其所操而至者皆連城之璧照乘之珠曲阜之履豐城之劒則樂異聞而嗜怪珍者必相與環而觀之以爭先得之為快至於苦窳不良之器臃腫不才之木與夫布帛精粗之不中幅禽獸魚鱉之不中殺者雖使童子適市而莫之顧也士固有一節之善一言之得足以見取於人然後可以出自售之計至於窮約亡竒之人名聲不聞於時事業不見於用方且汲汲然求人之巳知是何異操不售之貨而坐於九逹之衢者哉其不見笑於人者鮮矣如某者所謂厄於困窮其勢不足以自逹願託於王公之門以幸其進者也區區根附而蔓引之志固不可謂無意於其間然學不足以美身文不足以逹意則其才為不足稱仕不過為妻孥祿不過奉溫飽則其志為不足尚而又官列於九品位止於一尉則其人蓋至微而不足數也嘗竊自咎乃無一善一技足以動人耳目猶且力求巳知偃然不自以為恥則異於世之操不售之貨而坐九逹之衢者幾希矣是以足將登門則逡巡而不敢進言將出口則囁嚅而不得陳唯羞縮逺引以自悔恨而巳既而思之則幡然而改知其未足以為計之得也夫世之所貴於賢者為其能飬不賢而使為賢也所貴於才者為其能養不才而使為才也如是則不賢不才者每為賢者才者之所用矣如某之愚不肖顧無待於人乎哉又况古者大臣之在相位未嘗不以賢才為巳任一有不然則隨而刺之綿蠻之詩是也其詩曰綿蠻黃鳥止於邱阿道之云遠我勞如何説者謂鳥止於阿人止於仁道遠罷勞大臣之恩當如是哉然則大臣不用仁心遺忘微賤實起天下之刺也恭惟學蓋於古人而才髙乎舉世德洽於天下而風行乎四夷忠貫於日月而道格乎四夷蓋舊史世傳之相不足舉而方焉比者朝廷艱難海內多故多壘之變蕭牆之憂方且日慮禍難之不暇相公日秉大政談笑而處之卒以無事此豈平平可以論功者而其寬厚長者之風好賢禮士之意蓋古人之所僅有而前日之所未聞也某於是時乃得效一官於麾下此政不祥之金踴躍自獻之秋其忍自棄而不言乎往者相公當軸而某之家君嘗蒙陶冶之恩今又得執掃除之役於門闌之下則是恩既及於一家而報將期於沒齒矣惟相公憐其情而少埀援焉幸甚不宣太倉稊米集卷五十八
