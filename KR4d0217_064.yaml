body:
  text: 太倉稊米集卷六十四宋周紫芝撰偈四首松林道人施繡觀音蓬萊夫人以歡喜心而作佛事於是刺繡為觀音像極諸相好施松林師莊嚴竒麗非世所能如五色雲未嘗彩繪自然成文爛然盈月如虛空日不加磨礲自然光明照耀十方如西蜀錦文與質成以文名錦是錦非文孰知因文而以名錦如出水蓮華幹俱生以華名蓮是蓮非華孰知因華而以名蓮則是菩薩以幻而成諸著相者亦以幻想孰知因想以名菩薩維觀世音以大慈悲隨現說法變化無窮滿恆河沙界不應此施留戀執著使彼見者願樂工巧雙溪道人作是語已松林老師釋然而喜還以此施回施道人於是稽首而作偈言菩薩變化如虛空云何得此虛空相我觀無礙大慈悲無剎不現如水月八萬四千母陀臂能援世間一切衆八萬四千清淨眼能照五濁諸有情是故神通不思議而欲妄以色相求譬如狂人逐四方四方無盡力無竭况以丹青繪繒綵更復刺繡為儀形絲毫縑素相假合妙技巧借金十奴若人捐棄釙與絲亦無五色可資藉瞑目默相不可得畢竟無有是菩薩吾願世人捨色相當時未有釙絲時蓬萊觀妙本無心以粗即妙作是念松林無心受此施以施居士作禮言我當還亦以此施此施有盡法無窮普願世間諸佛子凡瞻此相悉歡喜若見菩薩非菩薩即知是我非是妄妄見除滅無復然吾與佛子等無二夢禮僧伽大士嵗在丁酉冬至後一日某西游大梁取道泗濵翌日禮僧伽大士塔而行明年春東歸復過之以故迫於亟去不復作禮私心怏怏常若慊然其後百二十有六日夜夢拜塔下瞻望聖像而禱焉曰頃以故不能來今以何力而至大士笑而不言於是既寤歎曰菩薩以無心而應物居士以無心而作禮初無分於寤寐有緣而來無緣而去等為一夢有何差殊人能以一切無心付諸緣於幻化齊寤寐於俄頃則我菩薩與諸佛子皆得成佛是無難者於是乃始稽首懴悔而作偈言我觀諸佛子皆以妄自冥不知有無想一切俱是妄認有以為實夫豈識無有如人具諸欲耳目與鼻舌百體俱動作動作皆有相耳欲以聽聲有耳言可聞絃匏與笙簫皆具諸宫羽雖然始一奏有耳悉皆聞衆生於是時知聲不知耳衆音始一闋寂靜無有聲傾耳而聽之無一可聞者衆生於是時知耳不知聲至於目視色亦復如耳根知色為有形乃以色為有寧知本無色何况於目睫乃至鼻聞臭口舌所啖食百體諸毛髮意有所為者行步與坐臥喘息及呼吸方其有為時無一不為有諸為悉皆空了無有一存心惟昨所為恍惚如夢事我昔禮菩薩是為真見者譬如聞衆聲認聲為有響比其不及禮菩薩那得見譬如衆聲滅初不聞餘音始緣以妄情乃復有見否亦如今所夢見否理不殊大士笑不言吾亦無所說有如舍利佛默默對天女稽首作偈言猶以言為痛云何兩無言而入不二門我與諸佛子究竟得成道宗演師金書妙法蓮經昔涇水西有大道場賜號崇慶中有苾芻名曰宗演具善知識受具出家以清淨心降伏諸魔以精進書薩達磨奔茶利迦素咀纜文成一大部緘以縹囊貯以寶函具諸莊嚴供養受持爾時南方羣盜遍起諸比邱衆悉皆驚怖逃難雲散不知是經復在何處及諸盜已一切諸有悉皆壞滅獨是經典或在地上或在他方得是經者各持所得而以來獻如是者三經大火聚度無量厄究竟不壞諸所染汙及所漫闕毫髮無有於是比邱歡喜踴躍歎未曽有吾時避難在涇水西目見是事同一讚歎而說偈言稽首無上尊為世大慈父為憫一切衆流浪諸苦海滋無礙辨才廣為衆生說譬如大火宅隨念得清凉又令諸窮子獲此大寶珠是真祕密藏故名妙法華非思量分别而以得解悟雖諸大菩薩有所不能知况於聲聞衆豈復聞妙義如來廣開示一一令悟入衆生悉皆曉而况於聲聞我佛出現世了此一大緣當如佛所說是最為第一今此大比邱舍所甚愛者百煉真黃金銷鑠為書寫具諸大寶貝更以為莊嚴偷兒甚魁儈如飛天藥叉諸所經過處悉為尸陀林大火所藏滅毫髮無遺餘龍天諸善神悉力來加護究竟不得壞我今同讚歎普告諸佛子凡所見聞者信心自堅固各各普授持金剛般若波羅密經佛以甚深微妙法廣為一切衆生說有能悉發菩提心究竟得成無上道彼有受持讀誦者其福不可更稱量七寶滿爾河沙數以用布施得福德而比福德猶為多况吾大慈大願師常憫衆生墮惡道假此持經功德海能免世間一切苦有大長者號宰官書寫讀誦不少懈旃檀香及薝蔔花供養恭敬常作禮忽遇黑風吹船舫將隨那剎諸鬼國倉惶取是受持經投諸江流沒巨浪須臾風定夜色霽達旦悉得大快樂平明篙師有婦妻忽言汲水得巨軸金書貝葉與巾繡無一毫毛有壞相有如金剛不壞身經大水聚性不滅拾塵數劫有時盡而是功德終無窮衆生信心不堅固未嘗聞此殊勝事用是稽首無上尊願我諸佛常加護復州司法參軍大梁楊奉覿嘗手書曹溪六祖大師所說金剛般若波羅密經解義將來內心了見自性而其持經功德亦復勝妙不可思議嵗在癸酉冬十有二月楊侯以事至錢塘舟至長盧忽遇大風幾不得濟亟取是經投之江中而風恬浪止因得免焉明日篙師之婦汲水得經經不霑濡字畫如故嗚呼異哉世所未聞也楊侯歸自錢塘語余以此余心固異之其後出經以示信然於是稽首歸依合掌恭敬而說偈言無亦將使聞者為之動心知如來說是經利益一切是真實語非誑語者而六祖大士傳佛正教契佛心宗重為宣說祕密章句驅除世人邪見妄解如雲霧月出光明自現又能降服一切使江河海嶽天龍夜又皆大歡喜况楊侯歸依佛法信受不疑心不退轉未嘗暫捨宜有是事以傳永久越明年秋九月竹坡居士書於妙香寮史斷六首唐文宗出宗女二人昔老顔叔子獨處於室鄰之婺矛牙婦人亦獨處於室夜暴風雨至而室壞婦人趨而至叔子納之束屋而照之放乎旦魯有男子獨處於室鄰之婺矛牙婦又獨處於室夜暴風雨至而室壞婦人趨而託之男子閉户不納婦人曰子何不學栁下惠男子曰栁下惠則可吾固不可古人處嫌疑之地如此猶未免於謗至於無兄而得盜嫂之名况以天子之尊匿女子於深宫之中蹈納履之嫌乖束屋之義下惠之風不著而袵席床第之疑易汙此魏謨所以未免於言也文宗納謨之諫而出之固善矣又從而為之言曰備灑掃於內非曰聲妓恤宗女之幼不為漁獵此欺天下之言也御史中丞李孝本宗室子弟坐李訓事誅死二女沒入宫而魏謨以謂宗姓不育寵幸為纍傷治本速穢嫌則文宗固不免於謗而曰備灑掃之職恤宗女之幼非欺天下而何唐室帷箔之惡世世不修自是其家風如此太宗殺元吉而納其妃又欲立以為后賴魏徴之言而止𤣥宗連殺三子又納壽王之妃而寵嬖之書之簡策尤不可讀况可言乎以二帝之事言之文宗猶未可以深責也褚遂良對飛雉唐太宗時有飛雉集宫中上以問褚遂良遂良對以秦文公之事太宗以謂人固不可無學昔鴻嘉中博士行大射禮有飛雉集於堂陛間已而又集於諸府間已而又集於未央宫承明殿當時左右大臣無能言者獨車騎將軍王音能言之其後成帝遣人問音得無人為之乎音對曰安得亡國之言天尚不能感悟陛下臣子何望以張禹相成帝無狀朱雲欲斷其首幾至殺身庭辱師傅帝怒若此况親斥其主乎方王鳯用事權傾天下王章以忠直刺鳯為鳯所殺當時災異數見羣下莫敢言而音能言之可謂漢比干矣野鳥入室安得為祥遂良不以髙宗肜日之事告太宗而反以為瑞亦焉用多學為哉遂良可謂王音之罪人矣太宗得祕䜟太宗得祕䜟言唐中弱有女主代王以問李淳風曰其兆既成已在宫中又四十年而王王而夷唐子孫且盡帝欲求殺之淳風以謂天命不可去而止又明皇時有鄭相如者師事鄭䖍曰開元盡二十年當改元十五年天下亂賊臣僭位公當汙為官䖍念其言終不附賊唐之大變惟武后之篡祿山之反而二事皆已肇於數十年前使太宗明皇不聞是說則可其或聞之當思修德弭變以治易亂茍為不然則惑於符䜟前定之言且得以為之辭一抵於亂而曰是有數焉非我罪也則我生不有命在天所以開人主自寬之路也由是知符䜟荒唐之說人主所不當信史亦當削而不書惟漢光武即位之二十年羣臣上言宜封禪泰山光武詔若郡縣遣使上壽盛稱虛美必髠令屯田可謂聰明謙厚之主矣至中元間因讀河圖㑹昌符遂有封禪意竟伸玉牒之儀於是醴泉赤草之奏紛然而羣臣遂有宜令太史撰集之請以光武之英睿沉勇舉無過事殆無毫髮不滿羣議而桓談以不喜䜟流亡鄭興以遜辭僅免賈逵能附㑹文致最先貴顯范曄之論以謂世主以此論學悲哉乃知圖䜟之說其能眩惑主聽非特昏庸之君雖賢若世祖者其失猶且如此也可不戒哉周昌相趙王如意髙皇帝以趙王如意屬周昌而使為之相其籌之甚熟其委之甚重非昌之鯁亮剛介髙帝當不以是付之非髙帝之誠意懇到則昌亦不能受其所託也蓋父子之愛君臣之義情動於中而義形於色其勢然也髙帝崩惠帝少呂氏戚姬之釁作必欲殺趙王而後已昌於是時不念髙帝付託之意而為之深慮乎然則為昌計當如之何必抗危言極正論免冠頓首伏地涴血力陳母子大義使之知天地之道禍福之理彼雖女子之不孫幸而一悟其非則自怨自解而危難遂平王既不死昌亦能全此上策也昌不能為此計焉得為無過哉始太后使人召昌使者三反而昌不往亦已壯矣及太后怒又使人召之則昌當為之辭曰髙皇帝以趙王屬臣今太后欲殺趙王而召臣臣為趙王相義不當往萬一臣既往而王畏禍且自盡則責在臣臣焉敢舍王而為自全之計乎昌不能為此辭使太后脅而往固已失策然尚有可及焉及見太后太后罵曰汝豈不知我之怨戚氏乎則昌當為之辭曰髙帝以趙王屬臣太后欲殺趙王而召臣臣舍王而來是臣不忠請先殺我以明臣節臣死後幸赦王使臣不羞髙帝於地下足矣如是則是臣能死節於其主而太后不失慈母之名也唯太后裁之昌又不能為此辭使太后卒召王而鴆之則昌之罪不可逃矣髙帝策安劉氏者以為全至於屬趙王於周昌固嘗斷以已意以謂昌之可以保王於百年之後矣而卒失之何邪豈亦生死之數自有定分非人力之所能為歟抑亦呂氏之暴甚於乳虎羣臣畏之而不敢言歟以為非人力之所能為則昌未嘗有一言而趙王死以謂畏太后而不敢言則為人臣者固不當畏死而自全也然則昌之罪為不可逃抑又明矣韋見素助楊國忠唐明皇使楊國忠物色朝臣以為宰相韋見素以雅飭見知於國忠遂白於上由是得用安祿山素懷反側至是請以漢將三十二人願易蕃將反狀益明見素屢以為言議者猶以為非先知可謂失言矣夫祿山未反而見素知其必反朝臣不言而見素倡言之得不謂之先知乎見素知祿山之將叛不得不言言而不聽惟有一去耳而不去此其所以可罪也作史者乃從而貶之曰見素言祿山之反而不言其所以反是助國忠以敗王室也意若責見素以不言祿山之所以反者以國忠也而不以此告明皇使斥而去之易蕃將見素言之國忠國忠不應已而又言之明皇明皇不納察其心蓋非助國忠者祿山之所以反以明皇之昏惑國忠之姦邪而已然其寵任之固有如山嶽決非一言可得而回欲怒螳螂之臂而搖之往即碎耳何補於唐哉為見素計獨有一去為策最髙而不為是可惜也况見素用不由於正而得宰相言不行於朝而享厚祿在賢者為可羞為見素計則當去作史者不責見素以此而責其非先知可謂失言者矣魏主不殺髙允崔浩既撰魏史刋石衢路議者以為暴揚國惡魏主大怒召髙允問曰書皆浩所為乎允對以臣與浩共為之而臣多於浩帝顧謂太子曰直哉此人宜除其罪餘皆就戮夷五族者至百有餘人初遼東公翟黑子有寵於帝奉使并州受布千匹事發黑子謀於允曰主上問我當以實告唯當諱之允曰公帷幄寵臣有罪首實庶幾見原不可重為欺罔也已而黑子入見帝不以實對帝怒殺之嗚呼允自為之謀及為人謀未嘗敢為一毫欺雖鼎鑊在前不為少變卒能脫命虎狼之口寵冠一時名埀萬世可謂賢矣孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉若允者可謂無負於孔子之言也後世之士身在朝廷而行為欺罔豈特得罪於名教而已哉其有愧於允多矣太倉稊米集卷六十四
