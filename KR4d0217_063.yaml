body:
  text: 太倉稊米集卷六十三宋周紫芝撰疏文三十四首天申節功德皇天薦祉流虹埀有赫之光上聖膺圖申觀肇誕彌之慶爰修竺典用贊堯年伏願如日方中與天行健益茂徇齊之德永隆震夙之宸歡動六宫問寢日朝於長樂祚延百世多男載祝於封人天申節開啓三首彌月肇祥慶歷年之有永後天申頌祈聖壽之無疆用憑西竺之文仰獻南山之祝伏願德隆舜禹俗阜成康交鄰永納於梯航偃武常櫜於弓矢周人作雅重歌載夙之詩唐室奉觴嵗獻萬斯之曲二德維善政載元后以歸仁命有歷年格皇天而助順顧佛慈之無量資睿算以何窮皇帝陛下伏願四海同風一人有慶如山如阜宏開久大之基乃聖乃神永底休明之運來梯航於萬里罄葵藿於一心孝治格於神明協長樂事親之志天壽及於平格同周家報上之詩三塗山朝禹㑹羣后以成趨封國祝堯格多方而來賀當盛德在火之月符炎運方昌之辰是生聖人出膺大寶敢修妙果仰贊遐齡伏願道合乾坤明並日月執干羽兩階之舞歸梯航萬里之心維聖主篤於好生則下民莫不歸美雲韶九奏難逢千載之期神嶽三呼來獻萬年之壽天申聖節滿散疏二首運符千載方繞電以垂休歡動四方感望雲而請祝既䖍修於竺典宜永錫於帝齡伏願乘佛妙因格天明命握乾符而御極位正六飛嗣大歷以承家慶流百世永錫和戎之福用酬歸美之心召虎作詩拜周宣之萬壽封人請祝願堯帝之多男二巖廊垂拱共欣千載之逢海宇升平宜奏萬斯之曲乃遵彞典躬啓梵筵資最上之妙因介無疆之聖壽伏願配天行健如日方中作之君而作之師民懷其德得其位而得其祿天降之休慶寶祚之彌長知靈基之益固聞九韶而獸舞徒引睇於舜庭祝萬壽以山呼且稱觴於漢殿奉安昊天玉皇上帝聖像右伏以天運斡旋之造雖默契於至神人懷寅畏之心必仰瞻於邃宇載嚴像設以肅羣情久緣蛇豕慿陵稍汙山龍絺繡一新輪奐上格蒼旻是用蠲卜剛辰導仰法駕願憑隂相度隂陽百六之災永錫康年贊君王億萬之壽昭亭祠祈安道場右伏以賊鋒未殄敢肆冦攘佛願無邊必埀調御况兵將聞於入境而人已懼於履冰士民縮手以何為老稚相持而對泣唯憑聖解坐翦妖凶恭惟某神福庇黔黎位隆衮舄具廣大慈悲之願得一佛乘以聰明正直之資為百神長用解倒懸之急不煩伸臂之勞願鑒危誠坐埀隂相威簡公祠祈安道場右伏以狐鼠跳梁賊方肆掠干戈旁午民未奠居在兵勢有所不當非神力則將誰仰式資聖解躬建法筵恭惟某神信及豚魚忠貫日月頃者抗鋒劇賊宣力晉朝勇且奮於一時名蓋流於千載憫兹窮悴宜赫威靈仗精忠事主之心摧暴虐薰天之焰長蛇封豕既殄滅於隂威白叟黃童盡歌謠於盛德薦陳亡道場右伏以忠以殺身本人臣之至願善於救物亦諸佛之等慈爰建道場用遵國典伏願陳亡諸將士一切行伍等衆仰憑法力普濟冥魂共霑雨露之恩盡洗刀兵之苦生為報恩子死作護法王咸證妙因不落諸趣一時驍勇既不憚於捐軀千古英靈想難忘於結草禳火道場右伏以墮五欲門業根深重救三毒火法海清凉欲穰回祿之災惟藉等慈之力䖍修梵典仰叩真乘伏願潛弭天災俯從衆欲聊憑一雨遍霑億萬河沙普現祥光盡弭百千大聚又右伏以三界為大火宅悉是危塗諸佛以一慈航度諸法海仰祈妙果普濟羣生伏願凶毒消禳福根深固離一切怖畏苦悟無量清淨緣攝回祿之妖祲救燎原之荼毒破衆生之熱惱顯願力之慈悲獄瘟道場右伏以性無不善實自麗於憲章訟必有傷復寖攖於沴疫念鞭笞之慘楚悼疾病之沉冥惟我無上尊能破大地獄仰憑願力為拯危塗六氣既調易呻吟為歡喜五刑不用化囹圄為空虛普濟羣生同成善果大行懿節皇后還宫開啓右伏以椒房厭代悲動六宫翠羽旋車聲呼萬里仰賴佛慈之力用資仙馭之游恭惟大行懿節皇后心本慈仁德惟恭儉既克修於隆禮宜上格於髙穹伏願乘此妙因往生極樂塗山興夏既已格於昌期溈汭嬪虞將永埀於懿範大行懿節皇后還宫道場罷散右伏以四星在望慨永隔於長秋六服正儀倏言還於中夏仰憑大覺用證無生恭惟大行懿節皇后位峻掖庭母臨坤極進賢逮下既比德於周詩懷昔感今宜加文於宋䇿願憑妙力上迪宜塗歸安陵寢之榮用雪梯航之念天寧寺化齊右伏以種田博飯住山活計無多持鉢造門應供隨緣皆可求非獲己得亦偶然念一嵗之不登致二時之闕食伊蒲未辦白足難留必有仁人廣開大施當令無量海衆利益同霑乃知諸福田中供養最勝念埀慈諾慰此翹誠天寧寺化齊僧堂右伏以出衆離俗了一世解脫緣學道從師聚十方和合衆願新宏宇以結良因無有聖凡普同安穩旃檀林裏共集雲袍兜率天中俱登法㑹施雖甚薄福且無窮當發大悲心共成如是事崇教寺化塔右伏以童子聚沙成塔千聖齊超貧女為佛行檀一錢猶可雖僧伽之妙相現崇教之法門念此窣堵坡羅諸大火聚金碧因而漫漶風雨寖以摧頽敢仗慈因成兹勝事將一新於輪奐且妙莊嚴願永樂於見聞皆大歡喜奉聖寺化浴堂右伏以建諸佛道場聚十方海衆經行晏坐雖然事事隨緣絶俗離塵要使人人自便念昔振衣之地或歸煨燼之餘當仗衆心同成是事香槽氣暖期共庇於慈雲幽谷泉清遂重霑於法雨庶蠲宿垢皆證淨因凡在見聞舉同歡喜白蓮庵接待院緣化右伏以無量海衆學道為先諸福田中供僧最勝維我十方大士遍參諸處藂林當令所至如歸使可安心辨道浮屠三宿去住隨緣香積一齊少多皆可須求大富長者共飯無心道人伏願見聞同增歡喜天慶觀謝晴右伏以夏而或雨小民猶曰怨咨禮有所祈上帝為之降格比因羽衆有禱珍祠曽不崇朝遂開霽日雖稼穡凶豐之有數亦天地變化之無窮有淹其淒川澤不聞於見怪奉盛以告黍稷將遂於升香慶民瘼之攸除見神功之不宰誓答生成之賜敢忘夙夜之勤又右伏以月離于畢遂妨田祖之功星有好風乃却雨師之御微誠懇瀝妙應潛通不移頃刻之間有此豐凶之異顯天心之愛物眷民願以必從既紓積潦之憂將錫來牟之瑞維上天之載固罔究於神靈而此邦之人疇敢忘於覆幬天寧寺謝晴右伏以遍十方無盡界不離法門凡一切諸有晴皆是佛子顧等慈之其大亦何願而不從頃以常隂害於宿麥銜哀而請應念即除既禳三日之霖將慶雙岐之秀我庾維億真大有年含哺而嬉是極樂國漏澤園元日道場右伏以發政施仁昔稱善政養生送死民有常心唯上古有虆梩以掩親故後王埋胔骼而著令聖心憫惻佛願慈悲伏願漏澤一切孤魂咸承慶脫之功不墮沉冥之域家無析骨人免暴骸生且樂於平時死各反其真宅厚恩難報同霑沛澤之餘法力無邊共證無生之果祈雨設醮右伏以旱魃為灾民無生意商羊出舞雨不崇朝顧沾丐之尚微見懇祈之未至是用再延於羽衆必期上格於璇穹願矜螻蟻之誠震作雲雷之澤百昌皆生於土俱蒙一雨之恩三日以往為霖遂有千倉之慶三龍神祈雨場右伏以珠宫貝闕夙瞻廟貌之嚴絳節雲旗敢冀幽靈之格挈瓶甫至霈澤隨興信山川之出雲見膏澤之及物當乘佛念益顯神慈用蘇既偃之禾蔚為豐嵗遂及旋歸之駕永奠靈湫天慶觀謝雨右伏以暵其乾矣方懷轉徙之憂雨以潤之遂廓恢宏之施吏慙無地嵗且有秋不忘歸命之情疇敢貪天之力雲雷變化雖愛物以無私草介纎微顧省躬而何有願罄終始之賜力埀覆護之恩西湖龍角山還聖水右伏以重淵千尺遙睇潛宫膏雨一犁遂霑沙界霈雱沱之巨澤蘇憔悴之窮民田且有秋吏將逃責龍章至止肅環佩以如聞飇馭旋歸想旗旌之猶濕物無疵癘人有依歸但知樂嵗之可娛益愧慈恩之未報池口神祠還聖水右伏以功蓋三分仰威名之久著惠周千里流遺愛於無窮吏惟凉德之羞民慰有秋之望散長江一掬之水為晴天千嶂之雲膏雨所霑旱苖俱秀巴檣楚柂遂無供億之憂桂酒椒漿大有豐穰之報景德寺祈晴右伏以麥欲登場稍紆艱食雨淫破塊遽毁成功將軫念於斯民當投誠於吾佛願開慧日力掃羣隂山不出雲天無宿靄水皆反壑隴有來牟救兹枵腹之氓是仰能仁之願天慶觀謝晴右伏以天積重隂雨無晝夜人憂瀰潦地有潢汙荷上帝之聿臨憫斯民之無告擴開霾曀布露清明川回反壑之瀾民免為魚之患雨自上而下平陸已見於成江水由地而行夢澤行聞於作乂顧神功之不測俾吏責以何逃唯仗微誠仰酬真宰請鐵佛住持右伏以三家村裏何妨晏坐經行選佛場中未免拈捶舉佛只為衆生認賊為子所以大夫埀手入纒某人久滅意根頓超實際如鵝王識乳真諦自明若香象渡河法源洞徹自然諸聖推出不關閙彪鑽頭肯辭萬水千山俯為十方四衆况鐵佛古剎本老懷道場要令本分衲師略典重新舊令發大歡喜是最吉祥請吉祥住持右伏以衆生以妄為真經無量劫如來對病用藥作大醫王須仗當人同成是事某人叢林標的古佛仍雲面壁九年方求實際見花一笑已契妙緣何須不露鋒芒正要同霑利益雖世號寶坊名剎當為正法眼師而佛言曠野深山無非聖道場地勿辭岑寂宜稱宣揚甜瓜不用密蒸好酒元無深巷逢場作劇本是偶然應物觀形初無作相何勞擬議便請承當貢布右語真人御極膺商后之歷年上帝降康錫周王之壽考宜修篚貢之物以充庭實之儀前件布將軸微工衣裘下品潔須浣濯慙非火浣之良藝本衡從是亦地生之數敢遵彞武上冒聖聰太倉稊米集卷六十三
