body:
  text: 太倉稊米集卷二十三宋周紫芝撰詩五十八首齊宫夜雨明日大雪郊祭嚴祠事齊宫肅夜寒鸞刀催宰急庭燎及晨難雨濕牛羊俎烟埋幣帛壇南山忽清曉萬玉已巑岏聞耘老猶在霅川孫耘老名有功徽人能詩湖上雖相見重來失後期風塵為客久舟楫送歸遲鴈逺無消息梅殘惱别離何時酌君酒爛漫說新詩十一月十一日夜步行中庭月色明甚作詩三絶氷輪漸出海西頭身在三吳近海州賴有梅花管羇客細分疏影上駝裘香風嫋嫋月娟娟月滿中庭夜悄然只恐大羅天上有人間今夕是何年少年邀月伴清樽老去空餘滿袖塵多謝蟾光深有意尚來同我作三人二十一日雪中歸資國出門天意已垂垂湖上回鞭雪滿衣人在水晶宫裡住馬從銀色界中歸樹頭雲凍依然在湖面鷗寒斷不飛今夜燈前有殘榼擁爐深閉一篷扉蠟梅大有生意幽芳念初分厚地凍始裂耐寒憐孤根忍苦度尺雪誰持萬金良起死醫寸蘖伶俜初回姿荏苒似看葉灌木猶未成已與凡草别平生氷玉交勝韻頗竒絶微風折輕黃香霧濕寒月棐几著氷壺餘芬散清樾只今滿眼花想像疑可折感君分似意老味倍欣悅添我小窗春芳意未衰歇盛德不可忘封殖寧敢闕石佛道中隔水梅花滿山平明跨羸驂遙遵石頭路循山一溪橫隔水得幽處樹疑虬龍驤石作蒼虎踞雲菴有遺屋突兀在煙樹方壺豈不佳弱水無船渡空餘惱幽香梅花滿春嶼心知姑射仙茲焉飲風露水自平湖分香從一山度風姿不自持照影各矜顧安得從之遊徘徊著雙屨書東窗二首枕上青山翠撲衣西湖郡更似西施苦無能事王摩詰領略煙鬟却要詩湖上梅花春意回水光山影入銜杯無人許我分幽事故遣雙飛屬玉來次韻强幼安嵗晚感事寒日催殘嵗新詩得夜光雪猶隨處有梅亦為春芳愁鬢何從白流年有底忙官閒應放臘燕寢自凝香嵗晚雜題四首安穩三冬計棲遲一舍寬卷簾唯水近倚杖得山看老罷人誰數天寒嵗又闌自無稽古力未可怨儒冠二草色無人地梅花近臘天擬飛猶未雪將盡欲新年漫與空成恨無求合信緣平生為晚計老去更茫然三倚杖千山裡窮年一水濵有官羞隱吏無句作詩人雨送燈前夢儺催臘後春孤山林處士笑我是比鄰四老病時攜客斜陽更上樓山寒猶有雪湖晚最宜鷗詩可書幽事兒能伴薄游人生每如此吾意復何憂次韻幼安寺丞感舊見示當時長嘯敵先摧不費官軍一炬灰殘冦自驚風鳥散使君方看玉山頽攖城捍賊今亡矣抗疏論功有是哉相見可堪談舊事為公搔首一裴􅏆甲子立春口號四首梅花消息未闌珊春入千門笑語喧人道上元新甲子從頭却數太平年春來玉燭又初調盡喜官儀是漢朝御道雪晴方試輦彤庭日暖漸聞韶力爭和議衆初疑事在君王子母知舊日塞垣啼鳥處如今長樂曉鐘時晴日初生禁籞春苑花宫樹一畨新君王勤儉無行樂只作銀鈎賜近臣元夕前三日書事舊嵗冬餘雪今年雨復晴奉常新奏樂蕃使近朝正燈火鼇山路風光鳯輦城須煩天一笑四海盡無兵二落日滄江上潮回水自平雲連子胥廟山接闔閭城海嶽朝吳㑹衣冠奉帝京端門舊燈火還向此時明飯餘過總持菴飽飯度永日問鄰從小園閒攜居士杖來扣總持門花木無人見文書聽客翻更將方外事細為老夫論德莊别後以詩見寄再游錢塘始見之次韻奉答且以叙將别之意分作經年别還成一笑同看君鬚㸃漆羞我鬢吹蓬共醉寧非夢緣詩各坐窮相逢又驚散往往似征鴻二月二十三日薄雪湖上春風結暮陰亂雲堆雪晚來深便隨柳絮飛將去誰管桃花冷不禁自苦多愁成客恨不關難測是天心乘除妙理誰能㑹明日朝暾忽滿林次韻子東春雪春光早已到千林尚有餘寒壓曉衾解作飛花朝蔌蔌絶勝疏雨曉涔涔無田亦有三登意是瑞何妨一尺深雪裡故人誰過我西湖嵓壑似山陰湖上戲題一湖春水緑漪漪臥水桃花紅滿枝去住雲情渾不定陰晴天色故相欺風前柳作小垂手雨後山成雙畫眉何必娉娉仍嫋嫋西湖應便是西施後二日又題一首家在東灣古渡頭柴扉草閣枕寒流無人擬彈能言鴨有眼那驚不下鷗月裏踏歌何處社樽中載酒幾家遊溪南溪北村村水春雨春風日日愁後五日又題一首幾日春風大放顛晚來寒日露晴天浪紋隨棹湖如鏡日腳翻鴉月似弦便可飽看花入眼不應直待柳吹綿庾郎分得愁千斛肯與青絲作少年湖居無事日課小詩春湖潮滿入青天浪拍東風打釣船人在空濛飛絮裡鳥啼紅白亂花前天上陰晴不可猜兩畨雲黑又雲開鷺從落日山邊去魚趁晚湖潮裡來茶了詩窗飯後杯兒書未熟急須催鳥於花外喚客出山自眼前將句來老向華胥占一窗無心更夢小雲郎城居可似湖居好詩味頗隨茶味長花枝滿樹雨添肥晴色十分春又歸一生萬事無不爾行年六十盡成非多情白鳥去還來無事風扉閉復開山下一帆衝雨過水邊雙燕得泥回海內名流詩有宗時傳佳句落閒中不道建安六七子可是近時三數公次韻同季夜宿松園兼呈清照師鶴骨松園老霜髯八十春相逢看日夕留客賦詩新鬼亦來聽法誰應可作鄰折腰營斗粟寧不愧斯人强幼安用余與曽同季唱酬韻作二章見寄謹用韻為謝江國從游地花今幾度春老唯羇客在情獨使君新未敢論傾蓋應須托善鄰如公真盛德舉世更何人花落青墩寺誰從作好春錦囊題句近舊斾得州新老手摧强敵餘風睦四鄰他年數循吏神爵有斯人寄李司農三首東閣當年夜華燈照别樽斷碑思鴈塔佳客愧龍門豈料三吳路相逢一水村只今懸望眼猶欲黯離魂徽水定何處謫官今幾時長沙應有賦南澗可無詩柳絮催春逺梅花寄客遲誰憐憶公久頭白少相知謝眺南齊守司農古漢官杯今與誰把山亦要公看細札頒何日離騷讀又殘侍郎兄弟在往往上金鑾客舍春寒每日東風吹暗塵小池幽樹不成春妨他燕子關何事折盡梅花最惱人愁裡了知身是幻老來惟與睡相親去年湖水渾依舊欲買扁舟釣白蘋洗馬行和關子東韻憶昔四海多甲兵令嚴細柳將軍營鐵衣健卒持滿立黑頭壯士從軍行眼前千馬復萬馬寸土不耕犁與騂自從虎皮蒙劍㦸此馬不聞鼙鼓驚只今盡浴長安水七十萬匹俱長鳴風騣霧鬛久不試日饜官粟無斗升廟堂伊吕自有策不與韓白齊功名圉人但喜馬肥健野老安知無戰爭有君如此豈不樂俟河幾時今得清不須天育驃騎種雲霧晦冥方降精我欲刻石上浯水白頭弄筆羞書生不聞鐵騎響鳴鏑但聽玉簫吹九成讀楚詞三首借令無䇿拒强秦何至甘心受虎吞楚國已墟三十載區區猶念爾東門方從黃棘望回驂可笑襄王又信讒巳分世間無鮑叔便須水底覔彭咸人生長䇿是同流却遣何人為國憂鼎鑊軒裳俱一死屈原何得畏陽矦夜中聞雨枕上作老去飄零日春愁爛漫中詩窗窺窈窕睡枕聽朦朧弱柳妨晴態小桃吹落紅顛風莫相惱花事不關儂為人賀沈鎮江生日一麾新領浙西州重說當年八詠侯要遣敵人知宿將故乘軺傳作遨頭朅來京口頒明詔便合甘泉從禁遊紅袖相扶客為壽莫嫌和月醉西樓甲子重新數中興濟川人為聖時生五花名肅金鑾殿八陳威寒鐵甕城賀客杯觴方瀲灧使君忠力轉精明祝年有意留公住只恐調元要老成春寒楊柳毿毿一水間梅花憔悴雨􅟎􅀢春愁巳自難禁酒病骨何由更耐寒種蘭桃杏花中偶並欄依然風味是幽蘭莫因移種長安市不作春山一樣看種萱萬事全歸兩鬢霜新愁盡屬少年場如今乞得忘憂草巳自無憂可得忘次韻張元明同邊郎中遊西湖二君講同年之好有此游十里春波翠染衣小尋魚鳥共追隨船頭風急何妨醉湖上山多盡入詩藜杖偶來飛絮裏蘆鞭猶憶看花時兩公人物如連璧同上金鑾亦未遲皇帝親祀髙禖十五韻厯欲綿洪祚郊宜築巨臺有司修祝冊天子祭髙禖意與群情合春隨上瑞來翠輿瞻玉座桂酒奠金罍喜色回中壼歡聲入九畡熊羆占已兆弧矢射將催異禮關宗社餘波被草萊靈基千嵗永玉葉萬枝開制度新儀著歌詩舊典該魯侯徒復宇后稷始封邰帝德應先格天心亦易回至誠參造化妙響疾風靁厯數周家久封疆漢地恢山河今壯矣瓜瓞信悠哉準擬螽斯詠微臣愧不才校李從一臺閣集因效其體細誦台州句湖邊草舍幽好山來競秀清瀨與爭流吏可供書札兒能伴校讎小窗誰共此唯有夕陽留二舊斾來分賴唐朝有百人諸公皆泯滅此句獨清新異世名空在今年迹巳塵何由弔髙冢一望石麒麟次韻子東奉命祠髙禖齊宫望臨平山遙想祠宫曉色寒卷簾聊此看孱顔官閒頗似蘇司業詩好全如庾子山覔句不妨煙雨外浮家猶記往來間舊游有意重回首恐上金鑾未得還太倉稊米集卷二十三
