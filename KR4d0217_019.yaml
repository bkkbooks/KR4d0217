body:
  text: 太倉稊米集卷十九宋周紫芝撰詩四十九首題周掾西山亭江靜雲恬眼界空危亭髙枕麗譙東風來雨後憑闌處山在人間拄笏中春去平蕪隨處有鳥啼斜日滿林紅伯仁空洞渾無物容我清樽一笑同次韻道卿聞新鶯草長江南春欲闌曉鶯聲在緑陰間定應春恨知公子故作清歌學小蠻催盡落花風自暖喚醒愁眼日長間隔枝時見黃金羽始信庭柯會解顔次韻道卿縣樓觀雨之集樓下江聲雜雨聲斷雲初掩斷霞明吹殘惡熱涼生面㵼作奔流緑繞城擾擾驚禽棲不定娟娟缺月坐來生遙知舉白酬豐嵗醉裏憑欄句又成道卿論吳中夏果詞頗夸且借蘇內相春菜詩韻作詩僕亦同賦聊為江南解嘲江南五月菱垂葉葉底紫菱如紫蕨梨香濺齒蔗漿寒瓜熟堆盤水精滑紅薑抹縷雜吳鹽纖手淹梅帶微辣芳林露下摘金桃入眼胭脂紅臉抹木瓜甘酸天下無百果論功誰可甲朱櫻萬顆滴階紅滿架蒲桃更肥茁橙香栗大芋如鴟此品秋來不勝説老翁空作解嘲詩但恐年衰左車脫次韻羅仲共靈泉夏夜二首靈泉無暑竹連山絶似秋霜五月寒我欲訪君安得往江湖滿地一漁竿泉聲落枕喚詩成傑句中含萬壑聲起看四更山吐月又扶藜杕到天明夜訪伯逺偶題長句夜攜桃竹上山枝來叩徐矦種菊籬憐我風霜猶短褐喜君人物是長離酣歌強對老來酒忍淚重聽亂後詩一笑相逢真我輩此情慎勿遣兒知駝山秋晚二首詩翁老去無人數晚嵗移家在河滸敗絮蒙頭那復霜破屋穿天只愁雨大兒窗下抄竒書小兒燈前誦論語明日羞囊餘幾何客至無錢具雞黍溪邊茅屋知誰家門前水落溪露沙枯藤繞屋挂秋實黑如點漆紅丹砂蜀葵花空已收子雞冠樹髙猶有花客來倚杕主人出屋頭日暖聽蜂衙聞張伯真割奉粟二十斛見遺而書未至戲題小篇老去空嗤守錢虜我亦無錢買田畝未容殘月喘吳牛空對杏花耕宿雨昨宵夜誦偶連明今日晨炊忽停午長腰聞有尺素書腹飽先懸待椎鼓浣花老人殊可憐忍飢更索飢腸語故人祿米肯長供司業酒錢時亦與平生無句可驚人未審何由坐斯苦幾時去作多田君滿田䆉稏多黃雲長年飽飯作穀伯且免勞人勤指囷九月十六日生日示內從我憐君二十年備嘗險阻與艱難試看剪髮師陶母肯為親舂愧阿鸞香火結緣聊為老杯盤為夀小同歡鹿門願遂平生志更享全家百嵗安次韻道卿見貽樓下秋空月似波與君髙目在庭柯新愁别後知無數白髮年來畏轉多嵗月催人駒過隙世緣相縛雉罹羅多才似子仍多學他日金鑾穩上坡次韻道卿催梅江上連朝暗飛雪花信風遲寒凛冽東閣觀梅殊未妍揚州何遜心應折何郎思苦花欲開羯鼓不倩天公催詩翁自是催花手能挽春從天際來帳下玉人羞起晚弄粉含姿半驕蹇應憐冶葉與倡條有意凌寒入芳苑君詩好更誰與論會令寒谷生春溫氷姿一笑忽滿眼誰道鶴林花有神次韻道卿梅花長句月娥窺水晚纖纖風味能回鐵石嚴滿地不禁飛處急一枝猶得醉時拈國香無意欺蘭蕙天質應羞擬絮鹽冷蘂依然在空谷何人重傍少陵簷次韻邵文伯懷桐渚與陳子髙唱酬之樂謫仙騎鯨上天去萬古風流一丘土去天尺五城南杜晚上瞿塘望江渚兩翁憔悴人不與造物嗔渠作竒語陳矦筆勢誰可禦九鼎自可獨力舉夢中尺錦君盡取時向胸中作吞吐邵郎詩髙孰賓主一笑相看兩相許清歌那忍聽金縷渠坐詩窮君勿怒衰翁老氣不可鼓篆鼎瓦棺心好古此别相逢定何所他時剝啄叩君户藜杖經行尚堪拄次韻靜翁雪中見過三首年年飛雪閉寒齋老怯風威不下階客至未妨頻叩户人生何必要籠街莫嫌縱飲方投轄聞道中興已勒崖自笑下愚移不得從渠撫掌笑髙柴故國飄零萬事乖十年不見雪中階要令幽子安圭竇少待凶酋脫藁街援筆何由賦梁苑閉門只合老蒼崖君來看我煨黃獨自採春山帶葉柴端門萬馬想初回跪賀群臣拜玉階我約江鷗分雪浦誰將烏帽踏天街從遊久欲真浮海送客懸知亦自崖猶有升平臨老眼尚堪方嶽看燔柴二十八日雪霽讀朝無咎集呈别乘徐彥志且以奉懷蘇公論士昔未聞四客輩出俱同門龍媒忽下洗凡馬野鶴一舉空雞群虞皇七友廊廟具元和十子非渠倫張公屈宋排衙官清詞麗句氷雪寒秦公筆下有過秦平生目短曹劉垣金華仙伯學杜甫句法自許窺公藩朝公磊落天下士帝遣長庚下人世舊聞一醉百梨花醉後狂歌滿天地詩成只在倚馬間髙談頗似懸河翻當時七發真少作秦漢以來無此文今日晴窗有佳色積雪為洗煙埃昏千山排巒削寒玉萬木擁户明朝暾試攜塵編醒病眼隱几一笑空爐芬是中有味知者少此意便欲從公論題南金慎獨齋聖道不可窮探取隨已欲平生所受用政可一言足子思著中庸暗室戒慎獨危微恐懼心此念旋已熟學從西洛來標榜相品目袖手看屋梁表表如鶴鵠誰知胸中塵往往盈斗斛伋也而有知寧不貽彼忸吳侯蚤作吏未肯事邊幅得妙自聖處了不關世俗頗知幽隱中日月所照燭不敢欺秋毫髙情潔氷玉願言從君遊著鞭蹈前躅題彥恢家草堂李宏字彥恢慕石徂徠為人家有守道堂吕居仁宣城四友之數昭陵厚德如乾坤廊廟補衮多公言徂徠官在百寮底有時論事驚天閽皂囊欲上謗已滿霜臺不到名空尊李矦自是千載士人説贊皇今有孫長安御史一驄馬人物眼髙爭薦論南牀小忍便可得直氣肯受髙官吞青雲垂上却回首得州如斗車朱轓兩公相望空落落當年風采今仍存古來名節與富貴輕重略等常平分天公相愛似有意黃鵠欲舉方騰鶱未開青瑣霄漢上故著草堂煙雨間人生窮達固難料時來鶴亦能髙軒願公努力善自愛更進藥石禆華勛次韻道卿殘臘步遊林藪草木漸有生意三首抱病嵗忽杪杜門誰復來感子陽春句為噓寒谷荄君才那易得辭華陋鄒枚草木不足羡雲衢路當開春意私節物榮枯竟何哉封矦與裂土且當付輿臺老意慘不樂青春為誰來藝蘭在九畹誰能起殘荄桃李忽滿眼其實亦枚枚耕田種芝草玲瓏殊未開榮華競春事于我何有哉當浮白玉闕下睨黃金臺人生有榮瘁否極泰必來君看九地春寸草無餘荄白首始一遇蒲輪迎老枚祁隱不可招詡徑行當開我欲尋盧敖盧敖安在哉但當急洗眼看子登雲臺讀元微之詩有感從古才髙少識真此公句法老尤新世間言語渾無用天上吹噓却要人但遣前旒知嫵媚莫嫌後榻有嚬呻夢中富貴能多少空使清流作怒嗔舟次句茨時寓白湖移居來近玉湖中漁户新添白腳翁覔句深慙何水部浮家全似陸龜蒙山寒政恐無黃獨地濕應須要鞠藭晚日飄零天不管雙鳬乘鴈聽西東雨寒連日大風病中作此詩門外湖光瀲灧中春寒那聽雨濛濛吹殘梅雪如山雪顛得江風似颶風雙燕擬來尋舊約小桃渾未試新紅黃紬獨擁眠方熟剝啄何須來惱翁暝立山隔湖邊路人棲柳下扉船從几席過燕掠水波飛鳥亦昏才定牛知晚自歸幽人常暝立日日到斜暉次韻黃文若寄燈夕不出之作少小從舞雩鼓瑟常屢希結髮事墳典願言探玄微鐘鳴漏忽盡殘星獨暉暉征鞍老塗路白露霑裳衣齒髮倐已暮富貴終難祈佳辰念京洛流車看騑騑結客少年場兒女如瓠肥紅燈白晝暖醉碗黃金揮回頭二十載狗盜相因依時光了如夢菽粟不救飢飄零少行樂老大空歔欷今年四海靜扊扅張外扉芙渠焰明缸金波麗春幃穠李樽前歌遊子月下稀錚錚銀漏中撲撲春蛾飛此老最可憐已杜禦冦機但知草中和浩蕩歌皇威晶熒一短檠搔首悟昨非風流如黃香不作傳柑歸更攜袖中珠來尋北山薇詩盟倘可同願復無余遺題趙安定像烏巾白角雲錦裘長脛骯髒髙結喉王孫自是真龍種世上懸知無此儔醉裏哦詩詩欲就風月平欺兩肩瘦秋風為神玉為骨畫手何從寫竒秀仇池客多誰在亡髙準虬髯唯汝陽紫皇苦欲奏璈語此曲至今空斷腸腸斷公歌侍兒拍甕裏黃柑自春色老坡不見空凄然此詩此意無人傳題包鼎大虎圖人間妙伎古亦有畫虎從來易成狗何人為作老於菟鼎死百年無此手想當運筆亦有神睥睨知誰看回肘便恐陰崖風雨來何止草中狐兔走易生驚猿羞挂枝周昉稚犬空復肥畫中生意似可喜此虎一出無餘姿邇來喪亂書厄苦唯有君家此畫古妖狐一丘渠自安狡兔三窟無人取建章宫殿空咸陽猛士知誰守疆土藜藿不採虎在山安得有臣如此虎欣師介軒念我昔年少剛介頗成癖多錢嗤守虜飽飯嘲穀伯有口能雌黃反眼輒青白阿奴恃火攻未必出下䇿一笑當尊拳僅得貸雞肋只今真老大鬚髯已如戟折肱成良醫忤物知何益要令空洞中下視滄溟窄嶢嶢固難全容容聊自適知雌在守雄外曲當內直此理吾巳明師獨未之得願言戒覆車聊用銘子壁三月五日晚霽大風雨後風扉擁青嶂家在斜陽晚潮上沙頭飛盡雪色鷗柳下初橫短蓬舫皇天惡料風忽顛賈客倉黃回五兩老人倚杕不肯歸看打南湖白頭浪九江王興道早嵗休官作易安奚疑二室要余作詩心如止水不妨清身似無官不為名但把一椽供偃蹇從他百鬼瞰髙明路迷雞犬家何在身與漁樵席屢爭眼看青雲有矰繳鷦鷯巢小未宜輕朽骨枯莖未必靈行藏何苦訪君平問津世路心先懶買地江干計巳成解向急流求勇退便知幽事合關情裕陵將種今誰在但恐君王問姓名倚杕雨腳收寒久東風倚杖頻浪翻雙鷺起船過小鵝嗔客飯長腰米林居折角巾澆山一掬淚回首故鄉春寒食日歸郡舟中作二首歸棹浮江水寒衾擁醉眠亂花飛送客細浪穩隨船淚落澆山酒愁生禁火天一從胡騎入飄泊到今年世事聊相挽吾歸亦有期白湖為客久寒食到家遲接屋花仍在遮門柳自垂向來歌社裏應著老人嬉春事春事無多日江村有數家等間飛燕子容易落梨花草色過薄雨柳陰暝淡霞詩成不歸去暝立看棲鴉湖居春晚雜賦八絶雪屋臨湖憶繫船栁汀吹絮又經年白鷗大似知人意分與滄波十里天雨後春湖拍拍流近門誰繫兩三舟水邊寒食飛雙燕栁外斜陽卧一牛數日東風緊閉門小桃知有一枝新花飛不復到老眼可是春寒欺得人倚牀相伴一枝藤強作春遊老不能花底嬋娟詩嫵媚枕中日月睡瞢騰黃蜂歸後燕成家楊栁初飛一兩花已是無春可拚得亂紅何苦惱霜華曉鏡煙凝水繞湖晚汀飛鷺又成圖早知魚鳥堪同樂愁得華顛政不須兩日東風著意顛南湖風浪不行船飛沙走石成何事吹得楊花也上天湖水波連野水邊欲晴鳩喚未晴天懶吹雲去風無力打得花殘雨可憐雨中立杏花下淺紅疏蘂出墻頭事往人空鎖北樓鳥為春愁渾不語花知人意亦含羞東風脈脈情何限細雨濛濛淚不休却憶去年花下醉依稀記得小蠻謳恭聞巳迎原廟聖容入行在所兵氣滿京洛橋山萬木悲園陵回望逺衮繡自天埀日月瞻遺像衣冠拜赤墀櫻桃薦原廟重見漢官儀太倉稊米集卷十九
