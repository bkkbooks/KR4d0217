body:
  text: 太倉稊米集巻四十六宋周紫芝撰論五首宇文融論天下之禍必有所自起善論事者不當罪其成禍之人而當罪其始禍之人是以成禍者其罪小始禍者其罪大不可不辨也古人有言曰與其畜聚斂之臣寜畜盜臣人情豈固欲捨君子之名而䝉盜賊之稱哉顧聚斂之臣本以逢君之欲主意既合非特階以自售其身徃徃因以致位卿相後之好進者遂指掊克之計以為宰相捷塗曰彼既以是而得之吾何憚而不為哉由是知成禍者為患於一時而始禍者貽患於後世此始禍者其罪所以不得不大成禍者其罪所以不得不小也開元之初明皇以勵精之志奮然有為於天下當是之時元老魁舊布列於朝人主猶知有所尊憚焉及太平既乆淫侈日肆財用困竭國計艱短言利之臣得以用事明皇始相宇文融其後韋堅楊慎矜王鉷楊國忠咸以言利進至歳裒緡錢萬億為天子私藏以濟横賜卒使盜起兵興主遷勢奪而不可救惜哉德宗繼肅代䘮亂之後既相楊炎作兩稅法民力未及少紓而大常愽士陳京請借商錢户部侍郎趙賛代杜佑行借錢令民不勝寃家若被盜至市人相率遮邀宰相泣訴於朝曽不之䘏逮裴延齡用事益為天子増私藏海内重困天子不免播遷之患至憲宗時皇甫鏄由聚斂勾剥為宰相雖市道皆嗤之卒使憲宗剛明果斷之資不克有終而其禍有甚於德宗焉是數子者皆操融之術躡融之踵以取融之位如探嚢而得物則天下之禍吾固知其有所始矣初明皇用融之䇿張說嘗數沮其謀融乃誣告說罪帝發金吾兵圍其第幾不免殺自是利說一開群奸相繼而至矣至德宗之用裴延齡也陸贄言延齡侵削兆民為天子取怨於下帝怒罷贄亦幾不免憲宗之時程異皇甫鏄以言財賦幸俄得宰相裴度三上書言不可帝不納其言用之不疑何明皇不信張說之言而用宇文融德宗不信陸贄之言而用裴延齡憲宗不信裴度之言而用皇甫鏄也蓋諛言利說易饜主情而忠諫讜議難囘感聽君子小人勢不兩立小人進則君子退其理然也憲宗即位嘗謂宰相李吉甫曰德宗播遷誰寔召亂吉甫以陳京趙賛之事告之帝憤然曰京與賛真賊臣憲宗聞暴斂之禍首於賊臣未幾復相皇甫鏄豈亦迫於國計不得巳而然歟乃知利說易以搖其君雖明皇之事德宗之所聞德宗之事憲宗之所聞而公然蹈其覆轍亟於亂亡而不悔也唐自太宗之業廢於後世而取民之制日巳滋廣兩稅之外如鹽鐵轉運鑄錢括田𣙜利借商進奉獻助靡所不至其取之可謂極矣其為報亦酷焉當時聚斂掊克之人不可勝數而始作俑者蓋起於融後人見融以言利獲寵取相位皆翕然師之因以陷其君於危亡然則論天下之禍而誅其首禍之人非融而誰歟救奢自古人主茍非聖人未有不流於奢侈以縱其耳目之欲者究其禍亂之源蓋起於大禹而成於周公夫人臣之事君若禹之相舜周公之相成王可以為萬世法矣以謂迪人主以為奢侈其禍起於此者何也禹既平水土以奠九州之賦乃因其土地之所有以制其貢若元纁纎縞可以供幣帛之用貢之可也孤桐浮磬可以備禮樂之器貢之可也砮以為鏃楛以為矢可以禦敵貢之可也菁以為葅茅以束酒可以享神貢之可也至於青州之貢有怪石則玩好之用也徐州之貢有蠙珠則珍竒之物也荆州之貢有橘柚則飲食之美味也唐虞之君茅茨不剪土堦三尺以示天下之儉顧安用是為哉然則禹所以享其君與夫舜所以受其享余固可得而知之武王伐商通道於九夷八蠻而西旅遣奉獒之使獒犬未足為珍蠻夷歸命而受其獻猶未甚損於聖德召公作書以戒其辭曰不貴異物賤用物民乃足又曰珍禽竒獸不育於國武王賢聖豈貴異物而從禽獸者奭之戒所以丁寜反覆而不巳者杜其源也周禮一書所以載周公制作之典至於供王之玩好猶為之設官焉周公身為保傅務在格君心之非豈不知玩好之物侈性伐德非人主所當留意而設官以供其求是迪其君使從欲也豈大臣以道事君之義後之為人臣者將為竒技淫巧以蕩上心則必援大禹周公之說以藉口曰禹之所以事君者若是周公之所以事君者若是吾何憚而不為哉故曰究其禍亂之源蓋起於大禹成於周公或曰禹周公非聖者歟曰禹周公聖人也聖人而猶若是者何哉蓋禹周公以聖賢之主望其君而不敢期以為桀紂之事也以人臣之禮事其上而不敢不以天下而奉一人也故有虞舜成王以為之君有大禹周公以為之臣則胡為而不可唐有天下更二十餘帝方其即位之初未有不銳意於治者故嘗斥怪珍之玩絶綺麗之服放宫中之嬪御罷四方之貢獻以足國用而收人心逮其終也則必饜其欲而後巳夫太宗之勤儉出於天資猶且萬里遣使市索駿馬并求珍怪魏徵之陳十漸此居首焉况其他乎初帝問褚遂良舜造漆器諌者七十餘人此何足諫而遂良對忠臣愛君必防其漸嗚呼若二子者可謂知救奢之道矣正俗天下之治亂風俗之美惡未有不出於上之所化化之以正猶懼其有所不從未有化之以不正而天下自治者也明王以孝理天下以躬行化之以謂愚者猶有所未喻頑者不可以遽革於是又為賞罰以勸沮之故孝於家者表其宅里而爵之於朝一有不孝則屏徙逺鄉而刑之於市於是而猶有不孝者况短喪而不禁匿服而不罪又命群臣使不終喪是率天下而為不孝也天下之俗幾何而不秦乎夫三年之喪天下之通喪也自公卿達於庶人雖貴賤之勢異而哀戚之情則同今文武殊稱而喪服異制豈理也哉或曰聖人隨宜以制法權時而濟事至於兵戎之急有須其人而用之者烏可殉人情之細而廢國家之大事乎曰是不然也春秋書晉人及姜戎敗秦師於崤杜預謂晉人背喪用兵故通以賤者告初文公薨而未葬襄公凶服以從戎晉於是始墨其後遂因以為俗焉春秋書之蓋記禮之所由變也夫一日縱敵數世之患晉伐秦師於是為急襄公權以大義而國遂喪於禮可不慎乎昔者子夏問於孔子曰三年之喪卒哭金革之事無避也者禮歟孔子曰夏后氏之喪既殯而致事商人既葬而致事故曰君子不奪人之親亦不可奪親也吾聞諸老聃曰昔者魯公伯禽有謂為之也今以三年之喪從其利者吾弗知也由是觀之雖兵戎之急有須其人而用之者聖人之所不為也唐髙祖剗亡隋之弊俗敦三代之髙風詔文武官終喪可謂善矣太宗不能終父之志貞觀六年侯君集起復八年長孫無忌起復十六年房元齡起復二十二年禇遂良起復而髙祖之制遂不復行豈非是四五人者得之則治失之則亂得之則安失之則危歟是治亂安危有繫於此不得不爾也就使若是為人君者猶不當奪人之情而强之政况不然乎太宗以聰明睿智之資而隆太平極治之業可謂一時之英主矣其奪喪以用人則至於再至於三而不已然則終唐之世風俗之醇所以終有愧三代之盛者以其不求正俗之本也歟稗官古之人君喜聞直言故其求言之路廣惟恐一微言之不聞也後世人君惡聞直言故其拒諫之刑峻惟恐一言之上達也直言日聞於前則諂諛之論不得入此天下所以獲治安之福直言不得聞則諂諛之論日以浸潤國因以亂而不可救二者利害相懸不啻如天地而人主有不察焉殊不知古者廟堂之上君臣之間相與賡歌以戒荒淫必在於治安無事之際當是之時在廷有敢諫之臣出納有喉舌之司而群言無或蔽於上矣猶以為未也則又狥衆庻之論考芻蕘之言以禆吾之聽焉然而上下殊位貴賤異勢畏威者或不敢言卑賤者或不得言則又未必盡得天下之言也於是設敢諫之鼓立誹謗之木以使之言焉猶以為未也則又命國史作詩以明得失命太師陳詩以觀民風而設采詩之官以察民之情則其求言之路可謂廣矣此三代之盛雖瞽矇猶得於箴規雖百工之賤猶得執藝事以諫况公卿大夫忠臣義士之賢者乎余嘗博采六藝百家之書以謂聖王求言之術殆盡於此矣其後讀西漢書見班固叙小說者皆謂出於稗官說者謂稗米之細碎者而稗官以採摭細碎為職班固曰街談巷語道聽塗說亦綴而不忘如或一言可採此亦芻蕘狂夫之論也乃知賢君廣求言之路委曲如此唯恐一言之或遺也前世求之如是其詳尚恐不得聞况末世殺忠臣以鉗天下之口設監謗以禁天下使不得言者乎稗官之設不知起於何代漢之唐林請省置吏公卿大夫至都官稗官各減十三則疑此官自是而廢矣嗚呼先王設官分職可謂詳矣其微至於採荼葛驅龜黽之事猶掌以官後世省官罷貟有不可廢如稗官者猶以為不急而去之殊不知其官減而職廢天下之言日以壅塞而忠臣讜議寝不得聞則是其所省者微而其為害也大矣夫雷霆之所擊莫不摧折萬鈞之所壓無不糜滅人主之威甚於雷霆而鎮服之勢重於萬鈞言者豈得不畏其摧折糜滅之患哉又况門廷之間逺於萬里非設官而授之職俾旁求而博采之猶恐不聞况廢而不設乎林之建此議可謂不思之甚也五德五行之理相為尅勝在陰陽有自然之義其為說雖聖人有不得而易也不幸遭五經殘滅之餘聖人不作九流並起隂陽災異之學一熾而諸儒各以臆説更相附㑹至使其事若可信而有足疑者此固不可以無辨說者謂黄帝得土德黄能地螾見夏得木德青龍止於郊商得金德銀自山溢周得火德有赤烏之符此為若可信者班固乃以共工氏以水德同於木火與秦同運非其次序故皆不永固說之陋夫人而得鄙之矣秦以熊羆之力虎狼之心蠶食諸侯并吞六國宫室燕遊之奉不足以厭其侈心又為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀靡不畢至民之勞弊有不能勝亡固可蹻足待也髙祖以義取天下秦王子嬰降於軹道漢王以屬吏寳器婦女無所取還軍灞上以待諸侯與秦民約法三章民無不歸心者其興也可謂有德矣然則漢以德興秦以暴滅天之予奪契若符璽使秦不以水德王天下何害於亡漢不以火德王天下何害於興議者乃以赤帝斬白帝受命之符則既巳得天統矣然漢之初興庶事草創叔孫通略定禮儀而正朔服色亦未遑暇漢文帝時魯人公孫臣上書言漢當土德丞相張蒼明於律厯乃以漢水德明年黄龍見成紀文帝乃拜臣為博士詔諸儒改服色而賈誼獻䇿亦以漢當土德至孝武時雖倪寛之通經司馬遷之博洽猶循公孫賈誼之說不復有所改易獨劉向父子以謂帝出乎震故包犧氏始受木德其後以母傳子終而復始自神農黄帝下厯唐虞三代而漢得火焉諸儒之說何其紛紛耶夫以漢之一代所以王者三或以為水或以為火或以為土彼蓋有所託而言然亦有未足然者三代之王取受命之符於始興之帝黄龍見於文帝時安得以為土德此公孫臣之說為非也自包犧氏以五德相傳則秦以水德漢安得復以水乎此張蒼之說為非也以土制水於五行序為是然髙祖始興神母夜號著赤帝之符則漢當以火而不以土無可疑者此賈誼司馬遷之說為非也夏得木商得金周得火在三代無以母傳子之序周以火秦以水漢復以火在秦漢無周而復始之義此劉向父子之說為非也夫以賈誼司馬遷張蒼劉向之徒其愽聞洽識皆千年之士也而謂其說卒無可取蓋亦不可要之後世災異之學出於臆說茍稽諸聖而無考焉雖略之可乃若秦漢之所以存亡其理較然易知者且詳言之以為後世戒則亦烏乎而不可哉太倉稊米集巻四十六
