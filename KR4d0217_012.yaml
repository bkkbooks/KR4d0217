body:
  text: 太倉稊米集卷十二宋周紫芝撰詩三十九首和趙鵬翔贈李生趙翼之字鵬翔宣城主簿李生善畫京師人人間作畫如作詩妙由心得非人為五日一石十日水此事無乃亦可期向來鄗恕先妙手真復竒經年不肯下一筆胸中邱壑誰當知忽然有興不可遏寫作槎丫風雨枝回頭却笑閻立本緩急與人為畫師李生聞是成逺後一生落魄唯飲酒貴人金多不可呼閒日為多畫日偶心知公子非俗人平生筆砥波瀾翻故作滄江與巨石要看萬里風濤相吐吞誰知此老不足數自笑一生常苦辛桃花水暖小艇窄十年辜負江邊春時危力小去未得畫圖入眼空傷神次韻韋深道哭陳諫議韋許字深道自是羣姦誤聖君初心豈願作忠臣平生徑氣埋黃壤當日嘉言在紫宸諌議裂麻方伏閣諸公鳴玉自埀紳向來六子俱誅滅此道于誰較屈伸諌議謂陳束叔達許分萱柳二栽作二絶華顛老去幾霜秋知處元應不奈愁但得稍分花到眼誰能更覔地埋憂鋤荒巳出墻根路剪緑仍分雪後栽便與數椽容我老當留一徑待君來謝元不伐寄靈岩七詩用梅聖俞韻靈岩勝絶天下稀開鑿乃自太古出山名初豈有顯晦勝處要須詩黼黻自從梅老登列仙尤物誰憐久埋沒具茨筆力扛九鼎坐遣清詩入山骨據龜食蛤誰與遊綘節雲車到仙窟雲間招手疑有無月下吹簫真仿佛飛雲杳藹風吹香翠潤空濛雨埀濕誰從洞口看金書想對神清時獨立我家靈岩山腳砥識面何由恍如失雖無幽夢到三山尚有明珠容什襲送别徐南美謀臣如雲將如雨欲剪天驕奉明主御營飛詔肅虎貔妙略縱橫自神武誰騎駁馬蹄雙朱夢從璜溪親帝輿手提大鉞殺兩將日御少却公重扶此公堂堂出當國羣盜相看少顔色江上鯨鯢盡掃除草中狐兔無窠窟折衝自可銷戈兵寸地尺天歸聖明帳下偏禆何足數幕中賔客公獨稱願資碩畫戡禍亂坐遣四海歌升平書生白首亦安用尚可平戎作短行送侯元進罷涇溪丞單于飲馬窺長江巨鼎一沸俱倉黃我攜老稚不知處流離夜竄涇山陽山中小邑真蕞爾井邑無聲但流水亂石巉崢虎看人賈客稀疏市爭米憶昔相逢羣盜中過我天宫寶坊裏人言覔句崔立之恐是前身侯叔起當官論事嚼寒氷醉後詩成只彈指三年兵火夢中遊别去何堪日千里人生直氣忌太髙論少卑之亦聊爾功名唾手良偶然邂逅庸奴亦如此如公人物自有餘似我蒼華真老矣只今滿世尚干戈應念相思遣雙鯉李使君示開化諸詩李處勵字勤仲自衢守移宣使君一出承明序當年兩佩龜峯魚龜峯小兒騎竹馬笑挽朱轓歸故閭門外春風吹畫㦸小閣香濃綺疏碧蘇州五字老更竒東陽八詠人誰敵山堂聞說公自開烟雨遙供翠鬟色更向招提山窟中竹杖穿雲飽經歷夜上孤峯看明月曉趁鐘魚著僧屐詩成知復幾牛腰倒廩傾囷公不惜他人舉似與何人知我耽詩老成僻平日看囊止一錢驚見縱橫著圭璧當遣兒童勿浪傳按劔從來少人識贈元具茨二首時具茨作寧國宰名勛字不伐具茨其號也平生結客少年場人物如君見未嘗早嵗風流知漫叟一時師友是黃香相從便作雙鳬去欲見應須一葦航只恐涪翁門下士九重應合奉清光勛師山谷山谷常為作字序名在金華季孟間流傳佳句落人寰異時文采今何在掃地風流喚欲還賸馥見分雖有意小巫自顧獨何顔源明不恨生衰俗尚喜人中識魯山羅仲共兄弟文集為賊所殘照眼明珠兩陸離機雲兄弟似當時文章未許輕霑丏神物何為缺護持白璧懸知從間道青氊亦復付偷兒誰言舉世無蘇暐收得香奩第一詩何元靜以詩索花次韻詩尾致剪花之約城南有客身倦遊飯無脫粟衣無裘短墻雨濕花木晚窮巷草深籬落秋心常自許玉人輩人言恐是原憲流千奴安得封君祿偶有一花聊可目綵椽作架恐未暇春到聽花飛上屋衡門無酒客不知寒谷少春花更遲殷勤未足供一笑慙愧煩君作好詩誰遣春風吹急雨枝頭會見花無數夜窗月白得暗香曉枕風微戰輕素已辦并州快剪刀為剪長條送春去君當釀酒買肥羔莫倚匆匆陳草具後數日以詩償剪花之約春風吹雲不成雨暖日將春到花塢知君不羡鶴林神但將詩作催花鼓叨風虐雨一掃空國艷天香為君吐金刀盟在不敢寒急走送君花滿盤何郎要將湯餅試不放枝頭朝露乾樽雖有酒莫謾把客未可人誰共看想當風暖月更白流蘇帳掛香團欒應笑老翁門寂寂咫尺誰來草𤣥宅暗香和月與誰同芳條委地無人摘春與幽􅐾似少情雨打風翻漫狼藉送舒永豐舒賓王字利用少年登科為信州永豐令終焉宣州人斯民如草木九聖含春溫秋風一披拂零落難重陳嗣皇回日御杲杲升朝暾誰令天驕子欲肆長鯨吞王師一倡亂諸將皆星奔可憐爾羣蒼終不負漢恩固亦念顛仆所喜邦本存舒矦名家郎翔鸞未鶱騰稍分民社寄似欲親撥煩盍敷寬大詔力補瘡痍痕勿謂蕞爾邑安能著華軒妙割俱有用雞牛無足言君看密縣宰視民真子孫汗馬無寸勞大傅豈不尊扶衰其有意願復矜元元次韻何君與晚晴花深雨過一鳩鳴喚起何郎對晚晴暮靄連山明白鷺夕陽回處帶啼鶯浮生可笑能幾屐萬事政須論一枰想得追隨共飛蓋玉觴零亂酒催行次韻劉元素暮春書懷斷腸風雨落花時空遣劉郎賦柳枝涉世功名真蟻穴送春歌吹只蛙池尚堪短䇿時乘興猶有寒杯可共持更願餘生似東野雲龍無地不相隨次韻元素再用前作春晴無復少年時那作驚烏夜繞枝願與君遊雲夢澤不愁人奪鳯凰池北窗付我常髙臥手板看渠自倒持擬伴遺民釣烟水蕭規真欲效曹隨元素將與余别再賦前篇因以留之江頭雲雁欲飛時倦翮依然在一枝少竚晚潮青版舫共聽朝雨緑荷池伯生醉熟慙空洞夢得詩髙有護持南浦分襟定何日懸知清夢與君隨送元素重來樽酒定何時藜杖同誰把一枝雅量久知吞夢澤髙飛猶恨隔天池凌烟事業歸驃騎樂府歌行付總持自載筆床茶竈去喜君風味似天隨次韻元不伐暮春再遊俞氏園期任道卿劉長孺不至素心失前期幽事縈老念小築猶未成殘年作逋缺五字俯見投光芒肯收斂遐想徒意消從遊知禮僭流離兵盜餘有籍猶未占尚想南岡花依依弄殘艷棲遲倘㑹意往返殊未厭如何兩公子盟寒久無驗我語良可刪公當為磨玷載酒苦未能兹焉負深歉春晚絶句二首春來白水欲平田未拆鞦韆已禁烟傷雨落花空著地倚風輕絮解漫天鳥聲時向靜中聞盡日陰晴漫不分庭下落花如落絮眼前春思似春雲訪張元明山齊張賁字元明池之青陽人為宣司理張矦詩似嶺雲閒飛鳥何心只願還醉裏有官如物外眼前無客似山間來聽春枕連宵雨看畫秋屏著色山老去此身無處用固應容我作躋攀次韻張元明書劉氏草堂草堂聞出碧雞西一色桃花去路迷有眼固應元自白無腰略可為人低池塘看浴雙鳬雨簾幕時銜燕子泥想得君家舊蓑笠依然猶在太真溪四月二十八日江元楷置酒坐客皆醉臥已而主人亦就睡戲作數語以紀其事西園春事䦨歌管罷絲竹青錢落髙榆幽鳥囀空谷江矦不能閒折簡到吾屬淨掃南窗塵共把一樽玉重觴各頽然睡味久乃熟齁齁兩鼻雷艷艷當筵燭因知歡有餘誰謂飲不足偉哉三玉人曾不愧坦腹應憐俗子陋禮法困窘束坐中飲濕生起舞自成曲主人亦忘客去留隨所欲可笑陶淵明欲睡客須逐題張元眀四鬼捕懶龍圖五月江南地無黍帝遣雷師下行雨百神受職羣龍奔一龍藏頭翳𤣥雲雷師奮虬叱四鬼拽取老龍朝帝閽張矦直氣不可屈雲間睥睨旁怒嗔歸來面壁聊一吐畫作新圖走兒女潛虬怕死不肯行夜乂飛天髮毛𥪡人間空笑虎頭癡筆底風雲遽如許今年雨足年亦豐蜥蜴蝘蜓俱論功龍方下避千里赤疾雷破柱頌天公天公有令那得爾寄語癡龍莫辭死次韻趙伯武病中即事五首臥疴念經時勿藥有新喜便應走駸駸誰復稱起起嘯歌理壺觴婆娑在窗几想當呼濁醪與客談妙理二趙矦佳公子妙伎數三絶對君如春水熇熇消內熱一為藥石誤良㑹能契闊便當亟相過共此良夜月三愛酒知有癖耽書久成癡官曹足餘暇幽䇿約屢枝但恐蒹葭陋繆倚瓊玉姿况無彈丸手突過黃初詩四病餘春巳歸飛花滿空堂萱草欲成窠戎葵粲微黃髙門有賀客新篘怯初嘗人生貴強健餘事亦渺茫五平生沈東陽鶴骨儼如故朝來聞巾車載酒定何處暮歸坐東軒翰墨有佳趣當時烏絲欄為乞錦囊句送費茂和二首費介字茂和嘗宰宣城誰言令尹拙催科鞭朴當如豈弟何樓下久傳于蒍曲人間方唱紇那歌虎知低首須應殺雉巳成雛不可羅太史若書神爵傳慈祥未愧昔人多前賢零落謾知名後輩何由識老成誰遣斯民俱臥轍因知循吏本無聲眼前公事何時了月下清樽且復傾想得新栽池上柳送君歸棹亦多情汪才任寺簿得劉遺民釣臺于涇水之上將作小亭而未暇有詩次其韻汪伯虎字才任旌德人眼前時事只紛紛林下誰來弔逸民斷石至今留故物赤欄何日照江濵飄流嵗月人空逺料理風烟意轉新擬借一椽埀短釣此生真欲繼前塵秋暑臥病示莊簿莊革字時然為宣城簿老火倏巳盡金行殊未剛弱棗漸可剝七月猶驕陽赤日不可嚮白汗驚流漿誰將窮谷氷為我濡枯腸况兹老病軀息偃真在牀敲秋賴風玉微飈襲衣裳言念北征士萬里方拓疆秋雲靜邊日光耀劍㦸場君今飽韜略論事時抗章諸公頗動色有䇿云甚良何當給鋒車結佩朝明光一鼓收關河再鼓擒戎王兵戈既靜洗不復憂邊防萬夫各解甲四海均清凉雨後微凉再示莊簿蓐收始用事健行肅乾剛微飈生淅瀝一雨洗亢陽香羅厄團扇玉碗辭蔗漿况蒙慷慨詞猶激卑懦腸當食忽亡匕起立遂失床雞鳴中夜興呼燈攬冠裳自從兩河割四海失故疆向來桑麻區半作荆棘場黔首未安堵皂囊思獻章聞有圯上書今代誰張良風雲須嘉㑹日月依末光當寧方側席誰能薦吾王鷙鳥尚埀翅老眼空望羊秋風一夕起撫事增悲凉觀大閲落日鳴笳鼓西風卷斾旌熊羆千騎肅錦繡一川明猛士方投石將軍未請纓不須誇劍舞卻縠是書生復愁二首秋風嫋嫋秋雲愁寒日耿耿還西流昏鴉接翅帶逺水暮雨滿山昏北樓微凉漸欲入枕簟白雲復恐霑梧楸橫戈壯士半茅土雲壑布衣悲素秋江南郡邑半成灰江北諸藩信不來此日兵連殊未解向來邊釁復誰開三關故地何時得二帝征鑾幾日回白髮草萊無逺䇿時埀雙泪只興哀太倉稊米集卷十二
