body:
  text: 太倉稊米集卷三十三宋周紫芝撰詩六十五首病起借季共筒字韻呈相之季共樽前風味笑衰翁病起飛蓬一半空春與落花何處去醉如霜葉不成紅一生渾作邯鄲夢九載香吹嶰谷筒老去新愁尚無數却須分向酒杯中再用筒字韻呈相之季共栁邊輕絮不禁風春事如梭過眼空巳有細枝催暗緑忍看疏雨打殘紅强將瘦馬欹烏帽只合秋江把釣筒賴此同遊兩陶謝詩成渾在笑談中再用筒字韻呈相之季共似僧寮外看春風晏坐尋詩不寫空春事可憐樽酒在旅情猶念舞衣紅去家久似千年鶴時節看沉五綵筒節物苦催雙鬢白故鄉常著夢魂中恭進奉安中興聖統慶成詩二首歡聲何事入康衢邃殿功成聖統初欲卜萬年新厯數重看四海舊車書雲韶奏樂來天外寶冊鳴鑾上帝居合與典謨埀奕世浯溪文在復何如禮行廊廟喜書成重此商周說中興九葉承家傳鳯厯六飛當位紀龍升人將堯禹方勤儉天付蕭曹作股肱擬為中和歌樂職小臣蕪陋亦何能送守寧道住顯忠菴報恩席止三千衆錢氏菴頭六尺床今日道人無舊夢閉門打睡不開堂謝吳司户寄詩卷萬里來西極龍媒定不疑人應如此少老恨識君遲白璧元無價青雲未易知小低湖海氣安穩過天池故國雲山夢長安白首郎病眠三日雨門靜九衢坊别後誰傾蓋書來喜失床愛渠詩似玉應用錦為囊春晚偶題春與桃花作伴歸不須更著雨頻催簾埀盡日無人處栁送晴天落絮來愁裏酒杯誰共把眼前書葉懶重開那知造物憐幽獨忽遣啼鶯喚夢回食生荔子五首五嶺人誇荔子珍老翁何事始嘗新憑君試擘輕紅看不帶開元一騎塵著枝猶有露華腴誰把紅紗罩玉膚龍眼也隨君並熟一生空作荔枝奴小隊將軍過五溪相看猶作夢中疑回頭欲問罨摩勒乞得微甘是幾時瘴嶺蠻村萬里賒可憐生不近京華荔枝猶想南中樹末利先看近世花東來坐見玉肌豐識靣中郎舊譜中絶勝詩翁紅萬顆暮年流落到瀘戎季共見和詩次韻為謝當日梨園夀太真荔枝香曲賜名新麻姑蕚緑雙回袖舞徹遙知不動塵禁中分賜盡甘腴旋琢壺氷積雪膚聞道風流黃閣老長鬚遺送玉川奴人把江瑶比荔枝枇杷楟㮈更何疑桄榔葉外和烟樹想得青紅半熟時樽前風味要人誇瘴雨蠻烟度歲華乞得水晶三百顆皺紅時看眼生花霧縠囊懸小樹紅芳香應入笑談中世間絶韻須真賞人物當先數阿戎季共聞余賦五詩猶未之見以三詩見索因次其韻閩嶺今年荔子遲生枝入眼可無詩誦君勝句須銜璧老將何由更出竒夢對清樽看玉山荔枝空嚼水中寒心知不與公同味始信人生一笑難楊梅盧橘自成雙敢與氷紈作雁行莫怪老翁頻著句書生說食是膏肓米元暉待制歲以賜氷及荔子分遺季共而今年荔枝不至有詩次韻詩老盟成恐未寒今年荔子不同餐空排白玉千峯雪却憶紅砂九轉丹銷得鑾坡荔子香玉郎言語似君房金盤何日分新果五線先看補舜裳醉墨猶多御府珍訪求公後出華勛知君家有荔枝帖不减當年王右軍謝陳仲襄主簿惠詩卷霜雪頻欺老芝蘭日鬬芳官猶似仇覽句擬學韋郎郊島無前輩曹劉可雁行他年尚相見此地必升堂李太白畫像二首欲與天仙論等差短長何止但詞華誰人解屈將軍手為脫烏皮六縫鞾少陵詩瘦平生苦太白才髙一醉間投得江心波底月却歸天上玉歸仙季共置酒酒間出龍眠數馬以示坐客最後出起雲妙甚為賦長句君侯酌客黃金杯六龍下食慈明催醉開畫苑出天馬逺自大宛西極來起雲礧碨最後出真龍八尺髙崔嵬青天欲雨雨未作怒雲潑墨烏成堆長鳴自怪兩耳立路轉欲從雙鐙回王良造父眼未識驊騮驌驦天與才朝從燕代暮南粵萬里一息何遼哉公今此畫何處得外家中郎李公客人間英物有護持世上丹青少顔色雙花蜀錦青絲囊還公此畫公須藏天寒夜半黑風起邂逅恐逐飛雲翔季共蔡天啓得此馬於伯時韓幹畫郭家師子花此畫本江南故物自腕而下絹素爛脫李伯時得之馬忠肅家補足之蔡天啓貌本以傳其甥王季共神駒墮地無渥窪象龍不復來流沙開元畫手老韓幹為作郭家師子花當年故物不堪看踣鐡四蹄俱脫腕英姿逸態猶精神仿佛風鬃血流汗龍眠畫足不畫蛇意象異世同一家由來四大各假合得此三昧無等差中郎名髙自年少畫工如山不同調人間意氣驚薾雲筆下風流爾得妙王家人物小安豐作詩論畫公所同一洗萬古凡馬空九原誰喚杜陵翁季共以師子花見借作詩歸之而報甚寵且言隆近為余作數馬竒甚乃作此詩以見願借之意畫史俗士非畫者支郎好馬能畫馬為君肯作數驊騮班郎應歌天馬下前人妙筆俱絶倫後人骨冷喚不聞試借雲衢千里足洗我眼中凡馬羣隆畫僧季共以隆師四馬見示後三日作長句以歸之少陵說馬誰擅場老韓曺霸江都王只今傳法誰得妙支郎為爇龍眠香沙平草細春日長何人識此真乘黃歸君蓬齊君卷藏似君千里方騰驤次韻相之木犀六首拂色青衫不是粧蘂珠宫裡淡鵝黃紫羅裳亦元無用薝蔔花應自有香髙樹層隂作翠雲月華霜暈醒餘薰人間韻少花俱俗天上香來世未聞西湖南北兩邊山牢落孤芳不奈閒好遣長鬚挽黃粟付他桃葉伴雲鬟故國幽姿想自妍只今誰與著詩憐竹籬茅舍花開處望斷江西眼欲穿留香欲住正須隂逺引山林却要侵絶韻有誰能畫得郎潛詩妙最知心玉折蘭摧事巳休倡條無數緑隂稠此花獨與蒼巖桂風雨平分萬壑秋次韻吕晞朴九日見示敢乞蘭金作詔泥年今巳是古來稀一天細雨家何在十載黃花客未歸萬事可憐俱老境故人猶欲借餘暉但當洗眼秋風裡飽看雲鵬作意飛次韻陳簿席上見和黃鵠摩霄未易知倦飛寒雀本來卑頗慚陶令歸田早政坐穰侯見事遲偶有酒供鸜鵒舞苦無人唱鷓鴣詞秋來湖上山方好食蛤重為汗漫期河伯小史白事歌馮夷宫中地無土五更排衙朝擊鼓大官擁斾呵馬歸小史白事當前語自言賦命頗竒窮一生自足風波苦船須把纜始敢放霧可藏身亦時吐防危慮患豈不至往往不知遭網罟河神笑謂小史言禍福不計愚與姦恢恢天網自不失瑣瑣爾曺何足論小史速退卷舌走顧視儔列圗前奔峽守秦德修楚塞樓成索詩為作長句異時魯直遷涪江過之命此名且書牘今亡矣使君才氣號無雙千騎新來綰漢章此日樓臺新楚塞當年翰墨記黃香民安樂歲州何事江入清樽客滿床十二巫山應在眼定無遺事說襄王淮上聲名徹冕旒幾年邊鼓卧清秋五花未從甘泉駕百尺聊新楚塞樓暮雨巳隨烟珮去長江空抱峽山流客來欲吐忩閒句莫把城南比閬州題蘇養直像三首先生初出後湖時日落山寒醉不知更上蹇驢何處去灞橋風雪要渠詩名滿人間未足多胸中萬頃著烟波松江風月無人見誰與𤣥真畫釣蓑水上柴扉閉不開蒼山羔雁九天來玉京巳有神仙籍莫怪青山喚不回十月九日霽色可喜屋角梅花欲弄晴耐寒庭草尚晶瑩護霜雲重知何事留得芭蕉作雨聲朱門深閉得香多曉日烘簾氣自和此地有忩無一席固應宜著病維摩江上南枝暖欲妍小春時節又經年誰知一㸃還鄉夢直到梅花樹子邊次韻季共蓬齊新梅王郎巧催花妙語起槁枯譬如返魂香能使死者蘇詩成花亦開小草時卷舒頗如風前栁勝韻花中無蓬齊姑射仙不待折簡呼芳姿倚醉玉未用須人扶自君作周旋此德良不孤移根始山中一笑煩王都坐令桃李花淺俗皆凡夫棐几滑以净雲忩窈而虛釅白奪寒雪軟紅空九衢我久離山中問花今何如殷勤培弱幹何日課獠奴於花茍得計於我亦何愚此意倘復遂瘦地良可鋤誦君種花句撫卷長嗟吁聞朱虛真請老二首平生恨未識朱游每得清詩慰客愁泛宅清苕真得句掛冠神武更何求久厭朱袍裹玉仙幅巾藜杖老山間從今魚鳥緣應熟只恐鴛鴦債未還朱作長短句有道人還了鴛鴦債未還之句次韻范元卿題友山堂人間南北無同異四海蒼生俱一世借令賣友取封侯一擲成盧亦兒戲東平風度人所難不將白眼看青山少年結客知無益老喚南山相與閒人情自是有新故相好乃能保朝暮故人落井巳下石紅袖彈筝未移柱玉巒排秀天清明亂峯入眼心先傾向來刎頸或蹀血此地一笑終忘形平生愛山心願見喜色津津應滿靣寧愁偃蹇不受招一鶚孤飛誰可見無住菴主為余寫真報之以詩驊騮田絶足韓幹真畫者儻欲萬口傳當畫千里馬吾才如跛鱉子不解騰跨初無籋雲姿何勞人摹寫支郎妙人物名聲遍日下事茍不當急操筆有用捨一逢菘韭翁終安陋朴野無鹽元自醜强欲相紛赭至技不可名厚意徒久假我欲報之詩有作非大雅孤山之顛舊有開氏四照閣次年部使者獻西湖圖神廟閲圖久之問開氏四照閣安在部使者失對其知名如此昨跋馬過下山見赭衣荷鍤數百人問之則軍中藏氷於此也出頭傑閣想峥嶸當日佳名逹裕陵豈料生存華屋處將軍於此窖寒氷次韻相之見進口占雪中新句且許約季共携山谷書伯時畫過敝廬寒欺玉樹雪橫斜遙想諸郎擬玉華玉華鹽名出金樓子更借蟾蜍千里月細看薝蔔一林花公名巳在曺劉上我輩裁堪屈宋衙聞道髙軒開二妙竹坡猶有雪煎茶次韻季共和相之前作二首誰從玉闕蓬萊殿吹下仙人蕚緑華風急有時翻栁絮月寒無數著梅花時開病眼看三徑勝著青衫趂兩衙欲煮南屏山下雪問誰能㸃老謙茶雪意鬖鬖整復斜似人霜鬢不勝華只今瘦骨欹風帽空憶寒江釣浪花妙舞正看回激楚兩峯旋欲戰彭衙不將鹽絮輕相比似我南忩玉色茶寄題張常州烏墩新作濯纓亭二首使君如氷壺不受古俗塵何為解豸冠濯髮天地津開門納滄波自與雲水親知誰分清流照此千載人二濯纓須滄浪彈冠必新沐昏昏不可受皓皓亦易辱借令困一塵未易涴氷玉勿從漁父談恐自成窘束送孫求仁官黃岡黃岡古淮邦其大不如斗誰知隔岸山萬馬日奔赴有數著詩人此地實林藪頃來當盛年王公號賢守三年江上杯快飲竹樓酒東坡營雪堂始種坡前栁至今有遺跡過者為回首後來老門生張文潛嘗謫居於此詞翰玉堂手謫官茅三間門巷無雞狗孫郎飽文藝貧病亦巳久著履知有土捉襟乃見肘抱經官殘州一飽亦難偶論文有餘日為我訪白叟遺事倘可書尚足寄衰朽慎勿止寒溫作書問安否謝吳司户寄舂陵四首何年山嶄嵓化作龍起伏安得挽天河著龍吐飛瀑二往穴城南忩分山得遙碧誰持列玉峯來照蝸牛席三吳山非不佳故山終眼明南來一拳石似我小峥嶸四孤峯真崛竒凝目見太古便悲江上山培塿不足數太倉稊米集卷三十三
