body:
  text: 太倉稊米集卷四十三宋周紫芝撰頌一首大宋中興頌并序竊惟毛詩一經三百六篇其間詠盛德而贊成功者殆居其半聖經所載寧有愧辭將上以昭格於神靈下以埀芳於奕世俾誦其言者信其事為萬世之龜鑑豈曰小補之哉粵維炎宋國步中艱篤生聖神克紹逺烈尊用元臣以扶昌運寢兵以來海內清平文章華煥考之詩書皆所未有夫舜有大功不過二十而止神禹丕績唯聞九敘之歌今皇帝殄攘浮議剪剔姦雄和附乖離敉寧區夏至於迎母后於遐方禮天神於圎陛拜原廟之衣冠納春朝之圖籍以至靈臺歌辟雍之樂載芟草藉田之頌凡一禮一樂有所未備必搜訂遺文以補罅漏自其纎悉馴致大功方之舜禹未或逺過顧惟寒生均與斯民蒙被聖澤敢作頌詩以申歌詠雖記問空疏文辭淺纇不能逺追王褒樂職之詩近配宗元淮西之雅猶足曳履行歌為太平之幸民亦庶幾採詩之官尚或有取頌曰緬維聖宋昔在中葉四方多虞萬里喋血大臣持謀興師肆伐將臣持兵日獻戎捷皇帝曰吁黷武無烈糜我赤子膏我斧鉞孰與休師一戟不折因壘而降舞干而悅閉我玉關歸師解甲犂我春田銷兵鑄鐡使命交通相望不絶愛惜兩朝前師聖説昭陵之仁嘉祐之業念昔興師堂陛卼臲發言盈庭更訿元薎佩劍彼此孰豫孰決廟謀一定群議沮折袖手何言瞪目卷舌草木蒼蒼始有芽蘖盡育恢胎咸歸坱圠灞上棘門環衛拱列罔敢擅師始制君節萬夫屬鞬拜舞君闕乃命叔孫諏日綿蕝搜講闕遺悉究悉設皇帝孝思上與天合冀獲一真如響必答翠輿南旋紅鸞秉翣長樂鐘聞皇情允愜我歌思齊輿情激越皇帝之祀咸秩罔缺合祭於郊爰胾繭栗蒼璧前陳大裘始挈我歌思文以告豐潔大慶御朝王春正月禹會塗山萬玉交戛漢朝諸侯圖籍是閲兵戈澒洞士氣銷讋俎豆不陳軍旅是急大起雍泮儒士鼓篋韋帶縞衣駢冠纍屧論秀蒸髦尾尾岌岌農流於兵病不生活茫茫千塍蒿藜是沒皇帝慨然親耕隴畷耕根之車飛簷䡾䡾宣和之軌明道之轍聖心懇到三推未輟父老曰嘻歸告我邑俾爾粳稌屯雲積雪凡此大功具載史牒用告神明以報夔契帝坐法宫禮備樂闋獸舞鳯鳴八音不奪皇威所覃雷動風發南面垂衣大壯帝室曰臯曰雉鼛鼓弗及蒼龍之闕上摩星日萬目顧瞻蔥蔥鬱鬱澎澎海潮吳會來集天子萬年風翔喜溢孰磨蒼崖孰秉史筆天子曰都是任良弼聖有至言維德之一是用作歌以告萬國贊二十二首李伯時畫東坡乘槎圖贊博望侯乘槎而遊吾夫子乘桴而浮仲尼固厄窮於四海而張騫又功名之流也韙哉東坡髙目九州視死生猶大夢均溟渤於一漚故能以巨海為家以枯木為舟風濤如山而神色甚休蓋入火不熱入水不濡其古至人之儔歟移學圖贊有移學社於三家村者童子蓋六七人或負几而捧研或攜杖而掃門執弟子禮甚力而勤彼先生者坐不安席愠見於色方且踟蹰四顧以視其後焉恐遺吾兔園之册也東坡先生過海畫像贊儋耳炎荒海嶠孤絶蠻蛋往來蛙蛇咀嚙瘴霧薰毒肌理皸裂誰堪一朝歲星七閲萬里南歸黧面如鐡蓬首斷髭叢霜點雪髙文偉度冠世之傑雖駕傾河疇能贊説天不憗遺梁木其折罔惠斯民俾究施設矧後學者於誰卒業小生何知學止頰舌下拜公堂亦復嗚咽採菊圖贊人生百年倐焉如寄彼滔滔者與波同逝偉哉斯人髙目睥睨棲遲衡門偃蹇一世天實生之以律貪鄙棄官如泥視資如穢佳菊盈園聊寓吾意擷我斕斑得此蒼翠誰畀二物以侑一醉於人雖拙於吾得計孰能名之是真樂地郭汾陽畫像贊天寶之盜發乎幽陵赫赫嗣王矯矯龍興大閲六軍以殄鯢鯨陳陶之役首靡天旌喪師四萬天子震驚帝所深倚朔方之兵始公提師北下井陘狐驚豕躍遂衄思明踵不及旋關陜以平轉戰逐北坐收兩京掃除妖氛日月精瑩斯民舞歌溢於歡聲孰謂今日見漢儀型帝曰尚父臣而不名王室之造實始自卿僕固醜虜縱掠汾并涇陽之圍百蠻馮凌持滿待公軔發弩擎短衣匹馬公來煢煢倒戈解甲示以至誠問天可汗謂與俱生回紇顧謂懷恩不情曰果吾父羅拜而迎承嗣傲很握兵不庭屈此兩膝伊誰之令朝恩僉人毁短縱橫竟謂長者讒言不興繄此偉績匪學而能精忠厚德感於神靈一時之賢萬世之英誰謂匪公而有此形視柏直輩乳口咿嚶顧兹竒龎孰任弗勝蒼蒼群黎天未欲寧篤生我公以奠疲氓拜公遺像潸焉涕零三閭大夫畫像贊儼靈均降攝提笑突梯恥喔咿紉蘭佩製荷衣帶長鋏光陸離冠切雲髙崔嵬駕青虬驂白螭令海若舞馮夷視若人豈淈泥尹釋䇿寧復知不吟翁贊昔者先生抱負伊鬱拂然不平一寓於詩以寫其情有如草木風擊而鳴雨寂風恬倏然無聲乃知先生遊戲於三昧熟醉而不求名彼香山之號醉吟又何足以為先生之稱乎北窗自贊二行行言言白眼視之面目可憎期期艾艾俚耳聽之語言無味怒罵笑譏非世所違誰其尸之自我為之又將寵以軒裳自顧無封侯之骨將置之邱壑庶幾有青雲之志兩者豫亦不可得而知蓋將聽造物者浸假而化豫之臂也莊周畫像贊生也異鵲感其顙死也烏鳶食其形此所以齊萬物而一死生者彼孤風爽韻超然乎萬物之表者既巳化為髑髏之王而髙談雄辨齊驅乎六藝之林者獨存乎糟粕之經奈何世俗之士竊虛談以藉口飾冶容而效顰曽不知若人者蓋有人之形而無人之情者也司馬溫公畫像贊瘠然其似枯何先生之癯而四海之腴也愀然其似愁何先生之憂而四海之休也至於疾惡如讎惡佞似賊則其風凛然蓋古之遺直也詩不云乎人之云亡邦國殄瘁拜此典刑潸焉出涕吕真人畫像贊不作熊經鳥申不種交梨火棗一超直入如來便是方壺圓嶠何當乞與刀圭分我長生不老王季共畫像贊秀而傑是謂其人而孰培其根婉而深是謂其文而孰養其源彼其浩浩乎胸中者蓋可想而不可言雖然外曲者與人為徒是真法門若人者固當三折肱於斯矣豈無他人而唯子之告焉止老畫杯渡贊止公道人以墨為戲作杯渡之一葉絶鯨波之萬里蓋以鉢為船以笠為帆攬冠纓為捍索植柱杖為桅竿勢若飛動而起滅於雲濤之顛陋哉俗子異此偉觀獨不知此四大海者乃吾坳堂之上覆杯之間而巳也後湖居士畫像贊秦漢以來結廬毁轍一二數之不可勝説摛章繪句孰若先生之文抱道懷德孰若先生之節彼若人者隱南山之霧而採西山之蕨比之前人為兩超絶常禪師真贊有感而應去亦隨緣有觸而鳴自然成文風神秀骨畫史可傳所不可傳竹坡難言靜寄老翁自贊是老翁者方其少也玉三獻而不售及其老也雲一出而未還枯木之株飛蓬之顛韋韋脂脂不亦可憐何淵明之不去坐季子之無田李伯時畫像贊偉度超絶髙文古雅極博物之辨則張茂先之學作無聲之詩則王摩詰之畫不敢擬公老韓曺霸此其在公猶為土苴晚瞻遺像我心則寫恨不識公拜於庵下東林紹老真贊虎溪道場化為劫灰後五百歲金碧增輝不下胡床辦此大事埀慈道力是特遊戲稽首導師普為人天蓋亦如是而了大緣竹坡自贊叔夜之懶次山之漫持此涉世毁譽相半馬耳東風何勞喜惋笑領尊拳不揩唾面是謂竹坡掣猱老漢葛道人真贊王屋山中美酒漢家殿裡蒸糊驚起一場大夢變成滿面霜鬚方朔恢諧談笑莊周廣顙頭顱便好列仙圖上添君此個形模和靖先生尹公真贊先生誦聖人之言行聖人之道退不以矯進不以蹂用能隨隱顯以何心歷嶮夷而一操彼佞人之譾譾者又奚足以窺先生之所造也太倉稊米集卷四十三
