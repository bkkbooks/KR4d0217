body:
  text: 太倉稊米集卷五十一宋周紫芝撰序十首毛詩解義序孔子之言六萟多矣而尤詳于詩當時問答之辭見于論語一書者可考而知也故興于詩立于禮成于樂既以是告其門人不學詩無以言又以是告其子其言之之詳至于再至于三而不已者豈非詩為經而令誦其詞哉可以興可以群可以觀可以怨邇之事父遠之事君又多識于鳥獸草木之名故學者必於是始焉然而登孔子之門者其徒三千以言詩見取于聖人者商賜二人商列于文學之科賜之逹可以從政孔子姑許之以可以言詩爾其它蓋未有所聞焉則詩之說又何難明如此必謂學必始于詩則自幼學之時固巳習之矣奈何後之學者雖專門之學終身玩其辭而白首不能窺其奧何哉孔子曰人莫不飲食也鮮能知味也詩之作雖出于國史賤𨽻與夫閨門婦女之口類皆託于鳥獸草木以吟咏其性情觀其詞致高遠所以感人心而格天意者委曲而盡情優遊而不迫于時先王之澤猶在禮義之風未泯是以言皆合于聖人之旨非是則刪而去之矣此後之學者所以明其說之為難也嗚呼說詩者可謂難矣自孔子而下深于詩者蓋可以一二數也孔子聖人也明乎詩之道也子夏子貢則學于孔子而明乎詩之義者也孟子之與孔子同道明乎詩之志者也漢魯申公楚元王交以詩為倡而知詩之學者也何以知其然哉孔子曰詩三百一言以蔽之曰思無邪則誠之至也非誠之至則亦烏能正得失動天地感鬼神如影響之捷故曰唯孔子能知詩之道也巧笑倩兮美目盼兮素以為絢兮而子夏言禮後于質如切如瑳如琢如磨而子貢言有其質者不可以無學二者非深于詩之義何以知禮與質相為先後質與學相為終始故曰唯子夏子貢知詩之義也孟子曰說詩者不以文害詞不以詞害志以意逆志是為得之觀周餘黎民靡有孑遺之詩則知詩人之意在憫旱魃之虐而已果黎民之無遺也哉非略其詞以求其志則未有不以詞害志故曰唯孟子能知詩之志也是數者其所知固自有淺深要皆有得于詩焉亡秦之餘六籍煨燼學者不見全經久矣漢興惟魯申公楚元王交始為之訓其後鄭氏為之箋孔氏為之疏而詩之學寖興焉然而是數子者不過離章析句辨其名物以名家而已故曰若魯申公楚元王交則知詩之學者也漢自武帝崇尚儒術始變高祖馬上之風宰臣當用儒生元成以來長于詩者首推匡衡蕭望之之徒則以詩飾其儒雅者也其去孔子之學益遠矣荀卿號為知信六經尊孔氏者觀其著書輒時取詩人之詞以證其說卒致失其本旨者甚多比古人之學最為疏繆李斯學荀卿用以相秦至一世而遂亡其國蓋以經術而斷國論要在觀經之審學之不善其禍一至于此可不慎哉諸君子有意于學詩願以孔子孟子子夏子貢為之師以求詩人之大體而更以荀卿為戒焉則庶乎其有得也古今諸家樂府序世之言樂府者知其起于漢魏盛于晉宋成于唐而不知其源實肇于虞舜之時舜命䕫典樂教胄子而曰詩言志歌永言聲依永律和聲及益稷篇叙舜與臯陶賡歌之詞而曰股肱喜哉元首起哉百工熙哉元首明哉股肱良哉庶事康哉則歌詩之作自是而興至孔子删詩定書取三百六篇當時燕饗祭祀下管登歌一皆用之樂府蓋起于此而議者以謂自漢髙祖作大風歌使沛中小兒和而歌之乃有樂府是不然雉朝飛者齊宣王時牧犢子之所作也薤露歌者田橫死而門人作此歌以葬橫也秋胡行者秋胡子之妻死後人哀而作焉秋胡子魯人也杞梁妻者杞植妻妹朝日之所作也杞植戰死而其妻哭之哀植亦齊人也凡此之類不一皆見于春秋戰國之時則其來逺矣魏晉宋歷唐而其作益多後人之作其不與古樂府題意相協者十八九此蓋不可得而考者余不復論獨恨其歷世既久事失本真至其弊也則變為淫言流為䙝語大抵以艷麗之詞更相祖述至使父子兄弟不可同席而聞無復有補于世教陳后主時東海徐陵序玉臺新咏十卷謂之艷歌詞肆帷幄之言瀆君臣之分此謂害教之大者至于古人規針訓誨之意傷今思古之作與夫感創時物紀述莭義使後人歌咏其言而有悲愁感慨之意則為之掃地矣然而歌詞之麗如梁簡文陳叔寶輩皆以風流婉媚之言而文以閨房脂澤之氣婉而深情而有味亦大有可人意者至唐而諸君子出乃益可喜余嘗評諸家之作以謂李太白最髙而微短于韻王建善諷而未能脫俗孟東野近古而思淺李長吉語竒而入怪唯張文昌兼諸家之善妙絶古今近出張右史酷嗜其作亦頗逼真余嘗見其輸麥行自題其尾云此篇效張文昌而語差繁則知其效藉之意蓋甚篤而樂府亦自是為之反魂矣因集古今之作如古樂府所載及諸公文集中有之及文選玉臺唐文粹類悉編次成書為三十卷謂之古今諸家樂府至于事之本源時之廢興有不同者吳兢言之詳矣此不復考焉送王次卿之浙西序吾友王次卿少年以文鳴喜作詩飲酒頗不事生産歲三十而未有婦常以琴自娛曲終而僕戲之曰此豈雉朝飛乎次卿笑而止一日過而告余曰子將遊梁吾亦自是之武林余問其故次卿復笑曰吾將逆婦于杭聊以解吾子嘲子盍贈吾以言乎余因告之曰古者娶婦之家三日不舉火思嗣親也婚之為禮其亦重矣哉不孝有三無後為大舜所以不告而娶亦為無後也今子三十而嗣未立先大夫之墓拱木矣而家無冡婦以供四時之祭宜子有是行也吾聞子之外氏家錢唐子之妻因外氏之黨而為之子之季父不能挽子而留之子又無兄弟姊妹以同居處萬有一使子之婦家欲贅子而留之子之外氏思先夫人而不忍其去則子勢不得歸今年生一兒明年植一産其不寖而為吳人幾希矣盍反而歸之見異鄉之草木則必懷桑梓之念聞吳兒之野哭則必思歸掃于丘墓今龜筮協從鳯皇和鳴歸就故里作家廟器服採蘋蘩之菜釀稷黍之薌以舉春秋之祀事豈不樂哉次卿曰唯敬聞命矣于其行也乃書以贈之溪堂文集序昔人以文章為小技謂天之付與于君子小人無定分唯能者得之唐之文士班班詞藻精至妙絶一世者非無其人而責以君子之行或鮮焉雖高才如桞子厚劉夢得元微之之流皆附非其人進不以正則䝉躁進浮薄之譏其它固所不論也求文章操行兼修並立如韓退之白樂天輩且未易得况立莭明義于刀鋸鼎鑊之下不吝一死以負其平生顧不難哉吾友王次卿好學喜文尤長于詩其為詩如江平風霽微波不回而洶湧之勢澎湃之聲固已隱然在其中其為人似其為詩平居言笑樂易與人和柔未嘗一失顔色而其涇渭白黑自有胸次不肯略借毫髮于人建炎三年敵騎大入建康失守諸將自潰抄略郡邑次卿與余皆擕家夜竄山谷不逾日敵至涇次卿倉皇與余相失全家為賊所得㑹郡有檄招撫賊就食疑不敢决且欲微刺其意命次卿草書口授其意頗不自下次卿高目奮髯謂敵言吾知有死爾不忍為爾作箋也遂被害而死嗚呼次卿其可謂仁者之勇矣孔子曰無求生以害仁有殺身以成仁次卿有焉又曰君子之居是邦也事其大夫之賢者友其士之仁者而僕有焉次卿與余同里與之為兒童交今四十年其嗜好趣尚無一不同獨文采標置皆所未逮嘗竊自怩今其死也又能以莭自名僕雖生厭厭如九泉下人矣雖然次卿之死人將曰周子有友如此則僕亦有榮耀焉夫復何恨紹興七年秋九月學佛者宗毅出其遺編以示僕得詩若干文若干總三百七十有九首俾余藏之以俟知者傳焉毅少學詩于次卿蓋可與言此者乃泣涕而為之文因以授之云送詹伯伊之大梁序政和六年春卿大夫舉進士于禮部得四人焉吾友詹友端伯伊蓋居其首伯伊才高而氣豪勇于義健于文以此名聞其家世有人物伯伊之祖姑讀書能文議論如烈丈夫歸為青社李侯大夫之妻當時樞密蔡公之夫人王聞其知書數與之語二夫人論說古今亹亹不倦樞密公從旁竊聽出謂客曰方酒酣談兵論兩漢取天下客皆異之某之外祖母詹氏嘗以是語先妣先妣以是告某且言伯伊之祖亦以豪傑聞惜其爵位不顯名不稱其實施不盡其才而終焉乃知詹氏之家為不乏人雖其女子猶爾况佳子弟乎今伯伊早以文鳴將自是以取富貴而大其門户如探物而取諸懷宜無難者則亦安知造物之與人不吝于其始而侈于其後乎又况水之渟滀既深則流必長木之盤據既大則枝必茂詹氏之書種藝之久矣其亦有秋當在今日則又宜無難者伯伊早喪先大夫時方童稚太夫人育而教之今用有成繄太夫人是賴孀居三十年歷險阻艱難之日蓋益多矣造物者豈得不以此而報之耶吾將拭目以望子于雲霄願子努力善自愛也十一月二十有八日序姑溪三昧序簡牘者文章翰墨之餘世人往往以為不切于事未嘗經意此亦士大夫一病彼殆不知詞采風流形于筆札便是文章一家事爾等豈或有意哉往時蘇內相嘗謂姑溪老人得簡牘三昧余為兒曹時聞此語心欣然慕之願得一見不啻如昔人之望李泰和也政和四年秋七月始見公於姑孰謁入頃之乃出坐未即席顧謂僕曰子慕元德秀之為人耶魯山文章事業見于後世而盛德髙行乃與顔閔爭輝已而誦余所贄之文一見以為可教而與之進焉為留十日而後辭以歸每見其作帖詞翰如流伸紙几上與客笑語而記已成誦之輒成文雖日作百箋無一語相犯公握筆極低樹管微欹側運指甚速蔌蔌有聲如蠶食葉須臾滿紙此豈人力所能到真得三昧手也自是無十日不通書公亦不倦酬報後三年而公亡裒篋中所藏得兩牛腰又數年金人渡江避地山中為亂兵所焚今所餘無幾矣先是餘姚丞馮闕謄本往後以求之不報方且以為恨而湖隂韋居滸偶以巨編見借闕一日帖雖不復見其所與而所得亦已富矣因手抄成書以藏之余以謂昔人以書相見稱于時者固亦有之陳孟公雖號一時敏妙而其詞致精純風味可喜未必能仿佛于此至于韋郇公之五采成雲雖見慕當時似亦無足稱者然則由姑溪以來唯公一人而已矣宜其尺紙片言為世人所珍而不棄也建炎二年冬十月十有六日序詩八珍序余年十二三歲時已不喜為兒曹嬉戲事聞先子與客論書常從傍竊聽往往終日不去是時張文潜為宣守時時得所為詩誦之輒喜自是見俗子詩必唾而去之不顧也逮今三十四年不能僅窺作者門户而心益嗜他人之作略不少衰紹興元年春避地山間不能盡挈群書以行擕古今諸人詩唯桞子厚劉夢得杜牧之黃魯直杜子美張文潜陳無已陳去非皆適有之非擇而取也使小兒輩抄為小集日誦于山中行住坐卧必以相隨嘗號為詩八珍山中岑寂以飯糗茹草為生食無鹽酪飲無酒漿妻孥怒罵曰子不能飽吾而終日誦詩乎余笑曰吾有詩八珍子能與我共享者為子分甘率嘗以為笑而罷夫八珍者天下之美味也有舌者皆知其為美而未必真知之子思曰人莫不飲食也鮮能知味也啜醯嘬䏑之流據函牛之鼎而食雖過屠門而大嚼未嘗不自以快意至于飫飲觴豆以咀味水陸之珍則枵然足以饜其腹蓋彼為珍而此為珍也若僕于八公者固嘗知其為工而莫能名其所以為工雖謂之未嘗知味可也杜少陵云御厨絡驛送八珍夫八珍如天酪􅋳此豈人間之味哉唯王公貴人炮鳯脯麟割禁臠而啖之者乃能知之爾雖然古者山林之士以韋布為冠冕以圭蓽為華榱以道德為耕獵以詩書為鼓吹至有終身而樂者今僕于世俗之所享而甘焉者未嘗得以染指其間獨以他人之言語文字為天下之美味而樂之吁亦異矣哉劉氏家訓序余友劉君子先同郡涇邑人始其家甚貧乃挾䇿躬耕力治生業以儉約自持久之寖有餘資稍自給涇當兵盜之餘民多流冗皆散而之它南畝荆棘動連阡陌有力者往往請于有司占以為籍獨子先所治不過常産余嘗怪而問之曰邑有餘土子有餘力何不擇其膏腴者稍增墾之先笑曰是非君所知吾祖嘗有遺訓不敢忘也因為余誦其五世祖贊善之言大略以二事埀戒後世其一不得以世祿補子弟官使稚弱不通古今之務者出為民害以絶吾嗣其一不得務廣田園使嗜利而好奢者因以廢學以絶吾教其言今尚存自吾上世無敢不奉其訓者顧不肖其忍違之嗚呼亦可謂仁人之言矣劉氏世為涇人自贊善公始登進士第其子侍郎相繼登科侍郎生二子仲氏仕不甚顯伯氏仕御史皆登進士第御史事神宗皇帝為諫官熙寧間常以十事言大丞相王文公詞甚切直聞其名者為凛然御史公生二子皆賢而有文為布衣時與樞相蔣公游同年登第而仲氏之子亦以文詞取乙科為池州青陽縣尉自贊善以迄縣尉君凡五世卒無一人以䕃補官者雖仕宦逹與不逹固似不同要之世有名士咸以射䇿决科自列仕籍相繼不絶余嘗怪其初以一言埀訓乎後而子孫守之至五六世而不忘天所以報之者亦與其言適相符契至于佩服其言而力行之則其為報殆未昜量也昔韓休穆寧皆撰家訓以遺子孫開元間言家法者尚韓穆二家其後子孫皆有賢行能世其族然而薄于愛子而厚于憂民篤于尚義而鄙于近利其觀摹宏遠如贊善公者未之有也子先將以其言刻之墓左使僕記其本末以示將來雖言詞之陋不足以頌公之美庶幾託盛事以為不朽之傳焉紹興五年六月中休日序大間録序昔人嘗有言臣願為良臣不願為忠臣忠臣人之所願為也而有所不欲乃知事君者不幸而至于殺身豈其本心哉以其迫于義勢有不得已也古者為臣之道有二義與死而已矣二者相為重輕猶權衡之低昻不可欺也重于義則死必輕重于死則義必輕然而世之人捨生而取義者常少偷生而棄義者常多是殆未明乎死生輕重之說者也義而死雖死猶生其實未嘗死也不義而生雖生猶死其實未嘗生也古之人享豐祿居尊位平居髙目視天下若不足為者自以為至極矣及其臨難遇敵則油然引避以全其軀視其面目恬無愧色是何異富室之豢犢豕雖飫然以飽腯然以肥而泯泯然無所聞以老顧何益于人之國乎吾知其雖生猶死也至于蹈鼎鑊甘白刃慷慨發憤以就一死則其忠義之莭動于天地感于鬼神能使忠臣義士為之變色亂臣賊子為之沮氣載在簡册以傳後世則其風聲義槩猶炳炳與日月爭光焉吾知其雖死猶生也夫以死生輕重之說如此其明而人不知是以考之前古有能奮不顧身以死節刀鋸之下者殆可以一二數而歲月計也忠義之士曠時而出固已難矣幸而有之則又湮沒無聞不得傳于天下後世者豈勝惜哉祿山之亂李憕死之遂使兩河聞風再固危壁當時朝廷未甚旌顯其子源以父死賊手悲憤不仕至穆宗朝因李德裕之請始克褒崇盧奕為御史中丞罵賊而死當時議者猶論洛陽之亡操兵者任其咎執法之吏去之可也委身寇仇以死誰懟賴慱士獨孤及之論諡議始定嗚呼李憕首死祿山之難可謂勇矣其英偉之節猶待數十年乃始顯白盧奕被服坐臺正色死難而懦夫奸人交口沮抑至朝議紛紜莫有定論由是知士非殺身之難而求知于世者為尤難也韓退之論張巡許遠謂二家子弟才下不能通其父志遂疑遠之後死以謂偷生且以二子之事在于當時猶或異論况于既久乎以其家之子弟尚不明其父之志况求知于它人乎余嘉夫握拳嚼齒死莭蹈義之士世不常有復不忍其捐生殞命以就死地卒之排陷沒溺無所聞于世也因採靖康以來忠臣義士猛將健夫下逮閭里田野匹夫庶女有能死于禍難而可書者輒隨其所聞而録之以偹史官之採焉名之曰大間録送趙德莊序僕紹興十有二年始識開封趙德莊一見如平生是時僕名在銓曹法當以柱後之文考于理官而後祿焉嘗語德莊余貧且老安能悒悒久于此乎子念我者當以是屬子而歸德莊置酒與余别相與語于河橋夜且分矣而語弗能休蓋惘然念後㑹之難期也后有挽余復來者相視而驚曰河橋之别寧謂復見于斯乎是時余館于故人方元相家已而今淮西使者李侯又來李侯磊落喜談笑于是相與益歡酒杯流行諧語雜出德莊擕印窠聽曹事于縣治之西每曉漏下十刻許命小史佩書囊與余相對坐簷廡下雌黃群書酸寒如兩書生間論古今詩文語至竒必相視伸舌阿阿則則不者必反唇一笑未嘗不同已而余得官武林授代當歲在乙丑及余來計德莊之去已兩年矣其别大略如河橋亦惘然念後㑹之難期也明年夏五月余代者桞侯以憂去官又當復來則又相視而驚曰窮冬之别寧謂復見于此乎嗟夫人生之難期其皆如是耶其特一相見而已耶今年余到官得屋在湖尾庭宇寂然盡日無人聲誰當來見我者德莊棹扁舟肩小輿而來訪余問勞良勤嗟夫德莊之視余相好如兄弟也其後德莊罷官錢塘歸省江西則又當與余别江西去三吳邈在千里之外今日之别欲徼幸一見如前時固未可知子方少年而才且又有文位當在臺閣僕益老矣繄親賢之尚逺悵晚日之無多念之令人黯然為之銷魂雖然心親則千里晤對跡異則鄰屋不相往來子猶念我幸時遺我以書亦足以慰我心焉我亦不敢虛辱於子也子其勉之紹興癸亥六月五日序太倉稊米集卷五十一
