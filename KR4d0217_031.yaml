body:
  text: 太倉稊米集卷三十一宋周紫芝撰詩三十九首次韻徐伯逺題錢少愚畫孤山月梅圗錢郎名與大年齊貌得孤山一段竒月色昏昏人寂寂梅花淡淡水漪漪戲將三昧傳神手東坡有趙昌花傳神之語催動千林破臘枝不用摩挲窺妙墨暗香疏影在新詩次韻仲平示曾庭堅侍御曽侯為生亷易足天與一居山繞屋看山有味聊與娛嚼蠟無情本非欲子建波瀾今尚存斷弦那用鸞膠續會當踏月夜相過曵我江心舊桃竹次韻季共古意三首艷女塗修眉貞女重婦德紛紛桃李花豈復無顔色爭妍固可憐落知不足惜我欲採江蘺悵望秋水隔二人生結綢繆捐情誓蒼旻恩愛那得長故交不如新蹭蹬迫歲晚坎壈悲斯人舉世亦何有知心繄夫君三客從逺方來獨立江水湄江水何悠悠白髮空離離病足修長途弱羽思歸飛歌君傷秋曲淚濕遊子衣袁時良霧隱齋袁侯家多文頗似班叔皮厥後有仍雲文采如當時流風今尚存所恨世未知一官事桁楊相處似未宜西齋附寒廳花竹搖風枝惟因有餘日隱几哦新詩願君掃秋茶決獄稱吏師何必大門閭可使髙軒馳會當專北門誥命司文詞斯文可華國當代稱羽儀他時豹一斑寧須管中窺時來固有待道在亦可斯只今坐寒忩相從歎兀誰聊呼管城輩文字相娛嬉王興周以蘇養直詩見借今日偶携至直舍且誦且巳自喜亦自笑也為題三詩因效其體江湖久入平生夢猿鶴空懷老去羞輸與蘇郎門日月小舟長繫白蘋洲身如倦鳥欲歸去盟與白鷗真復寒更把後湖風月句著官仍對吏書看有樹移雲盡欲平牙籖卷盡俗塵清誰知吏案文書裏時有滄江風雨聲次韻子紹秋熱憫雨之作得詩而巳雨足故詩意小異我欲蓐收回老火乞雨天公殊未可忍飢但復念壁立回首誰能看甑墮天將夜雨送秋來可近書檠吾巳惰耕犂澤澤水涓涓歸買一㕓猶不果老翁何日在田間君上青雲應記我次韻庭藻兄弟唱酬之作黃耳書來得近詩楚騷寧復為秋悲會令好句能傳信更有何方可樂飢巖壑樹髙元是桂階庭人秀盡成芝脊令風雅誰能繼神物應須與護持夜聞潮二首江隔西興老翠鬟轉頭即是海門山八盤嶺下移家住安聽潮聲到夢間春雷隱約地中鳴慣聽由來夢不驚莫怪詩翁歸未去故鄉無此海潮聲次韻仲平太博中秋齋中對月二絶秋蟾此夜一盤明影落齋壇分外清想對風光無處説夜深聊復以詩鳴軟紅堆裡十朱輪此地何嘗有一塵月亦憐君最孤絶故來相伴作詩人次韻仲平十七夜太社行禮月色如晝從來方社要齋明玉豆精華酒潔清風裡笙簫雲外至耳邊環珮月中鳴龍輈來下未為輪九奏迎神不動塵想得椒漿初奠後夜歸猶有月隨人九日不出鄰墻木芙蕖盛開九日無行樂何人慰獨居擬翻金瀲灧聊醉木芙蕖秋與愁相似花應意不疏衰顔誰復管薄艷更憐渠九日竹坡晝睡二首紫萸香度酒杯空分付重陽一枕中老至上山無腳力試憑幽夢到南峯前此小兒輩欲上南髙不果期以九日又不果近籬青蘂欲成金料理衰翁伴醉吟醽醁偶從天上得白頭還對竹坡斟十日雨中對花客有誰持酒花猶解過墻西風吹畫幕細雨濕紅妝此地當愁眼回頭隔異鄉幾時欹醉帽一朵薦重陽九月望日月色如晝靜坐無人鵲轉柯冷蟾分影照金波月如白玉盤初挂天似青銅鏡始磨正好中秋無此色不知今夕定如何錦袍太白憑誰問應趁春風上大羅九月二十四日試吏省舍雨中獨坐終日是日誦阮嗣宗秋懷十七首因效其體素秋倏欲杪鶉火亦巳中霏微值零雨黯淡悲西風出庭落葉下古木寒條空何年琢翠巘洞穴窺玲瓏歲久人迹絶亂石擁前峯稚松絶可憐崛強榛菅藂但恐歲欲晏霜雪日夜濃物理有變滅人生苦龍鍾異哉清切地兹焉得從容聊為商聲謳獨和寒忩蟲次韻仲平祠宫書事二首月黑祠宫夜天寒誰與偕遂聞宣室召先遣太常齋勝事詩能説牢愁酒可排明朝看方朔割肉更詼諧二秋晚催年急愁多與病偕客塵遊淨几落木下寒齋吏部詩如許衰翁老易排無心羞闒茸有句似俳諧次韻仲平種金橘黃落江南盡蒲栁金橘可曾眼中有頻年慣見小阿奴萬里來從洞庭口吳中夏果爭團欒楊梅五月紅欲然后皇佳樹最晚出蒼柯密葉垂青圓萬物因人作輕重玉食供王當有用瑣才誰緑荔枝奴龍眼號荔枝奴語在本草結綬彈冠必王貢驛使飛來無此實吾皇盛德如帝乙正林桃李知幾何草木簿中無品秩山中移栽初種時妙手封植公所施他時餉我三百顆更乞書尾蘇州詞次韻子紹九日杜門晚吹悲落葉微雲淡秋陽幽花趂佳節緑酒生寒光秋物誰可人木奴半青黃想當持兩螯與客薦一觴未須落烏紗著屐登上方池邊木芙蓉亦足醉流芳醉輒遣坐客醒復翻書囊心逺門常開足適屨可忘念我安得此用卧秋日長衰年迫蹇崕病力難取勷昔與羣少年登山名跳梁醉中看茱萸尚憶故態狂歲月挽不留老大徒自傷但念拜東野相從日尋常紹興十九年秋九月丙戌皇帝以太師益國公像御製贊文稱載勳德命祕書省珍藏小臣備員史館獲預榮觀再拜稽首賦詩二十韻上進真人乘六龍垂拱御八極日月一照臨乾坤盡開闢向來草昧初廟議資玉食當時無逺謀從事日鋒鏑維師有尚父端拜奏竒策投戈休五兵執玉朝萬國展寀禮丈闕勒功歸帝籍異報旌殊猷聖意益烜赫御府傳丹青金匱祕東壁天語粹堯謨宸奎明寶墨想當緘錦囊喜色動咫尺伊誰蒙此恩從古所未識在昔聞商宗良弼夢天錫惟肖得形似審象勞刻畫凌煙與雲臺輔佐亦努力辛勤入圖畫文字紀功德何為得斯名往往盡兵革安能不戰勝有此曠世迹誰持雲漢章雕鎸付金石千秋事明主萬世垂典册次韻子紹同黃超然諸公山中之作人生邱壑意往往老未決煌煌金朱人何嘗樹風烈轉戰作蠻觸肝膽殊楚越晚為林下遊如熱就炎暍不知誰爾嗔自欲作此孽諸郎名坐曺十日忽巳浹竹輿走駸駸山溜隨活活青山不相違相見兩欣悅共賦臨清流班荆坐林樾誰持步兵酒相救文園渴風嘯蘇門登衣飄御風列問酒挂百金登髙扶九節况乃落星巖似與世人别尚想儋州翁清詩散飛屑遺迹倘可尋斯遊未宜輟偉哉二三子風姿各磊落應憐老病足無用飽芻秣那得嘶北風長歌唾壺缺眼看磊落士抗論自超拔各鳴白玉珂共上黃金闕笑我不出門與世無乃拙長鬚夜光持清淡兩竒絶咀味久益寒牙類貯冰雪誰當笑我起著鞭追往轍同乘一葉舟共載西湖月送王彥猷歸淮西不食濡須塢口魚只今巳是十年餘我猶匹馬隨人後君亦華巔與世疏此日又分直館祿幾時來讀道山書梅花莫付長安使行卜昭亭嶺下居子紹許分雙井茶未至睡眼昏昏睡不開可憐辜負小忩梅須煩雙井一杯雪喚取竹坡春夢回子紹分以雙井以前韻為謝雙井甌翻雲腳乳孫郎詩似臘前梅更求琢玉敲冰句要伴茶甘一併回次韻仲平齋宿慧照中郎自是廟廊才平生憂國心如齋太常章句十二萬説論不與心相乖周王五禮久不作后夔八音今復諧君不見周南留滯漢太史夜瞻爟火空興懷朱弦且可奉祠事畫舸未用思清淮行當入對青瑣闥可但走馬章臺街持竿我欲釣煙水歲晚黃帽仍青鞋諸公方蕆太平事翁也漫作優人俳次韻仲平陳郎中孤山見梅用黃法曺舊韻緑髮朱顔日枯稿心向梅花兩傾倒誰知更有少陵翁江上情多被花惱三年家住孤山下玉樹瀕湖得春早山髙有月韻最勝水近無風香亦好凌霜我欲念花寒對酒花應憐客老孤芳一别今幾時更恐山林迹如掃闕夢成空遺恨此生常草草醉挽芳條欲問誰滿挹清樽酹碧昊次韻陳郎中再賦孤山梅南枝先回北枝稿玉山誰向花前倒庾郎巳老怕愁多何郎憐花為誰惱今年冬溫得雪遲西湖地勝著花早舊時處士作詩處籬落橫枝為誰好清霜著樹月滿枝白雪堆花門不掃麗句誰能鐡石腸賴有廣平文獨老借令一笑有餘妍賦此新詩不須草歸尋手種桃李花痛翦繁枝投有昊移植官梅巳著數花得四絶句昭文館外無花看吳樹津頭買樹栽花本無情天有意忍寒教為老人開六尺墻邊滿樹霜分明不是世間香黎郎可笑無風味要把渠儂聘海棠舊日溪邊醉帽斜玉㽔如雪照烏紗如今欲折疏疏蘂無奈霜蓬不受花慣作梅花樹底眠老來何事作彈冠詩翁句裏無官樣只合孤山月下看郊祀前二日雪嶰竹吹新陽端門飛晚雪憶隨侍祠官走賀屐齒折簾垂白玉樓風度蒼龍闕齋殿宿皇輿修廊嚮鳴玦寒風吹忽散萬象森可閲星言催夙駕天仗含璧月聖心有忱誠天意有施設誰為白雪歌入奏黃金闕太倉稊米集卷三十一
