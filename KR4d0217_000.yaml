body:
  text: 太倉稊米集别集類三宋提要臣等謹案太倉稊米集七十卷宋周紫芝撰紫芝字少隱宣城人紹興中登第厯官樞密院編修官出知興國軍自號竹坡居士是集樂府詩四十三卷文二十七卷前載唐文若陳天麟及紫芝自序集中悶題一首下注云壬戌嵗始得官時年六十一是紫芝通籍館閣業已暮年可以無所干乞而集中有時宰生日樂府四首又時宰生日樂府三首又時宰生日樂府七首又時宰生日詩三十絶句又時宰生日五言古詩六首皆為秦檜而作秦少保生日七言古詩二首秦觀文生日七言排律三十韻皆為秦熺而作大宋中興頌一篇亦歸美於檜稱為元臣良弼與張嵲紹興復古頌用意相類殊為老而無恥貽玷汗青集中嘗引蘇軾之言謂古今語未有無對者琴家謂琴聲能娛俗耳者為設客曲頃時有作送太守詩者曰此供官詩不足觀於是設客曲乃始有對因戲作俳體詩曰設客元無琴裏曲供官尚有選中詩云云是數篇者殆所謂供官詩歟然其詩在南宋之初特為傑出無豫章生硬之弊亦無江湖末派酸饀之習方回作是集跋述紫芝之言曰作詩先嚴格律然後及句法得此語於張文潛李端叔觀於是論及證以紫芝詩話所徴引知其學問淵源實出元祐故於張來柯山龍閣右史譙郡先生諸集汲汲搜羅如恐不及葉夢得石林詩話所謂冦國寶詩自蘇黃門庭中來故自不同者也略其人品取其詞采可矣乾隆四十四年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀太倉稊米集原序始余來東南聞士大夫誦宰掾周公少隱詩文每擊節賞歎以謂清新偉麗自成一家非真有悟解不能名一世獨恨不見其全逮守九江之明年嵗次甲申冬至後三日今吏部侍郎陳君季陵經從集庾樓上出公太倉稊米集七十卷命余為序是時敵再犯淮沿江郡多故欲讀未暇乾道改元乙酉春和議成邊城撤備民訟少得餘力觀書一日卧愛日堂取公古律詩記銘書序雜著數十百篇細讀而哦之竊駭古人關鍵難名之竗公盡驅入筆端蓋前輩文采專以格致為髙埀世不朽端不偶然噫此豈可與新學小生口舌辨哉然王震序曾南豐之文謝克家序陳後山之詩或謂巨題晚進不當為若余則于天下無所畏讀余序乃知當為不當為自有定論而公詩文雖不待序而必傳無疑也左朝議大夫充敷文閣待制知江州軍州提舉學事蒹管內勸農營田使眉山唐文若序宣人之為詩蓋祖梅聖俞聖俞以詩鳴慶厯嘉祐間歐范尹蘇諸巨公皆推尊之後百餘年又得竹坡先生繼其聲而周與梅在宣為著姓且親舊家也竹坡同時有王次卿僧彥邦道常三人皆能詩王死于兵不復傳彥邦學為詩而未至道常筆力頗過彥卿其後亦無聞惟竹坡之詩聲厭服江左天麟未第時從竹坡遊公謂子曰作詩先嚴格律然後及句法豫得此語於張文潛李端叔故以告子且言郭功父徒竊虛稱在詩家最無法度天麟欽佩此語退而學詩不敢越尺寸久而自定然後知公之善教人前年過九江公家在焉往拜遺像哭而弔其孤誦其餘文以語太守唐立夫舍人立夫急取公文集相與閲于庾樓上讀之聲震左右立夫最重許可至是擊節且為序之竹坡于書無所不讀發而為文章不讓古作者其詩清麗典雅雖梅聖俞當避路在山谷後山派中亦為小宗矣彼郭功父輩執鞭請事可也官晚而名不達自興國守罷居九江貧不能歸宣城而江山之勝蓋為晚助云公名紫芝字少隱乾道丁亥上元左朝散郎充集英殿修撰知襄陽軍府事提舉學事兼管內勸農營田使充京西南路安撫使馬步軍都總管兼提領措置屯田陳天麟序自序昔余為童子未冠入鄉校方學科舉文文成掌教者善之于是長者稍從而稱其能焉余曰是足以得名不足以名世也乃喜誦前人之文與其詩往往為之廢業而前日之稱其能者悉咍之不齒也一日先君戲為客言是子肩有詩骨在法當窮而又好詩窮固必矣自是好之不衰如人飲酒日甚一日然卒亦不能工也中年取少時所作而誦之悉皆棄去可嘔也老來取中年所作而誦之則又皆弃去可笑也今老矣而竟不能加安知他人誦之不嘔且笑耶小兒曹未嘗學文不識詩病誤以為好而掇拾其遺得若干卷録而藏之問名于余余告之曰文章一小技于道未為尊也使有補于世教猶庶幾不然徒費紙札耳不足録昔者山谷先生書告其甥曰文章直是太倉一稊米耳黃公之文可與馬遷揚雄劉向之徒相為表裡若其詩則杜子美蘇子瞻而下不數也而猶小之如此况不逮其萬有一者乎後數年而集亡當于東家醬瓿上而求之其必有得矣
