body:
  text: 太倉稊米集卷九宋周紫芝撰詩四十五首張載揚言揚州燕子無屋可居即船為巢命黃叔魚賦詩今年春余始見叔魚詩于宣城遂同賦塞北健兒歸去日揚州燕子却來時空尋畫舸藏風雨更為傍人話别離回首凄迷春水路傷心零落舊巢泥斜陽不見烏衣巷一讀君詩淚欲埀送吕右丞罷鎮宛陵聖從漢室承平久侯邦拱衛尊勳華埀日月展錯動乾坤開闢規模大紛更制作繁民勞箕斂日人痛鑿空痕鳴鏑侵榆塞穹廬指鳯閽羽書飛始急魚鼎沸初渾內禪皇圖逺春宫曉日暾羣妖悉葅醢黃髮半騰鶱公入登丞轄忠稱自諌垣論思知蹇蹇屬意本元元蠖濩資扶掖竒厖力引援敦盤盟易失虎兕敵仍存轉戰知何已風塵忽再昏倉皇趨帳殿奔北棄弓鞬傾日心應折瞻天眼欲眢徽音求太姒基命本薑嫄大物歸明辟蒼生荷國恩推符迎代邸結綬擁堯軒灞上真人出塗山萬國奔回天功不世徙突事堪論已復安西土猶煩護北門要須調鼎手為洗泣隅寃萬杵堅城壘千兵列戍屯賊鋒憂寇鈔原燎畏燒燔坐嘯初何事渠凶不足吞持平本寬大餘事到平反論説波瀾濶提攜禮數蕃時懸徐孺榻亦置穆生樽有客安圭篳忘機在鳥猿疾馳看騕裊妙琢愧璵璠始下橫經帳還攀欲去轅月樓空窈窕風斾舞繽翻竹帛勳猷著絲綸詔册溫磻溪未容老琳館且辭煩閟計今猶在忠懷不易諼白麻終拜相左衽待稱藩巨蠧消姦宄良農植本根抗章陳上䇿補衮要嘉言鎮薄敦流俗疏壅究治源微生有榮耀洗眼在山樊元素僻在草野羣盜縱橫久不得問新作鼎來喜次其韻三首兵氣纒滄海斜陽入暮林魂傷春落絮淚濕晚啼禽只有衣成結渾無髮受簪殘生已飄泊老日更侵尋二自失雲橋路空傷煙樹林天驕猶射月青犢未成禽尚怯矛頭米空橫柱後簪春光無賴好花落共誰尋三近聞君隱處茅屋帶平林但可占鳴犢誰能黜展禽書應藂淨几塵已暗橫簪杖䇿終隨子雲山上百尋同仲共兄弟訪趙行可行可置酒二首倚杖山頭寺維舟柳下堤莫催金騕裊且醉玉東西亂後兵猶滿風驚鳥未栖看君飛動意兩目在鯨鯢二坐客三珠秀王孫玉樹髙酒寧關爾輩山合對吾曹遊子家何定將軍戰未鏖相逢莫相失羣盜正如毛讀陳公葆真宫詩有感而作念昔全盛日天子方祈年崆洞擬問道桂館延列仙葆真號上宫柳色參雲煙方池下見砥上映壺中天長安二三月遊女飛朱軿蹣跚步金堤依約遺翠鈿芙蕖倚紅粧弄影秋江邊我亦時結客曵杖相周旋不知客中人有此稀世賢臨老誦公詩撫卷徒惘然初夏絮飛長陌又春餘緑滿菖蒲夏已初雙蝶不來花䔩䔩一鶯時到樹疏疏平生懶作折楊曲萬事可占長柳書只有故山真耐久伴人間處作踟蹰賊退後經舊居反側虞戈兵流離厭山谷師興解重圍亂定出荼毒提攜望鄉關老稚甘趼足故里成邱墟門巷亡詰曲大木亦已薪蔓草行可束東鄰殺翁媪禍難云最酷白骨在草間零落不相屬西家各奔竄係虜及僮僕當時黃金囊掉頭不肯贖新交半亡沒變故誰記録舉家竟何歸寄食歎局促凶年大軍後旱氣日熇熇涸井不供炊垢膩那得浴不知病瘦軀何以度蒸溽自從關陜亂威弧殊未韣十人九無家蕩析豈所欲微生何足論主食久不玉但願早休兵四海各安俗憫雨歎南方久不雨旱氣日益酷起視夜何其星斗燦滿目朝雲藹空濛暮雨思霢霂雷師方鞭車風伯忽舞纛百神各顛倒誰為調玉燭兩宫方蒙塵百執被驅逐萬里沙漠行長征犯三伏懸知臣子心北望眢兩目願興膚寸雲朝隮暮滲漉天公倘悔禍何止望一熟皇輿既言歸壤地亦旋復誰當挽天河下洗憂憤辱和人題徐獻可倅廳池蓮二首風流别乘水中仙百丈新移玉井蓮試掉小舟花裡去便如苕霅雨中眠西風吹雨緑楊灣香滿紅粧一水間不把監州比螃蟹看花誰似兩公間毅果出示次卿詩編中有彭門見寄之作乃追和元韻往憶烏衣郎北走彭門道六年隔音容萬事挂懷抱相思枉停雲尺紙開小草為言清夜夢莞爾同一笑黃樓渺天末路逺何由到我亦仰屋梁恍若落月照神交見顔色此理固良妙撫事思少年相期在嵩少是時海內安王師未征討尚有邱壑姿可寄沮溺傲一從胡雛驕斯民困征調一死抗賊徒竒禍發詞藻造物苦見憎與俗坐殊好微軀此棲遲長夜悲靜悄蒼狗變浮雲世事那可料傷心埋白玉急景轉飛鳥幸此好事人遺編為傾倒老眼倐巳明權門益慵掃毅師以次卿詩編見示以二詩還之雲錦當年事傷心不忍思江寒收骨後山晚斷魂時直節君何恨天心我獨疑老懷無處著更復把君詩二人物忽掃地風流誰復知子猷心愛竹摩詰少能詩疇昔山林意殘年喪亂悲明珠在滄海好句莫多遺蔡生縛氊根毛筆戲書小詩臥沙細肋䇿勳餘點鼠何勞強挽鬚毛穎典型空復在髯郎今巳號中書九日度折嶺修途苦悠悠行邁日靡靡間道避羣凶弛擔倦行李重岡頗峻極一上三十里荆榛塞舊蹊設險防賊軌鑿空破狼石猿徑僅容趾俯身視懸崖駭汗如流水回首問僕夫倉皇謀進止鄧公固忠臣王陽真孝子經營能幾何蹈歷乃至爾佳晨懷故鄉絶頂步屐齒醉帽落清樽浮香嚼金蕊嵗事行晏陰四郊復多壘浩歌歸去來吾行且安俟宿靈河寺風餐倚虛壑險步躋雲梯驚魂棲客枕夜宿投招提殷勤入簷月肯為幽人低滄海念橫流萬方喧鼓􅎏胡為困行役竄伏隨􅍪麑南枝越鳥巢北風代馬嘶耿耿念徒旅依依懷故溪脂車待明發胡為尚栖栖人生如醵飲暫聚還復暌百年能幾何行樂戒噬臍秋霖歎去年陰山雪平地三尺餘人言土中蝗入土不用驅今年嵗枯旱野食無豆蔬西來三尺蝗舊嵗雪不如秋田有遺秉未足飽一夫細雨生穀芽屯雲幾時舒群凶劇豺虎諸將勞驅除橫尸作京觀流血如決渠髙穹厭殺氣荆棘滿郊墟尚復此恆雨未知當何如豈欲令斯民竟死不少紓天亦念赤子理豈有是歟會當開晴雲却返羲和車我廩雖巳殫我地尚可鋤庶用種宿麥更作來嵗儲次韻趙鵬翔秋夜歎朝彈雍門琴暮歌梁父吟秋容日欲老客愁秋更深問言愁何許萬里懷歸心昔在洛陽日頗遭邊騎侵骨肉盡奔迸嵗月良侵尋譬如痛定人當痛難重任辭親就薄祿夜寢無完衾家亡河間書囊鮮鴻寶金誰能援一臂使子無陸沉老驥得平坂驚鳯翔長林佳名一朝白髙義千古欽山谷先生弔秦少遊詩云少遊醉臥古藤下誰與愁眉唱一杯解道樽前斷腸句江南唯有賀方回此以言語文字知少遊者也余鄉人有官藤州者謂藤人為余言少遊既病洗沭步上光華亭手持白玉杯命取江水立酌一杯而逝嗚呼此豈徒然者哉東坡題少遊自作挽詞以為能一死生齊物我是真知少遊者也古藤陰下偶婆娑南北隨緣意若何白玉杯寒亭上月縷金衣斷醉時歌還將萬里澄江水盡洗平生綺語魔能道秦郎解忘物嶺南唯有雪堂坡嵗杪雨雪連日悶題六絶春前舊雪連新雪雨後春寒帶臘寒殘日送年能幾許一番風雨嵗將闌樹頭雪過梅猶在地上春回柳未知舊嵗新年渾似夢凍雲寒雨不勝悲春回九地初頒歷人傍千門復看儺盡是漢家無事日白頭扶杖意如何去年代馬渡淮流江北江南處處愁破敵只今猶遣將冨民何日定封侯鞭牛迎得春來了爆竹催將嵗欲徂莫把流年作悲喜人間萬事有乘除大雪今宵一尺餘王春明日嵗云初豐年已識天公意上瑞仍煩太史書凌歊晚眺故鄉南望幾時回落日登臨眼自開倚杖獨看飛鳥去開窗忽擁大江來傷心不見姑溪老抱病聊尋宋武臺嵗晚無人弔遺迹壁間詩在半灰埃次韻伯尹登嚴子陵釣臺明光宫中梟夜鳴漢鼎何人窺重輕老顱未汙屬鏤血四海掩鼻愁羶腥當時避地豈得已巖棲水宿俱非情誰知舉世無真隱此意獨髙嚴子陵一鈎明月滿蓑雨桃花水漲春江平生涯頗似玄真子端欲釣魚非釣名故人巳作飛龍起猶著羊裘釣煙水異時侯霸豈其儔未可輕將衮衣比心知不為世人屈無故不作三公耳富貴浮雲只眼前執戟長憐子揚子丈夫名節倘未立安用區區識竒字環翠亭客意長隨倦鳥還翠屏空夢小孱顔更將臨老雙愁眼來看平生未見山西子為誰顰逺黛湘娥何事髻煙鬟千岩萬壑無人處便是輞川圖畫間種德亭萬緣冝作夢時看只有情田種德難但把胸中著梨棗不愁庭下欠芝蘭倡條冶葉渾無賴錯節盤根頗耐寒莫笑襄陽龎老子全家長享鹿門安蔡澄源録三家詩見借各題一詩以還之翰林才大今師伯目短曹劉數仭墻我亦當年曾問字雲泥無路可升堂早時得句唾成珠晚嵗分符雪似須聊復把公詩過日何心賦我食無餘少年湖海識元龍老去功名事已空筆陳舊知無與敵詩城今復有誰攻睡起有感日長誰復欵幽扉睡到斜陽恰盡時缺月要圓雲未肯青春欲老絮先知天于我輩元無分夢比人間更不疑門外故人千嶂逺燈前華髮萬絲埀次韻伯逺春雪風寒欲下欺春雪天近先埀壓地雲堆得樓頭成玉色吹來酒面作波紋憑陵暖日竟何事調護新花誰解紛溫詔始聞如挾纊九重應復念三軍光武二十八年五溪蠻反馬文淵年六十三矣踴躍請行卒致困敗班定逺久在絶域上疏請歸詞甚切至其略曰臣不敢望至酒泉郡但願生入玉門關遂老中朝辛亥季春三日燈下讀此二傳感而賦詩平生長歎馬文淵功業遨遊二帝間洛社龍飛初有意嶠南鳶墮不知還雖迷槃瓠壺頭路肯愧祈連冡上山政坐不如班定逺乞身生入玉門關題趙周賔家夜獵圖翰林作醉石偶似蒼於菟龍眠見之笑為作匹馬彎雕弧云是將軍出夜獵上有仇池行草書雲沙蒼茫日欲下道逢伏虎南山隅心知是虎不是石雙弦急控皆盧兵明朝白羽飲頑石摩挲欲盡金僕姑君不見賜纍千金新垣平連佩六印欒將軍致君大略豈在爾封矦細事不到君先生言語妙天下瘴海七年皮肉皴邂逅英物數蘇李曹蜍如生亦如死龍眠有眼識天人異世同成一竒事君當什襲勿漫摹此人此畫人間無五禽言余避賊山中婆娑岩壑間終日寂然不聞人聲惟春禽嘲哳不絶于耳乃用其語效昔人為五禽言亦山中一戲事也婆餅焦雲穰穰麥穗黃婆餅欲焦新麥香今年麥熟不敢嘗斗量車載傾囷倉化作三軍馬上糧泥滑滑山中流水聲聒聒春禽説雨春泥滑誰為春禽語莫報幽人明日雨幽人明日欲上山山頭雨足花斕斑提壺盧提壺盧樹頭勸酒聲相呼勸人沽酒無處沽太嵗何年當在酉敲門問漿還得酒田中黍穗處處黃甕頭新緑家家有思歸樂山花冥冥山欲雨杜鵑聲酸客無語客欲去山邊賊營夜鳴鼓誰言杜鵑歸去樂歸來處處無城郭春日暖春雲薄飛來日落還未落春山相呼亦不惡布榖田中水涓涓布穀催種田賊今在邑農在山但願今年賊去早春田處處無荒草農夫呼婦出山來深種春秧答飛鳥水西壁間見吕居仁絶句次其韻秋霜落後題詩處醉墨淋漓苦未乾不見窮愁孟東野亂峯空鎖一溪寒太倉稊米集卷九
