body:
  text: 太倉稊米集卷五宋周紫芝撰詩四十五首次韻吳思道贈姑溪道人殘生擬覔山中伴萬事厭從兒輩談笑我㩦家常作客羡君買地已成菴早將遼海千年夢換得曺溪一滴甘聞與道人新結社懶雲今不是常參次韻次卿擕酒見過睡過花時無好懷柴門誰閉復誰開擬從月夜放舟去更趂東風擕酒來鬚髮且休論早白悲歡正可付殘杯君無舊雨仍今雨相見應須日百回送虞伯瞻以宣城尉為上元方田官曩時人物詢石渠風流文采知諸虞老成不見典刑在定識載行家有書此郎胸中有涇渭不比當年灞陵尉可憐汗血名家駒未有長途試千里空鞭赤免鞬臂弓射殺窮山赤丸子只今廊廟方賡歌羣材並用肩相摩將分壤地辨壚㯺要追禹跡窮岷嶓懸知使者欲推轂豈止朱墨精研磨簡書可畏君莫厭㑹見天邊給飛傳時來富貴亦偶然且盡十分金瀲灧收次卿近書二首故國春空老三吳信不通客猶如社燕書或寄賔鴻鬢髮風埃裏林廬夢寐中西歸如有意一笑復誰同白水彭門道秋風古戰場人應思故國樓更在斜陽消息憑魚素遊從問草堂蘭芽知己茁何日見諸郎懷舊一首并引三月晦日飯餘方開淵明詩編誦停雲未竟而彭門故人忽遺逺書喜不能勝因效其作以寄意焉三月既晦維暮之春居我窮巷門無雜賓誰與晤語千載一人歌此好言以侑清樽酌我春醪載笑載欣言念我友在彼彭門江濆之别于今三年敻敻隻影祗復自憐素書聿至式慰我心蔚我嘉木有鶯在林尚求其友載好其音人而不如有懷其愔何當言歸昔盟是尋眷此二老實為蘭金晚霽翠葉看成幄濃春喚不回愁今連落絮雨欲到黃梅掃地花狼藉開門燕往來晴峯數㸃出暝色一禽催過張參軍故居曲肱亭舊基在焉山谷老人名亭且有詩所謂鄰雞呼不起擁被聽松風者是也脫手新詩咳唾成曹劉鮑謝未為能少時不厭家如磬嵗晚聊因酒作丞天與吾人終淡泊才如此老不飛騰蓋棺何物無遺恨太史知公解曲肱雨餘便有秋意夜聞絡緯聲甚急朝來三尺雨一灑遍原隰秋風掃快霽凉氣便相襲幽人倚寒窗睡眼已生澀淅瀝聞井梧風枝擺餘濕推枕夜未央牽幌月還入凄然裘褐念感此絡緯泣嗟我豈不知索衣寒無及家機臥空軸麻縷無可緝殷勤語秋蟲相煎何太急誰能太早計不死㑹當給吾言甚酸寒不足勞掇拾書之示二豪以當一笑集入秋初種芭蕉著葉芭蕉三四根怕秋全似可憐人老來安得無餘事細聽維摩說是身中秋無月夜半大雨忽憶去年江樓之㑹去年秋半西江口夜上江樓飲江酒欲問青天借玉盤等得浮雲變蒼狗天風慘淡含清秋夜色蒼茫江水流移床傍簷看月出月未肯出令人愁圓蘆吹裂客罷語恐在丹霄復何許一聲初自耳邊來三更却向樓前去人生無定可堪論東西南北似浮雲故人吹散天一角驚鴻零落秋江羣今年不聽鳴江櫓月黑風悲窗繞樹一杯無酒可澆愁夜閉蓬門聽風雨九日至蘇家園良辰不浪出坐久無誰言閒攜老鈴去旋覔登髙樽悠然理孤策徐行當華軒步穿鼪鼯徑來過雞犬村炊烟起茅廬衍沃多平原翳翳桑柘密靄靄禾黍繁黃童與白叟相攜負朝暄我求方寸地擬設常關門誰知南岡底近有蘇家園心知淳朴處可避喧囂煩歸來得好語髙意誰當論他年劉子驥定覔桃花源過雙廟巡逺功名絶古今後先俱死只侵尋兩家子弟猶相訾百世何由識此心行邁一首秋山凄無風木葉寒自萎羇客不得歸行邁日靡靡瘦馬嘶暮塗忍飢渡寒水落日晚更明棲鳥驚復起人生各有求誰能異生死行行重行行辛苦那得爾亂石摧前輖旋車亦當止飢寒苦見驅臨風一長喟暮宿一首朝行繞山麓暮宿投孤村父老頗見招落日猶在門庖烟不滿竈汲水復抱薪為我炊黃粱一飽裁逡巡百金得香醪湛湛盈清樽我雖不解飲亦足濡我脣濯足捫飽腹燎衣暖餘薰願言息劬勞少浣塵埃昏殷勤戒鳴雞未用呼晨暾汴隄冬日二首榆柳風微不動塵平沙如粉襯車輪今年汴上三冬暖已帶長安二月春當年漫漫雪如塵古汴重氷欲折輪暖日如今著行客長安三度見青春將出京老恨愁千斛飢須粟一囊遂成遲去魯還作薄遊梁客思風塵惡鄉音道路長何時秣歸馬看我理晨裝雪後再至菊坡長安二月春風裏馬似遊龍車似水青鞋久慣踏江沙黃帽豈堪隨馬尾梁王舊築黃金臺臺荒草滿誰復來雲中羽蓋去不反坡底菊苗寒欲開老僧相對話鄉井童子瀹苗分乳杯為言諸老有遺跡細尋石刻摩蒼苔春風無情固相似倦客逢春還少味籬邊踏雪憶故年渡口呼船夢千里人生萬事要隨緣到處一身俱偶然林間春動有佳興更㩦官焙來同煎寒食滁陽阻雨去年束書薄遊梁今年下馬古滁陽滁陽寒食少人出滿城山雨驚淋浪閉門客舍頗無事五白大呼同舍郎樽前誰唱醉翁曲鳥歌花舞催紅粧竟須薄酒澆永日肯放羇愁煎客腸功名老矣白髮出嵗月幾何歸路長江頭藉草作寒食細雨梨花思故鄉何當秣馬候明發便可一葦橫長江千村萬落鳥呼客山南嶺北花吹香仍須戒婦速作黍㑹見鹿門歸老龎遊醉翁亭醉翁詩裏識滁山蚤嵗神遊只夢間雲外淺寒欺短帽馬頭深秀得烟鬟時㩦妓女人猶說倒著接䍦誰與還文物風流今掃地亂泉空繞玉孱顔謝公墩風流謝文靜世俗未可屈但怪東山雲肯為老桓出誰知姦雄心本自畏豪逸君看新亭㑹此意未易詰坦之獨何者手版遂倒執煩公揮蝟須談笑安晉室暮年淝水師苻秦甚窘急幅巾碁局間百萬一戰襲功名亦餘事聊為兒輩立平時誚虛曠聞此自羞澀萬古終悠悠客意頗蕭瑟忍看西州門更作羊曇泣卞公祠卞公古剛者直莭不可挫巖巖六龍子矯矯中興佐可憐謝幼輿梭飛齒還墮志懷不事事見靣輒欲唾非關執鄙吝要欲激疲愞茂𢎞豈駑駘廟社因遷播維公抗劇賊嬰此不測禍平生忠義氣臨絶不自奈憤心握兩拳爪甲穿掌過英風渺何之末路悲坎軻髙堂風入帷壞壁塵生坐清魂不可招聊為歌楚些遊定林青山繞招提危磴迎屐齒泉聲去悠悠秀色來亹亹定林得幽處勝踐發新喜當年手種樹來禽雜青李橫斜照壁詩平淡如止水尚想扶風帳橫經多士子奈此後學徒發冢用詩禮朝回丹青像暮撤配食簋空餘古祠荒老木寒藤委遺像猶便便念往悲復起舉似與山僧山僧豈知此日暮歸去來林深足荆杞采石道中示伯尹飛盡楊花京洛春又將一舸到江濱聊憑淺碧浮烟水為洗軟紅隨馬塵紫蟹黃雞秋漸近東阡北陌酒將醇只今我與君同夢他日君容我卜鄰伯瞻作酒官植竹局中見索鄙句虞郎種粟秋不收一生坎軻多窮愁有才無命百寮底人笑獼猴騎土牛蚤時脫身隱吳市晚嵗作吏分糟丘貴人官髙印如斗君獨雞栖馬如狗騎曹只可呼馬曹漫仕何人知漫叟平生好竹心未闌小分雲嶺青檀欒橫窗尚恐翠露薄得雨便作秋聲寒向來麴糵一掃盡風月已足供蹣跚吾門如市心若水箕坐不知身是官念我平生絶韻友相從久結無情歡君當下榻我亦往風雨對眠聽夢殘次韻次卿寄李姑溪時欲問舍宛陵我亦平生願執鞭拜公眉宇記當年泰和人物真圖畫李白風流是列仙雪裏已無回棹意文中新有卜居篇幅巾還作溪堂夢何日相從句水邊河魨三絶水沒春江不見沙河魨吹絮荻生芽平生所缺但一死可更杯中論鏌邪釣蓑常恨此盟寒兩嵗珍庖屢入盤細雨春江從此逝不應猶棄季鷹官一飽欣然下箸餘庾郎鮭菜復何須當時獻納堪憐許只解區區說䱥魚戲蛙夢回閒看繞燈蛾窗外蛙聲兩更多莫遣盤中種鮭菜要留水底作笙歌為蛙答偶作長吟君莫嗔一泓聊占小池春斗升雖未分公廩青紫猶堪作賣人語在建康實録及南史中次韻李子澤過次卿溪堂二首溪雨廉纖作晚晴斜川風物喚淵明歸來定自有新句醉著烏巾一幅輕時人但數李北海惡客逺過元次山笑我不能同一醉也來溪上看烟鬟次韻次卿穿池得古研功名到手莫嫌遲妙琢先分紫玉池他日北門當視草只今南澗且題詩人間未忍終埋沒神力應先作護持好替青氊成舊物知君家有寧馨兒次韻次卿鳴琴終日二絶大音固自元無曲緑綺何勞更著絃此調最髙人不㑹未知今復為誰傳平生有味在朱絃想得清風入指寒小閣香消簾不捲知君不為俗人彈代人贈别二首縷金歌裏越姬羞紅蠟光中翠黛愁貪向樽前話離别不知郎酒十分流越奴年紀似羅敷年紀無多情有餘别後此情能記否好憑北鴈寄南書端午日小雨已而復晴斷雲飛雨過平川吹作團欒碧玉天酒緑强能開病眼絛長那解繫流年閒收艾葉晴窗外忍對榴花白髮邊細葛香羅天上有烏紗白簟北窗眠五月七日南堂見楊花柳深何處可藏鴉窗繞長廊緑暗紗造物惜春知有意薰風時一度楊花五月八夜月色明甚望麻姑昭亭二山天髙月白夜漫漫倚杖來看月下山老眼直窮烟靄外諸峯渾在有無間翰林耽酒今何處仙女乘鸞去不還天恐兩山看未足故飛明鏡照孱顔昭亭蓋舊名敬亭相看兩不厭只有敬亭山李白詩也讀林和靖集書其尾泉石膏肓挽不回笑看嵩少仕塗開暮年封禪無遺藁平日江湖只釣臺月自黃昏人已老鶴無消息客誰來吳兒不解髙人意秋菊何當薦一杯六月四日大水夜雨聲喧萬壑雷奔流明日自天來深疑瓠子河初决復訝浮山堰始摧水涸成梁真漫爾山行乘橇信悠哉望中何物關詩眼銀海光中碧玉堆潘澤之惠合溪蘆蔔種庾郎鮭菜只春蔬新向金城得上酥㑹見銀絲堆細縷酒香橙熟鱠江鱸太倉稊米集卷五
