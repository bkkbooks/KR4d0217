body:
  text: 太倉稊米集巻四十五宋周紫芝撰論四首司馬遷論范曄賛班固謂其議論嘗排死節否正直不叙殺身成仁之美何其貶固之深耶夫公天下之賞罰以當天下之功罪者君也公天下之是非以辨天下之善惡者史也賞罰不公則無以厭人心是非不審則無以取信於後世然則秉史筆以權衡天下之人物而去取之其任常與人主相為重輕顧不難哉今也死節者猶或排之正直者在所否焉則人知勉於為善益寡矣曄特從而深詆之不為過也始李陵以步卒五千抗單于七八萬騎轉戰萬里之外一日至數十合五十萬矢為之俱盡且勝且北至於勢窮力殫而後巳雖曰兵敗而功不立身辱而名巳隳究其初心豈不忠且勇哉武帝盛怒欲食其肉當時左右無肯為陵言者徃徃從而媒孽其短者有之史遷力奪羣議以謂陵奮不顧身以狥國家雖古名將無以逺過而武帝疑遷欲沮貳師為陵遊說遂罹蠶室之禍噫遷亦可謂賢矣哉且武帝以暴刻之資而濟以猜忌之情大臣一言不合輒就誅戮遷之議陵帝從而刑之幸也使其怒而不巳安知其不從而殺之乎是亦幾於死節之士而固方且譏其不能明哲保身此何理也夫所謂明哲云者謂其智足以慮患識足以周身不至冥行以觸罪罟而巳是為君子保身之道豈為緘黙不言坐視人主之過全軀以保妻子而後為明哲哉古之人有行之者仲山甫是也故作詩者美之曰既明且哲以保其身也使仲山甫以緘黙不言坐視人主之過為明哲保身之道則衮職有闕仲山甫補之果何謂哉曰單于之戰陵當死國而不當降降則陵之罪也李陵之降遷當直其過而不當辨辨則遷之罪也馬遷之辨漢當容之而不當刑刑則漢之過也漢之責遷不為無罪遷之救陵未免於屢敗固之所以責遷者是也曰不然也初陵以屢敗疲羸之兵抗全軍虎狼之敵横行匈奴身蹈白刃而不顧此豈畏於一死者及其兵殫力窮無救而敗乃始䝉負羞辱斂衽以就降此其故何哉意猶有望於漢也遷嘗謂武帝言陵之力戰萬死不顧使賊鋒屢挫左枝右梧之不暇其威武亦足暴於後世陵之不死猶冀得當以報漢也遷之論陵如此可謂得其心矣奈何不納其言而反疑以遊説乎且陵敗而不歸漢知漢之必殺也殺之則無益於死不若因敗以立功於漢猶有望焉陵不可謂不善於處死者也遷為陵言而幾不免死陵之聞之知漢之必殺巳也是以招之而不至及其不至又從而殺其母妻陵之望於是絶矣雖遣百使萬方而招之其有至哉由是言之過在於漢而不在遷明矣借使遷言果效於當時漢無負忠臣之名無報忠臣母妻之罪無拒諌不納之失一舉而三善隨之此遷所以反覆為陵言也不幸而以言獲罪使之飲恨以終其身固不知罪漢乃責遷以不能明哲保身可謂繆矣桓譚論惟人主之好惡為能移天下之俗人主之所好天下翕然從之不待賞而後勸人主之所惡天下倏然違之不待罰而後沮然則非人主之好惡能移天下之俗也其勢然也何以言之上之所好而吾從之則君必喜喜而不已甚者至於髙爵以貴之厚禄以富之上之所惡而吾違之則君必怒怒而不巳甚者至於刀鋸以戮之鼎鑊以烹之夫以人主之好惡而視天下之從違禍福之至捷若影響則天下之俗其有不移於上之所化者鮮矣人之情豈不欲捨死亡而求利達以謂與其背世以蹈死孰若殉世以求榮於是士之偷合取容以自媚其身者其說以謂吾能一切茍簡以狥人主之好惡雖寵幸親昵之私固未易得而流竄僇辱之禍亦庶幾其免矣當是時以其狥天下之好惡舉世莫不皆爾有人於此確然自信而無所疑毅然自守而不可奪爵禄不能勸之使從刑僇不能威之使懼非天下之大豪傑吾知其不能矣余於東京而得桓譚焉是所謂天下之大豪傑者也初王氏託符命以攘神器一日除拜公卿數百人王興為衛將軍王盛為前將軍二人皆莽按符命而求得之由賣餅而登用以示神焉士亦何敢不為符命之說劉歆漢宗室也始以應䜟易名其後乃為莽國師揚雄漢儒宗也乃以符命取譏當時獨譚黙然不聞其有一言也此佘所以謂其為天下之大豪傑者也世祖以英武有為之資仗大義以平新室之亂神機妙筭動無違䇿故能整墜緒於既絶之後援斯民於塗炭之中雖湯武之業逺過而乃篤意於䜟書曽無以少異於莽焉夫親值其亂將以易亂而歸之正乃反蹈其覆車之轍而不知此何理也哉宛人李通始以圖䜟說光武起義兵又其在長安時彊華自關中奉赤伏符其後群臣託以說光武起大位至其祝文告天皆引䜟記而中元二年乃宣布圖䜟於天下則其信之可謂篤矣及其即位乃以䜟文用孫盛行大司馬衆論始不悅又按赤伏符王梁王衛作光武乃拜王梁為大司空焉夫用大臣不以功德而專用䜟緯此與王興王盛之事何以異哉自是政無小大皆決於䜟至於鄭興以不善為䜟坐為帝怒而尹敏乃以君無口為漢輔之語竟取擯斥舉天下之士皆從而為符䜟之說矣譚於是時上疏抗論力詆䜟之非經幾不免殺非信道之篤而能然乎觀譚展轉於新室紛更之餘終不肯一言以取媚於時及中興之後䜟說益盛而犯顔力諍以辨其非則其人自視豈隨其波而汩其泥者哉故曰士有特立獨行不移於舉世之所好而自信其道者然後可以謂之大豪傑也竇武論兵有必勝亦有必敗善戰者常審成敗之勢而後發故兵出而敵可取焉不然鮮不為虜矣何謂兵有必勝師直而不曲者必勝之道也謀祕而不泄者必勝之道也戰銳而不怯者必勝之道也何謂師直而不曲唯天下之至義可以誅不義唯天下之至仁可以伐不仁此王者之師所以未戰而先勝也茍在我者未免於釁而欲以伐有罪是何異以桀而攻桀以燕而伐燕者哉何謂謀祕而不泄運籌帷幄之中決勝千里之外竒中攻發以出其不意使敵退不知其所守進不知其所攻則彼雖欲伐吾謀而不可得矣何謂戰銳而不怯夫先發者制人後發者制於人此兵之機也王者之師疾如迅雷出如脫兔使敵弗克懼而兵巳壓其境則戰必克矣是三者豈特勝敵為然破小人之黨亦出於是也小人為患有甚於敵鋤而去之不可不急然而小人者陽為仁義以濟其奸陰為交私以結其黨忍於為惡而每有嫉善之心工於中人而常懐慮患之計不以勝敵之道而取之則吾必受其敵矣其為患莫大焉東漢之興更十有二帝自光武顯肅之後蔑然無稱孝和之世政在竇氏孝安之世政在鄧氏順質之世政在梁氏孝桓之世政在五侯孝靈之世政在奄寺迄孝獻而曹董之禍作漢自是而亡其所由來乆矣初靈帝時諸臣擅權大起邸第皆擬制宫禁帝嘗登永安侯臺恐其望見之乃紿帝以人主不當登髙登髙則百姓離是與趙髙指鹿為馬何異此天下巳亡之兆也而竇武之徒乃欲盡捕其黨而誅之以扶持漢祚宜其反死於數子之手而不可救歟余固疑其如此蓋大不然靈帝雖孱弱亦未有大惡於天下特以其蔽於宦寺而巳天下雖巳離然内患稍除更輔以二三大臣以收天下之心徐起而安之亦足以撥亂而反之正惜乎武徒有其志耳武之進也既以后族顯曽不旋踵而父子兄弟一門三侯又多取掖庭宫人之資酣燕佚樂進不能逺抑權勢無德而享厚禄退不能躬行勤儉以自貽僣侈之過使諸官得以藉口以謂無瑕然後可以戮人彼猶未免於亂也而欲以除亂可乎此所謂師出而不以直其敗一矣武日與蕃相為計議復引用同志徴求名士共定計䇿天下英雄知其風㫖事未立而迹巳彰功未濟而計巳失機事不宻手足俱露卒使曺節矯詔以誅武至於身死事敗為天下笑此所謂謀泄而不能祕其敗二矣武既内倚太后臨朝之威外迎群英乘風之勢得天下之同心以去天下之同惡雖權一時之宜亦可以有為矣乃屢白太后至於猶豫而不果所謂謀及婦人宜其死也非劉瑜撼以天文變見患將切巳計亦未決幸而鄭颯既巳就械蕃說以便當收殺而不從去邪而疑必待雜考連及甫節而後巳彼殊不知首未及囘而刃巳襲吾之背此所謂兵不能乗其銳其敗三矣范曄以謂漢世亂而不亡百有餘年乃數公之力功之不立非智力不逮蓋天之所廢不可興也此何異楚王所謂此天亡我非戰之罪者哉蓋人事巳至而功有所不立然後可以言天若武者非天也何以知其然哉始陽球一司隷校尉孤立於朝能殺甫父子而尸諸路使節等流汗哀鳴之不暇武而獨不能乎然甫既僇而節猶在余固知球之必亡也二子之功雖皆不濟以勇決言之球之過武豈不逺也荀彧論或謂荀文若以豪傑不世之才挾經綸海内之志其風流雅尚曄然可觀號為一時之望徒以議不詭隨遂死於曺公之手議者寃之以為非辜余獨不然曺公之殺彧固巳非矣彧之致死亦烏得為無罪哉自古興王之君所以取天下未有無謀主而能成帝業者故髙帝以良平而滅秦光武以冦鄧而隆漢此以有謀主而能成者也項籍失范増而為漢虜袁紹殺田豐而為魏勝此以無謀主而滅者也然則魏之取天下也為之謀主者其誰哉文若是也初彧捨紹而歸太祖太祖得之以謂吾之子房則固嘗倚以為腹心之任矣及其取徐州平吕布彧嘗為畫䇿使先定兖州曰此髙祖之關中光武之河内也其後操保官渡而紹圍之當時食盡勢窘議欲還許者屢矣彧乃力勸以為不可卒以敗紹盡如其䇿焉由是觀之彧之効謀於操非不多也故太祖雖征伐在外軍國大事悉與彧籌又賢知如荀攸鍾繇謀䇿如志才郭嘉皆彧所薦則太祖倚彧以為腹心之寄顧不重哉而彧攄忠竭誠以効胸中之竒非帝王之逺略則天下之大計其為操之謀主明矣至於復九州於天下則勸以不修復舊京規九錫於漢朝則以謂非愛人以德此其言為忠於漢耶忠於操耶以謂忠於漢乎則漢之陵夷至是甚矣以獻帝庸稚之資而遭仲穎刼遷之禍天下之勢土崩而瓦解使賢如彧者雖纍百輩能復扶其傾頺哉以謂忠於操乎則操之殺伏后以示威挾幼主以令世誅剪名流盜攘神器其志在於天下此豈有意於漢者而欲納其忠焉是真可笑也巳昔栁璨沮朱全忠九錫之議全忠怒謂璨曰不由九鍚豈不可作天子全忠兇熖薫灼此勢豈可囘而璨沮之宜其死也彧不從操雖與璨之脅哀帝以禪位固自不同至於以危言取禍於凶人之手則又畧相似也余故曰曺公之殺彧固巳非矣彧之致死亦烏得為無罪哉夫天下之惡名無甚於盜今有教人以穴牆掲篋之術者及其盜而得之則不與之挈而徃何哉蓋欲以辭盜之名也彧為操謀主其取天下之大盡皆出其智是嘗教之為盜者也及天下將定可以攘取而有之矣乃始强諫以為不可得非欲以辭盜之名耶杜牧之之論如此是矣而曰又况於非盜者乎此何說也蓋牧之之意以謂漢室既不可復天下之豪傑亦無以出於操者則為蒼生而請命非操不可彧固當助操以成其謀而不當逆操以殺其身也此特一偏之論耳君子之大節不在是也說者又以謂東漢之士尚節義桓靈之亂漢祚綿延百有餘年而不絶至於操起而圖之終其身而不敢取皆陳蕃李膺之徒有以激之獨不知彧之死也為與有力焉嗚呼彧雖死亦賢巳哉太倉稊米集巻四十五
