body:
  text: 大倉稊米集巻十三宋周紫芝撰詩四十八首次韻馮逺猷夜雨屋漏有作我昔在田間秋霖傷嵗熟常憂床床雨夜下東屯屋飯牛起晨耕短蓑聊櫛沐違濕因五遷勞形真僕僕坐歌南山粲那惜清夜促平生小馮君秀齒粲氷玉生餘華屋姿豈識霑濡辱誰知折角巾肯念滹沱軸㑹將秋雨謡冩入朱弦曲知君有過秦妙畫行見録衮衣坐法宫當宁調玉燭吾廬雖獨破受凍死亦足飲魏宗明家分韻得酒字閉門苦秋炎散髪臥北牖小雨度微凉西風颯衰柳起邀馬服君步過雲中守雲中雅好事酌我玉巵酒諸公飲方豪何曾問升斗而我纔飲濕已復困濡首臭味本自同初何間能否不然瓊瑶林何以着老叟歡同一笑間義重千載後脫彈無新詩刻燭媿敏手詩成愼勿再坐客驚欲走感韓碑用李義山韻長蛇封豕矜雄姿弄兵三世窺皇羲自從羣騎入中土僥倖嵗月寛誅夷錦纒紅帕五十載肯輸赤豹兼黄羆憲皇神筭本天授指顧不勞戈一揮元和上相拜元帥黄金鑄印手自持三軍踏雪砍墉入夜摩賊壘朝搴旗侍中西平老將種屬鞬拜舞行相隨緋衣小兒却健武未怕賊首如虎貔功埀竹帛不可掩名在萬古誰能訾行軍司馬號大手蒼珉承詔鑱瑰詞平生直筆有公議從人乞米知羞為狗功須賴發縱者盡勒殊勲歸鼎司宫中小女强解事歛祍雪涕埀豐頥絺章繪句隨斷裂厖恩下沛驚淋漓空餘大雅配吉甫元和聖徳詩云誰作歌詩以配吉甫春秋廟享存歌詩當時左右無諌者應慙鳴佩趨龍墀襄陽太守獨何事殷勤自刻平吳碑將軍更勒燕然石蠻風瘴雨侵蟠螭張功耀武示萬世二子無乃為已私晉公純德古未有彊藩悍將親平治羣奸聞風膽為落自奮老拳擒宛脾都人尚想白羽扇野蔓已理黄絹詞唐家晩嵗事如此誰令舉世躋純熈君不見鄭公之死肉未冷停婚碎石恩還追文皇英明猶復爾功臣誰肯躬胼胝玉谿慷慨書萬本要識元老為邦基寄題元具茨雙梅菴髙節知公冠九州梅花却對令君羞詩如往日陶彭澤人是只今陳太邱挽得繁枝供宴坐小分疎影入清流簿書堆裏渾無事玉雪香中醉即休讀東坡儋耳新詩先生流落久居夷屬國前身事巳非萬里岷峨空入夢七年海嶠不思歸桄榔葉暗蠻村雨茘子紅埀瘴嶺扉政坐詩窮闗底事雲鵬誰道摠卑飛東坡有雲鵬今悔不卑飛之句次韻時然惠徽州近作莊矦四海習鑿齒鸞栖一枝亦聊爾沸鑊那尋衮處州獨跨羸驂度徽水羊腸路繞十八坡危磴天懸三十里捫參歴井不復休一握去天真有此軍符夜下星火急吏習文書日填委青山倥傯未可厭方外周旋人有幾坐看雲生拄頰間便恐詩成横槊裏萬壑千岩入句來天遣江山助竒偉我昔經行五嶺頭芙蓉峯髙天正秋凄音怨曲不成調細雨寒烟空復愁曉得新詩驚欲倒句似當年山色好一生忍淚泣秋風可笑區區郊與島題吕節夫園亭十一首吕節夫兄弟買地築屋于麻川之上鑿山疏泉種藥藝花為遊觀之所十有一官閒則居之食不足則出而仕當世髙之其弟仁父為余道其名且使賦詩雲林堂髙情惡喧囂結屋傍空曠草堂寄雲林逺目聊自放偃蹇良不疑世情真可抗不知堂中人誰同倚藤杖半隠寮顯晦固有時出處本同致乘流與遇坎等是一戲事真隱了無心寧須論朝市君看半隱名是中有深意嵗寒披山中與誰語俗士不我過時攜登山屐閒上嵗寒坡不知青女威柰此蒼官何從今桃李花漫漫空復多朝陽臺殘月壞金樞朝曦吐暘谷南臺凌日觀杲杲明萬木白露亦巳晞桐陰轉簷曲危坐讀黄庭想像巾一幅衆芳閣草木有盛德俗眼未易觀幽姿不可見微香在林間植我東籬菊藝此九畹蘭芳意似有知為君笑朱欄藤洞雲山𣺌無何地勝餘草木蒼藤飽風霜夭矯作岩谷幽香出空洞清樾交翠麓想時攜客來班荆對碁局學圃亭疏泉灌空畦折柳樊小圃闗心有幽事寄意在衡宇但恐經綸人兹焉忽髙舉愼勿厭荷鋤烟蓑濕春雨巻書閣機雲佳兄弟胷中幾石渠萬事資不理三篋補有餘它時䇿髙勲已復得異書安用結飛樓傍架時巻舒舒嘯軒淵明磊落人啾唧倦吟諷聊將舒歗聲一為洗喧閧寄言梟獍徒請勿恣嘲哢君看半嶺間依稀有鳴鳯越香堂佳木寄深塢自與春有期幽姿誰復省軒軒頗矜持真賞倘已逢清香襲人衣士為知己死此語良不欺容安軒生理須幾何安分一枝足向來髙明中百鬼作禍福何如此衡茅長年樂幽獨愼勿將蝸牛輕比蠻與觸金華老人分老潘㸃漆墨十月二十三日久雨新霽弄筆北窻戲作此語華嚴經云須彌山筆大海聚墨不能書冩一字法門老來窻几漫塵埃誰與潘郎㸃漆煤一字法門書不得又撩風月作詩媒東窻對雪六言四首月觀雲臺何處瑶林玉樹誰家幻成銀色世界雨此天女寳花天淨銀潢渺渺林寒玉珮珊珊有月時翻瑤草無人來踏瓊田擁鼻駝裘不暖澆腸蟻榼還空助我茶甌玉雪煎成石鼎松風睡起山驚堆玉詩成研欲敲氷飄瓦莫嫌碎㸃打窗留伴寒燈聞雪二首黄昏雪意未全成寒入重衾曉更清風裏未看穿幕片夢中先聽打窗聲朔風初喚夢魂囘曉枕時聞急雪來未有春衣堪換酒明朝誰辦送寒桮次韻莊簿對雪月姊雲冠玉作膚白鸞飛鞚下天衢欲酬平地雪三尺正要澆愁酒一壺林下閉門須好句廟堂調燭費嘉謨它時瓊佩朝銀闕共醉寒江記老夫讀外舅髙晉翁詩集結髪論人物傾心慕老成掃門嗟齒暮洗眼失氷清心苦彈冠􅈸名應脱屨輕眼髙空爾輩醉熟自平生長嘯蘓門冷微顰下蔡傾千兵森武庫五字築詩城鮑謝萹章麗陰何句法精聱牙徒自放貞耀復誰旌草露功名薄春雲嵗月更鴨頭江自緑馬鬛墓還平蹤跡荆襄在文華劍佩榮塵編愁獨把清淚一縱横吳幾聖許分蠟梅栽二首林下幽姿惱殺人書來分我月黄昏杜陵老子堪憐許枉乞桃栽一百根越羅新學染宫黄不著紅藍一㸃粧移取綵衣歌舞樹莫教曉夢怨餘香幾聖以三詩寄蠟梅栽次韻寄將琢玉風前句剪送和香雪後枝要識此花真面目細看無色畫中詩釀蜜成花此似難移根深恨老來看豐肌弱骨須調䕶可怕寒梢白露團慣見江邊雪様梅此根常恐自天來懸知老去醉中眼便是姚黄花嬾開次韻沈給事對雪長句二首時元用守宣洒天飛雪被長巒落絮縈風醉後觀塞上餐氊公獨記月中囘棹我知寒已書上瑞歸天闕又挽豐年到筆端懸瓠功名知有意微生底處更求安翠失千峯與萬巒爛銀宫闕縱竒觀樓空翠濕衣裘重詩就風生齒頰寒聊與江山分絶致浪陪樽俎問更端莫嗔郢曲無人和七子風流負建安次韻莊時然徽州山下見梅三絶凍蘂寒梢也自芳斷橋深塢獨聞香山中行處花吹面馬上歸時詩滿囊雪後花開人未歸津亭誰共把寒桮句中解道梅如雪夢裏可無人似梅春到梅梢雪作堆庾郎愁眼為誰開白龜城裏未曾見徽嶺句中渾寄來雪將晴聞梅已有開者臘雪自知春欲囘凍雲元不耐朝暉便須急買尋山屐莫放梅花一片飛題雪堂大研一首河間多書人共知未見紫岩方玉池東坡老人上天去流落人間君得之寳匣初開眼光眩相約君家與同看麝煤霮䨴雲滿天尺璧堅温玉微汗峨眉山髙兩蘇出自是斯文有秦漢先生著書書滿家晚得窮愁坐城旦只今蠆尾人爭傳異時龜趺不須斷百年榮辱一夢餘空與髙人作竒玩安得大手揭陽君為我銘此元賔研次韻具茨老人觀臘月十五日按兵六花陣合紅滿川鼔􅎏聲喧旌暗天錦裘繡帽不動鞭腰鞬兩弓誰更先城狐社鼠空百千一呼辟易投戈鋋霹􅋬晝射蛟螭淵妖星夜落蚩尤躔穀城老父書誰傳可為帝師䇿萬全脱兔一出忽復旋風聲鶴唳驚虚弦常山蛇勢孰後前四頭八尾屢變遷何止内政分軌連部伍聊足相糾聯勢如漂石奔流泉蒙衝未數浮江船三軍不用呼飛燕功成唾手豈待年長安賊平不改􅆵萬里玉闗沉夕烟降王曵組未解纒白麻曉下彤庭宣兵雄澤潞非公賢談笑自足空戎邊沈元用太守和具茨詩張元明兩用其韻見邀同賦漢陽千騎嘶秦川六龍御日升中天翠鑾親巡耀寳鞭神武自作諸將先子陽盗據衆萬千井中蛙腹不受鋋虎頭誰敢當文淵一洗萬古空英躔風威巳落諸蕃傳上兵伐謀軍貴全固應玉陛當周旋朱幡猶此閲望弦安危以身誰肯前願扶國步整播遷勁兵出塞鏖祁連長纓曵首來翩聯盡驅酋長朝甘泉未慙驃騎羞戈船先聲旋下齊與燕稱觴拜舞呼萬年黄童佩犢無征􅆵農桑萬里通人烟蓬頭舞劍空腰纒要分頗牧來藩宣古來千里制一賢長城未必能防邊横谿小市再宿慨然有感小市人烟南北頭清江賈客去來舟兒時風物依然在老去光陰不奈愁可憐白髪無好意更對故城思舊遊烟塵蓬勃兵火急嵗晩棹歌歸去休夜宿長林明日遊仙壇宫麻川過長林路轉無百里積雨斷津梁日亂十六水忽從岡阜間稍得千家市凌晨上仙祠遂作折屐喜水流自汪灣山亦甚雄偉小邑頗下臨擾擾屯聚蟻一笑相與言黄冠有仙子為言庭前菊霜餘爛黄蘂採之制頺齡可以堅髪齒不須事虚曠至道亦良邇神仙固可學吐納乃餘事斯言雖甚簡中亦含妙理星源逢共兄弟别後道中奉寄二首曉色凄迷客夢長賈胡留滯更他郷自隨匹馬家千里眼見故人天一方霜落駝裘朝着㡌雨來山驛夜分床與君相别無多日已聽鳴鴻欲斷腸十年四海不解甲一日三秋更憶君别後光陰逐流水老來蹤跡似浮雲心懷邱壑情雖在眼暗風塵首重分滿眼尚添新戰骨何年真起故將軍苦寒二首􅃋風吹雪天漫漫厚地欲裂江水乾懸知北客未省見太古以來無此寒氷簷埀筍風撼屋布衣生稜體生粟老翁炙手厭朱門明朝晨暾更堪曝天容黯慘悲風吹寒日欲出寒雲埀千門晝閉人跡絶萬里長空鳥不飛豺虎號寒聲怒急行人指墮毛為立易水風髙燕地寒白頭書生望雲泣具茨老人讀書寮具茨四壁無斗儲載行書多常滿廬胷中嵬􅐑幾石渠三篋補亡無復餘起居誰不解何如校書著作虚詔除元元本本窮古初雌黄付與金銀車朅來窮山嵗三徂催科政拙民力蘇黄童佩犢耕菑畬戴白未見空欷歔焚香晏坐臨綺疏三年不識園中蔬邇來結屋聊巻舒手抄平生未見書曼倩兩目如懸珠四十四萬何多歟較公所得無錙銖門生校讎誰與居我欲從公路鬱迃著鞭何時跨蹇驢不求奴飯馬青芻得公竒字歸自娛送元具茨歸黄山元祐宗師數聖朝兩公分路久揚鑣具茨人物真竒偉雙井風流未寂寥可怪魯山猶簿領不應聱叟是漁樵何時收拾江湖句歸作歌詩補舜韶太倉稊米集巻十三
