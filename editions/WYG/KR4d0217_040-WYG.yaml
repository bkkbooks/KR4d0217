body:
  text: 太倉稊米集巻四十宋周紫芝撰挽詞三十四首徽宗皇帝挽詞二首治格興王日功埀定鼎年重新周制度盡有漢山川寳墨星辰爛皇猷典誥傳小臣囘老眼埀泣望雲天二主器歸儲嗣神堯意獨髙帝方遊赤水人巳抱烏號萬國瞻雙闕三山戴巨鼇思陵風雨夜松柏漫蕭騷呉師魯挽詞少日詞華豹一斑暮年白髮老青山誰知筆下三都賦不及人間五兩綸麟閣未輸前日恨鹿門長享百年安他時隠逸書佳傳名在宗元季孟間唐隠士吳筠諡宗元先生王夫人挽詞藁砧髙義赫窮閻内子宜家恊鳯占茶乳未容収浄供蛛絲早已上香奩坐中有客思分髻林下無人解擬鹽他日諸郎盡臺閣㑹刋佳傳賁幽潜徐夫人挽詞蚤歲孀居婦職修凛然霜檜與争秋木蘭女解聽金柝共伯妻能賦栢舟鸞誥一封身未享木奴千樹子先侯可憐黄壤埋瓊玉十里虞歌滿路愁郝至之挽詞不見平生郝骩山滿襟青淚只澘然少時揷架空千軸老去㸔嚢止一錢挈榼暗思攜酒處跨驢誰畫作詩肩當時刻鵠終成鶩唾面應須使自亁哭劉元素前度劉郎跡巳塵交親零落倍傷神桃花句好人何在忍㸔風搖燕麥春日飲無何自醉醒平生種種是真誠不須私作門人諡君亦從來苦畏名中郎巳老元無子靈運為僧只在家斗酒隻雞吾欲哭不知誰為作侯芭劉元亢挽詞交遊半作白頭新不見劉郎誰與親東野命窮官止尉少陵才健筆如神皇天可是無公道舉世何由有若人醉裏廣文渠不識可憐官長錯相嗔悼友篇王次卿建炎三年冬朔騎方南驅王師一敗績列戍如驚烏賊將招叛亡操戈横道隅坐令江鄉地化作盜賊區平生金蘭友之子真吾徒避地出三物夷險兩不渝豈謂倉惶間遂有生死殊始時群盜來未識安所趨但聞戞金革門外争喧呼捫蘿得微徑宻雪方紛敷子時索我急出門衝賊塗遲子乆不至得報日巳晡夫婦俱見執擔簦入軍俘纍纍五兒女飲泣聲呱呱小雛從物故踉蹌走大雛長女留軍中繼釋二小姝藉草巳信宿脱死許可圖賊意欲解縳小試聊躊躇時方羽書至招諭陳嘉謨渠姦立授辭抗論苦未俞命子使草檄操筆徒嗟吁謂言不事賊髙目捫髯鬚丈夫賤茍活請就斧鉞誅袒裼䝉殊死肥白驚瓠壺其妻始就擒抱子俱沉濡牽挽負殘息凍凌去聲生羅襦時方燎濕薪四座圍諸孤可憐玉雪姿不受蛇豕汙須臾有健卒提刀血糢糊聲言殺藁砧憂憤攪鬱紆撫掌發浩嘆隕越不復甦夫義婦亦烈此事知乆無自古肉食者未必非姦諛生無骨骾資含死餘金珠石麟髙嵳峩豐碑樹龜趺生無征戰功祁連巧規摹誰知草棘中髙義屬䜿儒蔡琰既兩聘生子留單于晚歲遭阿暪愛惜存微軀蔚宗作佳傳浪與烈女俱世無採詩官盛事恐湮蕪子死不足惜㑹當逢董狐詹伯尹挽詞二首詹友端字伯尹詹郎胸次有竒兵幾為樓蘭欲請纓四海眼髙空燕雀百年身老困鯢鯨跕鳶不用傷遺恨蒼狗何嘗有定名勲業轉頭渾似夢却將五字作長城平生危論劇傾河應合飛騰上諫坡富貴腥羶真夢耳死生名節奈君何欲求佳傳無千斛但把青魂付九歌斗酒淋漓澆宿草西風老淚不勝多呉夫人挽詞懿德閨房重髙名逺近稱流年忽成夢素節尚如氷法悟無生忍襌參最上乘應憐女博士空近讀書燈二素幔秋風急烟峯曉日殘香沈金獸在鏡掩玉臺寒恩巳霑封誥人空委珮蘭他年作佳傳誰為考幽刋李卿挽詞李侗字誘衷東漢埋輪手開元御府卿名因射策早恩許故家榮竟失鵷行舊空乗馬鬛旌他時雙驥子萬里是歸程桐川太守母夫人挽詞夫人無復擁魚軒旅櫬歸來倍黯然皂蓋朱轓今有子布裙椎髻舊推賢餘哀盡入虞殯曲盛事當隨列女篇忽掩幽墟可無恨誥封生享更髙年哭呉與行二絶呉時字與行李廣平生竟不侯功名㸔得鬢霜秋學無西洛時難偶人似南金價未酬投筆文塲日未西春蠶食飽速於飛充庭不是無前列從此元江九肋稀聞侯元進死薄宦時難得餘生老易分人言侯叔起詩學鮑㕘軍未補胸中線空修地下文欲尋髙宻語應怕虎狼羣二君在漳溪病相逢特地歡句新詩屢出談劇酒頻寒夢作三春别人成隔世㸔無由弔塵几只有涕闌干悼舒永豐舒賔王字利用卒於信之永豐令舒侯九秋鷹未奮老拳翼平生流輩中肯數程不識庾公開幕府少作九江客風簷掛虛樓夜月浮大白飲氣吞江流髙談傾坐席一朝風塵暗孤壘困劇賊艨艟浮江下雲霧蔽天赤坐中嘬䏑兒相視無人色手持白羽扇奮身追危壁坐解兩家難稍稍無勍敵身幾落虎口名不掛賞籍鳥去良弓藏論功止投石歲晚猶折腰得邑亦甚僻似聞山中人盡飽太邱德官謗殊未眀此責詎可塞乃復令斯人含恨入窀穸風亭分客袂僅作秋夏隔奪我玉面郎江湖坐愁寂撫棺欲三號何由反鄉國元具茨不起道州之疾哭之以詩元勛字不伐一别魯山三歲餘西來消息未全疎白頭忍雪舂陵涕闕醉纔乾廬阜書晚路得州真似斗平生彈鋏竟無魚漫郎猶有新書在千古風流不負渠沈貴池挽詞沈肇字彦述澤宫當日喜逢君雞鶩初驚鶴在羣果見亷平清似水不嫌名宦薄於雲一區未買江邉宅三尺誰澆隴上墳自古逹人俱冺滅固應知有沈休文李使君挽詞三首李彦卿終於宣守治劇知公老更優何嘗箕斂急征求誰言粟自關中漕但見錢從地上流已報南來三日政為寛北顧一時憂皇天自古無公道不遣劉郎到白頭溪頭萬杵響春雷談笑争㸔雉堞開鼛鼓不須催晝急麗譙疑復自天來一樽誰酹風前酒萬栁空埀雪後栽魯史書城三十六不殫民力獨公才使君投老益精明三換魚符寄一城漢相未曽除郡守蜀祠空復拜諸生他年宿草人誰弔當日清泉我作銘萬里巴江消息斷不堪斜日上寒旌蔡氏夫人挽詞夫人蔡天啟之妺中郎文采照當年婦德尤稱女弟賢長夜忽成三尺壠異恩來自九重天名留仙籍誰能見事載銘詩世謾傳想得伯鸞懐舊恨摩挲歸櫬一澘然方桐川挽詞懋德守九相善人淪沒意如何細說平生恨轉多此日飛騰只蘭省當時準擬上鑾坡十年猶記燕姬舞一曲今悲鬼伯歌欲問哭君多少淚未能注海亦傾河周脩武挽詞懶隨車馬著冠裳便築華堂作醉鄉遮眼不知山幾疊供閒自有木千章平生隂德應無數他日髙門未可量我亦元無諛墓手斯文聊付起家郎弔孫雲老雲老少年謝去場屋詩甚髙而豪於飲孫郎涉世似虛舟一醉從前萬事休千佛經中無姓字八仙歌裡見風流清詩便與重泉隔客淚空添晚歲愁隴上只今多宿草為君何地築糟邱哭二羅靖仲共竦叔共平生交友懐三益晚歲悲酸弔二羅地下忽埋雙白璧人間真是一南柯篇章零落知誰管人物風流竟若何未有隻雞澆斗酒空令老淚作傾河弔陳相之侍郎疇昔相逢十載餘巳驚白雪鬢疎疎臨安初見公年才四十餘鬚鬢俱白長鳴本是空群馬入社猶為漏網魚醉到湖邉誰共酒别來江上苦無書風流文采今何在只有傾河淚滿裾相之詩甚工而名不在江西詩社中故有漏網之句九道江中弔趙温叔昔飲江南酒劉郎鬢未華無依憐晚歲死賊痛全家夢隔泉臺乆魂歸故國賖與誰山下路同折凍梅花太倉稊米集巻四十
