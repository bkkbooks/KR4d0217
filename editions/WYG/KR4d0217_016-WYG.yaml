body:
  text: 太倉稊米集巻十六宋周紫芝撰詩四十首官軍屢捷淮寇漸平五首遥傳班馬動歸心鐃歌馬上静喧豗從此自應如振槁將軍勲業似淮隂擁道行人撥不開檻車行看縛戎魁羽書便恐椎門入知是淮隂露布來風聲鶴唳是王師大似秦苻欲破時黄屋乍聞天一笑此歡應有近人知棗熟梨黄河朔秋頗聞箕斂不勝愁迎師已欲攜簞食臠䏑何勞費萬牛新得降畨壤地開玉觴爭奉萬年杯明年御棗紅千顆又見青徐入貢來立春日聞捷未獻椒花頌先頒鳳厯春亞􅁫雙燕小埀鬂綵幡勻兵已知塵逺歡應與嵗新遥聞漢天子喜色動中宸題李彦恢家龍眠七馬圖古來畫馬知幾人當時只數曹將軍龍媒貎得照夜白七十萬匹空雲屯但令韓幹作弟子未許韋偃窺藩垣風流掃地五百載始得龍眠空馬羣龍眠自是天下士胷中元有真騏驎寜王玉面久不見風騣霧鬛驚猶存四蹄翻風不受縶意在萬里絶馳奔安能局促鹽車下更與蹇驢分短轅先生既老誰入室後來只數城南孫孫郎繼死骨又朽人間此馬如浮雲勸君掩巻勿浪出世無九方誰與論題彦恢家仇池四石刻伏波南來自交趾可笑汗牛推薏苡人言包裹足珠犀誰識閒身謝簪履如何當年元相國胷中飽飲貪泉水胡椒八百亦安用坐此殺生真可鄙龍眠主簿亦兒嬉銀鈎蠆尾搜遺竒三年獨有一錢在歸來清節人皆知囊空安得紫絲帳車重只餘黄絹碑自言所至輒寓目窮搜屋壁翻階墀不嫌尤物觸時禁恍然入手心驚疑君不見嶧山篆刻焚野火磨崖萬仭髙崔嵬何如四石横棐几左提右挈行相隨正月十五日同圓明老師渡谿西雨作不可囘三絶伴師同拄一枝藤野岸凌兢踏斷氷老去莫辜元夜眼試憑江閣看漁燈舊時好客孔文舉無事長隨支道林燈夜羞歸對妻子傳柑知我已無心一别風塵客恨長鳯城燈燭記㣲茫人生相見知何定夜雨重來此對床次韻和荅圓明老師二首平生作劇謾逢塲枘鑿由來苦未當笑我彈冠方適越看誰紉佩獨沉湘捧心政恐元非病怒臂前知不自量它日小松山下路合分風月與徜徉囘首雲庵日又低孤䭵欲渡晚風吹桃花水暖拍隄去蓮葉舟輕隨棹移老罷轉知身是夢愁來只有鬢成絲人間無地安雙足萬事從頭媿老師次韻元素賦余新居一樽能此共窺臨草色凄迷步履深黄㡌青鞋聊偃蹇白衣蒼狗自浮沉瓮頭酒熟須同把窻下詩成亦共吟待得吾廬真可愛更須繞屋樹成陰元素再邀同賦載酒何人肯見臨情於老伴莫嫌深誦君詞賦疑仙去笑我功名付陸沉且可閉門留客飲不知擁膝是誰吟幅巾趁取春猶在來聽黄鸝喚午陰元素再邀同賦家住三峯頗下臨畏人小築不辭深南齊謝老棲空在東海麻姑信已沉恨子不當青瑣闥伴人猶作白頭吟我窮無物能娛客只有蒼梧滿地陰望故廬一首并引余有先人敝廬邈在城南建炎之亂焚蕩靡餘後徙卜陵峯之巔下視舊址隱然在目前乙卯季春二十有六日晚雨新霽夕陽滿山逺目所遇可數毛髪稚子指故處以示余望之悵然念昔遊之如夢悼海宇之未寧乃繼前篇聊以見意龜城去江邈在一隅我家龜舫亦足軒渠草耕木茹瓮牖蓬樞有客二人寔邀望舒長鬚之奴玉川之廬何必仙去方丈蓬壺何必校書起居何如無禍為福徐行當車我乎誰交誰乎我徒春蛙嘈雜夏木扶疎大盗遽起山摧海枯我焚其巢將焉適歟善刀而藏為之踟蹰望我故處宛其在塗我友云亡云誰與娛願洗甲兵肉四海臞奠我新宅以飽三餘次韻趙戒叔燈下見榴花明日重午醉㡌風前著榴花燭下看嫣妍為誰好流落未妨歡故國應千里歸塗夢百盤明朝是重午努力願加餐次韻戒叔增明閣晚眺朱閣瞰流水曲欄横晚天薄雲初過雨髙柳却鳴蟬杖履且終日風塵今幾年莫將懐逺句重說舊林泉劉公祠劉晏燕人以救宣圍戰没昔嵗金人始南渡官軍夜遁如脫兔孤城何啻累卵危勁敵不殊羣蟻附夜提王師來解圍燕中老將如猛虎平明横槊屬兩鞬疋馬馳從敵營去崢嶸但謂氣可吞倉卒不知身已仆平生三箭得天山白骨看成一丘土馬前班劍不動塵猶勝車中三日婦送江子六朝固陵夷佳士亦間出風流數後來諸江有人物總持偉文采文通頗超越清忠若休映對賊能抵突定知蘇屬國不為延明屈斯人黄巻中願見未可必誰知有來雲遂入諸子室相從忽三年不見無十日人生㑹相别此别殊慘慄相望𣺌江湖時危盗如櫛願言加餐飯栖遲且蓬蓽時來亦騰騫安用苦密勿尺素倘可通公當念伊鬰次韻聖謨見寄二首十年悲兩京萬騎開幕府誰知鹿門翁逺引脫罪罟吾衰固安用文字考前古尚煩金蘭交弔此飢寒苦龎公不可見賤子何足取青衫幾痴兒歛版上公府固應横海鯨不可汙池罟髙才乏近用初不異今古功名亦偶然慘戚良自苦冨貴如公等唾手自可取次韻木南稀見贈上章分得鑑湖春賀老前身恐是君常病薫蕕難共器豈容雞鶩可同羣已無若若纍纍意頗坐竒竒怪怪文稍許白頭親杖履少年功業付終軍蠧魚山堂夜雨如決渠黄梅半熟書生魚樹頭朝日忽復出聊向空階翻故書老人耕鑿無膏腴緗囊細字時相娛自欣引睡得黄嬭便恐無意呼青奴讀書本不求甚解姓名足記知有餘此蟲何乃徒飽腹死葬書葉真痴愚不如化作石帆山下蠒織成吳綾光滿眼乞與袁娘作舞衣常把花枝侍君輦西齋聞禽時往池陽西齋草樹頗蒙密竹暗城頭不通日風晴髙柳恰飛綿花盡黄蜂未成蜜北窻也復可憐人亂離十載空傷神病對青山疑是夢眼驚新緑已無春羈懷有句喑不吐終日無言聞鳥語寒窻窈窕不嫌風晩色溟濛却宜雨穿條隔葉止復啼白粉畫眉金作羽應為山翁久慣聽聽久不知心轉苦廟堂何日議銷兵攜手尚堪歸樂土還我花姑溪上椽卧聽春禽囀桃塢五月二十九日對雨懷舊危坐東窻日自長幽人不出雨何妨未論飽飯三秋樂且說髙眠一枕凉晴後却疑猶㸃滴夜深應是更淋浪此聲有味知誰解安得君來與對床余既作前詩已而復晴客有誦余舊詩者其畧云開門更待西南月無客來分上下牀聞之恍然如夢中語漫不省記為何詩也乃和前篇以足之貧共閒身味轉長雨随農事不相妨莫嫌旅枕喧朝夢要與書檠作夜涼黄犢催耕思莽蒼短蓑埀釣念滄浪開門更待西南月無客來分上下床後二日望東南大雨久之白龍翔於雲間掉尾而上老農云白龍見則旱祥也白晝鈎簾望處長初於眼界了無妨坐看雲嶺埋烟雨聊借西軒作晚凉巻水翔龍方矯矯轉山飛瀑更浪浪豐凶許事誰能問獨對殘書月滿床旅夕秋雲翳長空㣲雨餞殘暑新凉入郊墟中田熟禾黍秋蟲自知時入我床下語西風幾何時秋意遽如許曉色催鳴鷄孤砧急寒杵遊子未得歸留滯在江浦生理思田園飢寒念兒女持此兩鬢霜世路復焉取起視夜何其江月方欲吐便當隨孤鴻雲霄肅雙羽次韻章季常見予所賦彦恢家七馬四石二詩灞陵老將身未矦連城價重誰當酬龍眠三嵗亦何有滿載緗囊歸汗牛蒼珉照眼裂躉尾尺素抹電飛驊騮春風吹晴作妍暖棊窻剥啄驚紋楸慇懃喚客出竒玩一笑終日君家留此郎胷中有竒䇿未能竟借前箸籌波瀾収歛入詩律報章還得明珠投九重真龍想天驥入木八法餘銀鈎只今尤物不到手空花老日生雙眸章侯嘆息恨未見但聽寒雀空嘲啁平生欵乃不成曲無聲可和綿駒謳次韻季常疊前作見寄人生冨貴如五矦禄豐位大功不酬朱輪華屋令人羞一蓑不如歸飯牛自駕欵叚馬少遊勝驟玉腕尚書騮少年蹭蹬在邱壑晚嵗風雨悲梧楸江邊短艇苦喚我此心勇往誰能留幽期正怨齒髪悞事定不須龜筴籌言雖太漫君莫笑與語俗人真暗投香秔炊熟碧鱸美横江已辦秋風鈎胷中它日幾雲夢四海不勞圍寸眸肯聽兒女昵昵語秋蟲悲笑徒啾啁陽春白雪一落耳竹枝凄怨慙蠻謳次韻馮逺猷觀水帶雨山雲晚尚繁黄流先已漲江干海邊鷗鳥恐不下濠上遊魚誰肯觀錦里十家俱半壁龍門八節定無灘早知四載歸神禹疏鑿誰能泄浩漫次韻子雍同達書記遊安林江湖流落一烏巾同障西風滿扇塵試為支郎吐幽句了知長吉是前身欲寛江上三年夢更碾禪房一掬春不為相逢苦相挽行吟應在楚江濵逺猷家髙麗松扇三韓使者身堂堂手持漢節歸明光寳刀不受戎王燕便面空含風露香雙鸞織花大如月凛凜猶餘嵗寒節莫將七寳畫團欒乞與誰家小桃葉西齋金鳯花開百餘日相繼不絶難其能久而惜羣芳之不留也昨日晴天花滿樹今日風前已飛絮閒花可是天與紅着意東風吹不去偶然乘此花樹空遂擥春暉學飛翥人間此鳥乆不出擬欲髙翔入鵷鷺凌傲風光不自羞狼藉空庭復誰覷自應斂衽避芳塵一笑非闗迫遲暮可憐開謝百日中浪遣花神費調䕶嶺梅何事挽不留零落風枝怨寒沍贈别木南稀月下吹簫王子晉醉中騎馬賀知章無家只賣文為活有酒聊憑醉作鄉夜雨對床驚客枕秋風無淚把離觴閬州此去如天上說着城南只斷膓徐使君新作採菊亭使君占吏師老手便治劇論功飲無何課最上殊勣人言神爵中有此二千石擁麾幾何時千里靜森㦸遂移佳菊苗步着東籬屐南山忽當眼淨几分晚碧黄花行欲開吹㡌盡佳客豐年公事少閒日頗自適便恐趣公歸翺翔步丹極曉枕夢催班朦朧想山色陪徐使君登秋浦樓白髪衰顔已倦遊倚樓端為使君留天連逺嶠雲埋樹波撼孤城水繞樓有客自傷愁外眼何人解冩雨中秋世間無此登臨勝休把城南說閬州二十三日雨霽再陪徐使君登秋浦樓細雨愁雲特地晴重來水秀復山明江風吹面滄波動嵐氣侵衣翠潤生南浦落㠶催畫角麗譙殘照滿雙旌未知九日齊山㑹樽酒何人與共傾太倉稊米集卷十六
