body:
  text: 太倉稊米集巻二十四宋周紫芝撰詩五十八首甲子春日二首燕來不擬著簾遮要聽雙飛語日斜芳草滿庭人不掃東風吹盡石楠花海棠枝上曉鶯啼梔子花邊蛺蝶飛貪看游蜂偷蘂去不知雙燕得泥歸與王漕乞張右史集二首文采推前輩兒童識姓名日邊張右史江左謝宣城自恨空飄泊無由見老成著書如可得尚足慰生平二張緒風流士文昌古淡詩發揚知有助埋没竟多時公已勤讎校神應作䕶持何當遺珠玉璀璨滿書幃對雨風細寒猶甚愁多睡更濃閉門春色裏盡日雨聲中草各爭先出花皆稱意紅故人書信少不記此衰翁晚行湖堤望南山諸峯曳履步逺壑挽衣枝短笻霽色過急雨餘霞漏微紅照眼一湖淨環湖幾山重不知何禪燈明滅蒼翠藂但聞煙霞間繞山鳴亂鐘暮年行樂意不與足力窮明晨倘可遲尚堪歴諸峯有幽固當探無客誰與同餘子不足偕形往影自從言旋且當爾興在何由終謝曽同季示近作因以為贈老色秋蒲晚朱顔玉樹春年方賈生妙詩似庾郎新黄墓初傾葢青墩欲買隣知君真似舅笑我作陳人同季幼安之甥同季再見和二首復用韻以謝花似今年好情非舊日春光陰愁裏盡風物眼前新愛酒聊呼伴無醯懶乞隣姓名誰掛口肥瘠付秦人海内同為客西湖共送春定交前日意識面此時新一笑欣良㑹餘生得善隣風流美無度往往似前人送秦德久守安豐師行朔野不記年兩淮千里無炊烟君王偃革似建武始遣循吏來安邊今日安豐非故壘夜聞漁歌隔淮水况當兩國不交兵髙塹深溝豈須爾朝不鳴刁夜滅烽吉語上聞天自喜但令南畝棲餘粮盡驅流冗歸故鄊㑹見今年八九月處處棗紅梨子黄四郊無兵門有㦸淮上山青淮水碧樽前一曲柳枝歌釀酒擊鮮公燕客客有為予言笋不可食食之令人瘦者戲作二絶為解嘲庾郎三韭坐清貧眼看將軍肉十斤㑹遣胸中有千畝不妨人似沈休文園蔬本自不全貧今日真成笋作斤巳恨此生相見少更須儂作解嘲文今日林中頗得佳笋用前韻閒尋黑靨猫頭筍自把長鑱雪色斤恨我家無渭川竹姓名不載馬遷文作葅須趁笋如銀莫待成竿費斧斤安用截筒纒五采為人催草弔湘文劉主簿許餉苦筍未至苦竹岡頭竹似雲劉郎何事不揮斤杯盤倘使同吳俗荼薺誰能作楚文未敢煩君便指囷且看分筍不論斤此君自是盤中虎空想斑斑箸下文杭人重苦筍呼為嚇飯虎西湖春事五首兩髙南北擁烟鬟渾在溟濛細雨間寄語丹青王右相不須水墨畫春山老去無心作好春曉來風雨故欺人從教髪白桃花笑不管簾埀燕子嗔顛春柳絮風前落臥水桃花鑑裏開沙上鴛鴦忽驚起背人飛去不囘來寒食人家畫鼔撾踏歌聲裏月生華無人來祭皇妃墓空唱吳王陌上花半埀羅幕䕶紅粧閒繫青驄在緑楊樓上日長時度曲路邊風過忽吹香晚出郡城天街打鼔出城門暝色侵衣欲破昏湖上晚峯横玉玦馬頭新月上金盆次韻强常州見寄門前冠佩眼中稀家在西湖水繞扉每對鳯姿羞羽翼更因魚目得珠璣身閒聊伴蒼官語詩瘦空慙笨伯肥别後清言應亹亹不知談麈為誰揮天申節湖上早歸昨夜雨如許今朝雲復開鳥聲呼日出湖水上隄來贊祝人天喜鏘鳴劍佩囘歸途似明鏡影落翠鬟堆食新秔有感玉粒新秔五月黄中含風露晚秋香但令雲子流匙滑莫管吳儂眼下創次韻曾同季悼其㓜子曾矦名家郎家有玉頰兒渥洼出名駒丹穴生長離春風入庭户獨秀蘭與芝未乾弄麞墨遽草騎龜詩我昔少年日屢作哭子癡須煩六如偈為洗長年悲韋深道寄苕霅舟中六言五首韋許畫舸一㠶烟浪薫風十里荷花更着千岩萬壑相隨泛宅浮家水繞臥沙鸂􅈃浪翻擎雨芙蕖向晚柂樓獨倚共誰同看跳珠韋郎無意剪白次山亦漫為官要遣苕溪風雨飽君筆下波瀾滿眼紅粧迎笑昔年遊客經行忽得風前麗句似聞蓬底波聲我作三吳短夢小安近水茅茨解養能言鴨子閒看似酒鵞兒西湖月夜月到中天火未流水邊風露已含秋問誰乞取西湖角紅藕花中著釣舟菩提小軒驟雨晚晴杭潁雌雄本自殊淡粧濃抺是吳姝滿傾漲玉千鍾酒來看鎔銀百頃湖白鳥去邊山潑黛緑蒲疎處雨跳珠不知能事王摩詰貎得西山落照無早發北山由麥嶺飯大通登烟霞洞閣瀕湖兩峯髙屹立曉相望蒼凉昇海日骯髒露千嶂羸驂絶坡陁岩谷飽追訪緬懷洪荒初藴蓄含萬象渾沌久已死倐忽真巧匠誰令鑿空手出此竒險狀中虚納游雲谷靜荅幽唱暗穴下無底濤聲想悲壯十八老聲聞附石出遺像誰其架脩椽置屋雲雨上青山不知數遶屋森百丈忽于兩峯間萬頃見烟浪澎湃海潮聲往往入藜杖天公知愛山令我拜嘉貺眇焉隔仙凡欲往漫惆悵便當學枯禪綺語蠲宿妄自足伴周旋長年此遐放題孤山柏臺城依舊繞長河結綺臨春往事多但見張妃似西子不知擒虎是閻羅當年已老瓊瑶樹此去空留鐵石柯喬木自存非故國何須仍唱後庭歌次韻周秀實寺丞七夕三首烏鵲橋成不恨遲隔秋相見豈無期姮娥空傍月中去嫁得星郎是幾時夜深閒把玉東西月下樓空畫幕埀人似天孫酒如玉夢中猶憶少年時無限欄堦月下兒遥瞻星斾却嫌遲催教織女梳雲髻想得無心理杼絲數日秋暑不復可堪馬上作此江上豐隆醖秋熱老病摧頺可堪說人行落日生黄塵馬畏長塗汗流血君看此處安得詩空學吳牛喘殘月北風何日掛駞裘長嘯灞橋驢上雪葉宣義家夀祉堂吉人為善天所彰效有遲速理則常葉矦天驥少未驤讀書過眼下十行易如翻水成文章學既日富名日昌謂取富貴如探囊當時餘子皆擅塲呼不成盧空繞牀直氣勇决何可當買田築室龍池陽夜光穿屋萬丈長人言家有明珠雙青衫歸侍讌几傍仿彿月中丹桂香要看玉樹爭芬芳擊鮮不羨游諸郎大裘執玉郊圓蒼厖恩厚澤均四方翁年九十鬢不霜錫以命服閭里光門前賀客俱奔忙手持牛酒填康莊遂摘天語名公堂不須靈夀扶徜徉髙文戞玉鳴琳瑯省郎言語如君房天公報德殊未央傳家奕葉夀且康王母晝着雲錦裳麻姑行酒傾瓊漿壺中日永醉玉觴赤松黄石相扶將孫仲益尚書詩贈吳益先吳出巨軸索詩少年名字滿賢闗薦墨誰能借一言子産自應知季札退之先已得何蕃孫公時為學官江無九肋空多士樹有三珠且共門益先兄弟凡三人晩路相逢歎流落可憐不第獨劉蕡木犀方花一首西湖八九月秋葉日夜凋兩山各崢嶸氣與秋爭髙天亦念幽絶芬芳托孤標要令列仙臞一洗桃李驕往往遣暗香時時入髙飇緑葉未改色㣲黄澹烟梢可愛不可名模冩徒自勞向來蠟梅花相去無絲毫但恨此花遲不借春雨膏尚可配精蘂傲霜分兩豪金錢不知數狼藉蒙譏嘲可憐貴人家漬蜜紛煎熬坐令林下姿半入金猊焦閨房漫脂澤此恨何由消登北髙峯一首鼔楫去故里攜孥客東吳湖山森照耀魚鳥相嬉娛舉目見兩髙欲上徒嗟吁人言不可往無路登雲衢盡力賈餘勇遂復酧宿逋白鳥入蒼煙滅没在太虚曉日沸晹谷萬川納歸墟海門豁中開怒濤喧朝晡盡注百丈江拱揖朝伍胥銀湖大如許僅可方覆盂諸峯如培塿瑣細不足圖寸眸一俯仰八極無遺餘苐恨蒼凉日悠悠迫懸車臨風一悵惘言旋戒危塗資國巨松伐為東觀材文字初離五阨餘緗囊縹帙秘新儲何人合在天東壁十八公堪作校書徐五十六索勤有種德二軒詩各賦一首徐從龍字羙租平生長笑韓潮州欲持讜議回冕旒讀書城南晩所賦無乃不為韓符謀人間達官可力取釣名但以詩為鈎汗牛充宇作底用富貴面熱渠當羞書生有書但自讀不必區區苦投俗偶然一擲便成盧雁塔朝題暮天祿吾言可咲君必䡖奔軍之䇿何足慿臨機應敵自子事此是宋襄仁義兵結廬湏種木樂飢湏種糓種木十年能㡬長種糓眼前無乃速人生安得俟河清誰能忍飢百年待徳成君不見千古一臯陶此事世亦少頗能化俗成唐虞何乃㓕國先六蓼慎勿説夢與癡人著意勸渠渠不曉南隣門耀三㦸光比隣牛馬谷可量浮雲變㓕那得常安樂只有襄陽龎中秋携小兒歩湖隄病裏三年月相隨過兩州為儂分素魄攜汝作清游草樹悲今夕家鄉隔去秋有身真似夢無地不闗愁二門接銀湖浪居仍在寳坊更煩山吐月來共水分光葉冷初翻夜蟲悲擬泣霜幽人看不足白露滿胡床送方元相還郊居雲從南山來邂逅成一雨秋風忽吹散霢霂不到土出固初何心歸亦乃其所但恨山中人弔影無誰語笑口曾未開語離遽如許到家應重陽精蘂亦已吐長衫隨父老社甕酌田祖悠悠臥黄雲坎坎擊醉鼓人生行樂耳何必浪自苦恨我繫㣲官何由共鷄黍古風二首夜夢乘輕舟掛席浮天池天池亦何有濤瀾靡津涯中有三神山樓觀何巍巍晶熒白玉闕彩錯黄金旗紫皇遣天風下吹仙人衣仙人不知名人言是安期我欲就與語弱水隔渺瀰鼔枻方少前風動輒去之仙人不得見遥睇忍言歸願言哀劬勞舉手援塵姿探囊得靈丹往往分刀圭使我生羽翼桑榆增暮輝矯首望寥廓雲日清四方梟獍各屏跡孔鸞亦髙翔鳯羽可為儀用以朝帝皇八音奏韶濩五色呈文章帝皇在殊庭斂珮方鏘鏘顧瞻丹鳯儔髙目振鷺行斥鷃獨何事乘時亦飛揚短羽無逺志控地搶榆枋卑飛固可笑摧折亦足傷願附􅞪􅞪翼託身雲漢傍放龜老黥得龜規小利小兒奪龜以為戲兒癡但作一笑看槁死生存兩無意乃翁不忍龜縮頭何如去曳長江尾流水長者亦念汝清江繡衣何憂苦不睡效張文潛寒沙宿鷺水無聲湖月留人睡不成便擬閉門尋好夢更聽鸜鵒轉三更觀潮示元龍越山莽蒼天山髙海門屹立通江濤江頭久客歸未得來趁吳兒看晚潮潮頭初來一線白雪浪翻空忽千尺地中鳴角何處來水上六花人不識驚濤倒射須臾空千艘已落空濛中錦㠶半臂浪花裏越商巴賈爭長雄江湖險絶長如此風靜潮平亦何事人間萬法有乘除却遣風波在平地客許惠木犀而花殊未開三絶秋雨不肯止木犀殊未開小齋寒索莫誰剪一枝來二黄菊無多子孤芳正要渠誰能把秋色分付木芙蕖三舊日江南路霜裘曉樹間無香供晏坐有夢到秋山旅夜栖栖羇客眼長開䔩䔩清燈落曉灰北鴈有情書未到寒衾無夢雨頻來今年白髪看仍少去日青春挽不囘别後故山應好在小窻辜負翠雲堆次韻飛卿隨計京華憶去年夢魂合眼到家山早無半菽能餬口晚得三鍾只汗顔老嬾不堪朱墨裡此心終在水雲間尺椽分我江邊路留與他年作往還次韻李子至與陳相之定尋梅之約篇尾見及謝朓樽前憶語離别來懷抱只愁知鶺鴒原近識君晚鴻雁書遥寄客遲何事不嫌霜後鬢尚邀同醉雪殘枝今年新得梅花句華萼詩中第幾詩次韻相之和李子至尋梅詩江南洛社各天涯何事髙人亦見思句法風流雲爛漫旅情飄泊燕差池樽前病骨難供醉花下枯藤可强枝莫喚孤山林處士揚州何遜自能詩太倉稊米集巻二十四
