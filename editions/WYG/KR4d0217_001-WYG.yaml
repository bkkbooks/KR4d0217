body:
  text: 太倉稊米集巻一宋周紫芝撰樂府三十首吹臺曲天門玉鑰雙龍開霓旌羽葢天上來管絃嘈雜入霄漢美人侍燕黄金臺羽觴行酒歡未足燕姬成行列紅玉梁王半醉起更衣夜按玉簫親度曲曲終舉袂俱爭妍拜舞樽前稱萬年三山玉女朝羣仙當時弄玉飛上天至今䑓下草如烟越臺曲玉顔如花越王女自小嬌癡不歌舞嫁作江南國主妃日日思歸淚如雨江南江北梅子黄潮頭夜漲秦淮江江邊雨多地卑濕旋築髙臺匀曉粧千艘命載越中土喜見越人仍越語人生脚踏鄉土難無復歸心越中去髙臺何易傾曲池亦復平越姬一去向千載不見此臺空有名巫山曲楚宫夜半旌旗動曉逐君王獵雲夢君王醉挽金僕姑笑射雙鵰落飛鞚霜風獵獵吹白羽狨鞍下時日未午天上臺髙翠被寒雨濕烟霏夣神女行雲飛去不可留却望陽臺無處所魂凝睇逺烟淒迷猿啼巫峽東復西江邊獵火一萬炬貂裘醉擁君王歸章華千門復萬户侍女焚香迎輦步君心誰能念舊恩忍淚悲啼不成語願夀君王一萬年常向陽臺夢雲雨白苧歌大埀手小埀手江南白符世希有吳姬十指玉纖纖白苧新裁舞衣小秋江四面繞吳宫吳宫霜橘樹樹紅吳王夜燕不知曉但見紅日昇曈曨美人低鬟復囘袖持酒獻君君一笑人生得意不行樂白日如梭夜催晝吳山依舊吳江清離宫故苑難為情不知誰遣南山鹿還向姑蘇臺下行五雜俎五雜俎壠頭水往復來玉關騎不得已從士子五雜俎雲際翮往復來長安陌不得已千里客五雜俎夜茫茫往復來鴈南翔不得已思故鄉茘枝香千秋節當八月五御樓巻簾看馬舞黄衫玉帶分兩行繡衣宫人擊雷鼓梨園法曲凄且清相傳猶是隋家聲宜春北院蛾眉小初按新聲未有名侍女焚香跪瑤席更看真妃作生日恰值南方驛使來旋採風枝露猶濕當時盛事人爭傳茘枝香曲是新翻宫中行樂事亦秘此曲不許人間聞馬嵬夢斷香塵息滿山茘子無人摘却歸西内冷如氷一聽遺音淚空滴武谿湥五谿妖蠻盤瓠種穴狐跳梁恃餘勇漢庭老驥聞朔風兩耳如錐四蹄踴南方毒霧堕跕鳶五谿谿深軍不前健兒六月半病死欲渡五谿無渡船將軍誓死心獨苦本為官家誅黠虜誰知君側有讒徒剛道將軍似賈胡人生冨貴一衰歇㑹令薏苡成明珠祁連髙結衞青冡文淵藁葬無人送至今行客武溪傍誰為將軍一悲慟公無渡河清江漫漫日夜流江邊無風人自愁馮夷擊鼓河伯怒蛟龍掉尾魚吞舟人生一死亦難處何不相從聽媪語公無渡河公自苦人心險過山嵯峨豺狼當路君奈何勸君収淚且勿歌世間平地多風波飲馬長城窟行長安城邊邊地永萬里沙場地無井秦人掘土土作城城下窟深秋水冷漢家將軍號都䕶西征上隴寒日暮野駝跑水無處尋飲馬長城窟邊去長城窟古來戰死多白骨征人半作馬下塵猶向隂山鬬馳突去時寥天霜雁鳴歸見玉闗春草生將軍功髙封列城鬬死伍符無姓名金童歌并引漢武帝作金童仙人以承露盤魏明帝青龍間詔以車西取及臨載仙人乃澘然淚下唐詩人李長吉作歌以哀之杜牧之為賀作集序獨於是詩有取焉予因讀長吉詩愛其竒古然味牧之所謂其於騷人感刺怨懟之意無得而有焉乃為續賦以系樂府之末武皇開疆三萬里滇池初穿栢梁起更鑄仙人承露盤萬歳千秋奉天子當時謾説邜金刀誰知更有當塗髙銅雀臺髙阿瞞死八方才人閙如蟻玉井綺欄心未厭猶取金仙着前殿金仙辭漢憶漢主登車殷勤埀玉筯獨捧金盤出故宫囘頭忍看咸陽樹魏宫羣臣眼親見朝着魏冠暮歸晉可憐長安肉食兒不如頑銅猶有知日出東南隅行春風淡蕩春雪淺陌上柔桑青宛宛青天易雨亦易晴吳蠶催眠欲成繭羅敷採桑南陌頭翠鬟􅀢鬌光欲流羅襦吹香白玉佩青絲絡籠黄金鈎君王年少如秋水欲學鴛鴦對飛起贈君身上雙明璫結君同生亦同死羅敷歛衽前致詞詞多慷慨中含悲念言夫婿良家子委身結髪為夫妻人生匹配各有偶願逐狗走隨雞飛江水可竭山可移妾心皎皎君當知烏夜啼黄門急詔下趣封南郡王鸞輅儼且深班劍列成行建以左纛斾樹以羽葆幢骨肉厚恩義門户生輝光分封得大國四境彌土疆那知以嫌猜將身觸嗔怒徵我還上都令我不得住奪我封矦印被我五兩組低頭屏氣息對客不敢語紅窓昏夜燈白淚墮秋雨鬱鬱兩大樹依依近墻宇鴉鴉枝上啼腷腷振兩羽沉沉夜未央紞紞方三鼔侍兒聞之喜攬衣中夜起起敲齋閤門秉燭具肴㫖再拜前致詞靈烏未可鄙吾聞烏夜啼霈澤覃萬里杲杲方平旦使者已在門官家有詔書為君敦厚恩舊憤知己釋徙封意增勤客有鮑書記當代稱能文命作啼烏曲樂府傳清芬人生欲冨貴生身恨不早富貴豈不好危機亦難蹈古來兄弟間生死在一朝煑豆然豆豆葉焦靈烏莫厭聲嘵嘵上之囘漢宫三十六複道髙崔嵬皇情極遊豫警蹕北之囘蒼螭挾龍輈風伯清路埃羽衞森戞擊玉輿久徘徊青娥絶望幸故宫秋葉催舉頭望霄漢白露零玉階得寳子􅅾萊宫中春草緑君王無事歡不足宜春北院小蛾眉日日霓裳按新曲侍女傾心復盡計歌舞君前不如意今年新得太真妃從此龍顔不勝喜望春楼下紇那歌枉說揚州古銅器梨園樂府兩部齊盡歌樂府新歌詞君門誰道九重逺嵗久歡聲聞逺夷漁陽萬騎倉黄入帳中妃子吞聲泣當時掌上不忍看玉骨埋時烟雨濕屬車塵逺空郵亭郵亭牧豎嗟娉婷凌波襪在香未絶萬人爭看俱傷情一朝持入咸陽市空得千金賈客驚昭君行漢宫侍女知幾千爭妍取寵俱可憐誰知恩愛託畫手黄金買得昭陽眠昭君自恃玉顔好未信光隂鏡中老不知萬里嫁單于憔悴蛾眉葬秋草憶得昭君初嫁時含羞忍淚無人知朔天漫漫沙漠逺空抱琵琶說别離捐金得寵固可恥委身絶域不如死世間妍醜何曾分自古賢愚亦如此烏飛曲江雲欲雪江風吹王敦城頭烏夜啼雲深月暗風轉急驚烏繞樹無安枝狂風忽來飛不定夜半無巢何所依情知天公有風雨何不結巢髙樹棲君不見秦氏庭中雙桂美庭烏生雛八九子烏生豈不念髙飛託君庭隂飛不起那知君家輕薄兒彈丸脫手兩翅埀無巢悔不巢巍巍有巢悔不常髙飛人生禍福難豫期秋蘭詞萟蘭當九畹蘭生香滿路紉君身上衣光明奪縑素孤芳一衰歇凋零濕秋露佩服得君子亦足慰遲暮採摘良不辭新枝忽成故向來桃李場紅顔照當户紛紛自芳菲榮枯復誰顧金錯刀美人臨曉鏡睡足含春嬌手持白玉尺睥睨金錯刀欲将雙綵鳳對飛宫錦袍誰知逰冶郎經年事遊遨但知山上山不說大刀頭君看良家子盡屬六郡豪一朝著衷甲萬里隨炊刁家人剪春衫欲寄道里遙緘封望絶塞蓬首時自搔蕩子㑹當歸行人日儦儦别去隔生死不保夕與朝寄言樓中婦清淚且當收猶勝作征衣逺寄邊城秋湖陰行并引余遊于湖過王敦故城誦温庭筠所作湖隂曲雖辭彩光耀夐絶古今而誅奸戮逆固已無憾然敦之包藏禍心盖亦久矣東晉君臣不戒履霜以翦豪釐曾不若石崇厠婢知其他日必善作賊乃為湖隂後曲以廣其意石頭城南五馬渡一馬成龍上天去晉家天子再御朝洛陽敵騎空無數當時枉道馬與王髙官飽食豐豺狼車前已賜蘭斑物江上空餘劍㦸場日光射天驚賊壘封豖長蛇夢中起倉皇只欲玩遺鞭誰信龍媒已千里黄鬚有智人豈知不料將軍未死時着新脫故真是賊白犬下齧天應遲誰道晉朝公與相不及金谷園中兒隋渠行黄榆落盡河水氷隋渠兩岸無人行雪花漫天大如掌北風吹馬南人驚縣官藏氷避炎熱健兒鑿氷手流血安得身隨花石官當路誰人敢呵喝黄流千里凍徹底舳艫相仍凍銜尾天公便合囘陽和桃花水暖流春波望春樓上天顔喜齊聲爭唱紇那歌長干曲黄昏明月上朱樓簾旌射月香霧浮畫欄垂手樓中女對月低眉不舉頭人似長干橋下水一去悠悠幾千里謾道嫁雞逐雞飛長千夫壻那得知五男父白頭垂垂五男父一生辛勤立門户五男炊白割紅鮮阿翁採薪供五男悲風慘慘寒日暮翁入採山遭猛虎猛虎磨牙卧道邊五男持㦸誰敢前魔軍行五嶺南來山最多驅軍日涉千坡陁山中食菜不食肉十室九家俱事魔縣官給錢捕魔鬼八萬魔軍同日起將軍新破强敵囘馬前班劍如流水生斬妖精拔羽幢傳首天庭藁街死當時平田作戰場至今遺骼無人藏舊居雖在人不見破屋蕭蕭圍短墻野婦行新安野婦雙髸垂紅膏塗靨深畫眉青襜兩幅不掩骭赤脚一雙深染泥餉耕如賔有翁媪頭戴銀冠相媚好銀冠猶是嫁時粧馬上不知人絶倒長年相見無别離竟死不識愁眉啼紅顔暗逐春光老暮櫛常隨落日低秋娘一尺春風髻下蔡陽城盡風靡傾城可愛亦可憐野婦誰知有西子輸粟行天寒村落家家忙飯牛穫稻催滌場燎薪炊黍呼婦子夜半舂粟輸官倉大兒擔囊小負槖掃廪傾囷不須惡縣胥里正不到門了得官租舉家樂去年有米不願餘今年米白要如珠路傍老人拍手笑盡道官兵嫌米麤良農飬兵與敵競敵騎不來自亡命田家終嵗負耕縻十農飬得一兵肥一兵唱亂千兵隨千家一炬無孑遺莫飬兵飬兵殺人人不知寒食曲三月江南好春色買酒家家作寒食男呼女喚俱出遊扶路醉歸歡樂極街頭盡日無人行多在山村少在城踏歌賽願一時了上冢歸來聞笑聲豈料如今一百五畫㦸滿城椎戰鼔子孫半作泉下人薄酒不澆山上土死者已往生者存隨分歡娛各兒女烹魚裹菜當盤飱花作紅粧鳥歌舞君不見江南江北多戰場去年白骨無人藏木芙蓉歌吳江十月霜華淺秋空無雲霜日暖芭蕉樹暗簾幕垂木芙蓉開紅婉婉銀床露重梧葉飛金錢掃地秋蘭萎無人自對秋風笑黄菊葵花不同調慢緑妖紅解醉人徐娘未老秋娘少少年時節歡樂多紅蓮影落秋江波若耶女兒白如玉夜半採蓮聞棹歌驚風吹浪鴛鴦起囘頭日月飛梭裡對花不飲今蹉跎淚濕秋風當奈何雍門行憶昔長安晝閉門敵兵四面如雲屯嗣皇明聖日月出盡剗宿蠧清妖氛黄門急詔忽夜下驛騎四出爭馳奔明朝都人看傳首賀客縱横各持酒利劍空膏六貴人冨貴囘頭信何有一身成粉骨成塵當時近前丞相嗔髙臺曲池已荆棘援琴誰作雍門吟六貴人謂蔡攸等太倉稊米集巻一
