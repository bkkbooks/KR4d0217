body:
  text: 太倉稊米集巻二十八宋周紫芝撰詩五十八首九日陪李徳儀兄弟游石屋秋雲易雨秋日出九日隂晴苦難測氣如昨夜太暄妍雲似今朝好天色天公要渠作好語著意安排費天力重到孤峯最上頭四年不見煙霞秋吳山長與越山對海水自隨江水流江水相見只如此老大豈知爾許愁上山燃火入山腹下山騎馬尋石屋十八大士棲兩巖共向山中禮尊宿人言石縫泉作珠却繞山根走鳴玉珠泉得名固不虛虎泉作酌不滿欲山僧應復笑我曹醉中泉石䝉譏嘲涇渭分流正須爾美惡賢愚亦如此寧將鷄肋奉尊拳莫著陽秋在皮裡此語如何可便參聊供山僧一笑喜跳珠虎跑山中二泉名題齊安新刻雪堂圖名駒汗血乆不聞天遣兩蘇空馬羣當時二十出西蜀已説賈生能過秦玉堂詞翰不起草建隆以來能幾人功名後世只忠讜流落一生常苦辛心知才大難為用小折波濤入嘲弄偶結江邊一把茅來作黄州十年夢勸君慎勿剪柔柯雪堂楊栁公親種扁舟夜入赤壁江手持杯酒酹周郎酒醒月落賦巳就東方欲白天相將邇來不知誰好事盡寫公詩畫圗裡短軸雖在人巳亡空著江波接天起浮雲滅盡名不磨千古長流似江水次韻庭藻題寒林渭川二圖二首煙水蒼茫認翠巒寒林正在有無間何人乞與并州剪分取江南一半山煙梢零亂一川寒換得天孫錦繡端却憶東窓舊時竹年來新筍盡成竿送蘇元藻蘇侯新拜外臺官目送扁舟杳靄間我亦漫同千里月天教飽看七州山欲知此别無窮恨政坐相逢一笑閒携酒却來湖上寺不堪重對小孱顔游多福寺寺有佛牙光色殊勝而安定郡王墓在其後二絶吹盡青絲兩鬢華旋裁林下老生涯巳携齋鉢分僧飯更炷香雲禮佛牙千古風流挽不回滿山秋葉寄餘哀奏璈人去今何在誰釀黄柑薦一杯蠅館晨起效栁子厚拂席坐清晨幸脱塵事窘閒焚石鼎熏細誦華嚴品從迷索初心悟意嗟歲晚庭蕪日延蔓零落費鋤墾何當畧邊幅乃或窮奥閫餘年倘無恙願就一㕓隠悠悠藉至言廓廓窮妙本㑹須師瞿曇未足慕嵇阮勅局晨入效栁子厚朝陽下屋角白露收莓苔蒼黥知我至鈎簾喚風回破曉中庭花時傍修竹開事簡吏亦暇日髙官未來取我囊中詩炷香拂輕埃所恨諸公間疲駑愧非才敲茶驚午夢共瀹風前杯支頥坐晝寂細影移髙槐斯須各回鞭跨鞍尚徘徊雖非大三昧亦號小蓬萊寄題閻郎中家園亭四絶人間建業江山地天上星郎水石居擬作扣門看竹客可能容我小踟蹰嶺上孤松欹落照水中花島散餘霞人疑五栁先生宅又似三堂刺史家築成凉榭初宜月剪盡繁枝始見山天亦料公閒未得故教幽事頗相關屬玉雙飛下緑蒲小溪分水照林廬疏泉漫作江湖意不種封君萬尾魚相之庭藻邀賦齊氏赤芝詩歸雁亭空劍㦸塲天教人物發幽光書傳父祖人猶説名到仍雲澤轉長朱草只今應有譜紫蘭何處不聞香我無筆下芝房曲付與南宫二省郎九月十六日示内二首又見黄花日清觴且對飛白頭夫婦少無事笑談稀官小何時去家貧幾日肥更須煩徳曜相伴老殘暉小閣秋風冷青燈病眼昏酒重斟夀醆兒喜有雙親書種吾家事郎曺汝舊門人生唯老健餘合付乾坤木魚歌和碧巖子并引碧巖子夜宿官舎聞有持木魚報曙者乃作歌蠅館主人聞而和之秋蟾欲落霜滿屋道人懸魚擊刳木誰將發發水邊聲驚斷􅋜􅋜鼻中曲此生自是在家僧便恐箇中縁巳熟安得華鯨吼夜廊去趂雲堂五更粥劉蘄州見和木魚歌再賦二首秋雨平欺玉川屋向曉寒窻風撼木道人閒作木魚歌使君肯和無絃曲枯魚剥啄渠自鳴客夢依稀我方熟此身安得在蘄州去覔君家咄嗟粥五更木魚鳴繞屋喚起烏衣曉登木敲殘千疊萬疊聲亂盡長清短清曲天邊孤月猶復明世上黄粱欲炊熟老人雖起亦何營但飲南窻一杯粥碧巖子作詩為小兒求紋褓戯作三絶近來聞道得明珠丹鳳今年第幾雛㑹遣夢中分赤錦不妨衣上有天吴逸驥忽生千里馬新詩來乞百家衣老夫安得天孫段只有羊裘坐釣磯舊來人說陳驚坐真有詩如孟浩然莫厭敲門覔紋褓此翁衣鉢要渠傳次韻庭藻與陳相之李子至定尋梅之約見示西湖三見青春靣無人共醉山間梅晚逢詩老看古雅如入周廟觀山罍我所思兮在何許昔望長江隔淮楚三月春前始識君倚杖看花聴君語我今欲赴同襟期老情可得如年時清歡既少飲不足枯膓欲盡詩應遲衣冠此地多佳客相逢四海無南北天將此樂付公等一枝方訪春消息老夫老矣何能為折花夢作春山歸次韻庭藻折梅懐周秀實風流掃地難挽回二老人物似蘇梅時從花底飲落雪醉卧沙頭雙玉罍平時交分心相許晚歲相思各秦楚孤山籬落固依然縱有此花無此語周郎别去當有期歸來不復如𤓰時天應知客頗有恨花亦憶君尚未遲我游東吳身是客夢到江南與江北安得馬背如孤鴻萬里從君聊一息只今春草還萋萋㑹須急喚王孫歸次韻庭藻追記去歲與余游西湖舟中聞火而歸漫郎移舟入小回醉著幅巾歌落梅老夫但倚紫藤杖袖手恥看黄金罍忽漫相逢遽如許醉後髙談俱楚楚百尺君卧元龍樓醇酎我羞公瑾語從來悲樂難預期人生快意能幾時紅光屬漢勢未巳短艇掠水歸嫌遲只今俱是京塵客君居巷南我巷北天寒飢餓不出門遣騎時來問消息江邊乆客知何為白頭拾遺徒歩歸蔚齋山雲未成雨斂藏方寸間㑹當不崇朝一雨膏人寰人言隠霧豹依約在南山試從管中窺何止見一斑人生患無才富貴天豈慳二士偉人物萬里來間關行陳治安策遂拜咫尺顔豈容十里湖長吟對煙鬟願君如鸞鵠摩霄共追攀雲出豹亦變何止銅與綸舉首望長途分當落榛菅鵬飛君方髙鳥倦我亦還次韻庭藻讀少陵集李杜文章萬丈髙就中詩律少陵豪風流自是渠家事奴僕從來可命騷濯錦江頭可一杯碧鷄坊口草堂開十年劍外無相識黄四娘家幾度來玉燭初調大厯年先生偶脱萬兵前誰教早獻千金賦可得看囊更有錢睡餘賦東墻雪竹飽食枕方便過午茶未杵撥火理殘香倚窓翻故楮尋我東墻隅枝笻散腰膂朔風寒蕭蕭修竹静楚楚枝頭雪猶在秀色乃如許竹固不受寒豈但不受暑老翁日日來相期伴君語誰能與俗人昵昵作兒女章彦漙决獄五羊歸登鬰孤臺得東坡石刻見遺報以小詩一見蒼碑眼自開便疑身在鬰孤臺可憐决獄章廷尉不帯將軍薏苡來四聖觀後山亭附山結真祠朱門照湖水湖流中入池秀色歸净几風簾䆳旌幢神衛森劍履清芬宿華殿瑞霧䝉玉扆仿彿還神京想像輪奐美祈年開新宫祝釐奉天子良辰復難㑹歲暮得斯喜况乃清樾中飛樓見千里雲車倘可乗吾事良巳矣當賦逺遊萹未可回屐齒太一宫成奏告禮畢秦樞宻有詩示秘閣次韻一首三絶聖主均休錫庶民親祠遥望屬車塵雲旗欲下精誠格絳闕初成制作新肅肅衣冠嚴祀事雝雝簫鼔降明神椒漿一酌能多少散作人間萬國春漢家何事築通天漫費當年九府錢躋世本期開夀域祝釐端合報長年玉帛新祠太一神廟堂生育轉洪鈞侍臣俱從甘泉駕萬世何人繼後塵至治非關黍稷香可須巫覡降殊祥公今重草周公頌不和東皇第一章楚詞九歌祀東皇太一為萹首次韻伯逺梅花徐侯頓朱墨豈復知花時美人忽含笑臨鏡窺漣漪朝來摩兩眼喜作雲霧披須煩春草句詠此玉雪枝小忩惜無人共賞林下姿毛褚二三子亦足相遨嬉立春三絶句暖風融雪晴方好春意催年老自悲故國未歸空有夢梅花欲動又題詩地下青風欲到時土牛何得觧先知墻邊雪裡梅花樹巳借清香入舊枝多病誰憐澤國人眼明羞見綵幡新滿傾吳地千鍾酒細説長安六度春再賦立春效王建三絶蒼龍闕角曉光明日近彤庭瑞霧温殿下百官猶未入閣門催引謝春幡御溝氷暖欲生渦律管灰飛氣自和巳進玉堂春帖子六宫無事笑聲多聖明天子見昇平二紀頒春下禁庭今歲御前争進表明年七十賀慈寧七閩山中竹皆有實多至萬斛民賴以食歲且不飢作樂府短歌以紀異事將以俟採詩者擇焉蓋詩人之職也七閩山中地不足徃徃連山暗脩竹今年是處生竹花竹米登囷日千斛大家炊飯餉田夫小家作糜飢飫腹官雖賦田無上地民不扶犁得中熟福唐太守不敢藏青版成囊獻黄屋黔黎鼔腹慰天心宣付汗青書日録山中父老雪滿頭何曾眼見天雨粟漫將葆旅屬珠星誰問廟堂調玉燭人言丹鳯餐竹實玉粒先來自山谷㑹見雙飛入建章萬年枝並看鸞宿奉和黄文若贈刁文叔昔日風流守流傳父老知諸孫今若此天意了無疑醉裡開愁眼燈前得近詩聞名真巳乆識面更何時次韻文若贈黄叔魚倦客愁如許他鄉歲屢更衰顔人共笑遺恨老難平我欲隨歸夢君誰共月明嗣宗賢叔姪况有各才名曉枕不寐書所感三首昔年殘夢曉初回花上啼禽近小齋可笑只今春夢裡五更欹枕聽籠街南市津頭憶買船花姑溪上釣晴煙老來安得孤篷夜横枕蓑衣聽雨眠白髪心知萬事休力耕猶欲種春疇五更卧聽雞催曉殘月開門起飯牛晚霽欲歸三絶雨後兒童喜欲顛老翁不出自欣然晴天霽色渾無用只乞斜陽了斷編花樹忩前睡足時斜陽忽到雨邊枝白頭可笑閒居士又寫春晴入小詩印顆初封馬在庭杖藜猶傍竹邊行老兵莫漫催人去且聽幽禽説晚晴分雙魚箋贈徐伯逺水底雙魚不上鈎粉金翻樣滑如流我無三昧詩中手乞與君脩五鳯樓次韻戴文舉陳季陵見索故藁短兵無力可交綏强敵當前敢出竒况我龍鍾臨老日值君三五少年時擬將衝雪騎驢句換取看花走馬詩病思誰能更搜索但拳雙臂作支頥送文若歸嘉禾二首烏㡌猶衝九陌塵扁舟誰釣兩溪春乆憑歸夢尋香國忽喜清樽對故人滿眼窮愁嗟我老此生交舊獨君真華亭一水無多地細作來書莫厭頻將軍十載半鳴珂才武憐君中異科但把長吟作回雪不妨瀕海看熬波方愁隻影身如寄便買扁舟意若何一别應須五年事好詩從此為誰哦西湖詞二首吳中小女結煙鬟自打青腰唱採蓮欲趂歌聲過南浦藕花深處不通船湖天無盡月如霜露濕荷花别是香何處漁郎觧吹笛並頭驚起兩鴛鴦太倉稊米集巻二十八
