body:
  text: 太倉稊米集巻五十宋周紫芝撰雜説十三首為張子房招四皓書漢留侯張良謹再拜奉書商山四老人足下僕以布衣亡𨽻身無汗馬血刃之功徒以口舌奸説位列侯封萬户今秦滅楚亡天下大定而僕寵厚禄豐無以塞責卻糓不食行已閲歲于天下大計深慮不復敢効其愚議者讓僕曩與主上俱奮草野﨑嶇百戰之中足下言入則聽諫行如流身不親矢石語不下堂幃而所攻必取所嚮必歸是足下之功獨髙於衆人也至于脱覉旅艱難之苦享天下尊髙之位保全節于當年埀美名於後世則所以報足下者亦云厚矣乃四海既寧之後亡者叛者服之而禍起于宫牆變生于肘腋乃欲坐視不救使反掌之間治亂顛倒得不為天下笑乎僕今敢布懇悃之情以自列于數君子誠以情有所激勢有所廹而事有不得已也幸足下留意於僕使得借重于一言也夫以足下抗志希夷隠身遐曠天下莫不仰其髙雖巢由不足以並名夷齊不足以擬節是以年愈多而名益芳身不試而業盛茂公固無求於世僕亦何所進説于左右乎然良聞道不足以立已者不可謂義愛不足以周物者不可為仁權不足以適進退之宜者不可謂智以足下之全德豈亦有意于為義而無意于仁且智乎方秦氏暴强魚肉四海百姓􅔷寃飲泣無告始皇帝恐天下隂有議已于是姍笑詩書坑戮儒士鉗錮忠臣逺辱黎老以消沮豪傑當是之時智者巻舌而不言賢者裹足而不入足下方辭粟以茹芝為樂其計得矣今皇帝勇冠百王功施天地躬湯武仁義之兵而海内平踵堯舜好賢之轍而天下服大度豁逹禁網濶踈期與天下更始號為千載一時足下不能駕安車植鳩杖幡然而起以觀盛時竊為足下不取也況治亂之源在朝廷宗社之本繫太子太子安則羣心恱太子危則羣心憂何則廢立之際安危繫焉其勢然也今皇嗣既立仁孝聞于天下日者主上迫于宫中之議將謀易置舉世皇懼危不自安皆曰商山有四老人陛下之所願見而不得屢聘而不至其取信於時甚重老人一出上必大驚且謂太子以未施之仁未言之信而能屈其所願見而不得友其所屢聘而不至决非偶然者因從容為上言之則太子之事濟矣聞其遣一介之使奉咫尺之書執禮甚恭書辭極謹宜老人之一來上以安宗社之靈下以慰元元之望使陛下有貴老之稱而無拒諫之惡足下之名亦炳然不可復没矣君其鄙長沮桀溺輩偶耕遯世之跡慕伯夷太公二老歸周之義出而一言使天下安於磐石國勢重於九鼎然後振衣而歸反乎林壑以醉廣成之遐齡而追王喬之逸轍不亦善乎良也將操几杖而從之以望拜乎床下足下其毋忽焉幸甚不宣良頓首䑕視說余齋宿吏舎負日簷間有䑕晝游裵􅏆牆下顧影掉尾旁若無人度其與人相去不逮六七尺熟視乆之傲而不去余固疑其病而癡徐而少進又不去已而又少進則駭而逝矣度其相去僅在四五尺間矣言䑕目不能視三寸亦已甚矣其實不過三四尺耳三寸云者所以甚言其短也夫䑕黠猾而多貪猫懦弱好殺之二物能相制而不能相賢若其輕㨗而善走則猫與䑕同相似也然而䑕窘則投穴窮則縁屋二者皆猫不能制而䑕之遇猫鮮有脫者豈非以其視不能逺雖欲避而不可得乎小人之嗜利其貪如䑕其巧于周身則如䑕之有穴也其敏于避禍則如䑕之善走也至其遇敵遭變一敗塗地則忽焉而亡不保腰領當是之時猫亦得而扼其頸况于虎乎嗟夫使䑕不短于視則猫雖好殺而不能擒使小人而不短于智則賢雖惡之獨奈何哉故怙富貴者若可卜千載而不知鼎鑊刀鋸在前曽不遠三尺小人而不知者觀䑕視之說可也茍知之其誰得而制之哉劉高尚傳高尚處士者汾州安定人也姓劉氏家世爲農處士生九歲食而不肉後稍不言問以事則書而對其爲語初若不易知已而輙驗家人甚異之爲築别室以居乆之聲聞京師徽宗皇帝三使人徃聘之辭疾不奉詔宣和間朝廷賜號高尚處士而建觀以聚其徒且因以其號爲名焉靖康之擾𨽻人白其守使迎先生守爲具安車以邀之不至一日棄濱而來濱人大恐二日濱州兵叛屠其城肆掠千里先生在棣棣人喜其來太守爲掃郵傳以舍之供帳甚具先生見之笑而去乃即城隅治舍水傍濱人持金帛携室家以就其廬者往往笑之旣而敵大至城且䧟人之死于兵者以萬數而火不及其居就之者果頼以免敵人見先生皆下馬羅拜不敢入其里嗚呼其亦異矣余曩在京師時聞其事甚著後二十餘年官錢塘始識左從事郎王復字興周東平人嘗與先生之弟游得其事甚詳爲余言之如此其後濡須人王之道彦猷知余得先生之事于興周乃謂余曰子固知先生之事而未聞先生之言也先生之言曰世之人以嗜欲殺身以貨財殺子孫以政事殺人以學術文章殺天下後世余謂彦猷此佛菩薩老耼莊周之徒所以救溺起死還真之論豈區區爲世俗言語文章者所能至哉夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉至于袵席之上飲食之間其禍有甚于畏塗者而不知戒則是終不知嗜欲之能殺身矣黷貨之士食厚禄而取民財雖危亡之禍僅免其身而千金之産不足以供不肖子一醉之費人禍天殃不在其身而在其後則貨財豈不足以殺其子孫哉秦自商鞅之事孝公始用刑名而李斯之事始皇趙髙之事二世皆以是道百年之間天下之人不死于刑則死于兵葢不知其幾千百萬桑𢎞羊開利說以中主欲不過欲自售一身而已禍流後世至唐宇文融皇甫鏄之徒皆用其說以取尊位而天下自是數䝉誅求之禍其殺人固無異于以挺與刃行政之弊一至于是豈不痛哉昔人有欲註周易與本草者或勸其註本草曰註本草誤不過殺一人註周易而誤則其禍道也大矣不然孟子之闢楊墨子雲之詆讖韓退之之斥佛老其憂天下後世之意何其深且切哉後世㫁章折句背正失理之學興其徒從而和之更相標榜迭相師授以盗名聲而取富貴寖不可救此是徴之徃事而然非騐之後世也某聞先生之言嘗私竊以為嗜欲之殺身財貨之殺孫子與夫政事之殺人三者人猶得而知之若夫學問文章之殺天下後世則周公孔子之言也先生農家子未嘗讀書事師而有是言豈人中之知道者乎此與夫熊經鳥申吐故納新區區積歲月之功而欲著名于仙籍者固有間矣辛未雜書南徐張伯真嘗謂余曰子知卜者之有魏紳乎僕曰余不知也曰紳有異書知人生死禍福盍往問之余使人邀之紳辭以暮請以詰朝荷書而往書至盡發其篋得三百餘帙羅而置之坐隅徐曰子當以平生之大事問我余黙禱以二事占之紳執蓍而筮卦遇䝉命童子取某帙掲而視之則有男子之柩焉衰者撫棺而泣盖歲在戊戌之秋余以是歲有先子之喪也僕又黙而禱紳復執蓍而筮卦遇損命童子取某帙掲而視之則有女子之柩焉衰者杖而泣蓋歲在庚子之春余以是歲有母氏之喪也僕于是驚而言曰往者其騐若神來者獨不可得而知之乎紳曰當爲子筮已而告我曰某日有某事某月得某物閲一二歲而無一騐者吁亦可怪矣哉客問僕何為而然僕曰昔桞子厚説天台道士王遠知能知人死生禍福號爲深于易者甞作易總十五卷一日曝書于廷雷電大至火光入戸烟霧中有老人問遠知子所註書何在上帝命六丁下取言未絶口見青衣六人已執書而立且曰上方禁文自有飛天保衛玉笈金科秘藏之都子何人輙混藏緗帙余以是知天事之不可泄如此然則紳之書可傳于世而不爲六丁取則其不神爲可知矣世之昧昧者方且焚香叅心再拜稽首而問禍福于紳亦可笑矣雜書余爲兒童時家有珍珠鷄羽毛皆淺紅間以白㸃圓細如珠故號真珠鷄出隴蜀荆楚間春月天色暄妍睥睨旁無有人輙振翮出錦繡垂領下紅緑間錯成文狀如方幅或綰結如緩帶聞人足音旋復收去甞隂伺之盖非出于吻喙間似自其喜氣凝結而成即而視之不知其處嗟乎鷄之有文惟恐人知人之有文惟恐人之不知孰謂人而反有媿于鷄乎烏有白衣而脩尾者其潔如玉人謂之白練帶以其尾而得名也江南人謂之紙錢鳥見者必唾避號爲不祥以故不爲人所珍玩余甞謂鳥白其身人或惡之人白其德㡬何而不遭誣衊之事耶昔人有言皓皓者易汙嶢嶢者難全信哉斯言乎辨讀來生書有一老人年埀八十誦書不止或問之曰先生年幾何自苦如此曰余讀來生書也余戲之曰君昨日所誦書今日盡能乎曰不能也余曰書猶不能記而况來生乎老人不恱已而語人曰人之所以死而甞存者必其神靈不昧如百鍊精銅愈乆益明若生爲腐儒則死作闇鬼雖唇腐齒豁何補來世于是儒者聞余言皆以爲然佛者聞余言亦皆以爲然盖余之所論者理也書座右屏姑息似仁訐直似義大佞或以爲禮大奸或以爲智小人視之一毫髮比君子視之天之與地審處于兩者之間著其誠而去其僞外以是而觀人内以是而察已内以是而察已勉强而行之是謂盛德之君子乎客語荆州多别駕見過因論佛果禪師在成都時一病愈劇炷黄艾至千餘壯呼羽流作醮七晝夜而死多公云曾子啓手足昜簀而終孔北海受制曹公以語言殺身管寜居北海上三十年終曹公之世不至中原此皆吾輩中有定力者使如佛果輩聞世間有此竒特事未必不内自愧耳盲眼士大夫知有佛之徒而不知吾輩中自有人斯大可笑者吾愛其語可書因爲録之雜書三甲戌七月九日校醮羣先生文渡淮至新息曉聞驢鳴起聽喜謫官之乆復見中原也周子曰此與退之之見蝎東坡之聞鐸初何以異因思頃歲久留京師一日舟至汴口望清淮渺渺群山崢嶸恍然如堕夢境不知身之在許也紹興之初當壬子癸丑間偶以事至濡須逾年渡江而南至中流聞隔岸雞犬之聲使人幾欲屑涕然後知二公之所感爲不虚也嗟乎物變無窮悲喜相半茍隨所感而爲休慼則吾之一心有不可勝應者矣唯知夢境之中一切皆幻則物來如市吾心如水此紛紛者安能入吾舍哉余年踰七十寸心灰㓕蓋無幾矣雖未能物吾兩忘然于此其殆庶幾焉蔡君謨石橋記規摹魯公中興頌東坡醉翁亭記規摹魯公離堆記凡有眼睛者知其如此大抵君謨文字及行書小楷蠶頭燕尾外方内圓無一㸃一畫不似處而東坡出没變化風流韻度自成一家優劣似是分矣余不解書而論書譬如不解飲人說酒雖說得近似而飲流未必以爲是然口之于味有同嗜焉豈可欺哉甲戌秋七月客有謂蘇氏書無法者乃爲書此以解嘲也麝爲天下至香之物久而欲壊則香必歇急取溺器覆之香復如初盖麝生臍腹間溺之所自出也二氣以類相感乃復香耳神竒化爲臭腐臭腐復化爲神竒顧何常之有哉然則閨中竊香之士海上逐臭之夫二者未知其孰賢當有識者能解此余不然也騶虞解騶虞一篇其辭詩與序義相合坦然明白而諸儒各出已意更相附會使其詞旨不明至不可曉甚可怪也詩曰彼茁者葭彼茁者蓬葭蓬野生非人所種藝其長亦且茁壯則以見草木之靡不生殖也又曰一發五豝一發五豵豝豵野處非人所豢飬猶且射一發而所獲五則以見鳥獸之靡不衆多也如此則序所謂庻類繁殖之義見矣每章必曰于嗟乎騶虞者騶虞獸名其爲物不食生物不踐生草有仁德焉古者四時之田以習武事後世則馳騁田獵以暴于天物其爲不仁孰大于是今也蒐田以時蓋將以教民戰而志不在于得禽獸則豈愛物之無心哉故每章必曰于嗟乎騶虞也舉此則序之所謂仁如騶虞則王道成之義見矣一發五豝鄭氏謂虞人翼五獸以待君躬而君不盡取唯取其一所以見其仁其說不然夫國君之田不掩群則逐獸而射之耳苟命虞人驅五獸以待君射使君仁則取其一不仁則將盡取之其為害亦多矣烏得為之仁乎騶虞之為獸其說舊矣至漢賈誼則謂騶為文王之囿名虞乃司獸之官也不知誼何以得此歐陽氏又從而取之分嘗力詆先儒穿鑿附㑹之辭于此反有所取不知其何理也太倉稊米集巻五十
