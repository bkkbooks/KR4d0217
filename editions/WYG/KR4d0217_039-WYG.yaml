body:
  text: 太倉稊米集巻三十九宋周紫芝撰詩三十六首食芡有感二首雞頭子熟客新嘗流落空嗟各異鄉紅線緑荷香裏夢十年燈火記錢塘翻香引睡一胡床剥芡尋詩度日長若得長閒了無事人生如此亦何妨書祁居之家小閣李渤築長堤三千五百尺為我絶平湖遂識柴桑宅髙人淡無營小室自生白倚壁横兩床並坐可四客時聞蒼蠅館不厭蝸牛馘誰知湖尾山抱負縈水石繁陰庇芳姿収拾在几席天地本髙明胸次有寛窄固應世外境頗與俗眼隔我欲為君留雨意良霂霢對眠分小窓夜語要劇㑹須臾攜被来更待風雨夕次韻都倅題趙菘老竹澗聽雨亭西來倦客厭飄零一見宗枝眼為青世事絶知塵外少雨聲更在竹間聽鏗如曲奏江邉瑟清伴風鳴塔上鈴想得荆州都别駕詩成幽夢曉初醒曉雨用都倅韻亂敲簷瓦曉初零聲入孤燈影半青枕上有詩因雨得窓間無客對床聽翠光洗出山千疊金色添成菊萬鈴収取新涼歸酒盞莫將雙眼為愁醒金鈴菊又名萬鈴夜雨再用都倅韻半世常愁夜雨零斷腸無復鬢絲青又將船艦舟中夢移入梧桐葉上聽涼吹漸欣歸枕簟好詩那更似鸞鈴欲知多少江湖興病眼無眠徹曉醒夜聞驟雨枕上二首星斗闌干雲翳銷黄昏猶未有微飈誰將枕上三更雨捲作錢塘八月潮山南未作小裵􅏆坐想奔流萬壑雷三峽橋邉風雨樣先將此䜟入詩來季夏極暑正晝草木俱萎獨吾坡上數君子玉立蒼然傲睨自得豈杜少陵所謂脩竹不受暑者乎烈日當正晝長天無一雲草木失顔色葳㽔困燒焚陽春始用事庶類争芳芬小草最無名羅生費鋤耘凡花頗矜持隨風弄餘薰一朝值炎酷爾輩徒紛紛蒼蒼不改操惟我坡上君脩莖粲碧玉茂植歌屯雲有如獨醒人不受麴蘖醺如彼至人者自與世俗分入火且不熱况乃逢朝昕小人柔弱姿難與君子群送呉甥歸秣陵人生良苦不自知三折肱乃成良醫老夫年少不知此請為甥也今言之平時頗喜詩有味晚乃竟坐寒無衣人言詩成本無用小技止可持自怡一聞斯言寢不寐盡欲棄去無孑遺人皆見之唾不顧汝乃掇拾歸何為前年行都子訪我值我偶得南州麾汝之老母我伯姊何為棄養行相隨極知饑寒子良苦况乃窀穸歸無期翁今兒孫漸滿屋子六八女肩相差歸嚢羞澁止有此世事乃爾真成癡渭陽老將如病驥肉瘦到骨那能肥枯萁成豆不足較甥也幸有驊騮姿丈夫豈合長貧賤慎勿瑣細含酸悲天寒霜勁路如掌矯首一望秋風嘶小兒琹歸自宛陵喜甚成詩三十韻吾家自曾髙善積豈一日爾祖工辭章論議抱經術我亦學弓冶少小弄文筆汝兄今有兒束髮行授室義方稍加訓書種恐未失汝亦千里駒似有趻踔質頃為國子弟兩戰一敗黜猶復勝端舒不識六與七胡為乆别離嘉月六換律去時春氣温飛燕如㸃漆只今秋風髙露草鳴蟋蟀老眼望千里懐抱難盡述有時坐如癡經月髮不櫛酒酸或忘飲客至亦懶出汝書江南來歸計似可必翁也望汝懐疑有后皇橘奴婢喜欲顛精粲治黍秫辛勤釀斗酒待汝解憂慄訪舊說鄉閭呼兒共梨栗念汝童稚時頃刻不去膝况今待汝來時序恐凛凓竹輿聽咿啞雲嶺走崒嵂吾無千金産遺汝使汝逸惟有骩骳文待汝成巻帙二事倘可了餘亦遑暇恤是時新堂成小室頗温宻夜席照寒燈紅爐共呫嗶皇天既休老謝事即移疾汝當著歸鞭快馬追健驛次韻郭元夀泊舟琵琶亭下夜聞吹簫舟在琵琶舊日亭玉簫更弄月微明湓江故事新歌曲便是香山此夜情次韻元夀見贈畫簷横著小闌干㸔盡西來最好山帶雨楚江依約處隔烟淮樹有無間巳煩造物分幽趣合就餘年了燕閒借使眼前無此妙可能不似鳥知還送元夀歸華亭念昔得左魚相逢各萍梗我方事米鹽君亦厭簿領豈曰吾無徒其實但弔影殷勤共杯酌邂逅得俄頃坐中老於菟神色甚凶獷一軀垂豕腹兩眼張牛猛酒行殊未闌幽事頗遭梗人生聚散多快意復難逞只今幾何時我居已深屏君亦乗歸舟乆别勞問省長言出新詩小酌共晝永平生發硎刃妙割無肯綮豈容金九傍臥著函牛鼎廟堂重汲引盡取無短綆㑹當從隗始豈復雜噲等願君飛尺書早發慰晚景功名要激昂人事勿暖冷為我謝黄郎無路勤造請熟醉倘有味髙卧不須醒仍煩織筠笯丹砂寄圓頂華亭出鶴都倅夀詩讀盡人間未見書幾曽囘眼到園蔬文章筆下飛雲錦今古胸中著石渠萬事要詢胡伯始九重應問馬相如明年我欲為公夀想得追鋒巳賜車文石班中侍從聨如公真合在甘泉何由魏闕催歸詔未到荆州去路邉分外寡求應是福静中有夀不須仙滿斟玉色長生酒爛醉廬峯五老前晚眺望極應千里人家自一村客㠶何處落隣碓隔煙聞山自秋來瘦江從雨後渾平生幽獨意為客却銷魂九江木犀甚富而香亦竒絶江東所無也自從春去憶疎梅直到秋來數木犀不隔幽香微雨細偏宜小樹夕陽低無詩可說難言態有酒應須著意攜家在東江苦無此莫嫌為客在江西再賦木犀新詩幾欲賦幽姿才淺真慚禿角犀未可便教金粟盡直須㸔到玉蟾低風吹香去天誰管花趁人來我自攜不對此郎時一醉空令墓上掲征西再賦木犀尋香剪得耐寒枝不羨腰圍寳帶犀塘桂自應同臭味巖花未可較髙低秋風易老空成恨佳客無人莫漫攜挽取芳條供燕坐絶勝騎馬號安西謝祁居之惠桃竹杖老翁年少白如玉初學裹頭雙鬢緑一心走覔梨與栗兩脚登山健如鹿中年脚力驚早衰騰踔安得如兒時挾弓持滿走避賊尚與箭鋒争疾遲如今老矣那忍說七十上身頭似雪年來脚力何所似鈍如罷牛跛如鼈先生强欲相扶持贈我江心桃竹枝竹夫人癡不解語木上座肯行相隨况乃柴焰如削鐡四十九層排玉節天公與我山作堂木落霜空秋九月與君共㸔南山雲安可一日無此君十月十七日大風約客登虎渡亭觀浪人言今日下水風不可徃也戲作此篇長江水自光搖空陽侯欲與風争雄濤頭不受水犀弩鯨波欲巻馮夷宫徑須便入虎溪口净洗平吞雲夢胸人言上水得風浪下水得風終少功平生萬事盡難偶政要東風渠不東江邉一嘆良細事而亦齟齬煩天公兒時望事到白首事不如意十八九不如快飲風流泉夜㸔青山䘖北斗送楊師醇赴竟陵法官平昔交遊未易論世間誰復似君真五花判事元無意三尺從官政為貧酒賤頗宜呼客飲詩成莫忘寄書頻使君若向新堂老今是開山第一人時二妙巳成故有是句次韻楊師古留别寄食客鄉逺誰人肯見過江山來徃數蘭玉弟兄多可恨澆愁酒能摧轉棹波幾時書到眼此别意如何晚思灘沙露尾江水乾江洪束峽江流湍千山落木風轉急萬里飛鴻天更寒暮雲政擁蒼玉玦落日忽下丹砂盤他鄉乆客去未得悠然東望心悲酸二妙堂望九十九峯雪北風巻地天漫漫長空下舞十翔鸞天公吹絮作飛雪大匠琢玉成群山群山南來西北折走如連環斷如玦接天朝同一色雲映水夜伴中宵月誰知三千大千界有此九十九峯雪人間未見固難名天上有之那可說老夫才盡晚益繆筆力應無此雄傑徐熈著色豈可畫大年小景不足恱誰當貌此一段竒留與髙堂洗炎熱雪後步至江亭老人攜家無窟穴晚得一邱藏曲折今朝日出天色佳拄杖來㸔山頂雪青山疊疊幾十峯桃竹班班三百節山晴顔色㸔轉好老健脚力殊未竭出門暮色尚餘霞步到江亭巳生月歸來附火却關門茶熟詩成意良兊客有勸我勿作詩奈此江山兩竒絶捫鬚仰面㸔屋梁心自知之口無說天將此段付詩人世間那有閒風月時宰生日詩五首并序某伏遇太師相公慶誕之日忝出鈞播之下倍増欣恱之情屬官守所拘越在江表不遑俯伏槐庭仰伸燕賀下情徒切依戀謹薰沐撰成古風五首敢罄愚衷用祈遐夀竊惟太師公相妙筭無前度越百代豐功蓋世焜燿兩儀閲歲曽不踰於十稔而禮樂修明庶事畢舉殊祥上瑞汗簡迭書樂歲豐年諸道並奏至於鈎陳太微星緯咸若北岳醫閭鬼神受職治效所臻曠古以來所未嘗見徃者愚不自揆固嘗屢草蕪詞上塵鈞席既而思之太虚難於繪畫芻狗不可再陳姑且置之不復敢道獨以謂大賢君子間世乃生民之休戚實係於斯非若鳯皇芝草徒為美瑞而巳故一章以記誕彌之慶爰自上世以逮中古相業相輝具載信史固亦多矣大率不過好生惡殺以不戰為勝以銷兵為上太師公相深得聖人好生之意以就神武不殺之功故二章以明相術之要位莫隆於三公功莫盛於姬旦圯上之書授之子房謂當為帝王師而其功業甚卑未能去殺不足彷彿今日之盛然則非體伊尹格天之德安能踵周公既醉之風故三章以述盛德之效功髙者位必大德盛者慶必長今少保大觀文道德文章為世儒宗韋平之傳鄭武之詩不足少進流芳千載何有窮極皆盛德至仁天為之報故四章以卜累世之休仲尼執魯國之政歸齊人之疆當時之人號為聖相休兵而來生民奠枕方之聖相無少愧焉然魯國之地不足以比大統之宋歸疆之效未能成極治之隆功髙位大無以復加惟有持盈守成可以上迪吾君下濟斯民以永無窮之休是為天下之公願故五章援聖相以明大功凡此五者雖不能事載其目物彰其美而不世之勲難名之妙實在其中矣伏惟太師公相益廣好生之德用昭不忍之心使薫然慈仁足以轉一氣於洪鈞開八荒之夀域則天心克享夀亦無窮某猥以庸才乆陶大化敢忘僣冐上凟威嚴伏惟鈞慈俯埀采覽不勝榮幸之至皇天産萬彚瑣碎不足名青黄百草中幻作芝九莖惡鳥不敢語紫鳯丹霄鳴尤物倘或出四海稱隆平太史上圖牒后夔奏韺䪫豈知人中瑞千載乃一生神髙下蒼籙昴宿扶漢氓天亦甚愛惜殷勤遺黎㷀聖主答天意一酌尊老成願公於斯年擁佩朝玉京二歴世由羲軒百相標簡牘操術難具論大抵一言足所尚必仁恩所禁在殺戮臯陶期無刑四海自肅穆敷德益所賛坐使有苖服西都郅支功蕭相不肯録有唐未開邉宋璟乃當軸向來多謬悠紛紛空食肉一言俞玉音萬竈休野宿不戰乃為功休兵豈無福三維國有六職論道先三公巍峩獨姬旦焜燿傳無窮子房號賢傑妙筭無遺蹤謂可為帝師授書圯上翁周公迓太平道與時適隆張侯䇿雖竒未解銷兵戎太師囘狂瀾僅在談笑中德業與智謀誰能與公同疇人亦何知但說前無功誰知公一德自與天潜通四種木當培根疏流必深源嘗聞活萬夫報在子與孫只今父子懿同拱羲皇尊文方班馬富業與臯夔倫奕奕兩貂蟬煌煌一朱門聖道家所傳蘭樹俱有聞韋氏守一經事業不足論金張誇富貴盛德無遺芬父師固難量有功在元元為公祝遐夀千載同風雲五魯人用真儒齊田歸鄆讙當時號聖相晏語甚眧煥徃者遭承平燕安嗟乆玩三綱既巳解四海兵幾半天戈不忍揮燕騎忽雲散功髙陋古今事易止朝旦方知今相聖難復與魯辨世罕班馬流無言可稱賛願公守成勲寳歴慶千萬蕪詞不足録至意良可獻客有以僕託病謝客者甲戌除夜作夢中七十四番春謝客明年懶見人巳是天公憐我老苦無官長怕誰嗔臘隨殘漏聲俱盡鬢共疎梅色鬬新招取雲山來一笑竹坡猶有此閒身祁居之作亭山間名之以宜謂四時之皆宜也其後寓安有亭未名居之使牓以似宜寓安雖從之而其詩乃有未必輸公之語氣似未平也寓安欲余賦詩因為解紛且以見二公相忘之意先生有亭宜四時乃使寓安名似宜寓安口諾心未肯更欲老翁聊決疑老翁百事盡稱好一生和羅常作椎况是宜亭頗静秀聞說似宜尤復竒兩山相望俱不惡二老較勝知何為㑹當扶病躡雙屐攜酒君家為君醉不知春事巳過眼但見此亭俱可意且對青山食蛤蜊一笑誰能知許事晚霽效韋蘇州重霧翳曉日相持決陰晴須臾忽戰勝日杲中天明積雪壓竹腰欲舉如垂旌氷凌既融液意氣還峥嶸花木手新植未可分死生庶幾僵仆根可與微陽争况乃田畆間春事亦漸營新緑染麰麥餘甘歸竹萌飽食遂可料聊助春山行一晴亦細可繫我憂喜情我詩不浪作有詩君勿輕寄題章漢直中虚堂谷以虚而應樂以虚而出婦姑時勃蹊作室坐自窒天地猶槖籥用固不能屈學而不見道方寸等暗室誰知道集虛通一萬事畢推此以遊世於道乃其一異哉子章子妙悟造理窟何止學美身虛静了不汩願君師心齋守此能勿失室以虛生白水以止鑑物此意似太漫未免遭罵詘我亦取斯言聊用自湔拂太倉稊米集巻三十九
