body:
  text: 太倉梯米集巻六十一宋周紫芝撰記九首盎蛇户部麴院在西湖之上院有瓮盎覆於庭夏五月將有事則奉而用之事已輒覆如初嵗率以為常也紹興甲子中夏之庚寅吏白當啓其覆有蛇十數居其下其脩如綆其大如椽須臾皆逸而去蓋留而不去者猶十有三舉杖而擊之則大張其喙牙舌盡出光焰奪目如真黄金衆畏不敢前曰此神物當聽其自去不可殺余命復擊之則􅆑覆其下方母其子而不忍去也有欲殺其母而碎其卵者以為不仁余吿之曰事有輕重愛有差等不可不察也夫蛇在瓮盎也不為人害今既攘其窟穴又有刳其腹使雌雄失偶母子俱斃可謂不仁矣然而院役夫日數百人大抵中夜以興投暮乃止往來必於是廷使有不幸而踐其軀者得不遭其咬囓乎囓其父而子不得食囓其夫而婦不得食不得食有死之道焉則是囓其一而亡其二也况夫婦而又有子者乎今惜一虺之死而不愛其父子夫婦之亡則是輕其所當愛而重其所當殺先其所當殺而後其所當愛也可謂不知務矣雖然君子親而仁民仁而愛物與其賤物以愛人孰若兩全而兼愛吾聞昔人有驅龍蛇而放之菹驅虎豹犀象而逺之者未聞其殺之也請以巨籠納諸藪澤而告之曰君子之庭非爾攸居願卜爾穴於澤之瀦我不爾殺爾何其吁茫茫大澤聽其屈舒毋逸而游以蹈吾誅尚書六部架閣朝廷設官以主吏曹之牘舊矣後廢而不置者凡二十年常以司門之官兼掌其事往往書無几閣户無緘縢甚者委而投諸地其積如山嵗乆輒蠧腐缺落漫漶而不可考官索故牘則六曹吏自入取莫能誰何出納之籍姑為文具其弊有不可勝言者朝廷知之㑹上章者以為言於是詔復舊官如故吏部之有兩銓所以升黜百吏司徒輿地圖以稽户口之登耗均賦入之多寡其牘號為最繁故都以一官主之餘不能如二部之多則以一官而無二曹所以因時制宜而為之損益者當如是也初架閣有屋數十楹皆依山阜下即湫隘而為之所乆及弊壞弗枝又其文字之積至於充溢棟宇而六曹之法案閱二嵗則命聚而藏之常以二者不能受其藏皆患之吏部主管文字右迪功郎彭炤始與其寮户部右從政郎艾若納禮兵部右迪功郎周某工刑部右迪功郎蘇鑒條其事以有請於尚書六曹之長欲治其壞而増新之且為架閣廨事以處其吏使不得雜齒於部曹之㕔為便六曹始具其請而上之朝紹興十有五年秋九月有㫖命兩浙轉運使司為之越明年秋八月始告成初架閣移文止用公牒而御附以召使者怒其禮輕乃大沮其事有請皆不報故其成甚緩而略且不如其乞也朝廷自罷兵息戰以來凡祖宗大典禮有廢而未修者一切蒐講靡有闕遺至於百官有司莫不具舉下至架閣之職亦修其廢官而復其舊制駸駸乎其嚮太平矣况創復首被推擇非特目見耳聞自親其事固已幸矣其可不書以告後人乎九月二十一日周某謹記木居士寮余官居得小閣前有明窓可以設几席而後有窓可以施榻其下以備晝寢焉雖寛明淨燥不陋以卑宜為老人之居然其相與周旋惟毛頴陳元輩二三子而巳求寸草一木可以游目而寄意殆不可得甞試起而視之於㕔事之後得小庭庭有木犀髙六七尺枝榦敷榮隂影蒙密殊復可人問之則當余施榻之窓而隔以壁藩不見其身余喜而自語曰此吾詩上物而獨未知之耶使剪其半藩而出之徙前席其下而處焉且書小詩壁間有可怪森嚴木居士肯來相伴竹坡翁之語因以是語名其室曰木居士寮而吿之曰僕與君素昧平生而相遇偶於此今吾子幸辱與小人遊而僕竊有愧焉夫草木零落嵗寒後凋君子之操也和順積中英華外發盛徳之施也岩居谷隱人莫知之箕潁之流也而僕何有焉居士聞之笑而言曰姑置是事請自其同者而言之子家江南我為吳産起於山中轉徙從市則其出處大畧固已相似矣而王侯之第歌舞之場婢子挽折脂澤汙漫不幸而與桃李同科則將如之何今華堂邃宇寂無人聲相視而笑以此終日是僕之與君非特出處之同其遭時而得意蓋又均也於是與居士定交而命管城子以為之記焉實錄院種木某紹興丁卯秋七月為詳定一司勑令所刪定官後兩月㑹實錄院修撰罷去院且無官朝廷不以某不肖俾攝檢討官事越明日拜命於庭見其堂宇宏麗靜邃有嚴竊聳然異之及洞視内外雖髙明虚曠地無游塵而未有一草一木可以覽觀於几席之上者甞有意於此而未遑暇焉明年秋七月始於是白於諸司曰實錄院建於紹興十有三年於兹矣院與圖書之府興於同嵗今道山蓬閣花竹隂翳著有行列足以備四時之觀繄此獨無奈何於是始買木於山中而植之乃環十木於大廷之下曰冬青蓋列於兩榮之前者各以四植於其中者二面而視之猶有四焉而其數則十也植二木於堂之前曰木犀皆列於兩階之傍以當宰相燕休之閣也又植五木於堂之後其三曰梅其二曰桃而錯之以需其相代而榮也總木之數凡十有七雖其髙不踰尋丈儻資以雨露之濡藉以封植之力勿剪其柯而待以嵗年殆見其蔚然而幾以興也曄然而華以芬也某甞聞之古人曰一年之計種之以榖十年之計種之以木百年之計種之以徳嗟乎是木之興其在於十年乎今大丞相太師益國公以清淨去殺之心符聖主好生之徳罷兵以來曽未數嵗而天下歸仁焉則公之種徳蓋已深矣黎民懷之亦已至矣夫以區區十有七木之微固不足為公道而某所以敢為之記者將以使人即公視事燕息之所見其蒼然於廷者從而得公種徳之意焉則此言雖小庶乎其可以喻大矣紹興十有八年閏八月二十有五日記妙香寮興國為郡治事有㕔而便㕔出其後相去稍逺又堂有祟時出變怪守之至者避弗敢居乃即便㕔而居焉僕始至亦居之徐求燕息之地於其傍不可復得而便㕔之左入井堂有外廡五六楹闢為辭室儼如巨室成而盤旋其間意甚樂之江西之俗健而喜訟號為珥筆之民獨富水東連江池西控荆楚郡小而民甚醇往往囹圄晝閉桁楊不施者嵗卒以為常守老且病介而寡予無賔客外事唯閉閣癡坐時聞妙香聊以永日常誦杜少陵清心聞妙香之語因號其齋曰妙香寮也夫瑞獸三尺寳薫百和鬱為凝雲散為游絲此洞房曲室歌舞之場沈酣於富貴者之所得至於寒窓石鼎栢實松膏與之裵裒於几席之間則僕之意固有不止於香者矣昔韋應物之守蘇唯凝香齋閣哦詩自娯蘇今平江而郡當孔道為士大夫之林藪太守朝從獄訟暮燕賔僚雖有意於是未必常得吾邦甚陋而公㕔如道院可以閒矣乃無韋郎凝香之句為有負於燕閒雖然鳯凰蛩蚓瓦釡黄鍾均為有聲何足深較哉余以辛未十二月之吉始從郡事越七日而圬治之功成又五日而記亦有成焉乃刻諸石興國軍重修刻漏凡郡必有城城必有譙門門必設鼓角漏三物所以壯軍容令昏曉使興居有節不失其時其為制舊矣余始至郡毎月影下罘罳聞鼔紞紞然鳴於闉闍之間明日天且白雞三號則鼓又鳴率以此而候夜旦然夜漏不設常使守埤者占天星以候百刻風雨晦冥則笳皷失節往往夜半奏角黎明而受初更者猶弗易也余慨然念之乃賦財於邑鳩工於野丐法於旁郡而一新之越兩月而漏成始余命有司使治是漏客有聞而竊笑者謂吾邦雖無事而嵗入不足備供億凡邦之祭祀賔客兵食廩稍與夫不時之需一有闕焉事急上聞則使咄嗟罷去顧暇䘏於斯乎余曰是非君所知也古者朝必辨色而後入禮也設庭燎而朝羣臣非禮也今郡國吉月必拜朔於廟又望而拜於廷是亦朝也一失其時則為弗欽於君季氏逮闇而祭繼之以燭禮經譏之他日子路以質明而始行事宴朝而退孔子以為知禮今律釋奠於文宣王月用仲春時以丑刻以七月用仲秋時以丑刻以一至於社稷飌靁雨師則異於是反是則為失其時亦曰弗欽於神夫朝人臣之節也祀國之大事也斯而失焉國非國矣雖有粟我得而食諸然則余之為是漏豈可謂無意於其間哉噫時有遷徙事隨廢興前人為之安知後人不從而隳之也昔杜牧之甞謂百刻短長取於口不取於數天下多是獨宣池荆三郡皆大和間嗣曹王臯用處士王易簡之法為之宣於余為鄉邦見其法尚存而牧之之文也今無易簡之法又無牧之之文而欲保其不墮於後人理豈有是哉謂百刻不取於口而取於數斯亦可傳矣安得復有如二人者乎紹興壬申四月十五日周某記巻雪樓漢氏失國三雄鼎峙未知鹿死誰手獨區區呉蜀偏據一方當魏武中原十億之師卒能﨑嶇百戰以開立國之基蓋當時之忠臣義士為有力焉今昭毅武惠遺愛靈顯王有大功於呉廟食於此埀數百年四方之人往來長江奔走祠下者嵗以億計而王之威靈震耀烜赫無異舊時罔敢弗欽惟神亮節上貫白日下讋九泉故其英風義概凜然如生有不可掩者歟初曹公以步騎四十萬次濡須呉以兵七萬應之使王領百兵夜入操營軍大擾呉主喜曰足以驚駭老子否聊以觀卿膽耳其後周瑜既破曹公操退保江陵使曹仁守之相望大江兵刃未接王屯夷陵方解曹仁之圍乃渡兵北岸克期大戰仁遂退軍濡須仁之退王之謀為多王之大功昭若日月者考其終始之節大率皆以忠勇聞不復論載王之神祠舊在富池地勝而雄紹興中始鳩衆力以結飛樓後五年而樓成某適假守是邦守祠者來乞名余謂樓直江壖驚風怒濤洶湧百變飛流濺沫雷擁雲蒸不可名狀當用劉賔客語名以巻雪議者以巻雪語浮不足以標神功乃又名以奠桂取楚詞所謂奠桂酒兮椒漿之語也議者又謂楚俗好鬼凡淫詞邀福不在祀典者咸與民享不足以顯神節乃又名以秋霜王以剛毅勇敢之氣克敵死難奮不顧身如秋霜烈日當以是名之三者卒無定議乃遣吏持決於神既往某私自念言神之於呉出大計鏖大敵固亦屢矣未甞聞其有驕色今豈於人所尊事者自居殆用巻雪乎吏歸果然於是議始定嗚呼異時學士大夫富商巨賈與夫介胄之士下巴蜀而遡荆湘者風颿相望搥牛釃酒相與酬於樓下必有聲歌以侑王之飲乃擬作楚詞使人巫歌以祀焉其詞曰維大江兮南紀亘萬古兮長流望丹楹兮如霞宅神宫兮顔羞凜英魂兮猶在遺賸福兮九州儼王冠兮鏘珮聳重屋兮雲霄酒欣欣兮既㫖鼓坎坎兮吹簫神燕娯兮醉起望白雪兮江濤顧神馭之杳冥兮安知其不樂於斯樓繄廟食之無窮兮吾不知百世之與千秋元次山祠紹興辛未冬予將有江西之役故人舉酒酌我且曰子過九江謁陶淵明元次山之祠為吾謝焉我老矣不復拜公於堂下余至彭澤訪淵明之遺跡則敗屋數椽炊烟相屬散居如星父老皆曰此舊治也祠在新邑道逺不得去遂捨而西至瑞昌問次山之祠安在人皆莫知次山之為誰亟呼老吏問之曰往有土偶席㡌短衫薄髯而微者得非是乎兵亂邑費不供鞠為酒壚今數年矣問公像安在曰附諸某神余往訪之則地坐神側飛埃雪積壚壞無烟熟視乆之有流落羈栖之狀乃取杯酒酹公而行已而遂抵永興欲為公作堂繪以祠焉議者以公當唐肅宗時避地瑞昌故人相與奉而祀之今遷於此無謂㑹龍眠之孫李侯西美宰是邑余語而屬以是事未數月政成民咸安之乃一新公祠既落成舉廟中像以歸識者賢之次山方少年時頗以氣自許慷慨論天下事言治道必極古帝王使行其言未必專尚虚名如房次律輩惜乎肅宗用之不盡其才代宗立丐居樊上聱齖漫浪依隱玩世浮沉酒中以詩自名晩路得州有古循吏之風所全活不可勝數奈何卒不能究其所設施使為中興賢宰相雖一時才名充塞天地而文章辭采足以照耀今昔猶不得一椽自庇其身巵酒臠肉不丐餒魂豈造物者與之以此則不得於彼也李侯能知余之意不旋踵堂成使後人知古有漫郎亦賢矣哉山堂花木自山麓而登堂脩塗詰屈蜿蜒如臥蛇繚以竹藩髙不三尺植冬秋為夾徑相望於兩藩間木之髙低巨細大略不甚相逺至扵疎宻逺近之致則用秦漢古文中所載王褒種樹法也近堂十餘株移於大寒中冰雪摧壓蓋幾死而僅存餘雖種於春冬之交而根本一搖枝葉隨變或森嚴猶如壯士或跛倚已若病夫或數葉翩翩尚懸槁木或新芽萌動已綠柔條余日倚杖盼柯以冀其繁他日清隂庇道風雨滿山庶幾不負予封殖之力也太倉稊米集巻六十一
