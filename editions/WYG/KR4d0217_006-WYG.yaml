body:
  text: 太倉稊米集巻六宋周紫芝撰詩四十三首忻師開小軒秋霜之側范龍閣名以絶塵要予作詩虎谿大士軒雖小龍閣老翁詩更新積翠但令常到眼軟紅元不解隨人抗容俗裏自得計望拜馬頭渠豈嗔只好與君供一笑世間何事可闗身次韵劉元亢讀白樂天與劉夢得書香山天下士直道可事君口語作竒禍後來成積薪巨棟雖已捐白璧原自珍百年付春夢千載期斯人可憐肉食子議者空反唇文華一照耀今古無搢紳才高固不世盛德終少隣鹿鹿數餘子瑣瑣非公倫豐盈與名譽詎可鍾一身暮年林壑意觴咏全天真君子與小人兩者自此分寄言顔巷徒勿語傷哉貧五月二十四日避暑東寺折簡邀子容不至凉飈呼不來惡熱苦難避城南有佳人相望隔秋水願言倚瓊瑤相攜謝簪履花木通禪房茶𤓰供幽事君方從簿書相仍日填委咫尺如參商况乃在千里日暮殊未來清風為誰起次韻元亢見貽人生如浮雲夢境無真樂功名繞床盧聚散合錢醵可憐燈火讀聖處恨未博我非金閨彦敢靜玉闗柝衰年未免俗萬事隨獵較安得共芳洲相期採蘭若眷言平生歡寧負嵗寒約唾手可書紳君意良不薄次韻元亢雨中見寄窮巷結蛙廬僅有一席廣風雨不出門山林負清賞悵懷念幽人道阻不得往瀰漫隔江漢契濶異霄壤清風吹句來念我作技癢安得從君遊此意良惘惘酌明寂泉脩途繚重岡病足倦遊歴山根得蒙泉石盎貯深碧亭虚繞朱欄緑淨明水色老禪黄蘗米棄置久復憶振策望青雲清泉裂崖壁至今一掬甘長飲山中客金鼎候松風蒼龍破圓璧醉腹澆彭亨真味付冺黙何當謀挈瓶徙倚終日夕清甘不可𠻳猿鳥與同喫洗我兩月塵爛煮南山石題王定父淑問堂平生心笑伯州犂羅織雖工不當威莫採黄金鑄刑鼎要令青草入圜扉于張必大君須記六蓼先亡事恐非聞説堂成已無訟臥看庭樹轉斜暉次韻元素登城暮歸二首天遣劉郎又白頭少年文學似求由朱門華轂聊安命藜杖芒鞋可散憂大隱未成聊小隱濁流誰得寘清流賦成凖擬吾先讀王粲秋來正倚樓晚來飛鞚上城頭欲躡華鑣苦末由醉裏有鄉須着屐人間無地可埋憂功名于我真聊爾人物似君無此流想對青天囘白鳥半鈎斜月掛江樓中秋月下作去年城南作中秋江雲遮月爛不收幽人獨對秋風立姮娥似隔重雲羞更長忽聽曉鼔急夢去只有殘燈留今嵗不知身在此門枕長江風自起樽中有酒坐有客江面如天月如水秋風滿樹凉葉飛新歡欲盡還成悲身其餘幾事不偶老之將至吾今衰人生閱世自有數萬事反覆難預知何當舉酒一再拜與月更作明年期宿蔣山薄遊踐初心寓􅀫便晚靜山空秋有聲人寂夜更永華鯨催曉色有客動深省焚香禮大士杖策上危嶺黄金明窣堵妙音生佛境眼窮天無盡地轉江萬頃緬懷梁武帝問法昔造請識師鳥巢中道契言自領㑹令天龍宫金碧粲絶頂我來脩法供汲水具乳茗願同桑下留覧勝畢餘景還從天際歸悠然理烟艇九日登鳳凰臺落木驚髙秋旅食念行役含羞古祠花青蘂未堪摘雲山不着脚佳節似可惜一嘯百尺臺往趁凌風翮羣山如玉玞千古圍故國孤城打寒潮往事誰記憶玉樹那得花金蓮去無跡興亡更六朝濺血幾飛鏑重瞳飛上天毰毸避矰弋何年覧德輝古榜猶可識父老無由詢殘碑少遺刻空餘弔古涕自對斜陽滴次韻元中芭蕉軒道人悟無生開軒有深意是身如芭蕉妙語良黙契婆娑坐芳藂聊復此遊戲秋風鳴環佩曉露濕蒼翠閉牕得隂多凉簟驚雨細索句清夢餘時能助幽思我亦箇中人平生㑹佳致此樂倘見分杖策時一至符川逢次卿遂約同舟被褐念遊客落㠶逢故人晚嵗風露寒一笑樽俎春餘子豈不佳數面聊成親平生不漫與知君意良真少日共林壑劇談唾冠巾皎然兩玉壺不受一㸃塵各以口腹累老大成參辰政坐造物兒有意相怒嗔荏苒時不再俛仰迹遂陳秋風吹前谿搖蕩生碧鱗不如載扁舟相視聊飲醇醉聽篷底語共卧南谿垠次韻國師對月見懷老子闗門不著書奄奄真復似曹蜍月來林下苦相憶詩落眼前歡有餘滿挹清光歸酒面小分秋色到吾廬胷中拍塞愁千斛特地煩君一掃除寄徐季長念昔桃始華别君漳水頭相别幾何時天事司蓐収闕月六度圓相見間何濶百年飛電中能得幾囘别别君幾何時憶君如飢渇飢渇良有時思君無時節野人苦幽獨相值誰與親流落在蒼莽坎軻一傷神相望參與商相隔雲與泥草木忝臭味笑談極相思相思一何久行行重囘首囘首征雁行中有來書否送王天民歸雙泉舊聞雙泉居縹渺在寥廓仙人上叢霄遺甃結飛閣廣庭三百步一木可四角刀圭分蒼虬鱗鬛自皴錯至今風雨枝疑有孤栖鶴王郎吹玉簫飛鳬下雙屩時乗三峯雲來繞月城脚人生多乖離未踐繡水約知心念獨君時來慰牢落我欲從之遊何當解羇縛圩氓歎圩氓築敗圩飽腹無粟菽强扶南畝犂辛苦望一熟挿秧在中田秋來半黄緑白雨忽翻盆積潦囓圩腹波頭巻春雷洶湧裂坤軸倉皇未出門白水已半屋攀椽栖木杪寢飯雜鵞鶩客行艤孤舟繫䌫怯水宿叩門乞燈火父老迎我哭我亦一酸鼻軟語聊撫祝老稚且相収愼勿輒棄逐行看散陳紅官倉有餘粟救爾無逺謀每飯慙食肉八月二十日種竹八本東岡新種八龍孫北嶺清陰肯見分留取一林聽夜雨莫教千畝僣封君次韻次卿中秋月下書所見三載彭門夢新年故國秋月當千里共酒要十分酧翠幕知誰巻雙鬟不奈羞寒螿莫相惱啼作晚窓愁題大着肚并引金陵朱世英官長沙或有畫箕踞而坐者號大着肚舊有賛頌皆鄙語朱為題小詩其上以易之其尾云但将貯酒三千鍾莫話容卿數百輩余愛其語有味更作此詩以廣其意平生頗笑王㑹稽坦腹驚動郗家兒暮年羞澁為懷祖計較毫末如兒癡嶔􅏟更誚周郎鄙自說空洞終何為達人大觀無不可無鹽未必非西施了知倚杖清言者外示夷曠中難窺不如此老身如寄萬事􅀈稜真得計掉臂行歌眼看天擁膝長吟腹埀地羞遣家奴捧玉環肯為門生作經笥白肥如瓠君莫輕終年貯酒真酒􅑥結喉道士倘復見敢託石鼎譏彭亨次韻元傑病中書懷本來無病是維摩人說烟霞久臥疴獨閉衡門春尚在却攜藜杖句還多已將名字傳三語懶作悲凄和九歌止酒淵明今復飲便須俗客到無何次韻幾聖見貽二首梅花雪後有殘枝留與幽人照夕暉已借水光浮淨几更將山翠染春衣囘中漫叟移舟去月下淵明種豆歸知我短坡無客到肯攜長麈為翁揮坎止流行念已輕常闗雖設是吾扄事如痛定何堪說出為飢驅豈有情滿座自傾鸜鵒舞半岩擬作鳳皇聲醉中深意知誰解付與前身阮步兵李似表雪中置酒席上次韵東風吹玉塵十指寒欲墮西齋借微温妙語驚咳唾詩成酒行間一掃飛電過坐令止酒陶酒戒為君破但愁飛絮零似我霜髩鬌他年玉堂人伴直誰對臥恨無屈宋才共續離騷些次韵元素對雪十韵雲凍風仍急天低雪未収山寒飛鳥絶江晚一蓑幽曉樹梅初放風簾絮自投孤鶱迷逺鶴痴立看飢鷗􅇫馬歸鞍速韝鷹獵羽遒連城理睥睨千騎冷貔貅何處囘蘭棹誰人擁釣裘閉門憐我病得句付君搜上瑞書三白登年在九秋何當明月夜同作廣寒遊甘菊數本舊植之地沮洳湫隘頗有悴色十一月二十三日移植墻下明日小雨數刻欣然便有生意小草偷微生崛强沮洳間託根倘失所憔悴無好顔嗟哉一大地寧無尺寸閒造物惜不與無乃亦太慳櫟社豈不惡盤錯未易栞下可百牛蔽上可星斗干此物有逺韵何人憫清孱我移東籬栽往近九畹蘭天心固有在生理似可還小雨喜霡霂低枝濕斕斑春苗已足採落英行可餐為我制頺齡使我昇飛仙物微自有知報君以長年蠟梅六言三首剪蠟枝横隴月釀花蜜滿蜂房誰遣凌寒枝上中含百和花香雲珮風侵玉冷仙裳霧巻羅黄家在蘂珠宫裏衣薫鵲尾爐香桃花占上林簿蘭芷擅離騷經欲吊花中遺逸聊尋世外林坰此花香韵俱絶而二書俱不載故有花中遺逸之句再賦三首孤根雅宜幽處空明宛似僧房我作蒲團燕坐時參鼻觀清香淺俗微嫌菊陋麤粗不愛葵黄花裏誰方髙韵人中可比黄香移種定從天上世間那有此香白髪人應羞看鵝兒酒可爭嘗送詹伯尹之大梁寒風轉平林密雪吹重裘遊子當北征朝曦趣行輈人生㑹有别一訣寧復愁念君最少孤束髮勤清脩夀母豈不力白髮今滿頭功名唾手事嵗月逝欲流長安小車兒哆口笑土牛君才豈不髙逸氣横九州弊帚已千金白璧價未酧願言慎行李去去君勿留次韵何師與梅花二絶示劉凝逺月姊宫前玉樹春杏花菖葉不同村多情誰道天無意先與梅花雨露恩何人急遣蓬萊使喚得春囘江上村誰信廣平心已冷老於花似太無恩文殊老人寄和張載共賦堂詩要余同作世無陳太丘民隱念誰訴兒飢不肯乳咿嚶復誰慕殖禄膏妻孥居官付羇旅何心書下考絶意躡髙步張侯名家郎作吏得竒趣提攜念疲勞憂勤急朝暮散作千家春一洗五里霧簪纓被餘輝草木飽朝露官閒理朱絲雲靜落飛屨當期卓子康揚鑣各分路飛書恐到來築屋寧久住詩成梯幾間酧酢語交互酒杯方流行喜甚捷官渡歌詩載懽謠鞭箠息嗔怒翰墨良從容流冗自奔赴聲今詫父老名亦借童孺觴豆落明珠萬壑疾東注賓從俱鄒枚含毫各驚顧戰須老將鏖兵思勍敵遇主人方燕喜飲至非草具人生俟河清俯仰有新故寄言三不欺令尹勿輕忤民今知己疲着艾豈勝炷鋒傳固應須軺車少當駐魯山久寂寞冠虎寧有數苦恨郭林宗未遇黄叔度名嘗仰韓老雅意良黙喻何當奉周旋看君琢幽句愧無脫手彈可逐馬中兔只今釣斜川臨流與誰賦讀涪翁黔南詩作阿香名字本無雙流落真成竄夜郎蚤嵗浪言腸是錦只今空復鬂成霜名傳故國猶驚座詩入浯川尚滿囊天為少陵增秀句故教遷客上瞿塘次韵元亢和邦師喜其歸自錢塘道人青眼為君開前度劉郎今又來白雨飽催湖上句紅粧誰把醉時杯籬邊採菊山千疊渡口呼船谿九囘便恐横翔到蓬閣試尋林下小徘徊送吕霞卿吕當世棄官而出家今為道士得錢夢穢官夢屍等為臭腐焉用為世人愛官如愛命君獨棄官如棄泥道人胸中少荆棘一色但種棗與梨華名自毁不足耴語在真誥髙位疾顛無乃危魚須忽復入君手三命循墻急須走朝持玉磬誦琅函夜着黄冠朝北斗天上雲車久未來壺中日月空長久吳山楚澤兩西東與子一笑殊怱怱㑹當握手五百載摩挲金狄還相逢趙丞家野堂近喜崔斯立新成背郭堂傍厓深置屋喚客小飛觴稍遣花經眼頻移竹過墻官清公事少夢熟鳥聲長藤倚樛枝瘦芸翻亂葉香騎曹休問馬聱叟漫為郎丘壑胷中事乾坤醉處鄊人間一遊戲出處兩俱忘元夕睡起元夕不復飲夜寒誰與娛人隨千騎出自對一燈孤有夢須黄妳無情問紫姑鼇山在天上囘望隔中區次韻元素野步金隄不復上蹣跚矍鑠何勞强據鞍從我泥中甘蠖屈看他髙處作鵬摶錦江春色能供醉濠上遊魚亦可觀聞有平沙邀晚步定隨明月下林端太倉稊米集巻六
