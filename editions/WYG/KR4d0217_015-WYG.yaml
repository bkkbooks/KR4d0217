body:
  text: 太倉稊米集巻十五宋周紫芝撰詩四十七首次韻鄭使君白菊平生鄭康成不種花嬋娟但聞書帶草羅生滿堂前佳菊苦解事殷勤為公妍紅油䕶霜日一笑真嫣然秋風轉寒枝束素爭囘旋團欒立芳砌皎若璧月圓使君頗牧手年來出臨邊燕衎自折衝賔從時招延苦愛白玉姿臨風嗅芳鮮揚州東閣梅自此復誰憐安得白雲詞冩入朱絲絃淵明眼獨醒載酒知誰先騷人始精蘂精蘂謂菊語在楚詞世塵聊自蠲幽姿倏已空二士窮益堅人生五馬貴行樂須何年絶勝杜陵老江花惱成顛才名與冨貴似公真兩全新詩如脫彈一出萬口傳鋒車行復來琬琰殊未鐫且當對香雪燕寢凝沉箋次韻逺猷旅夕二首西風滿眼莫登樓囘望鄉闗去末由晚色不催金絡馬夜燈空夢玉搔頭梁王行識相如賦楚國方悲宋玉秋萬里長途知不晚一杯聊為老人留久占無何作醉鄉人間萬事只逢場潘郎已老謾華髪夢得多情還斷腸政恐新愁無處着不知清夜為誰長煩君試草思歸曲付與蛾眉小抑揚王將軍與李伯時二馬遺張天民龍眠筆意天與妙尺素幻出雙驊騮一馬不動尾四蹄踣鐵邊風秋一馬爭前趨平坡欲下方囘頭兩馬交頸萬里愁龍媒未免羈長秋風鬃霧鬛不受囚錦韀坐遣駑駘羞將軍六郡良家子卷送歸君深有意蹶如厯塊一過都肯以鞭鞚煩圉奴人間豈有渥洼足不與天驥爭長途草黄沙晚天欲黒縱有權竒少人識眼中千里不易得時危願爾一努力湏江雨中須江樓上倚秋風草樹荒凉故壘空吹盡角聲人不見畫橋和雨繫艨艟擇之得鹿割鮮見餉以詩為謝潘郎尉居巢月止萬錢俸遥憐寒孟郊午食勤夜誦空庖無雞豚敢設亞父供南巢有亞父井官吏至者必先祭乃敢從事事見東漢如何得伊尼割鮮勤逺送老夫極驚喜兒曹亦嘲諷憫我太常齋此意君良重飢腸罄一飽狀若蹲鴟凍茅簷坐局促山禽聽曉哢安得隨少年短衣飛挽鞚燒野得驚麋即之那忍縱􅊯􅊯寒聲㣲麌麌一矢中聊復從左盂獵我江南夢春秋左氏傳曰江南之夢杜預楚之雲夢跨江南北秋意三首雨細方淋露雲疎欲䕶霜老情常落莫秋物半青黄榆塞弓窺月天田馬犯疆防城江上急時節近重陽八月露下而雨謂之淋露九月霜降而雲謂之䕶霜皆東南方言老去何曾健秋來白髪新萬方多難日四海獨愁人論媿傾三耳年今已六身太平猶眼見知復幾青春病骨駸駸老清愁日日深寒添青士節霜與木奴金跡共雲無定愁隨月滿林幽蟲泣床下可是不知心次韻逺猷東池晚思多事馮公子含情不柰秋東池寄飄泊畫舫信夷猶烽尚連三月詩應擬四愁且須傾酒椀未可喚歸舟次韻元素見寄秋來烹鯉得明珠頗勝當年獲異書里社相從真是伴江湖作計未全疎愁須强把樽中蟻老亦寧思組上魚囘望花姑溪北墅可能無路到華胥人間何處不蘧廬匹馬來遊偶束書晚嵗光陰頻入夢鴈來消息莫相疎淮南乘興非闗米筯下烹鮮喜有魚避地偷生落閒處功名無復似包胥次韻王彦猷參謀避兵山中寄茶字韻詩卷詩如摩詰自名家未數劉顛賦雪車問字誰攜子雲酒敲門擬送玉川茶囘頭拾得風前句掃地先除眼界花老去無緣渾似夢相隨真欲問毗邪扁舟流浪作浮家病齒凋零脫左車千里歸心秋後燕一年春事雨前茶它時我自開三徑此去君當判六花相見已還平日願豚蹄何用祝汙邪繡溪秋晚二首羇客三年別風裘九月寒暮鴉啼日落紅葉墜霜乾地接淮山逺天浮楚服寛須江無父老舊事說曹瞞二不作黄花夢空悲紫塞秋淚懸江上㸃心結雨邊愁久客猶千里殘年念一邱倚欄多少恨暝色滿江樓歴陽道中二絶斜照孤村一水閒維舟盡日柳陰間此生已作淮西夢更看江南隔岸山江邊孤壘古濡須憔悴斯民百戰餘賴有豐年慰羇客軟炊雲子薦鱸魚將别須江作落葉江頭楓樹枝秋風又入去年衣淮南米賤聊乘興笠澤魚肥却念歸老境但知隨物化幽期常恐與心違羣山堂下山干㸃不見祠雲作雨飛九日郡樓獨坐西風斜日可憐秋已作重陽更上樓門外白衣來獨晚坐中司馬醉應休茱茰香在人何處黄菊花開淚欲流山意娛人不勝好苦無佳句若為酬過雨二首短日收殘雨西風送夕陽時光雙去鳥世事一炊粱卷箔山堆案翻書月滿囊諸君方給札不擬獻長楊二自落山邊日孤飛雨後雲樹將風報客天遣月爭曛詩苦窮堪忍兵强老怕聞殘更隨夢盡長日與愁分次韻黄子才野步飯懷禪師道場聞說尋山屐閒穿近郭村眼明山淨綠心愛水清喧幽事付餘日狂歌終放言地經殊代逺名為老僧存境勝醒朝梵蔬甘飽夕飱僧應只靈運客或是文園覔句聞吳詠投文弔楚魂夢時驚逺籟背喜曝㣲暾厯井窺雲窟窮山繞石根蹇驢當復跨促席未容温兒輩休嗤㸃吾曹自引援濁醪聊共把蠧簡付重論歸和山中句挑燈老眼昏十六夜月色甚明與客棹舟至普寧寺昨宵明月共千里今夕極天無一雲不知誰令太虚空着此皎皎白玉盆長空與月慰愁眼良夜得酒含㣲醺天公有約不可負急蕩兩槳凌江濆更攜江上滿船月來打寺下三更門脩廊夜寂風葉亂古佛不語殘膏存老禪今夕但拍手狂客數輩空餘樽髙談劇語天亦怒白璧故遣雲相吞人言禍福真倚伏歡常有餘飲不足篙師促客歸去來夜半風顛浪如屋朝盤二首郭索何人捕草泥朝盤新見玉團臍却思烟雨江南夜紅火青蓑入稻畦江近秋深足鱠材半青橙子帶香開黄金鱗鬛丹砂尾落紙看成白雪堆塼爐秋風吹孤鴻浩蕩去鄉國心悲淮山秋家近楚江側囊無狐白裘柰此風雨夕經營尺寸地便可寄幽寂塼爐規舊製蒲團買新織雖無琢獸紅可醉珠履客㑹當與狸奴曲肱分坐席急雪度寒飇夜窻鳴淅瀝詩成􅕇醉夢殘缸耿虚壁何必遊八闗吾手自可炙山鬼行黒風夜度鶖鶬髙黄狐出窟山鬼號江空人靜雪飛急城頭擊柝催鳴刁老翁愁寒小兒哭薪如黄金米如玉將軍半醉獵城南鐵馬敲氷響山谷次韻明叔九日見懷準擬重陽共一杯幅巾臨水復登臺飛花撲面君相送落葉滿山人未囘故國只憑幽夢到斷腸頻寄尺書來此生終向江湖老黄菊紅茰笑謾催十月十九日江晴放舟雲静天無滓霜晴日乍暄風平初放䌫江穩自流船賈客眠吹笛篙工坐意錢吾行聊爾爾百丈莫頻牽雪後殊未有梅頗懷故山二首淮山落莫水蒼茫雪在梅梢冷欲僵要與玉奴蘇凍骨不知誰有反魂香真色生香無世塵參横猶記夢囘人風前懊惱梅花使不寄江南一㸃春王靜翁言客有賦食虎肉詩者詞甚壯要余同作六郡良家家好武相試翹闗恃負弩夜從惡少數十輩醉上南山縛驍虎短衣匹馬不挽强虎而有翼誰敢當旁觀睥睨方縮手一臠割鮮君巳嘗平生飲血如甘露羞作車中三日婦但當一飽不揺㗋誰說萬錢難下箸寝皮食肉君勿嗔乕為人害當復去可笑長楊射獵兒日暮歸來數狐兔次韻黄子才冬至日醉卧王丞家夢還家如平時黄郎本天才驥足尚少屈平生嗜烟霞投老成痼疾乞食方叩門攜㓜未入室何為作斯遊瘦馬醉自兀朝飢乃見驅妙思何由逸誦君思歸吟感我羇旅日道􅂗頗風埃嵗月苦飄忽尚須營一飽不愁屈兩膝可憐蓬閣姿未珥螭頭筆丞哉苦風流威令寛且栗懸知千里駒肯為牢之出胡為倚寒窻清夢恍若失但愁一線紅又過白駒隙婦眉誰與畫旅髪歸亦櫛吚嚶兒女歡餘事聽造物次韻趙茂卿書事自昔人髙馬服名胸中有䇿似金城玉階方寸何由借榆塞風塵幾日清萬里有家無夢到一樽和淚與誰傾竹西囘首揚州路腸斷故園春草生王彦猷用色字韻見貽和荅人生殊用舍初不繫失得念君垂天鵬未作六月息佳人絶代姿蛾眉本傾國人皆倚市門孰乃有國色風雲倘復遇冨貴或見逼一朝得天驥遂可空冀北况今登俊良百吏歸黜陟洗眼看横飛故山勿輕憶冶父寺楚俗樂戰鬬征誅專莫敖蛇豕肆吞噬一舉夷蒲騷音消小器良易盈舉趾凌雲霄輕敵取敗衂縊死由矜驕淺識恥鄧曼安在誇雄豪至今冶父山遺跡真寥寥何年化龍宫金碧爭岧嶤耽耽羣於菟跪伏尾自揺乃知道力妙智數何能髙曩者羅與楚蟻忿較一朝慈哀洗萬刼自足消兵刀道人結界地逺引離喧囂欲禮大士塔恨無野僧包臨風一悵望短髪空爬搔賈主簿家蠟梅臘月邊城風雨沙帶香誰剪蠟梅花寒燈枉作江南夢春在墻東主簿家僕將南歸笑庵以詩見留次韻思家一日似三秋病眼凄然怯上樓十幅風蒲催我去數枝烟竹為君留還將曉枕燈前句分作孤蓬雨後愁便合北來尋老伴人間何處有湯休掛席掛席下晴江歸從我北窻年今真晼晚事亦付竒厖酒可澆腸飲城誰緩頰降買田如有路誓欲老吾邦歸自須江泊舟于湖舟中書事一自風塵起飄零十載過危情窘荆棘老眼暗干戈草草真聊爾栖栖可奈何功名麟閣晚興在鹿門多避地依淮浦傷心聽楚歌邊烽明夕嶠戍鼔擊寒波江控曹公塢山連冶父坡憑髙懷更逺弔古事應訛久客横歸棹長年着短蓑風髙飽帆腹潮稳轉山阿漸喜鄉音似還成醉臉酡凄凉想茅屋留滯厭江沱井邑疎星火津亭長薜蘿連檣自來往壞壁本嵳峩蜂目今何在黄鬚跡巳磨餘生能幾屐急景付飛梭嵗熟如堪隱詩成可自哦平生南畝願無地與婆娑復故廬一首并引時歸自無為余拙於生理閒居寒餓無以自活須江主人惻然念舊挽而之淮客寓逾年妻孥念歸乃返故鄉有廬數椽為貴公子居縱客夜飲籬落俱焚久之見還開門入室酒肉遺臭不絶於鼻稍加營治而居之四顧雲山頓還舊觀喜溢於中言不能盡聊寓短章以冩我心我卜我居於城之隅繚以羣山帶以清渠日出扶桑月翳金樞朝雲夕烟變滅巻舒喬木豐草蔚其周廬羣書在床濁酒在壺蹣跚簪裾亦復晏如淮水之遊誰脂我車逮其歸而四壁其徒柔柯既剪稚竹日疎山為改容木為槁枯吾亦浩然言念歸與今我來思為之躊躇扊扅在門鞿靮在塗駕言曷歸杜門寔娛寒止皸瘃飢止瘠臞人誰不死焉識其餘雪後留報恩方丈三絶文脊坊邊雪作堆報恩溪上凍全開一天雲葉卷風去四面玉峰攅馬來澆睡莫教茶乳薄留香不放畫簾開道人知我無餘事特為尋詩借榻來老禪心地已如灰愁眼能令一笑開落日無情且歸去梅花若在却須來張元明羅仲共賦郡池白蓮僕時在淮西十二月中休方德脩始出巨軸追和花似當時傅粉郎不須湯餅試新粧固知桃李無國色猶恐蘭蓀是俗香人在匡廬新結社詩傳淮楚夢還鄉波沉不見香羅襪空向牛腰得夜光送舜卿遊建昌雷虞龍字舜卿好談兵出入軍幕并門當日倚長城笑遣妖兇巻斾旌江上長鯨知巳滅草中封豕不勞平十年當念瘡痍苦此日寜論戰伐名虎帳夜談資婉畫為言竒䇿是休兵太倉稊米集巻十五
