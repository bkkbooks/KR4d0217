body:
  text: 太倉稊米集巻二十宋周紫芝撰詩六十首雨後二首造物有佳思放晴娛薄遊湖光散鳬鴈野日下羊牛水欲滿舊壑草還青逺疇雲來猶倚杖雨過忽横舟晚日纖纖出痴雲陣陣囘風林無定翼晴漢有殘雷白水自天去青山隨眼來峰髙月未吐更擬着詩催將歸白湖而雨世間那得此間身恐是前生賀季真白水窻閒頻入夢黄梅雨細却留人重聽欵乃烟中曲淨掃離騷几上塵但得南風送歸棹未應幽獨解傷神中元日雨中録所見顛風急來萬木萎迅雷不聼人掩耳南山栖鳥失故巢北山翔龍巻湖水翔龍掉尾不肯收眼看滄波接雲起想當舟楫避驚濤無數魚蝦趁龍尾讀張載揚所示近詩頗懷其人眼中人物欠曹劉老矣逢君接勝遊詩與漫郎推行輩元具茨也字從坡老得源流羸驂又踏千山去黄菊空催九日愁横槊想多秋後句詩成須着錦囊收次韻仲照秋懷四絶日斜樓閣暮雲中黄菊紅蕖滿院風酒熟未酬花爛熳詩來時聽玉丁東老去篇章誰與酬秋來又喜與君遊遺音固自成三歎妙語不應慙四愁白髮新愁滿眼中騷人零落怨秋風年來詩思成何事聊伴寒螿泣露叢秋在幽人行樂中好山欲盡更須窮花姑水繞幾時到罨畫溪遥路欲通秋雨連日老鬢風吹急愁雲帶雨飛白添平岸水紅掩傍幽扉力盡方謀食天寒未授衣此身慙社燕秋晩亦能歸次韻羅仲共教授閒居三首為米要令陶令出無氊今坐廣文窮懸知嚼蠟世味薄未抵撲衣山色濃大蓋且從渠自擁小槽當與客頻中家談安得從三老華萼同編是古風了事痴兒不到詩間中鼓吹自應竒莫教句法驚人甚便恐功名入手遲性癖雅宜嵇叔懶官閒只有漫郎知庭梧想得西風急秋意㣲生楚些悲擬築揚雄宅一區碧鷄坊外且成居湖江君尚作浮宅風雨我當無敝廬平日夢遊嗟路逺新凉見面恰秋餘便須載酒相從去要識平生未見書白湖聞鴈三首斗落參横天雨霜夢殘燈盡客思鄉丁寧莫作呌雲去老眼不禁秋夜長晚向瀕湖寄一椽只憑沙鴈與周旋北來南去莫惆悵我亦飄零那記年華人流落幾秋風南望中原信不通好寄書來蘇屬國君王方射上林中九月風雨終日用懷載揚韻九日清尊强挽秋滿庭風雨復誰遊俗人言下無三語此老胷中有九流白髮不妨欺短㡌黄花應解笑痴愁客情老去何曾好雙鯉書來幾日收九日不出白髮誰憐我黄花最憶渠酒盃今日把筋力去年殊身逺秋如夢謀疎老更愚客愁澆不下强欲醉茱萸橋成尚憶防秋日疎渠轉曲城萬方知盗息此地看橋成拄杖知頻過遊魚莫漫驚明朝趁虚去畫柱曉霜明雪夜病眼怕遥夜宿爐依小温酒醨嫌雪厚書細苦燈昏殘臘歸時夢他鄉盡處村可憐雙白鬢深閉一蓬門讀蔡中郎傳人生無先知頗欲邀後福自言茍依違安得有顛覆伯喈英偉資髙義甚敦篤不為左囘天輒作流水曲立朝有公言誰能保家族朝奏皂囊封暮就洛陽獄晚節不自守一跌變前躅起依千里草九徙如轉軸卓死固已久安得復嚬蹙琴中知殺氣此理反未燭陋哉王司徒避謗私欲戮公忠信安在志操等流俗何能起頺綱此輩真碌碌責鷄豢犬欲司夜畜鷄要鳴晨二物一失職遂辜畜養恩嗟我籠中鷄芥羽光照人峩冠事飲啄緘口隨晨昏我怒欲爾烹鷄笑復自陳君看多言者以忠獲怒嗔臺評與幕辨呶呶常殺身幸此北窻臥頗似羲皇民五起笑朝士三號驚夢魂使子卧紅日謝客扃柴門此意殊不惡誚我無諄諄客舍二首日日湖邊路頻來我不嗔故山無百里客舍遂三春紅落含桃過青垂小杏新光陰花委地飄泊燕依人疇昔江湖意兒曹摠不知幅巾霑雨過拄杖看雲移鳯子飛應逺鶯兒語最遲閒從梅雪後直到麥秋時送張顛東歸張顛佳處是清髙不但詩狂酒亦豪自說平生耽翰墨未嘗名諱落官曹書工恥作雲間牓畫好能添頰上毛早信人間苦荆棘不嫌門外長蓬蒿薄暮一首物外無餘子愁邊有是翁夢囘驚日脚雨罷看雲峰天與長閒處湖供不斷風猶嫌太多事身落亂書叢睡熟不知雨夢殘無限凉鶯飛時到眼鷺起不成行𤓰熟分蒼玉蓮香擘翠房掃門還待月近水更移床靜夜二首家與重湖近門當永夜開鷺隨波浩蕩人共月徘徊曉色催星落飛雲帶雨來長鬚汲水去小艇淂魚囘湖影入散髪晩沙横斷汀冠欹從自落門設未嘗扃鬼着林邊火螢翻水上星時聞有船過月黒夜㝠㝠雨晴望青山太白墓在其下世間尤物如異人青山不入諸山群晚來濃翠欲成滴雨後數鬟髙切雲人言兹山下埋玉太白祠扉落岩谷至今樵牧無斧斤餘潤油然歸草木往嵗小生來酹公秋山未霜葉尚緑是時落日在屋梁彷彿如照公眉目今我不樂湖水濱青山到眼無朝昏更欲再拜望拱木公已乘鸞上天門帝鄉渺渺不知處誰能為我招清魂死生夜旦何足道不敢復作湘纍文僕去嵗作湖居十二詩向開叔有詩次韻迺為謝三年湖雨一茅茨坐遣幽人識面遲遺恨忽從愁裏盡交情先向句中知重尋故里空勞夢亟買歸舟㑹有期何日劇談聽亹亹滿傾春酒細論詩得木犀三年身在菰蒲裏手把岩花意惘然折得秋芳香滿袖夢魂常繞故山前夜苦秋蚊達旦不寐昔年記淮邦茅廬蔚秋草兩耳無晨昏秋蚊困飛繞利吻極慘傷群飛固輕矯懸知孀女祠未可較多少至今夢中雷客枕疑已曉那知三家村復此終夕撓青烟鬱蒿艾横空益奔擾手倦勞撲縁眼病惡薰燎誰言天宇大微物吝除剿何必養嘉羞便可付丹鳥歸自白湖舟中作客舍三寒暑扁舟入往還殘年不如意老色日凋顔暗谷鳴珊珮晴巒結翠鬟江禽渾識面似欲喚人閒寄家龍谿寺小閣初成時寓横岡三年波浸白湖門佛屋新分水北村窻可近書真窈窕室纔容榻頗深温妻孥共社同香火魚鼓催人作曉昏雪頷已疎憐我老雲蹤無定與誰論次韻雷飛卿送其女兄南歸蘭皋飛佩一凄然别酒深傾玉滿船誰喚孤㠶落天際盡驅秋色到愁邊燎鬚心在人能說擬絮才髙墨未乾莫向南湖頻着眼斷鴻疎影在雲烟次韻陳季陵閲猥藁見寄相思一日九迴腸多謝來書細作行鏡裏有霜憐我老鼎中無臠付君嘗衰顔本自羞連璧佳句仍驚得夜光五鳯樓髙無此手曹劉真是及肩墻次韻文殊老人題寳頂寺門連弱水不可渡山似妙髙知幾尋得雨僧分香積飯行檀人施䮍蹄金重新佛屋龍天喜巳退魔軍嵗月深老去願隨君共隱誰能擁膝更長吟楊次公侍講得古印于洪井其文云東海開國次翁之子德潤以贈徐伯逺伯逺有詩次韻王謝風流本自長天教洪井發珍藏定知東海新金斗可繼文安舊印章内相徐公伯逺祖封文安郡故有文安開國印也龜去豈無江上戀鵲來今得石中黄傳家巳作他年兆莫把功名付錦囊次韻雷飛卿遊山時余以病不往一病能令百念闌霜蓬零亂照衰顔心知只可開三徑炙手何勞叩八闗老喜社中多臭味夢思方外有躋攀勸君莫放尋山屐嬴取浮生半日閒渡陂南用斜川韻萬物自有得吾生感行休及茲天氣佳步尋水南遊青板得野航竟渡一葦流乘流本無心豈有不下鷗開口月有幾百年終一邱與世似異趨此行誰我儔村醪亦足醉對影自獻酬未知垂老日能遂此樂不事定㑹當諧不復懷預憂但願營自安孰是都無求歸陂北用斜川韻薄遊不盡興歸卧當少休曲水雖陳迹斜川有新遊浩歌獨長往豈亦慙此流僑寓三家村飄如浮水鷗屢爭漁樵席共守狐䑕邱削跡屏冠服索居謝朋儔樽中有餘滴子獻復父酬殷勤問穉子汝復樂此不穉子掉頭笑老夫豁深憂但令常復爾過是吾何求舟中次韻飛卿贈别長句早嵗從田歎不逢老隨乘鴈聽西東青山約在何時了白髮歡成一笑空昨夜清歌催别酒只今寒月上孤蓬相逢莫怪長相憶舉世交遊無此風雪後望文脊諸峯哦韋蘇州門對寒流雪滿山之句得兩詩復居城中雪壓寒林春未囘晚山猶帶玉崔嵬誰將舊日韋郎句貌取郭熈平逺來新來嫋嫋娉娉雪猶在重重疊疊山莫作故時峯嶺看玉京今不是人間送方元相宰錢塘雲路飛騰合到君不應猶現宰官身未分東觀消長日聊為西湖作主人天近得聲知亦易民飢當念可須嗔簿書叢裏江山在了事何妨得句頻向開叔借陳公詩巻以詩奉寄且易乙藁誰言靜寄是窮兒盡得陳公晚嵗詩一讀便醒雙淚眼頭風更擬倩誰醫平生不識陳驚坐傳得新詩喜失牀聞道明珠猶滿眼煩君為我一傾囊舟過道場山下將往遊舟師告以雪塗不可行而止風蒲飽朝航霽色急新漲雲山繞平湖水墨澹屏障夷猶柂初囘突兀山入望何妨傾寸眸便足了千嶂想像鐘磬音隱約霄漢上我欲一往遊遐瞻茲可暢暮雪猶在塗遺事不得訪人生蠟屐縁一世能幾兩登山追勝遊脚力須少壯重來定何時吾䇿今可杖老願復爾違撫事一惆悵老日老日那容惜晴光到眼休蠶知今日浴麥復幾時收黄犢分青草花鳬趁緑溝誰能更歸得已是一春留西湖山下梅花塢行可里許至陳御史園亭倦客厭卑栖白日坐飄忽呼我同舍郎緩䇿扶勃窣縁山得人家附影蔽深樾湖水一鏡明梅花千樹發扶疎弄清影仿彿見羅襪凄迷香霧中身已在月窟窮探意未已取徑無詰屈誰家歌舞園花亂竹復密御史投紱餘課豎種梨栗吾曹不解事尚此學操瑟當從漢陰人抱甕日搰搰寒食前五日作二絶杜鵑新聽曉來聲暖氣催花一夜成寒食只今無幾日故郷何處不闗情寒食風埃滿客巾西湖烟雨送愁頻日髙未起鳥呼夢春晚不歸花笑人三月二十二日春雨終日此情誰與問天公幽事全歸白髮翁袖手尋詩紅燭裏巻簾聽雨緑陰中杯盤眼見櫻桃熟時節心驚柳絮空誰為羇栖到三月還家猶及舞雩風奉酬德莊見和趙彦端字德荘有詩文行于世號介菴居士集横飛衮衮見諸公着眼何由到此翁胡粤相忘千里外金蘭投分一言中詩縁漸熟情難洗老色來煎念已空銷盡客愁知底事愛君囘雪與流風太倉稊米集巻二十
