body:
  text: 太倉稊米集巻八宋周紫芝􅁧詩五十九首次韵答子容三首載酒念疇昔幽情日相過十年登鬼録奄冉今已多舊盟難重尋俗子終殊科只今驚大巫為我驅妖魔但恐費推挽勞君戒蹉跎願隨翩翩子徙倚南山阿二老懶不出門冺黙抱窮獨賴此千載人洗我雙病目公思如懸河傾㵼歸四凟我如眢井泉鑿地日不足幸分一滴甘濡此將槁木行當奉周旋歸囊粲珠玉三故交天一涯塗路困脩阻新交同一邦對面日晤語知君相知心政在亹亹處朝屐窮幽深夜床同曉雨似聞跫然音振翮便輕舉俗物多敗人公其勿輕許次韵蘇如圭乞貓蘇侯家四壁每飯歌權輿庾郎鮭菜盤三韭羅春蔬飢鼠竄旁舍不復勞驅除何為走老黥貫魚乞狸奴頗知紅錦囊萬巻家多書我時醉着㡌過子城南居手擎烏絲欄棐几自巻舒寒具久不設躉尾亦足娛猶恐遭咬囓備豫須不虞狸奴當努力鼠輩勤誅鋤無為幸一飽髙臥依寒壚食蛤蜊一首舊聞若士昇中天俗眼未識烏鳶肩㨿龜食蛤結汗漫盧敖尚肯遊人間髙談謾罵沈昭畧坐視元長􅅓稚弱更言且共食蛤蜊忿氣難平兩譏謔下臨無地髙無天更作兒女爭􅑦妍平生我亦笑二子豈知真味含芳鮮何如結屋清江曲風雨闗門酒初熟自烹折鼎吹濕薪笑倚胡床摩醉腹但願年年對蛤蜊一杯薦我梨花玉演師跳珠泉阿􅐣事窮奢供億在寰宇雲錦張風㠶明珠濺飛雨須臾就變滅慶弔只仰俯何如西山泉迸石互吞吐尋源上層巓流脉下深塢散作跳空珠纍纍不堪數雖無千金賞玉漱羅堂廡道人得摩尼夜光還合浦不知方外士得失兩安取此意誰復知寒流自千古瓊師蒼筤軒絶境渺天末招提入雲端汪灣一溪水似與山屈盤僧房各上下處處聞驚湍道人更幽獨開窗對檀欒細雨洗輕碧微風生暮寒雲梢自裊裊玉佩時珊珊繄我絶韵友久結無情歡相逢如故人棄置良獨難婆娑㺯清影夕陽殊未殘何當分清隂與子同考槃蠟梅一首彼美青樓倡顔色豈不好春風桃李花過雨堪一掃粲粲星冠女雲宫在三島霧帔巻黄羅披風出雲表焚香禮夜壇香霧生杳渺恨無脂粉顔千金聘嫋嫋劉郎竟不來含嚬㺯清曉誰憐傲霜枝照眼自明瞭永懷蕊宫姿微黄淡飛標清蟾耿寒枝與月自相惱真賞久未逢殘英惜空老次韵雷飛卿雪中掉小舟見過别時江上草離離相見寒枝欲放梅目送征鴻天外去夢驚烟棹雪中來青雲誰料未十里白髮政須同一杯老日相逄能有幾春花欲動莫先囘次韵似表謝胡士曹分梅花李侯自以詩名家詩成與月爭霜華誰將尤物調韵語拄笏騎曹分好花花寒力淺香微透惱亂詩翁作詩瘦對花欲作楚狂顛草賦誰居廣平右但愁急管吹邊隅便應買酒煩長鬚參横想見緑衣舞月中笑語花微臞天香艷艷與誰好君家兄弟元三株明日新詩入花蕚人間此事應久無唐李乂兄弟同集號華蕚可憐多病閉門叟對月痴坐空中書雪中過慶老方丈雲滿江天雪意酣擁爐聊復聽巴談老人不出真藏六來客何勞說後三已借團蒲揺短夢更澆春餅薦餘甘此生試向閒中看何止人間七不堪次韵答春卿尋梅霜梅槁立清江濆誰當為挽歸來魂青鞋醉􅂿江沙路玉㽔簪㡌驚王孫臨風想見花有語此郎詞賦如文園花開無情落亦易聞香當欵知誰門怕看落地白雪滿便恐綴枝青子繁温風明月不易得繞樹莫放花黄昏知君共醉有佳客此意歸來誰與論煩君與問花無恙尚堪一笑同清樽飲沈都曹家梅花下時東南已擾去年夜走山百盤山中飛雪朝漫漫不知春向夢中盡更有梅花醉後看今年冬温寒力軟春入梅梢已堪剪挿花重飲故人樽猶得一枝供細橪豈知藂棘避戈鋋還對粉香驚婉孌花前楚客狂欲顛月下吳牛空自喘明年尚恐賊連營零落肯教花滿眼只今猶可醉餘香杯行到君莫嫌滿次韵舒天用元夕觀燈喜甚成詩二首河陜欃搶漸欲平不應戎馬尚連營聲傳萬井燈花麗月到中天夜氣清爛醉且須遊閬苑論功終合擬長城歸來䄂手無人識喚作風流阮步兵樂事悠悠不繫情生涯狗茍復蠅營嫌渠燈燭紅紗亂為我歌詞白雪清豈料脫身歸故國可憐行樂記王城開元盛事元如許何日中原不用兵次韵元司理元夜三絶火龍衘燭御城遊喜入昇平四百州惆悵長安今夜月為誰重上漢宫樓憶得葆真池上春水晶簾底看燈人當年京洛隨車客今夜江湖臥病身花落殘缸睡味酣九霄誰正夢傳柑百千燈滿虚空界半夜囘光獨閉菴次韵同舒天用和元侯三絶舒郎人物是清流不解蒲萄得一州郡守無燈亦行樂也隨賔客上江樓亂離燈火不成春月下歸時有幾人我老尚堪陪一笑世間無似此閒身遊騎歸來尚半酣一杯誰與瓮頭柑小窓夢斷龕燈在影落疎梅月上菴菖蒲山子歌南人生長在山間家家有窗窗有山吳峰楚嶠不知數但見雲埋雨洗堆烟鬟誰知長安綺紈子一拳何處鑱雲根陽侯疏鑿出岩穴上有斕斑皴蘚紋下有千嵗不死瑤草蒼鬚繁痴兒持此矜王孫朝攜磈礧登朱門暮擁紅旌辭帝閽開元承平二十年四邊無警不控弦綉衣半是花鳥使達官避路誰敢言大艑岢峩春浪碧處處爭看太湖石天心不肯乾太湖八州萬口空嗟吁纍石作山齊華嶽千峯萬巒撑碧落樛龍夭矯攬雲雨仿彿去天無一握錦㠶東下飛龍舟咸陽苑籞空蕭索杜陵野老哀江頭菖蒲之山兮誰爾留次韵羅仲共山村題咏十首晏坐銷長日禪心薫妙香已成三折臂安用九􅂞腸二花片風前落江流雨後渾少陵新得句應似浣花村三喪亂何時定江村愁殺人日長空有睡花在不成春四老去家無定名髙席未前如君尚窮約誰與問蒼天五避地成真隱依山結草廬此身無籍在隨寓即成居六北闕書難上南方賊未誅諸公在廊廟誰與問唐虞七欲問濯潭路懸知隔數村曉來茅屋夢相對飽朝暄八有醉銷千日無詩學四愁幾因君得句技癢不能休凢塞北兵戈滿竹西歌吹空何堪故鄉夢真在白頭中十兩國兵難解三春花自飛愁因春鳥喚心逐暮鴻歸次韵草堂主人雨中十首反鎻衡門誰復開草堂殊不見兵埃雄風斜巻雲頭去雌霓横遮雨脚囘有家憐我無鄉地好事知君不世情借得小窗安淨榻臥聽風雨入荷聲虎頭山下元無路龍骨溪邊尚有窗風裡荷花吹不倒雨中鸂鶒自成雙少年結客不思家酒涴春衫白苧麻今日江村烟雨裏兵戈滿地鬂雙華滿谿烟雨濕芙蕖緑葉紅花錦不殊聞說宛西橋畔宅小園無地不荒蕪醉裡青春挽不留眼前戈甲幾時休溪邊雨細花吹盡隴上風寒麥又秋亂來嵗月摠如流頭白江村不奈愁老罷此身何處着尚堪同倚雨中樓含桃熟後鶯還語柳絮飛時燕亦忙風物但隨時節好不知人意自凄凉浴鳬飛鷺下横塘花過鶯歸草自長恰似碧雞坊口望浣花谿上一茅堂避地偷生只閉門不堪搔首對醨尊行歌野哭江頭路雨葉風花摠斷魂避兵遣懷六首鳥噪烏江渡鯨吞白下州地分元帥重聲入敵營愁近磔巡江尉將俘北闕頭兵行速如矢甲縫露氊裘二江濶烽烟冷城危戰騎驍敵從諸道入將擁潰兵驕萬國晝多壘三軍夜擊刁干戈空滿眼誰議築壇髙三避地蒼黄夜悲凉郡郭西捫蘿危絶磴杖䇿困深泥掩面憐痴女囘頭愧老妻驚魂猶未定邊馬莫頻嘶四野宿寧堪度風飡寔自憐妻孥渾在眼戈甲暗凋年夜月翻驚鵲炎天看跕鳶射敵無一矢南渡幾樓船五心折來時路身行亂後村土兵呵白晝野婦哭黄昏賊去烟留屋人歸日在門舂陵四萬户今日幾家存六閶闔乾坤大封疆四百州蒙塵二聖哲伐叛六春秋地入强鄰濶官封悍將優奉天哀詔下感泣萬方愁次韵常元明西坑見寄二首西坑只在亂山間尋得仇池十九泉有句能催千嶂雨無人共釣一川烟南來敵騎欲凌川北嶺人家自燒原聞道西坑堪避地擬尋雞犬問桃源寒食雜興三首寒食只數日天氣殊未佳輕雲澹微茫細雨吹横斜青春似無情不到愁人家霽色忽浩蕩平原繡芳華走馬惡少年挾矢射㦸牙白羽呌餓䲭舉網連五豝㑹當斬長鯨封侯鳴皷笳時危何不有寒士空泥沙凛凛羞俠氣悠悠但咨嗟憶昔在京華醉􅂿長安市長安白面郎快馬如流水羅􅃭照暮春鬬草攜佳麗就中五侯家雲幄耀金翠九陌過香軿都人拾遺珥歌喧樂佳節日暮多沉醉榮華一消歇禍亂蒼黄起北狩隨兩宫血屬六萬指征車去悠悠河水日瀰瀰浩歌哀江頭老淚不可止北邙何巍巍髙冢如魚鱗慨彼墓中士中朝稱貴人萬金樹豐碑千金琢麒麟自從敵騎入亂離隔中原生者各奔竄死者啣長寃子孫無奠享白楊悲餒魂峩峩纓冠子往往無丘墳舉酒西北向野哭望白雲我今上先隴覆杯松下根時危不自保念之殊酸辛寒食夜月下作一百五夜對明月二十七種無蔬柈莫嫌萬㸃飛花恨且結三人對影歡流落忽成身老大亂離誰不涕闌干顛狂自笑那能寐立盡春風午夜寒送詹伯尹丞涇邑西溪寒食柳花飛正是琴髙欲到時薄禄僅酧三釡志新篇莫負兩松詩催科未辦何妨拙作吏能清不用知髙論平生期活國一方疲瘵看君醫題馮尉緑浄堂不種平池玉井蓮巻簾堂下水如煙溶溶自漲晴江緑脉脉還通暗谷泉誰道馮唐今白首始知梅福是真仙客來莫吐青銅面要看蟾宫上下天野飯野飯聊娛老登盤春物佳芼羮横荻笋煑餅荐槐芽魚尾初埀劍臺苗未着花誰言庾郎瘦蔬腹漸禁茶明皇羯皷圖禁籞鶯聲外天袍擁御黄曲名翻茘子春苑繞沉香白雨花奴手風鬃舞馬床向來歌吹地何處是漁陽送智上人道人飲山流顔色頗秀整經營一菴足偃蹇萬事屏忽隨銅峯雲飛下銅峯頂欲了一大縁此意極勇猛白晝多豺狼横塗半坑穽為言普陁林誰能保腰領要憑降魔力化作清淨境師亦初無言薄俗時自警盡洗歴刼寃願力周涬溟瘦藤行可支慎勿厭馳騁太倉稊米集巻八
