body:
  text: 太倉稊米集巻六十六宋周紫芝撰書後二十八首書陸祠部帖後祠部郎陸公嵓老少以經術文采見知舒王與其伯氏左相齊名世號二陸晩方得州豈弟慈祥不事表襮每接使客酒不過數行而止客去輒齋素以裁其過今觀其言有既無厨傳以沽往來之譽又乏家貲以結上下之交可謂無負漢宣之詔矣公甞與客言莊周論蠻氏觸氏爭蝸牛之國何其况之微也至於逐北數萬人流血三千里則可謂所爭者小而所傷大也嗚呼其可謂仁人之言已宣和甲辰中元前五日見此數帖因記前語使人想見醇徳乃書其後書枯冷道人李處士序後唐文皇辰日哭張公謹疑若能脫畧隂陽拘忌之說者至命呂才使刪其書則又似頗留意於此矣才之論葬法以謂葬家取乾艮二時乃近夜半文與禮乖又古葬並在國都之北無上利下利大墓小墓之說才豈不知其術蓋有所自來其亦慮人主求小道失大體而立此論乎世俗之人急於富貴利達為墓師所欺乆矣又其所傳之書鄙陋荒怪期在符㑹俗人意㫖皆不待攻而可破今龍谿李君獨能畧去近時諸家地理書時時自出新意頗有竒中可謂不傳之妙也已君猶懼其法不與俗人合故枯冷道人藉九方臯之說以告俾余跋其後余言如鴻毛無萬鈞之力可回世人好惡因謂李君曰君子病不精其技耳人之知與不知亦何足深較余甞論羊叔子其風流清尚有絶世之稱死之日能使州人罷市將士慟哭此豈宜無子而相墓者謂若鑿山當無後已而果然使子之術如叔子之客雖名後世可也况一時乎靖康丁未中春中休日書元寧川帖後元具茨參江西裨遂得句法真山谷法嗣也具茨親見山谷其得處便似不同張載揚學東坡書咄咄逼真乃為具茨書此詩云公同僚相得甚懽可謂一臺二妙矣世間俗子寫無法楷書作無韻惡語又甞負此以疵病他人見之令人氣塞故留此巻時時開闔一洗凡馬之塵耳紹興二年元宵後四日書書了翁贈别頌後了翁以正色立朝憤世疾邪不避權貴風采人物當不在汲長孺下宜其髙目雲漢以傲睨一世折節下士喜與佳士周旋此公何止髙人數頭地耶居士韋深道隱居湖隂一時賢士大夫皆樂與之游而公於居士所以相求之意尤厚余以是益喜居士之賢而知翁之為樂易君子也紹興二年清明後四日書書姑谿老人詩巻後頃余北走建康暮投青山市詰朝謁太白祠公時在路西聞余來使人折簡見邀遂止余宿青燈白醪雪髯紅頰議論衮衮可聽喜津津見於顔間余維恨拜公於床下為已晩也然私竊自喜公年雖髙而氣力强健繼此猶可以數見逾月而歸則公已逝矣此數詩乃當時酒間為余書者紹興三年秋七月中休日閱羣書見之把巻興懷為之雪涕書李夫人枯木墨竹後徐伯逺出其家所藏李夫人枯木墨竹霜枝勁節凜凜在人目中自非作白山茶賦手安能出此竒崛態度相其婆娑筆硯間定不減當年女博士耳紹興已卯中春二十有五日書書安定郡王長短句後安定郡王具文殊無礙辨才傳東坡居士正法眼藏時時游戲於長短句中妙麗清壯無一字不可人意今觀此數解真樂府中絶唱也試使韻人勝士酒酣耳熱倚席而歌之當復令人想見其風采後五詩余舊聞於故人者併書巻尾紹興五年嘉平十有三日靜寄老人書書璉上人詩巻後頃年讀汪内相集至還璉上人詩巻云筆端游戲詎須頻短巻才開即可人月映澄江梅映雪比君猶自不清新未甞不想見其人也近常道人攜璉公數詩來嫵媚清熟殊不犯俗子格律乃知江月雪梅之喻端非虚語惜其相望千里不與之徜徉耳紹興十年正月十日書書自作長短句後余少年時間作長短句殊不能工常戲自評之以謂視古今諸家樂府蓋貌兄弟而年父子也猶不能無意於著鞭今須髮種種則無復事矣同舎郎葉南美屢丐於余偶追錄此數解因以遺之南美老於文辭以功名自喜乃復須此韓退之所謂如人之嗜昌歜未易詰其所以然者哉紹興十一年清明後五日書書趙介叔雷莊詩後維揚人趙介叔頃與余相别於宛陵今十年矣是時東南羣盗蜂起殊有重别之意余作長短句贈别云玉溪秋月浸寒波忍持酒重聽離歌不堪對綠隂飛閣月下羞娥夜深驚鵲轉南柯慘别意無奈愁何他年事不須重問轉更愁多使傳杯者歌之坐客為之悽然後介叔留九華其家自泉南乗舟而下道遇亂兵舉族皆歿前調遂為語䜟紹興十四年四月十五日客有錄介叔雷莊小詩以示余者語極悲楚讀之使人酸鼻而其詩又工皆可錄也書觀音感應錄後清照老人以户部郎邊公所集觀音感應一百事相示讀之令人感歎不巳而議者乃復怪其靈異如此衆多獨不知菩薩願力深重為衆生除一切苦何有窮極况在震旦一國一方之所示現若此而遍一大地盡恒河沙界所有衆生菩薩視之同赤子一有苦惱悉加調䕶則其慈哀所及豈耳目見聞之所可及雖有須彌山筆大海聚墨安能稱述今邊公表百事以傳世蓋欲使人信心堅固得所依歸其用心可謂善矣紹興十五年四月十有四日書書奉親養老書後昔人有以麤糲飯客以精饌奉親者一見便為名士稱賞士大夫酣酗杯酒中雖酒肉如山猶恐未能娯客至於羊棗之奉往往未甞經意大似倒置余與艾慎機出同王事入則分産而居見其奉親之孝甚謹意其近世無與比者宜此書之未甞去眼也紹興十六年正月七日書書蘇養直與陳彦育帖後自古髙人逸士隱於嵓谷者蓋亦多而文采風流未必俱勝後湖視富貴如浮雲而言語文章妙絶一世漢魏而下所未有也此巻中數詩皆佳藁而樂府語韻尤髙使東坡先生見之當不但喜清江一曲耳書梅師贊家梅聖俞書後僕少年時甞閱家所藏前輩書尺得聖俞先生數帖及姑蘇園亭記愛其楷法甚謹已而失之自是不復見先生之書今三十年矣此篇乃聖俞遺其弟宣義公師贊者公之孫和仲出以示僕覽之如復見吾家所藏也觀先生之詩樂其字畫它人猶在所愛况公家物䕶之其可不力乎紹興辛未臘月十日同郡周某書書具茨集後余與元道州一别十五年自此翁下世平日篇章無一字到眼念之令人落寞殊無好懐今年朅來富州吏部郎桂嘉任出其詩文四編殆數百首噫嘻盛哉何其多也道州年十八嵗已升山谷之堂父子俱出其門亦是一時偉人文詞超妙髙出世表而所遇乃爾詩之為祟如是其酷耶紹興壬申二月庚午妙香寮書書月巖集後月巖集太華逸民之所作而太華逸民則李廌方叔之自號也李端叔序其文謂東坡甞言吾評斯文如大川東注晝夜不息不至於海不止也今誦其詩讀其文然後知此老之言為有㫖焉而自非豪邁英傑之氣過人十倍則其發為文詞何以若是其痛快耶紹興壬申春滑臺劉徳秀借本於妙香寮乃書以還之書老圃集後大洪昔時詩用意精深頗加雕繪之功蓋酷似其舅此其所載意其多晩年之作與昔所見殊不類近時士大夫論徐師川詩甚不公以謂稍稍放倒而不知師川暮年得句多出自然也毛嬙麗姬粉白黛綠歛袵顧視未免時自矜持徐娘雖老却以洗粧而真香生色有不可描畫之意蓋詩至於此然後為工耳紹興壬申春滑臺劉徳秀借本於妙香寮乃書以還之書郭元壽家叔黨書後頃嵗故人章刑部決獄五羊道過鬱孤臺得東坡兩詩大字石刻歸以遺余妙不可言今郭元壽迺以叔黨所書鬱孤詩相示字畫詞采幾不可辨覽之使人恍然如逸少復生子敬猶在世也後人當謂前有二王後有兩蘇為不疑矣紹興壬申三月甲子宛陵周某書書山谷帖後僕平生閱山谷書甚多所謂摩挲石刻鬢成絲者猶未甞見其起草此一紙塗竄至數十字大似顔平原坐位帖字差少耳後人觀之當不減今人之視魯公也紹興壬申三月甲子宛陵周某書書晁無咎帖後讀晁無咎之文與詩浩浩然猶河漢之無極也想其胸中何止有八九雲夢而已今觀此數帖如散聖出塵不縛禪律自然近道豈可付俗人論工拙哉紹興壬申四月之吉妙香寮老人書書范文正公書竇諌議事跡後范陽人竇禹錫近世號稱長者觀其嫁孤女八十二舉貧不能葬者二十七喪此非强勉而能者則它不難也至於身享長年五子皆至逹官天所以報之驗若符契矣夫有隂徳者必有陽報而世鮮為之甚者引張湯杜周以謂慘毒者猶皆累世貴顯而安世延年輩又有賢徳以傳後世獨不知天之報施固有常理不可一槩論也書沈麟士傳後沈麟士為隣人認其所著履麟士曰是卿履耶跣而與之隣人得履以前者還麟士曰非卿履耶笑而受之陳凝之為村田所誣亦甞認其所著履笑曰僕著已弊矣當於家中覔新者償君後還所失履不責受或謂凝之過於麟士甚逺周子曰麟士何心之有哉凝之則近於矯矣書陶淵明歸田園書後陶淵明閒居則負耒而躬耕年飢則叩門而乞食蓋不可不謂貧矣至於棄官而歸則易若脫履非其胸中自有邱壑安能擺落世故如此頃時杜祁公在政府客有新第者以所業獻公請學為政公無一言唯問生事厚薄人有問公者公曰人有田園則進退輕乃可行吾志祁公可謂知言矣近時士大夫多喜學淵明詩皆故為靜退逺引之詞以文其歆羡躁進之失譬猶效西子之顰而㤀其語意髙逺不能窺此老之藩籬也書張待舉詩集後余甞聞鄉先生言鄉里有張大人者耆酒好罵尤豪於詩少年博極羣書其為人標置甚髙以故卒困於小官當時貴人皆知其才畏而不用滕公元發其友也甞為錢塘守張侯客焉滕公置酒髙㑹賔客滿座飲方酣即岸幘箕踞大呼滕大爾復能記共飲長安酒家昏直而去耶坐客為之失色公笑曰寧論許事但當痛飲醇酎耳明日不告而去公贐之以金張侯持金叩枻而歌已而投諸江曰滕公凂我哉使者反命公曰狂奴故態老不衰耶暮年隱居宛谿之上築曲肱亭林間日醉其中不與俗人交亭今猶有故基存焉黄太史所謂仲蔚蓬蒿宅宣城詩句中隣雞呼不起擁被聽松風蓋題曲肱亭詩也張侯之詩温麗而不燥靚深而有體非近世作者所能仿彿而其多至數十篇雖多而益竒惜其埋沒之乆未有傳於世者余因併記其人之大畧云張公名賁待舉字也官至忠州司户而死書韓退之羅池廟碑後唐史載栁子厚既沒栁人懷之記言降於州之堂有嫚者輒殺之愈因碑而實之退之所謂信道篤而自知明者不應紀此茫昧荒怪之事以欺後世也使誠有之必妖鬼有所憑藉而然愈猶當為子厚力辨其非而因碑以實之其意殆不可曉昔韓擒虎之死人有見兵騎迎公於門以為閻羅王者此亦史氏好竒之過栁以文詞顯韓以勲烈稱皆一時之賢不幸而䝉此惡聲南史固不足取信而退之且猶如此於他人何望焉余毎誦其文未甞不為退之惜也書送客詩後東坡甞言古今語未有無對者信矣哉琴家謂琴聲能娯俗耳者為設客曲頃時有作送太守詩者僕甞問之其人曰此供官詩不足觀於是設客曲乃始有對四月十日夜燈下閱猥藁偶有感於前語戲作俳體詩云設客元無琴裏曲供官尚有篋中詩時日舉似坐客皆為絶倒書徐師川詩後金陵呉思道為余言頃甞以近詩示徐公徐公謂僕是豈欲擬杜少陵句法邪思道曰少陵安可擬但不取法耳公因言余平生正坐子美見誤思道問其故公曰今人飯客飲食中最美者無如饅頭夾子連日食之如嚼木札耳丙辰夏至前兩日朱子明司理以此本見還時方晝臥東窓枕上讀數十篇乃悟前語然不可持語俗人所謂癡人面前不得說夢也他日有與余問參此語者當自了了書何正平詩巻後讀參寥子七字絶句如小兒笑蔗讀正平五字詩如大兒食藕二物皆可人口要常使知味者自評之耳曩時人問可郎詩何如僕甞應之曰可公詩其苦腴相半頗似韋應物至其骨清而氣秀則又仿彿孟浩然輩唐以來詩僧所未有也若建安七子南朝兩謝等語則徐公之論當自有深意非他人所能解也太倉稊米集巻六十六
