body:
  text: 太倉稊米集巻五十二宋周紫芝撰序十首字序三首張子名某字子嘗謂余曰名有嫌當易願有請焉余為易以大臨而字曰才卿且告之曰昔髙陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人忠肅恭懿宣慈惠和天下之人謂之八元大臨盖其一也說者以謂大禹臯陶稷契之倫夫十六子皆以其才舉用于舜而世濟其美故得為之才焉大抵聖人與小人皆有才非才也則不足以立天下之事顧其所以用之者何如耳聖人以道用其才若成湯之智武王之勇所以應乎天而順乎人者也賢人以徳用其才若九官之相舜使功立于當時其後莫能名其用者也其他若盆成括之殺其軀酆舒之不得其死則焉取于是哉余旣以是名之又舉十六族之事以語之使知夫君子小人之才其所以異者如是不可不辨也萬氏之二子皆從余游見其友且恭也會其以名請因名伯氏曰如壎而字以伯孺名仲氏曰如箎而字以仲孺詩曰伯氏吹壎仲氏吹箎説者以為恩如兄弟其相應和若壎箎也夫居家而父子篤兄弟睦然後移而友於鄉則盡敬充而事其君則盡忠盖孝慈欽順是文章事業之根本若其整于威儀秀于文詞望之儼然君子也而不能充其有而行之則學者之所不貴也且士之為善于家者必賞于朝士茍明乎此則其取富貴利逹可埀手耳二子豈不能共勉之哉余讀易吉㓙悔吝生乎動而後知非聖人之得已然而靜者動之根也動者静之對也人道之有動静猶天道之有隂陽知動而不知静則終身役役而不知止是衆人也知靜而不知動則塊然守獨而不知變是草木也二者亦何取于人道哉昔人知其將出而游于世猶未免于動也惟立于至靜之途俟其叩而後應則雖動者也而不害其為靜矣今吾子方學而仕將趨于動者也僕故名子以顒而字以靜翁吾子其勿謂僕期子以必靜也期吾子知靜之為動耳吾子嘗試焚香靜室瞑目燕坐以來天下至靜之理其理得矣則吾子異時處富貴而不滛在貧賤而不辱迫憂患而不怵抗王公而不襲蹈水火而不困吾知其無入而不自得矣吾子其勉之哉錢塘勝游録序崇寧間余以事適越道由錢塘留數日而後行時方阨于覊旅不得從諸公游然猶能一再至西湖以覽觀湖山之勝自是而西湖未嘗一日不在胷中後三十餘年再至則前日游觀之地登臨勝處十已失其八九雖湖山無恙不减昔時而金碧漫漶草木彫衰烟雲慘舒之狀魚鳥游泳之樂無復故態如王謝子弟窮愁病瘁流落草埜雖骨尚在而文采風流自然索寞殊復可憐余嘗自謂方錢塘全盛則不得從容舒歗其間更兵戈百戰之後始得朝夕於此是為可恨况復官冷食貧居無尊酒可以自樂出無勝事可以同游唯埜服曵杖時擕小輩間至山中爾然而湖山朝暮四時之景變態百出岩花澗草爭妍而競秀不可勝窮余嘗夜棹小舟容與湖間雖風荷飛翻水鳥出沒不間晦明皆可人意葢與漁翁舟子並席而中分非公卿貴人可得而與聞也至是乃始自悔以謂曩嘗恨其不得從遊於往昔無事之時而不知其清雄妙麗之姿無盡難窮之意未嘗與時增損随物盛衰何可以區區耳目一時之所聞見而自為之褒貶哉山中經行隨其所見欲作數語而勝絶之致難於摹寫不敢汙以塵言間有髙僧逸人可與語者猶能誦參寥清順輩詩語意清絶亦足自娛至于足力所窮眼界所至與夫往昔遺蹤故事之在山間者不可勝述因隨紀之久而成書號錢塘勝游録他日夢想湖山而不能至時取而讀之如與兒曹徜徉其間可以按圖而至豈不便哉乙丑正月十日序朱氏藏書目序自古學士大夫之家未有不以家藏圖書為美葢髙貲者積貨以遺子孫酒肉費耳此蓄書之富所以獨為後世之美談也昔人有畫鳥者必蓄活鷹以規其形似後子孫廢畫而捕鷹養鷹必飼以䑕後之子孫廢鷹而捕䑕故蓄蒲博之具者其後必好博而蓄書者其子孫必讀書勢不得不然也文林郎朱君軒世居大梁其祖官東平因徙居焉金人南下東平陷沒君方以事在江南遂與其家不相聞今既十年矣一日與僕言為之出涕且曰吾家藏書萬巻皆在東平今所存唯書目因出以示僕皆其祖朝議君所藏自五經諸子百氏之書皆手校善本其餘異書小説皆所未嘗知名者秦漢以來至於有唐文人才士類書家集猶數千巻嗚呼可謂富矣哉君因俾余序其目而藏之余詰其所以序之之意君曰吾祖以善人稱於郷里子孫决不至于中絶吾有季弟離東平時年十五今二十有五六歲矣有幼子未能勝衣而眉目偉秀嶷嶷如成人使其不死今亦可年二十餘萬有一吾書不為煨燼猶可幸其復存他日可為吾家舊物子其為我記之余聞其言為之愴然而告之曰事有興衰物有成壊此理之常所不可逃者古之有天下國家者群玉之山圖書之府秘而藏之不可勝記往往至於盗賊兵火掃滅無餘隋牛𢎞之論書有五厄非虚語也國家遭罹兵禍三閣圖書猶不免厄况其餘哉今子家雖墮敵而身猶能抱遺書之總目念家世之勤勞以幸朝廷尅復境土再有中原尚能保其所藏以不失為中朝賢士大夫之家則其志固亦可嘉矣昔韓渥著香奩昭宗之亂散失不全而蘇暐得其第一篇渥猶自述以為可喜他時使君得其全書則其為喜何如哉子姑俟之毋躁富川同僚記序某聞前軰士大夫敦尚同僚之好往往至於通家一聫官事契愛終身他時兩家子弟邂逅相見有如弟兄蘇太史守膠西趙明叔為别乗趙有母夫人公拜母於堂上至則必出兒女羅立傍侍指某子曰是可幹君蠱指某子曰是必貴已而又指某子曰他日必有文後有與余相遇于宛溪之上者名某字戒叔中年未有官能為小詩頗喜作公書大字尤復逼真葢公前所謂他日必有文者也趙君嘗以是告余因以知昔人之風流雅尚如此後之陋於知者殆不然位軋則心相疑才均則跡相忌甚至更相攘奪陰中而巧發朝銜盃酒暮走訟牒口語籍籍以至解官失職甘為囚人有小人而不忍為者嗚呼悲夫其視前人逺矣余官武林十年之間同寮凡閲百輩迄無一人失歡者蓋未嘗疑亦未嘗欺卒至於相好而莫予遺也朅來冨川共事者皆一時之賢他日翺翔雲衢為當朝貴人僕雖老不復見矣使天而遺我以子與孫乎則猶将得為昔人兩家之子弟也韓退之嘗謂知其客可以信其主者宣城也知其主可以信其客者湖南也固不敢自比宣城湖南之立而語君子其視李博崔羣輩固可無愧矣於是盡錄其姓名鄉里而藏之家他日使人觀是録而知富川賓客之賢則余與有榮耀焉紹興壬申三月丁亥序别子劉子序士大夫從禄四方者將擬於吏曹必先詢諸人言某州之與某州禄孰厚廪孰豐食之珍者孰多酒之美者孰勝於二者必擇其尤而處焉幸而皆適其欲矣則又問曰訟孰為繁孰為簡亭館燕游之地絲竹聲樂之娛孰為最夫禄腆而居安味腴而食鑿民無健訟可以自暇飲有吹彈可以自娛是數者固人之所大欲存焉在所當問也獨不聞其言曰吾將居是邦也大夫之賢者有幾士之仁者有幾風流之可尚詞采之可觀者有幾吾將偕而與之游焉則其所問豈不賢於是數者哉嵗辛未夏五月某奉天子命俾守富水歸自吳至於江之南客皆為僕賀曰富水去大江不數十里環湖皆山明秀可喜而又米滑如跳珠魚白如切玉羊肥河朔酒甲江西子可以樂矣余雖自喜亦竊自憂郡無佳士雖摩挲飽腹日飲無何樂則樂矣然入将誰與吾言乎出将誰與吾嬉乎吾有疑将誰問以質乎吾有唱将誰和以應乎吾有過則又於誰就以正耶吾又何異於逃空虚之谷處鼪鼯之徑而望似人者之至耶已而至郡居無何而得子劉子焉子劉子靜重而寡過温恭而篤實為吏廉秋毫不犯為子孝可為人法其學無所不窺發而為文皆有可用與余游二年如一日逮其将歸贈我以言酌我以酒酒酣耳熱起而言曰吾老矣而又病且懶子劉子富於春秋才不在人下将有喜士者荐之朝登金馬門上龍尾道朝前君席暮賜白璧班文石以近天子之光為有日矣僕老於廬阜之間蓋将有意於子焉子劉子其勉之哉羣書雜嚼序客京師者暇則相率懐數百錢而之市如阮宣子杖頭子錢遇物而食之唯其意謂之雜嚼人之嗜書如人之嗜食皆至死而後已余雖老矣於書猶未忘其所嗜也苐恐羣書浩博不能盡讀讀亦不能盡記况老大以來目昏而志耗往往朝誦而暮失之乃隨其所閲有可於意輙萃而録之如食於市者之唯其意也號曰羣書雜嚼至于過屠氏之門據函牛之鼎而為之大嚼焉則吾所嗜者小矣又况其間棄鱠多而嗜昌歜者不為不多亦安知其不以此取誚於人哉滑稽小傳序烏有先生平生有三抝不交俗人而與人和不善飲酒而喜人醉對客寡言而樂聞滑稽一聞其言為之絶倒客去靜坐往往思之輙發一笑客有怪而問其故者先生告之曰孔子大聖人猶以言戱子游衛武公周之大臣尚作抑詩以戒厲王且以自警想其為人嚴肅端毅非滑稽諧謔之流而詩人美之曰善戱謔兮不為虐兮司馬遷作史記一書上下數千載而特為滑稽立傳東方曼倩目如懸珠齒如編貝胷中有書四十四萬言而以滑稽自雄豈非俳諧之中自有箴諷或能感動人情使之改過是以有取焉耳昔韓退之作毛頴等傳而舊史乃謂譏戲不近人情此文章之甚紕繆者在當時如張文昌軰號為深知愈者猶且不樂於斯文則舊史之陋固已不論可知矣余昔游士大夫間當酒杯流行歌正樂闋堂上客醉諧戲雜出之時雖街談巷語小説不載稗官不録者時有可觀輙採而書之號滑稽小傳久之得數十事以傳好事者雖有愧於馬遷之書方朔之辨悶則取而觀之亦足以自娛也年月日烏有先生序竹坡四君子字序丈老者之稱也年長以倍則稱之禮也齒在丈人行則稱之禮也學士大夫之以丈行則以字行今三十年矣少者謂老者曰丈可也老者謂少者曰丈則非矣官相埓也行相夷也齒相齊也曰丈焉則豈其情哉非相偽則相諛而已矣余陋此風為多甚終不能以一人而違舉世之習也小者貽譴大者速禍何自苦為之哉今方解官藉事以奉祠禄深居簡出而賓亦無一人造余門者獨與是四君子者相視而笑莫逆於心遂相與為友焉四君子為誰曰毛頴曰陶泓曰陳𤣥凡三人而禇先生不在也昔者昌黎韓愈葢常與三人者游命之名而未之字也是時禇先生方與漢太史公司馬遷作史記書徴咸陽不與三人者同在愈所也是以姓名不得見於其書余既悲字之不行又得此四君子而與之游乃有其名而無其字於是字頴曰叔鋭字泓曰堅伯字𤣥曰客卿字禇先生曰記言入則與之晤而談出則與之偕而徃也醒則與之清坐終日醉則與之縱横交錯也而其樂有不可勝言者矣於是四君子相與逡巡而謝曰願奉先生之几席不敢辭也已而為之序以贈之太倉稊米集巻五十二
