body:
  text: 太倉稊米集巻三十四宋周紫芝撰詩四十七首次韻季共蓬齋夜坐三首幽人懐故鄉夜坐聽秋雨耿耿不成寐悽悽亦良苦酒白應自斟茶甘為誰煮喜意入寒燈詩成看花吐樂飢焰短檠玉蟲綴釵股當亦念衰翁秋風卧何許二寒齋秋意髙夜乆羣籟息眼前無一塵誰與共此席平生樂虛曠頗怪言不食遥知髙世意仰靣看屋脊秋蟲曾何知悲鳴亂胸臆君亦意不眠佳月良可惜三露井飛彫梧碧月借秋色頗聞遭䑕軰惱睡成反側君豈劾䑕手姑緩藁街磔我亦見事慣流年反多歴誰能與此物更較勝負敵一笑謂狸奴無乃爾不職讀韋莊浣花集戱題二詩春風吹縐一池波付與蛾眉席上歌試倩韋郎追正始風流猶不似元和晚唐風月一番新弄粉調膏㸃注勻誰與花材詩宰相聘將花蘂作夫人相之季共各携李伯時畵軸見過分韻得人字人生不相知白頭反如新知心不在乆覿靣還成親况我五安師二妙俱可人元龍百尺樓人物誰與隣風流小安豐玉樹髙嶙峋聨翩兩竹輿訪我南坡春遂遣小叔雅娛此照坐賔叔雅昔人酒樽名王春三月雨浸浸如遊塵是日天為喜霽色明清晨各携古錦囊共出畵苑珍太邱重千載髙標澹風神丹鉛表邱壑制度殊冠巾淵明擷秋菊醉靣玉色勻龍眠賦逺遊濯髪天池濵二老不並世異世真同論當年天廄馬調御皆服馴絶域來象龍地行俱麒麟老眼閲神駿摩挲得逡廵客意亦復悦領我杯中醇尚苦江夏帖入我幽夢頻倒篋倘有意叩門君勿嗔文若自華亭携家來遊西湖袖出新詩其歸乃和前篇聊以當别黄郎滿袖出新詩别後篇章欲造微老驥但含千里意翔鸞還帯九雛歸如君好事真前輩笑我為生盡昨非小别不堪頻作惡㶚橋楊栁亦依依次韻林察院賀章正言得子海中仙果著新枝可是香山得子遲劉夢得和樂天詩有海中仙果子生遲之句雛鳯逺從丹穴至神駒初出渥洼時平生種徳無遺恨他日傳家有是兒聞道長庚曾入夢巳應能作上樓詩唐人載李白襁褓中其家携之上樓問頗能作詩否即應聲作絶句一首所謂不敢髙聲語恐驚天上人者是也全一道人分以石芝味極平淡咀留牙頰間良乆乃甘而世罕有識者或云九華山中亦有之淡中得味世誰知晚歲因君識石芝甘蔗何曾有佳境人間只好誑癡兒自聞青壁是芝田心到蓮峯最上巔且覔微甘供一笑海中無藥觧長年席間分韻送王季共得浦字烏衣説諸王人物世足數至今有雲來眼色照天宇誰知静秀中有志良未吐時從雲夢胸噴作秋江雨中郎騎生駒世亦號文虎才髙公自出歩驟真接武名當在户前意豈甘噲伍三年𨽻工曺一舸輔江浦風流各雲散相見定何許臭味苦無多酒行君竟舉飛卿携去臘書見過中有詩次韻强着𤣥端與沐猴隨人作計偶乗流昔時來徃從三徑今日﨑嶇念一邱千里回思家似夢十年贏得髩雙秋緇塵滿靣君應笑京洛相逢只自羞題錢少愚四畵一㸃傷春恨看成兩鬢霜如今無此夢莫畵兩鴛鴦鴛浦一作東吳去回頭又十年可憐江上雪空落釣魚船釣雪事去空千載何曾有若人只應煙樹裏便是永和春蘭亭雨足三湘岸烟含七澤秋可能無尺地分得庾郎愁秋觀隆茂宗鄙余所得蘇後湖像别為作短軸超然有物外意髙人本難名畵手不可俗世無癡虎頭丹青涴氷玉支郎唾俗畵為我作短軸遂出三昧手觀此真靣目衣冠有山林風味到僮僕悠悠跨蹇驢眇眇出寒谷薄暮殊未歸落日下古木未知適何門敲門看修竹無酒意闕然鴟夷尚空腹長鬚頗觧事歸騎不敢趣更復問前山誰家酒堪漉僕訪吕晞樸排岸方造舟翔鸞不及見後數日有詩次韻奉謝二首太常何敢醉如泥休沐相尋見亦稀倦著青衫君未可老遮烏㡌我當歸翔鸞寺裡停烟棹西子湖邊看落暉安得劇談同一笑孤篷六尺去如飛此生隨分本何知人品非髙論亦卑早歲囊書羞賈傳暮年學圃羡樊遲江鄉老去多歸夢樂府秋來得妙詞晞樸近示秋郊二章詞意古雅有樂府之遺風八節上灘休入句花姑載酒可相期河魨之美唯西施乳得名舊矣而未有作詩者戱作此詩吳王宫中半吳女選入吳宫歌白苧姑蘇臺上看西施羞得紅粧不歌舞青絲籠髻雲剪衣玉埀雙乳膚凝脂香羅對畫兩鸂鶒半約胸酥人未知邇來紅魚新入饌西施乳入詩翁眼釅白還驚春雪温細理不知燕玉軟坐中嘉名思昔人未許八珍當禁臠更將人乳作蒸豚可笑此郎風味淺不知柱下風流張相君暮年飲乳不飲醇帳中侍兒知有幾當時西子今未聞白闕自笑竹坡老烹鮮誰餉杯中珍江瑶歛袂敢争席一尊伴我抛青春寄秦峽州書尾悼侍兒之亡故篇末及之當年淮水未歸時紫塞天塵玉座知今日臨邊須老子莫辭萬里擁雙麾峽城真在楚雲間聞説豐年訟亦閒獠洞無兵秋日永滿傾􅌬醁看青山斷雲飛在舊陽臺無復㐮王夢裏來十二峰前何處是郡楼凝望想徘徊吳中舟行口號七首自吳歸宣出守興國白頭人自日邊來澤國風㠶破浪開巳近玉樓船又去却回愁眼望蓬萊雨入青秧水滿川吳儂相對話豐年時人盡説吳中好看我蘇常買薄田西來蕃使換氈裘渡海風㠶入帝州醉裡宫花紅壓㡌千年今日記千秋是日舟次海昌道逢金使當年戈甲過埀虹聞説樓船照水紅賊去烟波巳如鏡却還風月與漁翁昔年誰此試青萍很石中分劍氣精光熖未消劉項起始知不殺是神兵虎邱山有大石斷傳后皇試劍於此乆陪三館瀛洲客屢拜蒼龍宰府茶更覔惠山烹雪乳餘甘歸與故人誇水從吳尾入湖流身到江南第二州故國舊交應笑我十年飛雪上人頭海昌舟中雨過晚凉二首白板艅艎鐡裹頭吳歌聲在藕花洲故來急雨歸何處和月吹凉入柂樓卧隨鶴鷺入荷香笑却蒲葵借晚凉凍雨釀雲遮薄日小舟添水送歸航曉發吳江晚上姑蘇臺掛㠶早拍雲濤堆落㠶暮上姑蘇臺天沉海嶠鳥飛去雨入太湖雲不來西施白苧豈復唱吳王故苑俱成灰誰能與子論許事倚欄共聽漁歌回登埀虹亭雲水蒼茫共渺然眼看飛鳥没蒼烟山圍百雉吳王國風急千㠶震澤船白髪飄流身巳老斷編零落事空傳誰將無色胸中畵貌取吳中萬頃天惠山泉二絶石龍噴雪繞山斜桑苧祠閑一幅紗只對清流巳無暑未論絶品觧宜茶山僧知我去匆匆旋印紅泥乞老翁擬喚人間三昧手共分天上小團龍僕歸自武林䝉舒元相徐美祖諸君皆惠詩乍歸老倦未蘇姑以塞後時之責耳紅塵染盡去時衣愁入雙蓬鬢髪稀故國幾番隨夢到長安十度送春歸懶看烏㡌朝訶馬却憶黄紬晝掩扉鳥倦知還我巳老㑹令雙鵠貼雲飛相國風流元有種徐卿裠屐固應稀青衫好着君猶未黄髪無多我合歸清夢曉聽湖上雨暮年猶借水邊扉南來未是安巢鳥擬趂西風著處飛王元東寄長篇病中未能和韻先寄此詩為謝白璧嘗遭按劍疑古來投分要相知驚人未有平生句絶妙空貽幼婦詞我亦去為廬阜客君應多寄輞川詩來書更覺寛陳債八節灘頭上水時次韻元相閲猥藁見贈二首無物能娛老㝠搜興漫長數莖空撚頷一瓣與誰香后山詩云平生一瓣香敬為曾南豐歲月揺雙鬢鶯花惱客腸更哦秋士句聊與伴啼螿挽得非來句頻哦送夜長詩今逼何遜人亦似黄香擬答琅玕贈慙無錦繡腸秋風又撩客啾唧動寒螿次韻美祖用元相韻以廣后山之意讀之汗下愧不自勝晉魏分騷雅詩流本日長應傳少陵鉢莫炷老僧香俗眼無涇渭從誰話肺腸感君韶濩耳來聽菊籬螿二白璧光元在青雲路亦長海天從逐臭郎署㑹含香唾玉分新句澆愁浣俗腸從今秋夜枕霧草厭聞螿謁梅公墓當年蠻錦織梅花此日蒼藤立暝鴉白水碑殘猶結客潁州兵亂巳無家何年有客常留劍舉世知誰可押衙我一舉杯澆馬鬛更從底處問侯芭次韻飛卿二首赦黄新拜日邊書畵舸行游雨外湖粗有微官如漫叟苦無髙論似王符江邊孤壘應千里天上神州夢九衢物外故人今逺别固應憐我不同塗聞道州閒可讀書緑荷朱閣繞平湖慙非萬里青雲器未稱中興赤伏符來暮不應歌叔度乆窮聊免哭唐衢君當别我休辭醉我亦匆匆恐問塗將赴興國别同社五君子欲傾杯酒話平生又觧孤舟作曉行有友五人那忍别去家三歲若為情一時但恐無耆舊四海誰言有弟兄歸路若隨清夢到江南雖逺不多程宿能仁作時赴興國吳㠶送我作東歸雙玉重新見兩溪脚踏故鄉猶未穏仍携十品過江西僕將有江西之役證公老師自龍谿來訪僕於家巳而遂至春谷送别二首兩翁投老各華顛徃事重論亦黯然只有髙情無歲月相看依舊似當年羸驂相逐犯風埃行盡千巖未肯回送我漳淮三百里道人何止過谿來過九華作隔路仙凡欲問津馬頭空厭没黄塵傷心不到牛欄港九子山應觧笑人梅聖俞嘗為建徳尉僕過是邑詢之果然且言今有梅公堂在焉百年遺像鎖寒㕔氣壓長江賈尉輕誰道都官能闕䜟固應梅福自知名人猶能説當時事詩亦懸知早歲成泉下玉山呼不起可憐華屋漫峥嶸太倉稊米集巻三十四
