body:
  text: 太倉稊米集巻六十五宋周紫芝撰史斷十五首頡利殺唐儉李靖提勁騎三千由馬邑趨惡陽嶺夜襲定襄何其壯哉及頡利走保鐵山舉國内附服而舍之可以柔懷矣天子遣唐儉撫慰而靖乗其無備俘十萬之衆擒其子殺其公主於是斥地自隂山北至大漠焉靖之功可以夸示後世矣無乃未免於過乎始頡利之降太宗遣靖往迎而矯制以興兵使中國有貪功之名太宗獲失信之罪則未得為忠也唐儉受命以為使辱命而殺之則天下服無罪而陷之以死則人將解體靖獨忍而殺之則未得為仁也誅一唐儉固不足道中國誅之猶恐貽笑外夷今使頡利而戮中國之使則未得為智也且罪莫大於殺降降而殺之後孰示信頡利以禽獸之情猶知屈服以慕義中國以禮義之地而反有殺降之罪則未得為義也漢王遣韓信以擊齊而間遣酈生以說之信欲止軍而不行則未有命欲乗鋭而往則齊已服此蒯通之說所以易搖也為信計與其全酈生則不若殺酈生而獲罪於髙祖哉然則酈之死猶有說也乃若靖則不然頡利已亡其勢孤立非若齊有西楚之援况太宗遣靖以迎之非遣靖以擊之也豈可殉已而不䘏儉之死哉今靖援韓信以藉口此尤可罪靖在唐為一時名將一舉之失而衆尤隨之其弊果安在哉曰貪而已矣五星聚東井髙祖之元年十月至霸上是月五星聚東井元魏時崔浩集諸家歴頗譏前史之失髙允言於浩曰漢元年十月五星聚東井此乃史官欲神其事不復推之於理也案星傳太白辰星常附日而行十月日在箕尾昏沒於中南而東井方出於寅比二星何得背日而行浩初不之服巳而謂允曰先所論者本不經心及更考究果如君言五星乃以前三月聚東井非十月也夫髙祖以寛仁之徳易强暴之政亦足以興矣五星雖不聚於東井可也使其果然則因前三月聚東井而書之何為而不可由是觀之卧有雲氣行斬白蛇之類史之誣於人蓋已多矣曹操殺孔融荀彧曹操起兵以誅董卓為名二人者皆内忌賢徳殺人如刈麻葦卓誘降北地反者數百人於坐中斬舌鑿眼或鑊煮之使偃轉杯案間坐客為之失箸其忍有甚於屠矣卓既為太師一日謂皇甫嵩曰義真服未乎嵩曰安知明公乃至於此卓曰鴻鵠固有逺志但燕雀不知耳嵩曰昔與明公俱為燕雀不意今日變為鳯凰嵩之玩卓若戲小兒而卓不殺此可怪也哉曹公之惡禰正平也既錄為鼓吏衡乃裸身而立後以杖箠地數罵太祖辱有甚於市朝之撻太祖不殺猶使死於劉表之手此亦可怪也哉始余疑二子之不殺蓋有說焉操甞謂衡曰孤殺之無異雀䑕顧此人素有虚名今日殺之將謂孤不能容則操猶畏於物議也至孔北海之髙才蓋一時之勝士荀文若之通亮又斯人之腹心也一言不中其意則談笑而殺之夫以融彧而視衡豈止有虚名而已然猶有所不免則操豈畏於物議哉余固知二子之見殺蓋有謂而然也桓温甞謂孟嘉曰人不可無勢我乃能駕御卿温與操皆隂藏禍心以圖不軌惟恐人之不附已不能盡籠天下之豪傑使唯已從則無以肆其兇焰也融既偃然不為其用彧乃力沮九錫之議非殺之無以快其憤此二子之所以死也融彧且死則崔琰許攸婁圭郭嘉之􅑫是真所謂雀䑕也哉朱虚侯欲立齊王為帝諸呂之禍劉氏之危甚於壘卵當是之時首倡大義以扶奬王室者劉章也及紿産祿而奪之權雖其勢去已若孤豚然猶未成禽也當是之時首誅元惡以成一時之功者亦章也以謀言之章為先以功言之章為大則其報之宜如何哉然余於章猶不能無恨焉以其意在齊王也初章使齊王舉而西因欲立以為帝是教其兄使叛也齊王將魏勃殺召平為書以告諸侯王反狀既明幸而祿産死京師平内畏平勃外恃灌嬰其計遂寢不者禍將酷於呂氏矣議者以謂章欲使齊王舉兵入援闗中而不知其反也曰代王於髙皇帝為子齊王於髙皇帝為孫以尊卑之分則代王當立代王仁賢聞於天下齊王之善未有所稱也以賢不肖則代王亦當立代王母家薄氏皆君子長者齊王母家駟氏皆虎而冠漢方以呂氏為戒而復使駟氏得昌是益其暴耳以母氏之善惡則代王亦當立然則章何為舍代王而欲立其兄乎此余於章所以不能無恨也非將相叶謀以公天下為心卒迎代王而共立之則漢之安危殆未可知夫以孝文之仁孝恭遜出於天性豈不知平呂氏之禍者章之功為大以齊王之故而猶有憾焉何示天下之不廣耶初大臣與章約事成當盡以趙地王章盡以梁地王其弟興居及孝文既立遂黜其功章自以失職嵗餘憂死而興居亦舉兵以反嗚呼漢所以報章者亦云薄哉魏主遇旱輟食三日魏孝文以嵗旱禱雨至輟食三日羣臣告以雨既霑足請帝復膳如初猶欲遣使視之然後肯食且云如其不然何以生為聞者以謂賢主憂民如此是大不然昔成湯遭七年之旱甞以六事自責周宣王遇災而懼側身修行欲銷去之未聞其三日不食也蓋隂陽閉縱之論暴巫徙市之術皆後儒自為之說非古帝王修人事以應天變之道也由是知決久寃之獄烹言利之臣而天乃大雨皆人事盡而天意得自然之符也魏主不知出此迺欲不食以自斃使變而可禳猶非其道不然是當踐其必死之言也為之臣者又不知以古聖賢之道告之徒誑以既雨而已其為不忠莫此之甚一舉而君臣之道兩失嗚呼陋矣哉周世宗平江南五代之君如唐莊宗周世宗可謂有英武之畧矣然内無平一海内之政外無經畧天下之才故事業止於偏霸而不足稱述世宗深患唐晉以來呉蜀幽并皆阻聲教未能混一命近臣著開邊之策比部郎王朴獻議以謂唐與我接境幾二千里其勢易取也得江南則嶺南巴蜀可傳檄而定南方既定則燕地必望風内附也世宗欣然納之於是始有平江南之志焉曽不旋踵一舉而得八州再駕而平壽春卒致唐主請以畫江為界而江北之地悉為吾囊中之物其為盛烈豈不壯哉暨鍾謨入貢乃遣謨歸告其主以治城郭繕甲兵據守要害為子孫計議者以為江南未服則親矢石期以必克既服則愛之如子推誠盡言為之逺慮其規模宏大豈得與莊宗同日語哉嗚呼世宗之言則善矣謂之規模宏大則吾不知也衛青不殺蘇建衛青不用周霸之言以殺蘇建建卒䝉宥廢為庶人議者以青為賢余以為不然初青與李廣俱擊匈奴廣本前軍乃徙其軍使東因以失道遂致喪師當是之時罪在青不在廣也青奚不狀之天子以赦其過而乃逼廣使自殺乎以飛將軍之才氣下視衛青如庸奴耳青既忌其能又與之有眦睚之嫌非殺之無以快其欲也青既殺廣無以自蓋其愆乃獨私建以沽一時之名小人姦偽之狀如此武帝據厠而見之豈不宜哉公孫述聘譙𤣥不至公孫述僭號隴蜀聞閬中髙士譙𤣥以禮連聘不至使人脅以毒藥𤣥仰天而歎曰唐堯大聖許由恥名周武至徳伯夷守餓保志全髙死亦何恨遂受毒藥毅然不往若𤣥者可謂忠矣其子瑛泣血叩頭願輸家貲千萬以贖其死述乃許之𤣥得以免若瑛者可謂孝矣客曰𤣥之不臣不可謂不賢若瑛之於孝其猶未耶豈有父死人手不以身代其禍獨區區輸其家貲而已何哉是不然也述之僭據於禮賢下士且方繆為恭敬以隆虚名未必有意於殺𤣥瑛請輸其家貲適㑹其機此所以免若一見而請以死萬一述有不從則將何以繼徒使父子俱斃賊手耳瑛之意以謂請輸以財而不從然後繼之死蓋亦未晩余以是知瑛之為孝也蔡琰蓬首救董祀余讀范蔚宗烈女傳以蔡琰列於諸姬之後蓋甞疑之曹操問其家藏書至於口誦四十餘篇以至作二詩敘流落悲愁之態有古作者之風亦可愛矣然是非女子之所宜先固不當以此預列女之數其夫董祀犯法當誅琰乃蓬首詣操請之辭致慷慨有足觀者以是為琰之竒節則其前夫衛仲道亡不幸而陷敵中雖夷人脅以死義不當事左賢王事之十有二年豈可謂不乆又生二子豈可謂無母子之愛夫死而適異域之君不能繼之以死既事賢王又并去二子而歸中國二者皆不得謂之烈女也或曰春秋責備於賢者琰以婦人而能爾亦足矣曰此余所以正有責於琰也以琰博聞强識聰明而能文其於立身大節有勿及知則亦安取其文乎曄之載此以為後世女子之戒則可若以其博學多才且能救祀於埀死足以為漢烈女則吾不知也王昭君不賂畫工王昭君不賂畫工遂不得幸卒使元帝殺毛延壽非也元帝按圖見昭君之陋乃以配單于及召見而美始有悔心帝知其美豈不能以一女子易之患在失信故也使帝果以失信為嫌其始必不肯按召陋姬以貽單于之怒若以此取怒蠻君其禍與失信孰為輕重吾知其說之非也或謂昭君貌極妍在後宫五六年不得幸後單于遣使朝賀帝問欲以一女子賜單于誰能行者昭君乃越席請行帝見之驚業已對使者遣之不及免至單于果大恱蓋士有抱負偉器塊然與俗士同羣豈能無怏怏不平之意女子以姿貌取恱於人慧麗風流而少年委置閨闥不為當世所賞其意當復如何孔子曰道不行乗桴浮於海昭君之請行蓋有以哉朱建受辟陽侯裞朱建以刻亷剛直自許雖辟陽侯挾太后之勢欲交建而不得顧不賢哉及其母死貧未有以發喪陸賈說食其與之裞卒與食其合非特脫命埀死之中又能使免諸吕之禍其為力多矣何建之賢而自叛其志如此蓋坐貧無以發喪也吾故知士非豪傑不回易為貧富生死所奪固不可以無養生喪死之具建一為貧所移遂不能完節於萬世之下傷哉貧也田叔既死魯人祠以百金其子不受曰義不傷先人嗟乎使建如田叔之子辟陽之金亦安得而汙之謝朏不受解璽之詔宋武帝受禪有司議使侍中劉叡進璽帝曰此當選有人望者為之乃以付謝澹齊髙帝受詔乃引枕髙卧後武帝請殺之髙帝曰殺之則成其名正應容之度外晉宋以來江左風流獨謝氏人物如林如敬冲者自當不媿烏衣之遊觀敬冲不受解璽之命如此不知六朝諸公作九錫文者如何下筆耶宋衡陽王宋武帝諸子皆以戮沒獨衡陽文王義季以酣飲得終其天年雖其淫侈暴悖不學無術有以取之義季亦可謂得策矣阮嗣宗一醉六十日夫豈徒然者哉王恢議伐單于漢自髙帝以馬上得天下而文景專意含養斯民以息百戰之勞可謂善矣武帝以雄才大畧好大喜功陋文景之寛宏以為委靡不振之漸頗有意於更張而董仲舒對策首建此議以謂臨政願治不如退而更化自是髙祖闊疎之禁文景長者之風為之掃地而漢始多事矣初年患單于數冦邊將興兵擊之以問羣臣而王恢建可伐之議以迎帝意至於一舉而敗師出無狀恢亦就死吁可憐哉以帝之喜兵固非恢罪然人君好惡漸明所以啓其侈心者必有始惡之人恢一開此議使征討之兵自是日出略無虚嵗幾三十年天下蕭然户口减半則恢之一死固未足以償也孟子曰長君之惡其罪小逢君之惡其罪大仲舒創更化之謀王恢開用兵之路本皆迎合帝意而已其流至於頹潰而不可救惡得為無罪哉西漢日食五十有三春秋二百四十二年日食三十六西漢二百一十餘年日食乃至五十有三以文景之治而其食乃至十有二焉班固於他帝輒書其應於文景獨書其食而不書其應書其食所以使人主之知畏不書其應所以使求其故者得文景之治焉疑作史之法如此而未可知也太倉稊米集巻六十五
