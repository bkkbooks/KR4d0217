body:
  text: 太倉稊米集巻三十宋周紫芝撰詩五十四首虛飄飄并序元祐間山谷作虛飄飄蓋樂府之餘當時諸公皆有和篇戊辰臘月二十有八日夜讀淮海集見之亦用其韻羞狗尾之續貂於顔有靦悟白駒之過隙與世亦踈庶幾見者不我誚焉虛飄飄虛飄飄姮娥臨月榭神女渡仙橋風撼花浮水霜吹葉落條飛雲轉眼下三峽宻雪滿空來九霄虛飄飄虛飄飄比人生命猶堅牢虛飄飄虛飄飄水邊看海市雲際現天橋弱栁綿吹徑嫣花錦綴條卧雲雌霓入聲飲滄海過眼夕陽低碧霄虛飄飄虛飄飄比人生世猶堅牢戊辰除夜四絶千里家山一望間白頭夫婦且樽前詩中游戱無三昧客裡光隂又一年七年長夢採江蘺此夜樽前倒接籬莫問年來何歲原闕新春皓薄曉鐘聲殘燭晶熒守歳檠年向白駒光裏度詩隨藍尾酒中成立春前五日史館對雪二絶九天飛下玉花繁喜入長安十二門獨醉且須温臘酒迎新又欲帯青幡昔年蹤跡寄江頭雪屋梅村自一邱醉裡却疑身是夢爛銀樓閣看瀛洲韓信韓信功髙世共知區區安用假王為固應渫血長安日巳在榮陽躡足時范增西楚興王亦有人半扶炎祚作謀臣老生不觧歸明主事去方知是失身次韻子紹立春二首自息中山鬬長安幾見春司天得南正迎日法髙辛送老年華速催耕雨意新又聞寛大詔飛舞下天津東漢故事立春日下寛大書客乆悲殘歲春生尚薄寒簪花人似夢巻白意先䦨黄犢還驚眼青葅巳入盤新年有行樂老去逐君難聞西湖梅盡桃花巳有開者不到西湖忽換年今朝欲掛杖頭錢催成栁色多如許落盡梅花最可憐日日湖邊踏淺沙西湖乆住巳成家劉郎去後空腸斷憶著𤣥都觀裡花送葉泉州二首近日泉南守新除武部郎漢廷多長者循吏得惟良海國蠻珍聚兵厨臘酒香不妨聊卧治未要薄淮陽二天上星郎貴人間五馬榮倒樽知客滿閉閣自詩成閩嶺千山隔吳船一水輕九重宣宻詔何日問歸程送馮均州二首聞説京西道均房虎更多定須歎來暮政欲飲無何過客虛厨傳飢氓費撫摩君看歸諫議為郡拙催科二從事持三尺將軍控萬弦廟堂應記憶江漢乆流傳又復分新壘歸來更幾年他時休怪我今日自華顛寓宿省直有懐方元伯古屋頽墻乆寂寥寒㕔依舊長芭蕉主人應在花深處獨對東風醉小橋次韻子紹題竹坡二首寓舍有短坡植竹其上子紹榜曰竹坡因自題曰竹坡老人孫郎忽唾寒忩玉來過當年玉川屋更作縱横一尺書為榜南坡兩三竹結廬歸卧今尚無白頭寄食猶中都移栽自種短墻底他時此計知何如次韻季共月夜見懐竹坡用子紹韻五十九年蘧伯玉家無擔石居無屋喜君馬上風前詩似我南坡月中竹寒忩有意過我無雍容車騎子甚都更當為作子虛賦王郎文彩今相如次韻季共再賦烏衣諸郎美如玉笑我秋風巻茅屋才髙渠是判花人頭白吾羞汗青竹此君那可一日無桃花不復怨𤣥都得公明月千斛珠我羞魚目真不如次韻季共再賦無方可試藍田玉空想雲菴卧玉屋賴有人間百尺樓下臨此地千尋竹衰翁乆巳一故無聊睇逸驥方過都公是風流小摩詰我為無用長僑如次韻季共再賦鉛刀不可切堅玉敝筐豈能持大屋强驅跛鱉當前鋒看公詩成如破竹君房言語舉世無射策未許䝉帝都巴人下里不足數雲韶九奏方純如次韻季共再賦藴石知公似荆玉誰作璵璠薦王屋白髯應笑虎頭癡青衫謾把魚須竹老此安能為有無曺㑹豈可當大都彈丸脱手盤走珠句然如此今誰如次韻季共再賦平世欲獻初無玉何嘗生存夢華屋苦遭田父亦與飲不問主人時看竹十事如意八九無暮年猶喜見子都那能從公得三絶但可一身觀六如次韻季共再賦鱸魚憶鱠松江玉船作浮家當漁屋寒忩夢著雨中蓑長釣復埀波上竹平生僅識之與無敢攻詩城跨二都歸舟欲上知可呼念捨公去何所如次韻季共再賦公哦新詩戞鳴玉欲辦陟釐須滿屋誰遣藍田邱壑人来吹緱嶺參差竹心知遊路豈復無頗如六鷁飛宋都小巫羞澁見大巫神氣比公真蔑如讀婆娑集書其後早縁文字得聲名佳句流傳益可珍讀到青蒲當日疏其他猶可是難能寄幼安使君平生清徳畏人知豈弟真宜作吏師日飲無何方得計民歌來暮却成思何妨道守催科拙自是穰侯見事遲天與一忩供燕坐烏墩山好助公詩食回魚頗念河魨戱作二詩皤腹鱗鱗品自珍紅鮰浪欲與争新世間那有西施乳寧有河魨觧藥人蘆笋初生水繞村河魨旋煮薦清樽十年不踏江南岸楊栁飛花欲斷魂巳巳寒食七度逢寒食連年客異鄉鬢絲嗟老大冡木念青蒼亂眼花無數傷心栁著行病餘春又過不擬近林觴次韻庭藻韓園燕集故老歸來有喬木更結飛樓繞湖緑城南去天無尺五中有人間幾巖谷驊騮曉踏金谷園花邊立馬絲竹喧金屈巵行碧落酒繡羅襦醉雙紋鴛吳姫遺鈿客墮幘白眼舉觴天宇窄春㴱别館花如烟藉草傳杯地為席君居當東我復西莫嫌酒涴身上衣遥知第五橋邊路桐葉題詩人未歸明朝雨驟風苦惡殘榼雖存不堪酌更須拭眼到風篁急呼海棠償舊約再和庭藻韓園之作雨後斜陽亂森木湖上山青河水緑將軍一色種桃花錦帳紅絲裹山谷人生莫愛歸田園結廬人境無人喧何如功成銷金甲雨中看浴銀塘鴛長安黄塵沒烏幘歸來横改一窩窄何如載酒作醉眠田父時來與争席春風欲起春日西花下跨鞍花滿衣恨無龍眠老畵手寫作諸郎聨騎歸竹坡有酒亦不惡客無可人時自酌君憐羇客倘見呼來歲西歸有新約題陳公悦足軒飢人未食長流涎芋魁作飯腹果然八珍九鼎紛滿前鼎中一臠不下咽吐而去之惟欲眠貪夫嗜利絶可憐牙箸落手喜若顛家有窟郎無數錢跨州連陌空多田千頭萬尾不當縁髙䑓未傾金碧鮮客食不下日十千棄禍忽起踵復旋利激奴軰非關天太邱諸子圖畵傳元方季方兩聨翩元也作詩如湧泉髙歌大笑傾四筵只今為郎近日邊季也勇退髙騰騫結廬庇雨無餘椽栽花移竹今幾年種榖只取田一㕓鷄肥酒熟客可延人生安分作當捐眼前取足須隨縁倩營莵裘將老焉伯氏欲掛神武冠歸作兩翁相對間政看寳帯黄金懸未可便情詩盟寒王元道剪牡丹見餉二絶知君流落在天涯八節灘頭憶舊家想對東風開病眼幾行和淚洛西花巳是飛花落絮天東風猶入竹坡寒緑樽恨我無醇酎紅艷煩君送牡丹次韻林梅卿西湖載酒時僕以病不赴西湖豈復似人間付與瀛洲學士閒百榼滿傾桑落酒兩髙聊作道塲山一年春事方三月萬里風煙静八蠻白髪可憐欹病枕蘭船空憶棹歌還馬山觀道傍賣芍藥口占沙河簾幙近蒼闕芍藥絲頭十里風誰道昇平本無象江都花是舊時紅次韻陳彦育諸天閣晚眺飛閣青雲上何因一笑同春歸憐客去酒聖與誰中相國名猶在唐朝事巳空更將詩説夢强欲付衰翁次韻子紹送春七絶混沌七竅鑿可恨倐與忽人生寒暑間萬古長出没二孫郎惜春句平澹古未聞譬如春江波因春自成紋三來禽着青子紅葉䕶殘春但使風味勝不愧桃李門四微生感年衰誰能惜春盡政恐厭黄梅吳楊出蒸菌五西湖天下勝咫尺安得徃青春不可追老力亦難强六招提在南山共著蠟屐登世無謝康樂此事誰復能七青春不識回豈但春去閒何以永我日妙香横博山送喬郢州使君雙斾擁朱轓竹馬先迎近郭春且聽郢人歌白雪莫因騷客念東門新詩為我應須寄徃事知誰與細論喚取莫愁烟艇子有時來伴石頭樽次韻章季常飲冰長句九衢烏㡌吹塵沙心知痼疾無烟霞病眼不禁書葉遮歲月逝巳空吁嗟故鄉日逺老日加無地可種青門𤓰緑蒲朱籠來邇遐揮金截玉争矜誇御府詔賜珍復嘉金盤璀璨無疵瑕章郎文采如景差便恐餘子俱公邪故遣麗句開天葩語勝未必甲豐華深山窮谷寒無涯一讀盡噤池中蛙老人晝卧横烏紗舉杯隨分浮水花飲甘欲借歸齒牙千金難買官焙茶百金未盡先藏义用賈耘老語染衣亭馮敏叔家聞説郊居勝新穿五畝池暗通山窈窕深住碧漣漪驚起紅鸂鶒吹翻緑荔枝雨添衣色秀波渡襪塵遲照眼誰重唾臨流自可詩水清魚莫種秋近荻須移剰欲添風月何妨更渺瀰却憐韓吏部埋甕作癡兒玉井橋馮敏叔家水滿雙鴛沼花開玉井蓮亭浮幽渚外人渡小橋邊白羽參差在跳珠次第圓風髙與芬馥露重借嫣妍青板釣魚老朱欄聽雨眠時從客容與寧借鷺聨拳何日回征棹歸來賦短篇共邀池上月同看水中天次韻伯逺端午日拜碧香之賜紫府􅀈腴照玉壺來霑隠吏北山隅遥知拜賜瞻金闕應笑流涎濕領鬚醉靣看君紅作纈衰顔憐我緑凋蒲明年何止分瓊液細葛香羅世亦無次韻仲平去惡木葺新軒一首自我來東吳竊食偷燕閒頽檐賦官居漏雨穿屋山有如􅓃䏰蟲盤屈沮洳間入門兒女愁出門車馬喧年來得新巢易地稍立言短墻蓬藋蒿頗亦費剪芟視公有華屋未敢窺其藩惡木屏除翳雲山借空觀郎曺二三公相過綴遊觀清吟屢刻燭夜語常更端但恐陳太邱開忩納晴川定復譏中郎寸碧瞻孱顔兩家合争雄人物俱翩翩不如醉明眸墮馬傾低鬟付此百年事試作一笑看我如雲水僧故鄉未言還安得從杖屨婆娑共躋攀晚集江園㑹者五人黄叔魚林平父黄文若刁黄叔與僕也以暝色帯飛鳥為韻余得色字少小謀一邱老大猶未得幽園固佳處入眼自歎息賴此千載人相逢共京國追凉坐花隂持杯飲湖色斜陽入疎林晚色忽復逼忽忽行語離兩别遂南北日落未可歸山髙更須陟佳㑹豈易逢蓴鱠不須憶太倉稊米集巻三十
