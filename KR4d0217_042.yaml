body:
  text: 太倉稊米集巻四十二宋周紫芝撰詞四首和陶彭澤歸去來詞并引陶元亮歸去來詞妙絶古今非後人所能追逐惟東坡諸人筆力可到乃有和章自是而作者益衆矣僕不自量敢傚西子之顰固自可笑况余未嘗從仕夫復何歸然而収少年隨俗之心念老日林泉之趣以稍安衰暮是亦歸也何必棄官投紱以反林泉然後謂之歸哉歸去來兮吾居故鄉復焉歸數流年於既徃撫白髮而増悲策蹇步以終日望逸軌而難追税征驂於萬里悟前轍之皆非念紉蘭而自昔恨塵土之緇衣超羣趨而見獨知此舉之造微嗟我於此休影息奔載笑載歌棲遲衡門繄彼一老巋然獨存鳴琴在壁濁醪滿樽遣幽情於小醉寄萬化於頳顔悵雲臺之浸逺享鹿門之餘安付驪珠於逆頷據龜殻於元關倚藜杖以終日縱晚目而遐觀或徑行而忘返或興盡而知還或寄情於吟賦或與客而盤桓歸去來兮既長卿之倦游恨年華之遲暮視富貴以何求委冠裳而不用藝草木以忘憂朋舊讓余以惡言曰甘老於田疇墮甑曷顧虛舷觸舟子三薫而三沐吾一壑而一邱豈樂天而知命姑遇坎以乗流郤人言而自信掃百念以俱休巳矣乎此心既老豈復存吾年一去挽莫留逮今不歸將焉之窮達不有命死生難逆期及筋骸之可勉當盡力以耘耔賡歸來之妙語和招隠之新詩龜䇿誠不足以知此事行吾素志又何疑弔雙廟詞繄唐祚之中微兮肆虺梟之旁午産竒禍於中壼兮滋亂離於下土痛漁陽之肇亂兮愴播遷之失所倏電擊而雷奔兮巻百城而莫禦紛披靡而俱下兮等列侯以群䜿獨睢陽之二老兮守危堞而不去抗劇賊以百戰兮確精忠而自許擁貔貅之百萬兮視創羸其猶鼠顧强弱之不當兮雖孩稚其何慮究一死之不茍兮孰知公之攸處念人生而有愛兮烹所愛之為苦冀皇天之助順兮庶復守其遺緒慮豗隤於梁宋兮囘賊鋒而東泝阿犖之喉牙兮紓東南之狼顧雖力盡而乃終兮偉壯節之無古信後死之非屈兮謂前死之非遽陋霽雲之喑嗚兮鄙萬春之非侣伊二子之同心兮吞軟弱而不數埀竒勲於異代兮識忠義於真主㑹仙馭之裴回兮儼翼翼之祠宇迄百年其如夢兮悼英魂而蹲舞予西征而過宋兮撼扊扅而叩户悵煙火之依微兮復巫覡之弗馭號悲風於木末兮紛霰雪其欲雨㪺斗酒以一酹兮慰孤懐之遲暮倘神靈之猶在兮尚復聆於斯語悼亡哀詞二首蘭獨秀兮幽除採清香兮襲予擥荷衣兮蕙帶既沐浴兮斯佩乘光風兮來思擷蘋藻兮沼沚宜家人兮􅗳􅗳詢龜筮兮咸喜窺清揚兮窈窕從我百艱兮不嚬以笑助倚門兮晨昏予逰踪兮遐𦕈嗟日月兮幾何魂即幽兮杳杳挽雙袂兮雲舉紛落葉兮堂下蟲啾啾兮夜鳴霜肅肅兮晨雨夐欲叩兮上蒼痛予命兮孰將収淚兮浩嘆心悵悵兮皇皇奠桂酒兮于寢儼時靈兮來降悼余生兮多患悵伊人兮罹此寃忽永訣兮遐邈覽遺跡兮凄然委蘭襟兮弗御捐餘響兮朱絃既視此兮愴怳音欲叩兮誰聞氣填膺兮耿耿淚凄絶兮漫漫彼長舌兮餘齡與夫君兮孰賢嗟余懐兮闊疎分與世兮迍邅薰至言兮入耳啟余心兮為寜方徙倚兮朝夕嗟奄冉兮九原繄木落兮歸根望魄月兮復圓善萬物兮得所追既徃兮𦕈綿銘十五首曲肱齋銘并叙東萊王公望之開小室於所居之東以為游居寢卧之地而未有名静寄老翁為名以曲肱而告之曰夫士於世孰不欲富貴以奉其身而自古有德之士至有終其身而不享者豈惡而欲逺之哉顧有義焉耳彼其意以為居數仭之堂自視與蓬蓽為孰榮列九鼎而食自視與簞瓢為孰美是固不待較而知一有不義而得之不啻若舉而措之塗炭則士亦豈可以茍於進哉余惡夫汲汲於富貴利達者倘可以售其身雖執鞭之士吾亦為之是雖足以快其心寜不少愧於吾聖人之言耶今望之年少而志髙好學而力行有意於仕而未遇者雖君子出處之致固巳聞之於古矣余恐其中流失船半九十里而不至欲逃於世俗之病而未能也乃作斯銘因以為戒焉銘曰貪夫嗜貲夸士殉名俱亡其羊孰為虧成吮癰䑛痔峩冠結纓不義而貴以辱為榮刼商盜冡鼎列鐘鳴不義而富以汙為清時不我予余何其攖飯蔬飲水以樂吾生瞑目曲肱誓安而行頹然隠几非寢非醒視彼儻來倐如雲興須臾變滅去留何情士志於道物汩其明皎皎君子自明而誠知義之重知物之輕死生如夢孰窮而亨愚者昩焉而力吾争掲吾聖言以服子膺惠泉銘并叙宣為郡邈在大江之南雖古名邦而其民大率皆附山以居地勢既髙井泉稀少異時巨盜臨城衆無所得飲固患之而未有以為之計也太守李公既因舊壘而新之凡可以備攻守者皆咄嗟而辦乃即城之東南隅鑿地為池將導溪流而瀦之使民汲而飲焉畚鍤方興未及尋尺而泉湧於地清澈可愛議者咸謂公之精誠感格非人力所能為者昔貳師刺山而飛泉自湧伯衷整衣而井為之溢皆足以濟一時之惠公之所感何以異此知録事沈侯肇為榜以惠泉且作記叙其本末而公復欲某為之銘以廣其意雖辭㫖蕪陋不足傳逺庶幾記異事以播之衆使知公之所以惠此一方者其利無窮也銘曰大江之南畫疆千里有美斯邦因山為壘宅髙以居萬室嶷嶷有井在民不百而止夕烽東侵巨盜四起既堅我壁既發我矢震鼓雷動蟻附山峙續綆以汲笮糞而滓燥物呼號士氣披靡嗷嗷羣蒼縮手相視公之來思乃經其始百雉一新巨塹成理念我窮黎實艱於水相城之隅欲穴其址鑿地為池潜流逶迤溜以石渠灌此瀰瀰畚鍤方興鼓鼛未啟出此檻泉如鼎之沸湛然澄清既冽且美雲湧雪翻激石齒齒酌言嘗之有來且喜咸曰斯流天藏地祕淵泉可格不約而至公擁熊轓與民樂只咸曰休哉萬世之利我作銘詩以記其異汩齋銘鑿此環堵以為圭竇不施扊扅而有窓牖孰知其中風温月秀是曰汩齋净白無垢室空無物中有老人巖棲谷隠傴僂嚬呻其來無迹其出無心誰其似之似洞有雲龜研銘窪池之水可以濡喙烏皮之几可以曳尾誰其同之惟吾與爾瘞犬銘十年司夜完我牆壁未嘗吠堯侣我以跖鄉其獒也誰適獻之周宁今其斃也我乃與以孔席鐡洗銘并叙嘉祐中髙郵孫公莘老為太平令介宣歙兩州間山重水複居民鮮少未有以讀書應進士舉者公始來悉召豪子數輩訓之以義俾卜地以建鄉校且命其子弟之秀者使學焉既落成將春秋有事於先聖之廟公慮繼其後者廢而不講乃出己俸以鑄鐡洗使傳不朽嗚呼其規模可謂逺矣大觀二年秋九月余以事遇而見之感而為作銘銘曰子産相國教民子弟鄭人歌之聲載後世文翁作蜀黌宇是治儒風大振聲出循吏惟公所圖意則異是人存政舉巳輒隨棄餼羊之留告朔不廢堂堂孫公前聖一揆羽翼六經粃糠百氏學者從之所至如市惟此小邑民未知義權輿於公以有士子爰召冶人鑄鐡作洗鏗然崔嵬山立不倚兹器誰則可用無愧春秋舉之杞事有紀士於聖人因以知貴惟公之德乆而弗替與斯俱傳以永千祀蘇氏研銘蘇頌應舉所用一拳之石萬夫之敵一泓之水五世之澤保而有之舊物可得此名不磨此石不泐學不厭齋銘并叙小兒栞即蠅館之側闢室以讀書且來乞名命之曰學不厭齋因為之銘以戒之銘曰崧華在前㟝嶁自止江河在地眢井無水學弗貴異貴在弗巳斷章析句背正失理更相標榜自謂君子小人所是君子所恥勉爾未能以蹈聖軌嘯齋銘并叙鎮江蘇元藻作室於㕔事之東而牕有脩竹其聲颼然静寄老翁名曰嘯齋而為之銘取東坡之語所謂竹亦得風天然而嘯者也銘曰風以竹而響竹得風而鳴竹固自然風實何情南徐之蘇世有詩聲誰其似之配此令名明窓净几琢雪鏤氷祈君之詩似竹之清詩豈可作以鳴不平如竹嘯風自然而成資夀寺鑄鐘銘有大比邱號曰法嵩冶銅百鈞鑄此巨鐘不叩而鳴豐山是同聞屍陁林斃者俱起徹大地獄杻械自弛咸由聲聞而悟妙理師以歡喜了大事縁虚空有盡兹器弗遷與此銘詩昭千萬年風流泉銘并叙石室酒出三衢名傾浙右辛未之秋余得其法於衢人後兩月赴官江西以授富水厨使釀之既成取以酌客無不喜者以為深醇雅健自是一種風流永興宰郭君元夀欲余命名為此邦故事余笑曰當用坐客語名以風流泉巳而為之銘曰德惡剛暴酒欲媚娬伊何人斯釀此秫黍觀其清醇而近道温厚而不武則含濁醪之妙而嗣元酒之古也至於風流醖藉蓋張曲江之為人而若飲醇酎則與周公瑾而語也小人藴兇喜飲酷烈太白在手吻渴耳熱謂此君子非我儔列嗟嗟我友妙韻勝絶不險以巇不隙其末誓當忘言以對玉雪到花亭銘亭謂舟也取少游醉颺輕舟信流引到花深處之語颺輕舟到花浦採芳洲越溪女誰作歌秦郎語竹坡翁不媚娬亦信流入煙渚唱竹枝卧秋雨翁醉歸鷺飛舞茶奩銘震雷發矞雲膏谷簾香春睡鏖湯奩銘醉言歸客起舞驪駒歌玉杯舉山谷道人木㡌銘并叙昔者鄭子臧好聚鷸冠而楚子玉又以鹿子皮為之二者皆殘物之生以文其侈故君子譏之而仁者病焉今魯直之㡌不以紗而以木仁足以愛物而儉足以行禮使其法用於世則積一㡌之微而至於百千萬億女工之紗不可勝用矣然則管幼安白袷之制郭林宗墊角之巾特物之因人而重者耳比之木㡌未足多也銘曰偉哉老人内觀反照因事造理悟物得妙自出新意以木為㡌塗以髹漆其光有耀三尺之紗千蠶之功積歲累月其費無窮餘寸成引可庇爾躬仁者之心以儉為宗儉主於愛不主於豐太倉稊米集巻四十二
