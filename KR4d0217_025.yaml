body:
  text: 太倉稊米集卷二十五宋周紫芝撰詩四十七首劉文卿燒木犀沉為作長句海南萬里水沉樹江南九月木犀花不知誰作造化手幻出此等無品差劉郎嗜好與衆異煮蜜成香出新意短忩護日度春深石鼎生雲得煙細夢回依約在秋山馬上清香撲霜霽平生可笑范蔚宗甲煎淺俗語未公此香似有郢人質能受匠石斤成風不須百和費假合成一種性無異同能知二物本同氣鼻觀巳有香嚴通聊將戲事作薄相辦此一笑供兒童曉雪湖色催清曉風前一雪輕不妨梅自笑要與水爭明萬木雲遮盡千巖玉琢成可憐青竹葉寒甚與誰傾時宰生日樂府四首并序歲十有二月二十有五日太師魏國公之夀日也凡縉紳大夫之在有位者莫不相與作為歌詩以紀盛德而歸成功篇什之富爛然如雲至於汗牛充宇不可紀極所以祈贊夀齡無所不至猗歟盛哉昔未有也某綿陋不才加以門薄而地寒人微而器窳如瓦釡囊瓢宜在草野雖欲挽而致之與鼎俎籩豆之器雜然前陳於郊社燕享之間有所不可而鈞播之下萬化斡旋根荄飛走並用無遺前者拔自管庫置之省闥俾司吏牘以主其藏雖未得與鼎俎籩豆之器雜然前陳固巳不在草野間矣感激之私無以自發方且含茹吻頰之間而不得吐㑹都人士夫奔走為夀得不呈露鄙素為下俚之辭尾賀客而前以謁鈞庭之下乎乃作樂府四章再拜而獻倘欲被之金石流之管弦與一代之樂諧和韶濩則有所不敢至若附魏晉以還曺劉諸人殘音餘韻流傳後來則又非其人也譬如茂林時鳥感動至和而振翮一鳴蓋有不知其所以然而然者仰惟真人出御大寶由中興以來每遇是日必即大第賜湛恩之燕賜鈞天之樂所以寵異師臣以示旌功報德之意考諸舊牒所未前聞乃作御燕曲朝庭修兩國之好結百年之盟休兵息戰使各保其骨肉父子之親公之隂德歲所全活不可以巨萬計天下休休乎日向於安平泰定之域繄公德是賴乃作班師行時方偃武文教誕敷民和年豐國足財阜禮之墜者復振樂之廢者更新百度彰明萬邦悅附實我周公迓衡之政乃作升平謡四方無虞五兵不試國肅以清民庶以寧當是時也家被更生之賜人懷欲報之心皇天無私仁者必夀此天之所以歸德於公也乃作祈年歌竊惟公之洪猷茂烈度越曠世雖盈編溢册不能具載而質之四詩亦可槩見後之賢者聞而悅之將欲鼓之舞之長言而永歌之庶幾或有取於斯焉謹序御燕曲新陽入谷春欲回瑶池春早桃花開黃金三尺瑞獸暖雲橫霧繞珠簾埀碧腴分香自紫府百壺流泉酒如許御厨排燕羅八珍更飭梨園賜歌舞黃門宣詔天上來歡喜時聞傳帝語紅鑾畫幕密護遮參差吹竹凌丹霞雙成持觴萼緑勸五雲遙望羣仙家仙家日月真長久地久天長聖恩厚願公歲歲復年年長帶宫花飲宫酒班師行漢兵出塞將軍行棘門灞上空屯營羽書夜半急如火淮田千里無春耕廟堂有議如建武十歲邊頭不鳴鼓君王無事兩國歡長樂宫中瞻聖母鷹飢虎飽不足圖三軍漸欲銷兵符紅旗盡卷夜烽冷銅花繡甲金糢糊橫議當年蝟毛起公持一言天自喜盡收諸將入神京十六衛閒清似水榆關一騎不動塵隂功何止活萬人封侯鑄印不足說朱顔一笑三千春升平謡負石填海海可乾鑄鐵削山山可刊俟河之清豈易得眼見太平真復難春風輦路宫槐緑花繞漢宫三十六喜入天顔人盡知奉常新奏升平曲前年被衮郊圓天今年執玉朝塗山漢官威儀久不見三代禮樂俱追還太師功大非人力早向壺天賜新宅消得官家駐六飛畫鼓咽咽燕瑶席紫宸朝散千官行四方警奏虛封章衮司無事鈴索靜牙牌報漏春晝長但聞羣賢歲歌舞夀曲聲中玉觴舉青衫小吏亦復歡自採民謡裨樂府祈年歌十雨五風年歲熟萬落千村俱種粟人從南畝把金犁誰在廟堂調玉燭昔年避地今安居前日荷戈今佩犢開元宰相不開邊當時米賤斗數錢自從罷武銷劔㦸外户不閉俱安眼人䝉更生家受賜父老歡喜兒童顛君不見天上宸章燦星斗翔鸞驚飛翠蛟走為言一德似阿衡上格皇天贊元后皇天報德亦可知仁者必夀天無私但願天心錫難老貂冠畫衮常光輝四國無兵誰不喜共說升平自今始黃帝垂衣坐法宫千歲常師廣成子冬至前九日湖水盡氷後二日晚晴小舟循湖心而歸氷已稍開書是日所見積雨凝宿隂寒冰結湖背鷗鷺不敢前龜魚各晦敲冰得湖心鼓棹作澎湃萬玉朝明堂丁冬響環珮誰來貝闕中小現銀色界夕陽似知人微溫散珠琲為我開糢糊遙山影空翠境勝不可名語惡聊自悔安得王右丞萬象歸綵繪遙憐西子寒眉目增㸃綴將登南髙示同舍萬壑千巖要盡窮漫將筋力試衰翁請君速辦尋山屐同上南髙第一峯三年身在翠鬟堆慣見湖山眼厭開要上雲峯最髙處試看潮過海門來過趙德莊官居有懷其人送君南浦草青青記得江邊一醉醒騎馬却來尋舊處依然蒼竹近寒㕔讀君古錦囊中句可是紅蓮幕下才試問風流李長吉如何不寄近詩來次韻關子東聞太常新樂今歲塗山禹㑹成俟河真得見河清官粗無路朝元去卧聽鈞天奏樂聲湖上雜賦三首青腰載雨入菰蒲旋斫漁竿學釣魚小向湖心作容與天教來此伴舂鋤山邊騎馬醉王孫湖裡撐船晚過門寄語金丸莫輕彈我無花鴨解人言三年原不下胡床飲盡山光與水光莫把渠儂作官看此身便是賀知章次韻何子楚題吳傳朋石渠大字中郎往昔游鴻都眼見帚堊心成書乃知𨽻法亦天授後世豈復斯人徒周王百度新復古道家山是圖書府吳侯妙翰絶古今髙榜橫空近風雨大字三尺古所難細書不要烏絲欄四蹄自抉水邊石兩翮忽舉空中鸞知君自是文中虎便恐聲名傳帝所借令頭白下凌雲寄語韋郎耐辛苦次韻庭藻雨中不出湖上幅巾飽看西湖春徐行當車不動塵有時乘興未遽反武林無此尋春人湖山如螺湖水白幾見青天月生魄年年馬上看吳娃舞袖雙裁越羅窄長安貴人百不憂胡為亦復多窮愁出門載酒不可往倚杖看雨如窮秋萬事不由人作計我欲除愁唯一醉此生巳老復何求五字但知公臭味春風吹雨山澤晴青山有約翁有情故人官髙少閒暇可喚白鷗同此盟梅花為風雨所殘三絶五更風雨各無端留取殘枝與客看何遜借花心欲折玉奴愁雨曉應寒山西鐵面故將軍新種梅花十里春此地數枝留不得東風可是惡欺人先生舊日經行處聞有寒枝笑曉林便倩東風吹雨去急携藜杖與僧尋梅盡一首昔家大江南沮洳不堪處五月梅子黃江雲日成雨頻年客東吳蝸椽坐羇旅墮鳶忽當前海氣復如許食無山鞠窮為病入腰膂游鯈與爭席共此一洲渚人生能幾何生理亦良苦今朝有竒事兒童報佳語送梅喜追餞入伏寧傴僂便當掛西忩悠然望南浦借風翻緑荷分香度清暑陳相之許惠近作久而未至雪中偶書二首春意方回臘梅花又滿枝自憐為客久頗恨得君遲涉世身猶爾攻愁酒若為人生俱昨夢消遣可無詩短策何由去長鬚喚不來詩今如此少門欲為誰開净几塵飛盡寒忩雪自堆無人伴牢落燈火送殘杯奉答相之再示兩詩白髮劉郎在無心唱竹枝倦游閒未得見事老尤遲與世知何用求田便可為元龍人物勝况有建安詩老愧才都盡人愁雨不來酒樽無客把詩卷為君開山色螺分翠江濤雪擁堆新篇慰愁眼喜色動寒杯次韻關子東湖上雜書四絶道人結屋在林邱俗子何由得少留一閉衡門三十載為公今過虎溪頭清照菴上方重閣到雲天一落天星今幾年不見老坡寒碧句滿林風玉自蒼然夀星寺舊聞春草滿池塘何事新題荇蘂黃寄語藕花從此去不須滿意著紅粧水荇兩邊山木子規啼不管還鄉客夢稀應為老翁推不去故將好語勸人歸子規再寄李司農二首不作徽州夢空吟楚水邊倉皇相别日歡喜得書年客有誰投轄詩應我執鞭長安望歸日消息幾時傳衰薄功名晚羇棲歲月深篇章唯楚些兒女盡吳音見面知何日從公話此心時光肯相待白髮巳如林頃與徐美祖汪養源同遊杯渡道場余來錢塘而二君再遊以詩見寄當年三士各清狂下馬同尋古道場人在諸峯朝著屐天教我輩夜分床勝遊巳是成陳迹晚路何堪更異鄉聞道重來苦相憶為君日轉九回腸苦筍庾郎鮭菜不滿腹三歲杯盤入吳俗江頭四月烏賊來經日楊梅雨中熟是時苦竹方生兒錦綳時露駢頭玉杭人嚇飯正要虎日以千金換盈束人莫不食鮮知味妙理聽君論反覆舌頭誰識苦中甜今乃苦口後為福蔗中佳境甘似飴厚味可人終臘毒江南山多豈無此苦甚何止秋荼酷天公時為餉饞人雨洗風吹滿山谷從今不敢料吳儂但煮蝦蟆當粱肉和張元明食生荔子五月麥秋閩嶺寒嶺頭風雨荔子丹舊從圗畫見眉目何曾生食知甘酸天生尤物亦甚慳路逺致之良復難宫中妃子一破顔猶須驛騎來長安絳紗囊小欣乍識晚上蘇臺醉瑶席人如玉筍擘輕紅詩似春雲驚坐客書生饞相絶可憐誦詩口角空流涎何時遂作七閩客日啖玉肌三百丸猶勝窮愁杜陵老暮年奔走巴山道萬里瀘戎摘荔枝一生辛苦無人知將别湖居二首昔年嘗判武林丞來伴西湖寺下僧又作移家新活計却携行腳舊枯藤西子湖邊一短窗幾年和雨看湖光青山換得微官去魚鳥應須笑漫郎與同舍郎觀潮分韻得還字一字江字三首一字江字為坐客作時自西湖徙城居人生如微塵同一霄壤間可笑蠛蠓眼但窺甕中天錢塘俯滄海八月壯濤瀾始疑匹練橫旋作萬馬翻海門屹中開方壺忽當前不知何巨鰲為我戴三山銀光射傑閣玉筍埀朱欄須臾擊飛雪噴薄上簾顏相見各驚顧日暮殊未還那知在空濛但怪毛髮寒平生雲夢胸始信宇宙寬安得凌雲手大筆如修椽盡挽卷天浪參差入豪端烈風驚洪濤浩蕩吹海立迅雷忽翻空掩耳嗟不及漢兵百萬騎已奪秦關入擊石驚倒流勢若三峽急滄波忽喧豗衆目俱駭栗人言海潮來昔為子胥屈誰當語馮夷四海今已一王春㑹塗山白玉執萬笏江河及喬嶽祠祀已咸秩海神㑹當知萬嵗拱帝室神州古都㑹有美東南邦壯哉八月濤卷地奔長江驚濤裂巨石洪鐘殷朝撞萬瓦響飛雹千艘碎舽艭灧澦不足數况乃峽與瀧翩翩坐中客才器俱無雙九牛可逆拽五鼎乃獨扛詩成咄嗟頃惡語徒喧哤次韻徐美祖梅花我得孤山已恨遲水邊無復昔年枝花隨此老俱成夢詩似徐郎今有誰隴使醉將春作信廣平應解玉為肌五更笑語香中意只有羅浮曉月知人日雨一首王春雪三尺人日雨一犁五種雖未入二麥頗亦宜人情豈不悅天意似可期官居著窮巷睡味無人知起焚石鼎烟爛讀離騷詞看雲生屋角聽雨鳴空墀緑水添清瑤孤芳悅華姿萬物有佳趣吾生日已衰貪癡速竒禍安分傷寒飢乘除理巳定智巧那得移不如酌我酒此事姑置之次韻艾主管二首三徑頻招客羇懷可自寬湖分一水近窗納數峯寒好句貧猶得衰顏醉亦丹官閒樂如許何地更求安病畏空緣淺愁知醉境寬五窮空抱藝六巧豈勝寒鶴骨全憑杖霜毛不受丹春雲莫成雪僵臥有袁安二月十四日過初師房故國三年夢青春二月餘閒尋窗窈窕來伴客踟蹰花倩風調護愁應酒破除老夫乘興罷歸了讀殘書次韻李彥恢簡錢侍郎因叙將别之意兩淮持莭記當年奏計歸來雪滿顛應念故人今老矣載瞻行斾只依然欲知鴻雁劬勞日便是鵷鸞咫尺天况有金蘭在坡禁一生交分豈輕捐次韻彥恢再示前作此生難數綘人年髙位由來免疾顛自笑晚途聊復爾相逢雲路豈其然歸心只欲開三徑薄宦何由託二天他日據鞍如可强故人雖老未輕捐次韻趙簽判用李漕韻見示九陌塵中度嵗年不堪烏帽著華顛名雖已愧周公瑾詩或時參孟浩然豈料晚途蓮幕客肯來同醉玉壺天人間富貴須公等佩楪從今可盡捐彥恢被㫖使京西將歸待次用前韻送别因呈鄉里親舊知公直節自當年終不留衣與大顛胸次已能吞夢澤功名寧復愧燕然登車莫厭塵吹帽移棹應思水拍天歸去交遊如問我為言百事老俱捐太倉稊米集卷二十五
