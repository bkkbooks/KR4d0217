body:
  text: 大倉稊米集卷十三宋周紫芝撰詩四十八首次韻馮逺猷夜雨屋漏有作我昔在田間秋霖傷嵗熟常憂床床雨夜下東屯屋飯牛起晨耕短蓑聊櫛沐違濕因五遷勞形真僕僕坐歌南山粲那惜清夜促平生小馮君秀齒粲氷玉生餘華屋姿豈識霑濡辱誰知折角巾肯念滹沱軸會將秋雨謡寫入朱弦曲知君有過秦妙畫行見録衮衣坐法宫當寧調玉燭吾廬雖獨破受凍死亦足飲魏宗明家分韻得酒字閉門苦秋炎散髮臥北牖小雨度微涼西風颯衰柳起邀馬服君步過雲中守雲中雅好事酌我玉巵酒諸公飲方豪何曾問升斗而我才飲濕已復困濡首臭味本自同初何間能否不然瓊瑶林何以著老叟歡同一笑間義重千載後脫彈無新詩刻燭愧敏手詩成愼勿再坐客驚欲走感韓碑用李義山韻長蛇封豕矜雄姿弄兵三世窺皇羲自從羣騎入中土僥幸嵗月寬誅夷錦纒紅帕五十載肯輸赤豹兼黃羆憲皇神算本天授指顧不勞戈一揮元和上相拜元帥黃金鑄印手自持三軍踏雪砍墉入夜摩賊壘朝搴旗侍中西平老將種屬鞬拜舞行相隨緋衣小兒却健武未怕賊首如虎貔功埀竹帛不可掩名在萬古誰能訾行軍司馬號大手蒼珉承詔鑱瑰詞平生直筆有公議從人乞米知羞為狗功須賴發縱者盡勒殊勳歸鼎司宫中小女強解事斂祍雪涕埀豐頥絺章繪句隨斷裂厖恩下沛驚淋漓空餘大雅配吉甫元和聖德詩云誰作歌詩以配吉甫春秋廟享存歌詩當時左右無諌者應慙鳴佩趨龍墀襄陽太守獨何事殷勤自刻平吳碑將軍更勒燕然石蠻風瘴雨侵蟠螭張功耀武示萬世二子無乃為已私晉公純德古未有強藩悍將親平治羣姦聞風膽為落自奮老拳擒宛脾都人尚想白羽扇野蔓已理黃絹詞唐家晚嵗事如此誰令舉世躋純熙君不見鄭公之死肉未冷停婚碎石恩還追文皇英明猶復爾功臣誰肯躬胼胝玉溪慷慨書萬本要識元老為邦基寄題元具茨雙梅菴髙節知公冠九州梅花却對令君羞詩如往日陶彭澤人是只今陳太邱挽得繁枝供宴坐小分疏影入清流簿書堆裏渾無事玉雪香中醉即休讀東坡儋耳新詩先生流落久居夷屬國前身事巳非萬里岷峨空入夢七年海嶠不思歸桄榔葉暗蠻村雨荔子紅埀瘴嶺扉政坐詩窮關底事雲鵬誰道總卑飛東坡有雲鵬今悔不卑飛之句次韻時然惠徽州近作莊矦四海習鑿齒鸞栖一枝亦聊爾沸鑊那尋衮處州獨跨羸驂度徽水羊腸路繞十八坡危磴天懸三十里捫參歷井不復休一握去天真有此軍符夜下星火急吏習文書日填委青山倥傯未可厭方外周旋人有幾坐看雲生拄頰間便恐詩成橫槊裏萬壑千岩入句來天遣江山助竒偉我昔經行五嶺頭芙蓉峯髙天正秋凄音怨曲不成調細雨寒煙空復愁曉得新詩驚欲倒句似當年山色好一生忍淚泣秋風可笑區區郊與島題吕節夫園亭十一首吕節夫兄弟買地築屋于麻川之上鑿山疏泉種藥藝花為遊觀之所十有一官間則居之食不足則出而仕當世髙之其弟仁父為余道其名且使賦詩雲林堂髙情惡喧囂結屋傍空曠草堂寄雲林逺目聊自放偃蹇良不疑世情真可抗不知堂中人誰同倚藤杖半隱寮顯晦固有時出處本同致乘流與遇坎等是一戲事真隱了無心寧須論朝市君看半隱名是中有深意嵗寒披山中與誰語俗士不我過時攜登山屐間上嵗寒坡不知青女威奈此蒼官何從今桃李花漫漫空復多朝陽臺殘月壞金樞朝曦吐暘谷南臺凌日觀杲杲明萬木白露亦巳晞桐陰轉簷曲危坐讀黃庭想像巾一幅衆芳閣草木有盛德俗眼未易觀幽姿不可見微香在林間植我東籬菊藝此九畹蘭芳意似有知為君笑朱欄藤洞雲山渺無何地勝餘草木蒼藤飽風霜夭矯作岩谷幽香出空洞清樾交翠麓想時攜客來班荆對碁局學圃亭疏泉灌空畦折柳樊小圃關心有幽事寄意在衡宇但恐經綸人兹焉忽髙舉愼勿厭荷鋤煙蓑濕春雨卷書閣機雲佳兄弟胸中幾石渠萬事資不理三篋補有餘它時䇿髙勳已復得異書安用結飛樓傍架時卷舒舒嘯軒淵明磊落人啾唧倦吟諷聊將舒嘯聲一為洗喧閧寄言梟獍徒請勿恣嘲哢君看半嶺間依稀有鳴鳯越香堂佳木寄深塢自與春有期幽姿誰復省軒軒頗矜持真賞倘已逢清香襲人衣士為知己死此語良不欺容安軒生理須幾何安分一枝足向來髙明中百鬼作禍福何如此衡茅長年樂幽獨愼勿將蝸牛輕比蠻與觸金華老人分老潘點漆墨十月二十三日久雨新霽弄筆北窗戲作此語華嚴經云須彌山筆大海聚墨不能書寫一字法門老來窗几漫塵埃誰與潘郎點漆煤一字法門書不得又撩風月作詩媒東窗對雪六言四首月觀雲臺何處瑶林玉樹誰家幻成銀色世界雨此天女寶花天淨銀潢渺渺林寒玉珮珊珊有月時翻瑤草無人來踏瓊田擁鼻駝裘不暖澆腸蟻榼還空助我茶甌玉雪煎成石鼎松風睡起山驚堆玉詩成研欲敲氷飄瓦莫嫌碎點打窗留伴寒燈聞雪二首黃昏雪意未全成寒入重衾曉更清風裏未看穿幕片夢中先聽打窗聲朔風初喚夢魂回曉枕時聞急雪來未有春衣堪換酒明朝誰辦送寒杯次韻莊簿對雪月姊雲冠玉作膚白鸞飛鞚下天衢欲酬平地雪三尺正要澆愁酒一壺林下閉門須好句廟堂調燭費嘉謨它時瓊佩朝銀闕共醉寒江記老夫讀外舅髙晉翁詩集結髮論人物傾心慕老成掃門嗟齒暮洗眼失氷清心苦彈冠懶名應脫屨輕眼髙空爾輩醉熟自平生長嘯蘇門冷微顰下蔡傾千兵森武庫五字築詩城鮑謝萹章麗陰何句法精聱牙徒自放貞耀復誰旌草露功名薄春雲嵗月更鴨頭江自緑馬鬛墓還平蹤迹荆襄在文華劍佩榮塵編愁獨把清淚一縱橫吳幾聖許分蠟梅栽二首林下幽姿惱殺人書來分我月黃昏杜陵老子堪憐許枉乞桃栽一百根越羅新學染宫黃不著紅藍一點粧移取綵衣歌舞樹莫教曉夢怨餘香幾聖以三詩寄蠟梅栽次韻寄將琢玉風前句剪送和香雪後枝要識此花真面目細看無色畫中詩釀蜜成花此似難移根深恨老來看豐肌弱骨須調護可怕寒梢白露團慣見江邊雪樣梅此根常恐自天來懸知老去醉中眼便是姚黃花懶開次韻沈給事對雪長句二首時元用守宣灑天飛雪被長巒落絮縈風醉後觀塞上餐氊公獨記月中回棹我知寒已書上瑞歸天闕又挽豐年到筆端懸瓠功名知有意微生底處更求安翠失千峯與萬巒爛銀宫闕縱竒觀樓空翠濕衣裘重詩就風生齒頰寒聊與江山分絶致浪陪樽俎問更端莫嗔郢曲無人和七子風流負建安次韻莊時然徽州山下見梅三絶凍蘂寒梢也自芳斷橋深塢獨聞香山中行處花吹面馬上歸時詩滿囊雪後花開人未歸津亭誰共把寒杯句中解道梅如雪夢裏可無人似梅春到梅梢雪作堆庾郎愁眼為誰開白龜城裏未曾見徽嶺句中渾寄來雪將晴聞梅已有開者臘雪自知春欲回凍雲元不耐朝暉便須急買尋山屐莫放梅花一片飛題雪堂大研一首河間多書人共知未見紫岩方玉池東坡老人上天去流落人間君得之寶匣初開眼光眩相約君家與同看麝煤霮䨴雲滿天尺璧堅溫玉微汗峨眉山髙兩蘇出自是斯文有秦漢先生著書書滿家晚得窮愁坐城旦只今蠆尾人爭傳異時龜趺不須斷百年榮辱一夢餘空與髙人作竒玩安得大手揭陽君為我銘此元賔研次韻具茨老人觀臘月十五日按兵六花陳合紅滿川鼓􅎏聲喧旌暗天錦裘繡帽不動鞭腰鞬兩弓誰更先城狐社鼠空百千一呼辟易投戈鋋霹靂晝射蛟螭淵妖星夜落蚩尤躔穀城老父書誰傳可為帝師䇿萬全脫兔一出忽復旋風聲鶴唳驚虛弦常山蛇勢孰後前四頭八尾屢變遷何止內政分軌連部伍聊足相糾聯勢如漂石奔流泉蒙衝未數浮江船三軍不用呼飛燕功成唾手豈待年長安賊平不改鄽萬里玉關沉夕煙降王曵組未解纒白麻曉下彤庭宣兵雄澤潞非公賢談笑自足空戎邊沈元用太守和具茨詩張元明兩用其韻見邀同賦漢陽千騎嘶秦川六龍御日升中天翠鑾親巡耀寶鞭神武自作諸將先子陽盜據衆萬千井中蛙腹不受鋋虎頭誰敢當文淵一洗萬古空英躔風威巳落諸蕃傳上兵伐謀軍貴全固應玉陛當周旋朱幡猶此閲望弦安危以身誰肯前願扶國步整播遷徑兵出塞鏖祁連長纓曵首來翩聯盡驅酋長朝甘泉未慙驃騎羞戈船先聲旋下齊與燕稱觴拜舞呼萬年黃童佩犢無征鄽農桑萬里通人煙蓬頭舞劍空腰纒要分頗牧來藩宣古來千里制一賢長城未必能防邊橫溪小市再宿慨然有感小市人煙南北頭清江賈客去來舟兒時風物依然在老去光陰不奈愁可憐白髮無好意更對故城思舊遊煙塵蓬勃兵火急嵗晚棹歌歸去休夜宿長林明日遊仙壇宫麻川過長林路轉無百里積雨斷津梁日亂十六水忽從岡阜間稍得千家市凌晨上仙祠遂作折屐喜水流自汪灣山亦甚雄偉小邑頗下臨擾擾屯聚蟻一笑相與言黃冠有仙子為言庭前菊霜餘爛黃蘂採之制頺齡可以堅髮齒不須事虛曠至道亦良邇神仙固可學吐納乃餘事斯言雖甚簡中亦含妙理星源逢共兄弟别後道中奉寄二首曉色凄迷客夢長賈胡留滯更他鄉自隨匹馬家千里眼見故人天一方霜落駝裘朝著帽雨來山驛夜分床與君相别無多日已聽鳴鴻欲斷腸十年四海不解甲一日三秋更憶君别後光陰逐流水老來蹤迹似浮雲心懷邱壑情雖在眼暗風塵首重分滿眼尚添新戰骨何年真起故將軍苦寒二首朔風吹雪天漫漫厚地欲裂江水乾懸知北客未省見太古以來無此寒氷簷埀筍風撼屋布衣生稜體生粟老翁炙手厭朱門明朝晨暾更堪曝天容黯慘悲風吹寒日欲出寒雲埀千門晝閉人迹絶萬里長空鳥不飛豺虎號寒聲怒急行人指墮毛為立易水風髙燕地寒白頭書生望雲泣具茨老人讀書寮具茨四壁無斗儲載行書多常滿廬胸中嵬􅐑幾石渠三篋補亡無復餘起居誰不解何如校書著作虛詔除元元本本窮古初雌黃付與金銀車朅來窮山嵗三徂催科政拙民力蘇黃童佩犢耕災畬戴白未見空欷歔焚香晏坐臨綺疏三年不識園中蔬邇來結屋聊卷舒手抄平生未見書曼倩兩目如懸珠四十四萬何多歟較公所得無錙銖門生校讎誰與居我欲從公路鬱迃著鞭何時跨蹇驢不求奴飯馬青芻得公竒字歸自娛送元具茨歸黃山元祐宗師數聖朝兩公分路久揚鑣具茨人物真竒偉雙井風流未寂寥可怪魯山猶簿領不應聱叟是漁樵何時收拾江湖句歸作歌詩補舜韶太倉稊米集卷十三
