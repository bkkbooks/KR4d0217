body:
  text: 太倉稊米集巻四十一宋周紫芝撰賦十一首哀湘纍賦并叙始余夜讀離騷經二十五篇至其悲憤慷慨有不能勝卒以忠諫而死未嘗不埀涕想見其人其後誦賈生渡湘水所為弔屈原賦與揚子雲反離騷則知二子皆咎原以謂當去而不當死也嗚呼君子之責人也終無已乎其異於庸人亦逺矣而又非之不幾乎使人難為善者哉盍亦反而求之傷夫原之不逢其時以死焉斯可矣乃反二子之意而作賦名之曰哀湘纍繄靈均之好脩兮名正則乎始生皎外晢而中潔兮而又重之以能名紉江蘺以為佩兮擷芰莖以為纓駕青虬以為御兮驂白螭而上征朝登乎崑崙之邱兮夕弭節乎玉京叩帝閽以請命兮將下澤乎群靈忽堪輿之黮黯兮俄炎駭而雲蒸黄霧晻其四塞兮日月澒洞而不明前夔魖而後窫窳兮右蚩尤而左攙搶虎兕紛其欲齧兮梟獍肆其旁鳴嫫母姣而自好兮惡夫纍其潔貞痛靈脩之弗察兮俾羣䜛之並興暨夫纍之既逺兮孰怒鱗之敢攖惑纎靡之昵言兮卒䘮軀於秦庭纍知其無可奈何兮乃退而述其情雖怨悱而不亂兮懐眷眷其未央彼猶夷而不忍去兮冀異脩之自懲終惛惑而不悟兮知直道之難行乃負石而赴河兮恥餔汩之非清配陽侯之為神兮友彭咸而翺翔俯馮夷之幽宫兮聊逍遙以徜徉嗟夫人之何心兮謂纍死之弗祥盍逺引以避地兮豈兹國之為良視懐禄以偷生兮較一死而孰良彼䜛邪之並植兮勢溷溷其日昌顧若人之髙介兮亦何羞乎彼臧縱有目之不明兮豈鸞鷟之同行倘中心之不懵兮寜不辨乎羶薌曽椒蘭之不垢兮亦靈脩之可傷雖擯斥而不用兮亘千古而益光思隠賦維人生之有志兮咸自稟於不移紛異趣之殊轍兮遑同驅而並馳偉哲人之遐騖兮車遄徃而載脂搏六翮於九天兮時下睨而旁咍何貪人之敗類兮紛突梯其脂韋傃林臯而不反兮曰言邁以何之念兒童之未涉兮斥囂囂之群嬉坐茂陰以終日兮引清流而濯衣怪推排而不去兮懼並矚而歔欷歲侵尋以彌長兮迫世故之寒飢儼余冠之峩峩兮曳余裾之纚纚發余軔於南山兮漸余裙於天池森九關之虎豹兮夐杳隔乎雲霓始藝蘭之百畹兮植杜蘅於江蘺同草木之零落兮風雨穢而不治塵冥冥而晝晦兮石齒齒其輈摧知薫蕕之卒不可以同處兮疇鸞鶩之並栖世聱牙而不吾與兮吾亦惝怳而沈思時奄苒其不再得兮吁既逼於崦嵫頺齡倏其幾何兮竟迷塗之與偕恫奮飛之不能兮乖素心之幽期藉隠黙以自彊兮終厚顔之忸怩慨夫驥之逸足兮猶未就而銜羈豈縶維之不可脫兮將生芻之不可以肥幸鹽車之未駕兮豈空谷之難追卜余居於法淵兮反余珮乎江湄製芰荷以為蓋兮結薜荔以為帷雕桂樹以為棟兮採辛夷以為楣食雕胡之既實兮飲墜露之未晞信尚友於千古兮樂天命以奚疑矢余言之不妄兮指兹山而誓詞招玉友賦周子閒居既乆終歲杜門寡徒少偶寂無與言形影相弔自為朝昏客有謂余有賢公子者吾不知其為誰氏之子亦莫知其何許人也其為人也其中淵然而深其外粹然而温其德甚醇其譽甚芬顧風流之若此豈凡伯之能群若人者願奉杖屨於先生之前先生其亦有意乎周子曰嘻吾聞之子白晢無垢面如玉槃人樂與進無不盡歡可與定交取之必端字曰玉友見必解顔豈謂是歟客曰是也曰為我折簡招之使來黎明在門雜然詼諧傾蓋如故相視歡咍乃與為交絶嫌與猜先生喜甚崛然而起顧謂公子曰昔酈寄賣禄以全國常山戮餘以報私曽歲月之幾何倏膠漆之已離外表表其冠玉中屹屹而險巇偉兹友之穆清交逾乆而益夷豈甘醴之易壊亦浩浩其無疵挽夫君而與㳺視餘子其奚為又何必慕青州之從事追逸軌而並馳也耶先生乃命客以偶坐紛羽觴之淋漓粲一笑之春温契千載之夙期翳二士之相忘悵獨醒之可悲然後峙連璧之嶙峋起浮游於渺瀰此兩玉人者又相與為汗漫之遊逍遙乎六合之外而莫知天地之可遺也新城賦并叙建炎元年五月朔今天子以天下兵馬大元帥即寳位於南都尚書右丞吕公奉隆祐皇后㫖持國璽歸行在所上嘉其忠拜公以丞轄之命三年秋八月公移病得請為宣城守時朝廷方專任老成以惠安黎庶而宣於江左為要郡因飭有司賜中都錢五萬緡俾繕築故壘悉起而新之公至鎮之三月既因舊址分命其僚鳩工飭材以振頺靡曽不淹歲告成於朝雉堞樓櫓聳然環峙長河深塹縈帶乎四維民始有賴以安焉某實此邦之士均被惠澤以保厥攸居不能自黙乃為之賦以獻其詞曰皇受命之無疆兮撫列聖之重熈植本支以為城兮守中國於四夷成威疆於道德兮柔逺人而懐來雖外戸其弗閉兮詎正晝而穴坯陵垝垣其寖弛兮悵孤墉之日隤邇謀臣之鑿空兮結竒禍於邉陲盜鋒起於中夏兮焜樵蒸之配黎纂嗣聖之丕圖兮倐虎嘯而龍飛登故老於海濱兮勤懇惻於疇咨眷大江之横騖兮紀南國而東維瞻霓旌而望幸兮阻石頭之崯巇何兹土以為輔兮實警蹕之是毘爰屬公以徃城兮即舊址以増治始天語之丁寜兮旋縮板以塈茨驚萬杵之雷動兮屹百雉其厜㕒初浮櫐以陾陾兮趣伐鼛而既疲聳丹樓之如霞兮麗朝日於罘罳繄二水其如帶兮湛汪灣而𣺌瀰具藺石而布渠荅兮亦虎落之旁施役不再籍兮耕不解縻民不告病兮負鉏以遨嬉忽冦賊之凌暴兮蔽横江之旌旗剽旁邑而不入兮無匹馬之敢馳豈精誠之下格兮匪木石其奚疑追迴天之讜議兮信大厦之復支斂餘波以小溢兮在此一方之群黎公時與賓客而周覽兮淚雨下而交頥念北狩之既逺兮渺法駕其何之客起舞而夀公兮願効節於守陴公亦友松喬而不得兮反雲斾乎霄涯屏四方其安堵兮豈陋壤之足為儼余冠以從公兮聊望雲而裴囘感士不遇後賦并叙昔董仲舒作士不遇賦司馬子長作悲士不遇賦其後陶元亮倣二士之意而作感士不遇賦其畧云寓形宇内而瞬息巳盡立行之難而一城莫賞此古人所以染翰慷慨屢伸而不能已也嗚呼淵明知人生之如夢而未能均窮達於一理故遇不遇猶有分也乃作感士不遇後賦以廣其意云士固有抱負偉器而陸沈於阨窮無聊者十常八九余嘗較成敗於適然齊死生於頃乆然後知達者未必以智而得窮者未必以愚而取也故囘蚤死而跖夀雄終窮而莽達何侯萬錢而陳平糠籺季子六印而原思百結陽貨當國而孔子環轍萬石朱轓而馮唐白髮歴方册之所載雖不可以數計而周知大抵皆賢智之不遇例顛沛於覆車之轍也士不自悟怵然而驚作為斯文以鳴不平故揚雄嫉世而解嘲屈原見斥而作經韓非孤憤而卒死梁鴻五噫以示情是猶在可笑之域而未足以均昭氏之虧成也彼殊不知皇天之平分較錙銖於反覆似賦予之殊偏究所用而皆足鶴長不足斷鳬短不可續烏黒不日黔鵠白不日浴鷦鷯巢林不過一枝偃鼠飲河期在滿腹蓋窘於夀者餘於仁薄於利者富於德貴不在其身者其裔必昌志不施於時者其名必馥安蓬樞者不應有愧於華厦穿敗裘者不必多羨於蒼玉昔人有牧羊而寝者因羊而念馬因馬而念車因車而念蓋遂夢曲蓋鼓吹身為王公晝松風之聒寢忽驚悟而無蹤付浮生於夢境倐萬化之掃空亮無徃而不遇靡有困而不通倘領㑹於斯意聽造物之攸終蜂衙賦蜜蜂以釀蜜為能乃羽蟲之細方其樹花方馨而衆羽所萃載以其股擷以其喙蓋近乎智群飛薨薨其羽泄泄有一弗勤衆殺而棄蓋近乎義至於百和薫蒸如醖酒醴瓊膏溢流既甘且美剖其腹脾可口悅鼻則蜂之為技至矣長廊人寂雨霽日斜鬨然有聲隠於簷下童子曰嘻此蜂之衙也夫蜂以衆集其尊在王日以朝事蓋理之常有不安宅王於易方視王所至衆翼而翔奔逸以趨顧虞禍傷王之所止不飛以揚聚都成國復坐明堂曰君曰臣禮儀蹌蹌平居無事臣禮則臧忠不棄主猶在搶攘嗟乎朱輪華轂貂冠繡裳劍佩戛擊以朝明光朝趨秦庭暮綰漢章官崇禄豐主聖臣良時危勢傾胡越相忘孰知夫主憂臣辱主辱臣死與夫唯主所在與為存亡者乎故曰死生以之巍巍堂堂背主棄國是謂不祥聽夜雨賦歲壬辰秋七月夜既寂涼風發飢蟲號寒庭樹脫葉子周子傲胡床以箕踞耿秋懐之憀慄依倚孤燈爬搔短髮蓋戚戚然有不悅焉紞如三鼓夜既分矣有聲䬃然起於寒蕉静而聽之屑屑騷騷始霏微以成滴旋淅瀝而驚飄聲欲斷而復續勢中微而倏髙慘元雲之夜色滯青蘋之輕飇夢江聲之洶洶雜簷溜之嘈嘈𦕈長更其愈逺睇寒忩而未朝若有笑謂余者曰此殆造物者恨愴而愁子也子猶聞而樂之也耶子周子曰嘻僕賤役也疇昔之夜流轉倦游呉江楚澤賈胡滯留㞹峩巨艑舴艋扁舟風檣浩蕩短棹夷猶孤蓬獨夜風雨颼飀天寒日暮深山窮谷短衣匹馬逆旅獨宿主人歡笑夫飲婦屬客子萬里百念滿腹風雨淋漓寢不瞑目方余處此安能不凄其以悲反而思之有若痛定恍惚自疑今方振衣彈冠脫屨解靴方床石枕髙卧茅茨以聽夜雨之埀埀不猶愈於向者困苦羇愁無所于歸而栖栖者乎何向者不動其心而今反不樂以嬉乎雖然余猶以為未也夫鳥不厭髙魚不厭深麋鹿跂之志在山林適有天幸者不慗遺余有田一㕓有芋一區有薤百本有橘千奴其不然耶猶能著短蓑臥牛衣烹伏雌炊扊扅老妻稚子佩犢帶犂以耕春畦然後恣倦夜之熟寢傾濁醪以解頥和葉上之寒聲哦曉雨之新詩吾雖老矣而猶可庶幾也於是聞者噤莫能言而余亦鼻息如雷不知晨雞之喔咿蠅館落成賦并叙靜寄老人晏坐有室狹隘褊小僅容吾膝名曰蠅館客問其所以名者曰昔楚襄王命宋玉作小言賦其語有云館於蠅頭燕於毫端烹蝨腦膾蟣肝㑹九族而同嗜猶委餘而不殫今吾室類是故命曰蠅館也糞階窒穴掃堊塗丹治於八月之壬子而落成於是月之甲寅落成之日喜而作賦其詞曰子周子生於蝸牛之國居於坎井之間地止一席屋止一椽下飲蹄涔上窺醯天憑蚊睫以顧盼附蠛蠓而周旋雖傴僂以盡日聊嬉戲而蹣跚是曰蠅館宅於蠅顛念此有生坎壈多歎先人敝廬載築載焚一歲之間十徙九遷分窓共户或哀王孫遭嗔䝉斥亦怒其顔蘧廬逆旅莫適為安今也身為酒母以給上官萬蟻旋磨電轉雷喧量升較勺飛塵滿前曽不旋踵長廊寂然勞少逸多歲有餘閒男豐女肥月有餘錢以燕以游以樂吾觀曽不知足而猶欲渠渠廣厦以大吾居焉是可笑也巳矣况乃自昔佞幸專嬖權臣擅美富家鉅賈髙門大第家僮五百人步障三十里竒禍忽作室瞰百鬼朝存華屋暮掩虆梩嗟乎人生電忽如此視吾舍館豈不巨偉於是館成而落之主人喜甚而為之歌曰心有天游室生白兮天宇雖大何迫窄兮爰築吾館為安宅兮覽觀六合於几席兮避隂休影匿吾迹兮絶交屏遊晦吾德兮蟻穴蜂房以自適兮却暑賦伸夏之月星鳥司晨暑候藴隆赫如惔焚老人衰疲晝掩衡門如坐深甑眩乎沈昏况乃澤國湫隘江雲鬱興蝸廬蟻垤日炙雲蒸雖脫㡌以終日亦對食而不能乃復悠然遐想戲作寒語一笑為樂以却煩暑於是顧謂客曰子獨不見時當窮冬元冥用事朔風號空飛雪凌厲徹重氷於九淵凝隂雲於萬里土僨木僵凍裂厚地深山窮谷行人不至手足軟瘃流血墮指當是之時吾願與君據案飲氷褰裳掲水更雲卧而風乘庶炎蒸之可洗客大笑曰夫子之室枵然中空囊無敗絮衣衾不重念鶉衣而莫得况狐裘之䝉茸秋風颼䬃露泣草蟲稚子號寒老婦改容不於未寒而求衣乃反大言以自盲聾周子曰嘻吾儕小人朝夕偷安聊復念此以滌吾煩豈謂夏蟲而不可以語寒願子速退無敗吾歡造雹賦守宫微蟲以守為職碎首粉身僅防淫慝延縁壁間跂跂脈脈捕逐蚊蠅伺昏潜隙雜然一飽恣意啗食掉尾搖喉似有驕色技止於此其實何得至於平時暇日山崕水濱十十五五翩翩聨聨銜尾而下飲於江津哺水入穴藏於山隂發坎而視碎如凝氷是猶未足以為怪也乃若雷電成章山澤通氣隂雲四起凍雨立至則轟然有聲起於蟄戸激為飛雹散落無數大或如卵小或如雨殞草殺粟傷人摧羽為物之病蓋有不可勝數者矣吁亦異哉夫物之神怪其類無窮故龍噓而為雲虎嘯而生風蜃樓出海蛛網横空與夫人之幻化有若造氷於夏而起雷於冬或暈月以顯怪或吐霧以隠躬是皆一物之智一人之力而争大化於造物之功嗟此有生眇然其細乃能含水造雹毁瓦破塊配此霰雪以為虐癘是何其怪如此徒使漢儒論之惟咎隂陽春秋書之指為災異季武子之問申豐猶莫知其計也至歸咎於藏川池之氷棄而不用曽不知考厥咎災以及斯類也嗚呼物茍為孽初無小大皆足以自神其智奈何古今異代百氏小說有弗及紀乃知四海之大萬彚千品而潜奸伏慝眩耳駭目之物蓋巳多矣酹三賢賦并叙蠅舘主人獨遊西湖短棹扁舟夷猶孤山之下夜既乆而無聲月將曉而始出仰而望之弔三賢之遺蹤悵髙風之遼邈叩舷而歌舉酒一酹而賦之歲元武之宵中兮月既望而時秋鼔蘭舟之桂檝兮採芙蓉乎芳洲夜黮黯其未艾兮驂白鷺以夷猶儼望舒之始駕兮畀素魄於海陬整余冠而仰睇兮叩余舷乎中流望華祠於山阿兮眷三士之髙標雖出處之異致兮亦分路以揚鑣維香山之忠貞兮耿真節於中朝忤羣姦而見逐兮指新並以䝉嘲彼西蜀之老人兮抱素業於夔臯援斯文於未冺兮障俗學之瀾濤終一斥而不復兮病䜛口之囂囂歲七周於海濱兮脫九死而歸故邱痛二老之不遇兮越今昔而同儔豈鸞鶚之不可以争飛兮抑駑驥之難於並遊豈枘鑿之不可以相入兮抑亦臭味之異乎薫蕕棄珠璣而貫魚目兮斥騄耳而駕罷牛笑蹄涔之沮洳兮轉龍驤之巨舟獨髙人之前知兮遂遐舉而莫招爰卜宅於兹山兮旅麋鹿而友漁樵郤鶴書而不受兮恐曉猿之怒號草萋萋其春榮兮葉霏霏而秋凋閲四時而不改其操兮孰謂山中之不可以乆留抗髙風而配逸躅兮追兩軌以奚羞嗟余生之後時兮徒心斾之搖搖瞻清揚於彷彿兮拜遺像之非遙聊舉觴而一酹兮歌三疊而魂消倘微辭之可格兮冀旋斾乎雲霄太倉稊米集巻四十一
