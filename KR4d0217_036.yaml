body:
  text: 太倉稊米集巻三十六宋周紫芝撰詩五十一首鼓鼕鼕行煙雨凄凄芳草渡隔岸鼕鼕賽神鼓男巫唱歌女巫舞蠶宜青桑麥宜土天下無兵三百州不如賣劍買汝牛千倉萬廩汝莫愛富民今歲新封侯午睡為流鶯作歌擬倩花枝當綺羅更煩鶯作緩聲歌未殘春色猶堪惜巳老周郎奈若何樹裏金衣不露身欲尋啼處了無因緑隂長得成何事遮却黄鸝最惱人江南草長亂啼鶯睡足南州得細聽最愛欲歌還欲住伴人如夢亦如醒寄黄超然監丞求山谷像黄人生不恨幸識元魯山平生黄叔度常在夢想間時於絹素中得見氷雪顔晚乃客京洛髯孫始追攀眉目真似之典刑今未刋昔我在武林歲月不得閒甚欲貌公像歸嚢竟空還邇從同寮家小軸得細㸔芒鞵方釋杖野服不著冠尚恐或非真蠧蟲亦少殘謂言君家本可惜石竹難願君呼畫史摹寫來江干孫郎傾蓋交臭味同芝蘭能事亦須趣勿作水石慳君不相我請幽興恐易闌次韻沈季鄉題醉山堂㸔盡吳頭楚尾山不嫌心似鳥知還可憐樽爼登臨處正在烟雲杳靄間地勝豈無神物䕶天教付與老翁閒憑欄欲喚君來語家住寒溪第幾灣送呼延韓仲人生何苦著儒冠心與功名了不干早歲氣吞雲夢澤暮年身作灞陵官欲尋故國今安在漫醉醨樽不當歡老别相逢知幾日花鬚句在好重㸔韓仲見和勸農詩有况此春欲暮風溫脱花鬚之句語意俱勝晚思落日下平蕪囘照東湖尾牛從何處歸相隨渡湖水幽人倚欄意得月猶未巳白鷺知何為欲下還復起送劉德秀赴官貴池劉郎人物照當時未上青雲莫慢遲秋浦江山應似舊藍田雁鶩不妨詩銷魂怕作文通别問字誰如伯始知此去醉山梅欲動憶君同㸔雪前枝季卿恵詩頗寓窮愁之意作是詩勉之君有篇章配國風技兼鼯鼠固應窮但令人似千金璧莫恨門生一丈蓬北阮有生寜免俗䝉荘雖放亦求通㑹㸔黄鵠摩霄去未可輕投燕雀叢秋意江城木落又秋髙歸夢難成客鬢凋擬倩西風吹雨去莫來窓下打芭蕉十月晦日郡席見鵝梨雪後新嘗濺齒泉樽前風味固依然自從北郡無人到不見鵞梨今幾年魯酒謾傾猶病渇并刀未下巳流涎從今莫覔張公種釘坐雖多不當賢題向司户薌林圖宸奎猶作麝烟浮便艤歸航結小樓何處訪求三島路徑須圖畫百花洲黄金殿裏鵷鸞夢白鷺江頭草樹秋天上歸來輞川住世間那有此風流臘月二十三日郡㕔禱雪宿齋房趙尉燈下送蠟梅半昏燈火宿齋房驚見梅梢破蠟黄夜静月斜簾不巻步虚聲裏得花香正月十四日夜病在告雨中不寐示劉德秀雨意涔涔客夢慳病來無意近歌檀㸔他紅袖傾春酒分我青燈照夜寒老子要非年少伴醉鄉空願故時歡懸知鄴下劉公幹猶擁書檠午夜㸔題李伯時畫歸去來圖淵明詩成無色畫龍眠畫出無聲詩兩公恐是前後身二妙畧殊今昔時我頃誦詩不知處今乃按圖俱得之當時想見歸意好扁舟颺水風吹衣壺觴未飲入室酒玉色先見迎門兒豈無故老說情話尚有殘菊依東籬雲歸鳥倦自有意欲辯巳忘誰復知龍眠得之心應手筆所到處心相隨僮奴似有傲世色草木亦帶烟霞姿癡兒方辦公家事此老自挾南畆犁人生異趣豈不逺心如鐡石終難移我今此意不自事老去見畫空慚非次韻范提幹二首繡衮華貂侍禁宸忠宣遺烈在絲綸傳家父子俱仁孝蓋世功名孰比倫閥閲固知流𣲖逺衣冠今見典型新如公自是青雲器不作劉郎問大鈞白頭於世亦何能欲賦歸來計未成孟博聲名追徃昔蔚宗文字慰平生風流易散嗟人事臭味相求豈世情欲唱清歌送行客不知誰是米嘉榮客夢客夢長千里官居巳歲餘却愁花蘂動轉益鬢毛疎山氣朝朝雨江苞月月魚匡廬早歸去稚子可籃輿次韻强使君見寄夢澤南州聽曉雞老饕於此寄朱麾春湖魚上先分玉暗谷茶生㸔展旗鱏魚桃花茶皆此邦嘉物酒甲江西聊可醉山横楚尾恨無詩富川酒冠江西年豐訟少知何事時有光隂到楚詞次韻黄叔魚見寄江邉熟睡不聞雞髙臥何功尚擁麾千里西風飽魚蟹十年驚魄夢旌旗名慚公瑾終焉用人似黄香更好詩欲作報章無妙語楚歌唯有竹枝詞湖亭之勝大似江上但無蘆葦二月二十日移植數十本大年著色山前雨摩詰無聲句裏秋巳是湖山無限好更栽蘆葉伴輕鷗杜䳌三首甘王祠下杜䳌啼句句聲聲是說歸安得一家三十口似君兩翼解髙飛千秋但有一淵明肯脫青衫事耦耕闕漢朝俱此老都門誰祖二疏行窮甚亦須缾有粟天寒可遣婦無褌杜䳌不大知人意歸計應須與細論聞真如牡丹盛開偶憶去歲㸔花之㑹記得東風隔水村偶逢幽艶薦芳樽今年多病無行樂更怕春寒不出門春來花草盡關愁風雨妨人懶出㳺不見鞓紅去年面可憐孤負玉風流郡酒名風流泉謝王侍郎寄東倉祖送圖都門供帳記當年十里旌旗暗畫船文石班中天上客水晶宫裏地行仙鈴齋妙畫人間見相府珍篇海内傳錦軸牙籖渾未識忽隨雙鯉到家邉抗章聞說動前旒分得東吳第一州乆與衣冠為盛事更尋雲水作遨頭當時鵷鷺應須記此去湖山莫謾留却笑杜郎生羽翼但知歡喜下汀州杜牧自少卿出守吳興當時有捧檄汀洲去全家羽翼飛之句次韻李安州贈别老來著處便為家行盡江西是水涯詩到說歸無限意山非吾土未應嘉我思故國方成恨君到東湖尚有花更欲少留聽句法公詩巳似玉無瑕次韻李安州紀贈二十韻衣冠數人物伯仲髙人間我於鴻雁行疇昔奉徃還掛名華萼集遂爾不復刋暮齒慨晼晚得州近荆蠻恨公識面遲又復容追攀髙風薄雲漢秀句横筆端乃知同氣中文采真斑斑誰將鄖城水換取蓬萊山要公撫凋氓天意豈等閒玉階有餘地行歸鳴佩環上最不待乆唾手未苦難念我老巳熟無鬢堪成班江頭忽三月坐見春物殘相逢喜傾蓋徃事論險艱一飲未徹席扁舟渡驚湍情鍾惜易别易别成永歎可憐堂下水故作聲潺湲風流倏雲散人生豈長歡願公寄尺書細行勿輕刪仍煩巧匠手著意鐫堅頑北湖暮春十首東君無意惜花殘留得青山隔雨㸔可怪天公不憐客緑陰成後却春寒北湖㸔雨兩春餘忘却漁村笠澤居去歲鶯花猶是主今年鬚鬢不勝疎花到酴醿欲盡時一春巳是燕㳺稀舊來持酒聽歌處乞與東風燕子飛幾日春風自在顛誰家相喚上鞦韆難留花住那堪雨不奈天寒更禁烟洛紅聞說爛如霞應著青油宻䕶遮莫剪姚黄供老眼使君頭白懶㸔花韋郎詩淡少人傳貪㸔仙書不愛眠閒礳小團新樣月撥灰重試古龍涎西施乳白魚供箸樊素唇紅果薦新不恨江干春晼晚旅庖猶是慰愁人富川二物春晚上市落絮天慵草漸勻最遲紅藥又成塵苦無黄鳥能歌舞連日春隂悶殺人燕梁夫婦幾時歸養得新雛總解飛投老卜巢猶未定可憐人不似烏衣次韻元相題到花亭從他白髪三千丈莫管人生七十稀滿載月明歌一曲到花亭裏醉中歸送李瑞昌廬阜老人心古錐頗學子長多愛竒晚生恨不見前輩一談徃事神先馳龍眠人品似摩詰不比老闕閻呼畫師徃時袖手閲神駿三馬就斃何由追都人一日傳萬口後生聞此心懐疑諸孫今喜典型在此事頗從君得之吾皇仁聖重賢士子孫必録初無遺但令苛政不如虎㑹有善事令天知碧油擁被報政急桁楊臥壁催科遲他年父老歌遺愛為君摩石題蒼碑余手植木芙蕖數十本山亭之下比聞頗為群羊踐履春去無花伴白顛旋栽紅艶照霜前髯郎莫剪柔柯去留作秋風一醉眠送髙仲思提幹獮猴莫厭土牛遲天馬能行老更竒論事頗遭官長怒潔身惟恐世人知簿書奔走聊應爾臺閣飛騰自有時雲落斷鴻誰是伴尺書何日慰相思送瑩老住灌谿一年身寄水南村誰把禪床一席分去住隨縁本無意道人蹤跡似孤雲竹坡無物可關懐只有青山眼為開未識灌溪真面目煩君著句畫將來送楊師醇之臨安兼呈師古家在湓城五老山與君相望各江干如何肯撥艅艎棹便欲來同苜蓿􅌉傾蓋盡知今日意買隣仍結舊時歡菊觴澆酒無離恨淡榜書名㸔二難令弟登科師醇新除皆在來歲聊見篇尾擬省題桂林一枝詩晉祚傳千載賢科重一時擬横金殿棟先剪桂林枝月窟根盤壯烟巖雨露滋孤芳寜有種凡木自多姿臃腫樗空大風流栁漫埀惟應太邱令功德季方知秋來乆不作詩書所感雨蹙江濤壯天含暮靄低年華添老色風物似年時富貴渾無念情懐不到詩度秋無一語巳是俗人為寄李安州未得别後書二首未得安州信空添楚水秋雁寒飛不到江逺望難休去國雙紅斾攜家兩白頭可能無一字分慰老人愁二鄂渚他時縣江南盡處州平生求識面此地忽同逰湖外公開府江邉我上樓尺書何日到能寄近詩不太倉稊米集巻三十六
