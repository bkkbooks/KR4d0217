body:
  text: 太倉稊米集卷四十九宋周紫芝撰劄子三首乞旌表蘇庠劄子臣嘗觀漢之光武以英敏之資撥亂反正不數年而天下大定即位之初未遑他事唯務側席幽人聘禮髙士自衆人觀之疑若急其所緩而後其所先殊不知舉逸民則天下歸心焉蓋深得乎聖人之意者也臣竊見鎮江府蘇堅之子庠人物文采一時之冠而抱泉石烟霞之念至於終身可謂賢矣往者朝廷束帛羔雁屢賁其門庠雖不變所守高卧不至而聖主之恩所以光寵豈不大哉今既以是終殞於地下儻不稍加甄異則無以見朝廷敦尚名節終始不倦之意臣愚伏望聖慈表其門閭賜以美號付之史館使傳萬世非特後之鄙夫聞其風者莫不興起四方議者以謂庠能終始其節而不變朝廷能終始於禮而不倦亦不可謂無補於聖化之萬一也取進止乞增太學員額劄子臣聞京師者首善之地庠序者教化之源雖堯舜三代之盛聖帝明王相繼而興未有不以為先務之急者元帝之紹隆晉室王導首勸以興崇太學當是之時庶事草創民未安堵猶且不忘乎此况陛下以明聖之主隆甚大之業兵寢刑措而民無勞怨禮制樂作而政極盈成曽不數年之間而坐致太平下視晉元固萬萬不侔日者建成均於國之南既立博士之員增養士之額矣又親屈帝尊以為士子之勸可謂無愧於堯舜三代之盛也臣竊見春秋之季當太學試補諸生之日四方士子輻輳雲合不逺數千里而來其慕道嚮風之意如此有司以拘於養士之數雖欲盡挽英豪置在賢關而不可得昔神宗皇帝初立太學下詔四方有謂仲尼旅人其徒尚有三千之語陛下富有四海亦可增闢黌舍稍益士籍庶幾士無失職之嘆而人有勸善之心是亦神考之志而天下之幸也取進止乞禁戢殺子劄子臣恭惟皇帝陛下體上聖之資際中興之運纍嵗以來年穀順成海內冨庶向之流冗悉皆占籍而户口丁壯日以增多亹亹乎其嚮於堯舜之治矣而臣聞之僻邑遐邦深山窮谷蚩蚩之民猶有狃于故習至於生子不育舉而去之者常居其半保伍見而不以聞有司聞而不加罪非所以體陛下好生之德也臣愚伏望聖慈申戒有司州責之守縣責之令民有生子輒書之籍俾部使者嵗終則較其多寡之數而為之殿最如是則民知所畏而不敢殺子吏知所畏而不敢慢令將見民數滋繁力耕者衆邦本固而社稷安陛下可埀拱無為而坐視夫民之阜矣豈不韙歟取進止雜說十二首卜者馬生卜者馬生不知何許人少以卜自業日得百錢以醉即閉肆謝客不復言人禍福餘亦無他長也每吉月輒冠拜于孔子之廷風雨則拜諸大門之外非有大故不渝也如是者不知其幾何時而人無知者生亦不以告人今年元夕城市燈火如星斗郡太守擁千騎游于道夫子祠宫在城南隅廷草繁茂路且荆棘頽簷敗壁人跡罕至忽有燭燎輝明殿中三夕不滅人莫知其所從來物色久之乃知其為卜師嗟乎學士大夫由吾夫子之道以取富貴利達至于為郡守縣令亦榮矣而有終三年足跡不一至吾夫子之廷者聞馬生之風亦可以少愧矣湖隂女子湖隂女子姓詹氏姿容甚美年十七嵗其父老而貧以六經教授小兒自業號詹先生先生妻早亡女子與其兄事之甚謹先生貧甚食不足女間售女工以給之嘗手抄古烈女傳暮夜必熟誦數四而寢雖甚寒暑不廢鄉人皆異之淮冦張遇聚黨寖多號一窠蜂既屠池陽朝廷遣師退之賊計甚窘乃夜遁順流復寇湖陰邑人皆遁先生泣謂女子曰今吾老矣死固無恨奈若何女子曰父獨何憂吾計決矣今日豈得父子俱生耶頃之賊至按劔欲殺其父兄刃將下女特前謂賊曰吾父貧且老君意不在金帛但欲得我耳吾幸得執巾帚以奉君侯請釋父縳不然父子俱死無益也賊命遣之女子以手麾其父使急去無相念吾得為君侯妻死無恨矣賊挈女行數里過東市橋躍入水而死後數日其從兄夜夢女子相别曰吾已活吾父兄吾即死來與兄訣既旦殊忽忽不樂其妻怪問其故乃告以女子之言妻大驚曰吾夜夢小姑如平生亟來相别明日果有告以女子之死者嗚呼女子以柔靜之姿當白刃在前于倉卒危疑之際乃能從容說賊使之既全其父兄又能潔其身以死其節可謂全矣其鄉之士有謂余言者以為女子平日好讀古烈女傳胸中微有古今便能作此大丈夫事竊謂不然蓋其天資乃爾非學而能也前世賢士大夫口誦古人之言而委身從賊徼幸以偷生者不可勝數曽一女子之不若乃為録之以補國史之遺先生僑寓湖隂其名字鄉里余未暇考以俟知者足之病中雜記政和間余客京師聞亳州民間有子十五餘嵗間數日輒出或暮夜不歸歸亦不言所之問之則笑曰今日當行雨一日歸甚暮狀極疲困巳而即熟卧其母燭而視之則龍也後乃祖病背疽甚苦以藥傅之良久遂平或問之子家甚貧吾聞龍寶藏如山何不取以濟之曰昔我盜藥以療吾祖當受五百鐵杖王以吾行孝得免宫中法禁極嚴吾不敢也病中追記此事庶幾其或有遇焉司仲因亦言昔有人父患背瘡者若負火炭晝夜號呼其子泣于塗有道人昂然而來曰子何憂之深也其子告之故道人曰子當求不耕之地遇野人糞為蟲鳥所殘處即以手去矢其下土篩以傅之乃如其言而用之立愈曰子乃以氷著吾背耶吾五臟俱凉矣初余疾益甚惛憒彌日兒子槃曰吾當告司仲因治余大怒曰平日不聞其能此子何召曰意其必能巳而果然此雖不如二事顯著然而若有使之者亦異矣夫六七年前余嘗病此宗子彥符以方見授且云善惡諸瘡無藥可治者皆能治之仁宗皇帝在東宮時偶患痄腮命昭應宫道士贊能治之取赤小豆四十九粒呪之雜他藥為末傅之而愈時中貴任承亮在傍見之後十餘嵗承亮自患惡瘡瀕死尚書郎傳闕以藥傅之立愈問其方乃赤小豆耳承亮始悟道士之呪乃神其術也他日有僧惠文患發背狀如爛瓜以傅之亦愈後承亮過豫章豫章人有患脅疽者幾達五臟醫者治之甚捷承亮問曰公何為用小豆耶醫者大驚再拜謝曰吾用此活三十口願勿復言其妙如此余去嵗終始用之其效若神鄭象有乳婢腹疽用之亦效今年初亦用之久而益甚因記去嵗余病寒熱凡終嵗百法治之不差醫僧善應用四物湯加柴胡三飲而止善應謂余言昔有士人病瘧數嵗者因道過華它廟作書問之以謂使余病不可為當明以告我可活願授一方夜夢神人告之以此今年夏余復若此用之殊不效半夏輒巳乃知醫之用藥如將之用兵皆偶合耳不然則是良將無敗兵良醫無死漢矣世豈有是理哉南方醫者謂余言螳螂真丹能療驚風其法于立冬前取螳螂一枚雄者和白麵裹之用文武火煉成灰候冷以井水滌去灰滓灰滓既盡丹自見兒有疾則投之疾當立愈丹可收數年雖遇梅不壞蓋與金丹無異此又不知何理也讀詩讞翰林蘇公以元豐二年八月十八日屬吏十一月二十七日獄成有㫖責授檢校水部員外郎充黃州團練副使公就逮百有餘日凡御史追捕訊鞠之辭率坐詩語譏謗故當時欵牘好事者往往爭相傳誦謂之詩讞豫前後所見數本雖大概相類而首尾詳略多不同今日趙居士擕當途儲大夫家所藏以示豫比昔所見加詳蓋善本也初東坡以湖州謝表獲罪於朝監察御史何正臣舒亶輩交章力詆皆以公愚弄朝廷妄自尊大宜大明誅罰以厲天下於是始有殺公之意焉神宗皇帝以英明果斷之資回羣議于恟恟中賴以不死余頃年嘗見章丞相論事表云軾十九擢進士第二十三應直言極諫科擢為第一仁宗皇帝得軾以為一代之寶今反置在囹圄臣恐後世以謂陛下聼諛言而惡訐直也舊傳元豐間朝廷以羣言論公獨神廟惜其才不忍殺丞相王文公曰豈有聖世而殺才士者乎當時讞議以公一言而決嗚呼誰謂兩公乃有是言哉蓋義理人心所同初豈有異特論事有不合焉讀真誥神仙不可驟得惟積行纍功有陰德于人者乃可馴致故真誥言之有英雄之才誅暴禁亂拓平九州建號帝王者永無進仙之期坐殺伐積酷害生尤多故也其有若此者既死之後必受書於三官四輔或為五帝上相或為四明公賔友以助治百鬼綜理死生且言秦始皇今為北帝上相漢髙祖今為南明公賔友魏武帝今為北君太傅蜀先主為北河侯晉宣帝為四明公賔友而周文王亦為西明公周武王為鬼官北斗君皆為上世帝王不得為神仙者夫神仙記人功行不差毫釐而今乃善惡同區無有差别文王視民如傷仁霑朽骨不過為四明公秦始皇以暴虐吞噬海宇魏武帝以篡逆賊虐賢智猶得為北帝上相北君太傅此何理耶以彼其人當作長蛇封豕耳豈得復為五帝上相耶便總言之文王之人固已優入神仙之域而秦魏二主何為乎又别論五條以至忠至孝至貞至亷之人或一百四十年或二百八十年為一階從此漸得補仙官有上聖之德者反受三官書後二千四百年才得為中仙其言大率無倫可不攻而破嗚呼陶𢎞景何人哉乃敢妄立異論以欺世俗如此耶讀兖公集歐陽少師以閨門疑似之事受謗于時朝廷置獄窮治無狀久始辨白獨坐財物不明出知滁州及參政事臺官蔣之竒復用錢明逸前章句再有彈奏公力請于朝乞差官根問虛實狀極憤切朝奏纍詰之竒但云得自彭思永思永又云事無實狀是曖昧之言若此亦足以少伸矣公之章猶且十上而不已議者為之少貶焉夫以公之誠確端亮操行如雪霜雖神明自應畏之但白黑太明頗為邪佞所疾小人因中以無實不根之語蔣公身為臺諫既有所聞義不當默耳故世謂蔣公當言歐公不當辨此最為至論昔人有誣以盜嫂者曰我乃無兄安得嫂正當作是語耳古語有之禦寒莫如重裘止謗莫若身修謗豈唯不可止哉蓋亦不必辨也公所上章載兖公别集集二十卷出汝陰王姓之家記中山武臣啓語蘇內相開幕府在中山有武臣狀極朴陋以啓事來獻內相得之甚喜曰竒文也客退公問李姑溪何最為佳句曰獨開一府收徐庾于幕中並用五材走孫吳於堂下此佳句也公曰非君誰識之者姑溪因笑謂公曰視此郎眉宇間決無是語得無假諸人乎公曰使其果然固亦具眼矣即治具召之與語盡歡一府皆驚紹興已未三月二十有七日獨坐靜寄偶追憶姑溪語乃録之言窮針南方之豪屋有二喙一鳴其凶一告其祉他日梟鳴而牛生其犢鵲噪而婦喪其子主人曰嘻是禍福無憑則將安用乎此射以一矢而二鳥俱斃言無好莠均巳之纍古人有言多言數窮不如守中彼呶呶以害其生者又烏知默之為貴耶答田劵示徐伯逺僕行年幾六十老稚逾百指初無尺寸之田常仰食于他人蓋世未有貧於此者同郡徐侯伯逺慨然見憐割膏腴之地五十畝分播種之穀三稱且約今年秋來為耕種計曰此可收以為田劵也伯逺來書其語如此初伯逺約以春耕而僕無牛市一牛須百千固嘗經營之矣迄無一人肯哀王孫者遂復中輟今田劵既來勢艱自已伯逺既作捨田檀越小子更當緣化一牛輒戲作一疏云蒲團禪板此身已自在家僧稚子老妻從頭要說無生話但愁枵腹未有置錐誰謂故人肯分膏壤既有良田之半頃更須大武之一元伏願萬石豪家千蹄大族輟此谷量之衆不勞鼎食之餘儻金諾之肯埀知火耕之可老何須賣劒便可掛書春雨緑簔歌老翁之長日夕陽橫笛卧牧叟之歸塗感君不世之恩助我歸田之計使僕果遂此心則吾伯逺之賜亦大矣姑録此以作别後一笑且以答田劵之勸也紹興丙辰浴佛後一日讀明道實録於關子東太學正關子東見和苦筍詩携以相過且相戒非老人所當嗜因論張右史明道實録中載內侍張茂則常與王哲龍圖劉几祕監諸人皆食少强健無疾各年八十餘卒吁子東之愛吾可謂厚矣哉然而老人血氣既衰賴食飲以資飬要須適中乃可文潜謂張茂則每食不過粗飯一盞許王龍圖食包子至二三枚乃止此與辟穀相去一間耳安能為老者助亷將軍飯斗粟肉十斤卒老於趙本朝張齊賢終燕飲啖合一大桶亦以壽終頃時韓絳大夫啖饅頭不用食器唯取籠就食之至庖人云大夫今日喫幾籠矣時人號韓饅頭嘗為當塗太守是時年已七十餘鬚髮如雪霜而健啖不衰二者可謂過與不及也某年十三四嵗時當元祐八九年張右史守宣城巳苦風痺唯好食蟹每食取黃與肉實之杯中往往一食兩巨杯酒不饜親舊有以書勸之者答云酒逢秋而方濃蟹得霜而正肥日與賓客共之闕一不可又作食蟹詩謂本草言蟹能愈風而俗云動風乃有書生自信書俗說徒縈耳之語文潜善啖如此而著此說何也某素貧平生辛苦僅營一食年來身益老口愈衆早食得一肉得一魚暮則飯蔬病在飢不在飽也今乃貽吾以右史之語適相契合僕復恐子東信是說而莭之太過非所以為衛生之計乃書此紙以告焉亦聊以為一嘆也紹興甲子夏午月十有八日宣城周某書太倉稊米集卷四十九
