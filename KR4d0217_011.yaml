body:
  text: 太倉稊米集卷十一宋周紫芝撰詩四十首秋旱既久巳而大雨霜旱憂千里靈湫臥蟄龍叢祠亦何力女覡遂論功凍雨雲霓過秋田冦盜空飢腸蒙一飽歡甚雪髯翁夜雨不寐嵗已隨流水身猶轉斷蓬秋風雙髸短夜雨一燈紅衰病無多力窮愁莫漫攻殘年消砥物溪外兩三峯次韻羅叔共紀事見寄羅竦字叔共中原困干戈此事昔固聞何嘗大江南代馬動成群踴躍萬騎入蒼黃兩龍奔五年三避敵十室九見焚相公既降敵杜充也盜賊俱官軍遂令江以南填山滿屯營老稚五六輩相呼走荒村君昔東道主竄身亦荆榛兩家三十口既死驚復存共求草中生有似麞與麕平時巳蹭蹬老恨有此身湛湛兩玉壺炯炯無一塵猶喜埀盡中得此千載人珠璣皎在前自然洗妖氛恨君濟時䇿百未有一伸半通猶綰盩兩肘空懸鶉無人作遊揚恐得按劍嗔濃雲卷膚寸未許膏斯民念昔仲夏夜赤氣騰天曛雨足下埀地誅斬當奸臣敵將果夜遁王師䇿殊勳班荆記是夕同我二三君君歌獨慷慨淚下霑衣巾願言補周衮八表均堯仁昆蟲及草木同播一大鈞良㑹有如此吾生豈非辰吟君洗兵馬大雅何深醇安得清廟瑟朱絃奏春溫七月十八日夜獨坐靜寄月出麻姑背開户徜徉夜久不寐秋日忽復翳暮色橫陂陀黯黯窗户暗森森修竹多我懶不㸃燈枯藤與婆娑青山忽吐月隔竹翻金波須㬰滿幽林欵乃被岩阿開門望天漢星宿方森羅秋風入梧楸白露霑芰荷夜寒有驚鵲飛鳴繞南柯蒼生願安枕壯士方橫戈誰能請纓劍故地收關河我意忽不愜鄰雞復當歌詩成月巳落奈此老狂何次韻魏宗明攜酒小集山翁爛醉習家池碎剪黃花㸃玉巵亹亹聽君真有味皇皇憐我欲何之難陪痛飲心先醉强作朱顔老昜衰明日囊中有新句尚堪醉墨寫淋漓次韻吕居仁詩成邂逅得窮愁眼見郎潛又白頭人物向來山吏部篇章今日謝宣州狗監連衡苦未平秋成戈甲尚乘城夢魂幾欲隨公去為問髙安路幾程樓上看山酒一巵人間此樂豈兒知秋風吹落霜前雁寄得西來别後詩白髮書生誰復論蕭然深閉一蓬門自知赤壁功名晚羞與周郎作耳孫題裴晉公畫像二絶朝論當年洶洶時此翁竒事少人知夢中縛得吳元濟猶說緋衣是小兒瘦著輕裘似不勝書生事業復誰能莫嗔小鴨可禽兔真有禪師解放鷹玉友初成戲作二首小瓮鵝黃撥不開晚風吹蟻轉荷杯燈前細酌情何限病後朱顔老却回我亦平生笑餘耳人今何處有陳雷方從歡伯作幽事莫喚酪奴相繼來舊交誰復可相忘晚向林中得此郎政恐大兒妨笑語頻呼小友共回翔坐來烏有聊為客醉後無何即是鄉多謝故人分玉粒夜燈和雨搗新香撿故書得舊寫真戲書楊柳春風濯濯枝深慙張緒少年時期期尚有胸中意種種真成髸上悲暮四朝三心巳了年頭月尾老俱遺此中空洞今何有曲盡周郎更不知八月三日早起金樞壞殘月暘谷賓朝曦九日浴滄海一日騰上枝上枝邈何許但隱山半規須臾掛銅鉦飛上天一涯光景被草木曄曄含幽姿微暾入圓吭飛鳴各嚶咿物意自欣悅人情傷嵗時卷我東窗簾羣山抹修眉炙背翻故書搜腸出新詩俟河幾時清種豆落為萁人生行樂耳冨貴終何為丈夫風雲㑹事業肩臯䕫時哉不我與浩歌君勿疑紉蘭可為佩製荷可為衣駕以白玉虬驂以蒼精螭翩翩八荒外渺渺天風吹世俗付一笑造化真小兒雨作留水西溪漲不可復歸東溪打槳過西溪南嶺雲飛北嶺時鳥語屢呼人載酒山行不厭雨催詩靜中秋色人間少客裏泉聲夜半知老去隨緣皆可耳愁霖未用苦相欺病中王邦憲見過以詩為謝因以當别别後衡門久不開壯心消盡已成灰白頭羇客病中老青眼故人天外來相見有時那昜得語離終在莫頻催山城歸路應殘臘早寄春風嶺上梅病起負暄菊籬一首臥疴初肅霜小間倐𤣥冬老境知幾何半落呻吟中醫師固楚産砭灼矜神功巫師雜荒怪呼吸生雷風江鄉鬱毒霧禦濕無鞠藭况復窘行役六月傷藴隆寒熱遂百戰藥石徒屢攻槁項與黃馘苶然非昔容逮兹脫九死更生本蒼穹今晨頗欣悅步我菊籬東無誰與共語梵誦庶可終憂樂有乘除涉世殊窮通幸兹未暝間有樂聊復從送詹伯尹赴三衢酒官東觀誰臨未見書起居君不解何如懶從瓜隴耕春雨聊聽糟床滴夜渠滿世棘荆渾未定白頭書尺莫全疏官曹有祿仍無事看著斑衣從版輿辛亥冬無雪天氣妍暖如禁烟時書所感三絶句夕陽微傍小窗明便遣飛蟲作意鳴天共梅花元有約誰教草色上荒城當年白雨打凉州春色還催禁籞遊記得端門迎輦路輕氷一夜緑楊溝去年和雪臥榛叢雪裏旌旗分外紅江上只今無盜賊樓頭昨夜已春風仁宗皇帝飛白歌八神警蹕羣靈趨風師雨伯當前驅漢家四葉聖主出共扶日御升天衢當時農桑三萬里地上錢流已如水左有稷契右皋夔四嶽九官真濟濟太師當國天下安貂蟬繡衮身如山范公特節下金鑾名落百蠻毛髮寒鄭公有口伐可汗可使一言無契丹太平天子坐埀拱蟬蜵蠖濩朝千官侍臣愕立蓬萊殿看草宸奎麗雲漢中人傳賜宣口敕雨露恩光極昭煥公家什襲宫錦囊五彩屬天驚夜光試從父老說嘉祐百年厚德知難忘自從喪亂雙眼暗猶喜人間得時見小臣拜舞喜欲顛安得身隨千官朝九天眼見萬騎無控弦四海復似昭陵年雪中睡起書北窗二首斷雲疏雨暗樓臺春在寒空不肯回梅亦羞人花未笑柳知何事眼慵開久拚雙髸緣詩老忍放癡愁入酒來猶有暮年文字業睡餘重秩亂書堆窗下梅花凍玉壺夢回閒聽雪跳珠樽中酒盡何由得枕上詩成可自娛身世固應渾是夢功名知巳不成盧明朝醉倒春風路試問黃公覔舊壚次韻元素自東皋寄新詩賊退猶未久北風代馬自長鳴月到南枝鳥共驚留我小溪回短棹看渠紅斾作長城人思龎老皆知隱賊說康成亦畏名亂後欲從君一笑滿林荆棘未堪行先生老去以詩鳴亂定詩來眼倍驚但把明珠照兼乘未須白璧換連城人言陶令嘗耽酒我識𤣥真不釣名晚日追隨嘆才盡始知天馬足能行奉聖山中邂逅欣師相與話十年舊事為之惘然二十一日同遊陳侍講附子園偶作此篇不見跳珠巳十年舊遊重說固依然此生如我豈非夢到處逢師真是緣倦客來看栽藥圃先生昔侍講經筵人間作計無多子也合歸耕種穀田過石壁兩峯夾天髙一水繞山麓鳥道盤山腰下臨千仭谷仰視寸草青千章羅巨木轉峽㵼哀湍驚雷裂坤軸日月所隱庇光景不到目道險當捨車重趼摩兩足不知誰鑿空穿穴入山腹平生蜀道難耳目聞見熟兹山亦尤物初未掛史牘了知天宇間萬險自重復窮人重錙銖凌冒取危辱嵗晏霜雪多歸途戒當速出石壁倚空山嶄巖平地石齟齬修途繞危磴千里無寸土山髙不見日霧重自成雨入壁天始明出壁日過午青蒼斷崖谷開豁見天宇稻田碁局方梯山種禾黍道傍兩三家稍稍聞笑語始知在人寰邂逅得徒旅倦㒒飢欲啼遊子歡自許攜孥老一㕓白髮無處所何當把春犁望月耕隴畝閉門了殘年危磴不復取徽州道中觀山老去心安一味閒江南江北飽看山不知今日徽州路始落千岩萬壑間暖日岩花上翠藤半岩松桂聳亭亭南來到處無山似喚作東川小錦屏上饒道中望月岩瘦馬度莽蒼悠悠忽長年群山不知數衮衮來眼前忽逢天上月下掛蒼崖巔炯如碧玉玦中空竇雲天岩柯亦薄相為作蟾桂圓陰晴無顯晦千古長嬋娟坐令馬上夢憶我江南川江空月自吐萬頃含風烟靜聞欵乃聲入我獨宿船誤從塵網中見似喜欲顛何當追昔遊擺脫區中緣買地結茅屋攀雲躡飛仙朝吸白露光暮飲山根泉清歡倘可結浩歌與周旋於潛道中戲作徐娘雖老風流在學得啼眉時世粧只有於潛舊家女但攜篷沓嫁新郎收伯尹三衢書近有南州使雙持赤鯉魚花時孤客淚亂後故人書一别真如許三年少定居時危消息好老去莫情疏正月十日雪維時孟春月嵗事司勾芒微陽力猶弱未足扶百昌風伯偶偃斾電師亦潛光堅氷頓欲解蟄户不肯藏群陰勢未屈寒飈忽飛翔積陰既得泄雪意亦異常癡雲迷澒洞烟水俱蒼茫行人有墮指裹足畏前岡疏梅強解事一笑矜芳香誰憐百草死萬木寒仍僵東君始用事抗此凛冽剛那知假微暾乃復為此祥幽人解春衣酒券僅可償倚此數日暖蒼黃索衣裳萬事多反覆天心難重量賴我有殘榼聊足資清狂此意誰復論醉眼空望羊銅爵研藳街夜腹空燃脂可憐漢祚終陵夷老瞞自在作家主欺它寡婦并孤兒洛陽宫殿皆頺圯更作髙臺半天起臺上吹香十里聞臺下洗粧漳水渾當時歌管一消歇回望西陵空斷魂百年嵗月空中鳥花不長妍人易老臺傾人去不復存碧瓦澄泥為誰好那知流落向寒窗乞與詩人賦花草次韻伯尹見寄二首種種星星苦見侵已無心作四愁吟三秋令我頻成夢一月勞君幾嗣音臭味每嗟無草木因緣已定只山林此心耿耿從誰語遺恨依然淚滿襟從古何人解識真夜光欲到了無因只今懷璧還歸趙它日揮毫有過秦餘子不應霑厚祿此郎寧合坐長貧白衣蒼狗俱成夢富貴功名不在人次韻常元明寄侯元進道常字元明宣之詩僧丞哉風味似崔矦松下行吟萬事休亂後只應堪一笑官閒如此復何求看花欲下春衫淚射月先憂塞草秋賴有道人三昧句為君一洗向來愁太倉稊米集卷十一
