body:
  text: 太倉稊米集卷二十一宋周紫芝撰詩六十二首酌六一泉頗懷昔遊孤山屹中流長隄轉湖尾泯然懷昔遊踴躍尚壯齒道人引清甘一掬託分似重來固依然嵗月今有幾華堂失雄觀缺甃久未理誰令走蛙黽投筆便如鬼龍宫空一炬狗盜忽四起佳處不負人環山自湖水並遊適相契况我二三子少留當何之再來吾老矣黃文若攜秦别駕侍兒像見過戲題二絶能事空傳王右丞句如徐庾轉難名明眸正似溪光樣自古無人畫得成謝家林下小梅花不著紅藍染綘紗莫笑畫師無國手玉肌元不受鉛華秦别駕名亘羅叔共五色線中得𤣥真子漁父詞擬其體僕亦擬作六首叔共名竦好箇神仙張志和平生只是一漁蓑和月醉棹船歌樂在江湖可奈何禁中圖畫訪𤣥真晚得歌詞獻紫宸天一笑物皆春依舊扁舟釣白蘋解印歸來暫結廬有時同釣水西魚閒著屐醉騎驢分明人在輞川圖趁梅尋得水邊枝獨棹漁舟却過溪人似玉醉如泥閒歌五色線中詩人間何物是窮通終向烟波作釣翁江不動月橫空漫郎船過小回中花姑溪上鷺鷀灘辜負漁竿二十年無可載不拋官攜取全家去不難次韻黃文若春日山行過秦德久六首百金聊作杖頭沽旋剪春苗薦野蔬便可且傾陶令酒未須真憶季鷹魚眼前風物一畨新江上桃花惱殺人可笑草𤣥窗下客滿庭吹絮不知春階前春草喚愁生屋上鳴鳩報晚晴忽有好詩來照眼似逃空谷聽人聲不作林間曳履行老來春日總無情還驚柳上風催燕又見花邊雨弄晴櫻桃花下小窗扉聞說嬋娟是栁枝茗碗已煩羅袖捧篆香仍借好風吹鳥啼花發未春闌日飲無何意自閒更喚小蠻娛醉客主人風味似香山追和向蘇州罷吳門作幕北傳烽飛夕埃廟堂今日要真才肯將身向急流退要問客從何處來寶墨光翻銀漢落畫船恩重錦帆開胸中邱壑公元有便恐鴟夷挽不回追和向蘇州頃在吳門嘗用韋應物作凝香閣舊有白公檜今不復存為補植之韋白兩公名欲埃薌林一出未難才樹從居士池邊種香入蘇州句裏來陶令北窗應好在何郎東閣為誰開二疏歸後今重見遙想都門張飲回追和向蘇州舟次京口聞召諸公簡朝中知舊聖主思清戰騎埃盡將尺一起群才胸奴莫向雲中入尚父今從海上來繡祫不當氊毳用玉關寧為犬羊開公冠已掛知何事猶有忠腸日九回古風二首别李守若虛東南富佳郡此地復名城拜䇿奉溫詔謁帝辭明庭悠悠出金闕斾斾搖熊旌蘭風藹微和玉露湑以零征鼙肅郊壘嘯詠閒齊鈴微生等薜蘿託根符餘榮誤遭一笑盼永懷千古情千古不足多喜遇罕所并白璧勿漫豫按劍徒取憎逸足思長途徑翮慕逺漢壯志忽蹉跎功名失華旦孤芳不自惜靡靡同草蔓飢寒日劬勞霜雪念衰晏眇焉尚遐征遄車指芳甸故國念離憂髙軒增老戀㑹當酬知心努力加餐飯微勇或可賈未和南山粲叔共出近詩百餘篇攜歸燈下讀竟題小詩其後三首避地兩家三五口只今那忍記當時誰知臨老相逢日猶得重看亂後詩翠鬟當户山如染匹練繞簷江自寒縱有鵝溪誰寫得要從無色畫中看東平不復歎塗窮有姪賢如阮仲容淨觀菴中詩作社水西山下酒分鍾讀巴東集二首熟睡能令敵退師髙談聊決廟堂疑風塵洗盡渾無事却卷波瀾入小詩談笑成盧事亦難一言能借百年安群姦未死公休恨但遣枯枝作嵗寒次韻韓伯嘉擬陸龜䝉坐眠行倚食學書吟八題口角瀾翻二十年書多却厭腹便便年來拗折枯藤杖參得跏趺面壁禪黑甜有味要須嘗一枕誰同夜雨床世路風波難著腳老來當以夢為鄉以下原闕昭陵一杯酒蚤嵗功名塞天破九廟邱墟只回首狐埋未幾狐掘之天上浮雲倐蒼狗更憑頑石作靈祠頗似當年栁州栁不如梁公摩虎鬚為言百嵗不祔姑提師十萬復誰可興邦一言還要渠人間萬事本難料老將未須輕腐儒河橋晚思三首出門猶未夕陽低倚杖還驚露濕衣等得樹頭鴉定後㑹邀林外月同歸雨後津橋飲斷虹暮林重噪一蟬風月來烟隴掛玉玦雲向碧天成峭峰秋水平堤帶雨渾小橋分港到籬根晚來幽事亦可喜忽有漁舟時傍門次韻德莊送别千里辭家復卧疴賴君一笑肯相過夢看赤鯉春騰浪歸見牽牛秋渡河空裏懶能書怪事酒中自可作無何一竿忍負平生意重釣花姑溪上波烏帽前頭沒馬塵箇中元自不無人風流公是習主簿文字我慙陰子春此日定交真有意一生弔影復誰親相從又失秋來約已結茅椽著病身題黃縣丞墨牛一牛飽卧春草緑一牛下坡引黃犢長安可笑人海中眼前見此三觳􅑌詩翁老去飢滿腹歸把春犁豈非欲人生所願能幾何百畝良田一牛足鹿苑假寐掛席月未落輟棹日將午亟尋墟里烟盡閲菱芡浦烈日方在舟騰雲未成雨瀕河得風岩佛飯過齊鼓龕燈明廣殿妙炷繞殘縷窈窕幾僧窗欵缺無一語我來兀晝夢得句瘖不吐欹巾倒烏紗墮扇橫白羽凉襟亦已披歸杖當復拄為君趣扁舟夜雨軋鳴櫓次韻崔都巡馬上望天目山雨後青雲萬里開翠螺新染玉縈回將軍馬健隨風去天目山髙入眼來稚子能文非好武君王賦韻不為才且將橫槊新傳句獨對西風侑酒杯苕霅舟中戲題時赴官行在官舍在西湖上永日扁舟破浪遲青蘋不動栁埀埀滿川安得飛來雨看濕紅裙雪藕絲再賦二首故國辭家逺苕溪轉柂深交游千里隔嵗月二毛侵滿意悲煙樹移時看水禽唯應陸魯望相見可知心雲暗千家雨寒生兩岸秋水翻波入户人靚玉明樓山色遮愁眼荷香滿客舟水晶宫裏夢還作此生游船曉瞑鳥驚飛急孤舟犯曉行柂牙侵月白帆腹受風輕雲破千峰出秋隨一雨生倚檣誰共語蓬首看參橫舟中晚色二絶望處天仍濶雲邊雨未成秋風莫吹散留作打篷聲二風急雨初過天髙日未曛翠鬟堆晚岫水墨畫秋雲臨安道中晚晴書所見客路鄊關逺雲山暮色添秋髙尚寒薄雨過却風恬附隴田成陛傾崖水作簾此行殊不惡未愧賈胡淹二何日王摩詰瀟湘畫短屏扁舟橫逺壑晚翼在青冥木杪收殘照雲間得數星吳姫不驚客拜月下中庭西湖寒食落花殘絮憶西園寒食歸心似紙鳶無復御廊分冷食又看茅屋禁清烟十日不至湖上我始跨匹馬蹭蹬來東吳東吳亦何有政復為西湖西湖如靜女婉然真彼姝湘娥結烟鬟水鏡涵空虛晴光固不惡雨態亦自殊窈窕一僧窗煙雲媚朝晡上下數白鳥飛翻與人娛只今雨鳴葉便作破跳珠寒窗掛薜蘿身疑在菰蒲咫尺不得往况乃千里餘始來梅欲花旋復春去徂幸茲得少留駐我西征車尚可具小舟紅粧醉芙蕖蘇公隄翰林一去幾經秋猶有平隄繞碧流誰向西州還度曲此翁零落已山邱次韻關子東笻杖關柱字子東關演之兄杭人有詩文行於世林下相從政要君春來花草各欣欣須煩無語木上座時伴能言鄭廣文徒步飽看山入眼醉歸應有句凌雲誰知九節仙人杖解與先生立茂勳悶題壬戌嵗始得官時年六十一命薄官如虱年多鬢似銀酒醺雖有聖錢少本無神含笑花欺老妨眠鳥閙人青山渾可戀白眼莫相嗔湖隄步游客言此蘇小墓也野水橫分青草陂誰埋玉樹與瓊枝湖邊山自向人緑門外栁今何處埀行雨行雲鈞是夢施朱施粉未相宜一從蕙死蘭枯後剛道桃花好面皮題淨空泉二首泉在北山靈峯寺誰穿巨石貯清泉不見超公舊講筵龍伴白雲歸寶藏魚隨流水下春田欲尋遺事苦無碑老宿猶傳古律師尚恐蜿蜒在空谷水清不敢唾方池送别扁舟憶東來梅冷殊未芳故人念客寒滿意傾酒漿坐中東床君笑語芝蘭香相從忽三月共飲湖水光花事乃如此碧草日夜長子歸我當留語離意難忘似聞小山居一葦僅可航㑹尋霅川盟著屐登上方晚雨薄寒枕上作睡過花時常掩關老人歡意自應闌愁邊可奈雨如許客裏不禁天尚寒數月鄉音無鴈到一年春事巳梅酸夢餘猶憶江頭路擬喚歸舟下急湍奉酬德莊見和一首老於春事豈相關只有翻書意未闌白眼何由常玩世黑裘元自不遮寒飽聽風雨眠方熟細說窮愁語更酸日誦離騷三百字便知新句有驚湍太倉稊米集卷二十一
