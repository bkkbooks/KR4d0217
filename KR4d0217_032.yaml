body:
  text: 太倉稊米集卷三十二宋周紫芝撰詩三十七首郊祀紀事十首并引歲巳巳之中冬十有四日日南至天子親祀於南郊禖以執事宰屬被㫖為外符寶奉璽玉以先駕十有一日皇帝命出寶函於御府乃拜受於殿門之外十有二日晨饗原廟夜祠太室悉奉玉以從十有三日駕幸青城幔寶幄於端成殿之西廡而宿焉明日乃􅟹事於圓丘是夕命朝欲雨而止夜月如晝微風不搖事皆可書退而紀次得十詩云內門朝日上金鋪寶玉龍函出殿餘紅燭兩行分御道輦官三百奉腰輿奉寶用輦官三百餘人謂之腰輿皆龍燭爇香而前盡故事也二內郎進表未平明八玉排行御路平今夜皇輿宿齊殿九重和氣滿宫城內侍二人號曰符寶郎是日進表得㫖乃奉寶以出三曉趨宗廟拜衣冠雲葉低垂護翠鑾日采回光天意好龍顔生喜近臣歡駕次太廟天意欲雨倐復開霽上大悅四班聲催急盡冠裳尚聽嚴更轉警場何事君王虛小次佩環垂玉立寒霜上酌獻既降當入小次而不入露立甚久羣臣駭異五日照青城瑞色新風微金殿自無塵麝煤光照烏絲軸親寫宸章賜大臣上以原廟之明日作喜晴詩賜師臣稱襄贊弼亮之功六水晶簾透月翻光宫漏頻傳夜未央帟幄微臣亦何幸侍祠來宿殿西廊七紫壇煙暖不飛霜壇下千官列雁行雪色珠冠光射月侍祠臣裏識君王八清蹕聲中下輦來景鐘初動八音諧登歌巳奏迎神曲天步雍容上午階九龍麝香從十里傳繞墻紅燭自生烟纎雲不度人聲寂風馬雲車下九天十樓上紅鸞扇影寒樓前宣赦萬人看清臺奏瑞初呈了五色祥雲簇彩竿恭和御製郊祀喜晴詩聖學淵源貫九邱雍容元祀得遲留明庭未欵宸心肅雲馭先回曉月浮三禮秩宗歸大聖一言悟主付千秋巳通爟火親祠事更有何人敢告猷恭進郊祀慶成詩五首嶰竹初回律圓丘始告䖍禮應先吉土誠巳格髙天上聖鏘環珮羣公執豆籩誰為郊祀曲傳寫入朱弦二黃屋登原廟青圭祀泰壇盡循周制度還列漢衣冠扇影金根靜旗翻豹尾寒近瞻天有喜宗社慶重安三百執稱元祀君王服大裘祥光將盛布雨意倏前收月白明雕俎霜寒肅綴旒欲知天意格肸蠁荷神休四聖主翔龍日重熙饗帝時笙鏞陳備樂繭栗薦純犧奠徹初燔燎神歸欲受釐禮成人共慶廊廟有宗師五聖夀三千歲精禋二祀餘天心親道德四海混車書奎畫宸章麗台躔上宰居小臣長拜舞猶得奉皇輿臘月尾雪意甚濃欻復開霽曉來豐隆車屢却羲和轍雪意滿江天雲山繞宫闕氷花剪欲墜亂絮飛復歇娉娉臘前梅天寒亦髙潔羞隨小桃枝獻歲取俗悅應留玉樹姿相伴寒江雪含情若有待此意何由說安得孤山圗畫此兩竒絶後數日始得薄雪殘臘不附火冬溫渠堪說身疑在炎方隆冬有餘熱天公費許力醖此一薄雪草青先得春麥短未濡蘖因風始空濛著地忽滴歇人生亦復爾過眼倏變滅誰能將空花認有作嗔悅急須營一杯爛醉梅上月次韻季共大雪早遊竹閣書所見憶昔司酒毋瀕湖賦官屋頗如賀知章上疏得湖曲詩雖竟坐窮天亦稍從欲三年看飛雪萬嶺琢寒玉有時橫輕舠不敢唾净緑但當忍涕洟豈不念安燠是時走緋衣荷擔晚相逐堅冰鑿涸隂推日在北陸收藏備賜頒功用等神速歸來閲空庭玉立僵凍木青燈照詩肩屢作龜頸縮髙軒客誰過寒瓮酒空熟只今古城隅回望蒼山麓﨑嶇失巖岫紅腐困饘粥王郎飛曉驂此意知有屬文懷斷弦悲當倩鸞膠續話客想回舟敲門亦看竹恨無摩詰手風姿寫幽獨憶君腸九回得意日三復平日交遊盡如子一夔足他時追汗漫便可擺拘束人生何自苦成敗碁一局次韻季共再賦寒深方閉門雪重忽滿屋誰能起僵卧賴此陽春曲曲髙雖和寡喜甚得所欲心知夜光珠大勝暖花玉歌君窈窕詞侑我荔枝緑頗疑蝸牛廬忽作駝裘燠窮兒偶作富貧固不待逐我老况才盡文字羞二陸上水船苦遲脫手彈驚速寒如蝟張毛癡類烏棲木兒時弄筆手老欲袖間縮打忩聽悉窣坐睡便清熟瞑想西湖雪巳沒孤山麓那知公是時洗鉢飯僧粥灞橋風雪驢並酌不相屬政如冠上貂難使狗尾續病骨尚畏寒少待吹嶰竹春山走倭遲呼客慰窮獨新游亦不惡舊觀疑可復歡知當有餘飲豈歎不足述作付陶謝囊囊歸自束相從笑癡兒日暮方生局次韻季共再賦住作山中居懶甚不出屋誰知五斗腰須用作鈎曲索米無如何問舍豈不欲空懷西溪魚紅鱗膾寒玉不知坐中山修眉為誰緑敝裘裹粗繒隨分了寒燠儻忍作海夫雖臭亦可逐如其不能然未可歎沉陸此事誰當論唾面恐自速如君秀芝蘭非世閒草木交蓋久巳傾談舌未易縮不知人謂何此念吾巳熟年來有新遊妙語敵嶽麓縣知南屏謙頗為調茗粥何人餘羊羔金帳意有屬淺斟醉糢糊低唱聲斷續誰同白傅春樓下雪中竹更題竹上詩傷神想幽獨但恐世間求此樂未容復况乃籋雲姿自是千里足行看鏘八鸞何止芻一束應憐老病翁短髮悲曲局雪中歸坡二絶天寒歸路雪霏初家近錢塘十里湖烏帽舉鞭誰畫我固應全似灞橋驢小忩梅冷一花明卧榻塵空六尺橫多謝去年湖上雪隨風時到竹坡鳴時宰生日詩六首并序太師益國公之夀日天子出御府之珍燕於其家伐鳴鼉之鼓調雲門之瑟飲以玉醴薦於天庖以錫公無窮之夀蓋有年於兹凡百執事之在位者與夫州牧侯伯之在逺方者內自中朝南連閩粵西扺巴蜀莫不長言永歌願祈公夀以相聖天子之祝皆覃精研思以吐為霧縠鞶繡之詞固亦麗矣彼不能者將何以復容其喙乎嘗試以天人相與之意而言之則是若有得於心而應於言者焉往者上詔將作以建公第㕔閣層檐上摩丹霄宸奎妙畫爛如雲漢乃取商伊之一德揭精善之美名聖意所在誰不曉然而求天心之所以克享於公者猶未易名也歲在丙寅天子親祠於南郊前事之夕天且大雪翼日豐隆回馭雪止月出星宿清潤天色晏溫人皆異之上心大悅今歲在已巳天子復祀於南郊陳五輅建龍旗司服獻大裘典瑞秉蒼玉𤣥酒在樽大羮實鼎將􅟹事於圓丘十有二日庚寅朝原廟天且欲雨隂雲四垂曾不旋踵倏大開霽十有三日辛卯上次青城日出扶桑麗於玉闕有司夜舉祠事天髙月白纎翳不陳爟火既通微風不動明日肆大霈於端門天顔悅豫太史奏瑞黃雲繞日都城稱頌歡喜一辭咸曰猗歟休哉此吾君相所以昭格於上穹之效也夫以丙寅之祥固甚顯異庸庸蚩尤容或未曉後三歲而天顯其靈尤甚昭著應如影響事若符契天雖不言若與之端拜而議矣此豈人力之所能為哉然則向者吾皇之比德於商臣有若蓍龜之前知百辟羣工目擊意喻萬邦黎庶罔不是孚則公之信於君可謂深矣抑公之格於天可謂至矣於是摹寫德容形之縑素歌詠大美刻之金石而天語粹溫宸翰赫奕海宇流傳一日萬口皆書契以來所未前聞也追惟前日扶携老稚流離山谷心口相語初不自意得見太平之日今乃身遊廟堂和氣之中日覩禮樂文明之治怡然相與周旋揖遜於俎豆笙鏞之間亦巳幸矣則其伏拜於公堂之下以獻區區之祝為不可後也擬古風六首質而不華俚而不經前不足以攀古人之轍後不足以躡疇人之蹤固不敢吟踔而前至於述聖意之所歸明天心之是格其事迹昭著若諄諄然有言以命之則敢謂庶幾焉謹序后皇開玉堂仙官儼成列奕奕峨長纓珊珊鳴珮玦中有一真仙容華燦氷雪維時值中原格鬬彌歲月帝命下撫摩聊用究施設王綱墜莫舉獨以一手挈至言等藥石黔黎盡生活帝曰伊誰能何以報殊烈爵之白玉漿奏以雲門闋徘徊上璇穹千秋拱雲闕二軒皇出御世垂拱坐法宫時聞康衢間處處歌兒童霓旌旋羽蓋問道來崆峒天師廣成子道實與帝同一言忽相契四海俱同風天師初何言涿鹿未為功蓋以清淨福下浹寰區中君臣俱好生自然格蒼穹天道本好還報以歸其躬一千二百歲此夀何由窮三南山一何髙山髙亦何有上有摩霄松蒼虬立盤糾下有千歲芝食之令人夀挽之為天樞循環轉維斗紫宸傍七星坐閲幾晚晝帝以殿厥居山龍埀衮繡后皇植巨木載物見坤厚用以摶洪鈞功乃周宇宙才大用固難德盛功亦懋社櫟其何顔繁柯日滋茂四鳯管吹新陽夙駕欵寒谷鑾車次原廟隂雲立紛覆皇天倏開霽羲馭亦返軸明庭朝百靈雲韶奏新曲天神下璇穹精意儼森肅霜華潔雕俎夜寂響鳴玉燎烟升紫壇龍旗護黃屋齊明坐宣室肸蠁來萬福大沛均四方穆穆熙庶俗熟知廊廟功一德天所燭五晏嬰昔事齊頗作君臣樂魏絳欲安晉賜樂乃備作區區二小國功利亦云薄舜德本好生臯夔坐酬酢朱干舞堂陛綵鳳翔寥廓大哉廊廟功禮文燦交錯登歌奏郊社率土被和樂仁聲淪肌膚有識自欣躍四海悉歸仁大信初不約不拍洪崕肩夀亦等山嶽六太極肇兩儀君臣亦爰分風后力牧來於今幾何人中古稱伊周當代知無倫公功出其上未易今昔論功固未易論報亦難具陳傑閣標盛德備燕昭庸勳丹青繪縑素奎畫形絲綸凌烟古亦有兹實所未聞何勞不羅拜金猊祝爐芬永相天自許耆夀尊師臣次韻子紹臘雪書事君莫愛廣寒殿冷月姊歸夜乘白鳯空中飛何如長安城中千門萬户雪玉皇后闕人間稀明年王春月書正瑞麥埀黃臘前闕衮衣丞相穆天縡白髮野人歌聖政吾生老矣直宜休此心欲話誰當酬短犂青帽耕雪壟破曉何時歸飯牛誦君新詩如七發酒酣起舞耳亦熱滿夜方伴月嬋娟開户不知風凛冽元日三首八風占歲暖先催喜色還從太簇回庭下衣冠天咫尺雪中宫殿玉崔嵬去年殘雪在樓臺日上黃簾禁殿開白髮小臣揩病眼誤隨雲氣到蓬萊三尺金猊暖御爐黃麾枝下奏番書喜看萬里朝元使又上今年第一魚春意二首客思知多少衰年倍感傷寒猶噤鳥語雨不聽花香去路如天逺春愁著斗量擬拋彭澤印掛席上歸航二雨細無多子雲間又夕陽鳥呼髙枕夢花醉老人腸倩酒推愁去憑詩伴日長王孫歸未得草色自東墻寒食病起二絶桃花落後燕雙飛三度清明換客衣猶有江南故鄉夢起尋楊栁插朱扉異鄉多病復誰憐怕見清明二月天雪白吳兒解歌舞羡他携手上湖船太倉稊米集卷三十二
