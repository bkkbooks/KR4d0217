body:
  text: 太倉稊米集卷十八宋周紫芝撰詩四十八首憫紅椒樹子作東籬委榛菅狼藉紛瑣碎披藂得紅椒磊落本誰藝蓬窠頗自矜枝葉相掩翳日月空復明雨露不霑施結根一失所埋沒苦憔悴移栽俯西軒吾乃借一臂要令逺條且密葉敷晚翠秋霜染丹砂紅實相點綴馨香發潛德錯節振淹滯人生良可惜會遇亦難值生理倘復存餘恨當棄置憫白菊兩枝作鮮鮮凌霜菊艷艷粲雲綺團欒雙毬枝婆娑照窗几頗訝銀臺俗深憎澤蘭紫瑣碎懸萬鈴金錢坐堪擬彼美誰家姝軒然兩仙子一登君子堂衙官列桃李殷勤極調護出斛埋地底結草障飛霜分渠泄流水那知病根株咬齧遭蠧蟻人生意外憂多智亦謾爾朝來踏雪泥呼奴亟移徙東株真已萎西株有生理萎者不自持生者能有幾君看金谷園花木亘百里忽然竒禍作過眼盡荆杞悠悠可奈何歸步一笑喜山居聞蛙憶昔東南居結屋古城背野色帶危墻花陰弄寒砌月彩淡微雲春風入衣袂萬籟悄無聲獨立與誰對殷勤古壕蛙為我作鼓吹號昏初兩三閙雨忽鼎沸懸知世俗憎自可幽人意兵興如電速十年滿天地弊廬飛劫灰生涯轉零替爾來三間茅風雨僅可蔽青春不改色人事有興廢一聞羣蛙鳴懷舊如夢寐撫事為嘆嗟傷心極流涕二月四日大火吾廬獨免顛風盡日惡頑雲吹不開行人對面不相識千嶺萬嶺沉風霾不知誰縱一炬火坐遣萬屋成飛灰我聞人火曰火天火曰災茫然不復知從來但見通衢半瓦礫男呻女泣聲酸哀避兵十年常作客幾見連甍變荆棘此生憂火復憂兵一事不成頭雪白學禪靈運本忘家好賦子雲終有宅向來窮巷冷如氷今作權門手堪炙驚魂可招煙欲消茅茨猶在書脫厄心知造物可憐生留與雲窗看山色二月五日再火吾廬復免昨日北風如箭疾城南一燎三百室城西片瓦不復存今日風髙火仍急池魚已作沸鼎焦稿木那容飛鳥集糗糧不峙恐民流樓櫓俱空憂盜入傳聞此火頗異常宋衛陳鄭實同日城中有屋無二三道路橫尸十六七三州飛報急上聞詔書亟下隆寬恩既令折劵已逋責復振倉廩蘇窮民東南無事官失職火政不修户無藉坐令惡少恣焚燒更以深憂貽玉食小人何幸獨晏然飽食懷慙面仍赤羣不逞乘時縱火以病良民有捕於官者輒送遣之或厚與之金使之出境二月二十八日敝廬為惡少見焚雖復僅免而官不為直不能言安三月六日徙居寓舍平生有窟如屋鼠亂後飄零無定所身隨海燕作去來心似賔鴻識寒暑異時無地著妻孥晚得三間蔽風雨邇來憂賊夜不眠惡少屢來窺屋山不知今夕定何夕忽置束緼茅茨間念非曲突可得免何由外户常不關公庭得賊盡縱遣上訴官曹多怒顔青山元與我有約俗駕苦遭神勒還山光無情鳥不語主人當去心依然人生泛泛水中鳬身如逆旅家蘧廬東西南北皆可爾夢幻泡影真須臾只今兵猶滿天地黔黎誰復能安居鳴泉繞屋花滿眼有窗况足翻吾書暮年卜築倘未可且借一椽聊自娛酴醿盛開伯潁許攜酒洗雨梳風玉作肌溫泉初試太真妃莫驚霧帳人方睡怕作風軒雪又飛未有酒樽酬玉艷枉教春色到柴扉詩成不為花遊説要看山翁倒載歸上已日雨中小集老去傷春頭緒多花前不醉奈渠何重來倦客還修禊已去蕃兵却渡河薄酒為人澆磈礧惡風將雨作么魔世間何事非陳迹莫謾相逢説永和書淳師房六言三絶茗碗要看三昧齋盂來飯伊蒲坐對禪房花木夢成午枕江湖長卿自是倦客支郎殊復可人懶識間中味好老於方外情親罌粟湯翻白雪梅花句嚼春氷助我看山老眼借君倚壁枯藤次韻任道卿見寄連璧終慙玉一雙何曾有句似澄江九霄鴻鵠終掀舉三峽波濤看擊撞長袖婆娑終解舞短歌哀怨不成腔詩壇老將元無敵合為奔軍作受降次韻道卿登樓有作謝眺樓頭煙樹低雨餘簾幕捲雌霓山從雲外分千疊水自天來落兩溪南圃飛紅香滿砌畫橋春漲緑平隄登臨日日傷愁眼欄下夕陽還復西次韻魯菴道人一事無成雪滿顛漫憑老眼寄韋編誰將愛酒周光祿錯比能詩孟浩然心與功名無宿約天分泉石了殘年相過更待秋風老來釣琴公斫鱠鯿夜雨達旦枕上作夜雨不復止寒聲曉仍酣懸知變平陸天水相溶涵今年春雨多既失麥與蠶五種殊未入此雨寧可堪日者諸大將幕府開潭潭連營跨淮楚仰食江以南郡縣脫兵火百城無二三何以供厞屨坐貽有司慙是事姑且置我窮誰共談有茅兩三椽往往如漏籃中夜屢起臥吾寢安得甘晝止方稍稍暮作還毿毿了無山鞠窮何由禦煙嵐有躬不暇閲憂心顧如惔何當煩雨師驅車反龍驂一飽庶可期寒餓少已諳小人無逺慮口腹空饞貪重午日晚眺野艾傷心碧藂流滿意紅兵戈人事别風物嵗時同山倚斜陽外江橫醉眼中楚寃終未洗誰為餉絲筒六月八日始開北窗得數峯于林樾間命力斬惡木而山態始盡出老去捨輕舠小室坐懸磬六月不出門端居閲晨暝安知咫尺中有此大殊勝今晨穿北垣萬象忽輝映太虛本無窮眼力恐自竟遙岑蔽清樾了不赴將迎翠幕空繁柯煙鬟入幽憑雙峯始幡然起應髙士聘長瘦有餘光名與天地亘馬鬛亦已頺蓬顆沒微徑茲山與周旋安得往修敬斗酒時自澆先生醉初醒落月挂長松悲風繞危磴裴回想音容倣佛聽嘲咏七月十六日晚雨已而月出將雨日已晏既晴天亦曛風從莽蒼來雲向西南奔忽于蒼玉玦擁此黃金盆我居在山頂升沉閲氷輪三年東岡頭入我圭竇門平生金蘭友老去無一存願言結神交相與論素心素心不可説月亦終無言暑夕卷箔日巳落移床月未來蛙號還作吹蚊聚竟成雷我自羲皇臥誰分河朔杯更憑風露夕小為洗塵埃夜枕夜枕欹殘夢寒燈照白頭樓空千嶂曉簟冷一窗秋時事兵方急天星火已流欲尋三徑老何日兩京收中秋月下懷西山亭示周都曹頑雲撥盡玉團欒飛出青天白玉盤月似不關常夜白風應先作九秋寒興來有意攜雙屐夢去還思把釣竿遙想風流三語掾不知誰共倚欄干次韻道卿咏雪約遵歐陽文忠公令不得用鶴玉潔白等字魯史書平尺王春喜可占弄寒初照砌逐吹旋縈簾水逺還迷望山髙遂失尖欺梅時滿樹妬舞或陵襜鵲凍癡如夢兒嬌喜欲拈人應橫短棹誰且臥窮閻壯士知何畏衰翁亦懶覘打窗時蔌蔌拂帽更纖纖獸炭寒仍在駝裘晚自添鷓鴣茶碗釅鸚鵡酒杯甜嵗事新愁破詩章舊令嚴遙思庾樓夜萬里一寒蟾用晦訪别為作長句東風吹雪滿征鞍奪我瀕湖一笑歡老病不堪頻送客亂離容易莫求官故人知有山公在遊子應憐范叔寒留得餘年可相見不須回眼淚闌干十二月二十六日北墻捫虱今晨頗無事步遊古墻根眷茲萬家邑稍苦三户村于時積雪散復值朝陽溫解衣聊自得班荆與誰言欵欠良已久吾虱庶可捫平生謝澡刷懶惰從朝昏坐令邊縫間朝生暮仍孫回臭比跖香位卑道仍尊與世倘無求中有至樂存勿語兒女曹此意難具論次韻道卿觀諸葛生製筆有感而作任矦富三冬志在食五鼎平生名教地不對紛華境細書抄蠅頭何當避炎冷毛錐捐脫兔髙與堆阜等遂呼東郭㕙一一拔項領妙製窺良工危坐銷日永錙銖辨柔徑束縳較欹整那因將軍恬始拜管城頴乃知鬻伎窮不異束麻檾苞苴入朱門蠧蚛不窺省吾曹坐書癡微言姑自警他年草玄窗長物俱可屏潛夫倘或著封禪慎勿請相過有餘日會待風雲靜次韻靜翁雪晴有作曉天晴日麗朱樓殘雪晶瑩客舍幽寒柳江梅渾欲動官軍寇騎幾時休頗無佳客堪同醉當為衰翁作少留便典春衣買春酒同將一酌散千憂次韻道卿效離合體見贈穠李有佳色不如蘭芷香鳴禽矜爪觜肯入鸞鳯行若士自有偶俗子自有腸驗志貴同術異趨徒參商望羊久自歎相思不相忘偉哉德祖賢長年與徜徉逢君青雲衢弱羽難翺翔稿項與黃馘珠玉儼在旁唧唧秋蟲吟敢賡韶濩章夜光入我室什襲徒珍藏早歸野日破朝霧宿陰回暖風人家村崦外春夢竹輿中天碧鷺斜起水深桃臥紅山陰幾岩壑應接自無窮題徐伯逺渚堂徐矦當登瀛結屋在幽渚于焉窮心迹無乃異出處西風肅髙秋黃鵠時一舉自謂可過之邱壑出肺腑俗眼殊未髙此意吾竊取長卿少倦遊征衫涴塵土羞陪漉酒翁共作斜川語魚鳥雜冠巾蒲蓮暗樽俎江湖滿天地置身豈無所黃帽與青鞋造化久見許平生釣餌興臨老尚齟齬茲懷固泯默感激聊自吐安得載笭箵孤蓬聽秋雨次韻道卿嘗新梅梅梢著子葉青青紅萼猶存味已清竹外一枝和雨摘叉頭雙蒂為誰情雪霜自是元同操楟奈何由與並名商鼎欲調應有待不隨鹽䜴下蓴羮送元楷官莪橋相見還須復語離更看花雨濕征衣樂丞有酒聊自隱季子無田安得歸長釣不妨埀白雨亂帆時看落斜暉何時去作津亭客更待秋風一葉飛次韻道卿喜賊平時東南初定無人試請一長纓賢似防邊萬里城共説廟堂初奏凱似聞淮海已無兵黃頭父老農桑晚白面將軍劍佩榮息馬投戈知有日黑山青犢已先平小兒生日錦里先生聊醉飲玉川居士以詩鳴人言驥子能扶步天遣添丁欲助耕窮苦助吾緣底事飢寒憐汝若為情相看只有身長健共瀝餘樽作小頳林老借可正平詩編以詩還之蘇家人物自有種法護且放僧彌賢誰知癩可東溪句參得涪翁雙井禪落葉飛雲空自好流風回雪不成妍更須點檢新編看恐有隔林機杼篇送羅仲共罷酒官歸山中虎額一山同避賊草堂三月更通家音容久隔頭俱雪雲霧相看眼各花晚厭微官猶麯糵早知豪氣已聱牙北扉青瑣真如夢且復西溪踏釣沙次韻常元明見寄三首月明驚鵲未安巢生事如僧止一包但得有門容看竹不知何地可分茅愁來漫載盈鴟酒老去難穿中鵠髇獨有詩緣難洗盡強隨春鳥作啁嘲已分功名噲等髙平生誰問六花包千頭願種封矦橘三脊仍慙縮酒茅亂後詩囊成長物夢中驚膽落飛髇我非執戟明光客知有何人肯見嘲我如病橘綴寒梢璀璨何由入貢包交舊半應歸宿草亂離真已壓前茅毛錐早信難當敵銅弩何由學射髇願借瀾翻千偈手為余一洗向來嘲次韻道卿瑞香春意催花不自禁紫團猶復畏輕陰蘭蓀有意窺芳馥桃李含羞漫淺深鬭鴨並欄風冉冉紅油垂幕月沉沉任郎便是花東道不學香山夢後尋次韻道卿竹間桃花盛開玉立疏疏不滿欄小桃宜向竹間看看花何必三千嵗帶雨寧須十萬竿却怪靚粧情脈脈不嫌青玉瘦欒欒何郎粉面堪憐許擬學風枝耐嵗寒送徐彥思三首好事何人説醉翁賢良名在著書中只今文采猶如此當日淵源豈易窮遺恨可堪驚别雨新詩不復咏流風慙公千里相求意楓落吳江恐未工凛凛忠言公自持偽書初赦兩淮時膝當不為姦雄屈心亦唯應草木知獨任安危百年事寧辜父老一生思抗章終有論功日便到鑾坡巳恨遲枘方乖鑿固應殊草木相求世久無可怪風流如孺子不嫌人物似曹蜍兩溪風月空勞夢千里歌謡尚載塗他日鵷行一回首冷鳬乘雁只江湖二月二十六日伯逺邀遊小園明日有詩次韻園荒不見二疏歸風引長藤欲上籬燕子作巢春寂寂竹枝搖月影離離誰為五柳當年傳又誦三堂此日詩我欲一邱藏曲折此心唯有子相知二月二十八日靜寄軒作看得階前碧草濃小桃猶作亞枝紅五更夢斷雞鳴雨三月寒生燕子風歸意擬尋黃篾舫春愁最惱白頭翁鶴長鳬短知多少盡付軒渠一笑中駝山寒食二首時節近禁火東風猶小寒絮飛爭渡水鞦穩欲平竿酒忍愁前把春仍亂後看吾歸須少日花在莫吹殘過眼夕陽雨滿襟寒食風鳴禽説春事暖樹落嫣紅杯莫頻停手花令解笑儂人生不相見可忍更匆匆張元明為道卿畫竹間梅我作東窗竹外開斷魂香自雪邊來細尋水墨圖中意似對檀欒塢裏梅筆下懸知有氷玉胸中元自少風埃可憐能事王摩詰解令春從一笑回太倉稊米集卷十八
