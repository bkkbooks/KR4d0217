body:
  text: 太倉稊米集卷六十九宋周紫芝撰祭文十首為魏侍郎祭聞人奉議慨生之涉世兮如白駒之過隙繄仁者之必壽兮謂天道之不易悼夫君之不遭兮又嵗月之飄忽挺大木之百圍兮孰為君之匠石屈橫海之巨鱣兮因蹄涔之易溢抱百藝而不一試兮憫羣情之伊鬱方峩冠以結綬兮上諫坡而嶪岌望雲霄而遂返兮叩天閽而不入肆鳴梟之不祥兮墜鳯鸞之雙翼儼佳城之同即兮哀稚子之滿室初君疾之既康兮杖枯藤而骨立俄回祿之綿延兮闕為人祭王參議維君學古以博操潔以方直亮端慤肅如秋霜知公者薦辭溢於章忌公者詆惡其欲亡雖以是名亦以是傷頃在宣和稍復進用屹然郎曹聲聞洶湧謂當越遷日踐華寵旋丐外除持節關隴繡衣櫑具草木震恐潭潭大府婉畫是資虎帳夜談奮髯吐詞持滿在前執戈在墀公語益抗了不自疑彼意不滿我遄其歸羇孤萬里竟坐顛躋召公復還冀有譽處卒佩左魚俾守婺女吳儂聞風載笑載語千里之澤閟弗克豫朅來是邦屢閲寒暑間關百為臲卼齟齬公藴良富罔究厥施平居笑言中甚坦夷我官於兹葭莩是依奉公周旋龎然雪眉目未及瞬而公我遺寒風朔雪旅櫬繐帷㪺酒在爵雪涕在衣我歌載謠以寫其悲嗚呼公乎其或聞之尚享祭詹伯尹維紹興三年嵗次癸丑八月癸酉朔越五日丁亥汝郡周某謹以時果清醑之奠遙酌於亡友詹侯伯尹之靈嗚呼人之有生伊誰不死我友云亡使我澘焉出涕以悲君之不幸者蓋有四也公之種學孰知其紀發為詞章溫麗粹美謂當雄飛一息萬里而乃顛頓困躓蹭蹬中年數舉於禮部不第此其可悲者一也見知當路謂可器使薦名於朝以有祿仕晚官三衢甘心委吏釀瓮糟邱酒漿薰漬計較羡餘爭能駔儈而道家蓬山北扉青瑣有足可至嗚呼天乎忍使巧匠旁觀縮手䀝睨而不得其志此可悲者二也君之器能雄健俊偉身紆綟綬而勇吞百蠻家在草野而志存黼扆未嘗一飯而忘君是以宸廷奏書慷慨論事儻燕然之可勒顧鼎鑊其奚避庶幾乎平定中原剪攘夷裔以返河陽之狩而雪㑹稽之恥奈何盜起鄰壤奮髯自勵竒禍一作騎中流矢困於匹夫之手使子含憤就斃司勳弗賞史官弗記徒使夫勇士忠臣怒目而飲氣此其可悲者三也人之有生上壽百嵗孰謂君之享年四十有三而止耶君之云亡母老而子稚號呼咿嚶痛極骨髓行路之人有弗忍視君之平生孝友豈弟黃髮在堂㫖甘弗繼君亦豈忍棄之而逝乎此其可悲者四也嗟我與君草木臭味義重友生而情均昆季仲夏之交與君分袂月明露坐夜分不寐臨别之言相屬以義嗣音三來到官未幾長篇巨軸爛然滿紙作為歌詞清潤可喜君之在官事事云爾朝趨府公牒函亹亹青燈晶熒考訂經史鋪陳三家魯史同異疏以謂余此出余意我閲君書赧然內愧喜君之心益壯而鋭書以酬之眷言樂只子其勉旃老夫耄矣謂天相之位莫可既君乎何為而止於此聞君訃音有泪如水淮山叢叢江水瀰瀰南望悠然舉觴一酹嗚呼君乎尚能飲此酒如平生乎亦足以慰吾千里念君之情且以知君之靈其有意於吾人者益惓惓而弗替也嗚呼哀哉尚享祭野鬼我方閲書夜久人寂有笑於外其聲㗲㗲或喧以呼或悄以默或附吾窗或撼吾壁開户視之雲暗月黑有火而青倐起倐沒即而求之恍兮無物主人謂余是鬼之場鬱其滯魄憑其强陽時出而游以為祟殃曰此餒魂是謂不祥舉酒一酹告以其良嗟嗟爾曹伊誰云傷豈死於兵抑殂於商豈困於役抑逋而亡豈毒於藥抑傷斧戕豈魔於夢抑沈酒漿歸捨真宅魂羇異鄉固有不幸亦其勿臧不得其死以其强梁懷姦孕毒自有肺腸嗜利貪榮冥行倀倀爾顔亦厚爾德甚凉孰掩爾骼暴於康莊人之為善鳥可不蘉墜兹幽塗以失厥常使我攓蓬以效莊狂飫以饛簋沃以巨觴以醉以飽樂南面王毋呈爾醜以自蓋藏尚享代王無功祭杜康并敘唐王無功性嗜酒日為醉鄉之游蓋得酒中三昧者既作五斗先生傳又撰醉鄉記至於為杜康立祠嵗時祀之獨無文以告其神豈固無有耶抑亦有之而史失其傳邪乃為代作此篇以見績之有得於酒蓋如此云唐大樂丞王績謹以清酌嘉羞之奠敬祭於故杜公先生之祠皇天降命以惠斯民授以美祿俾全其真猗嗟先生維天是因實肇兹始俾飲其醇取彼秬秠雜以芳辛曽不崇朝黃流在樽貽法於前萬古是尊逸士飲流是為髙人糟邱卜築醉鄉䇿勳麯生侍坐歡伯叩閽相視而笑其樂欣欣我有嘉趣或謂彼昏尚友千載茂世伯倫皆受公賜同師共門為公作祠祀以雞豚祭以報本唯舌是聞酌言酬之侑以斯文尚饗祭盛判官嗟嗟君乎何遽罹此人之有生所不可知者數而所可知者理也至於仁者或夭不仁者或壽則數固不可知而理亦有不可推者矣嗚呼理也數乎數也理乎事有適然理有或爾均一夢於須臾何夭壽之愠喜仲春之月被檄九江君來告别我病在牀何躊蹰而不去憂暮齒之羸尫曽日月之幾何抱旅瑣之疾傷連貽我以四書告劑飲之未良辭諄諄而益勤情毣毣而不忘何華簀之遽易僅一見於闈房嗚呼壯者逝而老或留安者萎而病乃强信矣乎數之不可知而理之或不常也君有息女亦既及笄疾之既革我趣婚期壻之云良秀出等夷長江滔滔孀稚纍纍慰君之魂奠厥攸歸我來日邊官天一涯隻影無佽期君是依失君中流淚下霑頥忍㪺一觴以與君違嗚呼哀哉尚享祭李子容嗚呼君乎佞人謭譾厚德簡夷利口喋喋吉人寡辭君子所是小人所嗤寧羣而嘲勿詭以隨君之內行矜謹自持發為詞章清潤而竒與君周旋亦既以朞皎皎玉德竟莫可玼其在我者我力行之其在天者有不可為君勉厥修天屯其施天耶人耶固不可知唯仁而壽契若蓍龜用即長塗以瘞修眉在君無恨人實可悲痛此善人天不憗遺尚饗祭靖節先生并序余游江西道過彭澤將拜先生之像於其祠下而祠在新邑道逺不得往乃㪺匏樽酹山醪立於道旁而祀焉其詞曰漢魏而下晉宋之間製作之輩其出班班曹劉鮑謝豈不足觀文貴天成不貴雕鐫異哉淵明有此至言百世之後歸來一篇似美而淡若枯而醇醇固近道淡固不羣酒德入怪離騷近針如此詞者皆所未聞先生之出如山吐雲先生之歸如鳥入林人見乃爾我獨何心所以超絶亘古一人放而為詞妙不可論律而為詩是亦斯文髙風卓行文章本根彼捧心者乃欲效顰東塗西抹而倚市門刻畫無鹽寧不厚顔先生下世五栁成村犬吠深巷雞鳴桑顛仿佛音容而在斯焉為賦大招以弔公魂尚饗弔英布廟繄楚漢之方興兮顧雌雄之未判唯智者之見幾兮當方決而中斷始冠軍之就戮兮恨老增之見晚悟使者之一言兮遽投策而歸漢建王都於楚邱兮俾故鄉之改觀雖富貴之遂志兮曽不戒夫盈滿威震主而不祥兮宜避禍而逺引彼羣㕙之穴空兮韓盧烹而不免致主意之見疑兮功臣懼而交惋視越醢而信禽兮分死生於夜旦上印綬而乞骸骨兮追喬松而游汗漫無尺籍之與寸兵兮疑可釋而冰泮王料敵以如龜兮何目眥之弗見渡清淮而反田里兮享壽康於安晏蓋無罪而殺大夫兮士當去而不可緩况勇冠於諸侯兮復功髙於既叛何此理之不明兮徒銜寃而永嘆太倉稊米集卷六十九
